<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wren">
  <!-- A Eurasian wren: small, plump, round body with the signature short cocked-up tail -->
  <!-- tail (cocked up, barred) -->
  <g stroke="#5a3a22" stroke-width="1" stroke-linejoin="round">
    <path d="M40 36 L56 14 L60 20 L46 41 Z" fill="#7a4f2e"/>
    <path d="M48 28 L57 17" stroke="#5a3a22" stroke-width="1.2" fill="none"/>
    <path d="M45 32 L54 21" stroke="#5a3a22" stroke-width="1.2" fill="none"/>
  </g>
  <!-- body -->
  <ellipse cx="31" cy="40" rx="17" ry="14" fill="#9c6b3f"/>
  <!-- paler belly -->
  <path d="M16 44 a16 13 0 0 0 28 6 a17 14 0 0 1 -28 -6 Z" fill="#dcb98a"/>
  <!-- folded wing with bars -->
  <path d="M30 31 q14 2 14 14 q-10 3 -16 -4 q-2 -7 2 -10 Z" fill="#82542e"/>
  <path d="M33 36 l9 3 M32 40 l11 2 M33 44 l9 2" stroke="#5a3a22" stroke-width="1" fill="none"/>
  <!-- head -->
  <circle cx="20" cy="27" r="10.5" fill="#9c6b3f"/>
  <!-- pale supercilium (eye-stripe) -->
  <path d="M11 23 q8 -4 16 -1" stroke="#e9d3b0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- beak (thin, pointed) -->
  <path d="M11 28 L2 26 L11 31 Z" fill="#3b2a1a"/>
  <!-- eye -->
  <circle cx="17" cy="27" r="1.8" fill="#241a10"/>
  <!-- legs -->
  <g stroke="#3b2a1a" stroke-width="1.4" stroke-linecap="round">
    <path d="M26 53 l-1 6 M25 59 l-3 2 M25 59 l3 2"/>
    <path d="M34 53 l0 6 M34 59 l-3 2 M34 59 l3 2"/>
  </g>
</svg>
