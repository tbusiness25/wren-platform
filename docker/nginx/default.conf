proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=wren_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Use Docker's embedded DNS resolver so upstream names are re-resolved dynamically
resolver 127.0.0.11 valid=10s ipv6=off;

# ── Demo EYFS — port 80 (ey.getwren.co.uk) ────────────────────────────────────
server {
  listen 80;
  server_name _;
  # Tier-speed simulator proxy — longer prefix wins over /api/
  location /api/demo-ai {
    proxy_pass http://wren-demo-ai:3000;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 240s;
  }
  # Public Vapi webhook — proxies to prod LADN server, no auth required
  location /api/vapi/webhook {
    proxy_pass http://wren-ladn:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location /api/ {
    proxy_pass http://wren-eyfs:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location / {
    proxy_pass http://wren-eyfs:3000;
    proxy_set_header Host $host;
    proxy_hide_header Cache-Control;
    proxy_hide_header Last-Modified;
    proxy_hide_header ETag;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    sub_filter '</body>' '<link rel="stylesheet" href="/_shared/wren-demo-banner.css"><script src="/_shared/wren-demo-banner.js" defer></script><div style="position:fixed;bottom:0;left:0;right:0;background:#e07820;color:#fff;text-align:center;padding:4px 8px;font-size:12px;z-index:9998">&#x1F426; Wren EYFS Demo &nbsp;&middot;&nbsp; PIN: 1234 &nbsp;&middot;&nbsp; <a href="/ai-demo.html" style="color:#fff;font-weight:700">Try AI demo</a></div></body>';
    sub_filter_once on;
    sub_filter_types text/html;
  }
}

