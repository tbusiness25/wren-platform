services:
  wren-postgres:
    image: postgres:16-alpine
    container_name: wren-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wren
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: wren
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - wren-net

networks:
  wren-net:
    name: wren-net
    driver: bridge
