<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="admin">
<title>Action Plans — Wren Admin</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
:root {
  --pri:#4a9abf; --acc:#e07820; --bg:#0f172a; --card:#1e293b; --border:#2d3748;
  --text:#f1f5f9; --muted:#94a3b8; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444;
}
.ap-layout{display:grid;grid-template-columns:360px 1fr;gap:0;height:calc(100vh - 56px);overflow:hidden}
.ap-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ap-sidebar-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ap-sidebar-head h2{margin:0;font-size:1rem;font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;color:var(--pri);flex:1}
.ap-filters{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.filter-pill{padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:.15s}
.filter-pill.active{background:var(--pri);border-color:var(--pri);color:#fff}
.ap-list{flex:1;overflow-y:auto;padding:10px}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;border-left:4px solid transparent}
.plan-card:hover{border-color:var(--pri)3d}
.plan-card.selected{border-color:var(--pri);background:#1a2d40}
.plan-card.pri-high{border-left-color:var(--err)}
.plan-card.pri-medium{border-left-color:var(--warn)}
.plan-card.pri-low{border-left-color:var(--ok)}
.plan-title{font-weight:600;font-size:.9rem;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-meta{font-size:.75rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.progress-mini{height:4px;border-radius:2px;background:#0f172a;margin-top:8px;overflow:hidden}
.progress-mini-bar{height:100%;background:var(--pri);border-radius:2px;transition:.3s}
.ap-detail{display:flex;flex-direction:column;overflow:hidden}
.ap-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);gap:12px}
.ap-detail-empty svg{opacity:.3}
.detail-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;flex-shrink:0}
.detail-title-block{flex:1;min-width:0}
.detail-title{font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;color:var(--pri);font-size:1.2rem;margin:0 0 4px}
.detail-sub{font-size:.8rem;color:var(--muted)}
.progress-ring-wrap{flex-shrink:0;position:relative;width:64px;height:64px}
.progress-ring-wrap svg{transform:rotate(-90deg)}
.progress-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:var(--text)}
.stat-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat-tile{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.stat-tile .n{font-size:1.4rem;font-weight:700;color:var(--pri)}
.stat-tile .l{font-size:.7rem;color:var(--muted);margin-top:2px}
.detail-filters{padding:10px 22px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.items-area{flex:1;overflow-y:auto;padding:14px 22px}
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;border-left:4px solid transparent;transition:.15s}
.item-card.pri-high{border-left-color:var(--err)}
.item-card.pri-medium{border-left-color:var(--warn)}
.item-card.pri-low{border-left-color:var(--ok)}
.item-card.done{opacity:.6}
.item-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.item-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;transition:.15s}
.item-checkbox:checked{background:var(--ok);border-color:var(--ok)}
.item-checkbox:checked::after{content:'✓';display:block;text-align:center;color:#fff;font-size:11px;line-height:16px}
.item-info{flex:1;min-width:0}
.item-title{font-size:.88rem;font-weight:600;color:var(--text)}
.item-title.done-text{text-decoration:line-through;color:var(--muted)}
.item-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-red{background:#450a0a;color:var(--err)} .badge-amber{background:#451a03;color:var(--warn)}
.badge-green{background:#064e23;color:var(--ok)} .badge-blue{background:#0c2d48;color:var(--pri)}
.badge-gray{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.badge-scope-private{background:#2d1a3d;color:#c084fc}
.badge-scope-staff{background:#0c2d48;color:var(--pri)}
.badge-scope-parents{background:#064e23;color:var(--ok)}
.item-expand{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);transition:.15s}
.item-expand:hover{background:var(--border);color:var(--text)}
.item-detail{padding:0 14px 12px 44px;display:none}
.item-detail.open{display:block}
.item-detail p{font-size:.83rem;color:var(--muted);margin:0 0 8px}
.item-actions-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.btn-sm{padding:5px 12px;font-size:.78rem}
.btn-primary{background:var(--pri);color:#fff} .btn-primary:hover{background:#3a8aaf}
.btn-accent{background:var(--acc);color:#fff} .btn-accent:hover{background:#c06810}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)} .btn-ghost:hover{background:var(--border)}
.btn-danger{background:var(--err);color:#fff}
.fab{position:fixed;bottom:24px;right:24px;background:var(--acc);color:#fff;border:none;border-radius:50%;width:52px;height:52px;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:.2s;display:flex;align-items:center;justify-content:center}
.fab:hover{background:#c06810;transform:scale(1.08)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 18px;font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;color:var(--pri);font-size:1.1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pri)}
.form-group textarea{min-height:70px;resize:vertical}
.scope-hint{font-size:.72rem;color:var(--muted);margin-top:4px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state p{font-size:.9rem;margin:8px 0 0}
.tag-chip{display:inline-block;padding:2px 8px;border-radius:10px;background:#1a3040;color:var(--pri);font-size:.7rem;margin:2px}
@media(max-width:800px){.ap-layout{grid-template-columns:1fr;}.ap-sidebar{height:auto;max-height:50vh;}.ap-detail{min-height:0;flex:1;}}
</style>
</head>
<body>
<div id="wren-shell-target"></div>
<div id="wren-content">
  <div class="ap-layout">

    <!-- LEFT: Plan list sidebar -->
    <div class="ap-sidebar">
      <div class="ap-sidebar-head">
        <h2>Action Plans</h2>
        <button class="btn btn-sm btn-primary" id="btnNewPlan">+ New Plan</button>
      </div>
      <div class="ap-filters">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="overdue">Overdue</button>
        <button class="filter-pill" data-filter="active">Active</button>
        <button class="filter-pill" data-filter="completed">Completed</button>
        <button class="filter-pill" data-filter="private">Private</button>
      </div>
      <div class="ap-list" id="planList">
        <div class="empty-state"><p>Loading plans…</p></div>
      </div>
    </div>

    <!-- RIGHT: Plan detail -->
    <div class="ap-detail" id="planDetail">
      <div class="ap-detail-empty" id="detailEmpty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h6M7 16h4"/></svg>
        <span>Select a plan to view its actions</span>
      </div>
      <div id="detailContent" style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none">

        <div class="detail-head">
          <div class="detail-title-block">
            <div class="detail-title" id="dTitle"></div>
            <div class="detail-sub" id="dMeta"></div>
          </div>
          <div class="progress-ring-wrap">
            <svg width="64" height="64">
              <circle cx="32" cy="32" r="26" stroke="#2d3748" stroke-width="6" fill="none"/>
              <circle id="ringCircle" cx="32" cy="32" r="26" stroke="#4a9abf" stroke-width="6" fill="none"
                stroke-dasharray="163.36" stroke-dashoffset="163.36" stroke-linecap="round"/>
            </svg>
            <div class="progress-ring-text" id="ringPct">0%</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-sm btn-ghost" id="btnEditPlan">Edit Plan</button>
            <button class="btn btn-sm btn-ghost" id="btnArchivePlan" style="color:#ef4444">Archive</button>
          </div>
        </div>

        <div class="stat-tiles" id="statTiles"></div>

        <div class="detail-filters">
          <button class="filter-pill active" data-ifilter="all">All</button>
          <button class="filter-pill" data-ifilter="todo">To Do</button>
          <button class="filter-pill" data-ifilter="in-progress">In Progress</button>
          <button class="filter-pill" data-ifilter="overdue">Overdue</button>
          <button class="filter-pill" data-ifilter="completed">Completed</button>
          <button class="btn btn-sm btn-accent" id="btnAddItem" style="margin-left:auto">+ Add Action</button>
        </div>

        <div class="items-area" id="itemsList"></div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabNewPlan" title="New Plan">+</button>
</div>

<!-- Modal: Create / Edit Plan -->
<div class="modal-bg" id="modalPlan">
  <div class="modal">
    <h3 id="modalPlanTitle">New Action Plan</h3>
    <input type="hidden" id="mPlanId">
    <div class="form-row">
      <div class="form-group">
        <label>Title *</label>
        <input id="mTitle" placeholder="e.g. Safeguarding review Q3">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="mCategory">
          <option value="">-- Select --</option>
          <option value="safeguarding">Safeguarding</option>
          <option value="eyfs_quality">EYFS Quality</option>
          <option value="staff_development">Staff Development</option>
          <option value="health_safety">Health &amp; Safety</option>
          <option value="send">SEND</option>
          <option value="behaviour">Behaviour</option>
          <option value="compliance">Compliance</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="mPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Date</label>
        <input type="date" id="mTargetDate" min="">
      </div>
    </div>
    <div class="form-group">
      <label>Visibility Scope</label>
      <select id="mScope">
        <option value="staff">Staff — visible to assigned staff (default)</option>
        <option value="private">Private — manager only</option>
        <option value="parents-readonly">Parents — assigned staff + parents of related child</option>
      </select>
      <div class="scope-hint" id="scopeHint">Visible to manager and staff assigned to items in this plan.</div>
    </div>
    <div class="form-group" id="childRow" style="display:none">
      <label>Related Child (required for parent scope)</label>
      <select id="mChild"><option value="">-- Select child --</option></select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="mDesc" placeholder="What does this plan aim to achieve?"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnCancelPlan">Cancel</button>
      <button class="btn btn-primary" id="btnSavePlan">Save Plan</button>
    </div>
  </div>
</div>

<!-- Modal: Add / Edit Item -->
<div class="modal-bg" id="modalItem">
  <div class="modal">
    <h3 id="modalItemTitle">Add Action</h3>
    <input type="hidden" id="mItemId">
    <input type="hidden" id="mItemPlanId">
    <div class="form-group">
      <label>Action Title *</label>
      <input id="mITitle" placeholder="e.g. Review and update safeguarding policy">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="mIPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Deadline</label>
        <input type="date" id="mIDeadline" min="">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="mIStatus">
          <option value="todo">To Do</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="blocked">Blocked</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assign to Staff</label>
        <select id="mIAssignee"><option value="">-- Unassigned --</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>Description / Notes</label>
      <textarea id="mIDesc" placeholder="Additional context or acceptance criteria…"></textarea>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated)</label>
      <input id="mITags" placeholder="e.g. ofsted, q3, safeguarding">
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnCancelItem">Cancel</button>
      <button class="btn btn-primary" id="btnSaveItem">Save Action</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allPlans = [], allItems = [], staffList = [], children = [];
let currentPlanId = null, planFilter = 'all', itemFilter = 'all';

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function authH() {
  const t = sessionStorage.getItem('wrenToken');
  return t ? { Authorization: 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}
async function api(url, opts) {
  const r = await fetch(url, { headers: authH(), ...opts });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
  return r.json();
}
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '—'; }
function isOverdue(deadline, status) {
  return deadline && !['completed','blocked'].includes(status) && new Date(deadline) < new Date();
}
function priorityClass(p) { return p === 'high' ? 'pri-high' : p === 'low' ? 'pri-low' : 'pri-medium'; }
function priorityBadge(p) {
  const cls = p === 'high' ? 'badge-red' : p === 'low' ? 'badge-green' : 'badge-amber';
  return `<span class="badge ${cls}">${esc(p)}</span>`;
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadPlans() {
  try {
    allPlans = await api('/api/action-plans');
    if (!Array.isArray(allPlans)) allPlans = [];
    renderPlanList();
  } catch (e) {
    document.getElementById('planList').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

async function loadStaff() {
  try {
    staffList = await api('/api/staff');
    if (!Array.isArray(staffList)) staffList = [];
    const opts = '<option value="">-- Unassigned --</option>' +
      staffList.map(s => `<option value="${s.id}">${esc(s.first_name)} ${esc(s.last_name)}</option>`).join('');
    document.getElementById('mIAssignee').innerHTML = opts;
  } catch {}
}

async function loadChildren() {
  try {
    children = await api('/api/children');
    if (!Array.isArray(children)) children = [];
    const opts = '<option value="">-- Select child --</option>' +
      children.filter(c => c.is_active).map(c => `<option value="${c.id}">${esc(c.first_name)} ${esc(c.last_name)}</option>`).join('');
    document.getElementById('mChild').innerHTML = opts;
  } catch {}
}

async function loadItems(planId) {
  try {
    allItems = await api('/api/action-plan-items?plan_id=' + planId);
    if (!Array.isArray(allItems)) allItems = [];
    renderItems();
    renderStats();
    updateRing();
  } catch (e) {
    document.getElementById('itemsList').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

// ── Render: plan list ────────────────────────────────────────────────────────
function renderPlanList() {
  const today = new Date();
  let plans = allPlans.filter(p => !p.archived_at);
  if (planFilter === 'overdue') plans = plans.filter(p => p.target_date && new Date(p.target_date) < today && p.status !== 'completed');
  else if (planFilter === 'active') plans = plans.filter(p => p.status !== 'completed');
  else if (planFilter === 'completed') plans = plans.filter(p => p.status === 'completed');
  else if (planFilter === 'private') plans = plans.filter(p => p.scope === 'private');

  const el = document.getElementById('planList');
  if (!plans.length) {
    el.innerHTML = `<div class="empty-state"><p>No plans match this filter.</p><p style="margin-top:8px;font-size:.8rem">Create one with the + New Plan button.</p></div>`;
    return;
  }
  el.innerHTML = plans.map(p => {
    const overdue = isOverdue(p.target_date, p.status);
    const scopeLabel = p.scope === 'private' ? '🔒 Private' : p.scope === 'parents-readonly' ? '👨‍👩‍👧 Parents' : '👥 Staff';
    return `<div class="plan-card ${priorityClass(p.priority)} ${currentPlanId === p.id ? 'selected' : ''}" data-id="${p.id}">
      <div class="plan-title" title="${esc(p.title)}">${esc(p.title)}</div>
      <div class="plan-meta">
        <span>${scopeLabel}</span>
        ${p.category ? `<span>${esc(p.category.replace('_',' '))}</span>` : ''}
        ${p.target_date ? `<span ${overdue ? 'style="color:#ef4444"' : ''}>Due ${fmtDate(p.target_date)}${overdue?' ⚠':''}` + `</span>` : ''}
      </div>
      <div class="progress-mini"><div class="progress-mini-bar" id="pmb-${p.id}" style="width:0%"></div></div>
    </div>`;
  }).join('');
}

// ── Render: item list ────────────────────────────────────────────────────────
function renderItems() {
  const today = new Date();
  let items = allItems;
  if (itemFilter === 'todo') items = items.filter(i => i.status === 'todo');
  else if (itemFilter === 'in-progress') items = items.filter(i => i.status === 'in-progress');
  else if (itemFilter === 'overdue') items = items.filter(i => isOverdue(i.deadline, i.status));
  else if (itemFilter === 'completed') items = items.filter(i => i.status === 'completed');
  else items = items.filter(i => i.status !== 'completed'); // 'all' = hide completed by default

  const el = document.getElementById('itemsList');
  if (!items.length) {
    const isAll = itemFilter === 'all';
    el.innerHTML = `<div class="empty-state"><p>${isAll ? 'No actions yet. Add one with + Add Action.' : 'No actions match this filter.'}</p></div>`;
    return;
  }
  el.innerHTML = items.map(item => {
    const done = item.status === 'completed';
    const overdue = isOverdue(item.deadline, item.status);
    const tags = item.tags || [];
    const dlBadge = item.deadline
      ? `<span class="badge ${overdue ? 'badge-red' : 'badge-gray'}">${overdue ? '⚠ ' : ''}${fmtDate(item.deadline)}</span>`
      : '';
    const assigneeBadge = item.assignee_name ? `<span class="badge badge-blue">👤 ${esc(item.assignee_name)}</span>` : '';
    const commentBadge = item.comment_count ? `<span class="badge badge-gray">💬 ${item.comment_count}</span>` : '';
    return `<div class="item-card ${priorityClass(item.priority)} ${done ? 'done' : ''}" id="ic-${item.id}">
      <div class="item-head">
        <input type="checkbox" class="item-checkbox" data-id="${item.id}" ${done ? 'checked' : ''} title="Mark complete">
        <div class="item-info">
          <div class="item-title ${done ? 'done-text' : ''}">${esc(item.title)}</div>
          <div class="item-badges">
            ${priorityBadge(item.priority)}
            ${dlBadge}
            ${assigneeBadge}
            ${commentBadge}
            ${tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('')}
          </div>
        </div>
        <button class="item-expand" data-expand="${item.id}" title="Expand">▾</button>
        <button class="btn btn-sm btn-ghost" data-edit="${item.id}" style="flex-shrink:0">Edit</button>
      </div>
      <div class="item-detail" id="id-${item.id}">
        ${item.description ? `<p>${esc(item.description)}</p>` : '<p style="color:#475569;font-style:italic">No description.</p>'}
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const today = new Date();
  const completed = allItems.filter(i => i.status === 'completed').length;
  const inProg = allItems.filter(i => i.status === 'in-progress').length;
  const overdue = allItems.filter(i => isOverdue(i.deadline, i.status)).length;
  const total = allItems.length;
  document.getElementById('statTiles').innerHTML = `
    <div class="stat-tile"><div class="n" style="color:#22c55e">${completed}</div><div class="l">Completed</div></div>
    <div class="stat-tile"><div class="n" style="color:#4a9abf">${inProg}</div><div class="l">In Progress</div></div>
    <div class="stat-tile"><div class="n" style="color:#ef4444">${overdue}</div><div class="l">Overdue</div></div>
    <div class="stat-tile"><div class="n">${total}</div><div class="l">Total</div></div>`;
}

function updateRing() {
  const total = allItems.length;
  const done = allItems.filter(i => i.status === 'completed').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const circumference = 163.36;
  const offset = circumference - (pct / 100 * circumference);
  document.getElementById('ringCircle').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';
  // Update mini progress bar in plan list
  const bar = document.getElementById('pmb-' + currentPlanId);
  if (bar) bar.style.width = pct + '%';
}

// ── Plan selection ────────────────────────────────────────────────────────────
function selectPlan(planId) {
  currentPlanId = planId;
  const plan = allPlans.find(p => p.id === planId);
  if (!plan) return;
  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'flex';
  dc.style.flexDirection = 'column';
  dc.style.flex = '1';
  dc.style.overflow = 'hidden';

  document.getElementById('dTitle').textContent = plan.title;
  const scopeLabel = plan.scope === 'private' ? '🔒 Private' : plan.scope === 'parents-readonly' ? '👨‍👩‍👧 Parents-visible' : '👥 Staff';
  const cat = plan.category ? ` · ${plan.category.replace('_', ' ')}` : '';
  document.getElementById('dMeta').textContent = `${scopeLabel}${cat}${plan.target_date ? ' · Due ' + fmtDate(plan.target_date) : ''}`;

  renderPlanList(); // re-render to show selected state
  loadItems(planId);
}

// ── Plan modals ───────────────────────────────────────────────────────────────
function openPlanModal(plan) {
  document.getElementById('modalPlanTitle').textContent = plan ? 'Edit Plan' : 'New Action Plan';
  document.getElementById('mPlanId').value = plan?.id || '';
  document.getElementById('mTitle').value = plan?.title || '';
  document.getElementById('mCategory').value = plan?.category || '';
  document.getElementById('mPriority').value = plan?.priority || 'medium';
  const _today = new Date().toISOString().slice(0, 10);
  const _mtd = document.getElementById('mTargetDate');
  _mtd.min = _today;
  _mtd.value = plan?.target_date ? plan.target_date.slice(0, 10) : _today;
  document.getElementById('mScope').value = plan?.scope || 'staff';
  document.getElementById('mDesc').value = plan?.description || '';
  document.getElementById('mChild').value = plan?.related_child_id || '';
  handleScopeChange();
  document.getElementById('modalPlan').classList.add('open');
}

function handleScopeChange() {
  const scope = document.getElementById('mScope').value;
  const hints = { private: 'Only you (manager) can see this plan.', staff: 'Visible to manager and staff assigned to items.', 'parents-readonly': 'Assigned staff and parents of the related child can see this.' };
  document.getElementById('scopeHint').textContent = hints[scope] || '';
  document.getElementById('childRow').style.display = scope === 'parents-readonly' ? '' : 'none';
}

async function savePlan() {
  const id = document.getElementById('mPlanId').value;
  const body = {
    title: document.getElementById('mTitle').value.trim(),
    category: document.getElementById('mCategory').value || null,
    priority: document.getElementById('mPriority').value,
    target_date: document.getElementById('mTargetDate').value || null,
    scope: document.getElementById('mScope').value,
    description: document.getElementById('mDesc').value.trim() || null,
    related_child_id: document.getElementById('mChild').value || null
  };
  if (!body.title) { wrenToast('Title is required', 'error'); return; }
  try {
    if (id) {
      await api(`/api/action-plans/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
    } else {
      body.created_by_staff_id = null;
      await api('/api/action-plans', { method: 'POST', body: JSON.stringify(body) });
    }
    document.getElementById('modalPlan').classList.remove('open');
    wrenToast('Plan saved');
    await loadPlans();
    if (currentPlanId) selectPlan(currentPlanId);
  } catch (e) { wrenToast('Error: ' + e.message, 'error'); }
}

async function archivePlan() {
  if (!currentPlanId) return;
  if (!confirm('Archive this plan? It will be hidden but not deleted.')) return;
  try {
    await api(`/api/action-plans/${currentPlanId}`, { method: 'PATCH', body: JSON.stringify({ archived_at: new Date().toISOString() }) });
    currentPlanId = null;
    document.getElementById('detailEmpty').style.display = '';
    document.getElementById('detailContent').style.display = 'none';
    wrenToast('Plan archived');
    await loadPlans();
  } catch (e) { wrenToast('Error: ' + e.message, 'error'); }
}

// ── Item modals ───────────────────────────────────────────────────────────────
function openItemModal(item) {
  document.getElementById('modalItemTitle').textContent = item ? 'Edit Action' : 'Add Action';
  document.getElementById('mItemId').value = item?.id || '';
  document.getElementById('mItemPlanId').value = currentPlanId;
  document.getElementById('mITitle').value = item?.title || '';
  document.getElementById('mIPriority').value = item?.priority || 'medium';
  const _today = new Date().toISOString().slice(0, 10);
  const _mid = document.getElementById('mIDeadline');
  _mid.min = _today;
  _mid.value = item?.deadline ? item.deadline.slice(0, 10) : _today;
  document.getElementById('mIStatus').value = item?.status || 'todo';
  document.getElementById('mIAssignee').value = item?.assigned_staff_id || '';
  document.getElementById('mIDesc').value = item?.description || '';
  document.getElementById('mITags').value = (item?.tags || []).join(', ');
  document.getElementById('modalItem').classList.add('open');
}

async function saveItem() {
  const id = document.getElementById('mItemId').value;
  const planId = document.getElementById('mItemPlanId').value;
  const rawTags = document.getElementById('mITags').value.trim();
  const body = {
    plan_id: parseInt(planId),
    title: document.getElementById('mITitle').value.trim(),
    priority: document.getElementById('mIPriority').value,
    deadline: document.getElementById('mIDeadline').value || null,
    status: document.getElementById('mIStatus').value,
    assigned_staff_id: document.getElementById('mIAssignee').value || null,
    description: document.getElementById('mIDesc').value.trim() || null,
    tags: rawTags ? rawTags.split(',').map(t => t.trim()).filter(Boolean) : null
  };
  if (!body.title) { wrenToast('Action title required', 'error'); return; }
  try {
    if (id) {
      await api(`/api/action-plan-items/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
    } else {
      await api('/api/action-plan-items', { method: 'POST', body: JSON.stringify(body) });
    }
    document.getElementById('modalItem').classList.remove('open');
    wrenToast('Action saved');
    await loadItems(planId);
  } catch (e) { wrenToast('Error: ' + e.message, 'error'); }
}

async function toggleItemStatus(itemId, checked) {
  const status = checked ? 'completed' : 'todo';
  try {
    await api(`/api/action-plan-items/${itemId}`, { method: 'PATCH', body: JSON.stringify({ status }) });
    await loadItems(currentPlanId);
  } catch (e) { wrenToast('Error: ' + e.message, 'error'); }
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.addEventListener('wren:ready', async () => {
  await Promise.all([loadPlans(), loadStaff(), loadChildren()]);
});

document.getElementById('planList').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) selectPlan(parseInt(card.dataset.id));
});

document.querySelector('.ap-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter]');
  if (!btn) return;
  planFilter = btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlanList();
});

document.querySelector('.detail-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-ifilter]');
  if (btn) {
    itemFilter = btn.dataset.ifilter;
    document.querySelectorAll('[data-ifilter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderItems();
    return;
  }
  if (e.target.closest('#btnAddItem')) openItemModal(null);
});

document.getElementById('itemsList').addEventListener('click', e => {
  const expandBtn = e.target.closest('[data-expand]');
  if (expandBtn) {
    const detail = document.getElementById('id-' + expandBtn.dataset.expand);
    if (detail) { detail.classList.toggle('open'); expandBtn.textContent = detail.classList.contains('open') ? '▴' : '▾'; }
    return;
  }
  const editBtn = e.target.closest('[data-edit]');
  if (editBtn) {
    const item = allItems.find(i => i.id === parseInt(editBtn.dataset.edit));
    if (item) openItemModal(item);
    return;
  }
  const cb = e.target.closest('.item-checkbox');
  if (cb) {
    e.preventDefault();
    toggleItemStatus(parseInt(cb.dataset.id), cb.checked);
  }
});

document.getElementById('btnNewPlan').addEventListener('click', () => openPlanModal(null));
document.getElementById('fabNewPlan').addEventListener('click', () => openPlanModal(null));
document.getElementById('btnEditPlan').addEventListener('click', () => {
  const plan = allPlans.find(p => p.id === currentPlanId);
  if (plan) openPlanModal(plan);
});
document.getElementById('btnArchivePlan').addEventListener('click', archivePlan);
document.getElementById('mScope').addEventListener('change', handleScopeChange);
document.getElementById('btnSavePlan').addEventListener('click', savePlan);
document.getElementById('btnCancelPlan').addEventListener('click', () => document.getElementById('modalPlan').classList.remove('open'));
document.getElementById('btnSaveItem').addEventListener('click', saveItem);
document.getElementById('btnCancelItem').addEventListener('click', () => document.getElementById('modalItem').classList.remove('open'));
document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));
</script>
