<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="admin">
  <title>Monthly Checklist — Roost</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .checklist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 6px 12px;
    }
    .month-label {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      min-width: 140px;
      text-align: center;
    }
    .progress-bar-wrap {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .progress-track {
      flex: 1;
      min-width: 120px;
      height: 8px;
      background: #0f172a;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .progress-label {
      font-size: .82rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    .progress-pct {
      font-size: 1.1rem;
      font-weight: 700;
      color: #22c55e;
      min-width: 44px;
    }

    .checklist-group { margin-bottom: 24px; }
    .group-heading {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1e293b;
    }
    .checklist-item {
      background: #1e293b;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: border-color .15s ease, opacity .2s;
    }
    .checklist-item:hover { border-color: #4a9abf40; }
    .checklist-item.done {
      opacity: .55;
      border-color: #22c55e30;
      background: rgba(34,197,94,.04);
    }
    .checklist-item.done .item-title { text-decoration: line-through; color: #64748b; }

    .item-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #2d3748;
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      transition: background .15s, border-color .15s;
      margin-top: 1px;
    }
    .checklist-item.done .item-check {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title { font-size: .88rem; font-weight: 600; color: #f1f5f9; }
    .item-desc  { font-size: .75rem; color: #94a3b8; margin-top: 3px; line-height: 1.4; }
    .item-meta  { font-size: .7rem; color: #4a9abf; margin-top: 4px; }

    .priority-chip {
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .priority-chip.high   { background: rgba(239,68,68,.15);  color: #ef4444; }
    .priority-chip.medium { background: rgba(245,158,11,.15); color: #f59e0b; }
    .priority-chip.low    { background: rgba(148,163,184,.1); color: #64748b; }

    .checklist-empty {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: .9rem;
    }
    .all-done-banner {
      background: rgba(34,197,94,.08);
      border: 1px solid #22c55e30;
      border-radius: 12px;
      padding: 18px 24px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    .all-done-banner.visible { display: block; }
    .all-done-banner .banner-icon { font-size: 2rem; margin-bottom: 6px; }
    .all-done-banner .banner-text { font-size: 1rem; font-weight: 700; color: #22c55e; }
    .all-done-banner .banner-sub  { font-size: .8rem; color: #94a3b8; margin-top: 4px; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="checklist-header">
    <div>
      <div class="page-title">Monthly Checklist</div>
      <div class="page-subtitle" style="color:#94a3b8">Manager admin tasks — auto-seeded each month</div>
    </div>
    <div class="month-nav">
      <button class="btn btn-ghost btn-sm" id="btn-prev-mo" style="padding:4px 10px">&#8592;</button>
      <div class="month-label" id="month-label">—</div>
      <button class="btn btn-ghost btn-sm" id="btn-next-mo" style="padding:4px 10px">&#8594;</button>
      <button class="btn btn-ghost btn-sm" id="btn-today-mo" style="padding:4px 10px;font-size:11px">This month</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-pct" id="progress-pct">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Loading…</div>
  </div>

  <!-- All-done banner -->
  <div class="all-done-banner" id="all-done-banner">
    <div class="banner-icon">🎉</div>
    <div class="banner-text">All done for this month!</div>
    <div class="banner-sub">Everything's ticked off. Nice work.</div>
  </div>

  <!-- Checklist items -->
  <div id="checklist-body"><div class="checklist-empty">Loading…</div></div>
</div>

<script>
document.addEventListener('wren:ready', () => {
  const now = new Date();
  let viewYear  = now.getFullYear();
  let viewMonth = now.getMonth() + 1;

  function monthName(y, m) {
    return new Date(y, m - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  }

  function setPct(done, total) {
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${done} of ${total} tasks complete`;
    document.getElementById('progress-pct').style.color = pct === 100 ? '#22c55e' : (pct >= 50 ? '#f59e0b' : '#94a3b8');
    document.getElementById('all-done-banner').classList.toggle('visible', pct === 100 && total > 0);
  }

  function renderItems(items) {
    document.getElementById('month-label').textContent = monthName(viewYear, viewMonth);
    if (!items.length) {
      document.getElementById('checklist-body').innerHTML = '<div class="checklist-empty">No checklist for this month yet.</div>';
      setPct(0, 0);
      return;
    }

    const done  = items.filter(i => i.status === 'done').length;
    const total = items.length;
    setPct(done, total);

    const byPriority = { high: [], medium: [], low: [] };
    items.forEach(i => (byPriority[i.priority] || byPriority.low).push(i));

    const groups = [
      { key: 'high',   label: 'Must do this month' },
      { key: 'medium', label: 'Should do this month' },
      { key: 'low',    label: 'Good to do this month' },
    ];

    let html = '';
    for (const g of groups) {
      const gItems = byPriority[g.key];
      if (!gItems.length) continue;
      html += `<div class="checklist-group">
        <div class="group-heading">${g.label} (${gItems.filter(i=>i.status==='done').length}/${gItems.length})</div>`;
      for (const item of gItems) {
        const isDone = item.status === 'done';
        const doneAt = item.completed_at
          ? ' · Done ' + new Date(item.completed_at).toLocaleDateString('en-GB', {day:'numeric',month:'short'})
          : '';
        html += `<div class="checklist-item${isDone ? ' done' : ''}" data-id="${item.id}" data-status="${item.status}">
          <div class="item-check">${isDone ? '✓' : ''}</div>
          <div class="item-body">
            <div class="item-title">${esc(item.title)}</div>
            ${item.description ? `<div class="item-desc">${esc(item.description)}</div>` : ''}
            ${doneAt ? `<div class="item-meta">${doneAt}</div>` : ''}
          </div>
          <span class="priority-chip ${item.priority}">${item.priority}</span>
        </div>`;
      }
      html += '</div>';
    }
    document.getElementById('checklist-body').innerHTML = html;
  }

  function loadChecklist() {
    document.getElementById('checklist-body').innerHTML = '<div class="checklist-empty">Loading…</div>';
    Wren.api(`/api/tasks/monthly-checklist?year=${viewYear}&month=${viewMonth}`).then(d => {
      renderItems(d.items || []);
    }).catch(e => {
      document.getElementById('checklist-body').innerHTML =
        `<div class="checklist-empty" style="color:#ef4444">Error: ${esc(e.error || 'Failed to load')}</div>`;
    });
  }

  function toggleItem(id, currentStatus) {
    const newStatus = currentStatus === 'done' ? 'open' : 'done';
    Wren.api(`/api/tasks/${id}`, { method: 'PUT', body: { status: newStatus } }).then(updated => {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (!el) return;
      el.dataset.status = newStatus;
      el.classList.toggle('done', newStatus === 'done');
      el.querySelector('.item-check').textContent = newStatus === 'done' ? '✓' : '';
      const doneAt = updated.completed_at
        ? ' · Done ' + new Date(updated.completed_at).toLocaleDateString('en-GB', {day:'numeric',month:'short'})
        : '';
      const metaEl = el.querySelector('.item-meta');
      if (doneAt && metaEl) { metaEl.textContent = doneAt; }
      else if (doneAt) {
        const body = el.querySelector('.item-body');
        const m = document.createElement('div');
        m.className = 'item-meta'; m.textContent = doneAt; body.appendChild(m);
      } else if (metaEl) { metaEl.remove(); }
      const allItems = [...document.querySelectorAll('.checklist-item')];
      const done = allItems.filter(i => i.dataset.status === 'done').length;
      setPct(done, allItems.length);
    }).catch(e => Wren.toast(e.error || 'Failed', 'error'));
  }

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  document.getElementById('checklist-body').addEventListener('click', e => {
    const item = e.target.closest('.checklist-item');
    if (!item) return;
    toggleItem(parseInt(item.dataset.id), item.dataset.status);
  });

  document.getElementById('btn-prev-mo').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 1) { viewMonth = 12; viewYear--; }
    document.getElementById('month-label').textContent = monthName(viewYear, viewMonth);
    loadChecklist();
  });
  document.getElementById('btn-next-mo').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 12) { viewMonth = 1; viewYear++; }
    document.getElementById('month-label').textContent = monthName(viewYear, viewMonth);
    loadChecklist();
  });
  document.getElementById('btn-today-mo').addEventListener('click', () => {
    const n = new Date();
    viewYear = n.getFullYear(); viewMonth = n.getMonth() + 1;
    document.getElementById('month-label').textContent = monthName(viewYear, viewMonth);
    loadChecklist();
  });

  document.getElementById('month-label').textContent = monthName(viewYear, viewMonth);
  loadChecklist();
});
</script>
</body>
</html>
