<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Compliance — Wren Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">✅ Compliance Tracker</div>
  </div>

  <div id="compliance-area"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<script>
async function loadData() {
  try {
    const staff = await Wren.api('/api/admin/staff');
    const now = new Date();
    const soon = new Date(now.getTime() + 60 * 24 * 60 * 60 * 1000); // 60 days

    const area = document.getElementById('compliance-area');
    area.innerHTML = `
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><div class="card-title">DBS Check Status</div></div>
        <div class="table-wrapper"><table>
          <thead><tr><th>Staff</th><th>Role</th><th>DBS Number</th><th>Expiry</th><th>Status</th></tr></thead>
          <tbody>
            ${staff.map(s => {
              const expiry = s.dbs_expiry ? new Date(s.dbs_expiry) : null;
              const expired = expiry && expiry < now;
              const expiringSoon = expiry && !expired && expiry < soon;
              const status = !expiry ? 'Not recorded' : expired ? 'EXPIRED' : expiringSoon ? 'Expiring soon' : 'Valid';
              const badgeClass = !expiry ? 'badge-grey' : expired ? 'badge-red' : expiringSoon ? 'badge-amber' : 'badge-green';
              return `<tr>
                <td><strong>${s.first_name} ${s.last_name}</strong></td>
                <td>${s.role?.replace(/_/g,' ')}</td>
                <td>—</td>
                <td>${expiry ? expiry.toLocaleDateString('en-GB') : '—'}</td>
                <td><span class="badge ${badgeClass}">${status}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Mandatory Training</div></div>
        <div class="alert alert-info">
          Paediatric First Aid, Safeguarding Level 2, Food Hygiene Level 2 — all staff must hold current certifications.
          CPD records managed in the staff portal.
        </div>
        <p style="color:#94a3b8;font-size:.875rem;padding:8px">
          Full CPD compliance view coming soon — link staff CPD records to mandatory requirements.
        </p>
      </div>
    `;
  } catch(e) {
    document.getElementById('compliance-area').innerHTML = '<div class="alert alert-danger">Failed to load</div>';
  }
}

document.addEventListener('DOMContentLoaded', () => { loadData(); });
</script>
<script src="/js/wren-chat.js?v=2026070901"></script>
</body>
</html>
