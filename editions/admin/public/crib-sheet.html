<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ofsted Crib Sheet · Wren</title>
<link rel="stylesheet" href="/css/wren.css"><link rel="stylesheet" href="/css/wren-shell-v2.css">
<style>
 :root{--bg:#080f1e;--card:#0f1a34;--bd:rgba(255,255,255,.10);--txt:#f1f5f9;--mut:#94a3b8;
   --ok:#22c55e;--accent:#4a9abf}
 body{background:var(--bg);color:var(--txt)}
 .crib-wrap{padding:24px;max-width:800px;margin:0 auto}
 h1{font-size:1.6rem;margin:0 0 8px;text-align:center}
 .sub{color:var(--mut);font-size:.9rem;margin-bottom:24px;text-align:center}
 .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:20px 0}
 .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
 .card-num{font-size:2.4rem;font-weight:800;color:var(--accent);margin-bottom:4px}
 .card-label{font-size:.85rem;color:var(--mut);text-transform:uppercase;letter-spacing:.02em}
 .info{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;margin:16px 0;
   display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
 .info-item{display:flex;flex-direction:column}
 .info-label{font-size:.75rem;color:var(--mut);text-transform:uppercase;letter-spacing:.02em;margin-bottom:2px}
 .info-val{font-size:1.1rem;font-weight:700;color:var(--txt)}
 .actions{margin:24px 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
 .btn{background:var(--card);border:1px solid var(--bd);color:var(--txt);border-radius:10px;
   padding:10px 18px;font-size:.9rem;cursor:pointer}
 .btn:hover{border-color:var(--accent)}
 .btn.primary{background:var(--accent);border-color:var(--accent);color:#06121f;font-weight:700}
 .loading{text-align:center;padding:40px;color:var(--mut);font-size:.9rem}
 @media print {
   body{background:#fff;color:#000}
   .actions{display:none}
   .card,.info{border-color:#ccc;background:#f9f9f9;color:#000}
   .card-num{color:#333}
   .card-label,.info-label,.sub{color:#666}
   .info-val{color:#000}
   h1{color:#000}
 }
</style></head>
<body data-portal="admin">
<div class="crib-wrap">
  <h1>📞 Ofsted Crib Sheet</h1>
  <div class="sub">Quick reference for phone calls — all counts are live from the database.</div>

  <div id="crib-content">
    <div class="loading">Loading crib sheet…</div>
  </div>

  <div class="actions">
    <button class="btn" id="btn-refresh">↻ Refresh</button>
    <button class="btn primary" onclick="window.print()">🖨 Print</button>
    <button class="btn" onclick="window.close()">Close</button>
  </div>
</div>

<script src="/js/wren-core.js"></script>
<script src="/js/wren-shell-v2.js"></script>
<script>
(function(){
  'use strict';
  var data = null;

  function render(){
    if(!data){
      document.getElementById('crib-content').innerHTML = '<div class="loading">Loading crib sheet…</div>';
      return;
    }

    var html = '';

    // Opening hours info
    html += '<div class="info">';
    html += '<div class="info-item"><div class="info-label">Opening Hours</div><div class="info-val">' + esc(data.openingHours) + '</div></div>';
    html += '<div class="info-item"><div class="info-label">Opening Days</div><div class="info-val">' + esc(data.openingDays) + '</div></div>';
    html += '</div>';

    // Staff and children counts
    html += '<div class="grid">';
    html += card(data.totalStaff, 'Total Staff');
    html += card(data.totalChildren, 'Total Children');
    html += '</div>';

    // Age breakdown
    html += '<div style="margin-top:24px"><h2 style="font-size:1.1rem;margin:0 0 12px;color:var(--mut);text-transform:uppercase;letter-spacing:.02em">Age Breakdown</h2>';
    html += '<div class="grid">';
    html += card(data.aged2, 'Aged 2');
    html += card(data.aged3_4, 'Aged 3 & 4');
    html += '</div></div>';

    // Funding
    html += '<div style="margin-top:24px"><h2 style="font-size:1.1rem;margin:0 0 12px;color:var(--mut);text-transform:uppercase;letter-spacing:.02em">Funding</h2>';
    html += '<div class="grid">';
    html += card(data.twoYearFunded, '2-Year Funded');
    html += card(data.threeFourFunded, '3&4 Funded<br><span style="font-size:.65rem;font-weight:400">(15 or 30 hours)</span>');
    html += card(data.pupilPremium, 'Pupil Premium / EYPP');
    html += '</div></div>';

    // Additional needs & support
    html += '<div style="margin-top:24px"><h2 style="font-size:1.1rem;margin:0 0 12px;color:var(--mut);text-transform:uppercase;letter-spacing:.02em">Additional Needs & Support</h2>';
    html += '<div class="grid">';
    html += card(data.eal, 'EAL');
    html += card(data.send, 'SEND');
    html += card(data.safeguarding, 'Safeguarding / CP');
    html += '</div></div>';

    document.getElementById('crib-content').innerHTML = html;
  }

  function card(num, label){
    return '<div class="card"><div class="card-num">' + num + '</div><div class="card-label">' + label + '</div></div>';
  }

  function esc(s){ var d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }

  function load(){
    fetch('/api/inspection/crib-sheet', { headers: { Authorization: 'Bearer ' + sessionStorage.getItem('wrenToken') } })
      .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(d){
        data = d;
        render();
      })
      .catch(function(err){
        console.error('crib-sheet load error', err);
        document.getElementById('crib-content').innerHTML = '<div class="loading">Error loading crib sheet: ' + esc(err.message) + '</div>';
      });
  }

  document.addEventListener('wren:ready', function(){
    load();
    document.getElementById('btn-refresh').addEventListener('click', load);
  });
})();
</script>
</body></html>
