<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="admin">
<title>Document Workspace — Wren Admin</title>
<link rel="stylesheet" href="/css/wren.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
:root{--pri:#4a9abf;--acc:#e07820;--bg:#0f172a;--card:#1e293b;--border:#2d3748;--text:#f1f5f9;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
body{background:var(--bg);color:var(--text);font-family:system-ui,Arial,sans-serif;margin:0}
.page-wrap{max-width:1100px;margin:0 auto;padding:24px 20px}
.back-link{color:var(--muted);font-size:.85rem;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;transition:.15s}
.back-link:hover{color:var(--pri)}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;font-size:1.3rem;color:var(--pri);margin:0 0 6px}
.page-meta{font-size:.82rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:600}
.badge-warn{background:#2d2400;color:var(--warn)}
.badge-blue{background:#0f2d3d;color:var(--pri)}
.badge-purple{background:#1a0d2d;color:#a855f7}
.badge-ok{background:#0d2d1a;color:var(--ok)}
.badge-muted{background:#1a2234;color:var(--muted)}
.badge-err{background:#2d0f0f;color:var(--err)}
.status-banner{border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:.9rem}
.status-banner.analysing{background:#2d2400;border:1px solid var(--warn)3d;color:var(--warn)}
.status-banner.questions_pending{background:#0f2d3d;border:1px solid var(--pri)3d;color:var(--pri)}
.status-banner.awaiting_approval{background:#1a0d2d;border:1px solid #a855f73d;color:#a855f7}
.status-banner.committed{background:#0d2d1a;border:1px solid var(--ok)3d;color:var(--ok)}
.status-banner.cancelled{background:#1a2234;border:1px solid var(--border);color:var(--muted)}
.status-banner.error{background:#2d0f0f;border:1px solid var(--err)3d;color:var(--err)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;font-size:.95rem;color:var(--text);margin:0 0 14px;display:flex;align-items:center;gap:8px}
.card-title span{font-size:.8rem;font-weight:400;color:var(--muted)}
.analysis-section{margin-bottom:14px}
.analysis-section h4{font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px}
.change-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:.83rem}
.change-item .sect{font-weight:600;color:var(--text);margin-bottom:4px}
.change-item .before{color:var(--err);font-size:.78rem}
.change-item .after{color:var(--ok);font-size:.78rem}
.change-item .note{color:var(--muted);font-size:.78rem}
.sig-major{color:var(--warn);font-size:.72rem;font-weight:700}
.sig-minor{color:var(--muted);font-size:.72rem}
.q-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.q-card .q-text{font-weight:600;font-size:.9rem;color:var(--text);margin-bottom:6px}
.q-card .q-context{font-size:.8rem;color:var(--muted);margin-bottom:12px;line-height:1.5}
.q-card .q-why{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:10px}
.options-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.opt-label{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:.15s;font-size:.83rem}
.opt-label:hover{border-color:var(--pri)3d}
.opt-label input{flex-shrink:0;margin-top:2px;accent-color:var(--pri)}
.opt-label.selected{border-color:var(--pri);background:#0f2d3d}
.free-text-area{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;padding:8px 10px;min-height:60px;resize:vertical;box-sizing:border-box;font-family:inherit;transition:.15s}
.free-text-area:focus{outline:none;border-color:var(--pri)}
.proposed-pane{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.proposed-pane{grid-template-columns:1fr}}
.doc-panel{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:0;display:flex;flex-direction:column;max-height:600px}
.doc-panel-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:600;color:var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.doc-panel-body{padding:14px;overflow-y:auto;flex:1;font-size:.83rem;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word}
.doc-panel-body[contenteditable=true]{outline:none;border:2px solid var(--pri);border-top:none;border-radius:0 0 10px 10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:.2s ease}
.btn-primary{background:var(--pri);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ok{background:#0d2d1a;color:var(--ok);border:1px solid var(--ok)3d}.btn-ok:hover{background:#0d3d1a}
.btn-danger{background:#2d0f0f;color:var(--err);border:1px solid var(--err)3d}.btn-danger:hover{background:#3d0f0f}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;align-items:center}
.audit-list{list-style:none;margin:0;padding:0}
.audit-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.audit-item:last-child{border-bottom:none}
.audit-dot{width:10px;height:10px;border-radius:50%;background:var(--pri);flex-shrink:0;margin-top:4px}
.audit-dot.ev-committed{background:var(--ok)}
.audit-dot.ev-cancelled{background:var(--muted)}
.audit-dot.ev-error{background:var(--err)}
.audit-time{font-size:.75rem;color:var(--muted);white-space:nowrap}
.audit-event{font-size:.83rem;color:var(--text);font-weight:600}
.audit-detail{font-size:.78rem;color:var(--muted);margin-top:2px}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.polling-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warn);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.warn-box{background:#2d2400;border:1px solid var(--warn)3d;border-radius:8px;padding:10px 12px;font-size:.82rem;color:var(--warn);margin-top:10px}
.ok-box{background:#0d2d1a;border:1px solid var(--ok)3d;border-radius:8px;padding:10px 12px;font-size:.82rem;color:var(--ok);margin-top:10px}
.conflict-item{border-left:3px solid var(--err);padding-left:10px}
.adopt-item{border-left:3px solid var(--ok);padding-left:10px}
.aligned-item{border-left:3px solid var(--muted);padding-left:10px}
</style>
</head>
<body>
<div class="page-wrap" id="page">
  <a href="/admin/documents/workspaces" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    All workspaces
  </a>
  <div id="loading" style="text-align:center;padding:80px"><div class="spinner" style="margin:0 auto;width:36px;height:36px;border-width:3px;border-top-color:var(--pri);border-color:var(--border)"></div></div>
  <div id="content" style="display:none"></div>
</div>

<script>
const wsId = location.pathname.split('/').pop();
let ws = null;
let pollTimer = null;
let editMode = false;
let editedMd = '';

const STATUS_INFO = {
  analysing:          { label: 'Analysing documents with AI…',                  cls: 'analysing',         icon: '🔍', poll: true },
  questions_pending:  { label: 'AI has clarifying questions for you.',           cls: 'questions_pending', icon: '❓', poll: false },
  awaiting_approval:  { label: 'Proposed document ready — please review.',       cls: 'awaiting_approval', icon: '📝', poll: false },
  committed:          { label: 'Document committed to the library.',             cls: 'committed',         icon: '✅', poll: false },
  cancelled:          { label: 'This workspace has been cancelled.',             cls: 'cancelled',         icon: '🚫', poll: false },
  error:              { label: 'Analysis encountered an error.',                 cls: 'error',             icon: '⚠️', poll: false },
};

const EVENT_LABELS = {
  created:         'Workspace created',
  analysed:        'AI analysis complete',
  questions_asked: 'Clarifying questions generated',
  answered:        'Manager submitted answers',
  proposed:        'Proposed document generated',
  edited:          'Proposed document edited',
  committed:       'Document committed to library',
  cancelled:       'Workspace cancelled',
};

function timeAgo(iso) {
  const d = new Date(iso), now = Date.now(), diff = now - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── Render analysis pane (update mode) ────────────────────────────────────────
function renderUpdateAnalysis(a) {
  if (!a || a.parse_error) return `<p style="color:var(--muted);font-size:.85rem">${a?.raw || 'Analysis not yet available.'}</p>`;
  let html = '';

  if (a.added?.length) {
    html += `<div class="analysis-section"><h4>+ Added sections (${a.added.length})</h4>`;
    a.added.forEach(s => html += `<div class="change-item"><div class="sect">${esc(s.section)}</div><div class="after">${esc(s.content?.slice(0,200))}${s.content?.length>200?'…':''}</div></div>`);
    html += '</div>';
  }
  if (a.removed?.length) {
    html += `<div class="analysis-section"><h4>− Removed sections (${a.removed.length})</h4>`;
    a.removed.forEach(s => html += `<div class="change-item"><div class="sect">${esc(s.section)}</div><div class="before">${esc(s.content?.slice(0,200))}${s.content?.length>200?'…':''}</div></div>`);
    html += '</div>';
  }
  if (a.changed?.length) {
    html += `<div class="analysis-section"><h4>↔ Changed sections (${a.changed.length})</h4>`;
    a.changed.forEach(s => html += `<div class="change-item"><div class="sect">${esc(s.section)} <span class="${s.significance==='major'?'sig-major':'sig-minor'}">${s.significance}</span></div><div class="before">Before: ${esc(s.before?.slice(0,150))}…</div><div class="after">After: ${esc(s.after?.slice(0,150))}…</div></div>`);
    html += '</div>';
  }
  if (a.unchanged_count != null) {
    html += `<p style="font-size:.8rem;color:var(--muted);margin-top:8px">${a.unchanged_count} section(s) unchanged.</p>`;
  }
  return html || '<p style="color:var(--muted);font-size:.85rem">No structural changes detected.</p>';
}

// ── Render analysis pane (merge mode) ─────────────────────────────────────────
function renderMergeAnalysis(a) {
  if (!a || a.parse_error) return `<p style="color:var(--muted);font-size:.85rem">${a?.raw || 'Analysis not yet available.'}</p>`;
  let html = '';
  if (a.conflicts?.length) {
    html += `<div class="analysis-section"><h4 style="color:var(--err)">⚠ Conflicts requiring your decision (${a.conflicts.length})</h4>`;
    a.conflicts.forEach(c => html += `<div class="change-item conflict-item"><div class="sect">${esc(c.section)}</div><div class="before">LADN: ${esc(c.ladn_version?.slice(0,150))}</div><div class="after">EYA: ${esc(c.eya_version?.slice(0,150))}</div><div class="note">Recommendation: ${esc(c.recommendation)}</div></div>`);
    html += '</div>';
  }
  if (a.to_adopt?.length) {
    html += `<div class="analysis-section"><h4 style="color:var(--ok)">↑ EYA additions to consider adopting (${a.to_adopt.length})</h4>`;
    a.to_adopt.forEach(s => html += `<div class="change-item adopt-item"><div class="sect">${esc(s.section)}</div><div class="note">${esc(s.eya_content?.slice(0,200))}…</div></div>`);
    html += '</div>';
  }
  if (a.ladn_only?.length) {
    html += `<div class="analysis-section"><h4>→ LADN-only clauses (retained) (${a.ladn_only.length})</h4>`;
    a.ladn_only.forEach(s => html += `<div class="change-item"><div class="sect">${esc(s.section)}</div><div class="note">${esc(s.ladn_content?.slice(0,150))}</div></div>`);
    html += '</div>';
  }
  if (a.aligned?.length) {
    html += `<div class="analysis-section"><h4 style="color:var(--muted)">✓ Already aligned with EYA (${a.aligned.length})</h4>`;
    a.aligned.forEach(s => html += `<div class="change-item aligned-item"><div class="sect">${esc(s.section)}</div></div>`);
    html += '</div>';
  }
  return html || '<p style="color:var(--muted);font-size:.85rem">No reconciliation data yet.</p>';
}

// ── Render questions pane ─────────────────────────────────────────────────────
function renderQuestions(questions, answers) {
  if (!questions?.length) return '<p style="color:var(--muted)">No questions loaded.</p>';
  return questions.map((q, i) => {
    const saved = answers?.[q.id] || '';
    const opts  = q.suggested_options || [];
    let optHtml = '';
    opts.forEach(opt => {
      const checked = saved === opt ? 'checked' : '';
      optHtml += `<label class="opt-label ${saved===opt?'selected':''}">
        <input type="radio" name="q_${q.id}" value="${esc(opt)}" ${checked}> ${esc(opt)}
      </label>`;
    });
    return `<div class="q-card" id="qcard_${q.id}">
      <div class="q-text">Q${i+1}. ${esc(q.question)}</div>
      ${q.context ? `<div class="q-context">${esc(q.context)}</div>` : ''}
      ${q.why_we_need_to_know ? `<div class="q-why">Why we need to know: ${esc(q.why_we_need_to_know)}</div>` : ''}
      ${optHtml ? `<div class="options-grid">${optHtml}</div><p style="font-size:.75rem;color:var(--muted);margin:4px 0 6px">Or give a custom answer:</p>` : ''}
      <textarea class="free-text-area" id="qt_${q.id}" placeholder="Your answer…" rows="2">${esc(saved)}</textarea>
    </div>`;
  }).join('');
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const si = STATUS_INFO[ws.status] || { label: ws.status, cls: 'analysing', icon: '•', poll: false };
  const analysis = ws.ai_analysis || {};
  const questions = ws.ai_questions || [];
  const answers   = ws.user_answers || {};
  const proposed  = ws.proposed_output_md || '';

  // Top actions
  let actions = '';
  if (ws.status === 'awaiting_approval') {
    actions += `<button class="btn btn-ok" id="btn-commit">✓ Approve &amp; Commit</button>`;
  }
  if (!['committed','cancelled'].includes(ws.status)) {
    actions += `<button class="btn btn-danger btn-sm" id="btn-cancel">Cancel workspace</button>`;
  }
  if (proposed) {
    actions += `<a href="/api/documents/workspaces/${ws.id}/download" class="btn btn-ghost btn-sm">↓ Download .md</a>`;
    actions += `<a href="/api/documents/workspaces/${ws.id}/download?format=pdf" class="btn btn-ghost btn-sm">↓ PDF</a>`;
  }

  let html = `
    <div class="page-head">
      <div>
        <h1 class="page-title">${esc(ws.name)}</h1>
        <div class="page-meta">
          <span>${ws.doc_type}</span>
          <span>${ws.mode === 'merge' ? 'Merge mode' : 'Update mode'}</span>
          <span>${ws.created_by_name || 'unknown'}</span>
          <span>${timeAgo(ws.created_at)}</span>
        </div>
      </div>
      <div class="page-actions">${actions}</div>
    </div>

    <div class="status-banner ${si.cls}">
      ${si.icon}&nbsp; ${si.label}
      ${si.poll ? `&nbsp;<span class="polling-dot"></span>&nbsp;<span style="font-size:.75rem">Auto-refreshing…</span>` : ''}
    </div>`;

  // Analysis card
  html += `<div class="card">
    <p class="card-title">AI Analysis <span>${ws.mode === 'merge' ? 'Reconciliation summary' : 'Diff summary'}</span></p>
    ${ws.mode === 'merge' ? renderMergeAnalysis(analysis) : renderUpdateAnalysis(analysis)}
  </div>`;

  // Questions card
  if (['questions_pending','awaiting_approval','committed'].includes(ws.status) && questions.length) {
    html += `<div class="card">
      <p class="card-title">Clarifying Questions <span>${questions.length} question${questions.length!==1?'s':''}</span></p>
      <div id="q-list">${renderQuestions(questions, answers)}</div>
      ${ws.status === 'questions_pending' ? `
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-submit-answers">Submit answers &amp; generate document</button>
        <span id="answers-msg" style="font-size:.82rem;color:var(--muted)"></span>
      </div>` : `<p style="font-size:.8rem;color:var(--muted);margin-top:8px">Answers submitted.</p>`}
    </div>`;
  }

  // Proposed output card
  if (['awaiting_approval','committed'].includes(ws.status) && proposed) {
    html += `<div class="card">
      <p class="card-title">Proposed Document <span>${ws.status === 'committed' ? 'Committed version' : 'Pending approval'}</span></p>
      <div class="proposed-pane">
        <div class="doc-panel">
          <div class="doc-panel-head">Base document</div>
          <div class="doc-panel-body">${esc(ws.base_content_md || '(base not stored)')}</div>
        </div>
        <div class="doc-panel">
          <div class="doc-panel-head" id="proposed-panel-head">
            Proposed revision
            ${ws.status === 'awaiting_approval' ? `<button class="btn btn-ghost btn-sm" id="btn-edit-toggle">${editMode?'Cancel edit':'Edit'}</button>` : ''}
          </div>
          <div class="doc-panel-body ${editMode?'':'proposed-static'}" id="proposed-body"
            ${editMode ? `contenteditable="true"` : ''}>${esc(proposed)}</div>
        </div>
      </div>
      ${ws.status === 'awaiting_approval' && editMode ? `
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-save-edit">Save edits</button>
        <span id="edit-msg" style="font-size:.82rem;color:var(--muted)"></span>
      </div>` : ''}
    </div>`;
  } else if (ws.status === 'analysing' && questions.length === 0) {
    html += `<div class="card"><p class="card-title">Proposed Document</p><p style="color:var(--muted);font-size:.85rem">Will appear here once AI generates it (after questions are answered).</p></div>`;
  }

  // Audit timeline
  if (ws.audit?.length) {
    html += `<div class="card">
      <p class="card-title">Audit Timeline</p>
      <ul class="audit-list">
        ${ws.audit.map(ev => `<li class="audit-item">
          <div class="audit-dot ev-${ev.event}"></div>
          <div style="flex:1;min-width:0">
            <div class="audit-event">${EVENT_LABELS[ev.event] || ev.event}</div>
            ${ev.detail && Object.keys(ev.detail).length ? `<div class="audit-detail">${esc(JSON.stringify(ev.detail))}</div>` : ''}
          </div>
          <div class="audit-time">${timeAgo(ev.event_at)}</div>
        </li>`).join('')}
      </ul>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  wireEvents();
  if (si.poll) startPolling();
  else stopPolling();
}

function wireEvents() {
  // Question option radio → populate textarea
  document.querySelectorAll('.options-grid input[type=radio]').forEach(radio => {
    radio.addEventListener('change', function() {
      const qid = this.name.replace('q_','');
      const ta = document.getElementById(`qt_${qid}`);
      if (ta) ta.value = this.value;
      this.closest('.options-grid').querySelectorAll('.opt-label').forEach(l => l.classList.toggle('selected', l.querySelector('input') === this));
    });
  });

  // Submit answers
  const btnAnswers = document.getElementById('btn-submit-answers');
  if (btnAnswers) btnAnswers.addEventListener('click', submitAnswers);

  // Commit
  const btnCommit = document.getElementById('btn-commit');
  if (btnCommit) btnCommit.addEventListener('click', commitWorkspace);

  // Cancel
  const btnCancel = document.getElementById('btn-cancel');
  if (btnCancel) btnCancel.addEventListener('click', cancelWorkspace);

  // Edit toggle
  const btnEdit = document.getElementById('btn-edit-toggle');
  if (btnEdit) btnEdit.addEventListener('click', () => { editMode = !editMode; render(); });

  // Save edits
  const btnSave = document.getElementById('btn-save-edit');
  if (btnSave) btnSave.addEventListener('click', saveEdits);
}

// ── Submit answers ────────────────────────────────────────────────────────────
async function submitAnswers() {
  const questions = ws.ai_questions || [];
  const answers = {};
  let missing = [];

  questions.forEach(q => {
    const val = (document.getElementById(`qt_${q.id}`) || {}).value?.trim() || '';
    answers[q.id] = val;
    if (!val) missing.push(`Q: ${q.question.slice(0,60)}…`);
  });

  if (missing.length) {
    const msg = document.getElementById('answers-msg');
    if (msg) msg.textContent = `Please answer all questions (${missing.length} remaining).`;
    return;
  }

  const btn = document.getElementById('btn-submit-answers');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';

  try {
    const r = await fetch(`/api/documents/workspaces/${wsId}/answers`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Submit failed');
    await loadAndRender();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Submit answers & generate document';
    const msg = document.getElementById('answers-msg');
    if (msg) { msg.textContent = err.message; msg.style.color = 'var(--err)'; }
  }
}

// ── Save edits ────────────────────────────────────────────────────────────────
async function saveEdits() {
  const body = document.getElementById('proposed-body');
  if (!body) return;
  const md = body.innerText || body.textContent || '';
  const btn = document.getElementById('btn-save-edit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  try {
    const r = await fetch(`/api/documents/workspaces/${wsId}/edit-proposed`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ proposed_output_md: md }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Save failed');
    editMode = false;
    await loadAndRender();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save edits';
    const msg = document.getElementById('edit-msg');
    if (msg) { msg.textContent = err.message; msg.style.color = 'var(--err)'; }
  }
}

// ── Commit workspace ─────────────────────────────────────────────────────────
async function commitWorkspace() {
  if (!confirm(`Commit "${ws.name}" to the document library? This cannot be undone.`)) return;
  const btn = document.getElementById('btn-commit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Committing…';

  try {
    const r = await fetch(`/api/documents/workspaces/${wsId}/commit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Commit failed');

    if (data.warnings?.length) {
      alert('Warning: ' + data.warnings.join('\n'));
    }
    await loadAndRender();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '✓ Approve & Commit';
    alert('Commit failed: ' + err.message);
  }
}

// ── Cancel workspace ──────────────────────────────────────────────────────────
async function cancelWorkspace() {
  if (!confirm('Cancel this workspace? The source files will be kept for 90 days.')) return;
  try {
    await fetch(`/api/documents/workspaces/${wsId}/cancel`, { method: 'POST' });
    await loadAndRender();
  } catch (err) {
    alert('Cancel failed: ' + err.message);
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch(`/api/documents/workspaces/${wsId}`);
      if (!r.ok) return;
      const data = await r.json();
      if (data.status !== ws.status) {
        ws = data;
        render();
      }
    } catch {}
  }, 4000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function loadAndRender() {
  const r = await fetch(`/api/documents/workspaces/${wsId}`);
  if (!r.ok) throw new Error('Failed to load workspace');
  ws = await r.json();
  render();
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('wren:ready', async () => {
  try {
    await loadAndRender();
  } catch (e) {
    document.getElementById('loading').innerHTML = `<p style="color:var(--err);text-align:center">${e.message}</p>`;
  }
});
window.addEventListener('beforeunload', stopPolling);
</script>
</body>
</html>
