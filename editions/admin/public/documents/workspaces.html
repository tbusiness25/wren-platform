<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="admin">
<title>Document Workspaces — Wren Admin</title>
<link rel="stylesheet" href="/css/wren.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
:root{--pri:#4a9abf;--acc:#e07820;--bg:#0f172a;--card:#1e293b;--border:#2d3748;--text:#f1f5f9;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
body{background:var(--bg);color:var(--text);font-family:system-ui,Arial,sans-serif;margin:0}
.page-wrap{max-width:1100px;margin:0 auto;padding:28px 20px}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;font-size:1.4rem;color:var(--pri);margin:0}
.page-sub{color:var(--muted);font-size:.85rem;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:12px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:.2s ease}
.btn-primary{background:var(--pri);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:.15s}
.pill.active{background:var(--pri);border-color:var(--pri);color:#fff}
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ws-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:.15s;border-left:4px solid transparent;text-decoration:none;display:block;color:inherit}
.ws-card:hover{border-color:var(--pri);transform:translateY(-1px)}
.ws-card.status-analysing{border-left-color:var(--warn)}
.ws-card.status-questions_pending{border-left-color:var(--pri)}
.ws-card.status-awaiting_approval{border-left-color:#a855f7}
.ws-card.status-committed{border-left-color:var(--ok)}
.ws-card.status-cancelled{border-left-color:var(--muted);opacity:.6}
.ws-card.status-error{border-left-color:var(--err)}
.ws-name{font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;font-size:1rem;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:.78rem;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:.72rem;font-weight:600}
.badge-warn{background:#2d2400;color:var(--warn)}
.badge-blue{background:#0f2d3d;color:var(--pri)}
.badge-purple{background:#1a0d2d;color:#a855f7}
.badge-ok{background:#0d2d1a;color:var(--ok)}
.badge-muted{background:#1a2234;color:var(--muted)}
.badge-err{background:#2d0f0f;color:var(--err)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{opacity:.3;margin-bottom:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-head">
    <div>
      <h1 class="page-title">Document Workspaces</h1>
      <p class="page-sub">AI-assisted policy, handbook & procedure maintenance</p>
    </div>
    <a href="/admin/documents/workspaces/new" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Workspace
    </a>
  </div>

  <div class="filter-row" id="filters">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="analysing">Analysing</button>
    <button class="pill" data-filter="questions_pending">Questions</button>
    <button class="pill" data-filter="awaiting_approval">Awaiting Approval</button>
    <button class="pill" data-filter="committed">Committed</button>
    <button class="pill" data-filter="cancelled">Cancelled</button>
  </div>

  <div id="ws-container"><div class="spinner"></div></div>
</div>

<script>
const STATUS_LABELS = {
  analysing:          { label: 'Analysing…',       cls: 'badge-warn' },
  questions_pending:  { label: 'Questions Ready',  cls: 'badge-blue' },
  awaiting_approval:  { label: 'Awaiting Approval',cls: 'badge-purple' },
  committed:          { label: 'Committed',         cls: 'badge-ok' },
  cancelled:          { label: 'Cancelled',         cls: 'badge-muted' },
  error:              { label: 'Error',             cls: 'badge-err' },
};

const MODE_LABELS = { update: 'Update', merge: 'Merge' };

let allWorkspaces = [];
let activeFilter  = 'all';

function timeAgo(iso) {
  const d = new Date(iso), now = Date.now(), diff = now - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return Math.floor(diff/86400000) + 'd ago';
}

function renderCard(ws) {
  const s = STATUS_LABELS[ws.status] || { label: ws.status, cls: 'badge-muted' };
  return `<a class="ws-card status-${ws.status}" href="/admin/documents/workspaces/${ws.id}">
    <div class="ws-name">${ws.name}</div>
    <div class="ws-meta">
      <span class="badge ${s.cls}">${s.label}</span>
      <span>${ws.doc_type}</span>
      <span>${MODE_LABELS[ws.mode] || ws.mode}</span>
      <span>${timeAgo(ws.updated_at)}</span>
    </div>
  </a>`;
}

function render() {
  const filtered = activeFilter === 'all' ? allWorkspaces : allWorkspaces.filter(w => w.status === activeFilter);
  const el = document.getElementById('ws-container');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No workspaces found</p></div>`;
    return;
  }
  el.innerHTML = `<div class="ws-grid">${filtered.map(renderCard).join('')}</div>`;
}

async function load() {
  try {
    const r = await fetch('/api/documents/workspaces');
    if (!r.ok) throw new Error('Failed to load');
    allWorkspaces = await r.json();
    render();
  } catch (e) {
    document.getElementById('ws-container').innerHTML = `<div class="empty"><p style="color:var(--err)">${e.message}</p></div>`;
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === activeFilter));
  render();
});

document.addEventListener('wren:ready', load);
</script>
</body>
</html>
