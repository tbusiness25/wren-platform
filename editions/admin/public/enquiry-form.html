<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Enquiry Form — Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .ef-field{border:1px solid #2d3748;border-radius:10px;padding:14px;margin-bottom:10px;background:#0f172a}
    .ef-field.disabled{opacity:.55}
    .ef-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .ef-title{font-weight:700;color:#f1f5f9}
    .ef-key{font-size:.72rem;color:#64748b;font-family:monospace}
    .ef-badge{font-size:.68rem;padding:2px 8px;border-radius:999px;background:#1e293b;color:#94a3b8}
    .ef-badge.core{background:#1e3a5f;color:#7dd3fc}
    .ef-badge.req{background:#3f2d1e;color:#fbbf24}
    .ef-ctrls{margin-left:auto;display:flex;gap:6px;align-items:center}
    .ef-toggle{display:flex;align-items:center;gap:5px;font-size:.78rem;color:#cbd5e1;cursor:pointer}
    .ef-edit{margin-top:10px;display:none;border-top:1px solid #2d3748;padding-top:10px}
    .ef-edit.open{display:block}
    .ef-edit label{display:block;font-size:.75rem;color:#94a3b8;margin:6px 0 3px}
    .ef-edit input,.ef-edit select,.ef-edit textarea{width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:7px 9px;font-size:.85rem}
    .btn-xs{font-size:.75rem;padding:4px 10px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#cbd5e1;cursor:pointer}
    .btn-xs:hover{background:#334155}
    .btn-danger{border-color:#7f1d1d;color:#fca5a5}
    .previewbox{background:#0f172a;border:1px dashed #334155;border-radius:10px;padding:16px;margin-top:10px}
    .previewbox label{display:block;font-size:.8rem;color:#cbd5e1;margin:8px 0 4px}
    .previewbox .req::after{content:" *";color:#fbbf24}
    .previewbox input,.previewbox select,.previewbox textarea{width:100%;max-width:420px;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:7px}
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="page-title">Enquiry Form</h1>
      <div class="page-subtitle">The fields parents see on the website enquiry form. Changes go live immediately.</div>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">➕ Add field</button>
  </div>

  <div class="wren-tabs" style="margin-bottom:14px">
    <div class="wren-tab active" data-t="edit" onclick="switchT('edit')">Fields</div>
    <div class="wren-tab" data-t="preview" onclick="switchT('preview')">Preview</div>
  </div>

  <div id="t-edit">
    <div id="field-list"><div style="color:#94a3b8">Loading…</div></div>
  </div>

  <div id="t-preview" style="display:none">
    <div class="previewbox" id="preview-host"><div style="color:#94a3b8">Loading preview…</div></div>
  </div>
</div>

<!-- Add-field modal -->
<div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeAdd()">
  <div class="card" style="max-width:480px;width:100%">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-weight:700;color:#f1f5f9">Add a field</div>
      <button class="btn-xs" onclick="closeAdd()">✕</button>
    </div>
    <label style="display:block;color:#94a3b8;font-size:.78rem;margin-bottom:3px">Label (what parents see)</label>
    <input id="add-label" class="ef-input" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:8px;margin-bottom:8px" placeholder="e.g. Does your child have any allergies?">
    <label style="display:block;color:#94a3b8;font-size:.78rem;margin-bottom:3px">Type</label>
    <select id="add-type" onchange="document.getElementById('add-opts-wrap').style.display=['select','multiselect'].includes(this.value)?'block':'none'" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:8px;margin-bottom:8px">
      <option value="text">Short text</option>
      <option value="textarea">Long text</option>
      <option value="email">Email</option>
      <option value="tel">Phone</option>
      <option value="date">Date</option>
      <option value="select">Dropdown (choose one)</option>
      <option value="multiselect">Checkboxes (choose many)</option>
      <option value="checkbox">Single yes/no</option>
    </select>
    <div id="add-opts-wrap" style="display:none">
      <label style="display:block;color:#94a3b8;font-size:.78rem;margin-bottom:3px">Options (one per line)</label>
      <textarea id="add-opts" rows="4" style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#f1f5f9;padding:8px;margin-bottom:8px" placeholder="Yes&#10;No"></textarea>
    </div>
    <label style="display:flex;align-items:center;gap:8px;color:#cbd5e1;font-size:.85rem;margin-bottom:12px"><input type="checkbox" id="add-req" style="width:auto"> Required</label>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn-xs" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAdd()">Add field</button>
    </div>
  </div>
</div>

<script>
let FIELDS = [];
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const TYPE_LABEL = {text:'Short text',textarea:'Long text',email:'Email',tel:'Phone',date:'Date',select:'Dropdown',multiselect:'Checkboxes',checkbox:'Yes/No'};

function switchT(t){
  document.querySelectorAll('.wren-tab').forEach(x=>x.classList.toggle('active',x.dataset.t===t));
  document.getElementById('t-edit').style.display = t==='edit'?'':'none';
  document.getElementById('t-preview').style.display = t==='preview'?'':'none';
  if(t==='preview') renderPreview();
}

async function load(){
  try{
    const d = await Wren.api('/api/enquiry-form');
    FIELDS = d.fields||[];
    render();
  }catch(e){ document.getElementById('field-list').innerHTML='<div style="color:#ef4444">Could not load fields.</div>'; }
}

function render(){
  const host = document.getElementById('field-list');
  host.innerHTML = FIELDS.map((f,i)=>`
    <div class="ef-field ${f.enabled?'':'disabled'}" data-id="${f.id}">
      <div class="ef-top">
        <span class="ef-title">${esc(f.label)}</span>
        <span class="ef-badge">${TYPE_LABEL[f.field_type]||f.field_type}</span>
        ${f.is_core?'<span class="ef-badge core">core</span>':''}
        ${f.required?'<span class="ef-badge req">required</span>':''}
        <span class="ef-key">${esc(f.field_key)}</span>
        <span class="ef-ctrls">
          <button class="btn-xs" onclick="move(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button class="btn-xs" onclick="move(${i},1)" ${i===FIELDS.length-1?'disabled':''}>↓</button>
          <label class="ef-toggle"><input type="checkbox" ${f.enabled?'checked':''} onchange="patch(${f.id},{enabled:this.checked})"> On</label>
          <label class="ef-toggle"><input type="checkbox" ${f.required?'checked':''} onchange="patch(${f.id},{required:this.checked})"> Req</label>
          <button class="btn-xs" onclick="toggleEdit(${f.id})">Edit</button>
          ${f.is_core?'':`<button class="btn-xs btn-danger" onclick="del(${f.id})">Delete</button>`}
        </span>
      </div>
      <div class="ef-edit" id="edit-${f.id}">
        <label>Label</label><input id="lbl-${f.id}" value="${esc(f.label)}">
        <label>Help text (shown under the field)</label><input id="help-${f.id}" value="${esc(f.help_text||'')}">
        ${['select','multiselect'].includes(f.field_type)?`<label>Options (one per line)</label><textarea id="opt-${f.id}" rows="4">${esc((f.options||[]).join('\\n'))}</textarea>`:''}
        <div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="saveEdit(${f.id})">Save</button><button class="btn-xs" onclick="toggleEdit(${f.id})">Close</button></div>
      </div>
    </div>`).join('');
}

function toggleEdit(id){ document.getElementById('edit-'+id).classList.toggle('open'); }

async function patch(id, body){
  try{ await Wren.api('/api/enquiry-form/'+id,{method:'PUT',body}); const f=FIELDS.find(x=>x.id===id); if(f)Object.assign(f,body); render(); }
  catch(e){ Wren.toast&&Wren.toast('Save failed','error'); }
}

async function saveEdit(id){
  const body = { label: document.getElementById('lbl-'+id).value.trim(), help_text: document.getElementById('help-'+id).value.trim() };
  const opt = document.getElementById('opt-'+id);
  if(opt) body.options = opt.value.split('\\n').map(s=>s.trim()).filter(Boolean);
  await patch(id, body);
  Wren.toast&&Wren.toast('Saved','success');
}

async function move(i, dir){
  const j=i+dir; if(j<0||j>=FIELDS.length) return;
  [FIELDS[i],FIELDS[j]]=[FIELDS[j],FIELDS[i]];
  render();
  try{ await Wren.api('/api/enquiry-form/reorder',{method:'PUT',body:{order:FIELDS.map(f=>f.id)}}); }
  catch(e){ Wren.toast&&Wren.toast('Reorder failed','error'); load(); }
}

async function del(id){
  if(!confirm('Delete this field? Parents will no longer be asked it.')) return;
  try{ await Wren.api('/api/enquiry-form/'+id,{method:'DELETE'}); FIELDS=FIELDS.filter(f=>f.id!==id); render(); Wren.toast&&Wren.toast('Deleted','success'); }
  catch(e){ Wren.toast&&Wren.toast((e&&e.error)||'Delete failed','error'); }
}

function openAdd(){ document.getElementById('add-modal').style.display='flex'; }
function closeAdd(){ document.getElementById('add-modal').style.display='none'; document.getElementById('add-label').value=''; document.getElementById('add-opts').value=''; document.getElementById('add-req').checked=false; }
async function saveAdd(){
  const label=document.getElementById('add-label').value.trim();
  if(!label){ Wren.toast&&Wren.toast('Give the field a label','warning'); return; }
  const type=document.getElementById('add-type').value;
  const body={ label, field_type:type, required:document.getElementById('add-req').checked };
  if(['select','multiselect'].includes(type)) body.options=document.getElementById('add-opts').value.split('\\n').map(s=>s.trim()).filter(Boolean);
  try{ await Wren.api('/api/enquiry-form',{method:'POST',body}); closeAdd(); load(); Wren.toast&&Wren.toast('Field added','success'); }
  catch(e){ Wren.toast&&Wren.toast('Could not add field','error'); }
}

function renderPreview(){
  const on = FIELDS.filter(f=>f.enabled);
  document.getElementById('preview-host').innerHTML = on.length ? on.map(f=>{
    const lab=`<label class="${f.required?'req':''}">${esc(f.label)}</label>`;
    const help=f.help_text?`<div style="font-size:.75rem;color:#64748b;margin-bottom:4px">${esc(f.help_text)}</div>`:'';
    let c='';
    if(f.field_type==='textarea') c='<textarea rows="2" disabled></textarea>';
    else if(f.field_type==='select') c=`<select disabled><option>— choose —</option>${(f.options||[]).map(o=>`<option>${esc(o)}</option>`).join('')}</select>`;
    else if(f.field_type==='multiselect') c=(f.options||[]).map(o=>`<label style="display:inline-flex;gap:5px;margin-right:12px;color:#cbd5e1"><input type="checkbox" disabled style="width:auto"> ${esc(o)}</label>`).join('');
    else if(f.field_type==='checkbox') c=`<label style="color:#cbd5e1"><input type="checkbox" disabled style="width:auto"> ${esc(f.placeholder||'Yes')}</label>`;
    else c=`<input type="${['email','tel','date'].includes(f.field_type)?f.field_type:'text'}" disabled>`;
    return lab+help+c;
  }).join('') : '<div style="color:#94a3b8">All fields are turned off.</div>';
}

document.addEventListener('wren:ready', load);
</script>
</body>
</html>
