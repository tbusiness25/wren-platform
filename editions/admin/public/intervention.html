<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Intervention Toolkit — Wren Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">🧠 Intervention Toolkit</div>
      <div class="page-subtitle">AI-assisted EYFS intervention planning</div>
    </div>
    <button class="btn btn-primary" id="btn-new-plan">+ New Plan</button>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:8px;margin-bottom:20px">
    <button class="btn btn-ghost" id="tab-active" style="background:rgba(74,154,191,0.15);border-color:#4a9abf;color:#4a9abf">Active Plans</button>
    <button class="btn btn-ghost" id="tab-all">All Plans</button>
    <button class="btn btn-ghost" id="tab-generate">Generate New</button>
  </div>

  <div id="plans-area"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<!-- Generate Panel (full-screen overlay within content) -->
<div id="generate-panel" style="display:none;position:fixed;inset:0;z-index:200;background:var(--c-bg,#0f172a);overflow-y:auto;padding:20px">
  <div style="max-width:720px;margin:0 auto;padding-bottom:80px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <button class="btn btn-ghost btn-sm" id="btn-back-from-generate">← Back</button>
      <div class="page-title" style="margin:0">Generate Intervention Plan</div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="responsive-grid">
        <div class="form-group">
          <label class="form-label">Child <span style="color:var(--c-red)">*</span></label>
          <select class="form-control" id="itt-child">
            <option value="">Select child...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Area of concern <span style="color:var(--c-red)">*</span></label>
          <select class="form-control" id="itt-concern">
            <option value="">Select concern...</option>
            <optgroup label="Communication &amp; Language">
              <option>Late talker / limited vocabulary</option>
              <option>Unclear speech / pronunciation</option>
              <option>Difficulty following instructions</option>
              <option>English as additional language (EAL) support</option>
            </optgroup>
            <optgroup label="Social &amp; Emotional">
              <option>Separation anxiety</option>
              <option>Difficulty managing emotions</option>
              <option>Biting or physical aggression</option>
              <option>Limited social interaction / play alone</option>
              <option>Low confidence / self-esteem</option>
            </optgroup>
            <optgroup label="Physical Development">
              <option>Delayed fine motor skills</option>
              <option>Delayed gross motor skills</option>
              <option>Toileting difficulties</option>
              <option>Sensory sensitivities</option>
            </optgroup>
            <optgroup label="Cognition &amp; Learning">
              <option>Difficulty concentrating / attention</option>
              <option>Delayed literacy / mark making interest</option>
              <option>Delayed numeracy / maths concepts</option>
              <option>Transition difficulties</option>
            </optgroup>
            <optgroup label="Other">
              <option>General developmental delay</option>
              <option>Safeguarding / attachment concern</option>
              <option>Medical / health support need</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Practitioner's observations (optional)</label>
        <textarea class="form-control" id="itt-context" rows="4"
          placeholder="Describe what you've observed… tap 🎙️ to dictate"></textarea>
      </div>
      <button class="btn btn-primary" id="generate-btn" style="width:100%">Generate Intervention Plan</button>
    </div>

    <!-- Streaming output -->
    <div id="itt-loading" style="display:none" class="card">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;flex-shrink:0"></div>
        <div style="color:var(--c-muted);font-size:14px">Generating EYFS intervention plan…</div>
      </div>
    </div>

    <div id="itt-result" style="display:none" class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-weight:700;font-size:16px">Intervention Plan</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" id="btn-copy-plan">📋 Copy</button>
          <button class="btn btn-primary btn-sm" id="btn-save-plan">💾 Save Plan</button>
        </div>
      </div>
      <div id="itt-plan-text" style="white-space:pre-wrap;line-height:1.7;font-size:14px"></div>
      <div style="margin-top:16px;border-top:1px solid var(--c-border);padding-top:14px">
        <label class="form-label">Next review date</label>
        <input type="date" class="form-control" id="itt-review-date" style="max-width:200px">
      </div>
    </div>
  </div>
</div>

<style>
@media(max-width:500px){.responsive-grid{grid-template-columns:1fr!important}}
</style>

<script>
let children = [];
let plans = [];
let currentPlanText = '';
let currentTab = 'active';

async function init() {
  children = await Wren.api('/api/children').catch(() => []);
  const sel = document.getElementById('itt-child');
  children.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.dataset.name = `${c.first_name} ${c.last_name}`;
    opt.dataset.age = c.age_months || 0;
    opt.textContent = `${c.first_name} ${c.last_name}`;
    sel.appendChild(opt);
  });
  // Attach voice to context textarea
  setTimeout(() => {
    const ta = document.getElementById('itt-context');
    if (ta && window.WrenVoice) WrenVoice.attachTo(ta, { context: 'intervention' });
  }, 200);
  loadPlans();
}

async function loadPlans() {
  try {
    const status = currentTab === 'active' ? 'active' : null;
    const url = status ? `/api/interventions?status=${status}` : '/api/interventions';
    plans = await Wren.api(url);
    renderPlans(plans);
  } catch(e) {
    document.getElementById('plans-area').innerHTML = '<div class="alert alert-danger">Failed to load</div>';
  }
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-active').style.cssText = tab === 'active'
    ? 'background:rgba(74,154,191,0.15);border-color:#4a9abf;color:#4a9abf' : '';
  document.getElementById('tab-all').style.cssText = tab === 'all'
    ? 'background:rgba(74,154,191,0.15);border-color:#4a9abf;color:#4a9abf' : '';
  loadPlans();
}

function renderPlans(plans) {
  const area = document.getElementById('plans-area');
  if (!plans.length) {
    area.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🧠</div>
      <div class="empty-title">No intervention plans yet</div>
      <div class="empty-body">Click <strong>Generate New</strong> to create an AI-assisted plan</div>
    </div>`;
    return;
  }
  const statusColors = { active: '#4a9abf', succeeded: '#22c55e', escalated: '#f59e0b', abandoned: '#ef4444' };
  area.innerHTML = `<div style="display:grid;gap:10px">` +
    plans.map(p => `
      <div class="card" style="cursor:pointer" data-action="view" data-id="${p.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1">
            <div style="font-weight:700">${p.child_name}</div>
            <div style="color:var(--c-muted);font-size:13px;margin-top:2px">${p.concern}</div>
            <div style="color:var(--c-muted);font-size:12px;margin-top:4px">
              By ${p.created_by_name || 'Unknown'} · ${new Date(p.created_at).toLocaleDateString('en-GB')}
              ${p.next_review_date ? ` · Review: ${new Date(p.next_review_date).toLocaleDateString('en-GB')}` : ''}
            </div>
          </div>
          <span style="padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${statusColors[p.status]}22;color:${statusColors[p.status]};border:1px solid ${statusColors[p.status]}44;white-space:nowrap">${p.status}</span>
        </div>
      </div>`
    ).join('') + `</div>`;
}

function openNewForm() {
  document.getElementById('generate-panel').style.display = '';
  document.getElementById('itt-result').style.display = 'none';
  document.getElementById('itt-loading').style.display = 'none';
  document.getElementById('generate-btn').disabled = false;
}

function closeGeneratePanel() {
  document.getElementById('generate-panel').style.display = 'none';
}

async function generatePlan() {
  const childSel = document.getElementById('itt-child');
  const concern = document.getElementById('itt-concern').value;
  if (!childSel.value || !concern) {
    Wren.toast('Please select a child and concern', 'warning');
    return;
  }
  const childOpt = childSel.selectedOptions[0];
  const childName = childOpt.dataset.name;
  const ageMonths = parseInt(childOpt.dataset.age) || 0;
  const additionalContext = document.getElementById('itt-context').value.trim();

  document.getElementById('itt-loading').style.display = '';
  document.getElementById('itt-result').style.display = 'none';
  document.getElementById('generate-btn').disabled = true;

  currentPlanText = '';
  const planEl = document.getElementById('itt-plan-text');
  planEl.textContent = '';

  try {
    const token = sessionStorage.getItem('wrenToken') || sessionStorage.getItem('wren_jwt') || '';
    const resp = await fetch('/api/interventions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ child_id: parseInt(childSel.value), child_name: childName, age_months: ageMonths, concern, additional_context: additionalContext }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    document.getElementById('itt-loading').style.display = 'none';
    document.getElementById('itt-result').style.display = '';

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const json = JSON.parse(line.slice(6));
          if (json.content) {
            currentPlanText += json.content;
            planEl.textContent = currentPlanText;
          }
        } catch {}
      }
    }

    // Set review date 6 weeks from now
    const sixWeeks = new Date(Date.now() + 42 * 86400000).toISOString().slice(0, 10);
    document.getElementById('itt-review-date').value = sixWeeks;

    document.getElementById('generate-btn').disabled = false;
  } catch(e) {
    document.getElementById('itt-loading').style.display = 'none';
    document.getElementById('generate-btn').disabled = false;
    Wren.toast('Generation failed: ' + e.message, 'error');
  }
}

async function savePlan() {
  const childSel = document.getElementById('itt-child');
  const concern = document.getElementById('itt-concern').value;
  const reviewDate = document.getElementById('itt-review-date').value;
  try {
    await Wren.api('/api/interventions', { method: 'POST', body: {
      child_id: parseInt(childSel.value),
      concern,
      plan: { text: currentPlanText },
      next_review_date: reviewDate || null,
    }});
    Wren.toast('Plan saved ✓', 'success');
    closeGeneratePanel();
    loadPlans();
  } catch(e) { Wren.toast('Save failed: ' + e.message, 'error'); }
}

async function viewPlan(id) {
  const plan = plans.find(p => p.id === id);
  if (!plan) return;
  const planText = plan.plan?.text || JSON.stringify(plan.plan, null, 2);
  const statusOptions = ['active','succeeded','escalated','abandoned']
    .map(s => `<option value="${s}" ${plan.status===s?'selected':''}>${s}</option>`).join('');
  Wren.modal(`Intervention Plan — ${plan.child_name}`, `
    <div style="margin-bottom:12px">
      <div style="font-weight:700;margin-bottom:4px">${plan.concern}</div>
      <div style="color:var(--c-muted);font-size:12px">Created ${new Date(plan.created_at).toLocaleDateString('en-GB')} · by ${plan.created_by_name || 'Unknown'}</div>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-control" id="plan-status">${statusOptions}</select>
    </div>
    <div style="background:var(--c-bg,#0f172a);border:1px solid var(--c-border);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-bottom:12px">${planText}</div>
    <div class="form-group">
      <label class="form-label">Add review note</label>
      <textarea class="form-control" id="plan-review-note" rows="3" placeholder="What happened at review? Any changes?"></textarea>
    </div>
  `, [
    { label: 'Save Review', class: 'btn-primary', close: false, action: async () => {
      const newStatus = document.getElementById('plan-status').value;
      const note = document.getElementById('plan-review-note').value.trim();
      try {
        await Wren.api(`/api/interventions/${id}`, { method: 'PUT', body: { status: newStatus } });
        if (note) {
          await Wren.api(`/api/interventions/${id}/review`, { method: 'POST', body: { notes: note, outcome: newStatus, next_review_weeks: 6 } });
        }
        Wren.toast('Updated ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
        loadPlans();
      } catch(e) { Wren.toast('Save failed', 'error'); }
    }},
    { label: 'Close', class: 'btn-ghost' }
  ]);
}

function copyPlan() {
  navigator.clipboard.writeText(currentPlanText).then(() => Wren.toast('Copied ✓', 'success'));
}

document.getElementById('btn-new-plan').addEventListener('click', openNewForm);
document.getElementById('tab-active').addEventListener('click', () => setTab('active'));
document.getElementById('tab-all').addEventListener('click', () => setTab('all'));
document.getElementById('tab-generate').addEventListener('click', openNewForm);
document.getElementById('btn-back-from-generate').addEventListener('click', closeGeneratePanel);
document.getElementById('generate-btn').addEventListener('click', generatePlan);
document.getElementById('btn-copy-plan').addEventListener('click', copyPlan);
document.getElementById('btn-save-plan').addEventListener('click', savePlan);
document.getElementById('plans-area').addEventListener('click', e => {
  const card = e.target.closest('[data-action="view"]');
  if (card) viewPlan(parseInt(card.dataset.id));
});

document.addEventListener('wren:ready', init);
</script>
<script src="/js/wren-voice.js"></script>
<script src="/js/wren-chat.js?v=2026070901"></script>
</body>
</html>
