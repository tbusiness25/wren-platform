<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>James Front Desk · Wren</title>
<link rel="stylesheet" href="/css/wren.css"><link rel="stylesheet" href="/css/wren-shell-v2.css">
</head>
<body data-portal="admin">
<div class="lp-wrap">
  <h1>James Front‑Desk Briefing</h1>
  <p style="font-size:1.1rem;">Hey team, here’s the latest front‑desk rundown. Below you’ll find the open items as cards you can act on.</p>
  <div id="items"></div>
</div>
<script src="/js/wren-core.js"></script>
<script src="/js/wren-shell-v2.js"></script>
<script>
(function(){
  'use strict';
  async function loadItems(){
    try {
      const data = await Wren.api('/api/james/items');
      const container = document.getElementById('items');
      container.innerHTML = '';
      data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'chk';
        card.innerHTML = `
          <div class="body">
            <div class="name">${item.title}</div>
            <div class="detail">${item.detail}</div>
            <div class="action">
              <button class="btn" onclick="setStatus(${item.id},'done')">[✓ Done]</button>
              <button class="btn" onclick="setStatus(${item.id},'snooze')">[💤 Next week]</button>
              <button class="btn" onclick="setStatus(${item.id},'ignore')">[🙈 Ignore]</button>
            </div>
          </div>`;
        container.appendChild(card);
      });
    } catch(e){
      console.error('Failed to load items', e);
    }
  }
  async function setStatus(id, status){
    try {
      await Wren.api(`/api/james/items/${id}/status`, {method:'POST', body:{status}});
      loadItems();
    } catch(e){ console.error('Status update failed', e); }
  }
  document.addEventListener('wren:ready', loadItems);
})();
</script>
</body></html>
