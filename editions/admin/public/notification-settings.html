<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Notification Settings — Wren Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .staff-grid { display:grid; gap:10px }
    .staff-card { background:#1e293b; border:1px solid #2d3748; border-radius:10px;
      padding:14px 18px; cursor:pointer; transition:.15s;
      display:flex; align-items:center; gap:14px }
    .staff-card:hover { border-color:#4a9abf66; background:#1e3045 }
    .staff-card.selected { border-color:#4a9abf; background:#0f2233 }
    .avatar { width:40px;height:40px;border-radius:50%;background:#4a9abf;
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:.9rem;flex-shrink:0 }
    .tg-dot { width:8px;height:8px;border-radius:50%;margin-right:4px;display:inline-block }
    .tg-dot.linked { background:#22c55e }
    .tg-dot.unlinked { background:#ef4444 }
    .pref-table { width:100%;border-collapse:collapse;font-size:.83rem }
    .pref-table th { padding:7px 10px;text-align:left;color:#94a3b8;border-bottom:1px solid #2d3748;
      font-size:.75rem;text-transform:uppercase;font-weight:600 }
    .pref-table td { padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04) }
    .toggle-chip { display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
      border-radius:16px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.12s }
    .toggle-chip.active-inapp    { background:#4a9abf22;border-color:#4a9abf;color:#4a9abf }
    .toggle-chip.active-telegram { background:#0088cc22;border-color:#0088cc;color:#29b6f6 }
    .toggle-chip.inactive { background:transparent;border-color:#334155;color:#475569 }
    .scope-sel { background:#1e293b;border:1px solid #334155;color:#f1f5f9;
      border-radius:5px;padding:2px 6px;font-size:.75rem }
    .urgent-badge { background:#ef444422;color:#ef4444;border-radius:3px;
      padding:1px 5px;font-size:.7rem;font-weight:700 }
    .panel-header { display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
      margin-bottom:16px }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header" style="margin-bottom:20px">
    <div class="page-title">🔔 Notification Settings</div>
    <div style="color:#94a3b8;font-size:.875rem;margin-top:2px">
      Per-staff preferences and Telegram linking
    </div>
  </div>

  <div style="display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start">

    <!-- Staff list -->
    <div class="card" style="padding:16px">
      <div style="font-weight:700;margin-bottom:12px;font-size:.9rem;color:#94a3b8;text-transform:uppercase;font-size:.75rem">Staff</div>
      <div id="staff-list"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>

    <!-- Preferences panel -->
    <div class="card" id="prefs-panel" style="display:none">
      <div class="panel-header">
        <div>
          <div class="card-title" id="panel-title">—</div>
          <div id="panel-subtitle" style="font-size:.82rem;color:#94a3b8;margin-top:2px"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-secondary" id="btn-reset-defaults">Reset to defaults</button>
          <button class="btn btn-sm btn-secondary" id="btn-apply-preset">Apply preset…</button>
          <button class="btn btn-sm btn-primary" id="btn-save-prefs">Save</button>
        </div>
      </div>
      <div id="staff-prefs-area"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>

    <div class="card" id="empty-panel" style="padding:40px;text-align:center;color:#475569">
      Select a staff member to view their preferences
    </div>

  </div>
</div>

<!-- Preset modal -->
<div id="preset-modal" style="display:none;position:fixed;inset:0;background:#00000088;z-index:200;
  display:none;align-items:center;justify-content:center">
  <div class="card" style="width:360px;padding:24px">
    <div style="font-weight:700;font-size:1rem;margin-bottom:14px">Apply role preset</div>
    <div class="form-group">
      <label class="form-label">Preset</label>
      <select class="form-control" id="preset-select">
        <option value="manager">Manager (all, telegram+inapp)</option>
        <option value="room_leader">Room leader / Deputy</option>
        <option value="practitioner">Practitioner (room-scoped)</option>
        <option value="apprentice">Apprentice (minimal)</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-secondary" id="btn-cancel-preset">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-preset">Apply</button>
    </div>
  </div>
</div>

<script>
let staffList = [];
let selectedStaffId = null;
let staffPrefs = [];

async function loadStaff() {
  try {
    const data = await Wren.api('/api/notifications/prefs/all-staff');
    staffList = data;
    renderStaffList(data);
  } catch(e) {
    document.getElementById('staff-list').innerHTML = '<div class="alert alert-danger">Failed to load</div>';
  }
}

function renderStaffList(staff) {
  const el = document.getElementById('staff-list');
  el.innerHTML = `<div class="staff-grid">
    ${staff.map(s => `
      <div class="staff-card ${s.id === selectedStaffId ? 'selected' : ''}"
        data-id="${s.id}">
        <div class="avatar">${s.first_name[0]}${s.last_name[0]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:.9rem">${s.first_name} ${s.last_name}</div>
          <div style="font-size:.78rem;color:#64748b;text-transform:capitalize">
            ${(s.role||'').replace(/_/g,' ')}
          </div>
          <div style="font-size:.75rem;margin-top:2px">
            <span class="tg-dot ${s.telegram_linked ? 'linked' : 'unlinked'}"></span>
            ${s.telegram_linked ? 'Telegram linked' : 'No Telegram'}
            &nbsp;·&nbsp;${s.prefs_count} prefs
          </div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

async function selectStaff(id) {
  selectedStaffId = id;
  document.querySelectorAll('.staff-card').forEach(c =>
    c.classList.toggle('selected', parseInt(c.dataset.id) === id)
  );
  const s = staffList.find(x => x.id === id);
  const panel = document.getElementById('prefs-panel');
  const empty = document.getElementById('empty-panel');
  panel.style.display = '';
  empty.style.display = 'none';

  document.getElementById('panel-title').textContent = `${s.first_name} ${s.last_name}`;
  document.getElementById('panel-subtitle').textContent =
    `${(s.role||'').replace(/_/g,' ')} — ${s.telegram_linked ? '✓ Telegram linked' : '✗ No Telegram'} — ${s.prefs_count} preferences`;

  const area = document.getElementById('staff-prefs-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  try {
    staffPrefs = await Wren.api(`/api/notifications/prefs/${id}`);
    renderStaffPrefs(staffPrefs);
  } catch(e) {
    area.innerHTML = '<div class="alert alert-danger">Failed to load preferences</div>';
  }
}

function renderStaffPrefs(prefs) {
  const area = document.getElementById('staff-prefs-area');
  area.innerHTML = `
    <div class="table-wrapper" style="overflow-x:auto">
      <table class="pref-table">
        <thead><tr>
          <th style="width:32px">On</th>
          <th>Event</th>
          <th>In-app</th>
          <th>Telegram</th>
          <th>Scope</th>
        </tr></thead>
        <tbody>
          ${prefs.map(p => {
            const inapp = p.channels?.includes('inapp');
            const tg    = p.channels?.includes('telegram');
            return `
              <tr data-cat="${p.event_category}">
                <td><input type="checkbox" style="accent-color:#4a9abf;cursor:pointer"
                  data-cat="${p.event_category}" ${p.enabled?'checked':''}></td>
                <td>
                  <div style="font-weight:600">${p.label}</div>
                  ${p.urgent ? '<span class="urgent-badge">URGENT</span>' : ''}
                </td>
                <td>
                  <span class="toggle-chip ${inapp?'active-inapp':'inactive'}"
                    data-cat="${p.event_category}" data-ch="inapp">
                    🔔
                  </span>
                </td>
                <td>
                  <span class="toggle-chip ${tg?'active-telegram':'inactive'}"
                    data-cat="${p.event_category}" data-ch="telegram">
                    ✈
                  </span>
                </td>
                <td>
                  <select class="scope-sel" data-cat="${p.event_category}">
                    ${[['all','Everyone'],['my_room','My room'],['my_keychildren','My key children']]
                      .map(([v,l]) => `<option value="${v}" ${(p.scope||'all')===v?'selected':''}>${l}</option>`)
                      .join('')}
                  </select>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function onStaffToggle(el, cat) {
  const p = staffPrefs.find(x => x.event_category === cat);
  if (p) p.enabled = el.checked;
}
function onStaffScope(el, cat) {
  const p = staffPrefs.find(x => x.event_category === cat);
  if (p) p.scope = el.value;
}
function toggleStaffCh(el) {
  const cat = el.dataset.cat;
  const ch  = el.dataset.ch;
  const p   = staffPrefs.find(x => x.event_category === cat);
  if (!p) return;
  p.channels = p.channels || [];
  if (p.channels.includes(ch)) {
    p.channels = p.channels.filter(c => c !== ch);
    el.className = 'toggle-chip inactive';
  } else {
    p.channels.push(ch);
    const cls = ch==='telegram' ? 'active-telegram' : 'active-inapp';
    el.className = `toggle-chip ${cls}`;
  }
}

async function saveStaffPrefs() {
  if (!selectedStaffId) return;
  try {
    await Wren.api(`/api/notifications/prefs/${selectedStaffId}`, {
      method:'PUT', body: JSON.stringify({ prefs: staffPrefs })
    });
    Wren.toast('Preferences saved', 'success');
    loadStaff();
  } catch(e) { Wren.toast('Save failed', 'error'); }
}

async function resetStaffDefaults() {
  if (!selectedStaffId || !confirm('Reset this staff member to role defaults?')) return;
  try {
    await Wren.api(`/api/notifications/prefs/${selectedStaffId}/reset`, { method:'POST' });
    staffPrefs = await Wren.api(`/api/notifications/prefs/${selectedStaffId}`);
    renderStaffPrefs(staffPrefs);
    Wren.toast('Reset to defaults', 'success');
    loadStaff();
  } catch(e) { Wren.toast('Reset failed', 'error'); }
}

function applyPreset() {
  document.getElementById('preset-modal').style.display = 'flex';
}

async function confirmPreset() {
  const role = document.getElementById('preset-select').value;
  document.getElementById('preset-modal').style.display = 'none';
  if (!selectedStaffId) return;
  try {
    // Temporarily set the role context by using the reset endpoint
    // (it reads the actual role from DB — just offer as a reference action)
    await Wren.api(`/api/notifications/prefs/${selectedStaffId}/reset`, { method:'POST' });
    staffPrefs = await Wren.api(`/api/notifications/prefs/${selectedStaffId}`);
    renderStaffPrefs(staffPrefs);
    Wren.toast('Preset applied', 'success');
    loadStaff();
  } catch(e) { Wren.toast('Failed', 'error'); }
}

document.getElementById('btn-reset-defaults').addEventListener('click', resetStaffDefaults);
document.getElementById('btn-apply-preset').addEventListener('click', applyPreset);
document.getElementById('btn-save-prefs').addEventListener('click', saveStaffPrefs);
document.getElementById('btn-cancel-preset').addEventListener('click', () => {
  document.getElementById('preset-modal').style.display = 'none';
});
document.getElementById('btn-confirm-preset').addEventListener('click', confirmPreset);
document.getElementById('staff-list').addEventListener('click', e => {
  const card = e.target.closest('.staff-card[data-id]');
  if (card) selectStaff(parseInt(card.dataset.id));
});
document.getElementById('staff-prefs-area').addEventListener('change', e => {
  if (e.target.matches('input[type="checkbox"][data-cat]')) {
    onStaffToggle(e.target, e.target.dataset.cat);
  } else if (e.target.matches('select[data-cat]')) {
    onStaffScope(e.target, e.target.dataset.cat);
  }
});
document.getElementById('staff-prefs-area').addEventListener('click', e => {
  const chip = e.target.closest('.toggle-chip[data-cat]');
  if (chip) toggleStaffCh(chip);
});

document.addEventListener('wren:ready', loadStaff);
</script>
</body>
</html>
