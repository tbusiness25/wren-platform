<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="admin">
<title>Outings — Wren Admin</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
.outing-card { background:var(--c-card); border:1px solid var(--c-border); border-radius:12px; padding:16px 18px; margin-bottom:12px; cursor:pointer; transition:.15s; }
.outing-card:hover { border-color:#4a9abf; }
.outing-header { display:flex; align-items:flex-start; gap:12px; }
.outing-date { background:#1e293b; border:1px solid var(--c-border); border-radius:8px; padding:6px 10px; text-align:center; min-width:52px; flex-shrink:0; }
.outing-date-day { font-size:1.3rem; font-weight:800; color:#4a9abf; line-height:1; }
.outing-date-mon { font-size:.65rem; color:var(--c-muted); font-weight:700; text-transform:uppercase; }
.outing-title { font-size:.95rem; font-weight:700; color:var(--c-text); margin-bottom:4px; }
.outing-meta { font-size:.78rem; color:var(--c-muted); display:flex; gap:10px; flex-wrap:wrap; }
.outing-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.badge-risk { padding:3px 9px; border-radius:99px; font-size:.7rem; font-weight:700; }
.risk-done { background:rgba(34,197,94,.12); color:#22c55e; }
.risk-missing { background:rgba(239,68,68,.12); color:#ef4444; }
.consent-done { background:rgba(34,197,94,.12); color:#22c55e; }
.consent-missing { background:rgba(245,158,11,.12); color:#f59e0b; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; overflow-y:auto; }
.modal-box { background:#1e293b; border:1px solid var(--c-border); border-radius:16px; max-width:700px; width:100%; max-height:90vh; overflow-y:auto; padding:24px; }
.modal-hd { font-size:1rem; font-weight:800; color:var(--c-text); margin-bottom:18px; display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; color:var(--c-muted); font-size:1.2rem; cursor:pointer; }

.f-group { margin-bottom:14px; }
.f-label { display:block; font-size:.75rem; font-weight:700; color:var(--c-muted); margin-bottom:5px; }
.f-input,.f-select,.f-ta { width:100%; background:#0f172a; border:1.5px solid var(--c-border); border-radius:8px; padding:9px 12px; color:var(--c-text); font-size:.875rem; outline:none; transition:.2s; font-family:inherit; }
.f-input:focus,.f-select:focus,.f-ta:focus { border-color:#4a9abf; }
.f-ta { resize:vertical; min-height:80px; line-height:1.5; }
.f-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.btn-primary { padding:9px 18px; background:#4a9abf; border:none; border-radius:10px; color:#fff; font-weight:700; cursor:pointer; font-size:.875rem; transition:.2s; }
.btn-primary:hover { opacity:.88; }
.btn-secondary { padding:9px 18px; background:#2d3748; border:none; border-radius:10px; color:var(--c-text); font-weight:700; cursor:pointer; font-size:.875rem; }

/* AI button */
.btn-ai { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; background:linear-gradient(135deg,#4a9abf,#2d7fa8); color:#fff; border:none; border-radius:8px; font-size:.78rem; font-weight:700; cursor:pointer; transition:.2s; }
.btn-ai:hover { opacity:.88; }
.btn-ai:disabled { opacity:.5; cursor:default; }

/* Child checkboxes */
.child-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:6px; max-height:200px; overflow-y:auto; padding:4px; }
.child-check { display:flex; align-items:center; gap:6px; padding:6px 8px; background:#0f172a; border:1.5px solid var(--c-border); border-radius:8px; cursor:pointer; font-size:.8rem; color:var(--c-text); transition:.15s; }
.child-check input { width:14px; height:14px; cursor:pointer; flex-shrink:0; }
.child-check:has(input:checked) { border-color:#4a9abf; background:rgba(74,154,191,.08); }
</style>
</head>
<body>
<div id="wren-shell"></div>
<div class="page-content" data-role="manager deputy_manager room_leader senior_practitioner">

  <div class="v2-page-header">
    <div style="font-size:.875rem;color:var(--c-muted)">Planned and past outings. Click any card to view details.</div>
    <button class="btn-primary" id="btn-new-outing" style="margin-left:auto">+ New Outing</button>
  </div>

  <div id="outings-list">
    <div style="color:var(--c-muted);font-size:.875rem">Loading outings...</div>
  </div>

</div>

<!-- Outing Detail Modal -->
<div class="modal-overlay" id="detail-modal" style="display:none">
  <div class="modal-box" id="detail-modal-box">
    <div class="modal-hd"><span id="detail-title">Outing</span><button class="modal-close" id="btn-close-detail">✕</button></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- New / Edit Outing Modal -->
<div class="modal-overlay" id="form-modal" style="display:none">
  <div class="modal-box" id="form-modal-box">
    <div class="modal-hd"><span id="form-title">New Outing</span><button class="modal-close" id="btn-close-form">✕</button></div>
    <div id="form-body">
      <div class="f-group"><label class="f-label">Destination *</label><input class="f-input" id="f-dest" placeholder="e.g. Walpole Park, Ealing"></div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Date *</label><input type="date" class="f-input" id="f-date"></div>
        <div class="f-group"><label class="f-label">Outing type</label>
          <select class="f-select" id="f-type">
            <option value="local_walk">Local walk</option>
            <option value="park_visit">Park visit</option>
            <option value="trip">Educational trip</option>
            <option value="swimming">Swimming</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">Departure time</label><select class="f-input" id="f-depart"></select></div>
        <div class="f-group"><label class="f-label">Return time</label><select class="f-input" id="f-return"></select></div>
      </div>
      <div class="f-group"><label class="f-label">Transport method</label>
        <select class="f-select" id="f-transport">
          <option value="walking">Walking</option>
          <option value="minibus">Minibus</option>
          <option value="coach">Coach</option>
          <option value="public_transport">Public transport</option>
        </select>
      </div>
      <div class="f-group"><label class="f-label">Purpose / Learning intention</label><textarea class="f-ta" id="f-purpose" rows="2" placeholder="What will children learn or experience?"></textarea></div>

      <div class="f-group">
        <label class="f-label">Risk assessment</label>
        <textarea class="f-ta" id="f-risk" rows="4" placeholder="Describe hazards, control measures and emergency procedures..."></textarea>
        <button class="btn-ai" id="ai-risk-btn" style="margin-top:8px">🤖 Generate with AI</button>
        <div id="ai-risk-note" style="font-size:.7rem;color:var(--c-muted);margin-top:4px;font-style:italic;display:none">AI-generated — please review before saving</div>
      </div>

      <div class="f-group">
        <label class="f-label" style="margin-bottom:8px">Children attending</label>
        <div class="child-grid" id="child-checkboxes">Loading...</div>
      </div>

      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        <button class="btn-primary" id="form-submit-btn">Save Outing</button>
        <button class="btn-secondary" id="btn-cancel-form">Cancel</button>
      </div>
      <div id="form-error" style="margin-top:8px;color:#ef4444;font-size:.82rem;display:none"></div>
    </div>
  </div>
</div>

<script>
let editingId = null;
let allChildren = [];

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) : '—'; }
function fmtTime(t) { return t ? t.slice(0,5) : ''; }

async function loadOutings() {
  const list = document.getElementById('outings-list');
  try {
    const outings = await Wren.api('/api/outings');
    if (!outings.length) { list.innerHTML='<div style="color:var(--c-muted);font-size:.875rem;text-align:center;padding:40px">No outings recorded yet. Click "+ New Outing" to add one.</div>'; return; }
    list.innerHTML = outings.map(o => {
      const d = new Date(o.date);
      const day = d.toLocaleDateString('en-GB',{day:'numeric'});
      const mon = d.toLocaleDateString('en-GB',{month:'short'}).toUpperCase();
      const childCount = (o.child_ids||[]).length;
      const riskClass = o.risk_assessment_completed ? 'risk-done' : 'risk-missing';
      const riskText = o.risk_assessment_completed ? '✓ Risk assessed' : '⚠ Risk assessment needed';
      return `
        <div class="outing-card" data-action="view" data-id="${o.id}">
          <div class="outing-header">
            <div class="outing-date"><div class="outing-date-day">${day}</div><div class="outing-date-mon">${mon}</div></div>
            <div style="flex:1">
              <div class="outing-title">${esc(o.destination)}</div>
              <div class="outing-meta">
                <span>🚗 ${esc((o.transport_method||'walking').replace(/_/g,' '))}</span>
                <span>⏰ ${fmtTime(o.departure_time)}–${fmtTime(o.return_time)}</span>
                <span>👦 ${childCount} child${childCount!==1?'ren':''}</span>
                ${o.purpose?`<span>📚 ${esc(o.purpose.substring(0,60))}${o.purpose.length>60?'…':''}</span>`:''}
              </div>
              <div class="outing-badges">
                <span class="badge-risk ${riskClass}">${riskText}</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e){ list.innerHTML=`<div style="color:#ef4444">Error: ${esc(e.error||e.message||'')}</div>`; }
}

async function viewOuting(id) {
  const modal = document.getElementById('detail-modal');
  const body = document.getElementById('detail-body');
  body.innerHTML='<div style="color:var(--c-muted)">Loading...</div>';
  modal.style.display='flex';
  try {
    const o = await Wren.api(`/api/outings/${id}`);
    document.getElementById('detail-title').textContent = o.destination;
    const childCount = (o.child_ids||[]).length;
    body.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:3px">DATE & TIME</div><div style="color:var(--c-text);font-size:.9rem">${fmtDate(o.date)}<br><span style="color:var(--c-muted)">${fmtTime(o.departure_time)||'—'} – ${fmtTime(o.return_time)||'—'}</span></div></div>
        <div><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:3px">TRANSPORT</div><div style="color:var(--c-text);font-size:.9rem">${esc((o.transport_method||'Walking').replace(/_/g,' '))}</div></div>
        <div><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:3px">CHILDREN</div><div style="color:var(--c-text);font-size:.9rem">${childCount} attending</div></div>
        <div><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:3px">RISK ASSESSMENT</div><div><span class="badge-risk ${o.risk_assessment_completed?'risk-done':'risk-missing'}">${o.risk_assessment_completed?'✓ Completed':'⚠ Not yet done'}</span></div></div>
      </div>
      ${o.purpose?`<div style="margin-bottom:12px"><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:4px">PURPOSE</div><div style="color:var(--c-text);font-size:.875rem;line-height:1.5">${esc(o.purpose)}</div></div>`:''}
      ${o.learning_intention?`<div style="margin-bottom:12px"><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:4px">LEARNING INTENTION</div><div style="color:var(--c-text);font-size:.875rem;line-height:1.5">${esc(o.learning_intention)}</div></div>`:''}
      ${o.risk_assessment_url?`<div style="margin-bottom:12px"><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:4px">RISK ASSESSMENT</div><div style="color:var(--c-text);font-size:.875rem;line-height:1.5;background:#0f172a;border-radius:8px;padding:10px;white-space:pre-wrap">${esc(o.risk_assessment_url)}</div></div>`:''}
      ${o.notes?`<div style="margin-bottom:16px"><div style="font-size:.72rem;color:var(--c-muted);font-weight:700;margin-bottom:4px">NOTES</div><div style="color:var(--c-muted);font-size:.85rem">${esc(o.notes)}</div></div>`:''}
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-primary" data-action="consent" data-id="${o.id}" style="font-size:.8rem;padding:7px 14px">📧 Send consent to parents</button>
        <button data-action="edit-outing" data-id="${o.id}" style="padding:7px 14px;background:#2d3748;border:none;border-radius:8px;color:var(--c-text);font-size:.8rem;cursor:pointer">✏ Edit</button>
        <button data-action="delete-outing" data-id="${o.id}" style="padding:7px 14px;background:rgba(239,68,68,.15);border:none;border-radius:8px;color:#ef4444;font-size:.8rem;cursor:pointer">🗑 Delete</button>
      </div>
    `;
  } catch(e){ body.innerHTML=`<div style="color:#ef4444">Error: ${esc(e.error||'')}</div>`; }
}

async function sendConsent(id) {
  try {
    const r = await Wren.api(`/api/outings/${id}/send-consent`, { method:'POST', body:{} });
    Wren.toast(`Consent request marked for ${r.parents_notified} parent${r.parents_notified!==1?'s':''}`, 'success');
  } catch(e){ Wren.toast('Failed: '+(e.error||''),'error'); }
}

async function deleteOuting(id) {
  if (!confirm('Delete this outing?')) return;
  try {
    await Wren.api(`/api/outings/${id}`, { method:'DELETE' });
    Wren.toast('Outing deleted','success');
    closeDetail();
    loadOutings();
  } catch(e){ Wren.toast('Failed: '+(e.error||''),'error'); }
}

function closeDetail(ev) {
  if (ev && ev.target !== document.getElementById('detail-modal')) return;
  document.getElementById('detail-modal').style.display='none';
}

// ── New / Edit form ────────────────────────────────────────────────────────
async function showNewForm() {
  editingId = null;
  document.getElementById('form-title').textContent='New Outing';
  document.getElementById('f-dest').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-type').value='local_walk';
  document.getElementById('f-depart').value='09:30';
  document.getElementById('f-return').value='11:30';
  document.getElementById('f-transport').value='walking';
  document.getElementById('f-purpose').value='';
  document.getElementById('f-risk').value='';
  document.getElementById('form-error').style.display='none';
  await loadChildCheckboxes([]);
  document.getElementById('form-modal').style.display='flex';
}

async function editOuting(id) {
  try {
    const o = await Wren.api(`/api/outings/${id}`);
    editingId = id;
    document.getElementById('form-title').textContent='Edit Outing';
    document.getElementById('f-dest').value=o.destination||'';
    document.getElementById('f-date').value=o.date||'';
    document.getElementById('f-type').value=o.outing_type||'local_walk';
    document.getElementById('f-depart').value=fmtTime(o.departure_time)||'09:30';
    document.getElementById('f-return').value=fmtTime(o.return_time)||'11:30';
    document.getElementById('f-transport').value=o.transport_method||'walking';
    document.getElementById('f-purpose').value=o.purpose||'';
    document.getElementById('f-risk').value=o.risk_assessment_url||'';
    document.getElementById('form-error').style.display='none';
    closeDetail();
    await loadChildCheckboxes(o.child_ids||[]);
    document.getElementById('form-modal').style.display='flex';
  } catch(e){ Wren.toast('Failed to load: '+(e.error||''),'error'); }
}

async function loadChildCheckboxes(selectedIds) {
  const container = document.getElementById('child-checkboxes');
  try {
    if (!allChildren.length) allChildren = await Wren.api('/api/children').catch(()=>[]);
    container.innerHTML = allChildren.map(c=>`
      <label class="child-check">
        <input type="checkbox" value="${c.id}" ${selectedIds.includes(c.id)?'checked':''}>${esc(c.first_name)} ${esc(c.last_name)}
      </label>
    `).join('');
  } catch{ container.innerHTML='<div style="color:var(--c-muted)">Could not load children</div>'; }
}

async function generateRisk() {
  const dest = document.getElementById('f-dest').value.trim() || 'local park';
  const btn = document.getElementById('ai-risk-btn');
  btn.disabled=true; btn.textContent='⏳ Generating...';
  try {
    const r = await Wren.api(`/api/outings/${editingId||0}/ai-risk`, { method:'POST', body:{ destination:dest, age_range:'2–5 years' } });
    document.getElementById('f-risk').value = r.risk_assessment || '';
    document.getElementById('ai-risk-note').style.display='block';
  } catch(e){ Wren.toast('AI failed: '+(e.error||''),'error'); }
  finally { btn.disabled=false; btn.innerHTML='🤖 Generate with AI'; }
}

function closeForm(ev) {
  if (ev && ev.target !== document.getElementById('form-modal')) return;
  document.getElementById('form-modal').style.display='none';
}

async function submitForm() {
  const dest = document.getElementById('f-dest').value.trim();
  if (!dest) { showFormError('Destination is required'); return; }
  const childIds = Array.from(document.querySelectorAll('#child-checkboxes input:checked')).map(el=>parseInt(el.value));
  const payload = {
    destination: dest,
    date: document.getElementById('f-date').value,
    outing_type: document.getElementById('f-type').value,
    departure_time: document.getElementById('f-depart').value||null,
    return_time: document.getElementById('f-return').value||null,
    transport_method: document.getElementById('f-transport').value,
    purpose: document.getElementById('f-purpose').value.trim()||null,
    risk_assessment_url: document.getElementById('f-risk').value.trim()||null,
    risk_assessment_completed: !!document.getElementById('f-risk').value.trim(),
    child_ids: childIds,
  };
  const btn = document.getElementById('form-submit-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    if (editingId) {
      await Wren.api(`/api/outings/${editingId}`, { method:'PUT', body:payload });
      Wren.toast('Outing updated','success');
    } else {
      await Wren.api('/api/outings', { method:'POST', body:payload });
      Wren.toast('Outing created','success');
    }
    closeForm();
    loadOutings();
  } catch(e){ showFormError(e.error||'Failed to save'); }
  finally { btn.disabled=false; btn.textContent='Save Outing'; }
}

function showFormError(msg) {
  const el = document.getElementById('form-error');
  el.textContent=msg; el.style.display='block';
}

// Populate departure/return time dropdowns with 5-minute slots
(function(){
  function p2(n){return(n<10?'0':'')+n;}
  var html='';
  for(var m=0;m<1440;m+=5){var v=p2(Math.floor(m/60))+':'+p2(m%60);html+='<option value="'+v+'">'+v+'</option>';}
  ['f-depart','f-return'].forEach(function(id){var el=document.getElementById(id);if(el&&el.tagName==='SELECT')el.innerHTML=html;});
  var dep=document.getElementById('f-depart');if(dep)dep.value='09:30';
  var ret=document.getElementById('f-return');if(ret)ret.value='11:30';
})();
document.addEventListener('wren:ready', loadOutings);

document.getElementById('btn-new-outing').addEventListener('click', showNewForm);
document.getElementById('btn-close-detail').addEventListener('click', () => closeDetail());
document.getElementById('btn-close-form').addEventListener('click', () => closeForm());
document.getElementById('btn-cancel-form').addEventListener('click', () => closeForm());
document.getElementById('ai-risk-btn').addEventListener('click', generateRisk);
document.getElementById('form-submit-btn').addEventListener('click', submitForm);

document.getElementById('detail-modal').addEventListener('click', closeDetail);
document.getElementById('detail-modal-box').addEventListener('click', e => e.stopPropagation());
document.getElementById('form-modal').addEventListener('click', closeForm);
document.getElementById('form-modal-box').addEventListener('click', e => e.stopPropagation());

document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id ? parseInt(el.dataset.id) : null;
  if (action === 'view') viewOuting(id);
  else if (action === 'consent') sendConsent(id);
  else if (action === 'edit-outing') editOuting(id);
  else if (action === 'delete-outing') deleteOuting(id);
});
</script>
<script src="/js/wren-chat.js?v=2026070901"></script>
</body>
</html>
