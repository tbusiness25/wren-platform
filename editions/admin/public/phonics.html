<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Phonics — Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    /* ── Tabs ── */
    .ph-tabs{display:flex;border-bottom:2px solid var(--c-border);margin-bottom:22px;overflow-x:auto;scrollbar-width:none;gap:0}
    .ph-tabs::-webkit-scrollbar{display:none}
    .ph-tab{padding:10px 20px;border:none;background:none;color:var(--c-muted);font-size:.875rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
    .ph-tab.active{color:var(--c-blue);border-bottom-color:var(--c-blue)}
    .ph-pane{display:none}.ph-pane.active{display:block}
    /* ── Phase filter ── */
    .phase-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .phase-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--c-border);background:none;color:var(--c-muted);font-size:.8rem;font-weight:700;cursor:pointer;transition:.15s;min-height:36px}
    .phase-btn.active{background:var(--c-blue);border-color:var(--c-blue);color:#fff}
    /* ── Curriculum table ── */
    .sound-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .sound-table th{padding:8px 12px;text-align:left;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--c-muted);border-bottom:2px solid var(--c-border);background:var(--c-bg);position:sticky;top:0;z-index:2}
    .sound-table td{padding:8px 12px;border-bottom:1px solid var(--c-border);vertical-align:middle}
    .sound-table tr:hover td{background:rgba(74,154,191,.04)}
    .sound-code-cell{font-size:1.05rem;font-weight:800;color:var(--c-text)}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.68rem;font-weight:700;letter-spacing:.04em}
    .tb-grapheme{background:#4a9abf22;color:#4a9abf}
    .tb-digraph{background:#a855f722;color:#a855f7}
    .tb-trigraph{background:#f59e0b22;color:#f59e0b}
    .tb-tricky_word{background:#ef444422;color:#ef4444}
    .tb-phase1_aspect{background:#22c55e22;color:#22c55e}
    .examples-list{display:flex;gap:4px;flex-wrap:wrap}
    .ex-tag{background:var(--c-bg);border:1px solid var(--c-border);border-radius:5px;padding:1px 7px;font-size:.72rem;color:var(--c-muted)}
    /* Inline edit */
    .edit-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--c-border);background:none;color:var(--c-muted);cursor:pointer;font-size:.75rem;transition:.15s;min-height:28px}
    .edit-btn:hover{border-color:var(--c-blue);color:var(--c-blue)}
    .edit-row{display:none;background:rgba(74,154,191,.05);padding:12px 14px;border-radius:10px;margin-top:6px}
    .edit-row.open{display:block}
    /* ── Matrix ── */
    .matrix-wrap{overflow-x:auto;max-width:100%}
    .matrix-tbl{border-collapse:collapse;font-size:.78rem;min-width:600px}
    .matrix-tbl th{padding:6px 4px;text-align:center;font-weight:700;color:var(--c-muted);border-bottom:2px solid var(--c-border);white-space:nowrap;font-size:.68rem;letter-spacing:.03em;max-width:60px}
    .matrix-tbl th.child-th{text-align:left;min-width:130px;padding-left:10px}
    .matrix-tbl td{padding:5px 4px;border-bottom:1px solid rgba(45,55,72,.4);text-align:center;vertical-align:middle}
    .matrix-tbl td.child-td{text-align:left;padding-left:10px;min-width:130px;font-weight:600;white-space:nowrap;color:var(--c-text)}
    .conf-cell{width:28px;height:28px;border-radius:5px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
    .cc0{background:#1e293b;color:#475569}
    .cc1{background:#f59e0b33;color:#f59e0b}
    .cc2{background:#4a9abf33;color:#4a9abf}
    .cc3{background:#22c55e33;color:#22c55e}
    /* ── Cohort report ── */
    .report-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:18px;margin-bottom:14px}
    .report-card h3{font-size:.9rem;font-weight:700;color:var(--c-blue);margin-bottom:14px}
    .stat-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
    .stat-box{flex:1;min-width:80px;background:var(--c-bg);border-radius:10px;padding:12px 10px;text-align:center}
    .stat-box .val{font-size:1.6rem;font-weight:800;color:var(--c-text)}
    .stat-box .lbl{font-size:.7rem;color:var(--c-muted);margin-top:2px}
    .struggling-sound{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;border:1px solid var(--c-border);margin-bottom:6px;transition:.15s}
    .struggling-sound:hover{border-color:var(--c-orange)}
    .conf-bar-wrap{flex:1;min-width:100px}
    .conf-bar-seg{display:inline-block;height:8px;border-radius:4px;margin-right:2px;transition:.4s}
    /* ── Helpers ── */
    .loading-msg{text-align:center;padding:40px;color:var(--c-muted)}
    .section-label{font-size:.72rem;font-weight:800;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-top:8px}
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">🔤 Phonics</div>
      <div class="page-subtitle">Curriculum Management &amp; Progress</div>
    </div>
  </div>

  <div class="ph-tabs">
    <button class="ph-tab active" data-tab="curriculum">Curriculum Manager</button>
    <button class="ph-tab" data-tab="matrix">Bulk Assessment Matrix</button>
    <button class="ph-tab" data-tab="cohort">Class Progress Report</button>
  </div>

  <!-- ── TAB 1: Curriculum Manager ── -->
  <div id="pane-curriculum" class="ph-pane active">
    <div class="phase-bar" id="cur-phase-bar"></div>
    <div style="overflow-x:auto">
      <table class="sound-table" id="cur-table">
        <thead>
          <tr>
            <th style="width:70px">Phase</th>
            <th style="width:80px">Sound</th>
            <th style="width:90px">Type</th>
            <th>Example Words</th>
            <th>Pronunciation</th>
            <th>RWI Action</th>
            <th style="width:60px"></th>
          </tr>
        </thead>
        <tbody id="cur-tbody"><tr><td colspan="7" class="loading-msg">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ── TAB 2: Bulk Matrix ── -->
  <div id="pane-matrix" class="ph-pane">
    <div style="margin-bottom:14px">
      <label style="font-size:.8rem;color:var(--c-muted);display:block;margin-bottom:8px">Phase</label>
      <div class="phase-bar" id="mat-phase-bar"></div>
    </div>
    <div class="matrix-wrap">
      <div id="matrix-area" class="loading-msg">Select a phase above</div>
    </div>
  </div>

  <!-- ── TAB 3: Cohort Report ── -->
  <div id="pane-cohort" class="ph-pane">
    <div id="cohort-area" class="loading-msg">Loading…</div>
  </div>
</div>

<!-- Edit modal -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--c-card);border-radius:14px;padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto">
    <h3 style="font-size:1rem;margin-bottom:16px">Edit Sound: <span id="edit-sound-label" style="color:var(--c-blue)"></span></h3>
    <input type="hidden" id="edit-sound-id">
    <div class="form-field" style="margin-bottom:12px">
      <label class="form-label">Example Words (comma separated)</label>
      <input type="text" id="edit-examples" class="form-control" placeholder="sat, sun, sand">
    </div>
    <div class="form-field" style="margin-bottom:12px">
      <label class="form-label">Pronunciation Guide</label>
      <input type="text" id="edit-pron" class="form-control" placeholder="/s/ — short hissing sound">
    </div>
    <div class="form-field" style="margin-bottom:16px">
      <label class="form-label">RWI Action</label>
      <textarea id="edit-rwi" class="form-control" rows="2" placeholder="Describe the physical action…" style="resize:none"></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="edit-save-btn" style="flex:1">Save</button>
      <button class="btn btn-secondary" id="edit-close-btn" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<script>
const TYPE_LABELS = {grapheme:'Grapheme',digraph:'Digraph',trigraph:'Trigraph',
  tricky_word:'Tricky Word',phase1_aspect:'Phase 1 Aspect'};
const PHASE_INFO = {
  1:'7 aspects — environmental sounds, rhythm, rhyme, oral blending',
  2:'Sets 1-5: s a t p i n m d g o c k ck e u r h b f l + tricky words',
  3:'j v w x y z qu + ch sh th ng + vowel digraphs ai ee igh oa oo ar or ur ow oi + tricky words',
  4:'Adjacent consonants CCVC/CVCC — no new GPCs + tricky words',
  5:'Alternative graphemes &amp; split digraphs — ay ou ie ea oy ir ue aw ph ew etc.',
  6:'Spelling rules — suffixes, prefixes, morphology'
};

let allSounds = {}, curPhase = 2, matPhase = 2;

async function init() {
  buildPhaseBar('cur-phase-bar', 1, 6, p => { curPhase = p; renderCurriculumTable(p); });
  buildPhaseBar('mat-phase-bar', 2, 4, p => { matPhase = p; loadMatrix(p); });
  renderCurriculumTable(2);
  loadCohort();
}

function buildPhaseBar(elId, from, to, fn) {
  const el = document.getElementById(elId);
  for (let p = from; p <= to; p++) {
    const btn = document.createElement('button');
    btn.className = 'phase-btn' + (p === from ? ' active' : '');
    btn.textContent = 'Phase ' + p;
    btn.dataset.phase = p;
    btn.onclick = () => {
      el.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fn(p);
    };
    el.appendChild(btn);
  }
}

async function renderCurriculumTable(phase) {
  const tbody = document.getElementById('cur-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading-msg">Loading…</td></tr>';
  try {
    const sounds = await Wren.api('/api/phonics/sounds?phase=' + phase);
    sounds.forEach(s => { allSounds[s.id] = s; });
    if (!sounds.length) { tbody.innerHTML = '<tr><td colspan="7" style="color:var(--c-muted);text-align:center;padding:20px">No sounds for this phase</td></tr>'; return; }
    tbody.innerHTML = sounds.map(s => {
      const display = s.sound_code === 'oo_s' ? 'oo (book)' : s.sound_code === 'oo' ? 'oo (moon)' : s.sound_code;
      const exWords = (s.example_words || []).join(', ');
      return `<tr>
        <td style="color:var(--c-muted)">${s.phase}</td>
        <td><span class="sound-code-cell">${display}</span></td>
        <td><span class="type-badge tb-${s.sound_type}">${TYPE_LABELS[s.sound_type]||s.sound_type}</span></td>
        <td>
          <div class="examples-list">${(s.example_words||[]).map(w=>`<span class="ex-tag">${w}</span>`).join('')}</div>
        </td>
        <td style="color:var(--c-muted);font-size:.78rem;max-width:180px">${s.pronunciation_guide||'—'}</td>
        <td style="color:var(--c-muted);font-size:.78rem;max-width:200px">${s.rwi_action||'—'}</td>
        <td><button class="edit-btn" data-action="open-edit" data-id="${s.id}">Edit</button></td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:var(--c-danger);text-align:center;padding:20px">Failed to load</td></tr>';
  }
}

function openEdit(soundId) {
  const s = allSounds[soundId];
  if (!s) return;
  const display = s.sound_code === 'oo_s' ? 'oo (book)' : s.sound_code;
  document.getElementById('edit-sound-label').textContent = display + ' (Phase ' + s.phase + ')';
  document.getElementById('edit-sound-id').value = soundId;
  document.getElementById('edit-examples').value = (s.example_words || []).join(', ');
  document.getElementById('edit-pron').value = s.pronunciation_guide || '';
  document.getElementById('edit-rwi').value = s.rwi_action || '';
  const modal = document.getElementById('edit-modal');
  modal.style.display = 'flex';
}

function closeEdit() {
  document.getElementById('edit-modal').style.display = 'none';
}

async function saveEdit() {
  const id = document.getElementById('edit-sound-id').value;
  const examplesRaw = document.getElementById('edit-examples').value;
  const example_words = examplesRaw.split(',').map(w => w.trim()).filter(Boolean);
  const pronunciation_guide = document.getElementById('edit-pron').value.trim() || null;
  const rwi_action = document.getElementById('edit-rwi').value.trim() || null;
  try {
    const updated = await Wren.api('/api/phonics/sounds/' + id, {
      method: 'PUT', body: JSON.stringify({ example_words, pronunciation_guide, rwi_action })
    });
    allSounds[id] = { ...allSounds[id], ...updated };
    closeEdit();
    renderCurriculumTable(curPhase);
    Wren.toast('Sound updated');
  } catch(e) { Wren.toast('Failed to save', 'error'); }
}

// ── MATRIX ────────────────────────────────────────────────────────────────────

async function loadMatrix(phase) {
  const area = document.getElementById('matrix-area');
  area.innerHTML = '<div class="loading-msg">Loading…</div>';
  try {
    const { sounds, children, progress } = await Wren.api('/api/phonics/matrix?phase=' + phase);
    if (!children.length) { area.innerHTML = '<div class="loading-msg">No active children found</div>'; return; }
    if (!sounds.length) { area.innerHTML = '<div class="loading-msg">No sounds for this phase</div>'; return; }

    const CONF_COLOUR = ['cc0','cc1','cc2','cc3'];
    const CONF_LABEL = ['','1','2','3'];

    // Header
    let html = `<div style="font-size:.78rem;color:var(--c-muted);margin-bottom:10px">
      Phase ${phase} — ${sounds.length} sounds × ${children.length} children.
      <span style="color:#22c55e">■ Secure (3)</span>
      <span style="color:#4a9abf;margin-left:8px">■ Recognising (2)</span>
      <span style="color:#f59e0b;margin-left:8px">■ Introduced (1)</span>
      <span style="color:#475569;margin-left:8px">■ Not assessed</span>
    </div>
    <table class="matrix-tbl">
      <thead><tr>
        <th class="child-th">Child (Expected Ph)</th>
        ${sounds.map(s => {
          const d = s.sound_code === 'oo_s' ? 'oo*' : s.sound_code === 'oo' ? 'oo' : s.sound_code;
          return `<th title="${s.pronunciation_guide||''}">${d}</th>`;
        }).join('')}
        <th>Secure</th>
      </tr></thead>
      <tbody>`;

    children.forEach(c => {
      const cp = progress[c.id] || {};
      const secureCount = sounds.filter(s => cp[s.id] === 3).length;
      const pct = Math.round(secureCount / sounds.length * 100);
      html += `<tr>
        <td class="child-td">${c.first_name} ${c.last_name} <span style="font-size:.68rem;color:var(--c-muted);font-weight:400">(Ph${c.expected_phase})</span></td>
        ${sounds.map(s => {
          const conf = cp[s.id] || 0;
          return `<td><div class="conf-cell ${CONF_COLOUR[conf]}">${CONF_LABEL[conf]}</div></td>`;
        }).join('')}
        <td style="font-weight:700;color:${pct>=80?'#22c55e':pct>=50?'#4a9abf':'#f59e0b'}">${pct}%</td>
      </tr>`;
    });

    // Column totals
    html += `<tr style="background:rgba(74,154,191,.06)">
      <td class="child-td" style="font-weight:700;color:var(--c-muted);font-size:.72rem">% SECURE</td>
      ${sounds.map(s => {
        const secCount = children.filter(c => (progress[c.id] || {})[s.id] === 3).length;
        const pct = children.length ? Math.round(secCount / children.length * 100) : 0;
        const col = pct >= 80 ? '#22c55e' : pct >= 50 ? '#4a9abf' : pct > 0 ? '#f59e0b' : '#475569';
        return `<td style="font-weight:700;color:${col};font-size:.72rem">${pct}%</td>`;
      }).join('')}
      <td></td>
    </tr>`;

    html += '</tbody></table>';
    if (sounds.some(s => s.sound_code === 'oo_s')) html += '<p style="font-size:.72rem;color:var(--c-muted);margin-top:8px">* oo (book) — short oo vowel</p>';
    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = '<div style="color:var(--c-danger);text-align:center;padding:20px">Failed to load matrix</div>';
  }
}

// ── COHORT REPORT ─────────────────────────────────────────────────────────────

async function loadCohort() {
  const area = document.getElementById('cohort-area');
  try {
    const { sounds, total_children, phase_distribution } = await Wren.api('/api/phonics/cohort');

    // Phase distribution
    const phaseHtml = phase_distribution.map(p =>
      `<div class="stat-box"><div class="val">${p.count}</div><div class="lbl">Phase ${p.expected_phase}</div></div>`
    ).join('');

    // Struggling sounds (avg_confidence < 2 and child_count > 0)
    const struggling = sounds
      .filter(s => s.child_count > 0 && parseFloat(s.avg_confidence) < 2 && s.phase <= 4)
      .sort((a,b) => parseFloat(a.avg_confidence) - parseFloat(b.avg_confidence))
      .slice(0, 10);

    // Well-secured sounds
    const wellDone = sounds
      .filter(s => s.child_count > 0 && parseFloat(s.avg_confidence) >= 2.5 && s.phase <= 4)
      .sort((a,b) => parseFloat(b.avg_confidence) - parseFloat(a.avg_confidence))
      .slice(0, 8);

    // Phase-by-phase summary
    const phases = [1,2,3,4,5,6];
    const phaseSummary = phases.map(ph => {
      const pSounds = sounds.filter(s => s.phase === ph && s.child_count > 0);
      const avgConf = pSounds.length
        ? (pSounds.reduce((acc, s) => acc + parseFloat(s.avg_confidence || 0), 0) / pSounds.length).toFixed(2)
        : null;
      const secPct = pSounds.length && total_children > 0
        ? Math.round(pSounds.reduce((acc, s) => acc + parseInt(s.confident_count || 0), 0) / (pSounds.length * total_children) * 100)
        : 0;
      return { phase: ph, avgConf, secPct, count: pSounds.length };
    });

    area.innerHTML = `
    <div class="report-card">
      <h3>📊 Cohort Overview — ${total_children} Active Children</h3>
      <div class="stat-row">
        ${phaseHtml || '<span style="color:var(--c-muted);font-size:.82rem">No age data available</span>'}
      </div>
      <p style="font-size:.78rem;color:var(--c-muted);margin-top:4px">Expected phase distribution by age</p>
    </div>

    <div class="report-card">
      <h3>📈 Phase-by-Phase Progress</h3>
      <div style="overflow-x:auto">
        <table class="sound-table">
          <thead><tr>
            <th>Phase</th><th>Sounds Assessed</th><th>Avg Confidence</th><th>% Secure</th><th>Visual</th>
          </tr></thead>
          <tbody>
            ${phaseSummary.map(p => p.count === 0 ? '' : `<tr>
              <td><strong>Phase ${p.phase}</strong></td>
              <td>${p.count}</td>
              <td style="color:${parseFloat(p.avgConf)>=2.5?'#22c55e':parseFloat(p.avgConf)>=1.5?'#4a9abf':'#f59e0b'}">${p.avgConf || '—'} / 3</td>
              <td style="font-weight:700;color:${p.secPct>=80?'#22c55e':p.secPct>=50?'#4a9abf':'#f59e0b'}">${p.secPct}%</td>
              <td style="min-width:100px">
                <div style="height:6px;border-radius:3px;background:var(--c-border);overflow:hidden">
                  <div style="height:100%;border-radius:3px;background:${p.secPct>=80?'#22c55e':p.secPct>=50?'#4a9abf':'#f59e0b'};width:${p.secPct}%;transition:.4s"></div>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="report-card">
      <h3>⚠️ Sounds Needing Focus <span style="font-size:.75rem;font-weight:400;color:var(--c-muted)">(lowest average confidence, Phases 2-4)</span></h3>
      ${!struggling.length ? '<p style="color:var(--c-muted);font-size:.82rem">No struggling sounds — great work!</p>' : struggling.map(s => {
        const display = s.sound_code === 'oo_s' ? 'oo (book)' : s.sound_code === 'oo' ? 'oo (moon)' : s.sound_code;
        const avgNum = parseFloat(s.avg_confidence) || 0;
        const total = parseInt(s.child_count);
        const secPct = total > 0 ? Math.round(parseInt(s.confident_count)/total*100) : 0;
        return `<div class="struggling-sound">
          <div style="min-width:60px;text-align:center">
            <div style="font-size:1.2rem;font-weight:800;color:var(--c-text)">${display}</div>
            <div style="font-size:.65rem;color:var(--c-muted)">Phase ${s.phase}</div>
          </div>
          <div class="conf-bar-wrap">
            <div style="display:flex;gap:3px;margin-bottom:4px">
              <span class="conf-bar-seg" style="background:#f59e0b;width:${parseInt(s.introduced_count)/total*100}%" title="Introduced: ${s.introduced_count}"></span>
              <span class="conf-bar-seg" style="background:#4a9abf;width:${parseInt(s.recognising_count)/total*100}%" title="Recognising: ${s.recognising_count}"></span>
              <span class="conf-bar-seg" style="background:#22c55e;width:${secPct}%" title="Secure: ${s.confident_count}"></span>
            </div>
            <div style="font-size:.7rem;color:var(--c-muted)">${s.child_count} assessed · avg ${avgNum.toFixed(1)}/3</div>
          </div>
          <div style="font-size:.72rem;color:var(--c-danger);font-weight:700;min-width:50px;text-align:right">${secPct}% secure</div>
        </div>`;
      }).join('')}
    </div>

    <div class="report-card">
      <h3>✅ Well-Secured Sounds <span style="font-size:.75rem;font-weight:400;color:var(--c-muted)">(avg confidence ≥ 2.5)</span></h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${!wellDone.length ? '<span style="color:var(--c-muted);font-size:.82rem">Keep going — more assessments needed</span>' : wellDone.map(s => {
          const display = s.sound_code === 'oo_s' ? 'oo*' : s.sound_code;
          return `<div style="background:#22c55e22;border:1.5px solid #22c55e55;border-radius:8px;padding:6px 12px;text-align:center">
            <div style="font-size:1rem;font-weight:800;color:#22c55e">${display}</div>
            <div style="font-size:.65rem;color:#22c55e">Ph ${s.phase} · ${parseFloat(s.avg_confidence).toFixed(1)}/3</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  } catch(e) {
    area.innerHTML = '<div style="color:var(--c-danger);text-align:center;padding:20px">Failed to load cohort report</div>';
  }
}

function setTab(name, btn) {
  document.querySelectorAll('.ph-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ph-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// Close edit modal on backdrop click
document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeEdit();
});

document.addEventListener('wren:ready', function() {
  // Tab buttons
  document.querySelector('.ph-tabs').addEventListener('click', function(e) {
    const btn = e.target.closest('.ph-tab');
    if (!btn) return;
    setTab(btn.dataset.tab, btn);
  });
  // Edit modal buttons
  document.getElementById('edit-save-btn').addEventListener('click', saveEdit);
  document.getElementById('edit-close-btn').addEventListener('click', closeEdit);
  // Curriculum table edit-btn delegation
  document.getElementById('cur-tbody').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action="open-edit"]');
    if (btn) openEdit(parseInt(btn.dataset.id));
  });
  init();
});
</script>
