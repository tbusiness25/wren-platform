<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Regulatory Watcher — Wren Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .reg-tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid #2d3748; padding-bottom:0; }
    .reg-tab  { padding:8px 18px; border-radius:8px 8px 0 0; cursor:pointer; font-size:.875rem;
                color:#94a3b8; border:1px solid transparent; border-bottom:none; transition:all .15s; }
    .reg-tab:hover { color:#f1f5f9; background:#1e293b; }
    .reg-tab.active { color:#f1f5f9; background:#1e293b; border-color:#2d3748; margin-bottom:-1px; }

    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .importance-critical { background:#450a0a; color:#fca5a5; }
    .importance-high     { background:#451a03; color:#fed7aa; }
    .importance-normal   { background:#1e3a5f; color:#93c5fd; }
    .importance-fyi      { background:#1a1a2e; color:#94a3b8; }

    .status-new         { background:#14532d; color:#86efac; }
    .status-reviewed    { background:#1e3a5f; color:#93c5fd; }
    .status-action_taken { background:#4a1d96; color:#ddd6fe; }
    .status-dismissed   { background:#374151; color:#9ca3af; }
    .status-noise       { background:#1f2937; color:#6b7280; }

    .alert-row { cursor:pointer; transition:background .12s; }
    .alert-row:hover td { background:#1e293b; }

    .source-badge { display:inline-block; padding:2px 8px; border-radius:99px; font-size:.72rem;
                    font-weight:600; border:1px solid #2d3748; background:#0f172a; color:#94a3b8; }

    .filters { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; margin-bottom:16px; }
    .filters label { display:flex; flex-direction:column; gap:4px; font-size:.78rem; color:#94a3b8; }
    .filters select, .filters input {
      background:#0f172a; border:1px solid #2d3748; color:#f1f5f9;
      border-radius:8px; padding:7px 10px; font-size:.875rem; min-width:130px; }

    .source-row td { vertical-align:middle; }
    .source-health-ok    { color:#22c55e; }
    .source-health-error { color:#ef4444; }
    .source-health-never { color:#f59e0b; }

    .policy-map-table { width:100%; font-size:.82rem; border-collapse:collapse; }
    .policy-map-table th { color:#94a3b8; font-weight:600; text-align:left; padding:8px; border-bottom:1px solid #2d3748; }
    .policy-map-table td { padding:8px; border-bottom:1px solid #1e293b; }

    .insights-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:14px; margin-bottom:20px; }
    .insight-card  { background:#1e293b; border:1px solid #2d3748; border-radius:12px; padding:16px; text-align:center; }
    .insight-val   { font-size:2rem; font-weight:700; color:#4a9abf; }
    .insight-label { font-size:.78rem; color:#94a3b8; margin-top:4px; }

    .ai-badge { display:inline-flex; align-items:center; gap:4px; font-size:.72rem;
                padding:2px 7px; border-radius:99px; background:#4a1d96; color:#ddd6fe; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">📡 Regulatory Watcher</div>
    <div class="page-actions" id="header-actions"></div>
  </div>

  <!-- Insights row -->
  <div class="insights-grid" id="insights-grid">
    <div class="insight-card"><div class="insight-val" id="ins-30d">—</div><div class="insight-label">Alerts last 30 days</div></div>
    <div class="insight-card"><div class="insight-val" id="ins-open">—</div><div class="insight-label">Open (need action)</div></div>
    <div class="insight-card"><div class="insight-val" id="ins-avg">—</div><div class="insight-label">Avg days to action</div></div>
    <div class="insight-card"><div class="insight-val" id="ins-err">—</div><div class="insight-label">Sources with errors</div></div>
  </div>

  <div class="reg-tabs">
    <div class="reg-tab active" data-tab="alerts">Alerts</div>
    <div class="reg-tab" data-tab="sources">Sources</div>
    <div class="reg-tab" data-tab="policy-map">Policy Map</div>
  </div>

  <!-- ── Tab: Alerts ─────────────────────────────────────────────────────── -->
  <div class="tab-panel active" id="tab-alerts">
    <div class="filters">
      <label>Status
        <select id="f-status">
          <option value="">All</option>
          <option value="new">New</option>
          <option value="reviewed">Reviewed</option>
          <option value="action_taken">Action taken</option>
          <option value="dismissed">Dismissed</option>
          <option value="noise">Noise (auto)</option>
        </select>
      </label>
      <label>Importance
        <select id="f-importance">
          <option value="">All</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="normal">Normal</option>
          <option value="fyi">FYI</option>
        </select>
      </label>
      <label>Source
        <select id="f-source"><option value="">All sources</option></select>
      </label>
      <button class="btn btn-primary" id="btn-filter-alerts">Filter</button>
    </div>

    <div id="alerts-area"><div class="loading-state"><div class="spinner"></div></div></div>
    <div id="alerts-pagination" style="display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:12px"></div>
  </div>

  <!-- ── Tab: Sources ────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-sources">
    <div id="sources-area"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>

  <!-- ── Tab: Policy Map ────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-policy-map">
    <div id="policy-map-area"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
let alertsPage = 0;
const PAGE_SIZE = 25;

// ── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.reg-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.reg-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'sources') loadSources();
    if (tab.dataset.tab === 'policy-map') loadPolicyMap();
  });
});

// ── Helpers ────────────────────────────────────────────────────────────────
function badge(cls, text) {
  return `<span class="badge ${cls}" style="font-size:.72rem">${text}</span>`;
}
function importanceBadge(imp) {
  return `<span class="badge importance-${imp}" style="font-size:.72rem;padding:2px 7px">${imp}</span>`;
}
function statusBadge(s) {
  const label = { new:'New', reviewed:'Reviewed', action_taken:'Action taken', dismissed:'Dismissed', noise:'Noise' }[s] || s;
  return `<span class="badge status-${s}" style="font-size:.72rem;padding:2px 7px">${label}</span>`;
}
function timeAgo(dt) {
  const d = new Date(dt), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ── Insights ───────────────────────────────────────────────────────────────
async function loadInsights() {
  try {
    const d = await Wren.api('/api/regulatory/insights');
    document.getElementById('ins-30d').textContent  = d.alerts_last_30d ?? '—';
    document.getElementById('ins-open').textContent = d.open_alerts ?? '—';
    document.getElementById('ins-avg').textContent  = d.avg_days_to_action != null ? d.avg_days_to_action + 'd' : '—';
    document.getElementById('ins-err').textContent  = d.sources_with_errors ?? '—';
    if (d.sources_with_errors > 0) {
      document.getElementById('ins-err').style.color = '#ef4444';
    }
  } catch(e) { /* silently ignore */ }
}

// ── Source filter dropdown ─────────────────────────────────────────────────
async function loadSourceFilter() {
  try {
    const sources = await Wren.api('/api/regulatory/sources');
    const sel = document.getElementById('f-source');
    sources.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id; o.textContent = s.name;
      sel.appendChild(o);
    });
  } catch(e) { /* ignore */ }
}

// ── Alerts list ────────────────────────────────────────────────────────────
async function loadAlerts(page = 0) {
  alertsPage = page;
  const area = document.getElementById('alerts-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  const params = new URLSearchParams({
    limit: PAGE_SIZE, offset: page * PAGE_SIZE,
  });
  const status = document.getElementById('f-status').value;
  const importance = document.getElementById('f-importance').value;
  const source = document.getElementById('f-source').value;
  if (status) params.set('status', status);
  if (importance) params.set('importance', importance);
  if (source) params.set('source_id', source);

  try {
    const { alerts, total } = await Wren.api('/api/regulatory/alerts?' + params);

    if (!alerts.length) {
      area.innerHTML = '<div class="alert alert-info">No alerts match your filters.</div>';
      document.getElementById('alerts-pagination').innerHTML = '';
      return;
    }

    area.innerHTML = `
      <div class="table-wrapper">
        <table>
          <thead><tr>
            <th>Source</th><th>Alert</th><th>Detected</th>
            <th>Affected policies</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${alerts.map(a => {
              const aiData = a.ai_analysis || {};
              const affected = aiData.affected_policies?.length || a.policy_link_count || 0;
              const aiBadge = a.ai_analysis
                ? `<span class="ai-badge">${aiData.is_substantive ? '🔔 substantive' : '🔕 noise'}</span>`
                : '<span style="color:#6b7280;font-size:.72rem">awaiting AI</span>';
              return `<tr class="alert-row" data-action="view-alert" data-alert-id="${a.id}" style="cursor:pointer">
                <td>
                  <span class="source-badge">${escHtml(a.publisher)}</span><br>
                  <span style="font-size:.78rem;color:#94a3b8">${escHtml(a.source_name)}</span>
                </td>
                <td>
                  <div style="font-weight:500;margin-bottom:4px">${escHtml(a.title)}</div>
                  ${a.summary ? `<div style="font-size:.8rem;color:#94a3b8;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${escHtml(a.summary)}</div>` : ''}
                  <div style="margin-top:4px">${aiBadge} ${importanceBadge(a.importance)}</div>
                </td>
                <td style="white-space:nowrap;color:#94a3b8;font-size:.8rem">${timeAgo(a.detected_at)}</td>
                <td style="text-align:center">${affected ? `<span style="font-weight:600;color:#f59e0b">${affected}</span>` : '<span style="color:#94a3b8">—</span>'}</td>
                <td>${statusBadge(a.status)}</td>
                <td>
                  <a href="/admin/regulatory/alerts/${a.id}" class="btn btn-sm btn-ghost">View →</a>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;

    // Pagination
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const pg = document.getElementById('alerts-pagination');
    pg.innerHTML = totalPages > 1 ? `
      <span style="color:#94a3b8;font-size:.8rem">${total} alerts</span>
      ${page > 0 ? `<button class="btn btn-sm btn-ghost" data-action="alerts-page" data-page="${page-1}">← Prev</button>` : ''}
      <span style="color:#94a3b8;font-size:.8rem">Page ${page+1} / ${totalPages}</span>
      ${page < totalPages-1 ? `<button class="btn btn-sm btn-ghost" data-action="alerts-page" data-page="${page+1}">Next →</button>` : ''}
    ` : `<span style="color:#94a3b8;font-size:.8rem">${total} alert${total !== 1 ? 's' : ''}</span>`;
  } catch(e) {
    area.innerHTML = `<div class="alert alert-danger">Failed to load alerts: ${escHtml(e.message)}</div>`;
  }
}

// ── Sources list ───────────────────────────────────────────────────────────
async function loadSources() {
  const area = document.getElementById('sources-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const sources = await Wren.api('/api/regulatory/sources');
    area.innerHTML = `
      <div class="table-wrapper">
        <table>
          <thead><tr>
            <th>Source</th><th>Publisher</th><th>Type</th><th>Category</th>
            <th>Importance</th><th>Last polled</th><th>Health</th><th>Alerts</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${sources.map(s => {
              const health = !s.is_active ? `<span class="source-health-error">Disabled</span>`
                : s.last_error ? `<span class="source-health-error" title="${escHtml(s.last_error)}">Error ⚠</span>`
                : s.last_polled_at ? `<span class="source-health-ok">OK</span>`
                : `<span class="source-health-never">Never polled</span>`;
              const polled = s.last_polled_at ? timeAgo(s.last_polled_at) : '—';
              return `<tr class="source-row">
                <td>
                  <a href="${escHtml(s.url)}" target="_blank" rel="noopener noreferrer"
                     style="color:#4a9abf;font-weight:500">${escHtml(s.name)}</a>
                </td>
                <td><span class="source-badge">${escHtml(s.publisher)}</span></td>
                <td style="font-size:.8rem;color:#94a3b8">${s.feed_type || '—'}</td>
                <td style="font-size:.8rem;color:#94a3b8">${s.category || '—'}</td>
                <td>${importanceBadge(s.importance)}</td>
                <td style="font-size:.8rem;color:#94a3b8">${polled}</td>
                <td>${health}</td>
                <td style="text-align:center">
                  <span style="color:${s.new_alerts > 0 ? '#f59e0b' : '#94a3b8'}">${s.new_alerts || 0} new</span>
                  / ${s.total_alerts || 0}
                </td>
                <td style="white-space:nowrap">
                  <button class="btn btn-sm btn-ghost" data-action="force-poll" data-source-id="${s.id}">↻ Poll</button>
                  <button class="btn btn-sm btn-ghost" data-action="toggle-source" data-source-id="${s.id}" data-new-active="${!s.is_active}"
                          style="${s.is_active ? '' : 'color:#22c55e'}">
                    ${s.is_active ? 'Disable' : 'Enable'}
                  </button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    area.innerHTML = `<div class="alert alert-danger">Failed to load sources: ${escHtml(e.message)}</div>`;
  }
}

async function forcePoll(id, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    await Wren.api(`/api/regulatory/sources/${id}/force-poll`, { method: 'POST' });
    btn.textContent = '✓ Queued';
    setTimeout(() => loadSources(), 3000);
  } catch(e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

async function toggleSource(id, newActive, btn) {
  btn.disabled = true;
  try {
    await Wren.api(`/api/regulatory/sources/${id}`, {
      method: 'PATCH', body: JSON.stringify({ is_active: newActive }),
      headers: { 'Content-Type': 'application/json' }
    });
    loadSources();
  } catch(e) {
    btn.disabled = false;
    alert('Error: ' + e.message);
  }
}

// ── Policy map ─────────────────────────────────────────────────────────────
async function loadPolicyMap() {
  const area = document.getElementById('policy-map-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const links = await Wren.api('/api/regulatory/policy-map');
    if (!links.length) {
      area.innerHTML = '<div class="alert alert-info">No policy links yet. These are auto-generated as the AI analyses alerts.</div>';
      return;
    }
    area.innerHTML = `
      <p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">
        Policy links are built automatically when AI identifies a connection between a regulatory update and an existing LADN policy.
      </p>
      <div class="table-wrapper">
        <table class="policy-map-table">
          <thead><tr>
            <th>Regulatory Source</th><th>Publisher</th><th>Category</th>
            <th>Policy ID</th><th>Relationship</th><th>Confidence</th>
          </tr></thead>
          <tbody>
            ${links.map(l => `<tr>
              <td style="font-weight:500">${escHtml(l.source_name)}</td>
              <td><span class="source-badge">${escHtml(l.publisher)}</span></td>
              <td style="color:#94a3b8;font-size:.8rem">${l.category || '—'}</td>
              <td>${l.policy_id}</td>
              <td style="color:#94a3b8;font-size:.8rem">${l.relationship || '—'}</td>
              <td>${l.confidence ? importanceBadge(l.confidence) : '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    area.innerHTML = `<div class="alert alert-danger">Failed to load policy map: ${escHtml(e.message)}</div>`;
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('wren:ready', () => {
  loadInsights();
  loadSourceFilter();
  loadAlerts();
});
</script>
<script src="/js/wren-chat.js?v=2026060801"></script>
</body>
</html>
