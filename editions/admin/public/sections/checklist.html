<div class="v2-section" data-section="checklist">
<style>
.cl-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.cl-month-nav{display:flex;align-items:center;gap:8px;background:#1e293b;border:1px solid #2d3748;border-radius:10px;padding:6px 12px}
.cl-month-label{font-size:.95rem;font-weight:700;color:#f1f5f9;min-width:140px;text-align:center}
.cl-progress{background:#1e293b;border:1px solid #2d3748;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.cl-progress-track{flex:1;min-width:120px;height:8px;background:#0f172a;border-radius:4px;overflow:hidden}
.cl-progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .4s ease}
.cl-progress-pct{font-size:1.1rem;font-weight:700;color:#22c55e;min-width:44px}
.cl-progress-label{font-size:.82rem;color:#94a3b8;white-space:nowrap}
.cl-group{margin-bottom:22px}
.cl-group-heading{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1e293b}
.cl-item{background:#1e293b;border:1px solid #2d3748;border-radius:10px;padding:12px 16px;margin-bottom:7px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:border-color .15s,opacity .2s}
.cl-item:hover{border-color:#4a9abf40}
.cl-item.done{opacity:.55;border-color:#22c55e30;background:rgba(34,197,94,.04)}
.cl-item.done .cl-item-title{text-decoration:line-through;color:#64748b}
.cl-check{width:22px;height:22px;border-radius:6px;border:2px solid #2d3748;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:background .15s,border-color .15s;margin-top:1px}
.cl-item.done .cl-check{background:#22c55e;border-color:#22c55e;color:#fff}
.cl-body{flex:1;min-width:0}
.cl-item-title{font-size:.88rem;font-weight:600;color:#f1f5f9}
.cl-item-desc{font-size:.75rem;color:#94a3b8;margin-top:3px;line-height:1.4}
.cl-item-meta{font-size:.7rem;color:#4a9abf;margin-top:4px}
.cl-pri{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.cl-pri.high{background:rgba(239,68,68,.15);color:#ef4444}
.cl-pri.medium{background:rgba(245,158,11,.15);color:#f59e0b}
.cl-pri.low{background:rgba(148,163,184,.1);color:#64748b}
.cl-done-banner{background:rgba(34,197,94,.08);border:1px solid #22c55e30;border-radius:12px;padding:16px 20px;text-align:center;margin-bottom:18px;display:none}
.cl-done-banner.visible{display:block}
.cl-done-banner .cl-db-icon{font-size:1.8rem;margin-bottom:4px}
.cl-done-banner .cl-db-text{font-size:.95rem;font-weight:700;color:#22c55e}
.cl-done-banner .cl-db-sub{font-size:.78rem;color:#94a3b8;margin-top:3px}
.cl-empty{text-align:center;padding:48px 20px;color:#64748b;font-size:.9rem}
</style>

<div class="cl-header">
  <div>
    <h2 class="page-title" style="font-size:1.2rem;margin:0">Monthly Checklist</h2>
    <div style="font-size:.8rem;color:#94a3b8;margin-top:2px">Manager admin tasks — auto-seeded each month</div>
  </div>
  <div class="cl-month-nav">
    <button class="btn btn-ghost btn-sm" id="cl-btn-prev" style="padding:4px 10px">&#8592;</button>
    <div class="cl-month-label" id="cl-month-label">—</div>
    <button class="btn btn-ghost btn-sm" id="cl-btn-next" style="padding:4px 10px">&#8594;</button>
    <button class="btn btn-ghost btn-sm" id="cl-btn-today" style="padding:4px 10px;font-size:11px">This month</button>
  </div>
</div>

<div class="cl-progress">
  <div class="cl-progress-pct" id="cl-pct">—</div>
  <div class="cl-progress-track"><div class="cl-progress-fill" id="cl-fill" style="width:0%"></div></div>
  <div class="cl-progress-label" id="cl-progress-label">Loading…</div>
</div>

<div class="cl-done-banner" id="cl-done-banner">
  <div class="cl-db-icon">🎉</div>
  <div class="cl-db-text">All done for this month!</div>
  <div class="cl-db-sub">Everything's ticked off. Nice work.</div>
</div>

<div id="cl-body"><div class="cl-empty">Loading…</div></div>

<script>
(function(){
'use strict';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const now = new Date();
let clYear = now.getFullYear(), clMonth = now.getMonth() + 1;

function moName(y, m) {
  return new Date(y, m-1, 1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });
}
function setPct(done, total) {
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('cl-pct').textContent = pct + '%';
  document.getElementById('cl-fill').style.width = pct + '%';
  document.getElementById('cl-progress-label').textContent = `${done} of ${total} tasks complete`;
  document.getElementById('cl-pct').style.color = pct===100 ? '#22c55e' : (pct>=50 ? '#f59e0b' : '#94a3b8');
  document.getElementById('cl-done-banner').classList.toggle('visible', pct===100 && total>0);
}

function render(items) {
  document.getElementById('cl-month-label').textContent = moName(clYear, clMonth);
  if (!items.length) {
    document.getElementById('cl-body').innerHTML = '<div class="cl-empty">No checklist for this month.</div>';
    setPct(0,0); return;
  }
  const done = items.filter(i => i.status==='done').length;
  setPct(done, items.length);

  const byPri = { high:[], medium:[], low:[] };
  items.forEach(i => (byPri[i.priority] || byPri.low).push(i));
  const groups = [
    {key:'high',   label:'Must do this month'},
    {key:'medium', label:'Should do this month'},
    {key:'low',    label:'Good to do this month'},
  ];
  let html = '';
  for (const g of groups) {
    const gItems = byPri[g.key]; if (!gItems.length) continue;
    const gDone = gItems.filter(i=>i.status==='done').length;
    html += `<div class="cl-group"><div class="cl-group-heading">${g.label} (${gDone}/${gItems.length})</div>`;
    for (const item of gItems) {
      const isDone = item.status==='done';
      const doneAt = item.completed_at
        ? ' · Done ' + new Date(item.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
      html += `<div class="cl-item${isDone?' done':''}" data-id="${item.id}" data-status="${item.status}">
        <div class="cl-check">${isDone?'✓':''}</div>
        <div class="cl-body">
          <div class="cl-item-title">${esc(item.title)}</div>
          ${item.description?`<div class="cl-item-desc">${esc(item.description)}</div>`:''}
          ${doneAt?`<div class="cl-item-meta">${doneAt}</div>`:''}
        </div>
        <span class="cl-pri ${item.priority}">${item.priority}</span>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('cl-body').innerHTML = html;
}

function load() {
  document.getElementById('cl-body').innerHTML = '<div class="cl-empty">Loading…</div>';
  Wren.api(`/api/tasks/monthly-checklist?year=${clYear}&month=${clMonth}`).then(d => render(d.items||[])).catch(e => {
    document.getElementById('cl-body').innerHTML = `<div class="cl-empty" style="color:#ef4444">Error: ${esc(e.error||'Failed')}</div>`;
  });
}

function toggle(id, curStatus) {
  const newStatus = curStatus==='done' ? 'open' : 'done';
  Wren.api(`/api/tasks/${id}`, {method:'PUT', body:{status:newStatus}}).then(upd => {
    const el = document.querySelector(`.cl-item[data-id="${id}"]`);
    if (!el) return;
    el.dataset.status = newStatus;
    el.classList.toggle('done', newStatus==='done');
    el.querySelector('.cl-check').textContent = newStatus==='done' ? '✓' : '';
    el.querySelector('.cl-item-title').style.textDecoration = newStatus==='done' ? 'line-through' : '';
    const doneAt = upd.completed_at
      ? ' · Done ' + new Date(upd.completed_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
    let metaEl = el.querySelector('.cl-item-meta');
    if (doneAt) {
      if (!metaEl) { metaEl = document.createElement('div'); metaEl.className='cl-item-meta'; el.querySelector('.cl-body').appendChild(metaEl); }
      metaEl.textContent = doneAt;
    } else if (metaEl) { metaEl.remove(); }
    const all = [...document.querySelectorAll('.cl-item')];
    setPct(all.filter(i=>i.dataset.status==='done').length, all.length);
  }).catch(e => Wren.toast(e.error||'Failed','error'));
}

document.getElementById('cl-body').addEventListener('click', e => {
  const item = e.target.closest('.cl-item'); if (!item) return;
  toggle(parseInt(item.dataset.id), item.dataset.status);
});
document.getElementById('cl-btn-prev').addEventListener('click', () => {
  clMonth--; if (clMonth<1){clMonth=12;clYear--;} document.getElementById('cl-month-label').textContent=moName(clYear,clMonth); load();
});
document.getElementById('cl-btn-next').addEventListener('click', () => {
  clMonth++; if (clMonth>12){clMonth=1;clYear++;} document.getElementById('cl-month-label').textContent=moName(clYear,clMonth); load();
});
document.getElementById('cl-btn-today').addEventListener('click', () => {
  const n=new Date(); clYear=n.getFullYear(); clMonth=n.getMonth()+1;
  document.getElementById('cl-month-label').textContent=moName(clYear,clMonth); load();
});

document.getElementById('cl-month-label').textContent = moName(clYear, clMonth);
load();
})();
</script>
</div>
