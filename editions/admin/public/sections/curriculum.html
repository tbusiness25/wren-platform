<script>
(function() {
  'use strict';

  // ── Planning tab — full workspace ─────────────────────────────────────────────

  window['wrenLoadTab_curriculum_planning'] = function() {
    const DAYS = ['monday','tuesday','wednesday','thursday','friday'];
    const DAY_CLS = {monday:'pmon',tuesday:'ptue',wednesday:'pwed',thursday:'pthu',friday:'pfri'};
    const TYPE_LABELS = {sensory:'Sensory',maths_physical:'Maths & Physical',art_design:'Art & Design',small_world:'Small World',book_focus:'Book Focus'};

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function getMonday(d) {
      const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
      const m = new Date(d); m.setDate(d.getDate() + diff); return m.toISOString().slice(0,10);
    }

    const P = window._plan = {
      _actBankOpen: false, _actBankLoaded: false, _allActivities: [], _childList: [], _viewInited: {},

      setView(v) {
        ['week','term','child'].forEach(k => {
          document.getElementById('pvb-'+k)?.classList.toggle('active', k === v);
          document.getElementById('plan-section-'+k).style.display = k === v ? '' : 'none';
        });
        if (P._viewInited[v]) return;
        P._viewInited[v] = true;
        if (v === 'week') P.loadWeek();
        else if (v === 'term') P.loadTerm();
        else if (v === 'child') P.initChildView();
      },

      toggleActBank() {
        P._actBankOpen = !P._actBankOpen;
        document.getElementById('plan-actRail').hidden = !P._actBankOpen;
        document.getElementById('plan-actRailBtn').classList.toggle('open', P._actBankOpen);
        if (P._actBankOpen && !P._actBankLoaded) { P._actBankLoaded = true; P.loadActBank(); }
      },

      loadActBank() {
        const el = document.getElementById('plan-actBankList');
        Wren.api('/api/activity-bank?limit=100').then(data => {
          P._allActivities = data.activities || data || [];
          P.renderActBank(P._allActivities);
        }).catch(e => { if(el) el.innerHTML = `<div style="font-size:.8rem;color:var(--c-muted)">${esc(e.message||'Error')}</div>`; });
      },

      filterActivities() {
        const q = (document.getElementById('plan-actFilter')?.value||'').toLowerCase();
        P.renderActBank(P._allActivities.filter(a => (a.title||'').toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q)));
      },

      renderActBank(acts) {
        const el = document.getElementById('plan-actBankList');
        if (!el) return;
        if (!acts.length) { el.innerHTML = '<div style="font-size:.8rem;color:var(--c-muted);padding:8px 0">No activities found.</div>'; return; }
        el.innerHTML = acts.map(a => {
          const areas = Array.isArray(a.eyfs_areas) ? a.eyfs_areas.slice(0,2).join(', ') : '';
          const dur   = a.duration_minutes ? `${a.duration_minutes}min` : '';
          const meta  = [areas, dur].filter(Boolean).join(' · ');
          return `<div class="plan-act-item">
            <div class="plan-act-name">${esc(a.title)}</div>
            ${meta ? `<div class="plan-act-meta">${esc(meta)}</div>` : ''}
            <button class="plan-act-btn" data-title="${encodeURIComponent(a.title||'')}">+ Add to week</button>
          </div>`;
        }).join('');
      },

      quickAddFromBank(data) {
        const d = typeof data === 'string' ? JSON.parse(data.replace(/&quot;/g,'"')) : data;
        if (document.getElementById('plan-section-week').style.display === 'none') P.setView('week');
        P.openAddModal();
        const t = document.getElementById('plan-m-title'); if(t) t.value = d.title || '';
      },

      prevWeek() {
        const el = document.getElementById('plan-week-date');
        const d = new Date(el.value); d.setDate(d.getDate()-7); el.value = d.toISOString().slice(0,10); P.loadWeek();
      },
      nextWeek() {
        const el = document.getElementById('plan-week-date');
        const d = new Date(el.value); d.setDate(d.getDate()+7); el.value = d.toISOString().slice(0,10); P.loadWeek();
      },

      loadWeek() {
        const room = document.getElementById('plan-week-room')?.value || '1';
        const week = document.getElementById('plan-week-date')?.value || getMonday(new Date());
        const el   = document.getElementById('plan-weekContent');
        if(!el) return;
        el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w100"></div></div>';
        Wren.api(`/api/planning/weekly?room_id=${room}&week=${week}`).then(rows => {
          const byDay = {}; rows.forEach(r => byDay[r.day] = r);
          let html = `<div style="overflow-x:auto"><table class="plan-week-table"><thead><tr>`;
          DAYS.forEach(d => html += `<th>${d.charAt(0).toUpperCase()+d.slice(1)}</th>`);
          html += `</tr></thead><tbody><tr class="plan-week-row">`;
          DAYS.forEach(d => {
            const row = byDay[d], cls = DAY_CLS[d];
            if (row) {
              html += `<td><div class="${cls} plan-day-cell" data-edit-row="${encodeURIComponent(JSON.stringify({...row,day:d,week}))}">
                <div class="plan-day-name">${d}</div>
                <div class="plan-act-title">${esc(row.activity_title)}</div>
                ${row.role_of_adult ? `<div class="plan-act-desc">${esc(row.role_of_adult)}</div>` : ''}
                ${row.activity_type ? `<span class="plan-act-type">${esc(TYPE_LABELS[row.activity_type]||row.activity_type)}</span>` : ''}
              </div></td>`;
            } else {
              html += `<td><div class="${cls} plan-day-cell empty" data-add-day="${d}">
                <div class="plan-day-name">${d}</div><div class="add-hint">+ Add activity</div>
              </div></td>`;
            }
          });
          html += `</tr></tbody></table></div>`;
          el.innerHTML = html;
        }).catch(e => { el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">📋</div><h3>Planning Workspace</h3><p>${esc(e.message||'Could not load week')}</p></div>`; });
      },

      loadTerm() {
        const room = document.getElementById('plan-term-room')?.value || '1';
        const term = document.getElementById('plan-term-name')?.value || '';
        const year = document.getElementById('plan-term-year')?.value || '';
        const el   = document.getElementById('plan-termContent');
        if(!el) return;
        el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
        Wren.api(`/api/planning/term?room_id=${room}&term=${encodeURIComponent(term)}&year=${encodeURIComponent(year)}`).then(t => {
          if (!t) { el.innerHTML = '<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">📅</div><h3>No term plan found</h3></div>'; return; }
          let events = []; try { events = Array.isArray(t.events) ? t.events : JSON.parse(t.events||'[]'); } catch(e){}
          el.innerHTML = `
            <div class="term-card"><h3>🎯 Theme: ${esc(t.theme||'')}</h3>
              <h4 style="font-size:.8rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Learning Intentions</h4>
              <ul class="intent-list">${(t.learning_intentions||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div class="term-card"><h3>📚 Key Books</h3><div style="display:flex;flex-wrap:wrap;gap:8px">${(t.key_books||[]).map(b=>`<span style="background:#4a9abf22;color:#4a9abf;border-radius:8px;padding:6px 12px;font-size:.8rem">${esc(b)}</span>`).join('')}</div></div>
              <div class="term-card"><h3>🎵 Songs</h3><div style="display:flex;flex-wrap:wrap;gap:8px">${(t.songs||[]).map(s=>`<span style="background:#e0782022;color:#e07820;border-radius:8px;padding:6px 12px;font-size:.8rem">${esc(s)}</span>`).join('')}</div></div>
            </div>
            ${events.length ? `<div class="term-card"><h3>📅 Key Events</h3>${events.map(e=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--c-border)"><span style="font-size:.75rem;font-weight:700;color:#e07820;min-width:60px">${esc(e.date)}</span><span style="font-size:.85rem">${esc(e.event)}</span></div>`).join('')}</div>` : ''}`;
        }).catch(() => { el.innerHTML = '<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">📅</div><h3>No term plan found</h3><p>Create a term plan to see it here.</p></div>'; });
      },

      initChildView() {
        const sel = document.getElementById('plan-childSel');
        if(!sel) return;
        sel.innerHTML = '<option value="">Loading…</option>';
        Wren.api('/api/children').then(data => {
          P._childList = Array.isArray(data) ? data : (data.children || []);
          sel.innerHTML = '<option value="">— Select a child —</option>' +
            P._childList.map(c => `<option value="${c.id}">${esc((c.first_name||'')+' '+(c.last_name||''))}</option>`).join('');
          if (P._childList.length > 1) {
            document.getElementById('plan-childPrevBtn').style.display = '';
            document.getElementById('plan-childNextBtn').style.display = '';
          }
        }).catch(() => { sel.innerHTML = '<option value="">— Error loading children —</option>'; });
      },

      pickAdjacentChild(dir) {
        const sel = document.getElementById('plan-childSel');
        const opts = [...sel.options].filter(o => o.value);
        const idx = opts.findIndex(o => o.value === sel.value);
        const next = idx + dir;
        if (next >= 0 && next < opts.length) { sel.value = opts[next].value; P.loadChild(); }
      },

      loadChild() {
        const id = document.getElementById('plan-childSel')?.value;
        const el = document.getElementById('plan-childContent');
        if(!el) return;
        if (!id) { el.innerHTML = ''; return; }
        el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
        const obsReq = Wren.api(`/api/observations/child/${id}`);
        const actReq = P._allActivities.length ? Promise.resolve(P._allActivities) : Wren.api('/api/activity-bank?limit=50').then(d => d.activities || d || []);
        Promise.all([obsReq, actReq]).then(([obsRows, acts]) => {
          if (!P._allActivities.length) P._allActivities = acts;
          const obs = Array.isArray(obsRows) ? obsRows.slice(0,5) : [];
          const nextSteps = obs.map(o => o.next_steps).filter(Boolean);
          const suggestions = acts.slice(0,6);
          el.innerHTML = `
            <div style="display:flex;flex-direction:column;gap:14px">
              <div class="v2-card"><h3 style="font-size:.9rem;font-weight:700;color:var(--c-blue);margin-bottom:10px">🎯 Next steps</h3>
                ${nextSteps.length ? nextSteps.map(ns=>`<div class="next-step-chip">${esc(ns)}</div>`).join('') : '<div style="font-size:.85rem;color:var(--c-muted)">No next steps recorded yet.</div>'}
              </div>
              <div class="v2-card"><h3 style="font-size:.9rem;font-weight:700;color:var(--c-blue);margin-bottom:10px">📝 Recent observations</h3>
                ${obs.length ? obs.map(o=>{
                  const date = o.created_at ? new Date(o.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
                  const areas = Array.isArray(o.eyfs_areas) && o.eyfs_areas.length ? o.eyfs_areas.join(', ') : '';
                  return `<div class="plan-obs-card"><div style="font-size:.72rem;color:var(--c-muted);margin-bottom:5px">${esc([date,areas,o.staff_name].filter(Boolean).join(' · '))}</div>
                    <div style="font-size:.85rem;line-height:1.5">${esc(o.observation_text)}</div>
                    ${o.next_steps?`<div style="font-size:.8rem;color:#4a9abf;margin-top:6px;font-style:italic">→ ${esc(o.next_steps)}</div>`:''}
                  </div>`;
                }).join('') : '<div style="font-size:.85rem;color:var(--c-muted)">No observations recorded.</div>'}
              </div>
              <div class="v2-card"><h3 style="font-size:.9rem;font-weight:700;color:var(--c-blue);margin-bottom:10px">💡 Activity suggestions</h3>
                <div class="suggest-grid">
                  ${suggestions.map(a=>{
                    const meta = [Array.isArray(a.eyfs_areas)?a.eyfs_areas.slice(0,2).join(', '):'', a.duration_minutes?`${a.duration_minutes}min`:''].filter(Boolean).join(' · ');
                    return `<div class="suggest-card"><div style="font-size:.85rem;font-weight:600">${esc(a.title)}</div>
                      ${meta?`<div style="font-size:.7rem;color:var(--c-muted);margin-top:4px">${esc(meta)}</div>`:''}
                      <button class="plan-act-btn" style="margin-top:8px" data-title="${encodeURIComponent(a.title||'')}">+ Add to week plan</button>
                    </div>`;
                  }).join('')}
                </div>
              </div>
            </div>`;
        }).catch(e => { el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">👶</div><h3>${esc(e.message||'Error')}</h3></div>`; });
      },

      editCell(data) {
        const d = typeof data === 'string' ? JSON.parse(data.replace(/&quot;/g,'"')) : data;
        document.getElementById('plan-modalTitle').textContent = 'Edit — ' + d.day.charAt(0).toUpperCase()+d.day.slice(1);
        document.getElementById('plan-m-id').value        = d.id || '';
        document.getElementById('plan-m-room-id').value   = d.room_id;
        document.getElementById('plan-m-week').value      = d.week_commencing || document.getElementById('plan-week-date').value;
        document.getElementById('plan-m-day-sel').value   = d.day;
        document.getElementById('plan-m-title').value     = d.activity_title || '';
        document.getElementById('plan-m-type').value      = d.activity_type || '';
        document.getElementById('plan-m-role').value      = d.role_of_adult || '';
        document.getElementById('plan-m-resources').value = d.resources || '';
        document.getElementById('plan-m-theme').value     = d.theme || '';
        document.getElementById('plan-modalBg').classList.add('open');
      },

      openAddModal(day) {
        document.getElementById('plan-modalTitle').textContent = 'Add Activity' + (day ? ' — '+day.charAt(0).toUpperCase()+day.slice(1) : '');
        document.getElementById('plan-m-id').value        = '';
        document.getElementById('plan-m-room-id').value   = document.getElementById('plan-week-room')?.value || '1';
        document.getElementById('plan-m-week').value      = document.getElementById('plan-week-date')?.value || getMonday(new Date());
        document.getElementById('plan-m-day-sel').value   = day || 'monday';
        ['plan-m-title','plan-m-role','plan-m-resources','plan-m-theme'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
        document.getElementById('plan-m-type').value = '';
        document.getElementById('plan-modalBg').classList.add('open');
      },

      closeModal(e) { if (e.target.id === 'plan-modalBg') document.getElementById('plan-modalBg').classList.remove('open'); },

      saveActivity() {
        const title = document.getElementById('plan-m-title')?.value.trim();
        if (!title) { Wren.toast('Activity title is required', 'warning'); return; }
        const body = {
          room_id:         parseInt(document.getElementById('plan-m-room-id').value),
          week_commencing: document.getElementById('plan-m-week').value,
          day:             document.getElementById('plan-m-day-sel').value,
          activity_title:  title,
          activity_type:   document.getElementById('plan-m-type').value || null,
          role_of_adult:   document.getElementById('plan-m-role').value.trim() || null,
          resources:       document.getElementById('plan-m-resources').value.trim() || null,
          theme:           document.getElementById('plan-m-theme').value.trim() || null,
          eyfs_areas:      [],
        };
        const id = document.getElementById('plan-m-id').value;
        const url = id ? `/api/planning/weekly/${id}` : '/api/planning/weekly';
        Wren.api(url, { method: id ? 'PATCH' : 'POST', body }).then(() => {
          document.getElementById('plan-modalBg').classList.remove('open');
          Wren.toast('Activity saved', 'success');
          P._viewInited['week'] = false;
          P.loadWeek();
        }).catch(e => Wren.toast('Error: ' + (e.message || 'save failed'), 'error'));
      },
    };

    // Static UI bindings
    document.getElementById('pvb-week').addEventListener('click', () => P.setView('week'));
    document.getElementById('pvb-term').addEventListener('click', () => P.setView('term'));
    document.getElementById('pvb-child').addEventListener('click', () => P.setView('child'));
    document.getElementById('plan-actRailBtn').addEventListener('click', () => P.toggleActBank());
    document.getElementById('plan-week-room').addEventListener('change', () => P.loadWeek());
    document.getElementById('plan-week-date').addEventListener('change', () => P.loadWeek());
    document.getElementById('plan-week-prev').addEventListener('click', () => P.prevWeek());
    document.getElementById('plan-week-next').addEventListener('click', () => P.nextWeek());
    document.getElementById('plan-week-add').addEventListener('click', () => P.openAddModal());
    document.getElementById('plan-term-room').addEventListener('change', () => P.loadTerm());
    document.getElementById('plan-term-name').addEventListener('change', () => P.loadTerm());
    document.getElementById('plan-term-year').addEventListener('change', () => P.loadTerm());
    document.getElementById('plan-childSel').addEventListener('change', () => P.loadChild());
    document.getElementById('plan-childPrevBtn').addEventListener('click', () => P.pickAdjacentChild(-1));
    document.getElementById('plan-childNextBtn').addEventListener('click', () => P.pickAdjacentChild(1));
    document.getElementById('plan-actFilter').addEventListener('input', () => P.filterActivities());
    document.getElementById('plan-modal-cancel').addEventListener('click', () => document.getElementById('plan-modalBg').classList.remove('open'));
    document.getElementById('plan-modal-save').addEventListener('click', () => P.saveActivity());
    document.getElementById('plan-modalBg').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
    // Delegated handlers for dynamically rendered content
    document.getElementById('plan-actBankList').addEventListener('click', function(e) {
      const btn = e.target.closest('.plan-act-btn[data-title]');
      if (btn) P.quickAddFromBank({ title: decodeURIComponent(btn.dataset.title || '') });
    });
    document.getElementById('plan-weekContent').addEventListener('click', function(e) {
      const filled = e.target.closest('[data-edit-row]');
      if (filled) { P.editCell(JSON.parse(decodeURIComponent(filled.dataset.editRow))); return; }
      const empty = e.target.closest('[data-add-day]');
      if (empty) P.openAddModal(empty.dataset.addDay);
    });
    document.getElementById('plan-childContent').addEventListener('click', function(e) {
      const btn = e.target.closest('.plan-act-btn[data-title]');
      if (btn) P.quickAddFromBank({ title: decodeURIComponent(btn.dataset.title || '') });
    });
    // Init week view
    const dateEl = document.getElementById('plan-week-date');
    if (dateEl && !dateEl.value) dateEl.value = getMonday(new Date());
    P.setView('week');
  };

  // ── Calendar tab ──────────────────────────────────────────────────────────────

  let _curCalYear = new Date().getFullYear();
  let _curCalMonth = new Date().getMonth();

  window['wrenLoadTab_curriculum_calendar'] = function() {
    _renderCurCal();
    document.getElementById('cur-cal-prev')?.addEventListener('click', () => { _curCalMonth--; if (_curCalMonth < 0) { _curCalMonth = 11; _curCalYear--; } _renderCurCal(); });
    document.getElementById('cur-cal-next')?.addEventListener('click', () => { _curCalMonth++; if (_curCalMonth > 11) { _curCalMonth = 0; _curCalYear++; } _renderCurCal(); });
  };

  function _renderCurCal() {
    const el = document.getElementById('cur-cal-body');
    const label = document.getElementById('cur-cal-label');
    if (!el) return;
    if (label) label.textContent = new Date(_curCalYear, _curCalMonth).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    el.innerHTML = `<div class="tab-skeleton"><div class="tab-sk-row w100"></div><div class="tab-sk-row w80"></div></div>`;

    const firstDay = new Date(_curCalYear, _curCalMonth, 1);
    const lastDay  = new Date(_curCalYear, _curCalMonth + 1, 0);

    Wren.api('/api/outings').then(outings => {
      const thisMonth = outings.filter(o => {
        if (!o.date) return false;
        const d = new Date(o.date);
        return d >= firstDay && d <= lastDay;
      });

      const DAYS = ['Mon','Tue','Wed','Thu','Fri'];
      const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
      const daysInMonth = lastDay.getDate();

      const weeks = [];
      let week = new Array(startDow).fill(null);
      for (let d = 1; d <= daysInMonth; d++) {
        week.push(d);
        const dow = (new Date(_curCalYear, _curCalMonth, d).getDay() + 6) % 7;
        if (dow === 6 || d === daysInMonth) {
          while (week.length < 7) week.push(null);
          weeks.push(week.slice(0, 5)); // Mon–Fri only
          week = [];
        }
      }

      const grid = weeks.map(wk => {
        const cells = wk.map(d => {
          if (!d) return `<td style="border:1px solid var(--c-border);height:70px;padding:4px"></td>`;
          const events = thisMonth.filter(o => new Date(o.date).getDate() === d);
          const isToday = new Date().getDate() === d && new Date().getMonth() === _curCalMonth && new Date().getFullYear() === _curCalYear;
          return `<td style="border:1px solid var(--c-border);height:70px;padding:4px;vertical-align:top">
            <div style="font-weight:${isToday?'700':'400'};font-size:.8rem;color:${isToday?'var(--c-blue)':'var(--c-muted)'};margin-bottom:2px">${d}</div>
            ${events.map(e => `<div style="background:#22c55e22;border-left:2px solid #22c55e;padding:1px 4px;border-radius:2px;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px" title="${e.title||e.name}">${e.title||e.name}</div>`).join('')}
          </td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
      }).join('');

      el.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:.8rem">
          <thead><tr>${DAYS.map(d=>`<th style="padding:6px;text-align:center;font-size:.75rem;color:var(--c-muted)">${d}</th>`).join('')}</tr></thead>
          <tbody>${grid || '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--c-muted)">No events this month</td></tr>'}</tbody>
        </table>`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">📅</div><h3>Calendar unavailable</h3></div>`;
    });
  }

  // ── Timetable tab ─────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_timetable'] = function() {
    const el = document.getElementById('cur-tt-body');
    if (!el) return;
    document.getElementById('ttab-planner-link')?.addEventListener('click', function(e) {
      e.preventDefault(); Wren.navigate('curriculum', 'planning');
    });
    el.addEventListener('click', function(e) {
      const link = e.target.closest('[data-navigate]');
      if (!link) return;
      e.preventDefault();
      const [section, sub] = link.dataset.navigate.split(':');
      Wren.navigate(section, sub);
    });

    // Try to load weekly plans as a timetable proxy (EYFS edition)
    Wren.api('/api/planning/weekly').then(data => {
      const plans = Array.isArray(data) ? data : (data.plans || data.weeks || []);
      if (!plans.length) {
        el.innerHTML = `
          <div class="v2-card" style="margin-bottom:16px">
            <h3 style="font-size:1rem;margin:0 0 8px">Weekly Planning View</h3>
            <p style="color:var(--c-muted);font-size:.9rem;line-height:1.5;margin-bottom:12px">
              The EYFS timetable is built through the weekly planning workflow. For Primary and Secondary editions,
              import your timetable from TimeTabler, Edval, or any CSV — then manage cover, swaps and room changes here.
            </p>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a href="/admin/curriculum/planning" data-navigate="curriculum:planning"class="btn btn-primary">Open weekly planner</a>
              <a href="/admin/curriculum/planning" data-navigate="curriculum:planning"class="btn btn-ghost">This week</a>
            </div>
          </div>
          <div class="tab-coming-soon" style="padding:24px 0">
            <div class="coming-icon">📅</div>
            <h3>No plans for this week</h3>
            <p>Create a weekly plan to see a timetable view here.</p>
          </div>`;
        return;
      }

      const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
      // Build a simple day-by-day view from the weekly plans
      const byDay = {};
      DAYS.forEach(d => { byDay[d] = []; });
      plans.forEach(p => {
        const day = p.day_of_week || p.day;
        if (day && byDay[day]) byDay[day].push(p);
        else if (!day) byDay['Monday'].push(p); // fallback
      });

      el.innerHTML = `
        <div class="v2-card" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.85rem;color:var(--c-muted)">Weekly overview · ${plans.length} activities planned</span>
          <a href="/admin/curriculum/planning" data-navigate="curriculum:planning"class="btn btn-sm btn-ghost">Full planner →</a>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
          ${DAYS.map(day => `
            <div class="v2-card">
              <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--c-muted);margin-bottom:8px">${day}</div>
              ${byDay[day].length ? byDay[day].slice(0,4).map(p => `
                <div style="padding:5px 0;border-bottom:1px solid var(--c-border);font-size:.82rem">
                  <div style="color:var(--c-text)">${p.title||p.activity||p.name||'Activity'}</div>
                  ${p.eyfs_area||p.area ? `<div style="color:var(--c-muted);font-size:.75rem">${p.eyfs_area||p.area}</div>` : ''}
                </div>`).join('') :
                `<div style="color:var(--c-border);font-size:.8rem;padding:4px 0">No plans</div>`}
            </div>`).join('')}
        </div>`;
    }).catch(() => {
      el.innerHTML = `
        <div class="v2-card" style="margin-bottom:16px">
          <h3 style="font-size:1rem;margin:0 0 8px">Timetable</h3>
          <p style="color:var(--c-muted);font-size:.9rem;line-height:1.5;margin-bottom:12px">
            For Primary and Secondary editions, import your timetable CSV from TimeTabler or Edval.
            For EYFS, the weekly planner is your timetable.
          </p>
          <a href="/admin/curriculum/planning" data-navigate="curriculum:planning"class="btn btn-primary">Open planner →</a>
        </div>`;
    });
  };

  // ── Homework tab ──────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_homework'] = function() {
    const el = document.getElementById('cur-hw-list');
    if (!el) return;

    function _load(status) {
      el.innerHTML = `<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>`;
      const url = `/api/homework` + (status ? `?status=${status}` : '');
      Wren.api(url).then(data => {
        const list = Array.isArray(data) ? data : (data.homework || []);
        if (!list.length) {
          el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
            <div class="coming-icon">📚</div>
            <h3>No homework set</h3>
            <p>Homework tasks appear here when set. This feature is used in Primary and Secondary editions.</p>
          </div>`;
          return;
        }
        el.innerHTML = list.map(h => {
          const due = h.due_date ? new Date(h.due_date) : null;
          const isOverdue = due && due < new Date() && h.status !== 'submitted';
          return `<div class="v2-card" style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div style="flex:1">
                <div style="font-weight:600;margin-bottom:4px">${h.title||h.subject||'Homework'}</div>
                ${h.class_name||h.group ? `<div style="font-size:.8rem;color:var(--c-muted);margin-bottom:4px">${h.class_name||h.group}</div>` : ''}
                ${h.description ? `<div style="font-size:.85rem;color:var(--c-muted)">${h.description}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
                ${due ? `<div style="font-size:.75rem;color:${isOverdue?'#ef4444':'var(--c-muted)'}">Due: ${due.toLocaleDateString('en-GB')}</div>` : ''}
                ${h.submission_count !== undefined ? `<span class="badge badge-blue" style="font-size:.7rem">${h.submission_count} submitted</span>` : ''}
                ${isOverdue ? `<span class="badge badge-red" style="font-size:.7rem">Overdue</span>` : ''}
              </div>
            </div>
          </div>`;
        }).join('');
      }).catch(() => {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">📚</div>
          <h3>Homework</h3>
          <p>Set homework tasks for classes, track submissions, and use the AI quiz builder. Available in Primary and Secondary editions.</p>
        </div>`;
      });
    }

    _load('');
    document.getElementById('hw-status-filter')?.addEventListener('change', e => _load(e.target.value));
  };

})();
</script>
