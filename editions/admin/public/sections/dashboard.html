<div class="v2-section" data-section="dashboard">

  <nav class="wren-tab-bar" role="tablist" aria-label="Dashboard tabs">
    <div class="tab-bar-track" id="dashboard-tab-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="today"   id="tab-dashboard-today"   aria-controls="panel-dashboard-today">Today</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="alerts"  id="tab-dashboard-alerts"  aria-controls="panel-dashboard-alerts">Alerts</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="summary" id="tab-dashboard-summary" aria-controls="panel-dashboard-summary">Summary</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- TODAY -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-today" data-tab="today" aria-labelledby="tab-dashboard-today">

      <!-- Inspection Mode entry — HIDDEN BY DEFAULT. Only the active-inspection bar
           (below) is shown when an Ofsted visit has been announced (inspection mode
           active via /api/inspection/active). These launcher buttons live here only as
           a convenience shortcut and are revealed when a visit is announced; the full
           Inspection Mode page is always reachable from the OPERATIONS nav. -->
      <div id="dash-inspection-row" style="display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <button class="dash-insp-btn dash-insp-pre" id="dash-insp-pre-btn"
          title="Ctrl+Shift+I">
          <span style="font-size:1.3rem">📋</span>
          <div>
            <div style="font-weight:700;font-size:0.9rem">Ofsted called</div>
            <div style="font-size:0.72rem;opacity:0.75">Pre-announced inspection</div>
          </div>
        </button>
        <button class="dash-insp-btn dash-insp-unannounced" id="dash-insp-unann-btn">
          <span style="font-size:1.3rem">🚨</span>
          <div>
            <div style="font-weight:700;font-size:0.9rem">Inspector on site</div>
            <div style="font-size:0.72rem;opacity:0.75">Unannounced</div>
          </div>
        </button>
      </div>
      <!-- Active inspection banner (replaces buttons when active) -->
      <div id="dash-active-inspection-bar" hidden
        style="background:#7c3aed20;border:1px solid #7c3aed40;border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer">
        <div>
          <div style="font-size:0.85rem;font-weight:700;color:#a78bfa" id="dash-active-insp-label">📋 Inspection mode active</div>
          <div style="font-size:0.72rem;color:var(--c-muted)" id="dash-active-insp-sub">Click to open inspection dashboard</div>
        </div>
        <div id="dash-insp-score-pill" style="background:#0f172a;border:2px solid #4a9abf;border-radius:100px;padding:4px 14px;font-size:0.95rem;font-weight:700;color:#4a9abf"></div>
      </div>

      <div id="dash-today-content">
        <div class="tab-skeleton">
          <div class="tab-skeleton-grid">
            <div class="tab-sk-card"></div>
            <div class="tab-sk-card"></div>
            <div class="tab-sk-card"></div>
            <div class="tab-sk-card"></div>
          </div>
          <div style="margin-top:20px"><div class="tab-sk-row w80"></div></div>
          <div class="tab-sk-row w60"></div>
          <div class="tab-sk-row w40"></div>
        </div>
      </div>
    </div>

    <!-- ALERTS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-alerts" data-tab="alerts" aria-labelledby="tab-dashboard-alerts" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Alerts</h2>
        <button class="btn btn-sm btn-ghost" id="dash-alerts-refresh-btn">↺ Refresh</button>
      </div>
      <div id="dash-alerts-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-summary" data-tab="summary" aria-labelledby="tab-dashboard-summary" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Period Summary</h2>
        <select id="dash-summary-period" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="today">Today</option>
          <option value="week" selected>This week</option>
          <option value="month">This month</option>
          <option value="term">This term</option>
        </select>
      </div>
      <div id="dash-summary-content">
        <div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>
      </div>
    </div>

  </div>
</div>

<style>
.dash-insp-btn {
  background: #1e293b;
  border: 1px solid #2d3748;
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-align: left;
  color: #f1f5f9;
  transition: all 0.2s ease;
  min-height: 60px;
}
.dash-insp-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.dash-insp-pre:hover { border-color: #4a9abf; }
.dash-insp-unannounced:hover { border-color: #ef4444; }
@media (max-width: 480px) {
  #dash-inspection-row { grid-template-columns: 1fr !important; }
}
</style>

<script>
// ── Inspection active check ───────────────────────────────────────────────────
(function _dashInspCheck() {
  document.addEventListener('wren:ready', async function () {
    try {
      // Gate the homepage inspection UI on real "inspection mode active" state.
      // The launcher row (#dash-inspection-row) is hidden by default and stays
      // hidden unless an Ofsted visit has been announced / is active.
      const data = await Wren.api('/api/inspection/active');
      if (data?.inspection) {
        const insp = data.inspection;
        // Visit announced/active → reveal the inspection UI on the homepage.
        document.getElementById('dash-inspection-row').style.display = 'none';
        const bar = document.getElementById('dash-active-inspection-bar');
        bar.hidden = false;
        document.getElementById('dash-active-insp-label').textContent =
          (insp.type === 'pre_announced' ? '📋' : '🚨') + ' Inspection mode active — ' +
          (insp.inspector_name || 'Inspector TBC');
        if (insp.expected_arrival) {
          const arr = new Date(insp.expected_arrival);
          const h = Math.max(0, Math.floor((arr - new Date()) / 3600000));
          const m = Math.max(0, Math.floor(((arr - new Date()) % 3600000) / 60000));
          document.getElementById('dash-active-insp-sub').textContent =
            arr > new Date() ? `Arrival in ${h}h ${m}m — click to open inspection dashboard` : 'Inspection in progress — click to open dashboard';
        }
        // Load score
        const rd = await Wren.api('/api/inspection/readiness').catch(() => null);
        if (rd) {
          const pill = document.getElementById('dash-insp-score-pill');
          const color = rd.pct >= 80 ? '#22c55e' : rd.pct >= 60 ? '#f59e0b' : '#ef4444';
          pill.textContent = rd.pct + '%';
          pill.style.borderColor = color;
          pill.style.color = color;
        }
      }
    } catch {}
  });
})();

// ── Button listeners ─────────────────────────────────────────────────────────
document.addEventListener('wren:ready', function() {
  document.getElementById('dash-insp-pre-btn')?.addEventListener('click', function() {
    Wren.navigate('inspection','overview');
    if (typeof WrenInspection !== 'undefined') WrenInspection.openLauncher('pre_announced');
  });
  document.getElementById('dash-insp-unann-btn')?.addEventListener('click', function() {
    Wren.navigate('inspection','overview');
    if (typeof WrenInspection !== 'undefined') WrenInspection.openLauncher('unannounced');
  });
  document.getElementById('dash-active-inspection-bar')?.addEventListener('click', function() {
    Wren.navigate('inspection','overview');
  });
  document.getElementById('dash-alerts-refresh-btn')?.addEventListener('click', dashAlertsLoad);
  document.getElementById('dash-summary-period')?.addEventListener('change', dashSummaryLoad);
  // Delegation for alert link items
  document.getElementById('dash-alerts-content')?.addEventListener('click', function(e) {
    const el = e.target.closest('[data-action="nav-alert"]');
    if (el) Wren.navigate(el.dataset.sect, el.dataset.view);
  });
});

// ── TODAY ────────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_today = function(panel) {
  Wren.api('/api/daily-briefing').then(data => {
    if (!data) return;
    const el = document.getElementById('dash-today-content');
    if (!el) return;
    const rooms = (data.rooms || []).map(r => `
      <div class="stat-card ${r.ratio_ok ? 'green' : 'red'}">
        <div class="stat-label">${r.name}</div>
        <div class="stat-value">${r.present}<span style="font-size:1rem;color:var(--c-muted)">/${r.capacity}</span></div>
        <div class="stat-label">children present · ratio ${r.ratio_label || 'OK'}</div>
      </div>`).join('');
    const birthdays=(data.birthdays||[]);
    const tasks=(data.open_tasks||data.tasks||[]);
    const visitors=(data.visitors||[]);
    el.innerHTML = `
      <div class="dash-section dash-3col" style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:20px">
        <div class="stat-card blue"><div class="stat-label">Children today</div><div class="stat-value">${data.children_present ?? '—'}</div></div>
        <div class="stat-card orange"><div class="stat-label">Staff on duty</div><div class="stat-value">${data.staff_on_duty ?? '—'}</div></div>
        <div class="stat-card green"><div class="stat-label">Rooms open</div><div class="stat-value">${data.rooms_open ?? '—'}</div></div>
        ${rooms}
      </div>
      ${birthdays.length ? `<div class="card" style="margin-bottom:12px"><div class="card-title" style="margin-bottom:8px">🎂 Birthdays today</div><div style="font-size:.85rem;color:var(--c-text)">${birthdays.map(b=>'<span style="margin-right:12px">'+b+'</span>').join('')}</div></div>` : ''}
      ${visitors.length ? `<div class="card" style="margin-bottom:12px"><div class="card-title" style="margin-bottom:8px">📋 Today's visitors</div><div style="font-size:.85rem;color:var(--c-text)">${visitors.map(v=>'<span style="margin-right:12px">'+v+'</span>').join('')}</div></div>` : ''}
      ${tasks.length ? `<div class="card" style="margin-bottom:12px"><div class="card-title" style="margin-bottom:8px">📌 Open tasks</div><div style="display:flex;flex-direction:column;gap:4px">${tasks.slice(0,5).map(t=>`<div style="font-size:.82rem;color:var(--c-text)">${t.title||t}</div>`).join('')}</div></div>` : ''}
      ${data.briefing ? `<div class="card"><div class="card-title" style="margin-bottom:8px">🤖 AI Briefing</div><p style="font-size:.875rem;line-height:1.6;color:var(--c-text)">${data.briefing}</p></div>` : ''}`;

    // Append Bradford watchlist card if any staff score > threshold
    Wren.api('/api/absence/bradford-watchlist').then(watchlist => {
      if (!watchlist || !watchlist.length) return;
      const flagged = watchlist.filter(s => s.score > 100);
      if (!flagged.length) return;
      const top3 = flagged.slice(0, 3);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.cssText = 'margin-top:12px;border-left:3px solid #f59e0b';
      card.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="card-title" style="margin:0;font-size:.82rem">Staff sickness watchlist</div>
          <a href="/admin/staff/absence-mgmt" style="font-size:.72rem;color:#4a9abf;text-decoration:none">View all →</a>
        </div>
        ${top3.map(s => {
          const col = s.score > 200 ? '#ef4444' : '#f59e0b';
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-top:1px solid #2d3748;font-size:.8rem">
            <span style="color:#f1f5f9">${s.first_name} ${s.last_name}</span>
            <span style="color:${col};font-weight:700">BF ${s.score}</span>
          </div>`;
        }).join('')}
        ${flagged.length > 3 ? `<div style="font-size:.72rem;color:#64748b;margin-top:4px">+${flagged.length - 3} more above threshold</div>` : ''}`;
      const todayContent = document.getElementById('dash-today-content');
      if (todayContent) todayContent.appendChild(card);
    }).catch(() => {});
  }).catch(() => {
    const el = document.getElementById('dash-today-content');
    if (el) el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏠</div><h3>Dashboard</h3><p>Live ratios, attendance, and today's briefing load here when the portal is running.</p></div>`;
  });
};

// ── ALERTS ───────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_alerts = function() { dashAlertsLoad(); };

async function dashAlertsLoad() {
  const el=document.getElementById('dash-alerts-content');
  if(!el) return;
  el.innerHTML='<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const alerts=[];
  try {
    // Compliance overdue/due soon
    const comp=await Wren.api('/api/compliance-events/upcoming').catch(()=>[]);
    const today=new Date();
    (comp||[]).forEach(c=>{
      const days=Math.ceil((new Date(c.next_due)-today)/86400000);
      if(days<0) alerts.push({sev:'error',icon:'🚨',title:c.title+' — OVERDUE',body:'Was due '+new Date(c.next_due).toLocaleDateString('en-GB'),link:'/admin/operations/compliance'});
      else if(days<=7) alerts.push({sev:'warning',icon:'⚠️',title:c.title+' due in '+days+'d',body:'Due '+new Date(c.next_due).toLocaleDateString('en-GB'),link:'/admin/operations/compliance'});
    });
    // Notifications
    const notifs=await Wren.api('/api/notifications/unread').catch(()=>({items:[]}));
    (notifs.items||[]).slice(0,5).forEach(n=>alerts.push({sev:'info',icon:{repair:'🔧',message:'💬',safeguarding:'🛡️',medicine:'💊',incident:'🚨'}[n.category]||'🔔',title:n.title,body:n.body,link:n.link}));
    // Comms summary unread
    const comms=await Wren.api('/api/comms/summary').catch(()=>({unread_count:0}));
    if((comms.unread_count||0)>0) alerts.push({sev:'info',icon:'💬',title:comms.unread_count+' unread parent message'+(comms.unread_count!==1?'s':''),body:'',link:'/admin/communications/messaging'});
    // Unreviewed calls
    const calls=await Wren.api('/api/comms/calls?reviewed=no&page=1').catch(()=>({total:0}));
    if((calls.total||0)>0) alerts.push({sev:'warning',icon:'📞',title:calls.total+' Aria call'+(calls.total!==1?'s':'')+' need review',body:'',link:'/admin/communications/aria'});
  } catch(e) {}

  if(!alerts.length) {
    el.innerHTML='<div class="tab-coming-soon"><div class="coming-icon">✅</div><h3>All clear</h3><p>No active alerts right now.</p></div>';
    return;
  }
  const sevOrder={error:0,warning:1,info:2};
  alerts.sort((a,b)=>(sevOrder[a.sev]||2)-(sevOrder[b.sev]||2));
  const sevStyle={
    error:'background:rgba(239,68,68,.1);border-left:3px solid #ef4444',
    warning:'background:rgba(245,158,11,.08);border-left:3px solid #f59e0b',
    info:'background:rgba(74,154,191,.08);border-left:3px solid #4a9abf',
  };
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">
    ${alerts.map(a=>`
      <div style="${sevStyle[a.sev]||sevStyle.info};border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:${a.link?'pointer':'default'}"
           ${a.link?`data-action="nav-alert" data-sect="${a.link.replace('/admin/','').split('/')[0]}" data-view="${a.link.replace('/admin/','').split('/')[1]||''}"`:''}>
        <span style="font-size:1.1rem">${a.icon}</span>
        <div>
          <div style="font-size:.85rem;font-weight:700;color:#f1f5f9">${a.title}</div>
          ${a.body?`<div style="font-size:.75rem;color:#94a3b8;margin-top:2px">${a.body}</div>`:''}
        </div>
      </div>`).join('')}
  </div>`;
}

// ── SUMMARY ──────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_summary = function() { dashSummaryLoad(); };

async function dashSummaryLoad() {
  const el=document.getElementById('dash-summary-content');
  if(!el) return;
  el.innerHTML='<div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>';
  const period=document.getElementById('dash-summary-period')?.value||'week';
  try {
    const [overview, invoices] = await Promise.all([
      Wren.api('/api/admin/overview').catch(()=>null),
      Wren.api('/api/finance/invoices?limit=1&summary=1').catch(()=>null),
    ]);
    const kpis=[
      {label:'Total children', value:overview?.total_children??'—', color:'blue'},
      {label:'Enrolment capacity', value:overview?.capacity_pct!=null?overview.capacity_pct+'%':'—', color:'orange'},
      {label:'Staff (active)', value:overview?.total_staff??'—', color:'green'},
      {label:'Avg attendance', value:overview?.attendance_rate!=null?overview.attendance_rate+'%':'—', color:'blue'},
      {label:'Open enquiries', value:overview?.open_enquiries??'—', color:'orange'},
      {label:'Awaiting DBS renewal', value:overview?.dbs_expiring_soon??'—', color:overview?.dbs_expiring_soon>0?'red':'green'},
      {label:'Overdue invoices', value:overview?.overdue_invoices??'—', color:overview?.overdue_invoices>0?'red':'green'},
      {label:'Safeguarding open', value:overview?.open_safeguarding??'—', color:overview?.open_safeguarding>0?'red':'green'},
    ];
    el.innerHTML=`<div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:20px">
      ${kpis.map(k=>`<div class="stat-card ${k.color}"><div class="stat-label">${k.label}</div><div class="stat-value">${k.value}</div></div>`).join('')}
    </div>
    ${overview?.notes?`<div class="card"><div class="card-title" style="margin-bottom:8px">📝 Notes</div><p style="font-size:.85rem;color:var(--c-text)">${overview.notes}</p></div>`:''}`;
  } catch(e) {
    el.innerHTML=`<div class="tab-coming-soon"><div class="coming-icon">📊</div><h3>Summary</h3><p>${e.message}</p></div>`;
  }
}
</script>
