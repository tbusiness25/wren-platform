<script>
function _opsEsc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function _opsRelTime(ts){
  if(!ts)return'—';
  const m=Math.floor((Date.now()-new Date(ts))/60000);
  if(m<1)return'Just now';
  if(m<60)return m+'m ago';
  const h=Math.floor(m/60);
  if(h<24)return h+'h ago';
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function _opsDate(d){ return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—'; }
function _opsTime(d){ return d?new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/London'}):'—'; }

window.wrenLoadTab_operations_kitchen = function() { opsKitchenLoad(); };

async function opsKitchenLoad() {
  const el=document.getElementById('ops-kitchen-content');
  if(!el) return;
  try {
    const [today, allergens] = await Promise.all([
      Wren.api('/api/menus/today').catch(()=>null),
      Wren.api('/api/menus/children-allergens').catch(()=>null),
    ]);
    let html='';
    const kids=(allergens||[]).filter(c=>c.allergens && c.allergens.length);
    if(kids.length) {
      html+=`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 14px;margin-bottom:16px">
        <div style="font-size:.78rem;font-weight:700;color:#ef4444;margin-bottom:6px">⚠ Allergen summary — ${kids.length} children with restrictions</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${kids.slice(0,6).map(c=>`<span style="font-size:.72rem;background:rgba(239,68,68,.15);color:#ef4444;padding:2px 8px;border-radius:4px">${_opsEsc(c.first_name)}: ${_opsEsc((c.allergens||[]).join(', '))}</span>`).join('')}
          ${kids.length>6?`<span style="font-size:.72rem;color:#94a3b8">+${kids.length-6} more — see kitchen manager</span>`:''}
        </div>
      </div>`;
    }
    const plans=(today&&today.plans)||[];
    if(plans.length) {
      const byDay={};
      plans.forEach(p=>{byDay[p.day_of_week]=byDay[p.day_of_week]||[];byDay[p.day_of_week].push(p);});
      const dayAbbr=['MON','TUE','WED','THU','FRI'];
      const roomLabel=r=>r==='preschool'?'Pre-school':r==='baby'?'Baby room':(r||'').replace(/\b\w/g,x=>x.toUpperCase());
      const mealLabel=m=>(m||'').replace(/\b\w/g,x=>x.toUpperCase());
      html+=`<div class="menu-grid">
        ${[1,2,3,4,5].map((d,i)=>{
          const items=byDay[d]||[];
          return `<div class="menu-day">
            <div class="menu-day-hd">${dayAbbr[i]}</div>
            ${items.map(p=>{
              const codes=(p.allergen_codes_display||[]).map(c=>`<span style="font-size:.62rem;background:rgba(239,68,68,.2);color:#f87171;border-radius:3px;padding:1px 4px;margin-left:3px">${_opsEsc(c)}</span>`).join('');
              return `<span class="menu-item-chip" title="${_opsEsc(p.recipe_name)}">${_opsEsc(roomLabel(p.room))} · ${_opsEsc(mealLabel(p.meal_type))} · ${_opsEsc(p.recipe_name)}${codes}</span>`;
            }).join('')}
            ${!items.length?'<span style="font-size:.72rem;color:#475569">No menu</span>':''}
          </div>`;
        }).join('')}
      </div>`;
    } else {
      html+=`<div class="tab-coming-soon" style="margin-top:0">
        <div class="coming-icon">🍽️</div>
        <h3>No menu this week</h3>
        <p>Use the kitchen manager to build the weekly menu.</p>
        <a href="/kitchen.html" class="btn btn-sm btn-primary" style="margin-top:8px">Open Kitchen Manager</a>
      </div>`;
    }
    el.innerHTML=html;
  } catch(e) {
    el.innerHTML=`<div class="tab-coming-soon"><div class="coming-icon">🍽️</div><h3>Kitchen</h3><p>${_opsEsc(e.message)}</p></div>`;
  }
}

// ─────────────────────────────────────── REPAIRS ────────────────────────────
window.wrenLoadTab_operations_repairs = function() { opsRepairsLoad(); };

async function opsRepairsLoad() {
  const tbody=document.getElementById('ops-repairs-tbody');
  if(!tbody) return;
  tbody.innerHTML='<tr><td colspan="6" style="padding:20px;text-align:center;color:#64748b">Loading…</td></tr>';
  const status=document.getElementById('repairs-status-filter')?.value||'';
  const priority=document.getElementById('repairs-priority-filter')?.value||'';
  try {
    const qs=new URLSearchParams({...(status?{status}:{}),...(priority?{priority}:{})});
    const data=await Wren.api('/api/repairs'+(qs.toString()?'?'+qs:''));
    const repairs=data.repairs||data||[];
    if(!repairs.length){
      tbody.innerHTML='<tr><td colspan="6" style="padding:20px;text-align:center;color:#64748b">No repairs found — all good! 🎉</td></tr>';
      return;
    }
    tbody.innerHTML=repairs.map(r=>`
      <tr data-action="ops-repairs-open" data-id="${r.id}" style="cursor:pointer">
        <td><strong>${_opsEsc(r.title||r.description?.substring(0,40)||'—')}</strong></td>
        <td style="color:#94a3b8">${_opsEsc(r.location||'—')}</td>
        <td><span class="ops-badge ops-b-${r.priority||'low'}">${r.priority||'—'}</span></td>
        <td><span class="ops-badge ops-b-${(r.status||'open').replace('_','-')}">${(r.status||'open').replace('_',' ')}</span></td>
        <td style="color:#64748b;white-space:nowrap">${_opsDate(r.reported_at||r.created_at)}</td>
        <td style="color:#94a3b8">${r.cost_estimate?'£'+parseFloat(r.cost_estimate).toFixed(2):'—'}</td>
      </tr>`).join('');
    window._opsRepairsData=repairs;
  } catch(e) {
    tbody.innerHTML=`<tr><td colspan="6" style="padding:16px;color:#ef4444">Error: ${_opsEsc(e.message)}</td></tr>`;
  }
}

function opsRepairsOpen(id) {
  const r=(window._opsRepairsData||[]).find(x=>x.id===id);
  if(!r) return;
  const html=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <span class="ops-badge ops-b-${r.priority||'low'}">${r.priority||'low'} priority</span>
      <span class="ops-badge ops-b-${(r.status||'open').replace('_','-')}">${(r.status||'open').replace('_',' ')}</span>
    </div>
    ${r.description?`<div style="font-size:.85rem;color:#f1f5f9;margin-bottom:12px;line-height:1.5">${_opsEsc(r.description)}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.8rem;margin-bottom:12px">
      <div><span style="color:#64748b">Location</span><div style="color:#f1f5f9">${_opsEsc(r.location||'—')}</div></div>
      <div><span style="color:#64748b">Reported</span><div style="color:#f1f5f9">${_opsDate(r.reported_at||r.created_at)}</div></div>
      <div><span style="color:#64748b">Assigned to</span><div style="color:#f1f5f9">${_opsEsc(r.assigned_to||'Unassigned')}</div></div>
      <div><span style="color:#64748b">Cost estimate</span><div style="color:#f1f5f9">${r.cost_estimate?'£'+parseFloat(r.cost_estimate).toFixed(2):'—'}</div></div>
    </div>
    ${!r.resolved_at?`<div style="display:flex;gap:8px">
      <button class="btn btn-sm btn-primary" data-action="ops-repairs-resolve" data-id="${r.id}">Mark Resolved</button>
    </div>`:'<div style="color:#22c55e;font-size:.8rem">✓ Resolved '+_opsDate(r.resolved_at)+'</div>'}`;
  Wren.openDrawer(html, r.title||'Repair #'+r.id);
}

async function opsRepairsResolve(id) {
  try {
    await Wren.api(`/api/repairs/${id}/resolve`,{method:'POST'});
    Wren.toast('Marked resolved','success');
    Wren.closeDrawer();
    opsRepairsLoad();
  } catch(e){ Wren.toast('Error: '+e.message,'error'); }
}

function opsRepairsNew() {
  const html=`
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><label style="font-size:.72rem;color:#64748b;display:block;margin-bottom:4px">Title</label>
        <input id="nr-title" style="width:100%;background:#1e293b;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:.85rem;box-sizing:border-box" placeholder="e.g. Broken gate latch"></div>
      <div><label style="font-size:.72rem;color:#64748b;display:block;margin-bottom:4px">Description</label>
        <textarea id="nr-desc" style="width:100%;background:#1e293b;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:.85rem;resize:vertical;min-height:80px;box-sizing:border-box;font-family:inherit"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="font-size:.72rem;color:#64748b;display:block;margin-bottom:4px">Location</label>
          <input id="nr-loc" style="width:100%;background:#1e293b;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:#64748b;display:block;margin-bottom:4px">Priority</label>
          <select id="nr-prio" style="width:100%;background:#1e293b;border:1px solid #2d3748;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:.85rem">
            <option value="low">Low</option><option value="medium" selected>Medium</option>
            <option value="high">High</option><option value="critical">Critical</option>
          </select></div>
      </div>
      <button class="btn btn-sm btn-primary" data-action="ops-repairs-submit-new">Log Issue</button>
    </div>`;
  Wren.modal('Log New Issue', html);
}

async function opsRepairsSubmitNew() {
  const title=document.getElementById('nr-title')?.value?.trim();
  if(!title){Wren.toast('Title required','warning');return;}
  const body={
    title,
    description:document.getElementById('nr-desc')?.value||'',
    location:document.getElementById('nr-loc')?.value||'',
    priority:document.getElementById('nr-prio')?.value||'medium',
  };
  try {
    await Wren.api('/api/repairs',{method:'POST',body});
    Wren.toast('Issue logged','success');
    document.querySelector('.wren-modal-overlay')?.querySelector('.modal-close')?.click();
    opsRepairsLoad();
  } catch(e){ Wren.toast('Error: '+e.message,'error'); }
}

window['wrenLoadTab_operations_clock-in-out'] = function() { opsClockRefresh(); };

async function opsClockRefresh() {
  const live=document.getElementById('ops-clock-live');
  const tbody=document.getElementById('ops-clock-tbody');
  if(!live||!tbody) return;
  live.innerHTML='<div class="tab-skeleton" style="grid-column:span 4"><div class="tab-sk-card"></div></div>';
  tbody.innerHTML='<tr><td colspan="5" style="padding:16px;text-align:center;color:#64748b">Loading…</td></tr>';
  try {
    const data=await Wren.api('/api/clockin/today');
    const shifts=data.shifts||data||[];
    const active=shifts.filter(s=>s.clock_in_time&&!s.clock_out_time);
    const all=shifts;
    // Live view
    if(!active.length){
      live.innerHTML='<div style="color:#475569;font-size:.85rem;grid-column:span 4;padding:8px 0">No staff currently clocked in</div>';
    } else {
      live.innerHTML=active.map(s=>{
        const ch=(s.first_name||'?').charAt(0).toUpperCase();
        const bg='#4a9abf';
        return `<div class="clock-card clocked-in">
          <div class="clock-avatar" style="background:${bg}22;color:${bg}">${ch}</div>
          <div>
            <div class="clock-name">${_opsEsc(s.first_name||'')}</div>
            <div class="clock-status" style="color:#22c55e">In since ${_opsTime(s.clock_in_time)}</div>
          </div>
        </div>`;
      }).join('');
    }
    // Today table
    if(!all.length){
      tbody.innerHTML='<tr><td colspan="5" style="padding:16px;text-align:center;color:#64748b">No clock-in records today</td></tr>';
      return;
    }
    tbody.innerHTML=all.map(s=>{
      const hrs=s.clock_in_time&&s.clock_out_time?((new Date(s.clock_out_time)-new Date(s.clock_in_time))/3600000).toFixed(1):(s.clock_in_time?'active':'—');
      return `<tr>
        <td><strong>${_opsEsc(s.first_name+' '+(s.last_name||''))}</strong></td>
        <td>${_opsTime(s.clock_in_time)}</td>
        <td>${_opsTime(s.clock_out_time)}</td>
        <td>${hrs==='active'?'<span style="color:#22c55e">Active</span>':hrs==='—'?'—':hrs+'h'}</td>
        <td><span class="ops-badge ${s.clock_out_time?'ops-b-done':'ops-b-progress'}">${s.clock_out_time?'Done':'In'}</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    live.innerHTML=`<div style="color:#ef4444;font-size:.85rem">${_opsEsc(e.message)}</div>`;
    tbody.innerHTML=`<tr><td colspan="5" style="padding:16px;color:#ef4444">Error: ${_opsEsc(e.message)}</td></tr>`;
  }
}

// ─────────────────────────────────────── COMPLIANCE ─────────────────────────
window.wrenLoadTab_operations_compliance = function() { opsCompLoad(); };

async function opsCompLoad() {
  const el=document.getElementById('ops-comp-content');
  if(!el) return;
  el.innerHTML='<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  try {
    const rows=await Wren.api('/api/compliance-events/upcoming');
    if(!rows||!rows.length){
      el.innerHTML='<div class="tab-coming-soon"><div class="coming-icon">✅</div><h3>All clear</h3><p>No compliance events due in the next 30 days.</p></div>';
      return;
    }
    const today=new Date();
    el.innerHTML=`<div style="background:#1e293b;border:1px solid #2d3748;border-radius:12px;overflow:hidden">
      ${rows.map(r=>{
        const due=new Date(r.next_due);
        const days=Math.ceil((due-today)/86400000);
        let cls='comp-ok', label=days+'d';
        if(days<0){cls='comp-overdue';label='OVERDUE';}
        else if(days<=7){cls='comp-soon';}
        return `<div class="comp-row">
          <div class="comp-name">${_opsEsc(r.title)}</div>
          <span class="comp-cat">${_opsEsc(r.category||'general')}</span>
          <div class="comp-due">Due ${_opsDate(r.next_due)}</div>
          <span class="comp-days ${cls}">${label}</span>
          <button class="btn btn-sm btn-ghost" data-action="ops-comp-ack" data-id="${r.id}" style="margin-left:8px;font-size:.72rem">✓ Acknowledge</button>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:12px;font-size:.75rem;color:#64748b">Showing events due in the next 30 days. <a href="/compliance.html" style="color:#4a9abf">View all compliance events →</a></div>`;
  } catch(e) {
    el.innerHTML=`<div class="tab-coming-soon"><div class="coming-icon">✅</div><h3>Compliance</h3><p>${_opsEsc(e.message)}</p></div>`;
  }
}

async function opsCompAck(id) {
  try {
    await Wren.api(`/api/compliance-events/${id}/acknowledge`,{method:'POST'});
    Wren.toast('Event acknowledged — next due advanced','success');
    opsCompLoad();
  } catch(e){ Wren.toast('Error: '+e.message,'error'); }
}

// ── Inline handler migration ────────────────────────────────────────────────
(function() {
  const el = document.getElementById('btn-ops-repairs-new');
  if (el) el.addEventListener('click', opsRepairsNew);
  const sf = document.getElementById('repairs-status-filter');
  if (sf) sf.addEventListener('change', opsRepairsLoad);
  const pf = document.getElementById('repairs-priority-filter');
  if (pf) pf.addEventListener('change', opsRepairsLoad);
  const cr = document.getElementById('btn-ops-clock-refresh');
  if (cr) cr.addEventListener('click', opsClockRefresh);
})();

document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  if (el.dataset.action === 'ops-repairs-open') opsRepairsOpen(+el.dataset.id);
  else if (el.dataset.action === 'ops-repairs-resolve') opsRepairsResolve(+el.dataset.id);
  else if (el.dataset.action === 'ops-repairs-submit-new') opsRepairsSubmitNew();
  else if (el.dataset.action === 'ops-comp-ack') opsCompAck(+el.dataset.id);
});
