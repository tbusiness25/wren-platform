<div class="v2-section" data-section="safeguarding">

  <!-- Inspection Mode quick-entry strip -->
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button id="btn-sg-ofsted-pre" class="btn btn-sm" hidden style="background:#7c3aed20;color:#a78bfa;border:1px solid #7c3aed40;font-weight:600">
      📋 Ofsted called — pre-announced
    </button>
    <button id="btn-sg-ofsted-unan" class="btn btn-sm" hidden style="background:#ef444420;color:#ef4444;border:1px solid #ef444440;font-weight:600">
      🚨 Inspector on site — unannounced
    </button>
    <button id="btn-sg-inspect-nav" class="btn btn-sm btn-ghost" style="margin-left:auto">
      Inspection Mode →
    </button>
  </div>

  <nav class="wren-tab-bar" role="tablist" aria-label="Safeguarding tabs">
    <div class="tab-bar-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="concerns"       id="tab-sg-concerns"  aria-controls="panel-sg-concerns">Concerns</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="sign-off-queue"  id="tab-sg-queue"     aria-controls="panel-sg-queue">Sign-off Queue</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="log"             id="tab-sg-log"       aria-controls="panel-sg-log">Log</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="audit"           id="tab-sg-audit"     aria-controls="panel-sg-audit">Audit</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- CONCERNS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-sg-concerns" data-tab="concerns" aria-labelledby="tab-sg-concerns">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Active Concerns</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select class="v2-sort-select" id="sg-status-filter" aria-label="Filter by status">
            <option value="">All open</option>
            <option value="new">New</option>
            <option value="under_review">Under review</option>
            <option value="action_taken">Action taken</option>
            <option value="referred">Referred</option>
          </select>
          <button class="btn btn-sm btn-primary" id="btn-sg-log-concern" style="white-space:nowrap">+ Log new concern</button>
          <a href="/admin/safeguarding/concerns" class="btn btn-sm btn-ghost">Full view →</a>
        </div>
      </div>
      <div id="sg-stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:16px"></div>
      <div id="sg-concerns-list">
        <div class="tab-skeleton"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div>
      </div>
    </div>

    <!-- SIGN-OFF QUEUE -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-sg-queue" data-tab="sign-off-queue" aria-labelledby="tab-sg-queue" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Manager Sign-off Queue</h2>
      </div>
      <div id="sg-queue-list">
        <div class="tab-skeleton"><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div>
      </div>
    </div>

    <!-- LOG -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-sg-log" data-tab="log" aria-labelledby="tab-sg-log" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Safeguarding Log</h2>
        <div style="display:flex;gap:8px">
          <span style="font-size:.8rem;color:var(--c-muted);line-height:32px">Read-only · Ofsted printable</span>
          <button id="btn-sg-print" class="btn btn-sm btn-ghost">Print</button>
        </div>
      </div>
      <div id="sg-log-list">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- AUDIT -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-sg-audit" data-tab="audit" aria-labelledby="tab-sg-audit" hidden>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Safeguarding Audit</h2>
        <span style="font-size:.8rem;color:var(--c-muted)">Access log for ICO/DfE requests</span>
      </div>
      <div id="sg-audit-list">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  'use strict';

  function _isDSL() {
    const u = Wren.user;
    return u && ['manager','deputy_manager','admin'].includes(u.role);
  }

  function _dslGuard(el) {
    if (_isDSL()) return true;
    el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
      <div class="coming-icon">🔒</div>
      <h3>DSL access only</h3>
      <p>Safeguarding records are restricted to the Designated Safeguarding Lead and management team.</p>
    </div>`;
    return false;
  }

  const STATUS_BADGE = {
    new: 'badge-red', under_review: 'badge-yellow', action_taken: 'badge-blue',
    referred: 'badge-purple', closed: 'badge-green'
  };
  const STATUS_LABEL = {
    new: 'New', under_review: 'Under review', action_taken: 'Action taken',
    referred: 'Referred to LA', closed: 'Closed'
  };

  function _concernCard(c, readOnly) {
    const age = c.concerns_30d && parseInt(c.concerns_30d) > 1 ?
      `<span class="badge badge-red" style="font-size:.7rem">${c.concerns_30d} in 30d</span>` : '';

    return `<div class="v2-card sg-concern-card" style="cursor:pointer;margin-bottom:10px;border-left:3px solid ${c.status==='new'?'#ef4444':c.status==='under_review'?'#f59e0b':'var(--c-border)'}" data-action="open-concern" data-id="${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div style="flex:1">
          <div style="font-weight:600;color:var(--c-text)">${c.child_name||'—'}</div>
          <div style="font-size:.8rem;color:var(--c-muted)">${c.child_dob ? 'DOB: ' + new Date(c.child_dob).toLocaleDateString('en-GB') : ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span class="badge ${STATUS_BADGE[c.status]||'badge-blue'}" style="font-size:.7rem">${STATUS_LABEL[c.status]||c.status}</span>
          ${age}
        </div>
      </div>
      <div style="font-size:.85rem;color:var(--c-text);margin-bottom:6px;line-height:1.4">${(c.concern_description||c.description||'').substring(0,200)}${(c.concern_description||c.description||'').length > 200 ? '…' : ''}</div>
      <div style="display:flex;gap:12px;font-size:.75rem;color:var(--c-muted)">
        <span>📅 ${new Date(c.concern_date||c.created_at).toLocaleDateString('en-GB')}</span>
        ${c.reporter_name ? `<span>👤 ${c.reporter_name}</span>` : ''}
        ${c.dsl_name ? `<span>🔑 DSL: ${c.dsl_name}</span>` : ''}
        ${c.is_confidential ? `<span class="badge badge-red" style="font-size:.65rem">Confidential</span>` : ''}
      </div>
    </div>`;
  }

  // ── Concerns tab ──────────────────────────────────────────────────────────────

  window['wrenLoadTab_safeguarding_concerns'] = function() {
    const statsEl = document.getElementById('sg-stats');
    const listEl  = document.getElementById('sg-concerns-list');
    if (!listEl) return;
    if (!_dslGuard(listEl)) return;

    Wren.api('/api/safeguarding/stats').then(stats => {
      if (statsEl) statsEl.innerHTML = `
        <div class="v2-stat-card" style="border-color:#ef4444">
          <div class="stat-num" style="color:#ef4444">${stats.new_count||0}</div>
          <div class="stat-label">New</div>
        </div>
        <div class="v2-stat-card" style="border-color:#f59e0b">
          <div class="stat-num" style="color:#f59e0b">${stats.under_review_count||0}</div>
          <div class="stat-label">Under review</div>
        </div>
        <div class="v2-stat-card">
          <div class="stat-num">${stats.action_taken_count||0}</div>
          <div class="stat-label">Action taken</div>
        </div>
        <div class="v2-stat-card">
          <div class="stat-num" style="color:#a78bfa">${stats.referred_count||0}</div>
          <div class="stat-label">Referred</div>
        </div>
        <div class="v2-stat-card">
          <div class="stat-num">${stats.open_count||0}</div>
          <div class="stat-label">Total open</div>
        </div>
        ${stats.cp_count > 0 ? `<div class="v2-stat-card" style="border-color:#a78bfa"><div class="stat-num" style="color:#a78bfa">${stats.cp_count}</div><div class="stat-label">CP register</div></div>` : ''}`;
    }).catch(() => {});

    function _load(status) {
      listEl.innerHTML = `<div class="tab-skeleton"><div class="tab-sk-card"></div></div>`;
      const url = `/api/safeguarding?limit=50` + (status ? `&status=${status}` : '');
      Wren.api(url).then(rows => {
        const open = status ? rows : rows.filter(r => r.status !== 'closed');
        if (!open.length) {
          listEl.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
            <div class="coming-icon">🛡️</div>
            <h3>No ${status||'open'} concerns</h3>
            <p>All safeguarding concerns will appear here for DSL review.</p>
          </div>`;
          return;
        }
        listEl.innerHTML = open.map(c => _concernCard(c, false)).join('');
      }).catch(() => {
        listEl.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">🛡️</div>
          <h3>Safeguarding</h3>
          <p>Could not load concerns. Check the server is running.</p>
          <a href="/admin/safeguarding/concerns" class="btn btn-ghost" style="margin-top:8px">Open safeguarding →</a>
        </div>`;
      });
    }

    _load('');
    document.getElementById('sg-status-filter')?.addEventListener('change', e => _load(e.target.value));
  };

  // ── Sign-off Queue tab ────────────────────────────────────────────────────────

  window['wrenLoadTab_safeguarding_sign-off-queue'] = function() {
    const el = document.getElementById('sg-queue-list');
    if (!el) return;
    if (!_dslGuard(el)) return;

    Wren.api('/api/safeguarding?status=under_review&limit=50').then(rows => {
      if (!rows.length) {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">✅</div>
          <h3>Queue clear</h3>
          <p>No concerns awaiting manager sign-off.</p>
        </div>`;
        return;
      }
      el.innerHTML = `<p style="font-size:.85rem;color:var(--c-muted);margin-bottom:12px">${rows.length} concern${rows.length!==1?'s':''} awaiting countersignature.</p>` +
        rows.map(c => `
          <div class="v2-card" style="margin-bottom:10px;border-left:3px solid #f59e0b;cursor:pointer" data-action="open-concern" data-id="${c.id}">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-weight:600">${c.child_name||'—'}</span>
              <span style="font-size:.75rem;color:var(--c-muted)">${new Date(c.concern_date||c.created_at).toLocaleDateString('en-GB')}</span>
            </div>
            <div style="font-size:.85rem;color:var(--c-text);margin-bottom:8px">${(c.concern_description||'').substring(0,150)}…</div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-sm btn-primary" data-action="sign-off" data-id="${c.id}">Sign off</button>
              <button class="btn btn-sm btn-ghost" data-action="open-concern" data-id="${c.id}">View case</button>
            </div>
          </div>`).join('');
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">✍️</div>
        <h3>Sign-off Queue</h3>
        <p>Concerns pending manager countersignature appear here.</p>
      </div>`;
    });
  };

  window._sgSignOff = function(id) {
    Wren.modal('Sign off concern', `
      <p style="margin-bottom:12px">Add review notes before signing off this concern.</p>
      <textarea class="wren-textarea" id="sg-signoff-notes" placeholder="Review notes…" style="width:100%;min-height:80px"></textarea>
      <select class="wren-select" id="sg-signoff-action" style="width:100%;margin-top:8px">
        <option value="action_taken">Action taken internally</option>
        <option value="referred">Referred to Local Authority</option>
        <option value="closed">No further action — close</option>
      </select>`, [
      { label: 'Sign off', class: 'btn-primary', close: false, action: () => {
        const notes = document.getElementById('sg-signoff-notes')?.value?.trim();
        const status = document.getElementById('sg-signoff-action')?.value || 'action_taken';
        Wren.api(`/api/safeguarding/${id}`, { method: 'PUT', body: { status, dsl_notes: notes, dsl_reviewed_by: Wren.user?.id }})
          .then(() => {
            Wren.toast('Concern signed off', 'success');
            document.querySelector('.wren-modal-overlay .modal-close')?.click();
          })
          .catch(() => Wren.toast('Could not update concern', 'error'));
      }},
      { label: 'Cancel', class: 'btn-ghost' },
    ]);
  };

  // ── Log tab ───────────────────────────────────────────────────────────────────

  window['wrenLoadTab_safeguarding_log'] = function() {
    const el = document.getElementById('sg-log-list');
    if (!el) return;
    if (!_dslGuard(el)) return;

    Wren.api('/api/safeguarding?limit=200').then(rows => {
      if (!rows.length) {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">📋</div><h3>No records</h3>
        </div>`;
        return;
      }
      el.innerHTML = `
        <p style="font-size:.8rem;color:var(--c-muted);margin-bottom:12px">Read-only chronological log. ${rows.length} record${rows.length!==1?'s':''}. Last updated ${new Date(rows[0].concern_date||rows[0].created_at).toLocaleString('en-GB')}.</p>
        <div class="obs-timeline">` + rows.map(c => `
          <div class="obs-item">
            <div class="obs-meta" style="display:flex;justify-content:space-between">
              <span><strong>${c.child_name||'—'}</strong></span>
              <div style="display:flex;gap:6px">
                <span class="badge ${STATUS_BADGE[c.status]||'badge-blue'}" style="font-size:.7rem">${STATUS_LABEL[c.status]||c.status}</span>
                <span style="color:var(--c-muted)">${new Date(c.concern_date||c.created_at).toLocaleDateString('en-GB')}</span>
              </div>
            </div>
            <div style="font-size:.85rem;margin-top:4px;line-height:1.4">${c.concern_description||c.description||''}</div>
            <div style="font-size:.75rem;color:var(--c-muted);margin-top:4px">
              Reported by: ${c.reporter_name||'—'} ${c.dsl_name ? '· DSL: '+c.dsl_name : ''}
            </div>
          </div>`).join('') + `</div>`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">📋</div>
        <h3>Safeguarding Log</h3>
        <p>Full chronological record of all concerns, referrals, and follow-up actions.</p>
      </div>`;
    });
  };

  // ── Audit tab ─────────────────────────────────────────────────────────────────

  window['wrenLoadTab_safeguarding_audit'] = function() {
    const el = document.getElementById('sg-audit-list');
    if (!el) return;
    if (!_dslGuard(el)) return;

    Wren.api('/api/audit?entity=safeguarding&limit=100').then(rows => {
      const list = Array.isArray(rows) ? rows : (rows.audit || rows.entries || []);
      if (!list.length) {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">🛡️</div>
          <h3>No audit events yet</h3>
          <p>Every access to a safeguarding record is logged here for ICO/DfE requests.</p>
        </div>`;
        return;
      }
      el.innerHTML = `
        <p style="font-size:.8rem;color:var(--c-muted);margin-bottom:12px">${list.length} audit event${list.length!==1?'s':''}. Exportable for ICO requests.</p>
        <table class="wren-table" style="width:100%">
          <thead><tr>
            <th>When</th><th>Who</th><th>Action</th><th>Record</th>
          </tr></thead>
          <tbody>` + list.map(e => `
            <tr>
              <td style="padding:8px;font-size:.8rem;white-space:nowrap">${new Date(e.created_at||e.timestamp).toLocaleString('en-GB')}</td>
              <td style="padding:8px;font-size:.85rem">${e.user_name||e.actor||'—'}</td>
              <td style="padding:8px;font-size:.85rem">${e.action||'access'}</td>
              <td style="padding:8px;font-size:.8rem;color:var(--c-muted)">${e.entity_id ? 'Concern #'+e.entity_id : '—'}</td>
            </tr>`).join('') +
          `</tbody></table>
          <button class="btn btn-sm btn-ghost" data-action="export-audit" style="margin-top:12px">Export CSV</button>`;

      window._sgExportAudit = function() {
        const header = 'When,Who,Action,Record\n';
        const csv = list.map(e =>
          `"${new Date(e.created_at||e.timestamp).toLocaleString('en-GB')}","${e.user_name||'—'}","${e.action||'access'}","${e.entity_id||''}"`
        ).join('\n');
        const blob = new Blob([header + csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `safeguarding-audit-${new Date().toISOString().split('T')[0]}.csv`;
        a.click(); URL.revokeObjectURL(url);
      };
      el.querySelector('[data-action="export-audit"]')?.addEventListener('click', window._sgExportAudit);

    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">🛡️</div>
        <h3>Audit log</h3>
        <p>Access log for every safeguarding record view and edit. Exportable for ICO requests.</p>
      </div>`;
    });
  };

  // ── Concern detail drawer ─────────────────────────────────────────────────────

  window._sgOpenConcern = function(id) {
    Wren.api(`/api/safeguarding/${id}`).then(c => {
      const content = `
        <div style="padding:4px 0 16px">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
            <span class="badge ${STATUS_BADGE[c.status]||'badge-blue'}">${STATUS_LABEL[c.status]||c.status}</span>
            ${c.is_confidential ? '<span class="badge badge-red">Confidential</span>' : ''}
            ${c.concern_category ? `<span class="badge badge-purple">${c.concern_category}</span>` : ''}
          </div>
          <div class="drawer-info-grid" style="margin-bottom:12px">
            <div class="drawer-info-row"><span>Child</span><span>${c.child_name||'—'}</span></div>
            <div class="drawer-info-row"><span>Date</span><span>${new Date(c.concern_date||c.created_at).toLocaleDateString('en-GB')}</span></div>
            ${c.reporter_name ? `<div class="drawer-info-row"><span>Reported by</span><span>${c.reporter_name}</span></div>` : ''}
            ${c.dsl_name ? `<div class="drawer-info-row"><span>DSL</span><span>${c.dsl_name}</span></div>` : ''}
          </div>
          <h4 style="font-size:.8rem;color:var(--c-muted);text-transform:uppercase;margin-bottom:8px">Concern description</h4>
          <p style="line-height:1.6;font-size:.9rem;background:var(--c-bg);padding:12px;border-radius:6px;border:1px solid var(--c-border)">${c.concern_description||c.description||'No description recorded.'}</p>
          ${c.immediate_action ? `<h4 style="font-size:.8rem;color:var(--c-muted);text-transform:uppercase;margin:12px 0 8px">Immediate action</h4><p style="font-size:.9rem;line-height:1.5">${c.immediate_action}</p>` : ''}
          ${c.dsl_notes ? `<h4 style="font-size:.8rem;color:var(--c-muted);text-transform:uppercase;margin:12px 0 8px">DSL notes</h4><p style="font-size:.9rem;line-height:1.5">${c.dsl_notes}</p>` : ''}
          ${_isDSL() ? `<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
            <button class="btn btn-sm btn-primary" data-action="sg-signoff" data-id="${c.id}">Update status</button>
            <button class="btn btn-sm btn-ghost" data-action="sg-lado" data-id="${c.id}" title="Pre-fill the Ealing LADO referral form from this concern">📄 Generate LADO referral</button>
          </div>` : ''}
        </div>`;
      Wren.openDrawer(content, `Safeguarding: ${c.child_name||'—'}`);
    }).catch(() => Wren.toast('Could not load concern', 'error'));
  };

  // ── LADO referral — pre-fill the Ealing referral form from a concern ──────────
  window._sgGenerateLado = function(id) {
    function go() {
      Wren.api(`/api/safeguarding/${id}/lado-data`)
        .then(d => window.WrenLadoForm.open(d))
        .catch(e => Wren.toast(e.error || 'Could not load referral data', 'error'));
    }
    if (window.WrenLadoForm) return go();
    const s = document.createElement('script');
    s.src = '/js/wren-lado-form.js';
    s.onload = go;
    s.onerror = () => Wren.toast('Could not load LADO form module', 'error');
    document.head.appendChild(s);
  };

  // ── Static button listeners ───────────────────────────────────────────────
  document.getElementById('btn-sg-ofsted-pre').addEventListener('click', () => {
    Wren.navigate('inspection', 'overview');
    if (typeof WrenInspection !== 'undefined') WrenInspection.openLauncher('pre_announced');
  });
  document.getElementById('btn-sg-ofsted-unan').addEventListener('click', () => {
    Wren.navigate('inspection', 'overview');
    if (typeof WrenInspection !== 'undefined') WrenInspection.openLauncher('unannounced');
  });
  document.getElementById('btn-sg-inspect-nav').addEventListener('click', () => Wren.navigate('inspection', 'overview'));
  document.getElementById('btn-sg-print').addEventListener('click', () => window.print());

  document.getElementById('sg-concerns-list').addEventListener('click', e => {
    const card = e.target.closest('[data-action="open-concern"]');
    if (card) window._sgOpenConcern(parseInt(card.dataset.id));
  });

  document.getElementById('sg-queue-list').addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const id = parseInt(el.dataset.id);
    if (el.dataset.action === 'sign-off') window._sgSignOff(id);
    else if (el.dataset.action === 'open-concern') window._sgOpenConcern(id);
  });

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action="sg-signoff"]');
    if (btn) { window._sgSignOff(parseInt(btn.dataset.id)); return; }
    const lado = e.target.closest('[data-action="sg-lado"]');
    if (lado) window._sgGenerateLado(parseInt(lado.dataset.id));
  });

  // ── Log new concern button ────────────────────────────────────────────────
  document.getElementById('btn-sg-log-concern').addEventListener('click', () => {
    _openLogConcernModal(null, null);
  });

  window._sgOpenLogConcernModal = _openLogConcernModal;

  function _openLogConcernModal(preselectChildId, childName) {
    const title = childName ? `Log concern — ${childName}` : 'Log safeguarding concern';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'padding:4px 0;max-height:80vh;overflow-y:auto';
    Wren.modal(title, wrap, []);
    // Load form script if not yet loaded
    if (!window.WrenSafeguardingForm) {
      const s = document.createElement('script');
      s.src = '/js/wren-safeguarding-form.js';
      s.onload = () => WrenSafeguardingForm.mount(wrap, {
        preselectChildId,
        onSaved: (concern) => {
          Wren.toast('Concern logged. Ref #' + concern.id, 'success');
          document.querySelector('.wren-modal-overlay .modal-close')?.click();
          // Refresh concerns list
          window['wrenLoadTab_safeguarding_concerns'] && window['wrenLoadTab_safeguarding_concerns']();
        },
        onCancel: () => document.querySelector('.wren-modal-overlay .modal-close')?.click(),
      });
      document.head.appendChild(s);
    } else {
      WrenSafeguardingForm.mount(wrap, {
        preselectChildId,
        onSaved: (concern) => {
          Wren.toast('Concern logged. Ref #' + concern.id, 'success');
          document.querySelector('.wren-modal-overlay .modal-close')?.click();
          window['wrenLoadTab_safeguarding_concerns'] && window['wrenLoadTab_safeguarding_concerns']();
        },
        onCancel: () => document.querySelector('.wren-modal-overlay .modal-close')?.click(),
      });
    }
  }

  // Show inspection quick-entry buttons only when an inspection is active
  Wren.api('/api/inspection/active').then(data => {
    if (data?.inspection) {
      document.getElementById('btn-sg-ofsted-pre').hidden = false;
      document.getElementById('btn-sg-ofsted-unan').hidden = false;
    }
  }).catch(() => {});

})();
</script>
