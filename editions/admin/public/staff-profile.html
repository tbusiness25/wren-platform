<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Staff Profile — Wren Admin</title>
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    :root {
      --navy:#0f172a;
      --surface:#1e293b;
      --border:#2d3748;
      --blue:#4a9abf;
      --orange:#e07820;
      --text:#f1f5f9;
      --muted:#94a3b8;
      --green:#22c55e;
      --danger:#ef4444;
      --amber:#f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background:var(--navy); color:var(--text); font-family:system-ui,Arial,sans-serif; min-height:100vh; }

    /* ── Content wrapper ── */
    #wren-content { padding:16px; max-width:1200px; }

    /* ── Cards ── */
    .card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:18px 20px;
    }

    /* ── Profile Header ── */
    .profile-header {
      display:flex;
      align-items:flex-start;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .profile-avatar {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#1e4a6e;
      border:3px solid var(--blue);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.8rem;
      font-weight:800;
      color:var(--blue);
      flex-shrink:0;
      text-transform:uppercase;
      overflow:hidden;
      position:relative;
      cursor:pointer;
    }
    .profile-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .profile-avatar:hover::after {
      content:'📷';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.6);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.4rem;
    }
    #staff-photo-input { display:none; }
    .profile-info { flex:1; min-width:200px; }
    .profile-name {
      font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;
      font-size:1.6rem;
      font-weight:800;
      color:var(--text);
      line-height:1.1;
    }
    .profile-role { font-size:.9rem; color:var(--muted); margin-top:3px; }
    .profile-badge {
      display:inline-block;
      margin-top:6px;
      font-size:.78rem;
      font-weight:700;
      padding:3px 10px;
      border-radius:99px;
      background:rgba(74,154,191,.15);
      color:var(--blue);
    }

    /* ── Tabs ── */
    .tab-bar {
      display:flex;
      gap:4px;
      flex-wrap:wrap;
      margin-bottom:16px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:6px;
    }
    .tab {
      background:none;
      border:none;
      color:var(--muted);
      font-size:.8rem;
      font-weight:600;
      padding:7px 14px;
      border-radius:8px;
      cursor:pointer;
      transition:.2s;
      white-space:nowrap;
    }
    .tab:hover { color:var(--text); background:rgba(255,255,255,.05); }
    .tab.active { background:var(--navy); color:var(--text); border:1px solid var(--border); }

    /* ── Forms ── */
    .form-section-title {
      font-size:.72rem;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      margin:18px 0 10px;
      padding-bottom:6px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:12px 16px; }
    .form-group { display:flex; flex-direction:column; gap:4px; }
    .form-group.full { grid-column:1/-1; }
    .form-label { font-size:.75rem; font-weight:700; color:var(--muted); }
    .form-label.readonly { color:#64748b; }
    .form-control {
      background:#0f172a;
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--text);
      font-size:.85rem;
      padding:8px 10px;
      outline:none;
      transition:.2s;
      width:100%;
    }
    .form-control:focus { border-color:var(--blue); }
    .form-control:disabled, .form-control.readonly-field {
      opacity:.6;
      cursor:default;
    }
    select.form-control option { background:#1e293b; }
    textarea.form-control { resize:vertical; min-height:70px; }
    .form-readonly {
      background:#0f172a;
      border:1px solid rgba(45,55,72,.5);
      border-radius:8px;
      color:#64748b;
      font-size:.85rem;
      padding:8px 10px;
    }

    /* ── Buttons ── */
    .btn {
      border:none;
      border-radius:12px;
      padding:9px 18px;
      font-size:.85rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
    }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-primary:hover { background:#3a8aaf; }
    .btn-ghost { background:rgba(255,255,255,.06); color:var(--muted); }
    .btn-ghost:hover { background:rgba(255,255,255,.1); color:var(--text); }
    .btn-sm { padding:5px 12px; font-size:.78rem; border-radius:8px; }
    .save-row { display:flex; align-items:center; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
    .last-saved { font-size:.75rem; color:var(--muted); }

    /* ── Lists ── */
    .list-gap { display:flex; flex-direction:column; gap:8px; }
    .list-item {
      background:#0f172a;
      border-radius:10px;
      padding:12px;
      border-left:3px solid var(--border);
    }
    .list-item-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; }
    .list-item-date { font-size:.8rem; font-weight:700; color:var(--text); }
    .list-item-badge {
      font-size:.7rem;
      font-weight:800;
      padding:2px 8px;
      border-radius:99px;
      text-transform:uppercase;
    }
    .badge-green { background:rgba(34,197,94,.15); color:var(--green); }
    .badge-yellow { background:rgba(245,158,11,.15); color:var(--amber); }
    .badge-red { background:rgba(239,68,68,.15); color:var(--danger); }
    .badge-blue { background:rgba(74,154,191,.15); color:var(--blue); }
    .list-item-text { font-size:.82rem; color:var(--muted); line-height:1.5; }

    /* ── Loading / empty ── */
    .loading-state { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--muted); gap:10px; }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:40px; color:var(--muted); font-size:.9rem; }

    /* ── Back link ── */
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:.82rem; font-weight:600; text-decoration:none; margin-bottom:12px; transition:.2s; }
    .back-link:hover { color:var(--text); }

    .hidden { display:none !important; }

    @media(max-width:640px) {
      .profile-header { flex-direction:column; }
      .profile-name { font-size:1.3rem; }
      .tab { padding:6px 10px; font-size:.75rem; }
      .form-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="wren-content">

  <a href="javascript:history.back()" class="back-link">← Back to Staff</a>

  <!-- Profile Header -->
  <div class="profile-header card" id="profile-header">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab active" data-tab="details">📋 Details</button>
    <button class="tab" data-tab="absence">🗓️ Absence & Holiday</button>
    <button class="tab" data-tab="training">🎓 Training / CPD</button>
    <button class="tab" data-tab="supervisions">🤝 Supervisions</button>
  </div>

  <!-- Tab: Details (editable core staff record) -->
  <div id="tab-details">
    <div class="card" style="max-width:640px">
      <h3 style="margin:0 0 12px">Staff details</h3>
      <div class="form-grid" id="details-form">
        <div class="form-group">
          <label class="form-label" for="first_name">First name</label>
          <input class="form-control" id="first_name">
        </div>
        <div class="form-group">
          <label class="form-label" for="last_name">Last name</label>
          <input class="form-control" id="last_name">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" id="email" type="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone</label>
          <input class="form-control" id="phone" type="tel">
        </div>
        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <select class="form-control" id="role">
            <option value="manager">Manager</option>
            <option value="deputy_manager">Deputy Manager</option>
            <option value="room_leader">Room Leader</option>
            <option value="practitioner">Practitioner</option>
            <option value="apprentice">Apprentice</option>
            <option value="cook">Cook</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="contracted_hours">Contracted hours/week</label>
          <input class="form-control" id="contracted_hours" type="number" min="0" step="0.5">
        </div>
        <div class="form-group">
          <label class="form-label" for="dbs_expiry">DBS expiry</label>
          <input class="form-control" id="dbs_expiry" type="date">
        </div>
        <div class="form-group">
          <label class="form-label" for="contract_start">Contract start</label>
          <input class="form-control" id="contract_start" type="date">
        </div>
        <div class="form-group">
          <label class="form-label" for="emergency_contact_name">Emergency contact name</label>
          <input class="form-control" id="emergency_contact_name">
        </div>
        <div class="form-group">
          <label class="form-label" for="emergency_contact_phone">Emergency contact phone</label>
          <input class="form-control" id="emergency_contact_phone" type="tel">
        </div>
      </div>
      <button class="btn btn-primary" id="save-details" style="margin-top:12px">Save details</button>
    </div>
  </div>

  <!-- Tab: Absence & Holiday -->
  <div id="tab-absence" class="hidden">
    <div class="card" style="max-width:800px">
      <h3 style="margin:0 0 4px">Absence & holiday</h3>
      <p style="font-size:.82rem;color:var(--muted);margin:0 0 12px">Recent absence records and holiday entitlement.</p>
      <div id="absence-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Tab: Training / CPD -->
  <div id="tab-training" class="hidden">
    <div class="card" style="max-width:800px">
      <h3 style="margin:0 0 4px">Training &amp; CPD</h3>
      <p style="font-size:.82rem;color:var(--muted);margin:0 0 12px">CPD records and course completions.</p>
      <div id="training-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Tab: Supervisions -->
  <div id="tab-supervisions" class="hidden">
    <div class="card" style="max-width:800px">
      <h3 style="margin:0 0 4px">Supervisions</h3>
      <p style="font-size:.82rem;color:var(--muted);margin:0 0 12px">Supervision records for this staff member.</p>
      <div id="supervisions-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Globals ──────────────────────────────────────────────────────────────────
let staffId = null;
let staffData = null;
const tabLoaded = {};

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(d, opts) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', opts || {day:'numeric',month:'short',year:'numeric'});
}

function initials(first, last) {
  return ((first||'')[0]||'') + ((last||'')[0]||'');
}

function setVal(id, v) {
  const el = document.getElementById(id);
  if (el) el.value = v || '';
}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const token = sessionStorage.getItem('wrenToken');
  if (!token) { window.location.href = '/login.html'; throw new Error('No token'); }
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: {
      'Authorization': 'Bearer ' + token,
      ...(opts.body ? {'Content-Type':'application/json'} : {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 401) { window.location.href = '/login.html'; throw new Error('Unauthorized'); }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  staffId = params.get('id');
  if (!staffId) {
    document.getElementById('profile-header').innerHTML = '<div style="color:var(--danger);padding:20px">No staff ID specified. <a href="/sections/staff.html" style="color:var(--blue)">← Back to Staff</a></div>';
    return;
  }

  // Set up tabs
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Hash-based tab selection
  const hash = window.location.hash.replace('#', '');
  const validTabs = ['details','absence','training','supervisions'];
  if (hash && validTabs.includes(hash)) {
    switchTab(hash);
  }

  // Save button
  document.getElementById('save-details').addEventListener('click', saveDetails);

  // Load initial data
  await loadProfile();
});

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.classList.remove('hidden');
  window.location.hash = name;

  if (!tabLoaded[name]) {
    tabLoaded[name] = true;
    if (name === 'absence') loadAbsence();
    else if (name === 'training') loadTraining();
    else if (name === 'supervisions') loadSupervisions();
  }
}

// ── Profile Header ────────────────────────────────────────────────────────────
async function loadProfile() {
  try {
    const data = await api('/api/staff/' + staffId);
    staffData = data;
    const fullName = ((data.first_name||'') + ' ' + (data.last_name||'')).trim() || 'Staff Member';
    const ini = initials(data.first_name, data.last_name);
    const roleLabel = (data.role||'').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

    document.getElementById('profile-header').innerHTML = `
      <div class="profile-avatar" id="staff-avatar" title="Click to upload photo">${data.profile_photo ? '<img src="'+data.profile_photo+'" alt="'+esc(fullName)+'">' : ini.toUpperCase()}</div>
      <input type="file" id="staff-photo-input" accept="image/jpeg,image/png,image/webp">
      <div class="profile-info">
        <div class="profile-name">${esc(fullName)}</div>
        <div class="profile-role">${esc(roleLabel)}</div>
        ${data.room_name ? '<span class="profile-badge">'+esc(data.room_name)+'</span>' : ''}
      </div>
    `;

    // Photo upload click handler
    const avatar = document.getElementById('staff-avatar');
    if (avatar) avatar.addEventListener('click', () => document.getElementById('staff-photo-input').click());

    const photoInput = document.getElementById('staff-photo-input');
    if (photoInput) photoInput.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 8388608) { alert('Photo must be under 8MB'); return; }
      const formData = new FormData();
      formData.append('photo', file);
      try {
        const r = await fetch(`/api/staff/${staffId}/photo`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${sessionStorage.getItem('wrenToken')}` },
          body: formData
        });
        if (!r.ok) throw new Error(await r.text());
        const result = await r.json();
        staffData.profile_photo = result.photo_url;
        renderHeader();
      } catch (err) {
        console.error('Photo upload failed:', err);
        alert('Failed to upload photo: ' + err.message);
      }
    });

    // Populate form
    setVal('first_name', data.first_name);
    setVal('last_name', data.last_name);
    setVal('email', data.email);
    setVal('phone', data.phone);
    setVal('role', data.role);
    setVal('contracted_hours', data.contracted_hours);
    setVal('dbs_expiry', data.dbs_expiry ? String(data.dbs_expiry).slice(0,10) : '');
    setVal('contract_start', data.contract_start ? String(data.contract_start).slice(0,10) : '');
    setVal('emergency_contact_name', data.emergency_contact_name);
    setVal('emergency_contact_phone', data.emergency_contact_phone);
  } catch (e) {
    document.getElementById('profile-header').innerHTML = '<div style="color:var(--danger);padding:20px">Could not load staff record.</div>';
  }
}

async function saveDetails() {
  const body = {
    first_name: document.getElementById('first_name').value.trim(),
    last_name: document.getElementById('last_name').value.trim(),
    email: document.getElementById('email').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    role: document.getElementById('role').value,
    contracted_hours: parseFloat(document.getElementById('contracted_hours').value) || null,
    dbs_expiry: document.getElementById('dbs_expiry').value || null,
    contract_start: document.getElementById('contract_start').value || null,
    emergency_contact_name: document.getElementById('emergency_contact_name').value.trim() || null,
    emergency_contact_phone: document.getElementById('emergency_contact_phone').value.trim() || null,
  };
  try {
    await api('/api/staff/' + staffId, { method:'PUT', body });
    if (window.Wren && Wren.toast) {
      Wren.toast('Saved','success');
    } else {
      alert('Saved');
    }
    await loadProfile(); // refresh header
  } catch(e) {
    if (window.Wren && Wren.toast) {
      Wren.toast('Save failed: '+(e.message||''),'error');
    } else {
      alert('Save failed');
    }
  }
}

// ── Absence Tab ───────────────────────────────────────────────────────────────
async function loadAbsence() {
  try {
    const data = await api('/api/absence/all');
    const mine = data.filter(r => r.staff_id == staffId);
    const el = document.getElementById('absence-list');
    if (!mine.length) {
      el.innerHTML = '<div class="empty-state">No absence records on file.</div>';
      return;
    }
    el.innerHTML = '<div class="list-gap">' + mine.map(a => {
      const typeLabel = (a.absence_type||a.request_type||'absence').replace(/_/g,' ');
      const statusClass = a.status === 'approved' ? 'badge-green' : a.status === 'declined' ? 'badge-red' : 'badge-yellow';
      return `<div class="list-item">
        <div class="list-item-header">
          <span class="list-item-date">${fmtDate(a.start_date)} → ${fmtDate(a.end_date)}</span>
          <span class="list-item-badge badge-blue">${esc(typeLabel)}</span>
          <span class="list-item-badge ${statusClass}">${esc(a.status||'pending')}</span>
          ${a.days_count ? '<span style="font-size:.8rem;color:var(--muted)">'+a.days_count+'d</span>' : ''}
        </div>
        ${a.notes ? '<div class="list-item-text">'+esc(a.notes)+'</div>' : ''}
      </div>`;
    }).join('') + '</div>';
  } catch (e) {
    document.getElementById('absence-list').innerHTML = '<div class="empty-state">Could not load absence records.</div>';
  }
}

// ── Training Tab ──────────────────────────────────────────────────────────────
async function loadTraining() {
  try {
    const data = await api('/api/cpd?staff_id=' + staffId);
    const el = document.getElementById('training-list');
    if (!data.length) {
      el.innerHTML = '<div class="empty-state">No training records on file.</div>';
      return;
    }
    el.innerHTML = '<div class="list-gap">' + data.map(r => {
      const expired = r.expiry_date && new Date(r.expiry_date) < new Date();
      const soon = r.expiry_date && !expired && (new Date(r.expiry_date) - new Date()) < 60*86400000;
      let badges = '';
      if (r.hours) badges += '<span style="font-size:.8rem;color:var(--muted)">'+r.hours+'h</span>';
      if (expired) badges += '<span class="list-item-badge badge-red">EXPIRED</span>';
      else if (soon) badges += '<span class="list-item-badge badge-yellow">Expiring soon</span>';
      if (r.expiry_date && !expired) badges += '<span style="font-size:.8rem;color:var(--muted)">Valid to '+fmtDate(r.expiry_date)+'</span>';
      return `<div class="list-item">
        <div class="list-item-header">
          <span class="list-item-date">${esc(r.title||r.course_name||'Training')}</span>
          ${badges}
        </div>
        ${r.completion_date ? '<div class="list-item-text">Completed '+fmtDate(r.completion_date)+'</div>' : ''}
      </div>`;
    }).join('') + '</div>';
  } catch (e) {
    document.getElementById('training-list').innerHTML = '<div class="empty-state">Could not load training records.</div>';
  }
}

// ── Supervisions Tab ──────────────────────────────────────────────────────────
async function loadSupervisions() {
  try {
    const data = await api('/api/supervisions?staff_id=' + staffId + '&limit=20');
    const list = Array.isArray(data) ? data : (data.supervisions || []);
    const el = document.getElementById('supervisions-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state">No supervisions on file.</div>';
      return;
    }
    el.innerHTML = '<div class="list-gap">' + list.map(sv => {
      const statusClass = sv.status === 'completed' ? 'badge-green' : 'badge-yellow';
      return `<div class="list-item">
        <div class="list-item-header">
          <span class="list-item-date">${fmtDate(sv.scheduled_date || sv.created_at)}</span>
          <span class="list-item-badge badge-blue">${esc(sv.type||'Supervision')}</span>
          ${sv.status ? '<span class="list-item-badge '+statusClass+'">'+esc(sv.status)+'</span>' : ''}
        </div>
      </div>`;
    }).join('') + '</div>' +
      '<a href="/supervisions.html" class="btn btn-sm btn-ghost" style="margin-top:12px">All supervisions →</a>';
  } catch (e) {
    document.getElementById('supervisions-list').innerHTML = '<div class="empty-state">Could not load supervisions.</div>';
  }
}
</script>
