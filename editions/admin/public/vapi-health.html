<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="admin">
  <title>Vapi Pipeline Health — Wren Admin</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .vph-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .vph-meta-label {
      font-size: 13px;
      color: var(--text-muted, #94a3b8);
    }
    .vph-meta-val {
      font-size: 13px;
      color: var(--text-primary, #f1f5f9);
      font-weight: 600;
    }

    .vph-run-btn {
      margin-left: auto;
      padding: 8px 20px;
      background: var(--primary, #4a9abf);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .vph-run-btn:hover { opacity: 0.85; }
    .vph-run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .vph-table-wrap {
      overflow-x: auto;
    }
    .vph-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .vph-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted, #94a3b8);
      border-bottom: 1px solid var(--border, #2d3748);
      white-space: nowrap;
    }
    .vph-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border, #2d3748);
      vertical-align: middle;
    }
    .vph-table tr:hover td { background: rgba(74,154,191,.06); }

    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-amber  { background: #f59e0b; }
    .dot-grey   { background: #64748b; }

    .row-ok   td:first-child { border-left: 3px solid #22c55e; }
    .row-warn td:first-child { border-left: 3px solid #f59e0b; }
    .row-fail td:first-child { border-left: 3px solid #ef4444; }

    .drift-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 12px;
    }
    .drift-none  { background: rgba(34,197,94,.15);  color: #22c55e; }
    .drift-warn  { background: rgba(245,158,11,.15); color: #f59e0b; }

    .synth-pass { color: #22c55e; font-weight: 700; }
    .synth-fail { color: #ef4444; font-weight: 700; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted, #94a3b8);
    }
    .empty-state h3 { margin: 0 0 8px; color: var(--text-primary, #f1f5f9); }

    .run-toast {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      z-index: 9999;
      display: none;
    }
    .run-toast.show { display: block; }
    .run-toast.ok { border-color: #22c55e; color: #22c55e; }
    .run-toast.err { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<div id="wren-shell"></div>
<main id="wren-main">
  <div class="wren-page-header">
    <h1>Vapi Pipeline Health</h1>
    <p class="wren-page-subtitle">Daily smoke test results — last 14 days</p>
  </div>

  <div class="vph-meta" id="vph-meta">
    <span class="vph-meta-label">Last checked:</span>
    <span class="vph-meta-val" id="vph-last-run">Loading…</span>
    <button class="vph-run-btn" id="vph-run-btn">Run smoke test now</button>
  </div>

  <div class="wren-card">
    <div class="vph-table-wrap">
      <table class="vph-table" id="vph-table">
        <thead>
          <tr>
            <th></th>
            <th>Date / Time</th>
            <th>Vapi calls (24h)</th>
            <th>DB calls (24h)</th>
            <th>Drift</th>
            <th>Synthetic test</th>
            <th>Alerted</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="vph-tbody">
          <tr><td colspan="8"><div class="empty-state"><h3>Loading…</h3></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="run-toast" id="run-toast"></div>

<script>
(function () {
  function formatDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}) +
      ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  }

  function rowClass(r) {
    if (!r.synthetic_event_passed) return 'row-fail';
    if (r.drift > 0) return 'row-warn';
    return 'row-ok';
  }

  function rowIndicator(r) {
    if (!r.synthetic_event_passed) return '<span class="dot dot-red" title="Synthetic test failed"></span>';
    if (r.drift > 0) return '<span class="dot dot-amber" title="Drift detected"></span>';
    return '<span class="dot dot-green" title="All clear"></span>';
  }

  function driftCell(drift) {
    const n = parseInt(drift || 0);
    if (n === 0) return '<span class="drift-badge drift-none">0</span>';
    return `<span class="drift-badge drift-warn">+${n}</span>`;
  }

  function synthCell(passed, err) {
    if (passed) return '<span class="synth-pass">✓ Pass</span>';
    return `<span class="synth-fail">✗ Fail</span>`;
  }

  function alertedCell(alerted) {
    return alerted ? '<span style="color:#ef4444;font-weight:700;">Yes</span>' : '<span style="color:#64748b;">No</span>';
  }

  function showToast(msg, type) {
    const t = document.getElementById('run-toast');
    t.textContent = msg;
    t.className = 'run-toast show ' + type;
    setTimeout(() => { t.className = 'run-toast'; }, 5000);
  }

  function renderTable(rows) {
    const tbody = document.getElementById('vph-tbody');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><h3>No health checks yet</h3><p>The workflow runs daily at 09:00 BST on weekdays.</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr class="${rowClass(r)}">
        <td style="width:20px;padding-right:6px">${rowIndicator(r)}</td>
        <td style="white-space:nowrap">${formatDate(r.checked_at)}</td>
        <td>${r.vapi_calls_24h >= 0 ? r.vapi_calls_24h : '<span style="color:#64748b">N/A</span>'}</td>
        <td>${r.db_calls_24h}</td>
        <td>${driftCell(r.drift)}</td>
        <td>${synthCell(r.synthetic_event_passed, r.synthetic_event_error)}</td>
        <td>${alertedCell(r.alerted)}</td>
        <td style="color:#ef4444;font-size:11px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.synthetic_event_error || ''}">${r.synthetic_event_error || ''}</td>
      </tr>
    `).join('');
  }

  async function loadStats() {
    try {
      const data = await Wren.api('/api/vapi-health/stats');
      const rows = data.rows || [];
      if (rows.length > 0) {
        document.getElementById('vph-last-run').textContent = formatDate(rows[0].checked_at);
      } else {
        document.getElementById('vph-last-run').textContent = 'Never run yet';
      }
      renderTable(rows);
    } catch (err) {
      document.getElementById('vph-last-run').textContent = 'Error loading data';
      document.getElementById('vph-tbody').innerHTML =
        `<tr><td colspan="8"><div class="empty-state"><h3>Failed to load</h3><p>${err.message}</p></div></td></tr>`;
    }
  }

  document.addEventListener('wren:ready', () => {
    loadStats();

    document.getElementById('vph-run-btn').addEventListener('click', async function () {
      this.disabled = true;
      this.textContent = 'Running…';
      try {
        await Wren.api('/api/vapi-health/run', { method: 'POST' });
        showToast('Smoke test triggered — results will appear in ~15 seconds', 'ok');
        setTimeout(() => loadStats(), 16000);
      } catch (err) {
        showToast('Failed to trigger: ' + err.message, 'err');
      } finally {
        this.disabled = false;
        this.textContent = 'Run smoke test now';
      }
    });
  });
}());
</script>
</body>
</html>
