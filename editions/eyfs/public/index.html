<!DOCTYPE html>
<html lang="en" class="eylog-home">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="eyfs">
  <title>Home — Wren EY</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <script src="/js/device-detect.js"></script>
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    /* ── Suppress shell chrome for EyLog layout ── */
    html.eylog-home #wren-sidebar,
    html.eylog-home #wren-topbar,
    html.eylog-home #wren-quickbar { display: none !important; }
    html.eylog-home #wren-main   { margin-left: 0 !important; padding: 0 !important; max-width: 100%; }
    html.eylog-home body          { padding-bottom: 70px; }

    /* ── Root layout ── */
    .eylog-root { display: flex; flex-direction: column; min-height: 100dvh; background: #0f172a; }

    /* ── Two-row top bar ── */
    .ey-topbar {
      position: sticky; top: 0; z-index: 200;
      background: #1e293b;
      border-bottom: 1px solid #2d3748;
    }
    /* Row 1 */
    .ey-topbar-r1 {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .ey-topbar-r1::-webkit-scrollbar { display: none; }
    .ey-logo { margin-right: 8px; flex-shrink: 0; text-decoration: none; }
    .ey-logo img { height: 36px; width: auto; }
    .ey-navbtn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 6px 10px; border-radius: 8px; cursor: pointer; text-decoration: none;
      color: #94a3b8; font-size: 0.68rem; font-weight: 600; white-space: nowrap;
      gap: 2px; min-width: 52px; border: none; background: transparent;
      transition: background 0.15s, color 0.15s; font-family: inherit; flex-shrink: 0;
    }
    .ey-navbtn:hover, .ey-navbtn.active { background: rgba(74,154,191,0.15); color: #4a9abf; }
    .ey-navbtn .icon { font-size: 1.1rem; line-height: 1; }
    .ey-topbar-spacer { flex: 1; }

    /* Row 2 */
    .ey-topbar-r2 {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .ey-topbar-r2::-webkit-scrollbar { display: none; }
    .ey-navbtn-sm {
      padding: 5px 10px; border-radius: 6px; cursor: pointer; text-decoration: none;
      color: #64748b; font-size: 0.72rem; font-weight: 500; white-space: nowrap;
      border: none; background: transparent; transition: background 0.15s, color 0.15s;
      font-family: inherit; flex-shrink: 0;
    }
    .ey-navbtn-sm:hover { background: rgba(74,154,191,0.1); color: #94a3b8; }

    /* More dropdown */
    .more-wrap { position: relative; flex-shrink: 0; }
    .more-menu {
      display: none; position: absolute; top: 100%; left: 0;
      background: #1e293b; border: 1px solid #2d3748; border-radius: 10px;
      padding: 6px; z-index: 300; min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .more-menu.open { display: block; }
    .more-menu a {
      display: block; padding: 8px 12px; color: #94a3b8; font-size: 0.82rem;
      text-decoration: none; border-radius: 6px; transition: background 0.1s;
    }
    .more-menu a:hover { background: rgba(74,154,191,0.1); color: #f1f5f9; }

    /* ── Main content area ── */
    .ey-content { flex: 1; padding: 12px 12px 0; }

    /* ── Room sections ── */
    .room-section { margin-bottom: 18px; }
    .room-header {
      font-size: 0.7rem; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }

    /* ── Compact child grid ── */
    .compact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }
    @media (min-width: 1024px) { .compact-grid { grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); } }
    @media (max-width: 480px)  { .compact-grid { grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); } }

    /* ── Child card ── */
    .child-card-compact {
      position: relative; background: #1e293b; border: 2px solid #2d3748;
      border-radius: 12px; padding: 10px 6px 8px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .child-card-compact:active { transform: scale(.97); }
    .child-card-compact:hover  { border-color: #4a9abf; }
    .child-card-compact.selected { border-color: #4a9abf; background: rgba(74,154,191,.1); }
    .child-card-compact.absent { opacity: .55; }
    .ccc-sel-badge {
      position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
      border-radius: 50%; background: #4a9abf; color: #fff; font-size: .6rem;
      display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s;
    }
    .child-card-compact.selected .ccc-sel-badge { opacity: 1; }
    .ccc-avatar {
      width: 52px; height: 52px; border-radius: 50%; background: #4a9abf;
      color: #fff; font-size: 1rem; font-weight: 700; display: flex;
      align-items: center; justify-content: center;
    }
    .ccc-name { font-size: .72rem; font-weight: 600; color: #f1f5f9; line-height: 1.2; word-break: break-word; }
    .ccc-meta { display: flex; align-items: center; justify-content: center; gap: 3px; flex-wrap: wrap; }
    .ccc-dot { width: 8px; height: 8px; border-radius: 50%; }
    .ccc-dot.present  { background: #22c55e; }
    .ccc-dot.absent   { background: #94a3b8; }
    .ccc-dot.gone     { background: #f59e0b; }
    .ccc-dot.unsigned { background: #4a9abf; opacity: .5; }
    .ccc-tag { font-size: .55rem; font-weight: 700; padding: 1px 4px; border-radius: 3px; line-height: 1.4; }
    .ccc-tag-sen     { background: rgba(139,92,246,.2); color: #a78bfa; }
    .ccc-tag-allergy { background: rgba(239,68,68,.2);  color: #f87171; }
    .ccc-action {
      font-size: .62rem; font-weight: 700; padding: 3px 8px; border-radius: 6px;
      border: none; cursor: pointer; font-family: inherit; margin-top: 2px;
    }
    .ccc-in  { background: rgba(34,197,94,.15); color: #22c55e; }
    .ccc-out { background: rgba(239,68,68,.12); color: #f87171; }

    /* ── Bottom bar ── */
    .ey-bottombar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 60px; z-index: 200;
      background: #1e293b; border-top: 1px solid #2d3748;
      display: flex; align-items: center; padding: 0 10px; gap: 8px;
    }
    .sel-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(74,154,191,0.15); border: 1px solid rgba(74,154,191,0.3);
      border-radius: 20px; padding: 5px 12px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; color: #4a9abf;
      white-space: nowrap; min-width: 80px; transition: background 0.15s;
    }
    .sel-pill:hover { background: rgba(74,154,191,0.25); }
    .bottombar-mid { display: flex; gap: 6px; flex: 1; justify-content: center; }
    .ey-midbtn {
      padding: 8px 12px; border-radius: 8px; border: 1px solid #2d3748;
      background: transparent; color: #94a3b8; font-size: 0.75rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s;
    }
    .ey-midbt:hover { background: rgba(74,154,191,0.1); color: #f1f5f9; }
    .ctx-select {
      background: #1e293b; color: #94a3b8; border: 1px solid #2d3748;
      border-radius: 8px; padding: 6px 8px; font-size: 0.72rem; font-family: inherit;
      cursor: pointer;
    }

    /* ── Selected names sheet ── */
    .sel-sheet {
      display: none; position: fixed; bottom: 60px; left: 0; right: 0;
      background: #1e293b; border-top: 2px solid #4a9abf; z-index: 199;
      padding: 12px 16px; max-height: 40vh; overflow-y: auto;
    }
    .sel-sheet.open { display: block; }
    .sel-sheet-names { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sel-name-tag {
      background: rgba(74,154,191,0.15); color: #4a9abf; border-radius: 12px;
      padding: 4px 10px; font-size: 0.78rem; font-weight: 600;
    }
  </style>
</head>
<body>
<div id="wren-content">
<div class="eylog-root">

  <!-- Two-row top bar -->
  <div class="ey-topbar">
    <!-- Row 1 -->
    <div class="ey-topbar-r1">
      <a href="/index.html" class="ey-logo" title="Home">
        <img src="/images/little-angels-logo.png" alt="Your Nursery" onerror="this.style.display='none'">
      </a>
      <button class="ey-navbtn active" onclick="navTo('/observations.html')">
        <span class="icon">📝</span>Observation
      </button>
      <button class="ey-navbtn" onclick="navTo('/diary.html')">
        <span class="icon">📖</span>Daily Diary
      </button>
      <button class="ey-navbtn" onclick="navTo('/messages.html')">
        <span class="icon">💬</span>Messages
        <span id="msg-badge" style="display:none;background:#ef4444;color:#fff;border-radius:8px;padding:1px 5px;font-size:.6rem;line-height:1.4"></span>
      </button>
      <button class="ey-navbtn" onclick="navTo('/incidents.html')">
        <span class="icon">🚑</span>Accidents
      </button>
      <button class="ey-navbtn" onclick="navTo('/medicine.html')">
        <span class="icon">💊</span>Medicine
      </button>
      <button class="ey-navbtn" onclick="navTo('/reports.html')">
        <span class="icon">📊</span>Reports
      </button>
      <div class="ey-topbar-spacer"></div>
      <button class="ey-navbtn" onclick="signOut()" style="color:#64748b" title="Sign out">
        <span class="icon">🚪</span><span style="font-size:.6rem">Out</span>
      </button>
    </div>
    <!-- Row 2 (More items) -->
    <div class="ey-topbar-r2" id="row2">
      <a href="/newsletters.html"    class="ey-navbtn-sm">Newsletters</a>
      <a href="/planning.html"       class="ey-navbtn-sm">Planning</a>
      <a href="/curriculum.html"     class="ey-navbtn-sm">Framework</a>
      <a href="/observations.html?draft=1" class="ey-navbtn-sm">Drafts</a>
      <a href="/learning.html"       class="ey-navbtn-sm">Learning Journey</a>
      <a href="/safeguarding.html"   class="ey-navbtn-sm">Safeguarding</a>
      <a href="/sen.html"            class="ey-navbtn-sm">SEN</a>
      <a href="/repairs.html"        class="ey-navbtn-sm">Repairs</a>
      <a href="/phonics.html"        class="ey-navbtn-sm">Phonics</a>
      <a href="/outings.html"        class="ey-navbtn-sm">Outings</a>
      <a href="/tools.html"          class="ey-navbtn-sm">Tools</a>
    </div>
  </div>

  <!-- Children grid -->
  <div class="ey-content">
    <!-- Filter row -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <input type="search" id="search" placeholder="Search…"
        style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.8rem;font-family:inherit;width:160px;outline:none"
        oninput="applyFilters()">
      <div style="margin-left:auto;font-size:.78rem;color:#64748b" id="count-label">Loading…</div>
    </div>
    <div id="children-area">
      <div class="loading-state"><div class="spinner"></div><span>Loading children…</span></div>
    </div>
  </div>

  <!-- Selected names sheet -->
  <div class="sel-sheet" id="sel-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <strong style="color:#f1f5f9;font-size:.85rem">Selected children</strong>
      <button onclick="clearSelection()" style="background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:.78rem">Clear all</button>
    </div>
    <div class="sel-sheet-names" id="sel-names"></div>
  </div>

  <!-- Bottom bar -->
  <div class="ey-bottombar">
    <div class="sel-pill" onclick="toggleSheet()" id="sel-pill" title="Selected children">
      <span>Selected:</span>
      <span id="sel-count" style="font-size:1rem">0</span>
    </div>
    <div class="bottombar-mid">
      <button class="ey-midbt" onclick="navTo('/learning.html')" style="padding:8px 12px;border-radius:8px;border:1px solid #2d3748;background:transparent;color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit">🖼 Gallery</button>
      <button class="ey-midbt" onclick="window.location='/clock.html'" style="padding:8px 12px;border-radius:8px;border:1px solid #2d3748;background:transparent;color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit">📷 Camera</button>
      <button class="ey-midbt" onclick="navTo('/aria.html')" style="padding:8px 12px;border-radius:8px;border:1px solid #2d3748;background:transparent;color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit">🤖 AI Chat</button>
    </div>
    <select class="ctx-select" id="ctx-select" onchange="onCtxChange(this.value)" title="Context filter">
      <option value="">All groups</option>
      <option value="baby">Baby Room</option>
      <option value="preschool">Pre-school</option>
      <option value="key">Key children</option>
      <option value="in">In today</option>
      <option value="scheduled">Scheduled today</option>
    </select>
  </div>
</div>
</div>

<script>
let allChildren = [];
let selectedIds = new Set();

// Navigate to a page, passing selected children as URL param
function navTo(url) {
  if (selectedIds.size > 0) {
    const sep = url.includes('?') ? '&' : '?';
    window.location.href = url + sep + 'children=' + [...selectedIds].join(',');
  } else {
    window.location.href = url;
  }
}

function signOut() {
  sessionStorage.removeItem('wren_token');
  sessionStorage.removeItem('wrenToken');
  window.location.href = '/login.html';
}

// Context filter persistence
const CTX_KEY = () => {
  const user = (typeof Wren !== 'undefined' && Wren.user) ? Wren.user.id : 'anon';
  return 'wren.eyfs.context.' + user;
};

function loadCtxPref() {
  const saved = localStorage.getItem(CTX_KEY());
  if (saved) {
    const sel = document.getElementById('ctx-select');
    if (sel) sel.value = saved;
  }
}

function onCtxChange(val) {
  localStorage.setItem(CTX_KEY(), val);
  applyFilters();
}

// Selection
function toggleSelect(id) {
  const card = document.querySelector(`.child-card-compact[data-id="${id}"]`);
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    card?.classList.remove('selected');
  } else {
    selectedIds.add(id);
    card?.classList.add('selected');
  }
  updateSelUI();
}

function clearSelection() {
  selectedIds.forEach(id => document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.remove('selected'));
  selectedIds.clear();
  updateSelUI();
  document.getElementById('sel-sheet').classList.remove('open');
}

function updateSelUI() {
  document.getElementById('sel-count').textContent = selectedIds.size;
  const names = [...selectedIds].map(id => {
    const c = allChildren.find(x => x.id === id);
    return c ? `<span class="sel-name-tag">${c.first_name} ${c.last_name}</span>` : '';
  }).join('');
  document.getElementById('sel-names').innerHTML = names;
}

function toggleSheet() {
  document.getElementById('sel-sheet').classList.toggle('open');
}

function applyFilters() {
  const search = (document.getElementById('search').value||'').trim().toLowerCase();
  const ctx = document.getElementById('ctx-select').value;
  const user = (typeof Wren !== 'undefined' && Wren.user) || {};
  let kids = [...allChildren];

  if (ctx === 'in') {
    kids = kids.filter(c => c.sign_in_time && !c.sign_out_time && !c.absent);
  } else if (ctx === 'scheduled') {
    kids = kids.filter(c => !c.absent);
  } else if (ctx === 'baby') {
    kids = kids.filter(c => (c.room_name||'').toLowerCase().includes('baby'));
  } else if (ctx === 'preschool') {
    kids = kids.filter(c => (c.room_name||'').toLowerCase().includes('pre'));
  } else if (ctx === 'key') {
    const myKids = kids.filter(c => c.key_person_id === user.id);
    if (myKids.length) kids = myKids;
  }

  if (search) {
    kids = kids.filter(c => `${c.first_name} ${c.last_name}`.toLowerCase().includes(search));
  }

  document.getElementById('count-label').textContent = `${kids.length} children`;
  renderChildren(kids);
}

function renderChildren(kids) {
  const area = document.getElementById('children-area');
  if (!kids.length) {
    area.innerHTML = '<div class="empty-state" style="padding:40px;text-align:center;color:#64748b">No children found</div>';
    return;
  }
  const byRoom = {};
  kids.forEach(c => {
    const key = c.room_name || 'Unassigned';
    if (!byRoom[key]) byRoom[key] = [];
    byRoom[key].push(c);
  });
  area.innerHTML = Object.entries(byRoom).map(([room, group]) => {
    const present = group.filter(k => k.sign_in_time && !k.absent && !k.sign_out_time).length;
    return `<div class="room-section">
      <div class="room-header">
        <span>${room.toUpperCase()}</span>
        <span style="font-weight:400;color:#94a3b8">(${present}/${group.length})</span>
      </div>
      <div class="compact-grid">${group.map(renderCard).join('')}</div>
    </div>`;
  }).join('');
  // re-apply selections
  selectedIds.forEach(id => document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.add('selected'));
}

function renderCard(c) {
  const init = c.first_name[0] + c.last_name[0];
  const name = c.first_name + ' ' + c.last_name.charAt(0) + '.';
  let dot = 'unsigned';
  if (c.absent) dot = 'absent';
  else if (c.sign_in_time && c.sign_out_time) dot = 'gone';
  else if (c.sign_in_time) dot = 'present';
  const tags = [
    c.is_on_sen_register ? '<span class="ccc-tag ccc-tag-sen">SEN</span>' : '',
    c.allergies ? `<span class="ccc-tag ccc-tag-allergy" title="${c.allergies}">⚠</span>` : '',
  ].join('');
  let action = '';
  if (!c.sign_in_time && !c.absent) {
    action = `<button class="ccc-action ccc-in" onclick="event.stopPropagation();doSignIn(${c.id})">Sign In</button>`;
  } else if (c.sign_in_time && !c.sign_out_time && !c.absent) {
    action = `<button class="ccc-action ccc-out" onclick="event.stopPropagation();doSignOut(${c.id})">Out</button>`;
  }
  return `<div class="child-card-compact" data-id="${c.id}"
    onclick="toggleSelect(${c.id})"
    oncontextmenu="event.preventDefault();window.location='/child-profile.html?id=${c.id}'">
    <div class="ccc-sel-badge">✓</div>
    <div class="ccc-avatar">${init}</div>
    <div class="ccc-name">${name}</div>
    <div class="ccc-meta"><span class="ccc-dot ${dot}"></span>${tags}</div>
    ${action}
  </div>`;
}

async function doSignIn(id) {
  if (typeof Wren === 'undefined') return;
  await Wren.api('/api/clockin/sign-in', { method: 'POST', body: JSON.stringify({ child_id: id }) }).catch(() => {});
  loadData();
}
async function doSignOut(id) {
  if (typeof Wren === 'undefined') return;
  await Wren.api('/api/clockin/sign-out', { method: 'POST', body: JSON.stringify({ child_id: id }) }).catch(() => {});
  loadData();
}

async function loadData() {
  if (typeof Wren === 'undefined') return;
  try {
    const [childRes, msgRes] = await Promise.allSettled([
      Wren.api('/api/children/attendance/today'),
      Wren.api('/api/messages/unread-count'),
    ]);
    if (childRes.status === 'fulfilled' && Array.isArray(childRes.value)) {
      allChildren = childRes.value;
    }
    const msgCount = msgRes.status === 'fulfilled' ? (msgRes.value?.count || 0) : 0;
    const badge = document.getElementById('msg-badge');
    if (badge) {
      badge.textContent = msgCount > 9 ? '9+' : msgCount;
      badge.style.display = msgCount > 0 ? '' : 'none';
    }
    applyFilters();
  } catch(e) {
    document.getElementById('children-area').innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444">Failed to load children</div>';
  }
}

document.addEventListener('wren:ready', () => {
  loadCtxPref();
  loadData();
  setInterval(loadData, 120000);
});

// Close more menus on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.more-wrap')) {
    document.querySelectorAll('.more-menu').forEach(m => m.classList.remove('open'));
  }
  if (!e.target.closest('.sel-sheet') && !e.target.closest('#sel-pill')) {
    document.getElementById('sel-sheet').classList.remove('open');
  }
});
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
