<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="eyfs">
  <meta name="wren-hide-modules" content="HR,Staff,IT Settings,Reports,Action Plans,Supervisions,CPD">
  <title>Sign In — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    .login-tabs {
      display: flex; border-bottom: 1px solid #2d3748; margin-bottom: 20px; gap: 0;
    }
    .login-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 600;
      color: #64748b; cursor: pointer; border: none; background: transparent;
      font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .login-tab.active { color: #4a9abf; border-bottom-color: #4a9abf; }
    .email-form { display: flex; flex-direction: column; gap: 14px; }
    .email-form input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid #2d3748;
      color: #f1f5f9; font-size: 0.9rem; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .email-form input:focus { border-color: #4a9abf; }
    .email-form .login-btn {
      padding: 13px; border-radius: 12px; border: none;
      background: #4a9abf; color: #fff; font-size: 0.95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    }
    .email-form .login-btn:hover { opacity: 0.9; }
    .email-form .login-btn:disabled { opacity: 0.5; }
    .email-error {
      color: #ef4444; font-size: 0.82rem; text-align: center;
      padding: 8px; background: rgba(239,68,68,0.1); border-radius: 8px;
      display: none;
    }
    .portal-context-label {
      text-align: center; margin-bottom: 14px;
      font-size: 0.78rem; font-weight: 600;
      color: #64748b; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .portal-context-label span {
      background: rgba(74,154,191,0.15); color: #4a9abf;
      padding: 3px 10px; border-radius: 12px;
    }
    .back-to-portal {
      text-align: center; margin-top: 14px;
      font-size: 0.8rem; color: #64748b;
    }
    .back-to-portal a { color: #4a9abf; text-decoration: none; }
  </style>
<script src="/js/device-detect.js"></script>
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="wren-logo">
        <span class="logo-w">w</span><span class="logo-ren">ren</span>
        <span class="logo-edition">EYFS</span>
      </div>
      <p id="org-name">Early Years</p>
    </div>

    <!-- Portal context label -->
    <div class="portal-context-label" id="portal-label" style="display:none">
      Signing in to <span id="portal-name">portal</span>
    </div>

    <!-- Login method tabs -->
    <div class="login-tabs">
      <button class="login-tab active" id="tab-email">Email &amp; Password</button>
      <button class="login-tab" id="tab-pin">Staff PIN</button>
    </div>

    <!-- Email/password form -->
    <div id="section-email">
      <form class="email-form" id="email-form">
        <input type="email" id="email-input" placeholder="Email address" autocomplete="email" required>
        <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
        <div class="email-error" id="email-error">Incorrect email or password</div>
        <button type="submit" class="login-btn" id="email-btn">Sign In</button>
      </form>
    </div>

    <!-- PIN login section -->
    <div id="section-pin" style="display:none">
      <!-- Step 1: Select staff -->
      <div id="step-select">
        <p style="font-size:.875rem;color:#64748b;text-align:center;margin-bottom:14px">Who are you?</p>
        <div class="staff-grid" id="staff-grid">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Step 2: Enter PIN -->
      <div id="step-pin" style="display:none">
        <div style="text-align:center;margin-bottom:16px">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--c-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;margin:0 auto 10px" id="pin-avatar">?</div>
          <p style="font-weight:700;font-size:1.1rem;color:var(--c-navy)" id="pin-name">Enter your PIN</p>
        </div>
        <div class="pin-dots" id="pin-dots">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div class="pin-pad">
          <button class="pin-key" data-val="1">1</button>
          <button class="pin-key" data-val="2">2</button>
          <button class="pin-key" data-val="3">3</button>
          <button class="pin-key" data-val="4">4</button>
          <button class="pin-key" data-val="5">5</button>
          <button class="pin-key" data-val="6">6</button>
          <button class="pin-key" data-val="7">7</button>
          <button class="pin-key" data-val="8">8</button>
          <button class="pin-key" data-val="9">9</button>
          <button class="pin-key" data-val="back" style="font-size:1rem">⌫</button>
          <button class="pin-key" data-val="0">0</button>
          <button class="pin-key" data-val="cancel" style="font-size:.75rem;color:#64748b">Cancel</button>
        </div>
        <p id="pin-error" style="color:var(--c-red);text-align:center;font-size:.875rem;margin-top:12px;display:none">Incorrect PIN</p>
      </div>
    </div>

    <div class="back-to-portal">
      <a href="/portal.html">← Back to portal picker</a>
    </div>
  </div>
</div>

<script>
// Portal redirect map
const PORTAL_REDIRECTS = {
  app: '/app/dashboard/today',
  admin: '/app/dashboard/today',
  learning: '/index.html',
  hr: '/hr.html',
  parent: '/parent.html',
};
const ROLE_REDIRECTS = {
  manager: '/app/dashboard/today',
  deputy_manager: '/app/dashboard/today',
  admin: '/app/dashboard/today',
  parent: '/parent.html',
};

const params = new URLSearchParams(location.search);
const portalParam = params.get('portal') || '';

// Show portal context label
if (portalParam) {
  const labels = { admin:'Admin Portal', learning:'Learning Portal', hr:'HR Portal', parent:'Parent Portal' };
  document.getElementById('portal-label').style.display = 'block';
  document.getElementById('portal-name').textContent = labels[portalParam] || portalParam;
  // Pre-fill email for parent portal
  if (portalParam === 'parent') document.getElementById('email-input').value = 'parent@demo.wren';
  else if (portalParam === 'admin') document.getElementById('email-input').value = 'admin@demo.wren';
  else if (portalParam === 'learning') document.getElementById('email-input').value = 'practitioner@demo.wren';
  else if (portalParam === 'hr') document.getElementById('email-input').value = 'admin@demo.wren';
}

function getRedirectUrl(role, portal) {
  if (portal && PORTAL_REDIRECTS[portal]) return PORTAL_REDIRECTS[portal];
  return ROLE_REDIRECTS[role] || '/index.html';
}

function switchTab(tab) {
  document.getElementById('section-email').style.display = tab === 'email' ? '' : 'none';
  document.getElementById('section-pin').style.display = tab === 'pin' ? '' : 'none';
  document.getElementById('tab-email').classList.toggle('active', tab === 'email');
  document.getElementById('tab-pin').classList.toggle('active', tab === 'pin');
  if (tab === 'pin' && !staffLoaded) loadStaff();
}

function saveTokenAndRedirect(token, role) {
  sessionStorage.setItem('wrenToken', token);
  // Keep wren_token alias too for compatibility
  sessionStorage.setItem('wren_token', token);
  window.location.href = getRedirectUrl(role, portalParam);
}

// ── Email/password login ──
async function submitEmailLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('email-btn');
  const errEl = document.getElementById('email-error');
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    // Try staff login first
    let res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    let data = await res.json();
    if (res.ok && data.token) {
      saveTokenAndRedirect(data.token, data.staff?.role || '');
      return;
    }
    // Try parent login if staff failed
    if (!res.ok) {
      res = await fetch('/api/auth/parent-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      data = await res.json();
      if (res.ok && data.token) {
        saveTokenAndRedirect(data.token, 'parent');
        return;
      }
    }
    errEl.style.display = 'block';
  } catch(err) {
    errEl.textContent = 'Network error — please try again';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── PIN login ──
let selectedStaff = null;
let pin = '';
let staffLoaded = false;
const MAX_PIN = 4;

async function loadStaff() {
  staffLoaded = true;
  try {
    const res = await fetch('/api/auth/staff-list');
    const staff = await res.json();
    const grid = document.getElementById('staff-grid');
    // Filter out demo/parent accounts from PIN grid
    const filtered = staff.filter(s => s.role !== 'parent');
    if (!filtered.length) {
      grid.innerHTML = '<p style="color:#64748b;font-size:.875rem;text-align:center">No staff found</p>';
      return;
    }
    grid.innerHTML = filtered.map(s => `
      <div class="staff-select-card" data-id="${s.id}" data-name="${s.first_name} ${s.last_name}">
        <div class="staff-select-initial">${s.first_name.charAt(0)}${s.last_name.charAt(0)}</div>
        <div class="staff-select-name">${s.preferred_name || s.first_name}</div>
        <div class="staff-select-role">${s.role.replace(/_/g,' ')}</div>
      </div>
    `).join('');
    grid.querySelectorAll('.staff-select-card').forEach(card => {
      card.onclick = () => selectStaff(card.dataset.id, card.dataset.name);
    });
  } catch(e) {
    document.getElementById('staff-grid').innerHTML = '<p style="color:var(--c-red)">Failed to load staff</p>';
  }
}

function selectStaff(id, name) {
  selectedStaff = id;
  document.getElementById('step-select').style.display = 'none';
  document.getElementById('step-pin').style.display = 'block';
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase();
  document.getElementById('pin-avatar').textContent = initials;
  document.getElementById('pin-name').textContent = name;
  pin = '';
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((dot, i) => {
    dot.classList.toggle('filled', i < pin.length);
  });
}

async function submitPin() {
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ staff_id: parseInt(selectedStaff), pin })
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('pin-error').style.display = 'block';
      pin = ''; updateDots();
      return;
    }
    saveTokenAndRedirect(data.token, data.staff?.role || '');
  } catch(e) {
    document.getElementById('pin-error').style.display = 'block';
    pin = ''; updateDots();
  }
}

document.getElementById('tab-email').addEventListener('click', () => switchTab('email'));
document.getElementById('tab-pin').addEventListener('click', () => switchTab('pin'));
document.getElementById('email-form').addEventListener('submit', submitEmailLogin);

document.querySelectorAll('.pin-key').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    document.getElementById('pin-error').style.display = 'none';
    if (val === 'back') { pin = pin.slice(0,-1); updateDots(); }
    else if (val === 'cancel') {
      selectedStaff = null; pin = '';
      document.getElementById('step-pin').style.display = 'none';
      document.getElementById('step-select').style.display = 'block';
    } else if (pin.length < MAX_PIN) {
      pin += val; updateDots();
      if (pin.length === MAX_PIN) submitPin();
    }
  });
});

document.addEventListener('keydown', e => {
  if (document.getElementById('section-pin').style.display === 'none') return;
  if (document.getElementById('step-pin').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') document.querySelector(`.pin-key[data-val="${e.key}"]`)?.click();
  else if (e.key === 'Backspace') document.querySelector('.pin-key[data-val="back"]')?.click();
  else if (e.key === 'Escape') document.querySelector('.pin-key[data-val="cancel"]')?.click();
});

// Redirect if already logged in
const existingToken = sessionStorage.getItem('wrenToken') || sessionStorage.getItem('wren_token');
if (existingToken) {
  try {
    const payload = JSON.parse(atob(existingToken.split('.')[1]));
    if (payload.exp * 1000 > Date.now()) {
      window.location.href = getRedirectUrl(payload.role, portalParam);
    } else {
      sessionStorage.clear();
    }
  } catch(e) { sessionStorage.clear(); }
}

// Load edition info for demo hint
fetch('/api/edition').then(r=>r.json()).then(d=>{
  if (d.demo) document.getElementById('password-input').placeholder = 'Password (hint: demo)';
}).catch(()=>{});
</script>
</body>
</html>
