<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="eyfs">
  <title>Phonics — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
  <meta name="wren-hide-modules" content="HR,Staff,IT Settings,Reports,Action Plans,Supervisions,CPD">
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">🔤 Phonics Tracker</div>
  </div>

  <div class="card" style="margin-bottom:16px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <label class="form-label" style="margin:0;white-space:nowrap;font-weight:600">Phonics Scheme:</label>
      <select class="form-control" id="scheme-select" style="flex:1;min-width:200px;max-width:300px">
        <option value="letters_sounds">Letters and Sounds (DfE)</option>
        <option value="read_write_inc">Read Write Inc</option>
        <option value="little_wandle">Little Wandle Letters and Sounds</option>
        <option value="sounds_write">Sounds-Write</option>
      </select>
      <span id="scheme-phase-label" class="badge badge-blue" style="font-size:.78rem"></span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">Room Overview</button>
    <button class="tab-btn" data-tab="child">Individual Child</button>
  </div>

  <div id="tab-overview" class="tab-panel active">
    <div id="overview-area"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>

  <div id="tab-child" class="tab-panel">
    <div class="card" style="margin-bottom:16px">
      <div class="form-group">
        <label class="form-label">Select Child</label>
        <select class="form-control" id="child-select">
          <option value="">Choose a child...</option>
        </select>
      </div>
    </div>
    <div id="child-phonics-area"></div>
  </div>
</div>

<script>
// EYFS only: Phase 2 / Set 1 / Initial Code equivalent per scheme
const SCHEMES = {
  letters_sounds: {
    name: 'Letters and Sounds',
    phases: {
      2: { name: 'Phase 2', sounds: ['s','a','t','p','i','n','m','d','g','o','c','k','ck','e','u','r','h','b','f','ff','l','ll','ss'] }
    }
  },
  read_write_inc: {
    name: 'Read Write Inc',
    phases: {
      1: { name: 'Set 1 Speed Sounds', sounds: ['m','a','s','d','t','i','n','p','g','o','c','k','u','b','f','e','l','h','sh','r','j','v','y','w','th','z','ch','qu','x','ng','nk'] }
    }
  },
  little_wandle: {
    name: 'Little Wandle',
    phases: {
      1: { name: 'Phase 2 (Weeks 1–6)', sounds: ['s','a','t','p','i','n','m','d','g','o','c','k','ck','e','u','r','h','b','f','ff','l','ll','ss'] },
      2: { name: 'Phase 2 (Weeks 7–12)', sounds: ['j','v','w','x','y','z','zz','qu','ch','sh','th','ng'] }
    }
  },
  sounds_write: {
    name: 'Sounds-Write',
    phases: {
      1: { name: 'Initial Code', sounds: ['i','o','a','u','e','s','a','t','p','i','n','m','d','g','o','c','k','u','b','f','e','l','h'] }
    }
  }
};

const STATUS_COLORS = {
  mastered: '#15803d',
  secure: '#4a9abf',
  introduced: '#d97706',
  not_introduced: '#1e293b'
};
const STATUS_TEXT_COLORS = {
  mastered: '#fff',
  secure: '#fff',
  introduced: '#fff',
  not_introduced: '#94a3b8'
};
const STATUS_CYCLE = ['not_introduced','introduced','secure','mastered'];

let children = [];
let childPhonics = {};
let currentScheme = localStorage.getItem('wrenPhonicsScheme') || 'letters_sounds';
let currentChildId = null;

function changeScheme(scheme) {
  currentScheme = scheme;
  localStorage.setItem('wrenPhonicsScheme', scheme);
  updateSchemeBadge();
  if (currentChildId) renderChildPhonics(currentChildId);
  loadOverview();
}

function updateSchemeBadge() {
  const scheme = SCHEMES[currentScheme];
  const phases = Object.values(scheme.phases);
  const label = document.getElementById('scheme-phase-label');
  if (label) label.textContent = phases.map(p => p.name).join(' · ');
}

function getActiveSounds() {
  const scheme = SCHEMES[currentScheme];
  // Flatten all phases for this scheme (EYFS = only initial/Phase 2 level)
  return Object.entries(scheme.phases).map(([phaseNum, phaseData]) => ({
    phaseNum, ...phaseData
  }));
}

function showTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === tab) b.classList.add('active');
  });
}

async function loadOverview() {
  try {
    const overview = await Wren.api('/api/phonics/overview');
    const area = document.getElementById('overview-area');
    if (!overview.length) {
      area.innerHTML = '<div class="empty-state"><div class="empty-icon">🔤</div><div class="empty-title">No phonics data yet</div><div class="empty-sub">Select a child to start tracking</div></div>';
      return;
    }
    const scheme = SCHEMES[currentScheme];
    const allSounds = Object.values(scheme.phases).flatMap(p => p.sounds);
    area.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Pre-school Phonics Overview — ${scheme.name}</div>
        </div>
        <div class="table-wrapper"><table>
          <thead><tr><th>Child</th><th>Scheme Set</th><th>Mastered</th><th>Secure</th><th>Introduced</th><th>Total sounds</th></tr></thead>
          <tbody>
            ${overview.map(c => `<tr data-action="go-to-child" data-id="${c.id}" style="cursor:pointer">
              <td><strong>${c.first_name} ${c.last_name}</strong></td>
              <td><span class="badge badge-blue">${Object.values(scheme.phases)[0]?.name || 'Phase 2'}</span></td>
              <td><span style="color:#22c55e;font-weight:700">${c.mastered || 0}</span></td>
              <td><span style="color:#4a9abf;font-weight:700">${c.secure || 0}</span></td>
              <td><span style="color:#f59e0b;font-weight:700">${c.introduced || 0}</span></td>
              <td style="color:#94a3b8">${allSounds.length}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>`;
  } catch(e) {
    document.getElementById('overview-area').innerHTML = '<div class="alert alert-danger">Failed to load overview</div>';
  }
}

async function loadChildren() {
  children = await Wren.api('/api/children').catch(() => []);
  const sel = document.getElementById('child-select');
  children.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.first_name} ${c.last_name}`;
    sel.appendChild(opt);
  });
}

function goToChild(id) {
  showTab('child');
  document.getElementById('child-select').value = id;
  loadChildPhonics(id);
}

async function loadChildPhonics(childId) {
  if (!childId) return;
  currentChildId = childId;
  const area = document.getElementById('child-phonics-area');
  area.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
  try {
    const records = await Wren.api(`/api/phonics/child/${childId}`);
    childPhonics[childId] = {};
    records.forEach(r => { childPhonics[childId][r.sound] = r.status; });
    renderChildPhonics(childId);
  } catch(e) {
    area.innerHTML = '<div class="alert alert-danger">Failed to load phonics data</div>';
  }
}

function renderChildPhonics(childId) {
  const area = document.getElementById('child-phonics-area');
  const sounds = childPhonics[childId] || {};
  const phases = getActiveSounds();
  const scheme = SCHEMES[currentScheme];

  area.innerHTML = `
    <div class="card" style="margin-bottom:12px;padding:12px 16px;background:#0f2235;border-color:#1e3a52">
      <div style="font-size:.78rem;color:#94a3b8;margin-bottom:8px;font-weight:600">KEY</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem">
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#15803d;margin-right:6px;vertical-align:middle"></span>Mastered</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#4a9abf;margin-right:6px;vertical-align:middle"></span>Secure</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#d97706;margin-right:6px;vertical-align:middle"></span>Introduced</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#1e293b;border:1px solid #2d3748;margin-right:6px;vertical-align:middle"></span>Not introduced</span>
      </div>
      <div style="font-size:.75rem;color:#64748b;margin-top:8px">Tap a sound to cycle its status</div>
    </div>
    ${phases.map(({phaseNum, name, sounds: pSounds}) => `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="margin-bottom:12px">
          <div class="card-title">${scheme.name} — ${name}</div>
          <div style="font-size:.78rem;color:#94a3b8">${pSounds.length} sounds</div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${pSounds.map(sound => {
            const status = sounds[sound] || 'not_introduced';
            return `<button
              data-action="cycle-status" data-child="${childId}" data-sound="${encodeURIComponent(sound)}" data-phase="${phaseNum}" data-status="${status}"
              style="padding:8px 14px;border-radius:8px;border:1px solid ${status === 'not_introduced' ? '#2d3748' : 'transparent'};cursor:pointer;
                font-size:.925rem;font-weight:700;letter-spacing:.02em;
                background:${STATUS_COLORS[status]};
                color:${STATUS_TEXT_COLORS[status]};
                min-width:44px;min-height:44px;transition:transform .1s ease"
              title="${status.replace(/_/g,' ')}"
            >${sound}</button>`;
          }).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

async function cycleStatus(childId, sound, phase, currentStatus) {
  const idx = STATUS_CYCLE.indexOf(currentStatus);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  try {
    await Wren.api(`/api/phonics/child/${childId}/sound`, {
      method: 'PUT',
      body: { sound, phase, status: next, scheme: currentScheme }
    });
    if (!childPhonics[childId]) childPhonics[childId] = {};
    childPhonics[childId][sound] = next;
    renderChildPhonics(childId);
  } catch(e) {
    Wren.toast('Failed to update sound', 'error');
  }
}

// Init
document.getElementById('scheme-select').value = currentScheme;
document.getElementById('scheme-select').addEventListener('change', function() { changeScheme(this.value); });
document.getElementById('child-select').addEventListener('change', function() { loadChildPhonics(this.value); });
document.querySelector('.tabs').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-tab]');
  if (btn) showTab(btn.dataset.tab);
});
document.getElementById('overview-area').addEventListener('click', function(e) {
  const row = e.target.closest('[data-action="go-to-child"]');
  if (row) goToChild(parseInt(row.dataset.id));
});
document.getElementById('child-phonics-area').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="cycle-status"]');
  if (btn) cycleStatus(
    parseInt(btn.dataset.child),
    decodeURIComponent(btn.dataset.sound),
    parseInt(btn.dataset.phase),
    btn.dataset.status
  );
});
updateSchemeBadge();
loadOverview();
loadChildren();
</script>
<script src="/js/wren-chat.js?v=2026060801"></script>
</body>
</html>
