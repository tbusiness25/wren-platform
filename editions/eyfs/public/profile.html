<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="eyfs">
  <title>My Profile — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
  <meta name="wren-hide-modules" content="HR,Staff,IT Settings,Reports,Action Plans,Supervisions,CPD">
</head>
<body>
<div id="wren-content">
  <div class="page-title" style="margin-bottom:24px">👤 My Profile</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

    <div class="card">
      <div class="card-header"><div class="card-title">Profile Details</div></div>
      <div id="profile-area"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Change PIN</div></div>
      <div class="form-group">
        <label class="form-label">New PIN (4+ digits)</label>
        <input type="password" class="form-control" id="new-pin" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="Enter new PIN">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm PIN</label>
        <input type="password" class="form-control" id="confirm-pin" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="Confirm PIN">
      </div>
      <button class="btn btn-primary btn-block" id="btn-change-pin">Update PIN</button>
    </div>

  </div>

  <div class="card" style="margin-top:20px">
    <div class="card-header"><div class="card-title">My CPD Records</div></div>
    <div id="cpd-area"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
async function loadProfile() {
  try {
    const me = await Wren.api('/api/auth/me');
    document.getElementById('profile-area').innerHTML = `
      <div style="display:grid;gap:12px;font-size:.9rem">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--c-blue);
            color:#fff;display:flex;align-items:center;justify-content:center;
            font-size:1.5rem;font-weight:800">
            ${me.first_name.charAt(0)}${me.last_name.charAt(0)}
          </div>
          <div>
            <div style="font-weight:800;font-size:1.2rem">${me.first_name} ${me.last_name}</div>
            <div class="badge badge-blue">${me.role?.replace(/_/g,' ')}</div>
          </div>
        </div>
        ${me.email ? `<div><strong>Email:</strong> ${me.email}</div>` : ''}
        ${me.room_name ? `<div><strong>Room:</strong> ${me.room_name}</div>` : ''}
        ${me.contracted_hours ? `<div><strong>Hours:</strong> ${me.contracted_hours}h/week</div>` : ''}
      </div>
    `;
  } catch(e) {
    document.getElementById('profile-area').innerHTML = '<p style="color:var(--c-red)">Failed to load</p>';
  }
}

async function loadCpd() {
  try {
    const user = Wren.user;
    if (!user) return;
    const records = await Wren.api(`/api/staff/${user.id}/absences`);
    document.getElementById('cpd-area').innerHTML = '<p style="color:#94a3b8;font-size:.875rem;padding:8px">CPD records coming soon.</p>';
  } catch(e) {}
}

async function changePin() {
  const pin = document.getElementById('new-pin').value;
  const confirm = document.getElementById('confirm-pin').value;
  if (pin.length < 4) { Wren.toast('PIN must be at least 4 digits', 'warning'); return; }
  if (pin !== confirm) { Wren.toast('PINs do not match', 'warning'); return; }
  if (!/^\d+$/.test(pin)) { Wren.toast('PIN must be numbers only', 'warning'); return; }
  try {
    await Wren.api('/api/auth/set-my-pin', { method: 'POST', body: { pin } });
    Wren.toast('PIN updated ✓ — you will be logged out', 'success', 3000);
    document.getElementById('new-pin').value = '';
    document.getElementById('confirm-pin').value = '';
    setTimeout(() => Wren.logout(), 3000);
  } catch(e) {
    Wren.toast('Failed to update PIN', 'error');
  }
}

document.getElementById('btn-change-pin').addEventListener('click', changePin);
loadProfile();
loadCpd();
</script>
<script src="/js/wren-chat.js?v=2026060801"></script>
</body>
</html>
