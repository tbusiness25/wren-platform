<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven — Staff</title>
<link rel="stylesheet" href="/css/wren.css">
<link rel="stylesheet" href="/css/haven.css">
</head>
<body>
<template id="page">
  <h1 class="hv-page-title">Staff</h1>
  <p class="hv-page-sub">Care team</p>
  <div class="hv-card"><table class="hv-table"><thead><tr>
    <th>Name</th><th>Role</th><th>Email</th><th>Phone</th><th>Employment</th><th>DBS expiry</th>
  </tr></thead><tbody id="rows"></tbody></table></div>
</template>
<script src="/js/haven.js"></script>
<script>
if (Haven.guard()) { Haven.shell('staff'); load(); }
async function load() {
  try {
    const rows = await Haven.api('/api/staff');
    document.getElementById('rows').innerHTML = rows.map(s => `
      <tr><td><b>${Haven.esc(s.first_name)} ${Haven.esc(s.last_name)}</b></td>
      <td>${Haven.badge((s.role || '').replace(/_/g, ' '), 'accent')}</td>
      <td>${Haven.esc(s.email || '—')}</td><td>${Haven.esc(s.phone || '—')}</td>
      <td>${Haven.esc(s.employment_type || '—')}</td>
      <td>${Haven.fmtDate(s.dbs_expiry)}</td></tr>`).join('')
      || '<tr><td colspan="6" class="hv-empty">No staff</td></tr>';
  } catch (e) { Haven.toast(e.message, true); }
}
</script>
</body>
</html>
