<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="hr">
<title>Action Plans — Wren HR</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
:root{--pri:#4a9abf;--acc:#e07820;--bg:#0f172a;--card:#1e293b;--border:#2d3748;--text:#f1f5f9;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
.dev-banner{background:#0c2d48;border:1px solid #1a4060;border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--pri)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-pill{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:.15s}
.filter-pill.active{background:var(--pri);border-color:var(--pri);color:#fff}
.plans-grid{display:flex;flex-direction:column;gap:14px}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;border-left:4px solid transparent}
.plan-card.pri-high{border-left-color:var(--err)}.plan-card.pri-medium{border-left-color:var(--warn)}.plan-card.pri-low{border-left-color:var(--ok)}
.plan-card-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.plan-card-head:hover{background:#253347}
.plan-info{flex:1;min-width:0}
.plan-title-text{font-weight:700;font-size:.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-meta{font-size:.75rem;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.plan-progress{width:60px;text-align:right;font-size:.78rem;color:var(--muted);flex-shrink:0}
.plan-pct{font-size:1rem;font-weight:700;color:var(--pri)}
.plan-body{display:none;border-top:1px solid var(--border)}
.plan-body.open{display:block}
.plan-body-inner{padding:14px 16px}
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:4px solid transparent}
.item-card.pri-high{border-left-color:var(--err)}.item-card.pri-medium{border-left-color:var(--warn)}.item-card.pri-low{border-left-color:var(--ok)}
.item-card-head{padding:10px 12px;display:flex;align-items:center;gap:8px}
.item-cb{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;transition:.15s}
.item-cb:checked{background:var(--ok);border-color:var(--ok)}
.item-cb:checked::after{content:'✓';display:block;text-align:center;color:#fff;font-size:9px;line-height:14px}
.item-label{flex:1;font-size:.85rem;color:var(--text);font-weight:500}
.item-label.done-text{text-decoration:line-through;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600;margin-right:3px}
.badge-red{background:#450a0a;color:var(--err)}.badge-amber{background:#451a03;color:var(--warn)}.badge-green{background:#064e23;color:var(--ok)}.badge-blue{background:#0c2d48;color:var(--pri)}.badge-gray{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.badge-scope-private{background:#2d1a3d;color:#c084fc}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.btn-sm{padding:4px 10px;font-size:.74rem}
.btn-primary{background:var(--pri);color:#fff}.btn-primary:hover{background:#3a8aaf}
.btn-accent{background:var(--acc);color:#fff}.btn-accent:hover{background:#c06810}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-danger{background:var(--err);color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 16px;font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;color:var(--pri);font-size:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.85rem;outline:none;box-sizing:border-box}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pri)}
.form-group textarea{min-height:64px;resize:vertical}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.new-plan-actions{display:flex;gap:8px;margin-bottom:16px}
.escalated-banner{background:#450a0a20;border:1px solid #ef444440;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:.85rem;color:var(--err)}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted);font-size:.9rem}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="wren-shell-target"></div>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Action Plans</div>
      <div class="page-subtitle">HR and staff development action tracking</div>
    </div>
    <button class="btn btn-primary" id="btnNewPlan">+ New Plan</button>
  </div>

  <div class="dev-banner" id="devBanner" style="display:none">
    🌱 My Development Plan — actions in the <strong>Staff Development</strong> category assigned to you
  </div>

  <div id="escalatedBanner"></div>

  <div class="filter-bar">
    <button class="filter-pill active" data-filter="all">All Plans</button>
    <button class="filter-pill" data-filter="mine">Assigned to Me</button>
    <button class="filter-pill" data-filter="development">My Development</button>
    <button class="filter-pill" data-filter="overdue">Overdue</button>
    <button class="filter-pill" data-filter="completed">Completed</button>
  </div>

  <div class="plans-grid" id="plansGrid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<!-- Modal: New / Edit Plan -->
<div class="modal-bg" id="modalPlan">
  <div class="modal">
    <h3 id="modalPlanTitle">New Action Plan</h3>
    <input type="hidden" id="mPlanId">
    <div class="form-group"><label>Title *</label><input id="mTitle" placeholder="e.g. Improve observation quality"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="mCategory">
          <option value="">— Select —</option>
          <option value="staff_development">Staff Development</option>
          <option value="performance">Performance</option>
          <option value="attendance">Attendance</option>
          <option value="conduct">Conduct</option>
          <option value="eyfs_quality">EYFS Quality</option>
          <option value="safeguarding">Safeguarding</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="mPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Owner (Staff)</label><select id="mOwner"><option value="">— Unassigned —</option></select></div>
      <div class="form-group"><label>Target Date</label><input type="date" id="mTargetDate"></div>
    </div>
    <div class="form-group">
      <label>Scope</label>
      <select id="mScope">
        <option value="staff">Staff — visible to assigned staff</option>
        <option value="private">Private — manager only</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><textarea id="mDesc" placeholder="What does this plan aim to achieve?"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnCancelPlan">Cancel</button>
      <button class="btn btn-primary" id="btnSavePlan">Save</button>
    </div>
  </div>
</div>

<!-- Modal: Add / Edit Item -->
<div class="modal-bg" id="modalItem">
  <div class="modal">
    <h3 id="modalItemTitle">Add Action</h3>
    <input type="hidden" id="mItemId"><input type="hidden" id="mItemPlanId">
    <div class="form-group"><label>Action Title *</label><input id="mITitle" placeholder="e.g. Complete safeguarding refresher"></div>
    <div class="form-row">
      <div class="form-group"><label>Priority</label><select id="mIPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
      <div class="form-group"><label>Deadline</label><input type="date" id="mIDeadline"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Status</label><select id="mIStatus"><option value="todo">To Do</option><option value="in-progress">In Progress</option><option value="completed">Completed</option><option value="blocked">Blocked</option></select></div>
      <div class="form-group"><label>Assign To</label><select id="mIAssignee"><option value="">— Unassigned —</option></select></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="mIDesc" placeholder="Additional context…"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="btnCancelItem">Cancel</button>
      <button class="btn btn-primary" id="btnSaveItem">Save</button>
    </div>
  </div>
</div>

<script>
let allPlans=[], itemsByPlan={}, staffList=[], myStaffId=null, isManager=false, currentFilter='all';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function authH(){const t=sessionStorage.getItem('wren_token');return t?{Authorization:'Bearer '+t,'Content-Type':'application/json'}:{'Content-Type':'application/json'};}
async function api(url,opts){const r=await fetch(url,{headers:authH(),...opts});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||r.statusText);return r.json();}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';}
function isOverdue(d,s){return d&&!['completed','blocked'].includes(s)&&new Date(d)<new Date();}
function priClass(p){return p==='high'?'pri-high':p==='low'?'pri-low':'pri-medium';}
function priorityBadge(p){const cls=p==='high'?'badge-red':p==='low'?'badge-green':'badge-amber';return `<span class="badge ${cls}">${esc(p)}</span>`;}

async function init(){
  try {
    const me=await api('/api/auth/me').catch(()=>null)||await api('/api/staff/me').catch(()=>null);
    if(me){myStaffId=me.id;isManager=['manager','deputy_manager'].includes(me.role);}
  } catch{}
  if(isManager) document.getElementById('btnNewPlan').style.display='';
  else document.getElementById('btnNewPlan').style.display='none';

  await Promise.all([loadStaff(), load()]);
  showDevBanner();
}

async function loadStaff(){
  try {
    staffList=await api('/api/staff');
    if(!Array.isArray(staffList)) staffList=[];
    const opts='<option value="">— Unassigned —</option>'+staffList.map(s=>`<option value="${s.id}">${esc(s.first_name)} ${esc(s.last_name)}</option>`).join('');
    document.getElementById('mOwner').innerHTML=opts;
    document.getElementById('mIAssignee').innerHTML=opts;
  } catch{}
}

async function load(){
  try{
    allPlans=await api('/api/action-plans');
    if(!Array.isArray(allPlans)) allPlans=[];
    allPlans=allPlans.filter(p=>!p.archived_at);
    await Promise.all(allPlans.map(async p=>{
      try{itemsByPlan[p.id]=await api('/api/action-plan-items?plan_id='+p.id);}catch{itemsByPlan[p.id]=[];}
    }));
    await loadEscalated();
    renderPlans();
  } catch(e){document.getElementById('plansGrid').innerHTML=`<div class="empty-state">${esc(e.message)}</div>`;}
}

async function loadEscalated(){
  try{
    const esc_plans=await api('/api/action-plans/escalated');
    const banner=document.getElementById('escalatedBanner');
    if(Array.isArray(esc_plans)&&esc_plans.length){
      banner.innerHTML=`<div class="escalated-banner">⚠ ${esc_plans.length} plan${esc_plans.length>1?'s':''} are overdue with no recent progress: ${esc_plans.slice(0,3).map(p=>esc(p.title)).join(', ')}${esc_plans.length>3?'…':''}</div>`;
    } else banner.innerHTML='';
  } catch{}
}

function showDevBanner(){
  if(!myStaffId) return;
  const devBanner=document.getElementById('devBanner');
  const hasDev=allPlans.some(p=>p.category==='staff_development'&&(itemsByPlan[p.id]||[]).some(i=>i.assigned_staff_id===myStaffId));
  devBanner.style.display=hasDev?'flex':'none';
}

function renderPlans(){
  const today=new Date();
  let plans=allPlans;
  if(currentFilter==='mine') plans=plans.filter(p=>(itemsByPlan[p.id]||[]).some(i=>i.assigned_staff_id===myStaffId));
  else if(currentFilter==='development') plans=plans.filter(p=>p.category==='staff_development'&&(itemsByPlan[p.id]||[]).some(i=>i.assigned_staff_id===myStaffId));
  else if(currentFilter==='overdue') plans=plans.filter(p=>(itemsByPlan[p.id]||[]).some(i=>isOverdue(i.deadline,i.status)));
  else if(currentFilter==='completed') plans=plans.filter(p=>p.status==='completed');

  const el=document.getElementById('plansGrid');
  if(!plans.length){el.innerHTML=`<div class="empty-state">No plans match this filter.</div>`;return;}
  el.innerHTML=plans.map(p=>{
    const items=itemsByPlan[p.id]||[];
    const done=items.filter(i=>i.status==='completed').length;
    const pct=items.length?Math.round(done/items.length*100):0;
    const overdue=isOverdue(p.target_date,p.status);
    const scopeBadge=p.scope==='private'?`<span class="badge badge-scope-private">🔒 Private</span>`:`<span class="badge badge-gray">👥 Staff</span>`;
    return `<div class="plan-card ${priClass(p.priority)}">
      <div class="plan-card-head" data-plan="${p.id}">
        <div class="plan-info">
          <div class="plan-title-text">${esc(p.title)}</div>
          <div class="plan-meta">
            ${scopeBadge}
            ${p.category?`<span>${esc(p.category.replace('_',' '))}</span>`:''}
            ${p.owner_name?`<span>👤 ${esc(p.owner_name)}</span>`:''}
            ${p.target_date?`<span ${overdue?'style="color:#ef4444"':''}>${overdue?'⚠ ':''}Due ${fmtDate(p.target_date)}</span>`:''}
          </div>
        </div>
        <div class="plan-progress"><div class="plan-pct">${pct}%</div><div>${done}/${items.length}</div></div>
        ${isManager?`<button class="btn btn-sm btn-ghost" data-edit-plan="${p.id}">Edit</button>`:''}
      </div>
      <div class="plan-body" id="pb-${p.id}">
        <div class="plan-body-inner">
          ${renderItemList(p.id, isManager)}
          ${isManager?`<button class="btn btn-sm btn-accent" data-add-item="${p.id}" style="margin-top:6px">+ Add Action</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderItemList(planId, managerView){
  const items=itemsByPlan[planId]||[];
  if(!items.length) return `<div class="empty-state" style="padding:12px">No actions yet.</div>`;
  return items.map(item=>{
    const done=item.status==='completed';
    const mine=item.assigned_staff_id===myStaffId;
    const overdue=isOverdue(item.deadline,item.status);
    const canTick=mine||isManager;
    const dlBadge=item.deadline?`<span class="badge ${overdue?'badge-red':'badge-gray'}">${overdue?'⚠ ':''}${fmtDate(item.deadline)}</span>`:'';
    return `<div class="item-card ${priClass(item.priority)}">
      <div class="item-card-head">
        <input type="checkbox" class="item-cb" data-id="${item.id}" data-plan="${planId}" ${done?'checked':''} ${canTick?'':'disabled'} title="${canTick?'Toggle status':'Not your action'}">
        <div style="flex:1;min-width:0">
          <div class="item-label ${done?'done-text':''}">${esc(item.title)}</div>
          <div style="margin-top:3px">${priorityBadge(item.priority)}${dlBadge}${item.assignee_name?`<span class="badge badge-blue">👤 ${esc(item.assignee_name)}</span>`:''}</div>
        </div>
        ${managerView?`<button class="btn btn-sm btn-ghost" data-edit-item="${item.id}" data-plan="${planId}">Edit</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── Events ─────────────────────────────────────────────────────────────────────
document.querySelector('.filter-bar').addEventListener('click', e=>{
  const btn=e.target.closest('[data-filter]');
  if(!btn) return;
  currentFilter=btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlans();
});

document.getElementById('plansGrid').addEventListener('click', async e=>{
  const head=e.target.closest('[data-plan]');
  if(head&&!e.target.closest('button')&&!e.target.closest('.item-card')){
    const body=document.getElementById('pb-'+head.dataset.plan);
    if(body) body.classList.toggle('open');
    return;
  }
  const editPlanBtn=e.target.closest('[data-edit-plan]');
  if(editPlanBtn){
    const p=allPlans.find(x=>x.id===parseInt(editPlanBtn.dataset.editPlan));
    if(p) openPlanModal(p);
    return;
  }
  const addItemBtn=e.target.closest('[data-add-item]');
  if(addItemBtn){
    openItemModal(null, addItemBtn.dataset.addItem);
    return;
  }
  const editItemBtn=e.target.closest('[data-edit-item]');
  if(editItemBtn){
    const planId=editItemBtn.dataset.plan;
    const item=(itemsByPlan[planId]||[]).find(i=>i.id===parseInt(editItemBtn.dataset.editItem));
    if(item) openItemModal(item, planId);
    return;
  }
  const cb=e.target.closest('.item-cb');
  if(cb&&!cb.disabled){
    e.preventDefault();
    const newStatus=cb.checked?'todo':'completed';
    try{
      await api(`/api/action-plan-items/${cb.dataset.id}`,{method:'PATCH',body:JSON.stringify({status:newStatus})});
      itemsByPlan[cb.dataset.plan]=await api('/api/action-plan-items?plan_id='+cb.dataset.plan);
      renderPlans();
      wrenToast(newStatus==='completed'?'Marked complete':'Marked to do');
    } catch(er){wrenToast('Error: '+er.message,'error');}
  }
});

document.getElementById('btnNewPlan').addEventListener('click',()=>openPlanModal(null));

function openPlanModal(plan){
  document.getElementById('modalPlanTitle').textContent=plan?'Edit Plan':'New Action Plan';
  document.getElementById('mPlanId').value=plan?.id||'';
  document.getElementById('mTitle').value=plan?.title||'';
  document.getElementById('mCategory').value=plan?.category||'';
  document.getElementById('mPriority').value=plan?.priority||'medium';
  document.getElementById('mOwner').value=plan?.owner_staff_id||'';
  document.getElementById('mTargetDate').value=plan?.target_date?plan.target_date.slice(0,10):'';
  document.getElementById('mScope').value=plan?.scope||'staff';
  document.getElementById('mDesc').value=plan?.description||'';
  document.getElementById('modalPlan').classList.add('open');
}

async function savePlan(){
  const id=document.getElementById('mPlanId').value;
  const body={title:document.getElementById('mTitle').value.trim(),category:document.getElementById('mCategory').value||null,priority:document.getElementById('mPriority').value,owner_staff_id:document.getElementById('mOwner').value||null,target_date:document.getElementById('mTargetDate').value||null,scope:document.getElementById('mScope').value,description:document.getElementById('mDesc').value.trim()||null};
  if(!body.title){wrenToast('Title required','error');return;}
  try{
    if(id) await api(`/api/action-plans/${id}`,{method:'PATCH',body:JSON.stringify(body)});
    else await api('/api/action-plans',{method:'POST',body:JSON.stringify(body)});
    document.getElementById('modalPlan').classList.remove('open');
    wrenToast('Plan saved');
    await load();
  } catch(e){wrenToast('Error: '+e.message,'error');}
}

function openItemModal(item, planId){
  document.getElementById('modalItemTitle').textContent=item?'Edit Action':'Add Action';
  document.getElementById('mItemId').value=item?.id||'';
  document.getElementById('mItemPlanId').value=item?.plan_id||planId;
  document.getElementById('mITitle').value=item?.title||'';
  document.getElementById('mIPriority').value=item?.priority||'medium';
  document.getElementById('mIDeadline').value=item?.deadline?item.deadline.slice(0,10):'';
  document.getElementById('mIStatus').value=item?.status||'todo';
  document.getElementById('mIAssignee').value=item?.assigned_staff_id||'';
  document.getElementById('mIDesc').value=item?.description||'';
  document.getElementById('modalItem').classList.add('open');
}

async function saveItem(){
  const id=document.getElementById('mItemId').value;
  const planId=document.getElementById('mItemPlanId').value;
  const body={plan_id:parseInt(planId),title:document.getElementById('mITitle').value.trim(),priority:document.getElementById('mIPriority').value,deadline:document.getElementById('mIDeadline').value||null,status:document.getElementById('mIStatus').value,assigned_staff_id:document.getElementById('mIAssignee').value||null,description:document.getElementById('mIDesc').value.trim()||null};
  if(!body.title){wrenToast('Title required','error');return;}
  try{
    if(id) await api(`/api/action-plan-items/${id}`,{method:'PATCH',body:JSON.stringify(body)});
    else await api('/api/action-plan-items',{method:'POST',body:JSON.stringify(body)});
    document.getElementById('modalItem').classList.remove('open');
    wrenToast('Action saved');
    itemsByPlan[planId]=await api('/api/action-plan-items?plan_id='+planId);
    renderPlans();
  } catch(e){wrenToast('Error: '+e.message,'error');}
}

document.getElementById('btnSavePlan').addEventListener('click',savePlan);
document.getElementById('btnCancelPlan').addEventListener('click',()=>document.getElementById('modalPlan').classList.remove('open'));
document.getElementById('btnSaveItem').addEventListener('click',saveItem);
document.getElementById('btnCancelItem').addEventListener('click',()=>document.getElementById('modalItem').classList.remove('open'));
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

document.addEventListener('wren:ready', init);
</script>
<script src="/js/wren-chat.js?v=2026070901"></script>
</body>
</html>
