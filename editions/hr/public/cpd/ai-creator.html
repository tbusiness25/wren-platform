<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="hr">
  <title>AI CPD Creator — Wren HR</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .cpd-ai-grid { display:grid;grid-template-columns:280px 1fr;gap:16px;height:calc(100vh - 120px);overflow:hidden; }
    @media(max-width:800px){ .cpd-ai-grid{grid-template-columns:1fr;height:auto;overflow:visible} }
    .config-panel { background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;overflow-y:auto; }
    .config-panel h3 { font-size:.78rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px; }
    .form-group { margin-bottom:12px; }
    .form-label { font-size:.75rem;font-weight:700;color:var(--c-muted);margin-bottom:4px;display:block; }
    .form-control { width:100%;background:#0f172a;border:1px solid #2d3748;color:var(--c-text);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:.82rem; }
    .form-control:focus { outline:none;border-color:#4a9abf; }
    .output-panel { background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden; }
    .output-header { padding:12px 16px;border-bottom:1px solid var(--c-border);display:flex;gap:8px;align-items:center; }
    .output-body { flex:1;overflow-y:auto;padding:16px; }
    .cpd-doc { font-size:.875rem;line-height:1.7;color:var(--c-text);white-space:pre-wrap; }
    .placeholder-msg { color:var(--c-muted);text-align:center;padding:60px 20px;font-size:.9rem; }
    .section-chip { display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:600;background:rgba(74,154,191,.12);color:#4a9abf;border:1px solid rgba(74,154,191,.2);margin:2px; }
    .spinner-sm { width:14px;height:14px;border:2px solid rgba(74,154,191,.3);border-top-color:#4a9abf;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .copy-btn { padding:5px 12px;border-radius:8px;border:1px solid rgba(74,154,191,.3);background:rgba(74,154,191,.08);color:#4a9abf;font-size:.75rem;cursor:pointer;font-family:inherit; }
    .copy-btn:hover { background:rgba(74,154,191,.18); }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">🎓 AI CPD Creator</div>
    <a href="/my-cpd.html" class="btn btn-secondary btn-sm">← My CPD</a>
  </div>
  <div class="cpd-ai-grid">
    <!-- Config panel -->
    <div class="config-panel">
      <h3>CPD Settings</h3>
      <div class="form-group">
        <label class="form-label">Topic / Area</label>
        <input class="form-control" id="cpd-topic" placeholder="e.g. Safeguarding, EYFS Pedagogy…">
      </div>
      <div class="form-group">
        <label class="form-label">Your role</label>
        <select class="form-control" id="cpd-role">
          <option value="practitioner">Practitioner</option>
          <option value="room_leader">Room Leader</option>
          <option value="deputy_manager">Deputy Manager</option>
          <option value="manager">Manager</option>
          <option value="senco">SENCO</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Duration</label>
        <select class="form-control" id="cpd-duration">
          <option value="30 minutes">30 minutes</option>
          <option value="1 hour" selected>1 hour</option>
          <option value="half day">Half day</option>
          <option value="full day">Full day</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Format</label>
        <select class="form-control" id="cpd-format">
          <option value="self-study plan">Self-study plan</option>
          <option value="team training session plan">Team training session</option>
          <option value="reflection journal template">Reflection journal</option>
          <option value="action research outline">Action research outline</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Include sections</label>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px" id="section-chips">
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" checked value="learning_objectives"> Objectives
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" checked value="key_content"> Key content
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" checked value="activities"> Activities
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" checked value="reflection"> Reflection
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" value="assessment"> Assessment
          </label>
          <label style="display:flex;align-items:center;gap:4px;font-size:.75rem;cursor:pointer">
            <input type="checkbox" value="further_reading"> Further reading
          </label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Extra context (optional)</label>
        <textarea class="form-control" id="cpd-context" rows="3" placeholder="e.g. We had an inspection recently…"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px" id="generate-cpd-btn">Generate CPD plan</button>
    </div>
    <!-- Output panel -->
    <div class="output-panel">
      <div class="output-header">
        <span style="font-size:.78rem;font-weight:700;color:var(--c-muted)">Generated plan</span>
        <span id="gen-status" style="font-size:.75rem;color:var(--c-muted)"></span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="copy-btn" id="copy-btn" style="display:none">Copy</button>
          <button class="copy-btn" id="save-btn" style="display:none">Save as CPD record</button>
        </div>
      </div>
      <div class="output-body">
        <div id="cpd-output"><p class="placeholder-msg">Configure your CPD settings and click <strong>Generate CPD plan</strong>.</p></div>
      </div>
    </div>
  </div>
</div>
<script>
let generatedText = '';

document.addEventListener('wren:ready', () => {
  const user = Wren.user;
  if (user && user.role) {
    const sel = document.getElementById('cpd-role');
    const opt = Array.from(sel.options).find(o => o.value === user.role);
    if (opt) sel.value = user.role;
  }
  document.getElementById('generate-cpd-btn').addEventListener('click', generateCPD);
  document.getElementById('copy-btn').addEventListener('click', copyOutput);
  document.getElementById('save-btn').addEventListener('click', saveAsCPD);
});

async function generateCPD() {
  const topic = document.getElementById('cpd-topic').value.trim();
  if (!topic) { Wren.toast && Wren.toast('Please enter a topic', 'error'); return; }
  const sections = Array.from(document.querySelectorAll('#section-chips input:checked')).map(c => c.value);
  const payload = {
    topic,
    role: document.getElementById('cpd-role').value,
    duration: document.getElementById('cpd-duration').value,
    format: document.getElementById('cpd-format').value,
    sections,
    context: document.getElementById('cpd-context').value.trim() || null,
  };

  const statusEl = document.getElementById('gen-status');
  const outputEl = document.getElementById('cpd-output');
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  outputEl.innerHTML = '<pre class="cpd-doc" id="stream-doc"></pre>';
  statusEl.innerHTML = '<span class="spinner-sm"></span> Generating…';
  generatedText = '';

  try {
    const res = await fetch('/api/ai/cpd-creator', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionStorage.getItem('wrenToken') },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      generatedText += dec.decode(value);
      document.getElementById('stream-doc').textContent = generatedText;
    }
    statusEl.textContent = 'Done';
    document.getElementById('copy-btn').style.display = '';
    document.getElementById('save-btn').style.display = '';
  } catch(e) {
    outputEl.innerHTML = `<p style="color:#ef4444">Error: ${e.message}</p>`;
    statusEl.textContent = 'Failed';
  } finally {
    setTimeout(() => statusEl.textContent = '', 4000);
  }
}

function copyOutput() {
  navigator.clipboard.writeText(generatedText).then(() => Wren.toast && Wren.toast('Copied to clipboard', 'success'));
}

async function saveAsCPD() {
  const topic = document.getElementById('cpd-topic').value.trim();
  if (!topic || !generatedText) return;
  try {
    await Wren.api('/api/cpd', {
      method: 'POST',
      body: JSON.stringify({
        title: topic,
        notes: generatedText,
        type: document.getElementById('cpd-format').value,
        hours: parseFloat(document.getElementById('cpd-duration').value) || 1,
        date: new Date().toISOString().split('T')[0],
      })
    });
    Wren.toast && Wren.toast('Saved as CPD record', 'success');
    document.getElementById('save-btn').textContent = '✓ Saved';
  } catch(e) {
    Wren.toast && Wren.toast('Failed to save', 'error');
  }
}
</script>
</body>
</html>
