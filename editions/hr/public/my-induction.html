<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="hr">
  <title>My Induction — HR Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .ind-bar { background:#0f172a; border-radius:6px; height:10px; overflow:hidden; margin-top:10px; }
    .ind-bar-fill { height:100%; background:linear-gradient(90deg,#4a9abf,#e07820); border-radius:6px; transition:.4s; }
    .ind-grp-label { font-size:.8rem; font-weight:800; color:#e07820; text-transform:uppercase; letter-spacing:.05em; margin:22px 0 8px; }
    .ind-item { background:#1e293b; border:1px solid #2d3748; border-radius:10px; padding:14px 16px; margin-bottom:10px; }
    .ind-item.signed_off { border-color:#166534; }
    .ind-item-top { display:flex; align-items:flex-start; gap:10px; }
    .ind-icon { font-size:1.2rem; width:26px; text-align:center; flex-shrink:0; }
    .ind-title { font-weight:700; color:#f1f5f9; font-size:.95rem; flex:1; }
    .ind-chip { font-size:.68rem; font-weight:800; padding:3px 9px; border-radius:10px; text-transform:uppercase; letter-spacing:.03em; flex-shrink:0; }
    .ind-chip.pending     { background:rgba(148,163,184,.15); color:#94a3b8; }
    .ind-chip.in_progress { background:rgba(74,154,191,.18); color:#4a9abf; }
    .ind-chip.done        { background:rgba(245,158,11,.16); color:#f59e0b; }
    .ind-chip.signed_off  { background:rgba(34,197,94,.16); color:#22c55e; }
    .ind-desc { font-size:.86rem; color:#cbd5e1; line-height:1.55; margin-top:10px; }
    .ind-cite { font-size:.74rem; color:#94a3b8; margin-top:10px; border-top:1px dashed #2d3748; padding-top:8px; line-height:1.4; }
    .ind-cite b { color:#e2e8f0; }
    .ind-signed { font-size:.78rem; color:#22c55e; margin-top:8px; font-weight:600; }
    .ind-note { font-size:.78rem; color:#94a3b8; margin-top:6px; }
    .ind-readonly-banner { background:#0c2040; border:1px solid #1e3a5f; color:#cbd5e1; border-radius:10px; padding:12px 16px; font-size:.85rem; margin-bottom:18px; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <h1 class="page-title">🌱 My Induction</h1>
  </div>

  <div class="ind-readonly-banner">
    This is a read-only view of your induction record. Items are completed and signed off on the <b>Nest</b> staff app in the nursery.
  </div>

  <div id="ind-head"></div>
  <div id="ind-body"><div style="color:#94a3b8">Loading…</div></div>
</div>

<script>
document.addEventListener('wren:ready', init);

var ITEM_ICON = { form: '📋', course: '🎓', reading: '📖', task: '✅' };

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(_) { return d; }
}

async function init() {
  var user = (window.Wren && Wren.getUser) ? Wren.getUser() : {};
  var body = document.getElementById('ind-body');
  try {
    var list = await Wren.api('/api/induction/assignments');
    list = Array.isArray(list) ? list : [];
    var mine = list.filter(function (a) { return Number(a.staff_id) === Number(user.id); });
    if (!mine.length) {
      document.getElementById('ind-head').innerHTML = '';
      body.innerHTML = '<div style="color:#94a3b8;padding:24px 0">You have no induction checklist assigned yet. Your room leader will set one up when you start.</div>';
      return;
    }
    // Show the most recent in-progress (or first) assignment
    var a = mine.sort(function (x, y) { return (y.id || 0) - (x.id || 0); })[0];
    var detail = await Wren.api('/api/induction/assignments/' + a.id);
    renderDetail(detail);
  } catch (e) {
    body.innerHTML = '<div style="color:#94a3b8;padding:24px 0">Could not load your induction record.</div>';
  }
}

function renderDetail(d) {
  var pct = d.pct_complete || 0;
  document.getElementById('ind-head').innerHTML =
    '<div class="stat-card" style="padding:18px">' +
      '<div style="font-weight:700;color:#f1f5f9;font-size:1.05rem">' + esc(d.template_name || 'Induction') + '</div>' +
      '<div style="font-size:.82rem;color:#94a3b8;margin-top:3px">' +
        (d.room_leader_name ? 'Room leader: ' + esc(d.room_leader_name) : '') +
        (d.target_complete_date ? ' · Target ' + esc(fmtDate(d.target_complete_date)) : '') + '</div>' +
      '<div class="ind-bar"><div class="ind-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div style="font-size:.82rem;color:#94a3b8;margin-top:8px">' + pct + '% complete · ' + (d.pct_signed_off || 0) + '% signed off</div>' +
    '</div>';

  var groups = [], byKey = {};
  (d.items || []).forEach(function (it) {
    var k = it.section || 'Other';
    if (!byKey[k]) { byKey[k] = []; groups.push(k); }
    byKey[k].push(it);
  });

  var html = '';
  groups.forEach(function (g) {
    html += '<div class="ind-grp-label">' + esc(g) + '</div>';
    html += byKey[g].map(itemHTML).join('');
  });
  document.getElementById('ind-body').innerHTML = html || '<div style="color:#94a3b8">No items.</div>';
}

function itemHTML(it) {
  var st = it.status || 'pending';
  var stLabel = { pending:'To do', in_progress:'In progress', done:'Done', signed_off:'Signed off' }[st];
  var cite = (it.source_refs && it.source_refs.length)
    ? '<div class="ind-cite"><b>Source:</b> ' + it.source_refs.map(esc).join(' · ') + '</div>' : '';
  var signed = (st === 'signed_off' && it.signed_off_by_name)
    ? '<div class="ind-signed">✓ Signed off by ' + esc(it.signed_off_by_name) + (it.signed_off_at ? ' · ' + esc(fmtDate(it.signed_off_at)) : '') + '</div>' : '';
  var note = it.evidence_note ? '<div class="ind-note"><b>Note:</b> ' + esc(it.evidence_note) + '</div>' : '';
  var desc = (it.item_type === 'reading' && it.description) ? '<div class="ind-desc">' + esc(it.description) + '</div>' : '';
  return '<div class="ind-item ' + st + '">' +
    '<div class="ind-item-top">' +
      '<div class="ind-icon">' + (ITEM_ICON[it.item_type] || '•') + '</div>' +
      '<div class="ind-title">' + esc(it.title) + '</div>' +
      '<span class="ind-chip ' + st + '">' + stLabel + '</span>' +
    '</div>' + desc + signed + note + cite +
  '</div>';
}
</script>
</body>
</html>
