<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="hr">
  <title>My Profile — HR Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <h1 class="page-title">My Profile</h1>
  </div>

  <div id="profile-loading" style="color:#94a3b8;padding:32px 0">Loading your profile…</div>
  <div id="profile-content" style="display:none">

    <!-- Profile card -->
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="width:72px;height:72px;background:#4a9abf;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;flex-shrink:0" id="avatar-initials">?</div>
        <div>
          <h2 id="profile-name" style="margin:0 0 4px;color:#f1f5f9"></h2>
          <div id="profile-role" style="color:#4a9abf;font-weight:500;text-transform:capitalize"></div>
          <div id="profile-email" style="color:#94a3b8;font-size:.875rem;margin-top:4px"></div>
        </div>
      </div>
    </div>

    <!-- Details grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
      <div class="card">
        <div class="card-header">Employment Details</div>
        <div class="detail-list">
          <div class="detail-row"><span class="detail-label">Room</span><span id="d-room">—</span></div>
          <div class="detail-row"><span class="detail-label">Start Date</span><span id="d-start">—</span></div>
          <div class="detail-row"><span class="detail-label">Contract Type</span><span id="d-contract">—</span></div>
          <div class="detail-row"><span class="detail-label">Hours / Week</span><span id="d-hours">—</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Compliance</div>
        <div class="detail-list">
          <div class="detail-row"><span class="detail-label">DBS Number</span><span id="d-dbs-num">—</span></div>
          <div class="detail-row"><span class="detail-label">DBS Expiry</span><span id="d-dbs-exp">—</span></div>
          <div class="detail-row"><span class="detail-label">First Aid Expiry</span><span id="d-fa-exp">—</span></div>
          <div class="detail-row"><span class="detail-label">Safeguarding Exp</span><span id="d-sg-exp">—</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Qualifications</div>
        <div id="quals-list" style="color:#94a3b8;font-size:.9rem">None recorded</div>
      </div>

      <div class="card">
        <div class="card-header">Emergency Contact</div>
        <div class="detail-list">
          <div class="detail-row"><span class="detail-label">Name</span><span id="d-ec-name">—</span></div>
          <div class="detail-row"><span class="detail-label">Phone</span><span id="d-ec-phone">—</span></div>
          <div class="detail-row"><span class="detail-label">Relationship</span><span id="d-ec-rel">—</span></div>
        </div>
      </div>
    </div>

    <p style="color:#64748b;font-size:.8rem;margin-top:20px">
      To update your details, contact the manager.
    </p>
  </div>
</div>

<style>
.detail-list { display:flex;flex-direction:column;gap:10px }
.detail-row { display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2d3748 }
.detail-row:last-child { border-bottom:none }
.detail-label { color:#94a3b8;font-size:.875rem }
.card-header { font-weight:700;color:#f1f5f9;margin-bottom:16px;font-size:.95rem;text-transform:uppercase;letter-spacing:.5px;color:#4a9abf }
</style>

<script>
document.addEventListener('wren:ready', loadProfile);

async function loadProfile() {
  const user = Wren.user;
  try {
    const staff = await Wren.api('/api/staff/' + user.id);
    document.getElementById('profile-loading').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';

    document.getElementById('avatar-initials').textContent = (staff.name || '?').charAt(0).toUpperCase();
    document.getElementById('profile-name').textContent = staff.name || '—';
    document.getElementById('profile-role').textContent = (staff.role || '').replace(/_/g,' ');
    document.getElementById('profile-email').textContent = staff.email || '—';

    document.getElementById('d-room').textContent = staff.room_name || '—';
    document.getElementById('d-start').textContent = staff.start_date ? new Date(staff.start_date).toLocaleDateString('en-GB') : '—';
    document.getElementById('d-contract').textContent = staff.contract_type || '—';
    document.getElementById('d-hours').textContent = staff.contracted_hours ? staff.contracted_hours + 'h' : '—';

    document.getElementById('d-dbs-num').textContent = staff.dbs_number || '—';

    function formatExp(date) {
      if (!date) return '—';
      const d = new Date(date);
      const expired = d < new Date();
      return `<span style="color:${expired ? '#ef4444' : '#22c55e'}">${d.toLocaleDateString('en-GB')}${expired ? ' ⚠ Expired' : ''}</span>`;
    }
    document.getElementById('d-dbs-exp').innerHTML = formatExp(staff.dbs_expiry);
    document.getElementById('d-fa-exp').innerHTML = formatExp(staff.first_aid_expiry);
    document.getElementById('d-sg-exp').innerHTML = formatExp(staff.safeguarding_expiry);

    document.getElementById('d-ec-name').textContent = staff.emergency_contact_name || '—';
    document.getElementById('d-ec-phone').textContent = staff.emergency_contact_phone || '—';
    document.getElementById('d-ec-rel').textContent = staff.emergency_contact_relationship || '—';

    if (staff.qualifications) {
      document.getElementById('quals-list').textContent = staff.qualifications;
    }
  } catch (err) {
    document.getElementById('profile-loading').textContent = 'Could not load profile — ' + (err.message || 'unknown error');
  }
}
</script>
</body>
</html>
