<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="hr">
  <title>My Supervisions — HR Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <h1 class="page-title">My Supervisions</h1>
  </div>

  <div id="sup-list" style="display:flex;flex-direction:column;gap:12px">
    <div style="color:#94a3b8">Loading supervisions…</div>
  </div>
</div>

<script>
document.addEventListener('wren:ready', loadSupervisions);

async function loadSupervisions() {
  const user = Wren.user;
  const el = document.getElementById('sup-list');
  try {
    const data = await Wren.api('/api/supervisions?staff_id=' + user.id);
    if (!data || !data.length) {
      el.innerHTML = '<div class="card" style="color:#94a3b8;text-align:center;padding:40px">No supervision records yet.</div>';
      return;
    }
    el.innerHTML = data.map(s => `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-weight:600;color:#f1f5f9">${s.supervisor_name || 'Supervision'}</div>
            <div style="color:#94a3b8;font-size:.875rem">${s.scheduled_at ? new Date(s.scheduled_at).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : 'Date unknown'}</div>
          </div>
          <span class="badge ${s.status === 'completed' ? 'badge-green' : s.status === 'scheduled' ? 'badge-blue' : 'badge-orange'}">${s.status || 'unknown'}</span>
        </div>
        ${s.notes ? `<p style="margin:12px 0 0;color:#cbd5e1;font-size:.9rem;border-top:1px solid #2d3748;padding-top:12px">${escHtml(s.notes)}</p>` : ''}
        ${s.targets_count > 0 ? `<div style="margin-top:8px;font-size:.8rem;color:#4a9abf">🎯 ${s.targets_count} target${s.targets_count > 1 ? 's' : ''} set</div>` : ''}
      </div>`).join('');
  } catch (err) {
    el.innerHTML = '<div style="color:#ef4444">Could not load supervisions: ' + (err.message || 'unknown error') + '</div>';
  }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
