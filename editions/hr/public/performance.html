<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="hr">
  <title>Staff Performance — HR Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <h1 class="page-title">Staff Performance</h1>
    <p style="color:#94a3b8;margin:0">Overview of lateness, absences, observation quality and contribution.</p>
  </div>

  <div id="perf-content">
    <div style="color:#94a3b8">Loading…</div>
  </div>
</div>

<script>
document.addEventListener('wren:ready', loadPerformance);

async function loadPerformance() {
  const el = document.getElementById('perf-content');

  // Check for staff_id query param (drill-down from staff list)
  const staffId = new URLSearchParams(window.location.search).get('staff');

  try {
    const [staff, flags] = await Promise.all([
      Wren.api('/api/staff'),
      Wren.api('/api/performance/flags' + (staffId ? '?staff_id=' + staffId : '')).catch(() => []),
    ]);

    const activeStaff = (staff || []).filter(s => s.is_active !== false);
    const flagsByStaff = {};
    (flags || []).forEach(f => {
      if (!flagsByStaff[f.staff_id]) flagsByStaff[f.staff_id] = [];
      flagsByStaff[f.staff_id].push(f);
    });

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
        ${activeStaff.map(s => {
          const sFlags = flagsByStaff[s.id] || [];
          const lateCount = sFlags.filter(f => f.flag_type === 'late_arrival').length;
          const absCount = sFlags.filter(f => f.flag_type === 'unplanned_absence').length;
          const obsCount = sFlags.filter(f => f.flag_type === 'low_obs_quality').length;
          const total = sFlags.length;

          const indicator = total > 5 ? '#ef4444' : total > 2 ? '#f59e0b' : '#22c55e';
          return `<div class="card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
              <div>
                <div style="font-weight:700;color:#f1f5f9">${escHtml(s.name||'')}</div>
                <div style="color:#94a3b8;font-size:.8rem;text-transform:capitalize">${(s.role||'').replace(/_/g,' ')}</div>
              </div>
              <div style="width:12px;height:12px;border-radius:50%;background:${indicator};margin-top:4px" title="${total} flags"></div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
              <div>
                <div style="font-size:1.5rem;font-weight:700;color:${lateCount > 2 ? '#f59e0b' : '#94a3b8'}">${lateCount}</div>
                <div style="font-size:.75rem;color:#64748b">Late</div>
              </div>
              <div>
                <div style="font-size:1.5rem;font-weight:700;color:${absCount > 3 ? '#ef4444' : '#94a3b8'}">${absCount}</div>
                <div style="font-size:.75rem;color:#64748b">Absences</div>
              </div>
              <div>
                <div style="font-size:1.5rem;font-weight:700;color:${obsCount > 1 ? '#f59e0b' : '#94a3b8'}">${obsCount}</div>
                <div style="font-size:.75rem;color:#64748b">Obs flags</div>
              </div>
            </div>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid #2d3748;display:flex;justify-content:flex-end">
              <a href="/staff.html?id=${s.id}" class="btn btn-ghost" style="font-size:.8rem;padding:4px 12px">Full profile →</a>
            </div>
          </div>`;
        }).join('')}
      </div>
      <p style="color:#64748b;font-size:.8rem;margin-top:16px">
        Flags are generated automatically from clock-in events, absence records, and observation submissions.
        Green = 0–2 flags · Amber = 3–5 · Red = 6+
      </p>`;
  } catch (err) {
    el.innerHTML = '<div style="color:#ef4444">Could not load performance data: ' + (err.message||'error') + '</div>';
  }
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
