<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="hr">
  <title>Supervisions Admin — HR Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <h1 class="page-title">Supervisions</h1>
    <a href="https://admin.littleangelsealing.co.uk/admin/supervisions" class="btn btn-primary" id="new-sup-btn" target="_blank">+ Schedule Supervision</a>
  </div>

  <div id="sup-list" style="display:flex;flex-direction:column;gap:10px">
    <div style="color:#94a3b8">Loading…</div>
  </div>
</div>

<script>
document.addEventListener('wren:ready', loadSupervisions);

async function loadSupervisions() {
  const el = document.getElementById('sup-list');
  try {
    const data = await Wren.api('/api/supervisions?limit=50');
    if (!data || !data.length) {
      el.innerHTML = '<div class="card" style="color:#94a3b8;text-align:center;padding:40px">No supervision records yet.</div>';
      return;
    }
    const grouped = {};
    data.forEach(s => {
      const name = s.staff_name || 'Unknown';
      if (!grouped[name]) grouped[name] = [];
      grouped[name].push(s);
    });
    el.innerHTML = Object.entries(grouped).map(([name, sups]) => `
      <div class="card">
        <div style="font-weight:700;color:#f1f5f9;margin-bottom:12px">${escHtml(name)}</div>
        ${sups.map(s => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #2d3748;flex-wrap:wrap;gap:8px">
            <div>
              <div style="color:#cbd5e1;font-size:.9rem">${s.scheduled_at ? new Date(s.scheduled_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'No date'}</div>
              ${s.notes ? `<div style="color:#64748b;font-size:.8rem;margin-top:2px">${escHtml(s.notes.slice(0,80))}${s.notes.length > 80 ? '…' : ''}</div>` : ''}
            </div>
            <span class="badge ${s.status === 'completed' ? 'badge-green' : s.status === 'scheduled' ? 'badge-blue' : 'badge-orange'}">${s.status || '—'}</span>
          </div>`).join('')}
      </div>`).join('');
  } catch (err) {
    el.innerHTML = '<div style="color:#ef4444">Could not load supervisions: ' + (err.message || 'unknown') + '</div>';
  }
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
