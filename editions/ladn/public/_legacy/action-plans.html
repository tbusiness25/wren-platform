<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="wren-edition" content="ladn">
<title>Action Plans — Wren EY</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
:root{--pri:#4a9abf;--acc:#e07820;--bg:#0f172a;--card:#1e293b;--border:#2d3748;--text:#f1f5f9;--muted:#94a3b8;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-pill{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:.15s}
.filter-pill.active{background:var(--pri);border-color:var(--pri);color:#fff}
.plans-list{display:flex;flex-direction:column;gap:12px}
.plan-block{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.plan-block-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.plan-block-head:hover{background:#253347}
.plan-block-title{flex:1;font-weight:700;font-size:.95rem;color:var(--text)}
.plan-block-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.chevron{font-size:.8rem;color:var(--muted);flex-shrink:0;transition:.2s}
.plan-block-body{display:none;padding:10px 16px 16px}
.plan-block-body.open{display:block}
.item-row{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:4px solid transparent}
.item-row.pri-high{border-left-color:var(--err)}.item-row.pri-medium{border-left-color:var(--warn)}.item-row.pri-low{border-left-color:var(--ok)}
.item-row.mine{background:#0f1e2f}
.item-row-head{padding:10px 12px;display:flex;align-items:center;gap:10px}
.item-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;transition:.15s}
.item-checkbox:checked{background:var(--ok);border-color:var(--ok)}
.item-checkbox:checked::after{content:'✓';display:block;text-align:center;color:#fff;font-size:11px;line-height:16px}
.item-title{flex:1;font-size:.87rem;font-weight:600;color:var(--text)}
.item-title.done{text-decoration:line-through;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600;margin-right:4px}
.badge-red{background:#450a0a;color:var(--err)}.badge-amber{background:#451a03;color:var(--warn)}.badge-green{background:#064e23;color:var(--ok)}.badge-blue{background:#0c2d48;color:var(--pri)}.badge-gray{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.item-desc{padding:0 12px 10px 40px;font-size:.82rem;color:var(--muted);display:none}
.item-desc.open{display:block}
.expand-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.65rem;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-area{padding:0 12px 12px 40px}
.comment-form{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:.82rem;outline:none}
.comment-input:focus{border-color:var(--pri)}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.btn-sm{padding:4px 10px;font-size:.74rem}
.btn-primary{background:var(--pri);color:#fff}.btn-primary:hover{background:#3a8aaf}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.comment-bubble{background:var(--card);border-radius:8px;padding:7px 10px;margin-bottom:6px;font-size:.8rem}
.comment-bubble .author{color:var(--pri);font-weight:600;font-size:.72rem;margin-bottom:2px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem}
.mine-badge{display:inline-block;padding:2px 8px;border-radius:20px;background:#0c2d48;color:var(--pri);font-size:.68rem;font-weight:700}
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.82rem}
.stat-chip span{font-weight:700;color:var(--pri);margin-right:4px}
</style>
</head>
<body>
<div id="wren-shell-target"></div>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Action Plans</div>
      <div class="page-subtitle">Your assigned actions and team plans</div>
    </div>
  </div>

  <div class="stat-row" id="statRow"></div>

  <div class="filter-bar">
    <button class="filter-pill active" data-filter="mine">Assigned to me</button>
    <button class="filter-pill" data-filter="all">All Plans</button>
    <button class="filter-pill" data-filter="overdue">Overdue</button>
    <button class="filter-pill" data-filter="completed">Completed</button>
  </div>

  <div class="plans-list" id="plansList">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<script>
let allPlans = [], itemsByPlan = {}, currentFilter = 'mine', myStaffId = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function authH(){ const t=sessionStorage.getItem('wren_token'); return t?{Authorization:'Bearer '+t,'Content-Type':'application/json'}:{'Content-Type':'application/json'}; }
async function api(url, opts){ const r=await fetch(url,{headers:authH(),...opts}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||r.statusText); return r.json(); }
function fmtDate(d){ return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—'; }
function isOverdue(d,s){ return d&&!['completed','blocked'].includes(s)&&new Date(d)<new Date(); }
function priClass(p){ return p==='high'?'pri-high':p==='low'?'pri-low':'pri-medium'; }

async function init(){
  try {
    const me = await api('/api/auth/me').catch(()=>null) || await api('/api/staff/me').catch(()=>null);
    if (me) myStaffId = me.id;
  } catch {}
  await load();
}

async function load(){
  try {
    allPlans = await api('/api/action-plans');
    if(!Array.isArray(allPlans)) allPlans=[];
    allPlans = allPlans.filter(p=>!p.archived_at && p.scope!=='private');
    // Load items for all visible plans
    await Promise.all(allPlans.map(async p=>{
      try { itemsByPlan[p.id] = await api('/api/action-plan-items?plan_id='+p.id); } catch { itemsByPlan[p.id]=[]; }
    }));
    renderStats();
    renderPlans();
  } catch(e){ document.getElementById('plansList').innerHTML=`<div class="empty-state">${esc(e.message)}</div>`; }
}

function renderStats(){
  let myItems=[];
  allPlans.forEach(p=>{ (itemsByPlan[p.id]||[]).forEach(i=>{ if(i.assigned_staff_id===myStaffId) myItems.push(i); }); });
  const overdue=myItems.filter(i=>isOverdue(i.deadline,i.status)).length;
  const done=myItems.filter(i=>i.status==='completed').length;
  document.getElementById('statRow').innerHTML=`
    <div class="stat-chip"><span>${myItems.length}</span> assigned to me</div>
    <div class="stat-chip"><span style="color:#ef4444">${overdue}</span> overdue</div>
    <div class="stat-chip"><span style="color:#22c55e">${done}</span> completed</div>`;
}

function renderPlans(){
  const today=new Date();
  let plans=allPlans;
  if(currentFilter==='mine') plans=plans.filter(p=>(itemsByPlan[p.id]||[]).some(i=>i.assigned_staff_id===myStaffId));
  else if(currentFilter==='overdue') plans=plans.filter(p=>(itemsByPlan[p.id]||[]).some(i=>isOverdue(i.deadline,i.status)));
  else if(currentFilter==='completed') plans=plans.filter(p=>p.status==='completed');

  const el=document.getElementById('plansList');
  if(!plans.length){ el.innerHTML=`<div class="empty-state">No plans match this filter.</div>`; return; }
  el.innerHTML=plans.map(p=>{
    const items=itemsByPlan[p.id]||[];
    const myItems=items.filter(i=>i.assigned_staff_id===myStaffId);
    const done=items.filter(i=>i.status==='completed').length;
    const pct=items.length?Math.round(done/items.length*100):0;
    return `<div class="plan-block">
      <div class="plan-block-head" data-plan="${p.id}">
        <div style="flex:1">
          <div class="plan-block-title">${esc(p.title)}</div>
          <div class="plan-block-meta">${items.length} actions · ${pct}% done${myItems.length?` · <span style="color:#4a9abf">${myItems.length} mine</span>`:''}${p.target_date?` · Due ${fmtDate(p.target_date)}`:''}${p.category?` · ${esc(p.category.replace('_',' ')))}`:''}
          </div>
        </div>
        <span class="chevron" id="chev-${p.id}">▾</span>
      </div>
      <div class="plan-block-body" id="pb-${p.id}">
        ${renderItems(p.id)}
      </div>
    </div>`;
  }).join('');
}

function renderItems(planId){
  const items=itemsByPlan[planId]||[];
  if(!items.length) return `<div class="empty-state" style="padding:16px">No actions in this plan yet.</div>`;
  return items.map(item=>{
    const mine=item.assigned_staff_id===myStaffId;
    const done=item.status==='completed';
    const overdue=isOverdue(item.deadline,item.status);
    const canComplete=mine; // only assignee can tick
    const dlBadge=item.deadline?`<span class="badge ${overdue?'badge-red':'badge-gray'}">${overdue?'⚠ ':''}${fmtDate(item.deadline)}</span>`:'';
    return `<div class="item-row ${priClass(item.priority)} ${mine?'mine':''}" id="ir-${item.id}">
      <div class="item-row-head">
        <input type="checkbox" class="item-checkbox" data-id="${item.id}" data-plan="${planId}" ${done?'checked':''} ${canComplete?'':'disabled'} title="${canComplete?'Mark complete':'Only your assigned actions can be completed here'}">
        <div style="flex:1;min-width:0">
          <div class="item-title ${done?'done':''}">${esc(item.title)} ${mine?'<span class="mine-badge">mine</span>':''}</div>
          <div style="margin-top:3px">
            ${dlBadge}
            ${item.assignee_name?`<span class="badge badge-blue">👤 ${esc(item.assignee_name)}</span>`:''}
            ${item.comment_count?`<span class="badge badge-gray">💬 ${item.comment_count}</span>`:''}
          </div>
        </div>
        ${item.description?`<button class="expand-btn" data-expand="${item.id}">▾</button>`:''}
        ${mine?`<button class="btn btn-sm btn-ghost" data-comment="${item.id}">Comment</button>`:''}
      </div>
      ${item.description?`<div class="item-desc" id="desc-${item.id}">${esc(item.description)}</div>`:''}
      <div class="comment-area" id="ca-${item.id}" style="display:none"></div>
    </div>`;
  }).join('');
}

// ── Event wiring ──────────────────────────────────────────────────────────────
document.querySelector('.filter-bar').addEventListener('click', e=>{
  const btn=e.target.closest('[data-filter]');
  if(!btn) return;
  currentFilter=btn.dataset.filter;
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlans();
});

document.getElementById('plansList').addEventListener('click', async e=>{
  // Plan header toggle
  const head=e.target.closest('[data-plan]');
  if(head && !e.target.closest('.item-row')){
    const id=head.dataset.plan;
    const body=document.getElementById('pb-'+id);
    const chev=document.getElementById('chev-'+id);
    if(body){ body.classList.toggle('open'); chev.textContent=body.classList.contains('open')?'▴':'▾'; }
    return;
  }

  // Expand description
  const expandBtn=e.target.closest('[data-expand]');
  if(expandBtn){
    const d=document.getElementById('desc-'+expandBtn.dataset.expand);
    if(d){ d.classList.toggle('open'); expandBtn.textContent=d.classList.contains('open')?'▴':'▾'; }
    return;
  }

  // Comment toggle
  const commentBtn=e.target.closest('[data-comment]');
  if(commentBtn){
    const ca=document.getElementById('ca-'+commentBtn.dataset.comment);
    if(!ca) return;
    if(ca.style.display==='none'){
      ca.style.display='block';
      await loadComments(commentBtn.dataset.comment, ca);
    } else { ca.style.display='none'; }
    return;
  }

  // Submit comment
  const submitBtn=e.target.closest('[data-submit-comment]');
  if(submitBtn){
    const itemId=submitBtn.dataset.submitComment;
    const inp=document.getElementById('ci-'+itemId);
    if(!inp||!inp.value.trim()) return;
    try {
      await api(`/api/action-plan-items/${itemId}/comments`,{method:'POST',body:JSON.stringify({body:inp.value.trim()})});
      inp.value='';
      const ca=document.getElementById('ca-'+itemId);
      await loadComments(itemId, ca);
      wrenToast('Comment posted');
    } catch(er){ wrenToast('Error: '+er.message,'error'); }
    return;
  }

  // Checkbox
  const cb=e.target.closest('.item-checkbox');
  if(cb && !cb.disabled){
    e.preventDefault();
    const status=cb.checked?'todo':'completed'; // toggle
    try {
      await api(`/api/action-plan-items/${cb.dataset.id}`,{method:'PATCH',body:JSON.stringify({status:cb.checked?'todo':'completed'})});
      const p=allPlans.find(pl=>pl.id===parseInt(cb.dataset.plan));
      if(p){ itemsByPlan[p.id]=await api('/api/action-plan-items?plan_id='+p.id); }
      renderStats();
      renderPlans();
      wrenToast(cb.checked?'Marked to do':'Marked complete');
    } catch(er){ wrenToast('Error: '+er.message,'error'); }
  }
});

async function loadComments(itemId, ca){
  try {
    const comments=await api(`/api/action-plan-items/${itemId}/comments`);
    ca.innerHTML=
      (comments.length?comments.map(c=>`<div class="comment-bubble"><div class="author">${esc(c.author_name)} · ${new Date(c.created_at).toLocaleDateString('en-GB')}</div>${esc(c.body)}</div>`).join(''):'<p style="color:#94a3b8;font-size:.8rem;margin:0 0 6px">No comments yet.</p>')+
      `<div class="comment-form">
        <input class="comment-input" id="ci-${itemId}" placeholder="Add a comment…">
        <button class="btn btn-sm btn-primary" data-submit-comment="${itemId}">Post</button>
      </div>`;
  } catch{}
}

document.addEventListener('wren:ready', init);
</script>
<script src="/js/wren-chat.js"></script>
</body>
</html>
