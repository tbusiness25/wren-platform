<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>Curriculum — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
/* ── Activity Library Sidebar ── */
.planner-wrap { display:flex; gap:0; min-height:calc(100vh - 160px); }
.lib-sidebar {
  width:280px; flex-shrink:0;
  background:var(--c-card,#1e293b);
  border:1px solid var(--c-border,#2d3748);
  border-radius:12px;
  padding:14px;
  overflow-y:auto;
  max-height:calc(100vh - 160px);
  position:sticky;
  top:80px;
}
.lib-search { width:100%; margin-bottom:8px; }
.lib-filters { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.lib-filter {
  padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; cursor:pointer;
  background:rgba(255,255,255,0.06); border:1px solid var(--c-border,#2d3748);
  color:var(--c-muted,#94a3b8); transition:all .15s; white-space:nowrap;
}
.lib-filter.active { background:rgba(74,154,191,0.2); border-color:#4a9abf; color:#4a9abf; }
.lib-item {
  background:rgba(255,255,255,0.04); border:1px solid var(--c-border,#2d3748);
  border-radius:8px; padding:8px 10px; margin-bottom:6px;
  cursor:grab; transition:all .15s; border-left:3px solid #4a9abf;
}
.lib-item:hover { background:rgba(255,255,255,0.08); }
.lib-item.dragging { opacity:0.4; cursor:grabbing; }
.lib-item-name { font-size:12px; font-weight:700; margin-bottom:2px; color:var(--c-text,#f1f5f9); }
.lib-item-meta { font-size:11px; color:var(--c-muted,#94a3b8); }

/* ── Week Grid ── */
.planner-main { flex:1; padding-left:16px; min-width:0; overflow-x:auto; }
.week-nav { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.week-title { font-weight:700; font-size:15px; }
.planner-grid { min-width:600px; border-collapse:collapse; width:100%; }
.planner-grid th {
  padding:8px 10px; text-align:left; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.7px; color:var(--c-muted,#94a3b8);
  border-bottom:1px solid var(--c-border,#2d3748); border-right:1px solid var(--c-border,#2d3748);
}
.planner-grid th:first-child { width:100px; }
.planner-grid td {
  padding:4px; vertical-align:top;
  border-right:1px solid var(--c-border,#2d3748);
  border-bottom:1px solid var(--c-border,#2d3748);
}
.planner-grid td.slot-label {
  font-size:11px; font-weight:700; color:var(--c-muted,#94a3b8);
  background:rgba(0,0,0,0.2); padding:8px 10px; vertical-align:middle;
  text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
}
.drop-zone {
  min-height:68px; border-radius:8px; border:1.5px dashed rgba(255,255,255,0.1);
  padding:4px; display:flex; flex-direction:column; gap:4px; transition:all .15s;
}
.drop-zone.drag-over { border-color:#4a9abf; background:rgba(74,154,191,0.06); }
.placed-card {
  border-radius:7px; padding:5px 7px; font-size:11px; font-weight:600;
  cursor:pointer; position:relative; transition:opacity .15s;
  background:rgba(74,154,191,0.18); border:1px solid rgba(74,154,191,0.35);
  color:var(--c-text,#f1f5f9);
}
.placed-card:hover { opacity:.82; }
.placed-card-name { padding-right:16px; line-height:1.3; }
.placed-card-del {
  position:absolute; top:3px; right:4px; background:none; border:none;
  color:var(--c-muted,#94a3b8); font-size:13px; cursor:pointer; padding:0; line-height:1;
}
.placed-card-del:hover { color:#ef4444; }

/* Cat colours */
.cat-art { border-left-color:#c084fc!important; }
.cat-physical { border-left-color:#4ade80!important; }
.cat-literacy { border-left-color:#60a5fa!important; }
.cat-maths { border-left-color:#fbbf24!important; }
.cat-music { border-left-color:#f472b6!important; }
.cat-sensory { border-left-color:#34d399!important; }
.cat-messy { border-left-color:#fb923c!important; }
.cat-outdoor { border-left-color:#a3e635!important; }

@media(max-width:700px){
  .planner-wrap { flex-direction:column; }
  .lib-sidebar { width:100%; max-height:240px; position:static; }
  .planner-main { padding-left:0; padding-top:12px; }
}
</style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">📅 Curriculum Planning</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" id="tab-weekly-btn">Weekly Planner</button>
      <button class="btn btn-ghost" id="tab-plans-btn">Term Plans</button>
      <button class="btn btn-primary" id="add-btn">+ New</button>
    </div>
  </div>

  <!-- View: Weekly drag-drop planner -->
  <div id="view-weekly" style="display:none">
    <div class="filter-bar" style="margin-bottom:14px">
      <select class="form-control" id="pw-room" style="flex:0 0 160px">
        <option value="">All Rooms</option>
      </select>
    </div>
    <div class="planner-wrap">
      <div class="lib-sidebar">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--c-text)">Activity Bank</div>
        <input class="form-control lib-search" type="text" id="lib-search" placeholder="Search activities…">
        <div class="lib-filters" id="lib-cats">
          <button class="lib-filter active" data-cat="">All</button>
          <button class="lib-filter" data-cat="art">Art</button>
          <button class="lib-filter" data-cat="physical">Physical</button>
          <button class="lib-filter" data-cat="literacy">Literacy</button>
          <button class="lib-filter" data-cat="maths">Maths</button>
          <button class="lib-filter" data-cat="music">Music</button>
          <button class="lib-filter" data-cat="sensory">Sensory</button>
          <button class="lib-filter" data-cat="messy">Messy</button>
          <button class="lib-filter" data-cat="outdoor">Outdoor</button>
        </div>
        <div id="lib-list"><div class="loading-state" style="padding:20px 0"><div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto"></div></div></div>
      </div>

      <div class="planner-main">
        <div class="week-nav">
          <button class="btn btn-ghost btn-sm" id="btn-prev-week">← Prev</button>
          <span class="week-title" id="week-label">Week of …</span>
          <button class="btn btn-ghost btn-sm" id="btn-next-week">Next →</button>
          <button class="btn btn-ghost btn-sm" id="btn-today">Today</button>
          <button class="btn btn-ghost btn-sm" id="btn-copy-last" title="Copy last week's plan to this week">📋 Copy last week</button>
        </div>
        <div style="overflow-x:auto">
          <table class="planner-grid" id="planner-table">
            <thead>
              <tr>
                <th>Slot</th>
                <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th>
              </tr>
            </thead>
            <tbody id="planner-body"></tbody>
          </table>
        </div>
        <div style="margin-top:12px">
          <button class="btn btn-primary" id="save-btn">💾 Save Plan</button>
          <span id="save-status" style="font-size:12px;color:var(--c-muted);margin-left:10px"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- View: Term plans (original) -->
  <div id="view-plans" style="display:none">
    <div class="filter-bar">
      <select class="form-control" id="room-filter" style="flex:0 0 160px">
        <option value="">All Rooms</option>
      </select>
      <select class="form-control" id="term-filter" style="flex:0 0 150px">
        <option value="">All Terms</option>
        <option value="Autumn 1">Autumn 1</option><option value="Autumn 2">Autumn 2</option>
        <option value="Spring 1">Spring 1</option><option value="Spring 2">Spring 2</option>
        <option value="Summer 1">Summer 1</option><option value="Summer 2">Summer 2</option>
      </select>
    </div>
    <div id="plans-area"><div class="loading-state"><div class="spinner"></div></div></div>
  </div>
</div>

<script>
/* ─────────────────────── Shared state ─────────────────────── */
let rooms = [];
let activities = [];
let filteredActivities = [];
let activeCat = '';
let weekStart = getMonday(new Date());
let plannerState = {};   // key: `${day}_${slot}` → array of { id, activity_id, activity_name, custom_title, placed_id }
let dragPayload = null;
let currentView = 'weekly';

const DAYS = ['monday','tuesday','wednesday','thursday','friday'];
const SLOTS = ['morning','after-lunch','afternoon','free-play'];
const SLOT_LABELS = { 'morning':'Morning', 'after-lunch':'After Lunch', 'afternoon':'Afternoon', 'free-play':'Free Play' };

function getMonday(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function dateStr(d) { return d.toISOString().slice(0,10); }

function dayDate(d, i) {
  const dd = new Date(d);
  dd.setDate(d.getDate() + i);
  return dd;
}

/* ─────────────────────── Init ─────────────────────── */
async function init() {
  rooms = await Wren.api('/api/staff/rooms').catch(() => []);
  ['room-filter','pw-room'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    rooms.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.id; opt.textContent = r.name;
      sel.appendChild(opt);
    });
  });
  activities = await Wren.api('/api/curriculum/activities').catch(() => []);
  filteredActivities = activities;
  setView('weekly');
}

function setView(v) {
  currentView = v;
  document.getElementById('view-weekly').style.display = v === 'weekly' ? '' : 'none';
  document.getElementById('view-plans').style.display = v === 'plans' ? '' : 'none';
  document.getElementById('tab-weekly-btn').style.cssText = v === 'weekly'
    ? 'background:rgba(74,154,191,0.15);border-color:#4a9abf;color:#4a9abf' : '';
  document.getElementById('tab-plans-btn').style.cssText = v === 'plans'
    ? 'background:rgba(74,154,191,0.15);border-color:#4a9abf;color:#4a9abf' : '';
  document.getElementById('add-btn').textContent = v === 'weekly' ? '+ Custom Activity' : '+ New Plan';
  if (v === 'weekly') { renderLibrary(); buildPlannerGrid(); loadWeeklyPlan(); }
  else loadPlans();
}

function handleAdd() {
  if (currentView === 'weekly') addCustomActivity();
  else newPlan();
}

/* ─────────────────────── Activity Library ─────────────────────── */
function renderLibrary() {
  const list = document.getElementById('lib-list');
  const fa = filteredActivities;
  if (!fa.length) {
    list.innerHTML = '<div style="color:var(--c-muted);font-size:12px;text-align:center;padding:16px 0">No activities found</div>';
    return;
  }
  list.innerHTML = fa.map(a => `
    <div class="lib-item cat-${a.category||''}" draggable="true"
         data-id="${a.id}" data-name="${escHtml(a.name)}" data-cat="${a.category||''}"
         ondragstart="onLibDragStart(event,${a.id},'${escAttr(a.name)}')">
      <div class="lib-item-name">${escHtml(a.name)}</div>
      <div class="lib-item-meta">${a.category||''} · ${a.age_range||'all'}</div>
    </div>
  `).join('');
}

function filterLibrary() {
  const q = document.getElementById('lib-search').value.toLowerCase();
  filteredActivities = activities.filter(a =>
    (!activeCat || a.category === activeCat) &&
    (!q || a.name.toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q))
  );
  renderLibrary();
}

function filterByCat(btn, cat) {
  document.querySelectorAll('.lib-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = cat;
  filterLibrary();
}

/* ─────────────────────── Drag & Drop ─────────────────────── */
function onLibDragStart(e, activityId, name) {
  dragPayload = { source: 'library', activity_id: activityId, activity_name: name };
  e.dataTransfer.effectAllowed = 'copy';
}

function onZoneDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onZoneDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onZoneDrop(e, day, slot) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragPayload) return;
  const key = `${day}_${slot}`;
  if (!plannerState[key]) plannerState[key] = [];
  const placed_id = Date.now() + Math.random();
  plannerState[key].push({
    placed_id,
    activity_id: dragPayload.activity_id || null,
    activity_name: dragPayload.activity_name || dragPayload.custom_title,
    custom_title: dragPayload.custom_title || null,
  });
  renderDropZone(day, slot);
  dragPayload = null;
  markUnsaved();
}

function renderDropZone(day, slot) {
  const key = `${day}_${slot}`;
  const zone = document.querySelector(`.drop-zone[data-day="${day}"][data-slot="${slot}"]`);
  if (!zone) return;
  const items = plannerState[key] || [];
  zone.innerHTML = items.map(item => `
    <div class="placed-card" data-placed-id="${item.placed_id}">
      <div class="placed-card-name">${escHtml(item.activity_name || item.custom_title || '?')}</div>
      <button class="placed-card-del" title="Remove">×</button>
    </div>
  `).join('');
}

function removeItem(day, slot, placedId) {
  const key = `${day}_${slot}`;
  if (!plannerState[key]) return;
  plannerState[key] = plannerState[key].filter(i => i.placed_id != placedId);
  renderDropZone(day, slot);
  markUnsaved();
}

/* ─────────────────────── Grid ─────────────────────── */
function buildPlannerGrid() {
  const wl = document.getElementById('week-label');
  const mon = weekStart;
  const fri = dayDate(mon, 4);
  wl.textContent = `Week of ${mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${fri.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

  const headerRow = document.querySelector('#planner-table thead tr');
  DAYS.forEach((day, i) => {
    headerRow.cells[i+1].textContent = day.charAt(0).toUpperCase()+day.slice(1) + ' ' +
      dayDate(mon,i).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  });

  const tbody = document.getElementById('planner-body');
  tbody.innerHTML = SLOTS.map(slot => `
    <tr>
      <td class="slot-label">${SLOT_LABELS[slot]}</td>
      ${DAYS.map(day => `
        <td>
          <div class="drop-zone" data-day="${day}" data-slot="${slot}"
               ondragover="onZoneDragOver(event)"
               ondragleave="onZoneDragLeave(event)"
               ondrop="onZoneDrop(event,'${day}','${slot}')"></div>
        </td>
      `).join('')}
    </tr>
  `).join('');
}

function changeWeek(days) {
  if (days === 0) { weekStart = getMonday(new Date()); }
  else { weekStart = new Date(weekStart.getTime() + days * 86400000); }
  plannerState = {};
  buildPlannerGrid();
  loadWeeklyPlan();
}

/* ─────────────────────── Load / Save planned activities ─────────────────────── */
async function loadWeeklyPlan() {
  const roomId = document.getElementById('pw-room').value;
  const fri = dayDate(weekStart, 4);
  try {
    const params = `date_from=${dateStr(weekStart)}&date_to=${dateStr(fri)}${roomId?`&room_id=${roomId}`:''}`;
    const items = await Wren.api(`/api/curriculum/planned?${params}`);
    plannerState = {};
    items.forEach(item => {
      // Parse date at noon to avoid UTC→local-timezone day-shift
      const pd = new Date(item.plan_date + 'T12:00:00');
      const dayIdx = pd.getDay() === 0 ? 6 : pd.getDay() - 1; // 0=Mon
      const key = `${DAYS[dayIdx]}_${item.slot}`;
      if (!plannerState[key]) plannerState[key] = [];
      plannerState[key].push({
        placed_id: item.id,
        activity_id: item.activity_id,
        activity_name: item.activity_name || item.custom_title || '?',
        custom_title: item.custom_title,
        db_id: item.id,
      });
    });
    SLOTS.forEach(slot => DAYS.forEach(day => renderDropZone(day, slot)));
    document.getElementById('save-status').textContent = '';
  } catch(e) {
    console.error('[curriculum] load planned error:', e);
  }
}

async function savePlan() {
  const roomId = document.getElementById('pw-room').value || null;
  const saveBtn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  saveBtn.disabled = true;
  status.textContent = 'Saving…';

  try {
    // Delete all existing for this week+room, then re-insert
    const fri = dayDate(weekStart, 4);
    const existing = await Wren.api(`/api/curriculum/planned?date_from=${dateStr(weekStart)}&date_to=${dateStr(fri)}${roomId?`&room_id=${roomId}`:''}`);
    for (const e of existing) {
      await Wren.api(`/api/curriculum/planned/${e.id}`, { method: 'DELETE' }).catch(() => {});
    }
    // Insert current state
    for (const slot of SLOTS) {
      for (let di = 0; di < DAYS.length; di++) {
        const day = DAYS[di];
        const key = `${day}_${slot}`;
        const items = plannerState[key] || [];
        for (const item of items) {
          const planDate = dateStr(dayDate(weekStart, di));
          await Wren.api('/api/curriculum/planned', { method: 'POST', body: {
            plan_date: planDate,
            room_id: roomId ? parseInt(roomId) : null,
            slot,
            activity_id: item.activity_id || null,
            custom_title: item.custom_title || null,
          }});
        }
      }
    }
    status.textContent = '✓ Saved';
    status.style.color = '#22c55e';
    setTimeout(() => { status.textContent = ''; }, 3000);
    saveBtn.disabled = false;
    loadWeeklyPlan();
  } catch(e) {
    status.textContent = '⚠ Save failed';
    status.style.color = '#ef4444';
    saveBtn.disabled = false;
    Wren.toast('Save failed: ' + e.message, 'error');
  }
}

function markUnsaved() {
  const status = document.getElementById('save-status');
  status.textContent = 'Unsaved changes';
  status.style.color = '#f59e0b';
}

async function copyLastWeek() {
  const roomId = document.getElementById('pw-room').value || null;
  const lastMon = new Date(weekStart.getTime() - 7 * 86400000);
  try {
    const resp = await Wren.api('/api/curriculum/planned/copy-week', { method: 'POST', body: {
      from_date: dateStr(lastMon),
      to_date: dateStr(weekStart),
      room_id: roomId,
    }});
    Wren.toast(`Copied ${resp.copied} activities ✓`, 'success');
    loadWeeklyPlan();
  } catch(e) { Wren.toast('Copy failed: ' + e.message, 'error'); }
}

function addCustomActivity() {
  Wren.modal('Add Custom Activity', `
    <div class="form-group">
      <label class="form-label">Activity name <span style="color:var(--c-red)">*</span></label>
      <input class="form-control" id="ca-name" placeholder="Activity name">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-control" id="ca-cat">
          <option value="">—</option>
          <option value="art">Art</option><option value="physical">Physical</option>
          <option value="literacy">Literacy</option><option value="maths">Maths</option>
          <option value="music">Music</option><option value="sensory">Sensory</option>
          <option value="messy">Messy</option><option value="outdoor">Outdoor</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Age range</label>
        <select class="form-control" id="ca-age">
          <option value="all">All</option><option value="baby">Baby</option>
          <option value="toddler">Toddler</option><option value="pre-school">Pre-school</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" id="ca-desc" rows="2"></textarea>
    </div>
  `, [
    { label: 'Add to Library', class: 'btn-primary', close: false, action: async () => {
      const name = document.getElementById('ca-name').value.trim();
      if (!name) { Wren.toast('Name required', 'warning'); return; }
      try {
        const act = await Wren.api('/api/curriculum/activities', { method: 'POST', body: {
          name,
          category: document.getElementById('ca-cat').value || null,
          age_range: document.getElementById('ca-age').value || 'all',
          description: document.getElementById('ca-desc').value.trim() || null,
          eyfs_areas: [],
        }});
        activities.push(act);
        filteredActivities = activities;
        filterLibrary();
        Wren.toast('Activity added ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
      } catch(e) { Wren.toast('Failed: ' + e.message, 'error'); }
    }},
    { label: 'Cancel', class: 'btn-ghost' }
  ]);
}

/* ─────────────────────── Term plans (original) ─────────────────────── */
async function loadPlans() {
  const room = document.getElementById('room-filter').value;
  const term = document.getElementById('term-filter').value;
  let url = '/api/curriculum/plans?';
  if (room) url += `room_id=${room}&`;
  if (term) url += `term=${encodeURIComponent(term)}`;
  try {
    const plans = await Wren.api(url);
    renderPlans(plans);
  } catch(e) {
    document.getElementById('plans-area').innerHTML = '<div class="alert alert-danger">Failed to load</div>';
  }
}

function renderPlans(plans) {
  const area = document.getElementById('plans-area');
  if (!plans.length) {
    area.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-title">No curriculum plans yet</div>
    </div>`;
    return;
  }
  area.innerHTML = plans.map(p => `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700">${p.title || `Week ${p.week_number} — ${p.term}`}</div>
          <div style="font-size:.78rem;color:var(--c-muted)">
            ${p.room_name} · ${p.term}
            ${p.week_start ? `· w/c ${new Date(p.week_start).toLocaleDateString('en-GB')}` : ''}
            · ${p.staff_name}
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <span class="badge ${p.status==='published'?'badge-success':'badge-grey'}">${p.status}</span>
          ${p.status !== 'published' ?
            `<button class="btn btn-sm btn-primary" data-action="publish-plan" data-id="${p.id}">Publish</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

async function publishPlan(id) {
  await Wren.api(`/api/curriculum/plans/${id}/publish`, { method: 'PUT' });
  Wren.toast('Plan published ✓', 'success');
  loadPlans();
}

function newPlan() {
  Wren.modal('New Curriculum Plan', `
    <div class="form-group">
      <label class="form-label">Room</label>
      <select class="form-control" id="plan-room">
        ${rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Term</label>
        <select class="form-control" id="plan-term">
          <option>Autumn 1</option><option>Autumn 2</option>
          <option>Spring 1</option><option>Spring 2</option>
          <option>Summer 1</option><option>Summer 2</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Week No.</label>
        <input type="number" class="form-control" id="plan-week" min="1" max="7" value="1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Week Starting</label>
      <input type="date" class="form-control" id="plan-weekstart">
    </div>
    <div class="form-group">
      <label class="form-label">Title / Theme</label>
      <input class="form-control" id="plan-title" placeholder="e.g. Autumn Animals">
    </div>
  `, [
    { label: 'Create', class: 'btn-primary', close: false, action: async () => {
      try {
        await Wren.api('/api/curriculum/plans', { method: 'POST', body: {
          room_id: document.getElementById('plan-room').value,
          term: document.getElementById('plan-term').value,
          week_number: document.getElementById('plan-week').value,
          week_start: document.getElementById('plan-weekstart').value,
          title: document.getElementById('plan-title').value
        }});
        Wren.toast('Plan created ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
        loadPlans();
      } catch(e) { Wren.toast('Failed', 'error'); }
    }},
    { label: 'Cancel', class: 'btn-ghost' }
  ]);
}

/* ─────────────────────── Utils ─────────────────────── */
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

document.addEventListener('wren:ready', function() {
  // Static button bindings
  document.getElementById('tab-weekly-btn').addEventListener('click', () => setView('weekly'));
  document.getElementById('tab-plans-btn').addEventListener('click', () => setView('plans'));
  document.getElementById('add-btn').addEventListener('click', handleAdd);
  document.getElementById('pw-room').addEventListener('change', loadWeeklyPlan);
  document.getElementById('lib-search').addEventListener('input', filterLibrary);
  document.getElementById('save-btn').addEventListener('click', savePlan);
  document.getElementById('room-filter').addEventListener('change', loadPlans);
  document.getElementById('term-filter').addEventListener('change', loadPlans);
  document.getElementById('btn-prev-week').addEventListener('click', () => changeWeek(-7));
  document.getElementById('btn-next-week').addEventListener('click', () => changeWeek(7));
  document.getElementById('btn-today').addEventListener('click', () => changeWeek(0));
  document.getElementById('btn-copy-last').addEventListener('click', copyLastWeek);
  // Delegation for category filter buttons
  document.getElementById('lib-cats').addEventListener('click', function(e) {
    const btn = e.target.closest('.lib-filter');
    if (btn) filterByCat(btn, btn.dataset.cat);
  });
  // Delegation for placed card delete buttons
  document.getElementById('planner-body').addEventListener('click', function(e) {
    const del = e.target.closest('.placed-card-del');
    if (!del) return;
    const card = del.closest('.placed-card');
    const zone = del.closest('.drop-zone');
    if (zone && card) removeItem(zone.dataset.day, zone.dataset.slot, card.dataset.placedId);
  });
  // Delegation for publish plan buttons
  document.getElementById('plans-area').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action="publish-plan"]');
    if (btn) publishPlan(parseInt(btn.dataset.id));
  });
  init();
});
</script>
<script src="/js/wren-chat.js"></script>
