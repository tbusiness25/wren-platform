<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>Incidents — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">🩹 Incidents</div>
    <button class="btn btn-primary" id="new-incident-btn">+ New Incident</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="open">Open</button>
    <button class="tab-btn" data-tab="closed">Closed</button>
    <button class="tab-btn" data-tab="all">All</button>
  </div>

  <div id="incidents-area">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</div>

<script>
let incidents = [];
let currentTab = 'open';
let children = [];

async function loadData() {
  try {
    [incidents, children] = await Promise.all([
      Wren.api('/api/incidents'),
      Wren.api('/api/children')
    ]);
    renderIncidents();
  } catch(e) {
    document.getElementById('incidents-area').innerHTML = '<div class="alert alert-danger">Failed to load</div>';
  }
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['open','closed','all'][i] === tab);
  });
  renderIncidents();
}

function renderIncidents() {
  const area = document.getElementById('incidents-area');
  let filtered = incidents;
  if (currentTab === 'open') filtered = incidents.filter(i => i.status === 'open');
  else if (currentTab === 'closed') filtered = incidents.filter(i => i.status === 'closed');

  if (!filtered.length) {
    area.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🩹</div>
      <div class="empty-title">No ${currentTab === 'all' ? '' : currentTab} incidents</div>
    </div>`;
    return;
  }

  area.innerHTML = filtered.map(i => `
    <div class="card" style="margin-bottom:12px;border-left:4px solid ${i.status==='open'?'var(--c-orange)':'var(--c-green)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:1rem;color:var(--c-navy)">${i.child_name}</div>
          <div style="font-size:.78rem;color:#64748b">
            ${i.incident_date ? new Date(i.incident_date).toLocaleDateString('en-GB') : ''}
            ${i.incident_time || ''} · ${i.room_name || ''} · ${i.incident_type || 'Incident'}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="badge ${i.status==='open'?'badge-amber':'badge-green'}">${i.status}</span>
          ${i.parent_notified ? '<span class="badge badge-blue">Parent Notified</span>' : ''}
          <button class="btn btn-sm btn-ghost" data-action="open-detail" data-id="${i.id}">View →</button>
        </div>
      </div>
      <div style="margin-top:10px;font-size:.875rem;color:#374151">${i.description || ''}</div>
      ${i.injury_description ? `<div style="margin-top:6px;font-size:.875rem"><strong>Injury:</strong> ${i.injury_description}</div>` : ''}
      ${i.first_aid_given ? `<div style="margin-top:4px;font-size:.875rem"><strong>First aid:</strong> ${i.first_aid_given}</div>` : ''}
      <div style="margin-top:10px;font-size:.78rem;color:#64748b">Reported by: ${i.reporter_name || '—'}</div>
    </div>
  `).join('');
}

function openDetail(id) {
  const i = incidents.find(x => x.id === id);
  if (!i) return;
  Wren.modal(`Incident — ${i.child_name}`, `
    <div style="display:grid;gap:10px;font-size:.875rem">
      <div><strong>Date/Time:</strong> ${i.incident_date ? new Date(i.incident_date).toLocaleDateString('en-GB') : ''} ${i.incident_time || ''}</div>
      <div><strong>Location:</strong> ${i.location || '—'}</div>
      <div><strong>Type:</strong> ${i.incident_type || '—'}</div>
      <div><strong>Description:</strong> ${i.description}</div>
      ${i.injury_description ? `<div><strong>Injury:</strong> ${i.injury_description}</div>` : ''}
      ${i.first_aid_given ? `<div><strong>First Aid:</strong> ${i.first_aid_given}</div>` : ''}
      ${i.body_map_area ? `<div><strong>Body map:</strong> ${i.body_map_area}</div>` : ''}
      ${i.witness_name ? `<div><strong>Witness:</strong> ${i.witness_name}</div>` : ''}
      ${i.signature_data ? `<div><strong>Staff signature:</strong><br><img src="${i.signature_data}" alt="Staff signature" style="max-width:240px;border:1px solid #2d3748;border-radius:8px;background:#fff;margin-top:4px"></div>` : ''}
      <hr class="divider">
      <label style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="notified" ${i.parent_notified ? 'checked' : ''}>
        Parent notified
      </label>
      <div style="display:flex;gap:8px">
        <span class="badge ${i.manager_reviewed ? 'badge-green' : 'badge-grey'}">
          Manager review: ${i.manager_reviewed ? '✓' : 'Pending'}
        </span>
        <span class="badge ${i.status==='open' ? 'badge-amber' : 'badge-green'}">${i.status}</span>
      </div>
    </div>
  `, [
    { label: 'Mark Reviewed & Close', class: 'btn-primary', close: false, action: async () => {
      try {
        await Wren.api(`/api/incidents/${id}`, { method: 'PUT', body: {
          parent_notified: document.getElementById('notified').checked,
          manager_reviewed: true,
          status: 'closed'
        }});
        Wren.toast('Incident closed ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
        loadData();
      } catch(e) { Wren.toast('Failed', 'error'); }
    }},
    { label: 'Save', class: 'btn-ghost', close: false, action: async () => {
      try {
        await Wren.api(`/api/incidents/${id}`, { method: 'PUT', body: {
          parent_notified: document.getElementById('notified').checked
        }});
        Wren.toast('Saved ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
        loadData();
      } catch(e) {}
    }},
    { label: 'Close', class: 'btn-ghost' }
  ]);
}

function newIncident() {
  const form = document.createElement('div');
  form.innerHTML = `
    <div class="form-group">
      <label class="form-label">Child <span style="color:var(--c-red)">*</span></label>
      <select class="form-control" id="inc-child">
        <option value="">Select...</option>
        ${children.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-control" id="inc-date" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input type="time" class="form-control" id="inc-time" value="${new Date().toTimeString().slice(0,5)}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-control" id="inc-type">
          <option value="Fall">Fall / Trip</option>
          <option value="Bite">Bite (child-on-child)</option>
          <option value="Allergic Reaction">Allergic Reaction</option>
          <option value="Illness">Illness</option>
          <option value="Bump">Bump / Head injury</option>
          <option value="Scratch">Scratch / Graze</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input class="form-control" id="inc-location" placeholder="e.g. Garden, Hall">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">What happened <span style="color:var(--c-red)">*</span></label>
      <textarea class="form-control" id="inc-desc" rows="3" placeholder="Describe the incident..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Injury / physical description</label>
      <textarea class="form-control" id="inc-injury" rows="2" placeholder="e.g. Grazed right knee..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">First aid given</label>
      <textarea class="form-control" id="inc-aid" rows="2" placeholder="e.g. Cleaned wound, applied plaster..."></textarea>
    </div>

    <!-- Body map (reuses /img/body-map.svg + safeguarding tap-to-mark pattern) -->
    <div class="form-group" id="inc-body-map-section">
      <label class="form-label">Body map <span style="font-weight:400;color:#64748b">(tap front/back figure to mark injuries)</span></label>
      <div id="inc-body-map-wrap" style="position:relative;display:inline-block;width:100%;max-width:340px">
        <img src="/img/body-map.svg" id="inc-body-map-svg" style="width:100%;display:block;border:1px solid #2d3748;border-radius:10px;cursor:crosshair;background:#fff" alt="Body map front and back" draggable="false">
        <div id="inc-marks-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></div>
      </div>
      <div style="font-size:.75rem;color:#64748b;margin-top:4px">Tap to add a mark. Tap a mark to note it or remove it.</div>
      <div id="inc-marks-list" style="margin-top:8px"></div>
    </div>

    <!-- Signature pad (canvas, touch + mouse) -->
    <div class="form-group" id="inc-signature-section">
      <label class="form-label">Staff signature <span style="font-weight:400;color:#64748b">(sign below to confirm this record)</span></label>
      <div style="border:1px solid #2d3748;border-radius:10px;background:#fff;overflow:hidden">
        <canvas id="inc-sig-canvas" style="display:block;width:100%;height:140px;touch-action:none;cursor:crosshair"></canvas>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span style="font-size:.75rem;color:#64748b" id="inc-sig-hint">Sign with finger or mouse</span>
        <button type="button" class="btn btn-sm btn-ghost" id="inc-sig-clear">Clear</button>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">Witness name <span style="font-weight:400;color:#64748b">(optional — if present)</span></label>
        <input class="form-control" id="inc-witness" placeholder="e.g. Ayla (second staff member)">
      </div>
    </div>
  `;

  // ── Body-map state (mirrors wren-safeguarding-form.js) ──
  var _marks = [];
  function _esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function renderMarks() {
    var layer = document.getElementById('inc-marks-layer');
    var listEl = document.getElementById('inc-marks-list');
    if (!layer) return;
    layer.innerHTML = '';
    _marks.forEach(function(m, i) {
      var dot = document.createElement('div');
      dot.style.cssText = 'position:absolute;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;background:#ef4444;border:2px solid #fff;cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;pointer-events:all;box-shadow:0 1px 4px rgba(0,0,0,.4)';
      dot.style.left = m.x + '%';
      dot.style.top = m.y + '%';
      dot.textContent = i + 1;
      dot.title = m.note || 'No note';
      dot.addEventListener('click', function(e) {
        e.stopPropagation();
        var note = window.prompt('Injury note for mark ' + (i+1) + ' (' + m.side + '). Leave blank to keep, type REMOVE to delete:', m.note || '');
        if (note === null) return;
        if (note.toUpperCase() === 'REMOVE') { _marks.splice(_marks.indexOf(m), 1); }
        else { m.note = note; }
        renderMarks();
      });
      layer.appendChild(dot);
    });
    if (listEl) {
      listEl.innerHTML = _marks.length ? _marks.map(function(m,i){
        return '<div style="font-size:.78rem;color:#64748b;display:flex;align-items:center;gap:6px;margin-bottom:2px">'+
          '<span style="background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0">'+(i+1)+'</span>'+
          _esc(m.side)+' — '+(m.note?_esc(m.note):'<em style="color:#94a3b8">no note</em>')+'</div>';
      }).join('') : '';
    }
  }
  // Defer wiring until modal is in the DOM
  setTimeout(function() {
    var mapImg = document.getElementById('inc-body-map-svg');
    var layer = document.getElementById('inc-marks-layer');
    if (mapImg && layer) {
      mapImg.addEventListener('click', function(e) {
        var rect = mapImg.getBoundingClientRect();
        var x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
        var y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
        var side = x < 50 ? 'front' : 'back';
        _marks.push({ x: x, y: y, side: side, note: '' });
        renderMarks();
      });
    }
    // Signature pad
    var canvas = document.getElementById('inc-sig-canvas');
    if (canvas) {
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#0f172a';
      var drawing = false, last = null;
      window._incSigDirty = false;
      function pos(e) {
        var r = canvas.getBoundingClientRect();
        var p = (e.touches && e.touches[0]) ? e.touches[0] : e;
        return { x: p.clientX - r.left, y: p.clientY - r.top };
      }
      function start(e) { e.preventDefault(); drawing = true; last = pos(e); }
      function move(e) {
        if (!drawing) return; e.preventDefault();
        var p = pos(e);
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
        last = p; window._incSigDirty = true;
      }
      function end() { drawing = false; }
      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      window.addEventListener('mouseup', end);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove', move, { passive: false });
      canvas.addEventListener('touchend', end);
      var clearBtn = document.getElementById('inc-sig-clear');
      if (clearBtn) clearBtn.addEventListener('click', function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        window._incSigDirty = false;
      });
      window._incGetSignature = function() {
        return window._incSigDirty ? canvas.toDataURL('image/png') : null;
      };
    }
    window._incGetMarks = function() { return _marks; };
  }, 0);

  Wren.modal('New Incident Report', form, [
    { label: 'Save Report', class: 'btn-primary', close: false, action: async () => {
      const child_id = document.getElementById('inc-child').value;
      const description = document.getElementById('inc-desc').value.trim();
      if (!child_id || !description) { Wren.toast('Child and description required', 'warning'); return; }
      var marks = (typeof window._incGetMarks === 'function') ? window._incGetMarks() : [];
      var signature = (typeof window._incGetSignature === 'function') ? window._incGetSignature() : null;
      var bodyMapData = marks.length
        ? { marks: marks.map(function(m){ return { x:m.x, y:m.y, side:m.side, note:m.note }; }), drawn_at: new Date().toISOString() }
        : null;
      var bodyMapArea = marks.length
        ? marks.map(function(m,i){ return (i+1)+'. '+m.side+(m.note?' ('+m.note+')':''); }).join('; ')
        : null;
      try {
        await Wren.api('/api/incidents', { method: 'POST', body: {
          child_id: parseInt(child_id),
          incident_date: document.getElementById('inc-date').value,
          incident_time: document.getElementById('inc-time').value,
          incident_type: document.getElementById('inc-type').value,
          location: document.getElementById('inc-location').value,
          description,
          injury_description: document.getElementById('inc-injury').value,
          first_aid_given: document.getElementById('inc-aid').value,
          witness_name: document.getElementById('inc-witness').value || null,
          body_map_area: bodyMapArea,
          body_map_data: bodyMapData,
          signature_data: signature
        }});
        Wren.toast('Incident recorded ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
        loadData();
      } catch(e) { Wren.toast('Failed to save', 'error'); }
    }},
    { label: 'Cancel', class: 'btn-ghost' }
  ]);
}

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  document.getElementById('new-incident-btn').addEventListener('click', newIncident);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
  });
  document.getElementById('incidents-area').addEventListener('click', function(e) {
    const btn = e.target.closest('[data-action="open-detail"]');
    if (!btn) return;
    openDetail(parseInt(btn.dataset.id));
  });
});
</script>
<script src="/js/wren-chat.js"></script>
</body>
</html>
