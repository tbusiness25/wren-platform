<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>Children — Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    /* ── EY Children page — tablet-optimised compact layout ── */

    /* Sticky zone wrapping header row + context bar */
    .ey-sticky {
      position: sticky;
      top: 0;
      background: var(--bg, #0f172a);
      z-index: 80;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border, #2d3748);
      margin-bottom: 12px;
    }

    /* ── Header row ── */
    .ey-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 6px;
      flex-wrap: nowrap;
      min-width: 0;
      overflow: hidden;
    }

    .ey-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text, #f1f5f9);
      white-space: nowrap;
      margin-right: 2px;
      flex-shrink: 0;
    }

    /* Smart filter + search in a single flex row */
    .ey-filter-select {
      flex: 0 1 160px;
      min-width: 0;
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border, #2d3748);
      color: var(--text, #f1f5f9);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
      height: 36px;
    }

    .ey-search {
      flex: 1 1 0;
      min-width: 80px;
      display: flex;
      align-items: center;
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border, #2d3748);
      border-radius: 8px;
      padding: 0 10px;
      gap: 6px;
      height: 36px;
    }
    .ey-search input {
      border: none;
      background: transparent;
      color: var(--text, #f1f5f9);
      font-size: .8rem;
      font-family: inherit;
      outline: none;
      width: 100%;
      min-width: 0;
    }
    .ey-search input::placeholder { color: var(--text-muted, #64748b); }

    /* Right-side action area */
    .ey-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ey-btn-obs {
      font-size: .78rem;
      padding: 0 12px;
      height: 36px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .ey-icon-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border, #2d3748);
      color: var(--text, #f1f5f9);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      transition: border-color .15s;
      flex-shrink: 0;
    }
    .ey-icon-btn:hover { border-color: var(--primary, #4a9abf); }

    .notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--error, #ef4444);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      border-radius: 100px;
      padding: 1px 4px;
      min-width: 14px;
      text-align: center;
    }

    /* Quick-add dropdown */
    .quick-add-wrap { position: relative; }

    .quick-add-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--card-bg, #1e293b);
      border: 1px solid var(--border, #2d3748);
      border-radius: 10px;
      padding: 6px;
      min-width: 176px;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .quick-add-dropdown a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: .84rem;
      color: var(--text, #f1f5f9);
      text-decoration: none;
      border-radius: 7px;
      transition: background .1s;
    }
    .quick-add-dropdown a:hover { background: var(--surface-alt, #243347); }

    /* ── Selection / context bar ── */
    .selection-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      flex-wrap: wrap;
      min-height: 34px;
    }

    .sel-info {
      font-size: .8rem;
      color: var(--text-muted, #64748b);
      white-space: nowrap;
    }

    .sel-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .sel-tab {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--primary, #4a9abf);
      background: transparent;
      color: var(--primary, #4a9abf);
      font-size: .76rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      min-height: 28px;
      white-space: nowrap;
    }
    .sel-tab.primary, .sel-tab:hover {
      background: var(--primary, #4a9abf);
      color: #fff;
    }

    .sel-clear {
      margin-left: auto;
      font-size: .75rem;
      color: var(--text-muted, #64748b);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      border: none;
      background: none;
      font-family: inherit;
      transition: color .15s;
      min-height: 28px;
      flex-shrink: 0;
    }
    .sel-clear:hover { color: var(--error, #ef4444); }

    /* ── Room section ── */
    .room-section { margin-bottom: 18px; }

    .room-header {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-muted, #64748b);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .room-count { font-weight: 400; color: #94a3b8; }

    /* ── Compact child grid ── */
    .compact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }
    @media (min-width: 1024px) {
      .compact-grid { grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); }
    }
    @media (max-width: 480px) {
      .compact-grid { grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); }
    }

    /* ── Compact child card ── */
    .child-card-compact {
      position: relative;
      background: var(--card-bg, #1e293b);
      border: 2px solid var(--border, #2d3748);
      border-radius: 12px;
      padding: 10px 6px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .child-card-compact:active { transform: scale(.97); }
    .child-card-compact:hover  { border-color: var(--primary, #4a9abf); }

    .child-card-compact.selected {
      border-color: var(--primary, #4a9abf);
      background: rgba(74,154,191,.1);
    }
    .child-card-compact.absent { opacity: .55; }

    /* Checkmark badge */
    .ccc-sel-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary, #4a9abf);
      color: #fff;
      font-size: .6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
    }
    .child-card-compact.selected .ccc-sel-badge { opacity: 1; }

    /* Avatar */
    .ccc-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary, #4a9abf);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Name */
    .ccc-name {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text, #f1f5f9);
      line-height: 1.2;
      word-break: break-word;
      max-width: 100%;
      padding: 0 2px;
    }

    /* Status + badges row */
    .ccc-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex-wrap: wrap;
      min-height: 10px;
    }
    .ccc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ccc-dot.present  { background: #22c55e; }
    .ccc-dot.absent   { background: #94a3b8; }
    .ccc-dot.gone     { background: #f59e0b; }
    .ccc-dot.unsigned { background: var(--primary, #4a9abf); opacity: .5; }

    .ccc-tag {
      font-size: .55rem;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .ccc-tag-sen     { background: rgba(139,92,246,.2); color: #a78bfa; }
    .ccc-tag-allergy { background: rgba(239,68,68,.2);   color: #f87171; }

    /* Sign-in / out action button */
    .ccc-action {
      font-size: .66rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      min-height: 24px;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity .15s;
      margin-top: 2px;
    }
    .ccc-action:hover { opacity: .85; }
    .ccc-action:active { transform: scale(.97); }
    .ccc-in  { background: var(--primary, #4a9abf); color: #fff; }
    .ccc-out { background: transparent; border: 1px solid var(--border, #2d3748) !important;
               color: var(--text-muted, #64748b); }

    /* ════════════════════════════════════════════
       RESPONSIVE AUDIT — 2026-04-28
       ════════════════════════════════════════════ */

    /* Fix: wren.css max-width omits the sidebar-w override on mobile.
       Override here so this page fills the viewport when sidebar is off-screen. */
    @media (max-width: 768px) {
      #wren-main { max-width: 100% !important; }
    }

    /* 481–767 px: foldable outer / large-phone landscape */
    @media (min-width: 481px) and (max-width: 767px) {
      .compact-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    }

    /* Touch targets ≥ 44 px on ≤ 768 px */
    @media (max-width: 768px) {
      .ey-icon-btn      { width: 44px; height: 44px; }
      .ey-btn-obs       { height: 44px; }
      .ey-filter-select { height: 44px; }
      .ey-search        { height: 44px; }
      .sel-tab {
        min-height: 44px;
        padding: 8px 12px;
        display: inline-flex;
        align-items: center;
      }
      .ccc-action { min-height: 44px; padding: 8px 10px; }
    }

    /* ≤ 480 px: 2-row header grid; + Obs → icon-only */
    @media (max-width: 480px) {
      .ey-header {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 8px;
        align-items: center;
      }
      .ey-title         { grid-area: 1 / 1; }
      .ey-actions       { grid-area: 1 / 2; justify-self: end; }
      .ey-filter-select { grid-area: 2 / 1; width: 100%; box-sizing: border-box; min-width: 0; }
      .ey-search        { grid-area: 2 / 2; min-width: 0; }
      .ey-btn-obs       { width: 44px; padding: 0; font-size: 0; }
      .ey-btn-obs::before { content: '+'; font-size: 1rem; font-weight: 700; display: block; }
    }

    /* ≤ 380 px: Honor Fold inner / very narrow phones */
    @media (max-width: 380px) {
      .ey-icon-btn { width: 40px; }
      .ey-btn-obs  { width: 40px; }
      .ey-actions  { gap: 4px; }
      .compact-grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); }
      .ccc-avatar   { width: 44px; height: 44px; font-size: .88rem; }
      .ccc-name     { font-size: .68rem; }
    }

    /* AI chat button: respect iOS safe-area inset */
    @media (max-width: 768px) {
      #wren-chat-btn { bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }
    }

    /* ── Page-level overflow ── */
    #wren-content { overflow-x: hidden; min-width: 0; }
    #children-area { overflow-x: hidden; }
  </style>
</head>
<body>
<div id="wren-content">

  <!-- ── Sticky zone: header + context bar ── -->
  <div class="ey-sticky">

    <!-- Row 1: title / smart filter / search / actions -->
    <div class="ey-header">
      <span class="ey-title">Children</span>

      <select id="smart-filter" class="ey-filter-select" onchange="applyFilters()">
        <option value="all">All children</option>
        <option value="signed_in">Signed in</option>
        <option value="scheduled">Scheduled today</option>
        <option value="by_room">By room</option>
        <option value="my_key">My key children</option>
      </select>

      <div class="ey-search">
        <span style="color:var(--text-muted,#64748b);font-size:.85rem;flex-shrink:0">🔍</span>
        <input type="text" id="search" placeholder="Search…" oninput="applyFilters()">
      </div>

      <div class="ey-actions">
        <button class="btn btn-primary ey-btn-obs" onclick="openNewObsModal()">+ Obs</button>

        <div class="quick-add-wrap">
          <button class="ey-icon-btn" title="Quick add" onclick="toggleQuickAdd(event)">＋</button>
          <div id="quick-add-dropdown" class="quick-add-dropdown" style="display:none">
            <a href="/observations.html">📝 Group observation</a>
            <a href="/incidents.html">🚑 Incident</a>
            <a href="/sleep-checks.html">😴 Sleep check</a>
            <a href="/diary.html">📓 Daily diary</a>
          </div>
        </div>

        <button class="ey-icon-btn" title="Messages" onclick="location.href='/messages.html'">
          🔔<span class="notif-badge" id="notif-count" style="display:none">0</span>
        </button>
      </div>
    </div>

    <!-- Row 2: selection / context bar -->
    <div class="selection-bar" id="selection-bar">
      <span class="sel-info" id="sel-info">All children — tap a card to select</span>
      <div class="sel-tabs" id="sel-tabs" style="display:none"></div>
      <button class="sel-clear" id="sel-clear" onclick="clearSelection()" style="display:none">✕ Clear</button>
    </div>

  </div><!-- /.ey-sticky -->

  <!-- ── Children grid (scrolls normally) ── -->
  <div id="children-area">
    <div class="loading-state"><div class="spinner"></div><span>Loading children…</span></div>
  </div>

</div><!-- /#wren-content -->

<script>
let allChildren = [];
const selectedIds = new Set();

// ── Init — always wren:ready, never DOMContentLoaded ──
document.addEventListener('wren:ready', () => {
  const role = Wren.user?.role || 'practitioner';
  const isManager = ['manager', 'deputy_manager', 'admin'].includes(role);
  document.getElementById('smart-filter').value = isManager ? 'all' : 'by_room';

  loadData();

  // Close quick-add on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.quick-add-wrap')) {
      document.getElementById('quick-add-dropdown').style.display = 'none';
    }
  });
});

// Auto-refresh every 2 minutes
setInterval(loadData, 120000);

async function loadData() {
  try {
    const [childRes, msgRes] = await Promise.allSettled([
      Wren.api('/api/children/attendance/today'),
      Wren.api('/api/messages/unread-count'),
    ]);

    if (childRes.status === 'fulfilled') {
      allChildren = childRes.value || [];
    }

    const msgCount = msgRes.status === 'fulfilled' ? (msgRes.value?.count || 0) : 0;
    const badge = document.getElementById('notif-count');
    if (msgCount > 0) {
      badge.textContent = msgCount > 9 ? '9+' : msgCount;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }

    applyFilters();
  } catch {
    document.getElementById('children-area').innerHTML =
      '<div class="alert alert-danger">Failed to load children</div>';
  }
}

function applyFilters() {
  const search  = document.getElementById('search').value.trim().toLowerCase();
  const filter  = document.getElementById('smart-filter').value;
  const user    = Wren.user || {};
  let kids = [...allChildren];

  if (filter === 'signed_in') {
    kids = kids.filter(c => c.sign_in_time && !c.sign_out_time && !c.absent);
  } else if (filter === 'scheduled') {
    // Scheduled = all non-absent children today; fallback to all
    kids = kids.filter(c => !c.absent);
  } else if (filter === 'by_room' && user.room_id) {
    kids = kids.filter(c => String(c.room_id) === String(user.room_id));
  } else if (filter === 'my_key' && user.id) {
    const myKids = kids.filter(c => c.key_person_id === user.id);
    kids = myKids.length ? myKids : kids; // fallback to all if none linked
  }

  if (search) {
    kids = kids.filter(c =>
      `${c.first_name} ${c.last_name}`.toLowerCase().includes(search)
    );
  }

  renderChildren(kids);
}

function renderChildren(kids) {
  const area = document.getElementById('children-area');
  if (!kids.length) {
    area.innerHTML = `<div class="empty-state">
      <div class="empty-icon">👶</div>
      <div class="empty-title">No children found</div>
    </div>`;
    return;
  }

  // Group by room
  const byRoom = {};
  kids.forEach(c => {
    const key = c.room_name || 'Unassigned';
    if (!byRoom[key]) byRoom[key] = [];
    byRoom[key].push(c);
  });

  area.innerHTML = Object.entries(byRoom).map(([room, group]) => {
    const present = group.filter(k => k.sign_in_time && !k.absent && !k.sign_out_time).length;
    return `<div class="room-section">
      <div class="room-header">
        <span class="room-name">${room.toUpperCase()}</span>
        <span class="room-count">(${present}/${group.length})</span>
      </div>
      <div class="compact-grid">${group.map(renderCard).join('')}</div>
    </div>`;
  }).join('');

  // Re-apply selection highlights after re-render
  selectedIds.forEach(id => {
    document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.add('selected');
  });
}

function renderCard(c) {
  const init    = c.first_name[0] + c.last_name[0];
  const isSel   = selectedIds.has(c.id);
  const nameFmt = c.first_name + ' ' + c.last_name.charAt(0) + '.';

  let dotClass = 'unsigned';
  if (c.absent)                                  dotClass = 'absent';
  else if (c.sign_in_time && c.sign_out_time)    dotClass = 'gone';
  else if (c.sign_in_time)                       dotClass = 'present';

  const tags = [
    c.is_on_sen_register ? '<span class="ccc-tag ccc-tag-sen">SEN</span>' : '',
    c.allergies          ? `<span class="ccc-tag ccc-tag-allergy" title="${c.allergies}">⚠</span>` : '',
  ].join('');

  let actionBtn = '';
  if (!c.sign_in_time && !c.absent) {
    actionBtn = `<button class="ccc-action ccc-in" onclick="event.stopPropagation();signIn(${c.id})">Sign In</button>`;
  } else if (c.sign_in_time && !c.sign_out_time && !c.absent) {
    actionBtn = `<button class="ccc-action ccc-out" onclick="event.stopPropagation();signOut(${c.id})">Out</button>`;
  }

  return `<div class="child-card-compact${isSel ? ' selected' : ''}${c.absent ? ' absent' : ''}"
       data-id="${c.id}" onclick="toggleSelect(${c.id})">
    <div class="ccc-sel-badge">✓</div>
    <div class="ccc-avatar">${init}</div>
    <div class="ccc-name">${nameFmt}</div>
    <div class="ccc-meta"><span class="ccc-dot ${dotClass}"></span>${tags}</div>
    ${actionBtn}
  </div>`;
}

// ── Selection logic ──
function toggleSelect(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.remove('selected');
  } else {
    selectedIds.add(id);
    document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.add('selected');
  }
  updateContextBar();
}

function clearSelection() {
  selectedIds.forEach(id =>
    document.querySelector(`.child-card-compact[data-id="${id}"]`)?.classList.remove('selected')
  );
  selectedIds.clear();
  updateContextBar();
}

function updateContextBar() {
  const n        = selectedIds.size;
  const info     = document.getElementById('sel-info');
  const tabsEl   = document.getElementById('sel-tabs');
  const clearBtn = document.getElementById('sel-clear');

  if (n === 0) {
    info.textContent = 'All children — tap a card to select';
    tabsEl.style.display = 'none';
    clearBtn.style.display = 'none';
  } else if (n === 1) {
    const child = allChildren.find(c => c.id === [...selectedIds][0]);
    info.textContent = `1 selected: ${child ? child.first_name + ' ' + child.last_name : ''}`;
    tabsEl.style.display = 'flex';
    clearBtn.style.display = '';
    tabsEl.innerHTML = `
      <button class="sel-tab primary" onclick="navChild('obs')">+ Observation</button>
      <button class="sel-tab" onclick="navChild('diary')">Daily diary</button>
      <button class="sel-tab" onclick="navChild('framework')">Framework</button>
      <button class="sel-tab" onclick="navChild('profile')">Profile</button>`;
  } else {
    info.textContent = `${n} children selected`;
    tabsEl.style.display = 'flex';
    clearBtn.style.display = '';
    tabsEl.innerHTML = `
      <button class="sel-tab primary" onclick="openGroupObs()">+ Group observation</button>`;
  }
}

function navChild(page) {
  const ids = [...selectedIds];
  if (!ids.length) return;
  const id = ids[0];
  if (page === 'obs') {
    const c = allChildren.find(x => x.id === id);
    openObsModal(id, c?.first_name || '');
    return;
  }
  const urls = {
    diary:     `/diary.html?child_id=${id}`,
    framework: `/child-profile.html?id=${id}&tab=framework`,
    profile:   `/child-profile.html?id=${id}`,
  };
  if (urls[page]) window.location.href = urls[page];
}

function openGroupObs() { openObsModal(null, null); }

function toggleQuickAdd(e) {
  e.stopPropagation();
  const m = document.getElementById('quick-add-dropdown');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

// ── Sign in / out ──
async function signIn(childId) {
  try {
    await Wren.api('/api/attendance/sign-in', { method: 'POST', body: { child_id: childId } });
    Wren.toast('Signed in ✓', 'success');
    const c = allChildren.find(x => x.id === childId);
    if (c) c.sign_in_time = new Date().toISOString();
    applyFilters();
  } catch {
    Wren.toast('Sign in failed', 'error');
  }
}

async function signOut(childId) {
  try {
    await Wren.api('/api/attendance/sign-out', { method: 'POST', body: { child_id: childId } });
    Wren.toast('Signed out ✓', 'success');
    const c = allChildren.find(x => x.id === childId);
    if (c) c.sign_out_time = new Date().toISOString();
    applyFilters();
  } catch {
    Wren.toast('Sign out failed', 'error');
  }
}

// ── Observation modal (quick inline entry) ──
const EYFS_AREAS = ['PSED','CL','PD','Literacy','Mathematics','UW','EA'];

function openObsModal(childId, childName) {
  const form = document.createElement('div');
  const presentKids = allChildren.filter(c => c.sign_in_time && !c.absent);

  form.innerHTML = `
    <div class="form-group">
      ${childId
        ? `<label class="form-label">Child: <strong>${childName}</strong></label>`
        : `<label class="form-label">Child</label>
           <select class="form-control" id="obs-child">
             ${presentKids.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('')}
           </select>`}
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select class="form-control" id="obs-type">
        <option value="learning_story">Learning Story</option>
        <option value="milestone">Milestone</option>
        <option value="note">Note</option>
        <option value="2year_check">2-Year Check</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">EYFS Areas</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${EYFS_AREAS.map(a => `<label style="cursor:pointer">
          <input type="checkbox" value="${a}" class="eyfs-cb" style="display:none">
          <span class="eyfs-tag eyfs-${a}" style="cursor:pointer;opacity:.5">${a}</span>
        </label>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observation <span style="color:var(--error,#ef4444)">*</span></label>
      <textarea class="form-control" id="obs-text" rows="4" placeholder="What did you observe?"></textarea>
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px">
      <input type="checkbox" id="obs-share" checked>
      <span style="font-size:.85rem;color:var(--text-muted,#94a3b8)">Share with parents</span>
    </label>`;

  form.querySelectorAll('.eyfs-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('label').querySelector('.eyfs-tag').style.opacity = cb.checked ? '1' : '.5';
    });
  });

  Wren.modal('New Observation', form, [
    { label: 'Save', class: 'btn-primary', close: false, action: async () => {
      const text = document.getElementById('obs-text').value.trim();
      if (!text) { Wren.toast('Please enter observation text', 'warning'); return; }
      const areas = [...form.querySelectorAll('.eyfs-cb:checked')].map(c => c.value);
      const cid = childId || document.getElementById('obs-child')?.value;
      try {
        await Wren.api('/api/observations', { method: 'POST', body: {
          child_id: cid,
          observation_text: text,
          observation_type: document.getElementById('obs-type').value,
          eyfs_areas: areas,
          shared_with_parents: document.getElementById('obs-share').checked,
        }});
        Wren.toast('Observation saved ✓', 'success');
        document.querySelector('.wren-modal-overlay')?.remove();
      } catch {
        Wren.toast('Failed to save', 'error');
      }
    }},
    { label: 'Cancel', class: 'btn-ghost' },
  ]);
}

function openNewObsModal() { openObsModal(null, null); }
</script>
