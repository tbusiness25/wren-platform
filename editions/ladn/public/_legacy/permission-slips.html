<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="wren-edition" content="ladn">
<title>Permission Slips — Wren</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
  body { background:#0f172a; color:#f1f5f9; font-family:system-ui,Arial,sans-serif; margin:0; }
  .page-header { padding:24px 28px 0; }
  .page-header h1 { font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif; color:#4a9abf; margin:0 0 4px; font-size:1.6rem; }
  .page-header p { color:#94a3b8; margin:0 0 20px; }
  .main-content { padding:0 28px 40px; max-width:1000px; }
  .btn { padding:9px 18px; border-radius:10px; border:none; cursor:pointer; font-size:.9rem; transition:.2s; }
  .btn-primary { background:#4a9abf; color:#fff; } .btn-primary:hover { background:#3a8aaf; }
  .btn-orange { background:#e07820; color:#fff; } .btn-orange:hover { background:#c06810; }
  .btn-ghost { background:#2d3748; color:#f1f5f9; } .btn-ghost:hover { background:#3d4758; }
  .btn-sm { padding:6px 12px; font-size:.82rem; }
  .btn-danger { background:#ef4444; color:#fff; }
  .btn-green { background:#16a34a; color:#fff; }
  input, select, textarea { background:#0f172a; border:1px solid #2d3748; border-radius:8px; color:#f1f5f9; padding:9px 12px; font-size:.9rem; width:100%; box-sizing:border-box; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:#4a9abf; }
  textarea { resize:vertical; }
  label { display:block; color:#94a3b8; font-size:.82rem; margin-bottom:4px; }
  .form-group { margin-bottom:12px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .form-row.three { grid-template-columns:1fr 1fr 1fr; }
  .badge { display:inline-block; padding:3px 8px; border-radius:20px; font-size:.72rem; font-weight:600; }
  .badge-green { background:#064e23; color:#22c55e; }
  .badge-orange { background:#431407; color:#e07820; }
  .badge-blue { background:#0c2d48; color:#4a9abf; }
  .badge-gray { background:#1e293b; color:#94a3b8; border:1px solid #2d3748; }
  .badge-red { background:#450a0a; color:#ef4444; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:1000; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.open { display:flex; }
  .modal { background:#1e293b; border:1px solid #2d3748; border-radius:16px; padding:28px; max-width:760px; width:100%; max-height:92vh; overflow-y:auto; }
  .modal h2 { margin:0 0 20px; font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif; color:#4a9abf; }
  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #2d3748; flex-wrap:wrap; }
  .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .slip-card { background:#1e293b; border:1px solid #2d3748; border-radius:12px; margin-bottom:12px; overflow:hidden; transition:.2s; }
  .slip-card:hover { border-color:#4a9abf44; }
  .slip-card .sc-header { padding:16px 20px 12px; display:flex; gap:12px; align-items:flex-start; }
  .slip-card .sc-title { font-weight:600; font-size:.98rem; flex:1; }
  .slip-card .sc-meta { font-size:.8rem; color:#94a3b8; margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
  .slip-card .sc-status { flex-shrink:0; }
  .slip-card .sc-footer { padding:0 20px 14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .progress-bar { height:6px; background:#0f172a; border-radius:3px; overflow:hidden; margin:8px 0; }
  .progress-bar .fill { height:100%; border-radius:3px; transition:.3s; }
  .progress-bar .fill-green { background:#22c55e; }
  .progress-bar .fill-orange { background:#e07820; }
  .response-table { width:100%; border-collapse:collapse; font-size:.85rem; }
  .response-table th { text-align:left; padding:8px 12px; color:#94a3b8; font-size:.78rem; border-bottom:1px solid #2d3748; }
  .response-table td { padding:9px 12px; border-bottom:1px solid #1e293b; }
  .response-table tr:last-child td { border-bottom:none; }
  .sig-approved { color:#22c55e; }
  .sig-declined { color:#ef4444; }
  .sig-pending { color:#94a3b8; }
  .empty { color:#94a3b8; text-align:center; padding:40px; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #2d3748; border-top-color:#4a9abf; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .info-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .info-cell { background:#0f172a; border-radius:8px; padding:10px 12px; }
  .info-cell .ic-label { font-size:.75rem; color:#94a3b8; }
  .info-cell .ic-val { font-size:.9rem; }
  .checkbox-inline { display:flex; align-items:center; gap:8px; color:#f1f5f9; font-size:.9rem; }
  .checkbox-inline input { width:auto; }
  @media(max-width:600px) { .form-row{grid-template-columns:1fr;} .form-row.three{grid-template-columns:1fr;} .info-row{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div id="wren-shell-target"></div>
<div id="app" style="display:none">
  <div class="page-header">
    <h1>Permission Slips</h1>
    <p>Create digital permission slips for trips and outings — send to parents, track signing, and download the signed list.</p>
  </div>
  <div class="main-content">
    <div class="top-row">
      <span id="slip-count" style="color:#94a3b8;font-size:.87rem;"></span>
      <button class="btn btn-primary" onclick="openCreateSlip()">+ New Permission Slip</button>
    </div>
    <div id="slips-list"><p class="empty">Loading…</p></div>
  </div>
</div>

<!-- CREATE SLIP MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2 id="create-modal-title">New Permission Slip</h2>
    <input type="hidden" id="edit-slip-id">

    <div class="form-group">
      <label>Trip / Event Title *</label>
      <input id="slip-title" placeholder="e.g. Pre-school trip to Gunnersbury Park">
    </div>
    <div class="form-group">
      <label>Description (shown to parents)</label>
      <textarea id="slip-description" rows="3" placeholder="Brief description of the trip — what children will be doing, what to bring, etc."></textarea>
    </div>

    <div class="form-row three">
      <div class="form-group">
        <label>Trip Date</label>
        <input type="date" id="slip-trip-date">
      </div>
      <div class="form-group">
        <label>Departure time</label>
        <input type="time" id="slip-depart">
      </div>
      <div class="form-group">
        <label>Return time</label>
        <input type="time" id="slip-return">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Destination</label>
        <input id="slip-destination" placeholder="e.g. Gunnersbury Park, W3 8LQ">
      </div>
      <div class="form-group">
        <label>Transport</label>
        <input id="slip-transport" placeholder="e.g. Walking / minibus / public transport">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Cost per child (£)</label>
        <input type="number" id="slip-cost" min="0" step="0.50" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Response deadline</label>
        <input type="date" id="slip-deadline">
      </div>
    </div>

    <div class="form-group">
      <label>Send to</label>
      <select id="slip-recipients">
        <option value="all_active">All active children</option>
        <option value="preschool">Pre-school room only</option>
        <option value="baby">Baby room only</option>
      </select>
    </div>

    <div class="form-group" style="display:flex;flex-direction:column;gap:8px;">
      <label class="checkbox-inline">
        <input type="checkbox" id="slip-medical" checked>
        Request parents to confirm/update medical information
      </label>
      <label class="checkbox-inline">
        <input type="checkbox" id="slip-photo">
        Request photo consent for this trip
      </label>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSlip()">Save Draft</button>
    </div>
  </div>
</div>

<!-- SLIP DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:880px;">
    <h2 id="detail-title">Permission Slip</h2>
    <div id="detail-content"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<script>
let slips = [], rooms = [];

document.addEventListener('wren:ready', async () => {
  document.getElementById('app').style.display = 'block';
  await Promise.all([loadSlips(), loadRooms()]);
});

async function loadSlips() {
  try {
    const r = await fetch('/api/permission-slips', { headers: authHeaders() });
    slips = await r.json();
    document.getElementById('slip-count').textContent = `${slips.length} slip${slips.length !== 1 ? 's' : ''}`;
    renderSlips();
  } catch (e) {
    document.getElementById('slips-list').innerHTML = '<p class="empty">Error loading.</p>';
  }
}

async function loadRooms() {
  try {
    const r = await fetch('/api/children/rooms', { headers: authHeaders() });
    if (r.ok) rooms = await r.json();
  } catch {}
}

function renderSlips() {
  const el = document.getElementById('slips-list');
  if (!slips.length) {
    el.innerHTML = '<p class="empty">No permission slips yet. Create one for an upcoming trip.</p>';
    return;
  }
  el.innerHTML = slips.map(s => {
    const total = parseInt(s.total_children) || 0;
    const approved = parseInt(s.approved_count) || 0;
    const declined = parseInt(s.declined_count) || 0;
    const pct = total ? Math.round((approved / total) * 100) : 0;
    const statusBadge = {
      draft: '<span class="badge badge-gray">Draft</span>',
      sent: '<span class="badge badge-blue">Sent</span>',
      closed: '<span class="badge badge-green">Closed</span>'
    }[s.status] || '<span class="badge badge-gray">Draft</span>';

    return `<div class="slip-card">
      <div class="sc-header">
        <div style="flex:1;">
          <div class="sc-title" onclick="viewSlip(${s.id})" style="cursor:pointer;">${esc(s.title)}</div>
          <div class="sc-meta">
            ${s.trip_date ? `📅 ${fmtDate(s.trip_date)}` : ''}
            ${s.destination ? `📍 ${esc(s.destination)}` : ''}
            ${s.cost ? `💷 £${parseFloat(s.cost).toFixed(2)}` : ''}
            ${s.deadline ? `⏰ Deadline: ${fmtDate(s.deadline)}` : ''}
          </div>
          ${s.status === 'sent' ? `
            <div class="progress-bar"><div class="fill fill-green" style="width:${pct}%"></div></div>
            <div style="font-size:.77rem;color:#94a3b8;">${approved} approved · ${declined} declined · ${total - approved - declined} pending of ${total}</div>
          ` : ''}
        </div>
        <div class="sc-status">${statusBadge}</div>
      </div>
      <div class="sc-footer">
        <button class="btn btn-ghost btn-sm" onclick="viewSlip(${s.id})">View Details</button>
        ${s.status === 'draft' ? `<button class="btn btn-primary btn-sm" onclick="sendSlip(${s.id})">Send to Parents</button>` : ''}
        ${s.status === 'sent' ? `<button class="btn btn-ghost btn-sm" onclick="remindSlip(${s.id})">Remind Unsigned</button>` : ''}
        ${s.status === 'sent' ? `<button class="btn btn-ghost btn-sm" onclick="closeSlip(${s.id})">Close Slip</button>` : ''}
        ${s.status === 'draft' ? `<button class="btn btn-ghost btn-sm" onclick="editSlip(${s.id})">Edit</button>` : ''}
        ${s.status === 'draft' ? `<button class="btn btn-danger btn-sm" onclick="deleteSlip(${s.id})">Delete</button>` : ''}
        <span style="flex:1;"></span>
        <span style="font-size:.77rem;color:#64748b;">Created by ${esc(s.created_by_name || '—')} · ${fmtDate(s.created_at)}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Create / edit slip ────────────────────────────────────────────────────────
function openCreateSlip() {
  document.getElementById('create-modal-title').textContent = 'New Permission Slip';
  document.getElementById('edit-slip-id').value = '';
  ['slip-title','slip-description','slip-destination','slip-transport'].forEach(id => document.getElementById(id).value = '');
  ['slip-trip-date','slip-depart','slip-return','slip-deadline'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('slip-cost').value = '';
  document.getElementById('slip-recipients').value = 'all_active';
  document.getElementById('slip-medical').checked = true;
  document.getElementById('slip-photo').checked = false;
  openModal('create-modal');
}

function editSlip(id) {
  const s = slips.find(x => x.id === id);
  if (!s) return;
  document.getElementById('create-modal-title').textContent = 'Edit Permission Slip';
  document.getElementById('edit-slip-id').value = s.id;
  document.getElementById('slip-title').value = s.title || '';
  document.getElementById('slip-description').value = s.description || '';
  document.getElementById('slip-trip-date').value = s.trip_date ? s.trip_date.slice(0, 10) : '';
  document.getElementById('slip-depart').value = s.departure_time || '';
  document.getElementById('slip-return').value = s.return_time || '';
  document.getElementById('slip-destination').value = s.destination || '';
  document.getElementById('slip-transport').value = s.transport || '';
  document.getElementById('slip-cost').value = s.cost || '';
  document.getElementById('slip-deadline').value = s.deadline ? s.deadline.slice(0, 10) : '';
  document.getElementById('slip-medical').checked = s.requires_medical_confirmation !== false;
  document.getElementById('slip-photo').checked = !!s.requires_photo_consent;
  openModal('create-modal');
}

async function saveSlip() {
  const id = document.getElementById('edit-slip-id').value;
  const body = {
    title: document.getElementById('slip-title').value.trim(),
    description: document.getElementById('slip-description').value,
    trip_date: document.getElementById('slip-trip-date').value || null,
    departure_time: document.getElementById('slip-depart').value || null,
    return_time: document.getElementById('slip-return').value || null,
    destination: document.getElementById('slip-destination').value || null,
    transport: document.getElementById('slip-transport').value || null,
    cost: parseFloat(document.getElementById('slip-cost').value) || null,
    deadline: document.getElementById('slip-deadline').value || null,
    recipients: { type: document.getElementById('slip-recipients').value },
    requires_medical_confirmation: document.getElementById('slip-medical').checked,
    requires_photo_consent: document.getElementById('slip-photo').checked
  };
  if (!body.title) return alert('Title is required.');
  try {
    const r = await fetch(id ? `/api/permission-slips/${id}` : '/api/permission-slips', {
      method: id ? 'PUT' : 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    closeModal('create-modal');
    await loadSlips();
  } catch (e) { alert('Error saving: ' + e.message); }
}

// ── View slip detail ───────────────────────────────────────────────────────────
async function viewSlip(id) {
  try {
    const r = await fetch(`/api/permission-slips/${id}`, { headers: authHeaders() });
    const slip = await r.json();
    document.getElementById('detail-title').textContent = slip.title;

    const responses = slip.responses || [];
    const approved = responses.filter(r => r.response === 'approved').length;
    const declined = responses.filter(r => r.response === 'declined').length;
    const pending = responses.filter(r => r.response === 'pending').length;

    let html = `
      <div class="info-row">
        ${slip.trip_date ? `<div class="info-cell"><div class="ic-label">Trip Date</div><div class="ic-val">${fmtDate(slip.trip_date)}</div></div>` : ''}
        ${slip.destination ? `<div class="info-cell"><div class="ic-label">Destination</div><div class="ic-val">${esc(slip.destination)}</div></div>` : ''}
        ${slip.departure_time ? `<div class="info-cell"><div class="ic-label">Departure</div><div class="ic-val">${slip.departure_time}${slip.return_time?' → '+slip.return_time:''}</div></div>` : ''}
        ${slip.transport ? `<div class="info-cell"><div class="ic-label">Transport</div><div class="ic-val">${esc(slip.transport)}</div></div>` : ''}
        ${slip.cost ? `<div class="info-cell"><div class="ic-label">Cost</div><div class="ic-val">£${parseFloat(slip.cost).toFixed(2)}</div></div>` : ''}
        ${slip.deadline ? `<div class="info-cell"><div class="ic-label">Response Deadline</div><div class="ic-val">${fmtDate(slip.deadline)}</div></div>` : ''}
      </div>
      ${slip.description ? `<div style="background:#0f172a;border-radius:8px;padding:12px;margin-bottom:16px;font-size:.9rem;">${esc(slip.description)}</div>` : ''}
    `;

    if (responses.length) {
      const pct = Math.round((approved / responses.length) * 100);
      html += `
        <div style="margin-bottom:16px;">
          <div style="display:flex;gap:16px;margin-bottom:8px;font-size:.87rem;">
            <span class="sig-approved">✓ ${approved} approved</span>
            <span class="sig-declined">✗ ${declined} declined</span>
            <span class="sig-pending">⏳ ${pending} pending</span>
          </div>
          <div class="progress-bar"><div class="fill fill-green" style="width:${pct}%"></div></div>
        </div>
        <table class="response-table">
          <tr><th>Child</th><th>Parent</th><th>Response</th><th>Signed</th><th>Notes</th></tr>
          ${responses.map(resp => `<tr>
            <td>${esc(resp.first_name + ' ' + resp.last_name)}</td>
            <td style="color:#94a3b8;font-size:.8rem;">${esc(resp.parent_name || resp.parent_email || '—')}</td>
            <td class="sig-${resp.response}">${resp.response === 'approved' ? '✓ Approved' : resp.response === 'declined' ? '✗ Declined' : '⏳ Pending'}</td>
            <td style="color:#94a3b8;font-size:.8rem;">${resp.signed_at ? fmtDate(resp.signed_at) : '—'}</td>
            <td style="color:#94a3b8;font-size:.8rem;">${esc(resp.medical_notes || '')}</td>
          </tr>`).join('')}
        </table>
      `;
    } else if (slip.status !== 'draft') {
      html += '<p style="color:#94a3b8;font-size:.87rem;">No responses yet.</p>';
    } else {
      html += '<p style="color:#94a3b8;font-size:.87rem;">Draft — send to parents to collect responses.</p>';
    }

    document.getElementById('detail-content').innerHTML = html;

    // Footer buttons
    let footer = `<button class="btn btn-ghost" onclick="closeModal('detail-modal')">Close</button>`;
    if (slip.status === 'draft') footer += `<button class="btn btn-ghost" onclick="closeModal('detail-modal');editSlip(${slip.id})">Edit</button>`;
    if (slip.status === 'draft') footer += `<button class="btn btn-primary" onclick="closeModal('detail-modal');sendSlip(${slip.id})">Send to Parents</button>`;
    if (slip.status === 'sent') footer += `<button class="btn btn-ghost" onclick="remindSlip(${slip.id})">Remind Unsigned (${pending})</button>`;
    if (slip.status === 'sent') footer += `<button class="btn btn-orange" onclick="closeSlip(${slip.id})">Close Slip</button>`;
    if (slip.trip_date) footer += `<a class="btn btn-ghost btn-sm" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px;" href="/api/permission-slips/${slip.id}/calendar.ics" download>📅 ICS</a>`;
    if (slip.status !== 'draft') footer += `<button class="btn btn-ghost btn-sm" onclick="verifyChain(${slip.id})">🔒 Verify Chain</button>`;
    document.getElementById('detail-footer').innerHTML = footer;
    openModal('detail-modal');
  } catch (e) { alert('Error: ' + e.message); }
}

// ── Actions ────────────────────────────────────────────────────────────────────
async function sendSlip(id) {
  if (!confirm('Send this slip to all parents now?')) return;
  try {
    const r = await fetch(`/api/permission-slips/${id}/send`, { method: 'POST', headers: authHeaders() });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    alert(`✓ Sent — ${data.responses_created} children notified.`);
    await loadSlips();
    closeModal('detail-modal');
  } catch (e) { alert('Error sending: ' + e.message); }
}

async function remindSlip(id) {
  try {
    const r = await fetch(`/api/permission-slips/${id}/remind`, { method: 'POST', headers: authHeaders() });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    alert(`✓ Reminder marked for ${d.reminded} parent${d.reminded !== 1 ? 's' : ''}.`);
    await loadSlips();
  } catch (e) { alert('Error: ' + e.message); }
}

async function closeSlip(id) {
  if (!confirm('Close this slip? No further responses will be accepted.')) return;
  try {
    await fetch(`/api/permission-slips/${id}/close`, { method: 'POST', headers: authHeaders() });
    await loadSlips();
    closeModal('detail-modal');
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteSlip(id) {
  if (!confirm('Delete this draft slip?')) return;
  try {
    const r = await fetch(`/api/permission-slips/${id}`, { method: 'DELETE', headers: authHeaders() });
    if (!r.ok) throw new Error(await r.text());
    await loadSlips();
  } catch (e) { alert(e.message); }
}

async function verifyChain(id) {
  try {
    const r = await fetch(`/api/permission-slips/${id}/verify-chain`, { headers: authHeaders() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Verification failed');
    const intact = d.chain_intact;
    const msg = intact
      ? `✓ Hash chain intact — all ${d.rows.length} signed response(s) verified. No tampering detected.`
      : `⚠️ Hash chain BROKEN — one or more records may have been modified after signing. Review the table below.`;
    alert(msg);
  } catch (e) { alert('Error: ' + e.message); }
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function authHeaders() { const t = sessionStorage.getItem('wren_token'); return t ? { Authorization: 'Bearer ' + t } : {}; }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
</script>
