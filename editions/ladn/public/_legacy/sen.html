<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>SEN Register — Wren EYFS</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .sen-card{background:#1e293b;border:1px solid #2d3748;border-left:4px solid #8b5cf6;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
    .sen-card:hover{border-color:#8b5cf6}
    .sen-card.review-due{border-left-color:#ef4444}
    .sen-type-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
    .sn-ehcp{background:#8b5cf622;color:#8b5cf6}
    .sn-send_support{background:#4a9abf22;color:#4a9abf}
    .sn-monitored{background:#f59e0b22;color:#f59e0b}
    .review-alert{background:#ef444422;color:#ef4444;font-size:11px;padding:2px 8px;border-radius:4px}
    .prof-chip{display:inline-block;background:#2d3748;border-radius:4px;font-size:11px;padding:2px 8px;margin:2px}
    .modal-overlay{position:fixed;inset:0;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#1e293b;border:1px solid #2d3748;border-radius:16px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
    .modal-title{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:16px}
    .prof-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .tab-bar{display:flex;gap:4px;margin-bottom:16px;background:#1e293b;border-radius:10px;padding:4px}
    .tab-btn{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:#94a3b8;font-size:13px;cursor:pointer;transition:.15s}
    .tab-btn.active{background:#8b5cf6;color:#fff;font-weight:700}
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">SEN Register</div>
      <div class="page-subtitle">Special Educational Needs & Disability</div>
    </div>
    <button class="btn btn-primary" id="add-btn" style="display:none" onclick="openAddModal()">+ Add Child</button>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px" id="stats-row"></div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-active" onclick="setTab('active',this)">Active</button>
    <button class="tab-btn" id="tab-all" onclick="setTab('all',this)">All</button>
    <button class="tab-btn" id="tab-reviews" onclick="setTab('reviews',this)">Reviews Due</button>
  </div>

  <div id="sen-list"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<!-- EDIT/ADD MODAL -->
<div id="sen-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="sen-modal-title">SEN Record</div>
    <input type="hidden" id="sen-record-id">
    <input type="hidden" id="sen-child-id">

    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Child</div>
      <div id="sen-child-name" style="font-size:15px;font-weight:700;color:#f1f5f9"></div>
      <div id="sen-child-select-row" style="display:none">
        <select class="form-control" id="sen-child-select"></select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">SEN Type *</div>
        <select class="form-control" id="sen-type">
          <option value="monitored">Monitored / Concern</option>
          <option value="send_support">SEN Support (K)</option>
          <option value="ehcp">EHCP</option>
        </select>
      </div>
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Primary Need</div>
        <select class="form-control" id="sen-primary">
          <option value="">Select...</option>
          <option value="communication_language">Communication & Language</option>
          <option value="cognition_learning">Cognition & Learning</option>
          <option value="social_emotional">Social, Emotional & Mental Health</option>
          <option value="sensory_physical">Sensory & Physical</option>
          <option value="autism">Autism Spectrum</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Review Date</div>
        <input type="date" class="form-control" id="sen-review">
      </div>
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Annual Review</div>
        <input type="date" class="form-control" id="sen-annual">
      </div>
      <div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">EHCP Date</div>
        <input type="date" class="form-control" id="sen-ehcp">
      </div>
    </div>

    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Provision Map / Support Strategy</div>
      <textarea class="form-control" id="sen-provision" rows="3" placeholder="Describe the support and provision in place..."></textarea>
    </div>

    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:12px;color:#94a3b8">External Professionals Involved</div>
        <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px" onclick="addProfessional()">+ Add</button>
      </div>
      <div id="professionals-list"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-secondary" onclick="document.getElementById('sen-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="saveSen()">Save Record</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div id="sen-view-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px">
      <div class="modal-title" id="view-name" style="margin:0"></div>
      <button class="btn btn-secondary" style="flex-shrink:0" onclick="document.getElementById('sen-view-modal').style.display='none'">Close</button>
    </div>
    <div id="view-body"></div>
  </div>
</div>

<script>
let senRecords=[], allChildren=[], professionals=[], currentTab='active';
const isManager=()=>['manager','deputy_manager'].includes(Wren.user?.role);

const TYPE_LABELS={monitored:'Monitored',send_support:'SEN Support (K)',ehcp:'EHCP'};
const NEED_LABELS={communication_language:'Communication & Language',cognition_learning:'Cognition & Learning',social_emotional:'Social & Emotional',sensory_physical:'Sensory & Physical',autism:'Autism Spectrum',other:'Other'};

async function init(){
  const isM=isManager();
  if(isM)document.getElementById('add-btn').style.display='';
  const [sr,ch]=await Promise.all([
    Wren.api('/api/sen').catch(()=>[]),
    Wren.api('/api/children').catch(()=>[])
  ]);
  senRecords=sr||[];
  allChildren=ch||[];
  renderStats();
  renderList();
}

function renderStats(){
  const total=senRecords.length;
  const ehcp=senRecords.filter(r=>r.sen_type==='ehcp').length;
  const support=senRecords.filter(r=>r.sen_type==='send_support').length;
  const monitored=senRecords.filter(r=>r.sen_type==='monitored').length;
  const reviewSoon=senRecords.filter(r=>r.review_due_soon).length;
  document.getElementById('stats-row').innerHTML=[
    {label:'Total',value:total,color:'#8b5cf6'},
    {label:'EHCP',value:ehcp,color:'#8b5cf6'},
    {label:'SEN Support',value:support,color:'#4a9abf'},
    {label:'Monitored',value:monitored,color:'#f59e0b'},
    {label:'Review Due',value:reviewSoon,color:'#ef4444'}
  ].map(s=>`<div class="stat-card"><div class="stat-value" style="color:${s.color}">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList(){
  let records=senRecords;
  if(currentTab==='active')records=records.filter(r=>r.is_active!==false);
  else if(currentTab==='reviews')records=records.filter(r=>r.review_due_soon);

  const area=document.getElementById('sen-list');
  if(!records.length){area.innerHTML='<div class="empty-state">No SEN records found.</div>';return;}
  area.innerHTML=records.map(r=>`
    <div class="sen-card${r.review_due_soon?' review-due':''}" onclick="viewRecord(${r.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700;font-size:15px;color:#f1f5f9">${r.child_name||'Unknown'}</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:2px">${r.room_name||''}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span class="sen-type-badge sn-${r.sen_type}">${TYPE_LABELS[r.sen_type]||r.sen_type}</span>
          ${r.review_due_soon?'<span class="review-alert">Review Due</span>':''}
        </div>
      </div>
      ${r.primary_need?`<div style="font-size:12px;color:#94a3b8;margin-top:6px">${NEED_LABELS[r.primary_need]||r.primary_need}</div>`:''}
      ${r.review_date?`<div style="font-size:12px;color:#94a3b8;margin-top:4px">Next review: ${new Date(r.review_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>`:''}
    </div>`).join('');
}

function viewRecord(id){
  const r=senRecords.find(x=>x.id===id);
  if(!r)return;
  const profs=Array.isArray(r.external_professionals)?r.external_professionals:(typeof r.external_professionals==='string'?JSON.parse(r.external_professionals||'[]'):[]);
  document.getElementById('view-name').textContent=r.child_name;
  document.getElementById('view-body').innerHTML=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <span class="sen-type-badge sn-${r.sen_type}">${TYPE_LABELS[r.sen_type]||r.sen_type}</span>
      ${r.primary_need?`<span style="font-size:12px;color:#94a3b8">${NEED_LABELS[r.primary_need]||r.primary_need}</span>`:''}
    </div>
    ${r.provision_map?`<div style="background:#0f172a;border-radius:8px;padding:10px;margin-bottom:12px">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">PROVISION MAP</div>
      <div style="font-size:13px;color:#f1f5f9;white-space:pre-wrap">${r.provision_map}</div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
      ${r.review_date?`<div><div style="font-size:11px;color:#94a3b8">Review Date</div><div style="font-size:13px;color:#f1f5f9">${new Date(r.review_date).toLocaleDateString('en-GB')}</div></div>`:''}
      ${r.annual_review_date?`<div><div style="font-size:11px;color:#94a3b8">Annual Review</div><div style="font-size:13px;color:#f1f5f9">${new Date(r.annual_review_date).toLocaleDateString('en-GB')}</div></div>`:''}
      ${r.ehcp_date?`<div><div style="font-size:11px;color:#94a3b8">EHCP Issued</div><div style="font-size:13px;color:#f1f5f9">${new Date(r.ehcp_date).toLocaleDateString('en-GB')}</div></div>`:''}
    </div>
    ${profs.length?`<div style="margin-bottom:12px">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:6px">EXTERNAL PROFESSIONALS</div>
      <div>${profs.map(p=>`<span class="prof-chip">${p.role}: ${p.name}${p.agency?' ('+p.agency+')':''}</span>`).join('')}</div>
    </div>`:''}
    ${r.created_by_name?`<div style="font-size:12px;color:#475569;margin-bottom:12px">Added by ${r.created_by_name}</div>`:''}
    ${isManager()?`<div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-secondary" onclick="editRecord(${id})">Edit</button>
      <button class="btn btn-ghost" style="color:#ef4444;margin-left:auto" onclick="removeRecord(${id})">Remove from Register</button>
    </div>`:''}`;
  document.getElementById('sen-view-modal').style.display='flex';
}

function editRecord(id){
  const r=senRecords.find(x=>x.id===id);
  if(!r)return;
  professionals=Array.isArray(r.external_professionals)?[...r.external_professionals]:(typeof r.external_professionals==='string'?JSON.parse(r.external_professionals||'[]'):[]);
  document.getElementById('sen-record-id').value=r.id;
  document.getElementById('sen-child-id').value=r.child_id;
  document.getElementById('sen-modal-title').textContent='Edit SEN Record';
  document.getElementById('sen-child-name').textContent=r.child_name;
  document.getElementById('sen-child-name').style.display='';
  document.getElementById('sen-child-select-row').style.display='none';
  document.getElementById('sen-type').value=r.sen_type||'monitored';
  document.getElementById('sen-primary').value=r.primary_need||'';
  document.getElementById('sen-review').value=r.review_date?r.review_date.split('T')[0]:'';
  document.getElementById('sen-annual').value=r.annual_review_date?r.annual_review_date.split('T')[0]:'';
  document.getElementById('sen-ehcp').value=r.ehcp_date?r.ehcp_date.split('T')[0]:'';
  document.getElementById('sen-provision').value=r.provision_map||'';
  renderProfessionals();
  document.getElementById('sen-view-modal').style.display='none';
  document.getElementById('sen-modal').style.display='flex';
}

function openAddModal(){
  professionals=[];
  document.getElementById('sen-record-id').value='';
  document.getElementById('sen-child-id').value='';
  document.getElementById('sen-modal-title').textContent='Add to SEN Register';
  document.getElementById('sen-child-name').style.display='none';
  // Populate child select (exclude those already on register)
  const existingIds=new Set(senRecords.map(r=>r.child_id));
  const available=allChildren.filter(c=>!existingIds.has(c.id));
  const sel=document.getElementById('sen-child-select');
  sel.innerHTML='<option value="">Select child...</option>'+available.map(c=>`<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('');
  document.getElementById('sen-child-select-row').style.display='';
  document.getElementById('sen-type').value='monitored';
  document.getElementById('sen-primary').value='';
  document.getElementById('sen-review').value='';
  document.getElementById('sen-annual').value='';
  document.getElementById('sen-ehcp').value='';
  document.getElementById('sen-provision').value='';
  renderProfessionals();
  document.getElementById('sen-modal').style.display='flex';
}

function addProfessional(){
  professionals.push({name:'',role:'',agency:''});
  renderProfessionals();
}

function renderProfessionals(){
  document.getElementById('professionals-list').innerHTML=professionals.map((p,i)=>`
    <div class="prof-row">
      <input class="form-control" value="${p.role||''}" oninput="professionals[${i}].role=this.value" placeholder="Role (e.g. SALT, EP)" style="flex:1">
      <input class="form-control" value="${p.name||''}" oninput="professionals[${i}].name=this.value" placeholder="Name" style="flex:1">
      <input class="form-control" value="${p.agency||''}" oninput="professionals[${i}].agency=this.value" placeholder="Agency" style="flex:1">
      <button class="btn btn-ghost" style="padding:4px 8px;font-size:14px" onclick="professionals.splice(${i},1);renderProfessionals()">×</button>
    </div>`).join('');
}

async function saveSen(){
  const recordId=document.getElementById('sen-record-id').value;
  const childId=recordId
    ? document.getElementById('sen-child-id').value
    : document.getElementById('sen-child-select').value;
  if(!childId)return Wren.toast('Please select a child','error');
  const data={
    child_id:parseInt(childId),
    sen_type:document.getElementById('sen-type').value,
    primary_need:document.getElementById('sen-primary').value||null,
    review_date:document.getElementById('sen-review').value||null,
    annual_review_date:document.getElementById('sen-annual').value||null,
    ehcp_date:document.getElementById('sen-ehcp').value||null,
    provision_map:document.getElementById('sen-provision').value||null,
    external_professionals:professionals.filter(p=>p.name||p.role)
  };
  try{
    if(recordId){
      await Wren.api('/api/sen/'+recordId,{method:'PUT',body:JSON.stringify(data)});
    } else {
      await Wren.api('/api/sen',{method:'POST',body:JSON.stringify(data)});
    }
    Wren.toast('SEN record saved');
    document.getElementById('sen-modal').style.display='none';
    const sr=await Wren.api('/api/sen').catch(()=>[]);
    senRecords=sr||[];
    renderStats();renderList();
  }catch(e){Wren.toast('Error: '+e.message,'error');}
}

async function removeRecord(id){
  if(!confirm('Remove this child from the SEN register?'))return;
  try{
    await Wren.api('/api/sen/'+id,{method:'PUT',body:JSON.stringify({is_active:false})});
    Wren.toast('Removed from register');
    document.getElementById('sen-view-modal').style.display='none';
    const sr=await Wren.api('/api/sen').catch(()=>[]);
    senRecords=sr||[];
    renderStats();renderList();
  }catch(e){Wren.toast('Error: '+e.message,'error');}
}

document.addEventListener('wren:ready',init);
</script>
<script src="/js/wren-chat.js"></script>
</body>
</html>
