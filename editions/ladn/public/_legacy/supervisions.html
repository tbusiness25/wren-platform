<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="wren-edition" content="ladn">
  <title>Supervisions — Wren HR</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; }
    #sv-page { max-width: 960px; margin: 0 auto; padding: 16px; }

    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { margin: 0; font-size: 1.2rem; }
    .page-header .sub { color: #64748b; font-size: 0.82rem; margin-top: 3px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-voice {
      display: inline-flex; align-items: center; gap: 6px;
      background: #4a9abf; border: none; color: #fff;
      border-radius: 8px; padding: 9px 16px; font-weight: 700; font-size: 0.88rem;
      cursor: pointer; text-decoration: none;
    }
    .btn-voice:hover { background: #3a8aaf; }
    .btn-form {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid #334155; color: #94a3b8;
      border-radius: 8px; padding: 9px 16px; font-size: 0.88rem;
      cursor: pointer; text-decoration: none;
    }
    .btn-form:hover { border-color: #94a3b8; color: #f1f5f9; }
    .btn-schedule {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid #334155; color: #94a3b8;
      border-radius: 8px; padding: 9px 16px; font-size: 0.88rem;
      cursor: pointer;
    }
    .btn-schedule:hover { border-color: #94a3b8; color: #f1f5f9; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-card .val { font-size: 1.6rem; font-weight: 800; }
    .stat-card .lbl { font-size: 0.75rem; color: #64748b; margin-top: 3px; }
    .stat-card.warn .val { color: #f59e0b; }
    .stat-card.ok .val { color: #22c55e; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-row select, .filter-row input {
      background: #1e293b; border: 1px solid #334155; color: #f1f5f9;
      border-radius: 8px; padding: 7px 12px; font-size: 0.85rem;
    }

    #sv-list .sv-row {
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
      cursor: pointer; transition: border-color 0.15s;
    }
    #sv-list .sv-row:hover { border-color: #4a9abf; }
    .sv-name { font-weight: 600; font-size: 0.9rem; }
    .sv-meta { color: #64748b; font-size: 0.78rem; margin-top: 2px; }
    .sv-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .sv-badge { font-size: 0.72rem; padding: 3px 8px; border-radius: 999px; font-weight: 700; }
    .sv-badge.voice { background: rgba(74,154,191,0.15); border: 1px solid rgba(74,154,191,0.4); color: #7dd3fc; }
    .sv-badge.form  { background: rgba(100,116,139,0.15); border: 1px solid #334155; color: #94a3b8; }
    .sv-badge.finalized { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .sv-badge.confirmed { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.5); color: #4ade80; }
    .sv-badge.draft { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
    .sv-badge.scheduled { background: rgba(100,116,139,0.1); border: 1px solid #334155; color: #94a3b8; }
    .open-btn {
      background: transparent; border: 1px solid #334155; color: #94a3b8;
      border-radius: 6px; padding: 5px 10px; font-size: 0.78rem; cursor: pointer;
    }
    .open-btn:hover { border-color: #4a9abf; color: #7dd3fc; }

    #sv-empty { text-align: center; color: #64748b; padding: 40px 0; font-size: 0.9rem; }

    /* Schedule modal */
    #schedule-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; align-items: center; justify-content: center;
    }
    #schedule-modal.open { display: flex; }
    .modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 24px; width: 400px; max-width: 95vw; }
    .modal-box h3 { margin: 0 0 16px; }
    .modal-box label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 4px; }
    .modal-box select, .modal-box input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 8px; padding: 8px 10px; font-size: 0.85rem; margin-bottom: 12px; box-sizing: border-box; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.88rem; cursor: pointer; }
    .modal-submit { background: #4a9abf; border: none; color: #fff; }
    .modal-cancel { background: transparent; border: 1px solid #334155; color: #94a3b8; }
  </style>
</head>
<body>
<div id="sv-page">
  <div class="page-header">
    <div>
      <h2>Staff Supervisions</h2>
      <div class="sub" id="page-sub">Loading…</div>
    </div>
    <div class="header-actions" id="manager-actions" style="display:none">
      <a href="/supervision-record.html" class="btn-voice">🎙 Start Voice Supervision</a>
      <a href="/supervision-form.html" class="btn-form">📝 Use Form Instead</a>
      <button class="btn-schedule" onclick="openScheduleModal()">📅 Schedule</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row" style="display:none"></div>

  <div class="filter-row">
    <select id="filter-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="draft">Draft</option>
      <option value="scheduled">Scheduled</option>
      <option value="finalized">Finalised</option>
      <option value="confirmed">Confirmed</option>
    </select>
    <select id="filter-mode" onchange="applyFilters()">
      <option value="">All types</option>
      <option value="voice">Voice</option>
      <option value="form">Form</option>
    </select>
    <input type="text" id="filter-search" placeholder="Search staff name…" oninput="applyFilters()" style="flex:1;min-width:120px">
  </div>

  <div id="sv-list"></div>
  <div id="sv-empty" style="display:none">No supervisions found.</div>
</div>

<div id="schedule-modal">
  <div class="modal-box">
    <h3>Schedule Supervision</h3>
    <label>Staff member</label>
    <select id="modal-staff"></select>
    <label>Date</label>
    <input type="date" id="modal-date">
    <label>Type</label>
    <select id="modal-type">
      <option value="monthly_1to1">Monthly 1:1</option>
      <option value="probation">Probation review</option>
      <option value="annual">Annual review</option>
      <option value="informal">Informal check-in</option>
    </select>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeScheduleModal()">Cancel</button>
      <button class="modal-submit" onclick="submitSchedule()">Schedule</button>
    </div>
  </div>
</div>

<script>
let allSupervisions = [];

function getToken() { return sessionStorage.getItem('wrenToken'); }
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { Authorization: `Bearer ${getToken()}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.statusText);
  return r.json();
}

document.addEventListener('wren:ready', async () => {
  const user = Wren?.user;
  const isManager = user && ['manager','deputy_manager'].includes(user.role);
  if (isManager) {
    document.getElementById('manager-actions').style.display = '';
    await loadStaffForModal();
    await loadManagerView();
  } else {
    await loadStaffView();
  }
});

async function loadManagerView() {
  try {
    const data = await api('/api/supervisions');
    allSupervisions = Array.isArray(data) ? data : [];
    renderStats();
    renderList(allSupervisions);
    document.getElementById('page-sub').textContent = `${allSupervisions.length} supervisions total`;
  } catch(e) {
    document.getElementById('page-sub').textContent = `Error: ${e.message}`;
  }
}

async function loadStaffView() {
  try {
    const data = await api('/api/supervisions');
    allSupervisions = Array.isArray(data) ? data : [];
    document.getElementById('page-sub').textContent = 'Your supervision history';
    renderList(allSupervisions);
  } catch(e) {
    document.getElementById('page-sub').textContent = `Error loading supervisions.`;
  }
}

function renderStats() {
  const row = document.getElementById('stats-row');
  const total = allSupervisions.length;
  const voice = allSupervisions.filter(s => s.mode === 'voice').length;
  const confirmed = allSupervisions.filter(s => s.status === 'confirmed').length;
  const pending = allSupervisions.filter(s => ['draft','finalized'].includes(s.status)).length;
  row.innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total</div></div>
    <div class="stat-card ok"><div class="val">${confirmed}</div><div class="lbl">Confirmed</div></div>
    <div class="stat-card warn"><div class="val">${pending}</div><div class="lbl">Pending review</div></div>
    <div class="stat-card"><div class="val">${voice}</div><div class="lbl">Voice recordings</div></div>
  `;
  row.style.display = '';
}

function applyFilters() {
  const status = document.getElementById('filter-status').value;
  const mode = document.getElementById('filter-mode').value;
  const search = document.getElementById('filter-search').value.toLowerCase();
  renderList(allSupervisions.filter(s => {
    if (status && s.status !== status) return false;
    if (mode && (s.mode||'form') !== mode) return false;
    if (search && !(s.staff_name||'').toLowerCase().includes(search)) return false;
    return true;
  }));
}

function renderList(list) {
  const container = document.getElementById('sv-list');
  const empty = document.getElementById('sv-empty');
  if (!list.length) { container.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = list.map(s => {
    const date = (s.conducted_date || s.scheduled_date)
      ? new Date(s.conducted_date || s.scheduled_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
      : '—';
    const mode = s.mode || 'form';
    const status = s.status || 'draft';
    return `
      <div class="sv-row" onclick="openSv(${s.id},'${mode}','${status}')">
        <div>
          <div class="sv-name">${escHtml(s.staff_name||'—')}</div>
          <div class="sv-meta">${date} · ${s.type||'supervision'} · ${escHtml(s.supervisor_name||'—')}</div>
        </div>
        <div class="sv-actions">
          <span class="sv-badge ${mode}">${mode === 'voice' ? '🎙 Voice' : '📝 Form'}</span>
          <span class="sv-badge ${status}">${status}</span>
          <button class="open-btn" onclick="event.stopPropagation();openSv(${s.id},'${mode}','${status}')">
            ${mode === 'voice' && ['finalized','confirmed'].includes(status) ? 'Review →' : 'Open →'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function openSv(id, mode, status) {
  if (mode === 'voice' && ['finalized','confirmed'].includes(status)) {
    window.location.href = `/supervision-review.html?id=${id}`;
  }
}

async function loadStaffForModal() {
  try {
    const data = await api('/api/staff?active=true');
    const staff = Array.isArray(data) ? data : (data.staff || []);
    const sel = document.getElementById('modal-staff');
    staff.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = `${s.first_name} ${s.last_name}`;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

function openScheduleModal() {
  document.getElementById('schedule-modal').classList.add('open');
  const d = new Date(); d.setDate(d.getDate()+1);
  document.getElementById('modal-date').value = d.toISOString().split('T')[0];
}
function closeScheduleModal() {
  document.getElementById('schedule-modal').classList.remove('open');
}

async function submitSchedule() {
  const staff_id = document.getElementById('modal-staff').value;
  const scheduled_date = document.getElementById('modal-date').value;
  const type = document.getElementById('modal-type').value;
  if (!staff_id || !scheduled_date) return;
  try {
    await api('/api/supervisions', { method: 'POST', body: JSON.stringify({ staff_id, scheduled_date, type }) });
    closeScheduleModal();
    await loadManagerView();
    Wren?.toast?.('Supervision scheduled.', 'success');
  } catch(e) { alert(`Error: ${e.message}`); }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
