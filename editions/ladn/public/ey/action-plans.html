<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>My Action Plans — Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .ap-card { border-left: 4px solid #4a9abf; }
    .ap-card.priority-high   { border-color: #ef4444; }
    .ap-card.priority-medium { border-color: #f59e0b; }
    .ap-card.priority-low    { border-color: #22c55e; }
    .ap-meta { font-size:12px; color:var(--c-muted); margin-top:4px; }
    .ap-progress { margin-top:12px; }
    .progress-bar-wrap { background:var(--c-border); border-radius:6px; height:6px; margin-top:4px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:6px; background:#4a9abf; transition:width .3s ease; }
    .action-item { display:flex; gap:8px; align-items:flex-start; padding:6px 0; border-top:1px solid var(--c-border); font-size:13px; color:var(--c-muted); }
    .action-item.done { text-decoration:line-through; opacity:.6; }
    .action-item .a-check { color:#22c55e; flex-shrink:0; font-size:14px; }
    .action-item .a-open  { color:var(--c-muted); flex-shrink:0; font-size:14px; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">🎯 My Action Plans</div>
      <div class="page-subtitle">Development goals and actions assigned to you</div>
    </div>
  </div>

  <div id="ap-list"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<script>
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function priorityClass(p) {
  if (p === 'high') return 'priority-high';
  if (p === 'medium') return 'priority-medium';
  if (p === 'low') return 'priority-low';
  return '';
}

function statusBadge(status) {
  const map = {
    open: 'badge-blue', in_progress: 'badge-orange', completed: 'badge-green', on_hold: 'badge-grey', overdue: 'badge-red'
  };
  return map[status] || 'badge-grey';
}

async function loadActionPlans() {
  const el = document.getElementById('ap-list');
  try {
    const data = await Wren.api('/api/action-plans?limit=50');

    if (!data || !data.length) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">No action plans yet</div>
        <div class="empty-body">Action plans set by your manager will appear here.</div>
      </div>`;
      return;
    }

    // Load action items for each plan in parallel
    const plans = await Promise.all(data.map(async plan => {
      try {
        const items = await Wren.api(`/api/action-plan-items?plan_id=${plan.id}`);
        return { ...plan, items: items || [] };
      } catch(_) {
        return { ...plan, items: [] };
      }
    }));

    el.innerHTML = plans.map(p => {
      const pc = priorityClass(p.priority);
      const bc = statusBadge(p.status);
      const due = p.due_date ? new Date(p.due_date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : null;
      const now = Date.now();
      const isOverdue = p.due_date && new Date(p.due_date) < now && p.status !== 'completed';

      const total = p.items.length;
      const done  = p.items.filter(i => i.status === 'completed' || i.completed).length;
      const pct   = total ? Math.round((done / total) * 100) : 0;

      const progressHtml = total ? `
        <div class="ap-progress">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--c-muted)">
            <span>Progress</span><span>${done}/${total} actions</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div style="margin-top:10px">
          ${p.items.slice(0,4).map(i => {
            const isDone = i.status === 'completed' || i.completed;
            return `<div class="action-item ${isDone ? 'done' : ''}">
              <span class="${isDone ? 'a-check' : 'a-open'}">${isDone ? '✓' : '○'}</span>
              <span>${escHtml(i.title || i.text || '')}</span>
            </div>`;
          }).join('')}
          ${p.items.length > 4 ? `<div style="font-size:12px;color:var(--c-muted);padding-top:6px">+${p.items.length - 4} more actions</div>` : ''}
        </div>` : '';

      return `<div class="card ap-card ${pc}" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:1rem">${escHtml(p.title)}</div>
            <div class="ap-meta">
              ${p.category ? `${escHtml(p.category)} · ` : ''}
              ${due ? `<span style="color:${isOverdue ? '#ef4444' : 'inherit'}">${isOverdue ? '⚠ Overdue · ' : ''}Due ${due}</span>` : ''}
            </div>
          </div>
          <span class="badge ${bc}">${escHtml((p.status||'').replace(/_/g,' '))}</span>
        </div>
        ${p.description ? `<div style="font-size:13px;color:var(--c-muted);margin-top:8px">${escHtml(p.description)}</div>` : ''}
        ${progressHtml}
      </div>`;
    }).join('');

  } catch(e) {
    el.innerHTML = `<div class="alert alert-danger">Could not load action plans: ${escHtml(e.message||'Unknown error')}</div>`;
  }
}

document.addEventListener('wren:ready', loadActionPlans);
</script>
</body>
</html>
