<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"  content="ladn">
  <meta name="wren-app-page" content="child">
  <meta name="wren-app-title" content="Child Profile">
  <meta name="wren-app-chat" content="on">
  <title>Child Profile · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    /* ── Child profile page ───────────────────────────────────────────────────── */
    #cp-page {
      padding: 0;
      padding-bottom: calc(var(--bottom-nav-h, 64px) + 8px);
    }

    /* Header card */
    #cp-header-card {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 16px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
    }
    #cp-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    #cp-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    #cp-header-info { flex: 1; min-width: 0; }
    #cp-full-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 3px;
    }
    #cp-room-age {
      font-size: .82rem;
      color: var(--c-blue);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .cp-meta-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      font-size: .8rem;
      color: var(--c-muted);
      margin-bottom: 2px;
      line-height: 1.35;
    }
    .cp-meta-label {
      font-weight: 600;
      color: var(--c-text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cp-meta-value { color: var(--c-muted); }
    .cp-tag {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 10px;
      font-size: .72rem;
      font-weight: 700;
      margin-right: 4px;
      margin-bottom: 2px;
    }
    .cp-tag-allergy  { background: rgba(248,113,113,0.18); color: #f87171; }
    .cp-tag-dietary  { background: rgba(251,191,36,0.18);  color: var(--c-amber); }
    .cp-tag-send     { background: rgba(167,139,250,0.18); color: var(--c-purple); }

    /* ── Main tab bar ─────────────────────────────────────────────────────────── */
    #cp-main-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      -webkit-overflow-scrolling: touch;
      position: sticky;
      top: var(--topbar-h, 56px);
      z-index: 50;
    }
    #cp-main-tabs::-webkit-scrollbar { display: none; }
    .cp-main-tab {
      flex-shrink: 0;
      height: 44px;
      padding: 0 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--c-muted);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .cp-main-tab.active {
      color: var(--c-blue);
      border-bottom-color: var(--c-blue);
    }
    .cp-main-tab:hover:not(.active) { color: var(--c-text); }

    /* ── Tab panels ───────────────────────────────────────────────────────────── */
    .cp-panel { display: none; padding: 0; }
    .cp-panel.active { display: block; }

    /* ── Inner sub-tabs (Diary panel) ─────────────────────────────────────────── */
    #cp-diary-sub-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 6px;
      padding: 10px 12px;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
      -webkit-overflow-scrolling: touch;
    }
    #cp-diary-sub-tabs::-webkit-scrollbar { display: none; }
    .cp-sub-tab {
      flex-shrink: 0;
      height: 32px;
      padding: 0 14px;
      border-radius: 16px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-muted);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }
    .cp-sub-tab.active {
      background: var(--c-blue);
      border-color: var(--c-blue);
      color: #fff;
    }
    .cp-sub-tab:not(.active):hover {
      background: rgba(91,143,255,0.12);
      border-color: var(--c-blue);
      color: var(--c-text);
    }

    /* ── Diary content ────────────────────────────────────────────────────────── */
    #cp-diary-content { padding: 0; }
    #cp-diary-date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--c-border);
    }
    #cp-diary-date-label {
      font-size: .85rem;
      font-weight: 700;
      color: var(--c-text);
    }
    /* Date stepper (tap-first: ‹ › buttons flanking hidden native picker) */
    .cp-date-stepper {
      display: flex; align-items: center; gap: 0;
      background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 10px;
    }
    .cp-date-stepper button {
      min-width: 44px; min-height: 44px; background: none; border: none;
      color: var(--c-text); cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0 8px;
      border-radius: 10px; transition: background .15s;
    }
    .cp-date-stepper button:hover { background: rgba(255,255,255,0.06); }
    .cp-date-stepper button:disabled { opacity: .3; cursor: default; }
    #cp-diary-date-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; border: 0; padding: 0; }

    #cp-diary-add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      padding: 0 16px;
      margin: 10px 14px;
      border-radius: 10px;
      background: var(--c-blue);
      border: none;
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    #cp-diary-add-btn:hover { opacity: .88; }

    #cp-diary-entries-list { padding: 0 0 8px; }
    .cp-diary-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--c-border);
    }
    .cp-diary-entry:last-child { border-bottom: none; }
    .cp-entry-time {
      font-size: .78rem;
      font-weight: 700;
      color: var(--c-blue);
      white-space: nowrap;
      min-width: 38px;
      padding-top: 2px;
    }
    .cp-entry-body { flex: 1; }
    .cp-entry-label {
      font-size: .88rem;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 1px;
    }
    .cp-entry-detail {
      font-size: .78rem;
      color: var(--c-muted);
      line-height: 1.4;
    }
    .cp-entry-actions {
      display: flex;
      gap: 4px;
      padding-top: 2px;
    }
    .cp-entry-action-btn {
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      color: var(--c-muted);
      font-size: .85rem;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, color .1s;
    }
    .cp-entry-action-btn:hover { background: rgba(255,255,255,0.06); color: var(--c-text); }
    .cp-entry-action-btn.del:hover { color: var(--c-red); }

    .cp-diary-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--c-muted);
      font-size: .88rem;
    }

    /* ── Observations panel ───────────────────────────────────────────────────── */
    #cp-obs-list { padding: 8px 0; }
    .cp-obs-card {
      margin: 0 12px 10px;
      padding: 12px 14px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
    }
    .cp-obs-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cp-obs-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--c-border);
    }
    .cp-obs-thumb-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: rgba(91,143,255,0.12);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }
    .cp-obs-meta { flex: 1; }
    .cp-obs-date {
      font-size: .78rem;
      color: var(--c-muted);
      margin-bottom: 2px;
    }
    .cp-obs-type {
      font-size: .8rem;
      font-weight: 600;
      color: var(--c-blue);
    }
    .cp-obs-text {
      font-size: .85rem;
      color: var(--c-text);
      line-height: 1.45;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .cp-obs-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .cp-obs-tag {
      height: 20px;
      padding: 0 8px;
      border-radius: 10px;
      font-size: .72rem;
      font-weight: 600;
      background: rgba(91,143,255,0.14);
      color: var(--c-blue);
    }

    /* ── Learning Journey panel ───────────────────────────────────────────────── */
    #cp-journey-list { padding: 8px 12px; }
    .cp-journey-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--c-border);
    }
    .cp-journey-item:last-child { border-bottom: none; }
    .cp-journey-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--c-blue);
      flex-shrink: 0;
      margin-top: 5px;
    }
    .cp-journey-body { flex: 1; }
    .cp-journey-date { font-size: .75rem; color: var(--c-muted); margin-bottom: 3px; }
    .cp-journey-text { font-size: .85rem; color: var(--c-text); line-height: 1.4; }
    .cp-journey-areas {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }
    .cp-journey-area {
      height: 18px;
      padding: 0 7px;
      border-radius: 9px;
      font-size: .7rem;
      font-weight: 600;
      background: rgba(52,211,153,0.14);
      color: var(--c-green);
    }

    /* ── Care panel ───────────────────────────────────────────────────────────── */
    #cp-care-content { padding: 10px 12px; }
    .cp-care-section {
      margin-bottom: 16px;
    }
    .cp-care-section-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--c-muted);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--c-border);
    }
    .cp-care-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: .85rem;
    }
    .cp-care-icon { font-size: 1.1rem; flex-shrink: 0; padding-top: 1px; }
    .cp-care-info { flex: 1; }
    .cp-care-info strong { color: var(--c-text); display: block; margin-bottom: 1px; }
    .cp-care-info span { color: var(--c-muted); font-size: .8rem; }
    .cp-incident-card {
      padding: 10px 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .cp-incident-title {
      font-size: .87rem;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 3px;
    }
    .cp-incident-meta {
      font-size: .78rem;
      color: var(--c-muted);
    }
    .cp-medicine-card {
      padding: 10px 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .cp-medicine-name {
      font-size: .88rem;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 2px;
    }
    .cp-medicine-meta { font-size: .78rem; color: var(--c-muted); }
    .cp-medicine-signed {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .72rem;
      font-weight: 600;
      margin-top: 4px;
      color: var(--c-green);
    }

    /* ── Documents panel ──────────────────────────────────────────────────────── */
    #cp-docs-content { padding: 16px 12px; }
    .cp-docs-placeholder {
      text-align: center;
      padding: 32px 16px;
      color: var(--c-muted);
    }
    .cp-docs-placeholder-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .cp-docs-placeholder-title { font-size: .95rem; font-weight: 600; color: var(--c-text); margin-bottom: 4px; }
    .cp-docs-placeholder-msg { font-size: .82rem; }

    /* ── Loading state ────────────────────────────────────────────────────────── */
    #cp-header-card.loading .cp-meta-row,
    #cp-header-card.loading #cp-full-name,
    #cp-header-card.loading #cp-room-age { visibility: hidden; }

    /* ── Quick-action hub (EyLog order) ──────────────────────────────────────── */
    #cp-action-hub {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 0;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
      -webkit-overflow-scrolling: touch;
    }
    #cp-action-hub::-webkit-scrollbar { display: none; }
    .cp-hub-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      width: 76px;
      min-height: 64px;
      padding: 8px 4px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--c-border);
      color: var(--c-muted);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .cp-hub-btn:last-child { border-right: none; }
    .cp-hub-btn:hover, .cp-hub-btn:active {
      background: rgba(74,154,191,0.10);
      color: var(--c-text);
    }
    .cp-hub-icon { font-size: 1.35rem; line-height: 1; }

    /* ── Back button in topbar ────────────────────────────────────────────────── */
    #wren-app-back-btn {
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      color: var(--c-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #wren-app-back-btn:hover { background: rgba(255,255,255,0.06); }
  </style>
</head>
<body data-portal="ey">

<div id="cp-page">

  <!-- Child header card -->
  <div id="cp-header-card" class="loading">
    <div id="cp-avatar" aria-hidden="true">?</div>
    <div id="cp-header-info">
      <div id="cp-full-name">Loading…</div>
      <div id="cp-room-age"></div>
      <div class="cp-meta-row"><span class="cp-meta-label">Allergies:</span><span id="cp-allergies" class="cp-meta-value">—</span></div>
      <div class="cp-meta-row"><span class="cp-meta-label">Dietary:</span><span id="cp-dietary" class="cp-meta-value">—</span></div>
      <div class="cp-meta-row"><span class="cp-meta-label">Pickup:</span><span id="cp-contact" class="cp-meta-value">—</span></div>
    </div>
  </div>

  <!-- Quick-action hub: EyLog order — Diary · Observation · Accident · Medicine · Learning · Register · Planning -->
  <div id="cp-action-hub" role="group" aria-label="Quick actions">
    <button class="cp-hub-btn" id="cp-hub-diary"    aria-label="Add diary entry">
      <span class="cp-hub-icon" aria-hidden="true">📖</span>Diary
    </button>
    <button class="cp-hub-btn" id="cp-hub-obs"      aria-label="New observation">
      <span class="cp-hub-icon" aria-hidden="true">📝</span>Observation
    </button>
    <button class="cp-hub-btn" id="cp-hub-accident" aria-label="Record accident">
      <span class="cp-hub-icon" aria-hidden="true">🤕</span>Accident
    </button>
    <button class="cp-hub-btn" id="cp-hub-medicine" aria-label="View medicine records">
      <span class="cp-hub-icon" aria-hidden="true">💊</span>Medicine
    </button>
    <button class="cp-hub-btn" id="cp-hub-journey"  aria-label="Learning journey">
      <span class="cp-hub-icon" aria-hidden="true">📚</span>Learning
    </button>
    <button class="cp-hub-btn" id="cp-hub-register" aria-label="Sign in or out">
      <span class="cp-hub-icon" aria-hidden="true">📋</span>Register
    </button>
    <button class="cp-hub-btn" id="cp-hub-planning" aria-label="Planning and activities">
      <span class="cp-hub-icon" aria-hidden="true">🗓️</span>Planning
    </button>
    <button class="cp-hub-btn" id="cp-hub-2year" aria-label="2-year progress check">
      <span class="cp-hub-icon" aria-hidden="true">📈</span>2-Year Check
    </button>
  </div>

  <!-- Main tab bar -->
  <div id="cp-main-tabs" role="tablist" aria-label="Child profile sections">
    <button class="cp-main-tab active" data-tab="diary"   role="tab" aria-selected="true"  aria-controls="cp-panel-diary">Diary</button>
    <button class="cp-main-tab"        data-tab="obs"     role="tab" aria-selected="false" aria-controls="cp-panel-obs">Observations</button>
    <button class="cp-main-tab"        data-tab="journey" role="tab" aria-selected="false" aria-controls="cp-panel-journey">Learning</button>
    <button class="cp-main-tab"        data-tab="care"    role="tab" aria-selected="false" aria-controls="cp-panel-care">Care</button>
    <button class="cp-main-tab"        data-tab="docs"    role="tab" aria-selected="false" aria-controls="cp-panel-docs">Docs</button>
    <!-- Safeguarding tab — injected by JS only for manager/room_leader -->
    <button class="cp-main-tab" id="cp-tab-sg" data-tab="sg" role="tab" aria-selected="false" aria-controls="cp-panel-sg" style="display:none">Safeguarding</button>
  </div>

  <!-- ═══ DIARY PANEL ═══════════════════════════════════════════════════════════ -->
  <div id="cp-panel-diary" class="cp-panel active" role="tabpanel" aria-labelledby="cp-tab-diary">

    <!-- Diary sub-tabs -->
    <div id="cp-diary-sub-tabs" role="tablist" aria-label="Diary categories">
      <button class="cp-sub-tab active" data-type="sleep"  role="tab" aria-selected="true">😴 Sleep</button>
      <button class="cp-sub-tab"        data-type="nappy"  role="tab" aria-selected="false">👶 Nappies</button>
      <button class="cp-sub-tab"        data-type="food"   role="tab" aria-selected="false">🍽️ Food</button>
      <button class="cp-sub-tab"        data-type="toilet" role="tab" aria-selected="false">🚽 Toilet</button>
      <button class="cp-sub-tab"        data-type="bottle" role="tab" aria-selected="false">🍼 Bottles</button>
      <button class="cp-sub-tab"        data-type="notes"  role="tab" aria-selected="false">📝 Notes</button>
    </div>

    <div id="cp-diary-content">
      <!-- Date row -->
      <div id="cp-diary-date-row">
        <span id="cp-diary-date-label">Today's entries</span>
        <div class="cp-date-stepper" role="group" aria-label="Select date">
          <button id="cp-date-prev" type="button" aria-label="Previous day">‹</button>
          <input type="date" id="cp-diary-date-input" aria-hidden="true" tabindex="-1">
          <button id="cp-date-next" type="button" aria-label="Next day">›</button>
        </div>
      </div>

      <!-- Add button -->
      <button id="cp-diary-add-btn" aria-label="Add new diary entry">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New entry
      </button>

      <!-- Entries list -->
      <div id="cp-diary-entries-list" role="list"></div>
    </div>
  </div>

  <!-- ═══ OBSERVATIONS PANEL ════════════════════════════════════════════════════ -->
  <div id="cp-panel-obs" class="cp-panel" role="tabpanel" aria-labelledby="cp-tab-obs">
    <div id="cp-obs-list" role="list"></div>
  </div>

  <!-- ═══ LEARNING JOURNEY PANEL ═══════════════════════════════════════════════ -->
  <div id="cp-panel-journey" class="cp-panel" role="tabpanel" aria-labelledby="cp-tab-journey">
    <div id="cp-journey-list" role="list"></div>
  </div>

  <!-- ═══ CARE PANEL ════════════════════════════════════════════════════════════ -->
  <div id="cp-panel-care" class="cp-panel" role="tabpanel" aria-labelledby="cp-tab-care">
    <div id="cp-care-content"></div>
  </div>

  <!-- ═══ DOCUMENTS PANEL ══════════════════════════════════════════════════════ -->
  <div id="cp-panel-docs" class="cp-panel" role="tabpanel" aria-labelledby="cp-tab-docs">
    <div id="cp-docs-content">
      <div class="cp-docs-placeholder">
        <div class="cp-docs-placeholder-icon">📄</div>
        <div class="cp-docs-placeholder-title">Documents</div>
        <div class="cp-docs-placeholder-msg">Signed forms, consent documents, and parent uploads will appear here.</div>
      </div>
    </div>
  </div>

  <!-- ═══ SAFEGUARDING PANEL (leaders only) ═══════════════════════════════════ -->
  <div id="cp-panel-sg" class="cp-panel" role="tabpanel" aria-labelledby="cp-tab-sg">
    <div id="cp-sg-content" style="padding:0 12px 16px"></div>
  </div>

</div><!-- #cp-page -->

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  /* ── Parse child ID from URL path (/ey/child/57) ─────────────────────────── */
  var _childId = (function() {
    var m = location.pathname.match(/\/ey\/child\/(\d+)/);
    return m ? parseInt(m[1], 10) : null;
  }());

  /* ── State ────────────────────────────────────────────────────────────────── */
  var _child        = null;
  var _activeTab    = location.hash.replace('#','') || 'diary';
  var _activeSub    = 'sleep';
  var _diaryDate    = new Date().toISOString().slice(0, 10);
  var _diaryEntries = [];
  var _obsLoaded    = false;
  var _careLoaded   = false;
  var _sgLoaded     = false;

  /* ── HTML escape ──────────────────────────────────────────────────────────── */
  function _e(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Age from DOB ─────────────────────────────────────────────────────────── */
  function _age(dob) {
    if (!dob) return '';
    var b = new Date(dob), n = new Date();
    var y = n.getFullYear() - b.getFullYear();
    var m = n.getMonth()   - b.getMonth();
    if (m < 0) { y--; m += 12; }
    if (n.getDate() < b.getDate()) { m--; if (m < 0) { y--; m += 11; } }
    return y > 0 ? y + 'y ' + m + 'm' : m + 'm';
  }

  /* ── Avatar colour ────────────────────────────────────────────────────────── */
  var AVATAR_COLORS = [
    '#4a9abf','#e07820','#22c55e','#a855f7','#ef4444',
    '#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'
  ];
  function _color(name) {
    return AVATAR_COLORS[(name || 'A').charCodeAt(0) % AVATAR_COLORS.length];
  }

  /* ── Format time from ISO string ─────────────────────────────────────────── */
  function _fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var h = d.getHours(), m = d.getMinutes();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }

  /* ── Format date ──────────────────────────────────────────────────────────── */
  function _fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  /* ── Diary entry label ────────────────────────────────────────────────────── */
  function _entryLabel(e) {
    switch (e.entry_type) {
      case 'sleep':
        var dur = e.duration_minutes ? e.duration_minutes + ' min' : '';
        var qual = e.sleep_quality ? ' (' + e.sleep_quality + ')' : '';
        return 'Sleep' + (dur ? ' ' + dur : '') + qual;
      case 'nappy':
        return 'Nappy' + (e.nappy_state ? ' — ' + e.nappy_state : '');
      case 'food':
        var meal = e.food_meal ? e.food_meal.charAt(0).toUpperCase() + e.food_meal.slice(1) : 'Food';
        return meal + (e.food_amount ? ': ' + e.food_amount : '');
      case 'toilet':
        return 'Toilet' + (e.nappy_state ? ' — ' + e.nappy_state : '');
      case 'bottle':
        return 'Bottle' + (e.drink_ml ? ' ' + e.drink_ml + 'ml' : '') + (e.drink_type ? ' (' + e.drink_type + ')' : '');
      case 'notes':
        return e.notes ? e.notes.substring(0, 60) + (e.notes.length > 60 ? '…' : '') : 'Note';
      default:
        return e.entry_type;
    }
  }

  /* ── Render child header card ─────────────────────────────────────────────── */
  function _renderHeader(c) {
    var card = document.getElementById('cp-header-card');
    if (!card) return;

    var init  = (c.first_name || '?').charAt(0).toUpperCase();
    var col   = _color(init);
    var age   = _age(c.date_of_birth);
    var room  = c.room_name || '';
    var name  = _e(c.first_name) + ' ' + _e(c.last_name || '');

    /* avatar */
    var av = document.getElementById('cp-avatar');
    if (av) {
      if (c.photo_url) {
        av.innerHTML = '<img src="' + _e(c.photo_url) + '" alt="' + _e(c.first_name) + '">';
      } else {
        av.style.background = col;
        av.textContent = init;
      }
    }

    var nameEl = document.getElementById('cp-full-name');
    if (nameEl) nameEl.textContent = name;

    var ageEl = document.getElementById('cp-room-age');
    if (ageEl) ageEl.textContent = room + (age ? ' · ' + age : '');

    var allerEl = document.getElementById('cp-allergies');
    if (allerEl) allerEl.textContent = c.allergies || 'None';
    if (c.allergies && allerEl) allerEl.style.color = '#f87171';

    var dietEl = document.getElementById('cp-dietary');
    if (dietEl) dietEl.textContent = c.dietary_requirements || 'None';

    /* pickup: parent_1_name */
    var pickEl = document.getElementById('cp-contact');
    if (pickEl) {
      var p = [];
      if (c.parent_1_name) p.push(c.parent_1_name);
      if (c.parent_2_name) p.push(c.parent_2_name);
      pickEl.textContent = p.length ? p.join(', ') : '—';
    }

    /* update topbar title */
    var titleEl = document.getElementById('wren-app-title');
    if (titleEl) titleEl.textContent = (c.preferred_name || c.first_name) + ' · ' + room;

    card.classList.remove('loading');
  }

  /* ── Install back button in topbar (replaces hamburger) ──────────────────── */
  function _installBackBtn() {
    var hamburger = document.getElementById('wren-app-hamburger');
    if (!hamburger) return;

    var btn = document.createElement('button');
    btn.id          = 'wren-app-back-btn';
    btn.setAttribute('aria-label', 'Back to children');
    btn.innerHTML   =
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">' +
      '<path d="M15 18l-6-6 6-6"/></svg>';
    btn.addEventListener('click', function() {
      if (history.length > 1) history.back();
      else Wren.navigate('/ey/home');
    });

    hamburger.parentNode.insertBefore(btn, hamburger);
    hamburger.style.display = 'none';
  }

  /* ── Main tab switching ───────────────────────────────────────────────────── */
  function _initMainTabs() {
    document.querySelectorAll('.cp-main-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        _switchMainTab(btn.dataset.tab);
      });
    });
    _switchMainTab(_activeTab, true);
  }

  function _switchMainTab(tab, silent) {
    _activeTab = tab;
    if (!silent) location.replace('#' + tab);

    document.querySelectorAll('.cp-main-tab').forEach(function(b) {
      var a = b.dataset.tab === tab;
      b.classList.toggle('active', a);
      b.setAttribute('aria-selected', String(a));
    });
    document.querySelectorAll('.cp-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'cp-panel-' + tab);
    });

    /* lazy load on first visit */
    if (tab === 'obs'     && !_obsLoaded)  { _obsLoaded  = true; _loadObs();  }
    if (tab === 'journey' && !_obsLoaded)  { _obsLoaded  = true; _loadObs();  }
    if (tab === 'care'    && !_careLoaded) { _careLoaded = true; _loadCare(); }
    if (tab === 'sg'      && !_sgLoaded)   { _sgLoaded   = true; _loadSg();   }
  }

  /* ── Diary sub-tab switching ──────────────────────────────────────────────── */
  function _initSubTabs() {
    document.querySelectorAll('.cp-sub-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        _activeSub = btn.dataset.type;
        document.querySelectorAll('.cp-sub-tab').forEach(function(b) {
          var a = b.dataset.type === _activeSub;
          b.classList.toggle('active', a);
          b.setAttribute('aria-selected', String(a));
        });
        _renderDiaryEntries();
      });
    });
  }

  /* ── Date selector (tap-first stepper) ───────────────────────────────────── */
  function _initDatePicker() {
    var inp = document.getElementById('cp-diary-date-input');
    if (!inp) return;
    var today = new Date().toISOString().slice(0, 10);
    inp.max = today;

    function _applyDate(d) {
      if (d > today) d = today;
      _diaryDate = d;
      inp.value = _diaryDate;
      var lbl = document.getElementById('cp-diary-date-label');
      if (lbl) lbl.textContent = _diaryDate === today ? "Today's entries" : _fmtDate(_diaryDate);
      var nb = document.getElementById('cp-date-next');
      if (nb) nb.disabled = (_diaryDate >= today);
      _loadDiary();
    }
    function _shiftDay(str, delta) {
      var x = new Date(str + 'T00:00:00');
      x.setDate(x.getDate() + delta);
      return x.toISOString().slice(0, 10);
    }

    _applyDate(_diaryDate);

    var prevBtn = document.getElementById('cp-date-prev');
    var nextBtn = document.getElementById('cp-date-next');
    if (prevBtn) prevBtn.addEventListener('click', function() { _applyDate(_shiftDay(_diaryDate, -1)); });
    if (nextBtn) nextBtn.addEventListener('click', function() { _applyDate(_shiftDay(_diaryDate, 1)); });
    inp.addEventListener('click', function() {
      if (inp.showPicker) { try { inp.showPicker(); return; } catch(e) {} }
    });
    inp.addEventListener('change', function() { _applyDate(this.value || today); });
  }

  /* ── Add entry button — navigates to diary-entry page ────────────────────── */
  function _initAddBtn() {
    var btn = document.getElementById('cp-diary-add-btn');
    if (btn) {
      btn.addEventListener('click', function() {
        var childParam = _childId ? '?child=' + _childId : '';
        Wren.navigate('/ey/diary/entry' + childParam);
      });
    }
  }

  /* ── Load diary entries ───────────────────────────────────────────────────── */
  function _loadDiary() {
    if (!_childId) return;
    var list = document.getElementById('cp-diary-entries-list');
    if (list) {
      list.innerHTML = '<div class="cp-diary-empty" aria-live="polite">Loading…</div>';
    }
    Wren.api('/api/diary/entries?child_id=' + _childId + '&date=' + _diaryDate)
      .then(function(data) {
        _diaryEntries = Array.isArray(data) ? data : [];
        _renderDiaryEntries();
      }).catch(function() {
        if (list) list.innerHTML = '<div class="cp-diary-empty">Could not load diary entries.</div>';
      });
  }

  /* ── Render diary entries for active sub-tab ──────────────────────────────── */
  function _renderDiaryEntries() {
    var list = document.getElementById('cp-diary-entries-list');
    if (!list) return;

    var filtered = _diaryEntries.filter(function(e) {
      return e.entry_type === _activeSub;
    });

    if (!filtered.length) {
      list.innerHTML = '<div class="cp-diary-empty">No ' + _activeSub + ' entries for this date.</div>';
      return;
    }

    list.innerHTML = filtered.map(function(e) {
      var label  = _entryLabel(e);
      var detail = e.notes && e.entry_type !== 'notes' ? _e(e.notes) : '';
      return '<div class="cp-diary-entry" role="listitem" data-id="' + e.id + '">' +
             '  <span class="cp-entry-time">' + _e(_fmtTime(e.occurred_at)) + '</span>' +
             '  <div class="cp-entry-body">' +
             '    <div class="cp-entry-label">' + _e(label) + '</div>' +
             (detail ? '    <div class="cp-entry-detail">' + detail + '</div>' : '') +
             (e.staff_name ? '    <div class="cp-entry-detail">' + _e(e.staff_name) + '</div>' : '') +
             '  </div>' +
             '  <div class="cp-entry-actions">' +
             '    <button class="cp-entry-action-btn" aria-label="Edit" data-action="edit" data-id="' + e.id + '">✏️</button>' +
             '    <button class="cp-entry-action-btn del" aria-label="Delete" data-action="delete" data-id="' + e.id + '">🗑</button>' +
             '  </div>' +
             '</div>';
    }).join('');

    /* entry action handlers (full logic in prompt 05) */
    list.querySelectorAll('[data-action]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        Wren.toast('Edit/delete coming in next prompt', 'info');
      });
    });
  }

  /* ── Load observations ────────────────────────────────────────────────────── */
  function _loadObs() {
    if (!_childId) return;
    var obsList     = document.getElementById('cp-obs-list');
    var journeyList = document.getElementById('cp-journey-list');

    if (obsList)     obsList.innerHTML     = '<div class="app-skeleton" style="height:80px;margin:12px;border-radius:12px"></div>'.repeat(3);
    if (journeyList) journeyList.innerHTML = '<div class="app-skeleton" style="height:60px;margin:12px 0;border-radius:8px"></div>'.repeat(4);

    Wren.api('/api/observations?child_id=' + _childId + '&limit=50')
      .then(function(data) {
        var rows = Array.isArray(data) ? data : (data && data.rows ? data.rows : []);
        _renderObs(rows);
        _renderJourney(rows);
      }).catch(function() {
        if (obsList)     obsList.innerHTML     = '<div class="cp-diary-empty">Could not load observations.</div>';
        if (journeyList) journeyList.innerHTML  = '<div class="cp-diary-empty">Could not load learning journey.</div>';
      });
  }

  function _renderObs(rows) {
    var list = document.getElementById('cp-obs-list');
    if (!list) return;
    if (!rows.length) {
      list.innerHTML = '<div class="cp-diary-empty" style="padding:40px 16px">No observations yet.</div>';
      return;
    }
    list.innerHTML = rows.map(function(o) {
      var thumb = (o.photo_urls && o.photo_urls.length)
        ? '<img class="cp-obs-thumb" src="' + _e(o.photo_urls[0]) + '" alt="" loading="lazy">'
        : '<div class="cp-obs-thumb-placeholder">📝</div>';
      var areas = (o.eyfs_areas || []);
      var tags  = areas.map(function(a) {
        return '<span class="cp-obs-tag">' + _e(a) + '</span>';
      }).join('');
      return '<div class="cp-obs-card app-card" role="listitem">' +
             '  <div class="cp-obs-card-header">' +
             '    ' + thumb +
             '    <div class="cp-obs-meta">' +
             '      <div class="cp-obs-date">' + _e(_fmtDate(o.created_at)) + '</div>' +
             '      <div class="cp-obs-type">' + _e(o.observation_type || 'Observation') + '</div>' +
             '    </div>' +
             '  </div>' +
             '  <div class="cp-obs-text">' + _e(o.observation_text || '') + '</div>' +
             (tags ? '  <div class="cp-obs-tags">' + tags + '</div>' : '') +
             '</div>';
    }).join('');
  }

  function _renderJourney(rows) {
    var list = document.getElementById('cp-journey-list');
    if (!list) return;
    /* only shared/assessed observations */
    var journey = rows.filter(function(o) { return o.is_shared_with_parents || o.eyfs_areas; });
    if (!journey.length) {
      list.innerHTML = '<div class="cp-diary-empty" style="padding:40px 16px">No learning journey entries yet.</div>';
      _loadJourneyReports();
      return;
    }
    list.innerHTML = journey.map(function(o) {
      var areas = (o.eyfs_areas || []);
      var areaTags = areas.slice(0, 3).map(function(a) {
        return '<span class="cp-journey-area">' + _e(a) + '</span>';
      }).join('');
      return '<div class="cp-journey-item" role="listitem">' +
             '  <div class="cp-journey-dot" aria-hidden="true"></div>' +
             '  <div class="cp-journey-body">' +
             '    <div class="cp-journey-date">' + _e(_fmtDate(o.created_at)) + '</div>' +
             '    <div class="cp-journey-text">' + _e((o.observation_text || '').substring(0, 120)) + (o.observation_text && o.observation_text.length > 120 ? '…' : '') + '</div>' +
             (areaTags ? '    <div class="cp-journey-areas">' + areaTags + '</div>' : '') +
             '  </div>' +
             '</div>';
    }).join('');
    _loadJourneyReports();
  }

  /* Termly / summative reports on the learning timeline (2026-07-03, Toby item 11).
   * Prepends report cards above the observation entries. */
  function _loadJourneyReports() {
    if (!_childId) return;
    Wren.api('/api/parent-reports?child_id=' + _childId).then(function(data) {
      var reports = ((data && data.reports) || []).filter(function(r) {
        return r.status !== 'draft' || r.report_type === 'termly';
      }).slice(0, 8);
      if (!reports.length) return;
      var list = document.getElementById('cp-journey-list');
      if (!list) return;
      var TYPE_ICON = { 'termly': '🗓️', '2-year check': '⭐', 'progress': '📈', 'leaving': '🎓' };
      var html = reports.map(function(r) {
        var when = r.generated_at ? _fmtDate(r.generated_at) : '';
        return '<div class="cp-journey-item" role="listitem" style="background:rgba(74,154,191,0.06);border-radius:10px;padding:10px;margin-bottom:6px">' +
               '  <div class="cp-journey-dot" aria-hidden="true" style="background:var(--c-orange,#e07820)"></div>' +
               '  <div class="cp-journey-body">' +
               '    <div class="cp-journey-date">' + _e(when) + (r.status === 'draft' ? ' · <span style="color:var(--c-orange,#e07820)">draft</span>' : ' · ' + _e(r.status)) + '</div>' +
               '    <div class="cp-journey-text" style="font-weight:700">' + (TYPE_ICON[r.report_type] || '📋') + ' ' +
                    _e((r.report_type || 'report').replace(/^./, function(c){ return c.toUpperCase(); })) + ' report</div>' +
               '    <div class="cp-journey-text" style="font-size:.78rem;color:var(--c-muted)">' +
                    _e(String(r.final_content || r.draft_content || '').replace(/\*\*/g, '').substring(0, 110)) + '…</div>' +
               '  </div>' +
               '</div>';
      }).join('');
      list.insertAdjacentHTML('afterbegin', html);
    }).catch(function() {});
  }

  /* ── Load care tab data ───────────────────────────────────────────────────── */
  function _loadCare() {
    if (!_childId) return;
    var content = document.getElementById('cp-care-content');
    if (content) content.innerHTML = '<div class="app-skeleton" style="height:60px;margin:12px 0;border-radius:8px"></div>'.repeat(3);

    /* Incidents and medicine in parallel */
    var p1 = Wren.api('/api/incidents?child_id=' + _childId).catch(function() { return []; });
    var p2 = Wren.api('/api/medicine/child/' + _childId).catch(function() { return []; });

    Promise.all([p1, p2]).then(function(results) {
      var incidents = Array.isArray(results[0]) ? results[0] : [];
      var medicine  = Array.isArray(results[1]) ? results[1] : [];
      _renderCare(incidents, medicine);
    });
  }

  function _renderCare(incidents, medicine) {
    var content = document.getElementById('cp-care-content');
    if (!content || !_child) return;

    var html = '';

    /* Key person + room */
    html += '<div class="cp-care-section">';
    html += '<div class="cp-care-section-title">Placement</div>';
    html += '<div class="cp-care-row">' +
            '  <span class="cp-care-icon">🏠</span>' +
            '  <div class="cp-care-info"><strong>' + _e(_child.room_name || '—') + '</strong><span>Room</span></div>' +
            '</div>';
    if (_child.key_person_name) {
      html += '<div class="cp-care-row">' +
              '  <span class="cp-care-icon">👤</span>' +
              '  <div class="cp-care-info"><strong>' + _e(_child.key_person_name) + '</strong><span>Key person</span></div>' +
              '</div>';
    }
    html += '</div>';

    /* Medicine records */
    html += '<div class="cp-care-section">';
    html += '<div class="cp-care-section-title">Medicine Records</div>';
    if (!medicine.length) {
      html += '<div class="cp-diary-empty" style="padding:12px 0">No medicine records.</div>';
    } else {
      html += medicine.slice(0, 10).map(function(m) {
        var signed = m.manager_sign_off_at
          ? '<span class="cp-medicine-signed">✓ Signed off</span>'
          : '<span style="font-size:.72rem;color:var(--c-amber)">⚠ Awaiting sign-off</span>';
        return '<div class="cp-medicine-card">' +
               '  <div class="cp-medicine-name">' + _e(m.medicine_name) + (m.dose ? ' — ' + _e(m.dose) : '') + '</div>' +
               '  <div class="cp-medicine-meta">' + _e(_fmtDate(m.time_given || m.created_at)) + (m.notes ? ' · ' + _e(m.notes) : '') + '</div>' +
               '  ' + signed +
               '</div>';
      }).join('');
    }
    html += '</div>';

    /* Incidents */
    html += '<div class="cp-care-section">';
    html += '<div class="cp-care-section-title">Accident / Incident Reports</div>';
    if (!incidents.length) {
      html += '<div class="cp-diary-empty" style="padding:12px 0">No incidents recorded.</div>';
    } else {
      html += incidents.slice(0, 10).map(function(i) {
        return '<div class="cp-incident-card">' +
               '  <div class="cp-incident-title">' + _e(i.incident_type || 'Incident') + ' — ' + _e(_fmtDate(i.incident_date || i.created_at)) + '</div>' +
               '  <div class="cp-incident-meta">' + _e((i.description || '').substring(0, 100)) + '</div>' +
               '</div>';
      }).join('');
    }
    html += '</div>';

    content.innerHTML = html;
  }

  /* ── Load safeguarding tab (leaders only) ─────────────────────────────────── */
  function _loadSg() {
    var content = document.getElementById('cp-sg-content');
    if (!content || !_childId) return;

    var childName = _child ? (_child.first_name || '') : '';
    content.innerHTML = '<div class="cp-diary-empty">Loading…</div>';

    Wren.api('/api/safeguarding/child/' + _childId + '/timeline')
      .then(function(rows) {
        var logBtn = '<button id="cp-sg-log-btn" style="' +
          'display:flex;align-items:center;gap:6px;height:44px;min-width:44px;padding:0 16px;' +
          'margin:12px 0;border-radius:10px;background:var(--c-blue);border:none;color:#fff;' +
          'font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s">' +
          '+ Log concern' + (childName ? ' for ' + _e(childName) : '') + '</button>';

        if (!Array.isArray(rows) || !rows.length) {
          content.innerHTML = logBtn +
            '<div class="cp-diary-empty">No safeguarding concerns on file for this child.</div>';
        } else {
          var STATUS_LABEL = { new:'New', under_review:'Under review', action_taken:'Action taken', referred:'Referred', closed:'Closed' };
          var items = rows.map(function(sg) {
            var sevBadge = sg.severity && sg.severity !== 'standard'
              ? '<span style="font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px;' +
                (sg.severity === 'critical' ? 'background:rgba(239,68,68,.18);color:#ef4444' : 'background:rgba(245,158,11,.18);color:#f59e0b') +
                '">' + sg.severity + '</span> '
              : '';
            return '<div class="cp-diary-entry">' +
              '<span class="cp-entry-time" style="min-width:52px">' +
                new Date(sg.concern_date || sg.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) +
              '</span>' +
              '<div class="cp-entry-body">' +
                '<div class="cp-entry-label">' + sevBadge + _e(STATUS_LABEL[sg.status] || sg.status) + '</div>' +
                '<div class="cp-entry-detail">' + _e((sg.description || '').substring(0, 100)) + '</div>' +
                (sg.reporter_name ? '<div class="cp-entry-detail">' + _e(sg.reporter_name) + '</div>' : '') +
              '</div></div>';
          }).join('');
          content.innerHTML = logBtn + '<div id="cp-sg-list">' + items + '</div>';
        }

        var logBtnEl = document.getElementById('cp-sg-log-btn');
        if (logBtnEl) {
          logBtnEl.addEventListener('click', function() {
            var childParam = _childId ? '?child=' + _childId : '';
            Wren.navigate('/ey/safeguarding/new' + childParam);
          });
          logBtnEl.addEventListener('mouseenter', function() { logBtnEl.style.opacity = '.88'; });
          logBtnEl.addEventListener('mouseleave', function() { logBtnEl.style.opacity = '1'; });
        }
      })
      .catch(function() {
        content.innerHTML = '<div class="cp-diary-empty">Safeguarding records are restricted to leaders and managers.</div>';
      });
  }

  /* ── Load child data ──────────────────────────────────────────────────────── */
  function _loadChild() {
    if (!_childId) {
      Wren.toast('Invalid child ID', 'error');
      Wren.navigate('/ey/home');
      return;
    }
    /* Use /:id/profile for richer data including allergies, contacts, key person */
    Wren.api('/api/children/' + _childId + '/profile')
      .then(function(data) {
        _child = data;
        _renderHeader(data);
        _loadDiary();
      }).catch(function(err) {
        Wren.toast('Could not load child profile', 'error');
        console.error(err);
      });
  }

  /* ── Quick-action hub wiring ─────────────────────────────────────────────── */
  function _initHub() {
    function _hub(id, fn) {
      var btn = document.getElementById(id);
      if (btn) btn.addEventListener('click', fn);
    }

    _hub('cp-hub-diary', function() {
      Wren.navigate('/ey/diary/entry' + (_childId ? '?child=' + _childId : ''));
    });
    _hub('cp-hub-obs', function() {
      Wren.navigate('/ey/observation/new' + (_childId ? '?child=' + _childId : ''));
    });
    _hub('cp-hub-accident', function() {
      Wren.navigate('/ey/incident/new' + (_childId ? '?child=' + _childId : ''));
    });
    /* Medicine — show care tab (write path is manager-gated at the API) */
    _hub('cp-hub-medicine', function() {
      _switchMainTab('care');
    });
    _hub('cp-hub-journey', function() {
      _switchMainTab('journey');
    });
    _hub('cp-hub-register', function() {
      /* Register is room-level; pass child room as filter hint */
      var room = _child && _child.room_id ? '?room=' + _child.room_id : '';
      Wren.navigate('/ey/register' + room);
    });
    _hub('cp-hub-planning', function() {
      Wren.navigate('/ey/activities' + (_childId ? '?child=' + _childId : ''));
    });
    _hub('cp-hub-2year', function() {
      Wren.navigate('/ey/two-year-check' + (_childId ? '?child=' + _childId : ''));
    });
  }

  /* ── Boot ─────────────────────────────────────────────────────────────────── */
  document.addEventListener('wren:ready', function() {
    _installBackBtn();
    // Show safeguarding tab only for leaders
    var user = Wren.getUser ? Wren.getUser() : (Wren.user || null);
    if (user && ['manager','room_leader','deputy_manager'].includes(user.role)) {
      var sgTab = document.getElementById('cp-tab-sg');
      if (sgTab) sgTab.style.display = '';
    }
    _initMainTabs();
    _initSubTabs();
    _initDatePicker();
    _initAddBtn();
    _initHub();
    _loadChild();
  });

}());
</script>
</body>
</html>
