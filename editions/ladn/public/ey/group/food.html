<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="group-food">
  <meta name="wren-app-title"         content="Group Food">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Group Food · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260515">
  <style>
    #grp-page { padding:0 0 env(safe-area-inset-bottom,0); }
    #grp-topbar-close {
      width:44px;height:44px;background:transparent;border:none;
      color:var(--c-muted);font-size:1.1rem;cursor:pointer;border-radius:10px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;
    }
    #grp-topbar-close:hover { background:rgba(255,255,255,0.06);color:var(--c-text); }
    #grp-topbar-save {
      height:36px;padding:0 16px;background:var(--c-blue);border:none;border-radius:10px;
      color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s;
    }
    #grp-topbar-save:hover  { opacity:.88; }
    #grp-topbar-save:disabled { opacity:.45;cursor:default; }
    #grp-form-body { overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px; }
    .grp-section { padding:14px 16px 0; }
    .grp-label { font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);margin-bottom:8px;display:block; }
    .grp-input { background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;color:var(--c-text);font-size:.9rem;padding:0 10px;height:40px;outline:none; }
    .grp-input:focus { border-color:var(--c-blue); }
    select.grp-input { cursor:pointer; }
    textarea.grp-input { height:auto;min-height:90px;padding:10px;resize:vertical;width:100%;box-sizing:border-box;line-height:1.5; }
    .grp-row { display:flex;gap:8px;align-items:flex-end; }

    /* ── Today's menu card ──────────────────────────────────────────────────── */
    #grp-menu-card {
      margin:12px 16px 0;padding:12px 14px;background:var(--c-surface);
      border:1px solid var(--c-border);border-radius:12px;
    }
    #grp-menu-card .menu-eyebrow { font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-blue);margin-bottom:4px; }
    #grp-menu-dish { font-size:1rem;font-weight:700;color:var(--c-text);line-height:1.3; }
    #grp-menu-desc { font-size:.8rem;color:var(--c-muted);margin-top:4px;line-height:1.4; }
    #grp-menu-allergens { margin-top:6px;display:flex;flex-wrap:wrap;gap:4px; }
    .menu-allergen-chip { font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3); }
    #grp-menu-empty { font-size:.85rem;color:var(--c-muted);font-style:italic; }

    /* ── Bulk-set bar ───────────────────────────────────────────────────────── */
    #grp-bulk-bar { display:flex;align-items:center;gap:8px;padding:8px 16px 0;flex-wrap:wrap; }
    #grp-bulk-bar .bulk-label { font-size:.78rem;color:var(--c-muted);font-weight:600; }
    .grp-bulk-btn {
      height:32px;padding:0 12px;border:1px solid var(--c-border);border-radius:16px;
      background:transparent;color:var(--c-muted);font-size:.8rem;font-weight:700;cursor:pointer;
      transition:background .15s,color .15s,border-color .15s;
    }
    .grp-bulk-btn:hover { background:rgba(255,255,255,.06);color:var(--c-text); }

    /* ── Per-child list ─────────────────────────────────────────────────────── */
    #grp-per-child { border-top:1px solid var(--c-border);margin-top:14px; }
    .grp-per-child-row { display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--c-border); }
    .grp-per-child-av { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden; }
    .grp-per-child-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-per-child-name { flex:1;font-size:.92rem;color:var(--c-text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

    /* ── Portion selector (some / most / all clickable pie) ─────────────────── */
    .portion {
      display:flex;align-items:center;gap:10px;flex-shrink:0;
      background:transparent;border:none;cursor:pointer;padding:0;
      -webkit-tap-highlight-color:transparent;
    }
    .portion-pie {
      width:40px;height:40px;border-radius:50%;flex-shrink:0;
      border:2px solid var(--c-border);
      transition:background .15s, border-color .15s;
    }
    .portion-label {
      min-width:44px;text-align:left;font-size:.82rem;font-weight:700;
      text-transform:capitalize;transition:color .15s;
    }
    /* state colours */
    .portion[data-amount="all"]     .portion-pie { background:conic-gradient(var(--c-green) 0 100%, var(--c-green) 0); border-color:var(--c-green); }
    .portion[data-amount="all"]     .portion-label { color:var(--c-green); }
    .portion[data-amount="most"]    .portion-pie { background:conic-gradient(var(--c-blue) 0 75%, transparent 75% 100%); border-color:var(--c-blue); }
    .portion[data-amount="most"]    .portion-label { color:var(--c-blue); }
    .portion[data-amount="some"]    .portion-pie { background:conic-gradient(var(--c-orange) 0 33%, transparent 33% 100%); border-color:var(--c-orange); }
    .portion[data-amount="some"]    .portion-label { color:var(--c-orange); }
    .portion[data-amount="refused"] .portion-pie { background:transparent; border-color:var(--c-danger); border-style:dashed; }
    .portion[data-amount="refused"] .portion-label { color:var(--c-danger); }
    .portion:focus-visible { outline:2px solid var(--c-blue); outline-offset:3px; border-radius:8px; }

    #grp-empty { padding:40px 24px;text-align:center;color:var(--c-muted); }
  </style>
</head>
<body>
<div id="grp-page">
  <div id="grp-form-body">

    <!-- Today's menu (pulled from menu plan) -->
    <div id="grp-menu-card" aria-live="polite">
      <div class="menu-eyebrow" id="grp-menu-eyebrow">Today's menu</div>
      <div id="grp-menu-dish">Loading menu…</div>
      <div id="grp-menu-desc" hidden></div>
      <div id="grp-menu-allergens"></div>
    </div>

    <div class="grp-section">
      <div class="grp-row">
        <div>
          <span class="grp-label">Time</span>
          <select class="grp-input" id="grp-time" style="width:110px" aria-label="Time"></select>
        </div>
        <div style="flex:1">
          <span class="grp-label">Meal</span>
          <select class="grp-input" id="grp-meal" style="width:100%">
            <option value="breakfast">Breakfast</option>
            <option value="snack-am">Morning snack</option>
            <option value="lunch" selected>Lunch</option>
            <option value="snack-pm">Afternoon snack</option>
            <option value="tea">Tea</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Bulk set -->
    <div id="grp-bulk-bar">
      <span class="bulk-label">Set everyone:</span>
      <button type="button" class="grp-bulk-btn" data-bulk="all">All</button>
      <button type="button" class="grp-bulk-btn" data-bulk="most">Most</button>
      <button type="button" class="grp-bulk-btn" data-bulk="some">Some</button>
      <button type="button" class="grp-bulk-btn" data-bulk="refused">Refused</button>
    </div>

    <!-- Per-child list: every present child, default "all", tap pie to change -->
    <div id="grp-per-child">
      <div class="grp-section" style="padding-bottom:6px">
        <span class="grp-label">How much each child ate (tap to change)</span>
      </div>
      <div id="grp-empty" hidden>No children to log.</div>
    </div>

    <div class="grp-section">
      <span class="grp-label">Notes (all children)</span>
      <textarea class="grp-input" id="grp-notes" placeholder="Optional notes…"></textarea>
    </div>
  </div>
</div>

<script src="/js/wren-core.js?v=20260515" defer></script>
<script src="/js/wren-app-shell.js?v=20260515" defer></script>
<script>
(function(){
  'use strict';

  /* ── Portion model: some / most / all (+ refused) ───────────────────────────
   * Cycle order on tap. Default = "all" (ate all), per the EyLog spec.        */
  var CYCLE = ['all','most','some','refused'];
  var LABELS = { all:'All', most:'Most', some:'Some', refused:'Refused' };

  function _p2(n){ return (n<10?'0':'')+n; }
  function initGrpTime(timeId){
    var t=document.getElementById(timeId);
    if(!t||t.tagName!=='SELECT')return;
    var now=new Date();var mins=now.getHours()*60+now.getMinutes();
    var near=Math.round(mins/5)*5;if(near>1435)near=1435;
    var sel=_p2(Math.floor(near/60))+':'+_p2(near%60);
    var html='';for(var m=0;m<1440;m+=5){var v=_p2(Math.floor(m/60))+':'+_p2(m%60);html+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';}
    t.innerHTML=html;t.value=sel;
  }

  var COLORS=['#4a9abf','#e07820','#22c55e','#a855f7','#ef4444','#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'];
  function color(n){return COLORS[(n||'A').charCodeAt(0)%COLORS.length];}
  function e(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  var _children=[];   /* the children we're logging for */
  var _amounts={};    /* child_id -> 'all'|'most'|'some'|'refused' */
  var _recipeId=null; /* today's lunch recipe id, if meal === lunch */

  /* Which children? Explicit selection first; otherwise ALL present children. */
  function getIds(){
    var ss=sessionStorage.getItem('wren.ey.selection');
    if(ss)try{var sel=JSON.parse(ss);if(Date.now()-sel.timestamp<=30*60*1000&&sel.childIds&&sel.childIds.length)return sel.childIds;}catch(ex){}
    var qs=new URLSearchParams(window.location.search).get('children')||'';
    if(qs)return qs.split(',').map(Number).filter(Boolean);
    var old=sessionStorage.getItem('eyGroupSelection');
    if(old)try{return JSON.parse(old);}catch(ex){}
    return null; /* null => fall back to all present children */
  }
  function getRoomFilter(){
    var qs=new URLSearchParams(window.location.search).get('room')||'';
    return qs.toLowerCase();
  }

  /* ── Today's menu from the meal plan ──────────────────────────────────────── */
  function loadMenu(){
    var dishEl=document.getElementById('grp-menu-dish');
    var descEl=document.getElementById('grp-menu-desc');
    var allEl =document.getElementById('grp-menu-allergens');
    /* preschool plan is the canonical menu source; baby room shares the kitchen */
    Wren.api('/api/menus/today?room=preschool').then(function(data){
      var plans=(data&&data.plans)||[];
      if(!plans.length){
        dishEl.innerHTML='<span id="grp-menu-empty">No menu set for today.</span>';
        return;
      }
      /* Prefer the lunch plan; fall back to first plan. */
      var lunch=plans.filter(function(p){return p.meal_type==='lunch';})[0]||plans[0];
      _recipeId=lunch.recipe_id||null;
      dishEl.textContent=lunch.recipe_name||'(meal not named)';
      if(lunch.description){descEl.textContent=lunch.description;descEl.hidden=false;}
      var allergens=lunch.allergens||[];
      allEl.innerHTML=allergens.map(function(a){return'<span class="menu-allergen-chip">'+e(a)+'</span>';}).join('');
      /* Keep the meal selector in sync with the plan's meal type by default. */
      var mealSel=document.getElementById('grp-meal');
      if(mealSel&&lunch.meal_type){mealSel.value=lunch.meal_type;}
    }).catch(function(){
      dishEl.innerHTML='<span id="grp-menu-empty">Menu unavailable.</span>';
    });
  }

  /* ── Per-child portion pie ─────────────────────────────────────────────────── */
  function cyclePortion(childId){
    var cur=_amounts[childId]||'all';
    var next=CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
    setPortion(childId,next);
  }
  function setPortion(childId,amount){
    _amounts[childId]=amount;
    var btn=document.querySelector('.portion[data-child-id="'+childId+'"]');
    if(btn){
      btn.setAttribute('data-amount',amount);
      var lab=btn.querySelector('.portion-label');
      if(lab)lab.textContent=LABELS[amount];
      btn.setAttribute('aria-label',btn.getAttribute('data-child-name')+' ate '+LABELS[amount].toLowerCase());
    }
  }

  function renderChildren(){
    var container=document.getElementById('grp-per-child');
    var empty=document.getElementById('grp-empty');
    if(!container)return;
    container.querySelectorAll('.grp-per-child-row').forEach(function(r){r.remove();});
    if(!_children.length){if(empty)empty.hidden=false;return;}
    if(empty)empty.hidden=true;

    _children.forEach(function(c){
      if(!(c.id in _amounts))_amounts[c.id]='all'; /* DEFAULT: ate all */
      var init=(c.first_name||'?').charAt(0).toUpperCase();
      var av=c.photo_url
        ?'<div class="grp-per-child-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>'
        :'<div class="grp-per-child-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      var nm=e(c.first_name)+' '+e((c.last_name||'').charAt(0))+'.';
      var amt=_amounts[c.id];
      var row=document.createElement('div');
      row.className='grp-per-child-row';
      row.innerHTML=
        av+
        '<span class="grp-per-child-name">'+nm+'</span>'+
        '<button type="button" class="portion" data-child-id="'+c.id+'" data-child-name="'+nm+'" '+
          'data-amount="'+amt+'" aria-label="'+nm+' ate '+LABELS[amt].toLowerCase()+'">'+
          '<span class="portion-label">'+LABELS[amt]+'</span>'+
          '<span class="portion-pie" aria-hidden="true"></span>'+
        '</button>';
      container.appendChild(row);
    });

    /* Wire taps (event delegation, once) */
    container.onclick=function(ev){
      var btn=ev.target.closest('.portion');
      if(!btn)return;
      cyclePortion(parseInt(btn.dataset.childId,10));
    };

    /* Update topbar count */
    var titleEl=document.getElementById('wren-app-title')||document.querySelector('.wren-app-title');
    if(titleEl)titleEl.textContent='Group Food ('+_children.length+')';
  }

  function wireBulk(){
    document.querySelectorAll('.grp-bulk-btn[data-bulk]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var amt=btn.dataset.bulk;
        _children.forEach(function(c){setPortion(c.id,amt);});
      });
    });
  }

  function wireTopbar(){
    var tb=document.getElementById('wren-app-topbar')||document.querySelector('.wren-app-topbar');
    if(!tb)return;
    if(!document.getElementById('grp-topbar-close')){
      var closeBtn=document.createElement('button');
      closeBtn.id='grp-topbar-close';closeBtn.setAttribute('aria-label','Close');
      closeBtn.innerHTML='&#8592;';
      closeBtn.addEventListener('click',function(){Wren.navigate('/ey/home');});
      tb.insertBefore(closeBtn,tb.firstChild);
    }
    if(!document.getElementById('grp-topbar-save')){
      var saveBtn=document.createElement('button');
      saveBtn.id='grp-topbar-save';saveBtn.textContent='Save';
      saveBtn.addEventListener('click',doSave);
      var actions=tb.querySelector('.wren-app-topbar-actions');
      if(actions)actions.insertBefore(saveBtn,actions.firstChild);else tb.appendChild(saveBtn);
    }
  }

  function doSave(){
    var saveBtn=document.getElementById('grp-topbar-save');
    if(!_children.length){Wren.toast('No children to log','error');return;}
    if(saveBtn)saveBtn.disabled=true;
    var ids=_children.map(function(c){return c.id;});
    var time=document.getElementById('grp-time').value;
    var meal=document.getElementById('grp-meal').value;
    var notes=document.getElementById('grp-notes').value.trim()||null;
    /* per-child amounts — always send every child explicitly */
    var perChild={};
    ids.forEach(function(id){perChild[id]={amount:_amounts[id]||'all'};});
    Wren.api('/api/daily-diary/group',{
      method:'POST',
      body:JSON.stringify({
        child_ids:ids, type:'food', date:new Date().toISOString().slice(0,10),
        common:{time:time,meal:meal,amount:'all',recipe_id:_recipeId,share:true},
        per_child:perChild, notes:notes
      })
    }).then(function(res){
      sessionStorage.removeItem('wren.ey.selection');
      Wren.toast('Meal logged for '+res.created+' '+(res.created===1?'child':'children'),'success');
      setTimeout(function(){Wren.navigate('/ey/home');},1100);
    }).catch(function(err){
      if(saveBtn)saveBtn.disabled=false;
      Wren.toast('Could not save: '+(err.message||'error'),'error');
    });
  }

  document.addEventListener('wren:ready',function(){
    wireTopbar();
    initGrpTime('grp-time');
    wireBulk();
    loadMenu();

    var ids=getIds();
    var roomFilter=getRoomFilter();
    Wren.api('/api/children').then(function(data){
      var all=Array.isArray(data)?data:(data&&data.rows?data.rows:[]);
      var present=all.filter(function(c){return c.is_active!==false;});
      if(ids&&ids.length){
        _children=present.filter(function(c){return ids.indexOf(c.id)!==-1;});
      }else{
        /* No explicit selection → ALL present children (optionally room-filtered) */
        _children=present.filter(function(c){
          if(!roomFilter)return true;
          var r=((c.room||c.room_name||'')+'').toLowerCase();
          if(roomFilter==='baby')return r.indexOf('baby')!==-1;
          if(roomFilter==='pre') return r.indexOf('pre')!==-1;
          return true;
        });
      }
      /* default each present child to "all" */
      _children.forEach(function(c){_amounts[c.id]='all';});
      renderChildren();
    }).catch(function(){
      renderChildren();
    });
  });
}());
</script>
</body>
</html>
