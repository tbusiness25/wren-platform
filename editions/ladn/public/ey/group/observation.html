<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="group-observation">
  <meta name="wren-app-title"         content="Group Observation">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Group Observation · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260515">
  <style>
    #grp-page { padding:0 0 env(safe-area-inset-bottom,0); }
    #grp-topbar-close {
      width:44px;height:44px;background:transparent;border:none;
      color:var(--c-muted);font-size:1.1rem;cursor:pointer;border-radius:10px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;
    }
    #grp-topbar-close:hover { background:rgba(255,255,255,0.06);color:var(--c-text); }
    #grp-topbar-save {
      height:36px;padding:0 16px;background:var(--c-blue);border:none;border-radius:10px;
      color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s;
    }
    #grp-topbar-save:hover  { opacity:.88; }
    #grp-topbar-save:disabled { opacity:.45;cursor:default; }
    #grp-form-body { overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px; }
    .grp-section { padding:14px 16px 0; }
    .grp-label { font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);margin-bottom:8px;display:block; }
    #grp-thumb-strip { display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;border-bottom:1px solid var(--c-border); }
    .grp-thumb { display:flex;flex-direction:column;align-items:center;gap:4px; }
    .grp-thumb-av { width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0; }
    .grp-thumb-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-thumb-name { font-size:.7rem;color:var(--c-muted);text-align:center;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .grp-input { background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;color:var(--c-text);font-size:.9rem;padding:0 10px;height:40px;outline:none; }
    .grp-input:focus { border-color:var(--c-blue); }
    textarea.grp-input {
      height:auto;min-height:130px;padding:10px;resize:vertical;
      width:100%;box-sizing:border-box;line-height:1.55;font-family:system-ui,Arial,sans-serif;
    }
    textarea.grp-input::placeholder { color:var(--c-muted); }
    .grp-row { display:flex;gap:8px;align-items:center; }
    /* Date stepper */
    .grp-date-stepper { flex:1;display:flex;align-items:center;gap:2px;
      background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px; }
    .grp-date-stepper button { min-width:40px;min-height:40px;background:none;border:none;
      color:var(--c-text);cursor:pointer;padding:0 6px;border-radius:8px;transition:background .15s; }
    .grp-date-stepper button:hover { background:rgba(255,255,255,0.06); }
    .grp-date-stepper button:disabled { opacity:.3;cursor:default; }
    #grp-date-prev,#grp-date-next { font-size:1.2rem;line-height:1; }
    #grp-date-label { flex:1;font-size:.82rem;font-weight:700;text-align:center; }
    #grp-date { position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;border:0;padding:0; }
    /* EYFS area chips */
    #grp-eyfs-chips { display:flex;flex-wrap:wrap;gap:6px; }
    .grp-eyfs-chip {
      height:32px;padding:0 12px;border-radius:16px;
      background:var(--c-surface);border:1px solid var(--c-border);
      color:var(--c-muted);font-size:.78rem;font-weight:600;cursor:pointer;
      transition:background .15s,color .15s,border-color .15s;
    }
    .grp-eyfs-chip.active {
      background:rgba(74,154,191,0.2);border-color:var(--c-blue);color:var(--c-blue);
    }
    /* Share toggle */
    #grp-share-row { display:flex;align-items:center;gap:10px;padding:14px 16px 0; }
    #grp-share-row label { font-size:.9rem;color:var(--c-text);cursor:pointer; }
    input[type=checkbox]#grp-share { width:18px;height:18px;accent-color:var(--c-blue);cursor:pointer; }
  </style>
</head>
<body>
<div id="grp-page">
  <div id="grp-thumb-strip"></div>
  <div id="grp-form-body">

    <div class="grp-section">
      <span class="grp-label">Date &amp; time</span>
      <div class="grp-row">
        <div class="grp-date-stepper" role="group" aria-label="Observation date">
          <button id="grp-date-prev" type="button" aria-label="Previous day">‹</button>
          <button id="grp-date-label" type="button" aria-label="Change date">Today</button>
          <button id="grp-date-next" type="button" aria-label="Next day">›</button>
          <input type="date" id="grp-date" aria-hidden="true" tabindex="-1">
        </div>
        <select class="grp-input" id="grp-time" style="width:110px" aria-label="Time"></select>
      </div>
    </div>

    <div class="grp-section">
      <span class="grp-label">Observation</span>
      <textarea class="grp-input" id="grp-text"
        placeholder="What did you observe? Describe what the children were doing, saying, or experiencing…"
        rows="6"></textarea>
    </div>

    <div class="grp-section">
      <span class="grp-label">EYFS areas</span>
      <div id="grp-eyfs-chips">
        <button type="button" class="grp-eyfs-chip" data-area="PSED">PSED</button>
        <button type="button" class="grp-eyfs-chip" data-area="CL">Communication</button>
        <button type="button" class="grp-eyfs-chip" data-area="PD">Physical</button>
        <button type="button" class="grp-eyfs-chip" data-area="L">Literacy</button>
        <button type="button" class="grp-eyfs-chip" data-area="M">Maths</button>
        <button type="button" class="grp-eyfs-chip" data-area="UW">World</button>
        <button type="button" class="grp-eyfs-chip" data-area="EAD">Arts</button>
      </div>
    </div>

    <div class="grp-section">
      <span class="grp-label">Next steps</span>
      <textarea class="grp-input" id="grp-notes" placeholder="What will you plan next?…" rows="3"></textarea>
    </div>

    <div id="grp-share-row">
      <input type="checkbox" id="grp-share" checked>
      <label for="grp-share">Share with parents</label>
    </div>

  </div>
</div>
<script src="/js/wren-core.js?v=20260515" defer></script>
<script src="/js/wren-app-shell.js?v=20260515" defer></script>
<script>
(function(){
  'use strict';
  /* Date defaults to today (max=today); time is a 5-min-slot dropdown defaulting to nearest current slot */
  function _p2(n){return(n<10?'0':'')+n;}
  function _slotOptions(sel){
    var html='';
    for(var m=0;m<1440;m+=5){var v=_p2(Math.floor(m/60))+':'+_p2(m%60);html+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';}
    return html;
  }
  function initGrpDateTime(dateId,timeId){
    var now=new Date();
    var today=now.getFullYear()+'-'+_p2(now.getMonth()+1)+'-'+_p2(now.getDate());
    var d=document.getElementById(dateId);
    var t=document.getElementById(timeId);

    /* Date stepper */
    if(d){
      d.max=today; d.value=today;
      var _od=today;
      function _fmt(s){var x=new Date(s+'T00:00:00');return x.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
      function _shift(s,n){var x=new Date(s+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);}
      function _setOd(v){if(v>today)v=today;_od=v;d.value=_od;
        var lbl=document.getElementById('grp-date-label');if(lbl)lbl.textContent=_od===today?'Today':_fmt(_od);
        var nb=document.getElementById('grp-date-next');if(nb)nb.disabled=(_od>=today);}
      _setOd(today);
      var prev=document.getElementById('grp-date-prev');
      var next=document.getElementById('grp-date-next');
      var lbl=document.getElementById('grp-date-label');
      if(prev)prev.addEventListener('click',function(){_setOd(_shift(_od,-1));});
      if(next)next.addEventListener('click',function(){_setOd(_shift(_od,1));});
      if(lbl)lbl.addEventListener('click',function(){if(d.showPicker){try{d.showPicker();return;}catch(ex){}}d.click();});
      d.addEventListener('change',function(){_setOd(this.value||today);});
    }

    /* Time select */
    if(t&&t.tagName==='SELECT'){
      var mins=now.getHours()*60+now.getMinutes();
      var near=Math.round(mins/5)*5;if(near>1435)near=1435;
      var sel=_p2(Math.floor(near/60))+':'+_p2(near%60);
      t.innerHTML=_slotOptions(sel);t.value=sel;
    }
  }
  var COLORS=['#4a9abf','#e07820','#22c55e','#a855f7','#ef4444','#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'];
  function color(n){return COLORS[(n||'A').charCodeAt(0)%COLORS.length];}
  function e(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  var _children=[];

  function getIds(){
    var ss=sessionStorage.getItem('wren.ey.selection');
    if(ss)try{var sel=JSON.parse(ss);if(Date.now()-sel.timestamp<=30*60*1000&&sel.childIds&&sel.childIds.length)return sel.childIds;}catch(ex){}
    var qs=new URLSearchParams(window.location.search).get('children')||'';
    if(qs)return qs.split(',').map(Number).filter(Boolean);
    var old=sessionStorage.getItem('eyGroupSelection');
    if(old)try{return JSON.parse(old);}catch(ex){}
    return[];
  }

  function renderThumbs(){
    var strip=document.getElementById('grp-thumb-strip');
    if(!strip)return;
    strip.innerHTML=_children.map(function(c){
      var init=(c.first_name||'?').charAt(0).toUpperCase();
      var av=c.photo_url?'<div class="grp-thumb-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>':'<div class="grp-thumb-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      return'<div class="grp-thumb">'+av+'<span class="grp-thumb-name">'+e(c.first_name)+'</span></div>';
    }).join('');
    var titleEl=document.querySelector('.wren-app-topbar-title');
    if(titleEl)titleEl.textContent='Group Observation ('+_children.length+')';
  }

  function wireTopbar(){
    var tb=document.getElementById('wren-app-topbar')||document.querySelector('.wren-app-topbar');
    if(!tb)return;
    var closeBtn=document.createElement('button');
    closeBtn.id='grp-topbar-close';closeBtn.setAttribute('aria-label','Close');closeBtn.innerHTML='✕';
    closeBtn.innerHTML='&#8592;';
    closeBtn.addEventListener('click',function(){Wren.navigate('/ey/home');});
    tb.insertBefore(closeBtn,tb.firstChild);
    var saveBtn=document.createElement('button');
    saveBtn.id='grp-topbar-save';saveBtn.textContent='Save';
    saveBtn.addEventListener('click',doSave);
    var actions=tb.querySelector('.wren-app-topbar-actions');
    if(actions)actions.insertBefore(saveBtn,actions.firstChild);else tb.appendChild(saveBtn);
  }

  function wireEyfsChips(){
    document.querySelectorAll('.grp-eyfs-chip').forEach(function(chip){
      chip.addEventListener('click',function(){
        chip.classList.toggle('active');
      });
    });
  }

  function doSave(){
    var saveBtn=document.getElementById('grp-topbar-save');
    if(saveBtn)saveBtn.disabled=true;
    var text=document.getElementById('grp-text').value.trim();
    if(!text){
      Wren.toast('Please enter an observation','error');
      if(saveBtn)saveBtn.disabled=false;
      return;
    }
    var ids=_children.map(function(c){return c.id;});
    var date=document.getElementById('grp-date').value||new Date().toISOString().slice(0,10);
    var time=document.getElementById('grp-time').value;
    var nextSteps=document.getElementById('grp-notes').value.trim()||null;
    var share=document.getElementById('grp-share').checked;
    var eyfsAreas=[];
    document.querySelectorAll('.grp-eyfs-chip.active').forEach(function(c){eyfsAreas.push(c.dataset.area);});
    var names=_children.map(function(c){return c.first_name;}).join(', ');
    var title='Group observation — '+names;
    Wren.api('/api/daily-diary/group',{
      method:'POST',
      body:JSON.stringify({child_ids:ids,type:'observation',date:date,
        common:{time:time,title:title,text:text,eyfs_areas:eyfsAreas,share:share},
        per_child:{},notes:nextSteps})
    }).then(function(res){
      sessionStorage.removeItem('wren.ey.selection');
      Wren.toast('Observation saved for '+res.created+' '+(res.created===1?'child':'children'),'success');
      setTimeout(function(){Wren.navigate('/ey/home');},1200);
    }).catch(function(err){
      if(saveBtn)saveBtn.disabled=false;
      Wren.toast('Could not save: '+(err.message||'error'),'error');
    });
  }

  document.addEventListener('wren:ready',function(){
    wireTopbar();
    wireEyfsChips();
    initGrpDateTime('grp-date','grp-time');
    var ids=getIds();
    if(!ids.length){Wren.toast('No children selected','error');setTimeout(function(){Wren.navigate('/ey/home');},1500);return;}
    Wren.api('/api/children').then(function(data){
      var all=Array.isArray(data)?data:(data&&data.rows?data.rows:[]);
      _children=all.filter(function(c){return ids.indexOf(c.id)!==-1;});
      renderThumbs();
    });
  });
}());
</script>
</body>
</html>
