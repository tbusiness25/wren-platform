<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="group-sleep">
  <meta name="wren-app-title"         content="Group Sleep">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Group Sleep · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260515">
  <style>
    #grp-page { padding: 0 0 env(safe-area-inset-bottom,0); }

    #grp-topbar-close {
      width:44px;height:44px;background:transparent;border:none;
      color:var(--c-muted);font-size:1.1rem;cursor:pointer;border-radius:10px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;
    }
    #grp-topbar-close:hover { background:rgba(255,255,255,0.06);color:var(--c-text); }

    #grp-topbar-save {
      height:36px;padding:0 16px;background:var(--c-blue);border:none;border-radius:10px;
      color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s;
    }
    #grp-topbar-save:hover  { opacity:.88; }
    #grp-topbar-save:disabled { opacity:.45;cursor:default; }

    #grp-form-body {
      overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px;
    }

    .grp-section { padding:14px 16px 0; }
    .grp-label {
      font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
      color:var(--c-muted);margin-bottom:8px;display:block;
    }

    /* Child thumbnail strip */
    #grp-thumb-strip {
      display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;
      border-bottom:1px solid var(--c-border);
    }
    .grp-thumb {
      display:flex;flex-direction:column;align-items:center;gap:4px;
    }
    .grp-thumb-av {
      width:48px;height:48px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;
    }
    .grp-thumb-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-thumb-name {
      font-size:.7rem;color:var(--c-muted);text-align:center;
      max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }

    /* Form inputs */
    .grp-input {
      background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;
      color:var(--c-text);font-size:.9rem;padding:0 10px;height:40px;outline:none;
    }
    .grp-input:focus { border-color:var(--c-blue); }
    select.grp-input { cursor:pointer; }

    .grp-row { display:flex;gap:8px;align-items:center; }
    .grp-row .grp-input { flex:1; }

    textarea.grp-input {
      height:auto;min-height:90px;padding:10px;resize:vertical;
      width:100%;box-sizing:border-box;line-height:1.5;
    }

    /* Per-child overrides table */
    #grp-per-child { border-top:1px solid var(--c-border);margin-top:14px; }
    .grp-per-child-row {
      display:flex;align-items:center;gap:10px;
      padding:10px 16px;border-bottom:1px solid var(--c-border);
    }
    .grp-per-child-av {
      width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;
    }
    .grp-per-child-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-per-child-name { flex:1;font-size:.88rem;color:var(--c-text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .grp-per-child-input {
      background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;
      color:var(--c-text);font-size:.85rem;padding:0 8px;height:36px;outline:none;
      width:100px;flex-shrink:0;
    }
    .grp-per-child-input:focus { border-color:var(--c-blue); }
    select.grp-per-child-input { cursor:pointer; }
  </style>
</head>
<body>

<div id="grp-page">
  <!-- Child thumbnails -->
  <div id="grp-thumb-strip"></div>

  <!-- Form body -->
  <div id="grp-form-body">

    <div class="grp-section">
      <span class="grp-label">Start time</span>
      <div class="grp-row">
        <select class="grp-input" id="grp-start" aria-label="Sleep start time"></select>
        <span style="color:var(--c-muted);font-size:.85rem">to</span>
        <select class="grp-input" id="grp-end" aria-label="Default wake time"></select>
      </div>
    </div>

    <div class="grp-section">
      <span class="grp-label">Status</span>
      <select class="grp-input" id="grp-status" style="width:100%">
        <option value="sound">Sound asleep</option>
        <option value="restless">Restless</option>
        <option value="woke">Woke early</option>
      </select>
    </div>

    <div id="grp-per-child" hidden>
      <div class="grp-section" style="padding-bottom:10px">
        <span class="grp-label">Per-child wake time</span>
      </div>
    </div>

    <div class="grp-section">
      <span class="grp-label">Notes (all children)</span>
      <textarea class="grp-input" id="grp-notes" placeholder="Optional notes…"></textarea>
    </div>

  </div>
</div>

<script src="/js/wren-core.js?v=20260515" defer></script>
<script src="/js/wren-app-shell.js?v=20260515" defer></script>
<script>
(function () {
  'use strict';

  var COLORS = ['#4a9abf','#e07820','#22c55e','#a855f7','#ef4444','#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'];
  function color(n) { return COLORS[(n||'A').charCodeAt(0) % COLORS.length]; }
  function e(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function nowHHMM() {
    var d = new Date();
    return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  }

  /* 5-min-slot dropdown helpers */
  function _p2(n){return(n<10?'0':'')+n;}
  function nearestSlot(hhmm){
    var mins;
    if(hhmm&&/^\d{1,2}:\d{2}$/.test(hhmm)){var p=hhmm.split(':');mins=(+p[0])*60+(+p[1]);}
    else{var d=new Date();mins=d.getHours()*60+d.getMinutes();}
    var near=Math.round(mins/5)*5;if(near>1435)near=1435;if(near<0)near=0;
    return _p2(Math.floor(near/60))+':'+_p2(near%60);
  }
  function slotOptionsHtml(sel){
    var html='';
    for(var m=0;m<1440;m+=5){var v=_p2(Math.floor(m/60))+':'+_p2(m%60);html+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';}
    return html;
  }
  function fillSlotSelect(el,val){
    if(!el||el.tagName!=='SELECT')return;
    var sel=nearestSlot(val);
    el.innerHTML=slotOptionsHtml(sel);
    el.value=sel;
  }

  var _children = [];  // { id, first_name, last_name, photo_url }

  function getIds() {
    var ss = sessionStorage.getItem('wren.ey.selection');
    if (ss) try { var sel=JSON.parse(ss); if(Date.now()-sel.timestamp<=30*60*1000&&sel.childIds&&sel.childIds.length) return sel.childIds; } catch(ex){}
    var qs = new URLSearchParams(window.location.search).get('children') || '';
    if (qs) return qs.split(',').map(Number).filter(Boolean);
    var old = sessionStorage.getItem('eyGroupSelection');
    if (old) try { return JSON.parse(old); } catch(ex){}
    return [];
  }

  function renderThumbs() {
    var strip = document.getElementById('grp-thumb-strip');
    if (!strip) return;
    strip.innerHTML = _children.map(function(c) {
      var init = (c.first_name||'?').charAt(0).toUpperCase();
      var av = c.photo_url
        ? '<div class="grp-thumb-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>'
        : '<div class="grp-thumb-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      return '<div class="grp-thumb">'+av+'<span class="grp-thumb-name">'+e(c.first_name)+'</span></div>';
    }).join('');
    // Update topbar title
    var titleEl = document.querySelector('.wren-app-topbar-title');
    if (titleEl) titleEl.textContent = 'Group Sleep (' + _children.length + ')';
  }

  function renderPerChild() {
    var container = document.getElementById('grp-per-child');
    if (!container) return;
    if (_children.length < 2) { container.hidden = true; return; }
    container.hidden = false;
    // Remove old rows
    container.querySelectorAll('.grp-per-child-row').forEach(function(r){ r.remove(); });
    var endVal = document.getElementById('grp-end').value || '';
    _children.forEach(function(c) {
      var init = (c.first_name||'?').charAt(0).toUpperCase();
      var av = c.photo_url
        ? '<div class="grp-per-child-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>'
        : '<div class="grp-per-child-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      var row = document.createElement('div');
      row.className = 'grp-per-child-row';
      row.innerHTML = av +
        '<span class="grp-per-child-name">'+e(c.first_name)+' '+e((c.last_name||'').charAt(0))+'.</span>' +
        '<select class="grp-per-child-input" data-child-id="'+c.id+'" aria-label="Wake time for '+e(c.first_name)+'">'+slotOptionsHtml(nearestSlot(endVal))+'</select>';
      container.appendChild(row);
    });
  }

  function wireTopbar() {
    var shell = document.getElementById('wren-app-topbar')||document.querySelector('.wren-app-topbar') || document.body;
    var closeBtn = document.createElement('button');
    closeBtn.id = 'grp-topbar-close';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.innerHTML = '✕';
    closeBtn.innerHTML = '&#8592;';
    closeBtn.addEventListener('click', function(){ Wren.navigate('/ey/home'); });

    var saveBtn = document.createElement('button');
    saveBtn.id = 'grp-topbar-save';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', doSave);

    var tb = document.getElementById('wren-app-topbar')||document.querySelector('.wren-app-topbar');
    if (tb) {
      tb.insertBefore(closeBtn, tb.firstChild);
      var actions = tb.querySelector('.wren-app-topbar-actions');
      if (actions) actions.insertBefore(saveBtn, actions.firstChild);
      else tb.appendChild(saveBtn);
    }
  }

  function doSave() {
    var saveBtn = document.getElementById('grp-topbar-save');
    if (saveBtn) saveBtn.disabled = true;

    var ids    = _children.map(function(c){ return c.id; });
    var start  = document.getElementById('grp-start').value;
    var defEnd = document.getElementById('grp-end').value;
    var status = document.getElementById('grp-status').value;
    var notes  = document.getElementById('grp-notes').value.trim() || null;

    var perChild = {};
    document.querySelectorAll('.grp-per-child-input[data-child-id]').forEach(function(inp) {
      var cid = inp.dataset.childId;
      if (inp.value && inp.value !== defEnd) perChild[cid] = { end: inp.value };
    });

    var today = new Date().toISOString().slice(0,10);
    Wren.api('/api/daily-diary/group', {
      method: 'POST',
      body: JSON.stringify({
        child_ids: ids,
        type: 'sleep',
        date: today,
        common: { start: start, end: defEnd, status: status, share: true },
        per_child: perChild,
        notes: notes,
      })
    }).then(function(res) {
      sessionStorage.removeItem('wren.ey.selection');
      Wren.toast('Sleep check saved for ' + res.created + ' ' + (res.created===1?'child':'children'), 'success');
      setTimeout(function(){ Wren.navigate('/ey/home'); }, 1200);
    }).catch(function(err) {
      if (saveBtn) saveBtn.disabled = false;
      Wren.toast('Could not save: ' + (err.message || 'error'), 'error');
    });
  }

  document.addEventListener('wren:ready', function() {
    wireTopbar();

    fillSlotSelect(document.getElementById('grp-start'), nowHHMM());
    // default end = 90 mins later
    var d = new Date(); d.setMinutes(d.getMinutes()+90);
    fillSlotSelect(document.getElementById('grp-end'), ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2));

    // Sync per-child rows when end changes
    document.getElementById('grp-end').addEventListener('change', function() {
      document.querySelectorAll('.grp-per-child-input[data-child-id]').forEach(function(inp){
        inp.value = this.value;
      }.bind(this));
    });

    var ids = getIds();
    if (!ids.length) {
      Wren.toast('No children selected', 'error');
      setTimeout(function(){ Wren.navigate('/ey/home'); }, 1500);
      return;
    }

    Wren.api('/api/children').then(function(data) {
      var all = Array.isArray(data) ? data : (data && data.rows ? data.rows : []);
      _children = all.filter(function(c){ return ids.indexOf(c.id) !== -1; });
      renderThumbs();
      renderPerChild();
    });
  });
}());
</script>
</body>
</html>
