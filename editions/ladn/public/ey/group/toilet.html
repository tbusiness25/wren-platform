<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="group-toilet">
  <meta name="wren-app-title"         content="Group Toileting">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Group Toileting · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260515">
  <style>
    #grp-page { padding:0 0 env(safe-area-inset-bottom,0); }
    #grp-topbar-close {
      width:44px;height:44px;background:transparent;border:none;
      color:var(--c-muted);font-size:1.1rem;cursor:pointer;border-radius:10px;
      display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;
    }
    #grp-topbar-close:hover { background:rgba(255,255,255,0.06);color:var(--c-text); }
    #grp-topbar-save {
      height:36px;padding:0 16px;background:var(--c-blue);border:none;border-radius:10px;
      color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s;
    }
    #grp-topbar-save:hover  { opacity:.88; }
    #grp-topbar-save:disabled { opacity:.45;cursor:default; }
    #grp-form-body { overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 40px; }
    .grp-section { padding:14px 16px 0; }
    .grp-label { font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);margin-bottom:8px;display:block; }
    #grp-thumb-strip { display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;border-bottom:1px solid var(--c-border); }
    .grp-thumb { display:flex;flex-direction:column;align-items:center;gap:4px; }
    .grp-thumb-av { width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0; }
    .grp-thumb-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-thumb-name { font-size:.7rem;color:var(--c-muted);text-align:center;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .grp-input { background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;color:var(--c-text);font-size:.9rem;padding:0 10px;height:40px;outline:none; }
    .grp-input:focus { border-color:var(--c-blue); }
    select.grp-input { cursor:pointer; }
    textarea.grp-input { height:auto;min-height:90px;padding:10px;resize:vertical;width:100%;box-sizing:border-box;line-height:1.5; }
    #grp-per-child { border-top:1px solid var(--c-border);margin-top:14px; }
    .grp-per-child-row { display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--c-border); }
    .grp-per-child-av { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden; }
    .grp-per-child-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
    .grp-per-child-name { flex:1;font-size:.88rem;color:var(--c-text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .grp-per-child-input { background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;color:var(--c-text);font-size:.85rem;padding:0 8px;height:36px;outline:none;flex-shrink:0;cursor:pointer; }
    .grp-per-child-input:focus { border-color:var(--c-blue); }
  </style>
</head>
<body>
<div id="grp-page">
  <div id="grp-thumb-strip"></div>
  <div id="grp-form-body">
    <div class="grp-section">
      <span class="grp-label">Time</span>
      <select class="grp-input" id="grp-time" style="width:120px" aria-label="Time"></select>
    </div>
    <div class="grp-section">
      <span class="grp-label">Outcome (default for all)</span>
      <select class="grp-input" id="grp-outcome" style="width:100%">
        <option value="toilet">Used toilet / potty</option>
        <option value="clean">Dry / no change</option>
        <option value="wet">Wet accident</option>
        <option value="soiled">Soiled accident</option>
      </select>
    </div>
    <div id="grp-per-child" hidden>
      <div class="grp-section" style="padding-bottom:10px">
        <span class="grp-label">Per-child outcome</span>
      </div>
    </div>
    <div class="grp-section">
      <span class="grp-label">Notes (all children)</span>
      <textarea class="grp-input" id="grp-notes" placeholder="Optional notes…"></textarea>
    </div>
  </div>
</div>
<script src="/js/wren-core.js?v=20260515" defer></script>
<script src="/js/wren-app-shell.js?v=20260515" defer></script>
<script>
(function(){
  'use strict';
  /* Time is a 5-min-slot dropdown defaulting to nearest current slot */
  function _p2(n){return(n<10?'0':'')+n;}
  function initGrpTime(timeId){
    var t=document.getElementById(timeId);
    if(!t||t.tagName!=='SELECT')return;
    var now=new Date();var mins=now.getHours()*60+now.getMinutes();
    var near=Math.round(mins/5)*5;if(near>1435)near=1435;
    var sel=_p2(Math.floor(near/60))+':'+_p2(near%60);
    var html='';for(var m=0;m<1440;m+=5){var v=_p2(Math.floor(m/60))+':'+_p2(m%60);html+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';}
    t.innerHTML=html;t.value=sel;
  }
  var COLORS=['#4a9abf','#e07820','#22c55e','#a855f7','#ef4444','#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'];
  function color(n){return COLORS[(n||'A').charCodeAt(0)%COLORS.length];}
  function e(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  var OUTCOMES=['toilet','clean','wet','soiled'];
  var _children=[];

  function getIds(){
    var ss=sessionStorage.getItem('wren.ey.selection');
    if(ss)try{var sel=JSON.parse(ss);if(Date.now()-sel.timestamp<=30*60*1000&&sel.childIds&&sel.childIds.length)return sel.childIds;}catch(ex){}
    var qs=new URLSearchParams(window.location.search).get('children')||'';
    if(qs)return qs.split(',').map(Number).filter(Boolean);
    var old=sessionStorage.getItem('eyGroupSelection');
    if(old)try{return JSON.parse(old);}catch(ex){}
    return[];
  }

  function renderThumbs(){
    var strip=document.getElementById('grp-thumb-strip');
    if(!strip)return;
    strip.innerHTML=_children.map(function(c){
      var init=(c.first_name||'?').charAt(0).toUpperCase();
      var av=c.photo_url?'<div class="grp-thumb-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>':'<div class="grp-thumb-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      return'<div class="grp-thumb">'+av+'<span class="grp-thumb-name">'+e(c.first_name)+'</span></div>';
    }).join('');
    var titleEl=document.querySelector('.wren-app-topbar-title');
    if(titleEl)titleEl.textContent='Group Toileting ('+_children.length+')';
  }

  function renderPerChild(){
    var container=document.getElementById('grp-per-child');
    if(!container)return;
    if(_children.length<2){container.hidden=true;return;}
    container.hidden=false;
    container.querySelectorAll('.grp-per-child-row').forEach(function(r){r.remove();});
    var defOut=document.getElementById('grp-outcome').value;
    _children.forEach(function(c){
      var init=(c.first_name||'?').charAt(0).toUpperCase();
      var av=c.photo_url?'<div class="grp-per-child-av"><img src="'+e(c.photo_url)+'" alt="'+e(c.first_name)+'"></div>':'<div class="grp-per-child-av" style="background:'+color(init)+'">'+e(init)+'</div>';
      var opts=OUTCOMES.map(function(o){
        var label=o.charAt(0).toUpperCase()+o.slice(1);
        return'<option value="'+e(o)+'"'+(o===defOut?' selected':'')+'>'+e(label)+'</option>';
      }).join('');
      var row=document.createElement('div');
      row.className='grp-per-child-row';
      row.innerHTML=av+'<span class="grp-per-child-name">'+e(c.first_name)+' '+e((c.last_name||'').charAt(0))+'.</span><select class="grp-per-child-input" data-child-id="'+c.id+'" aria-label="Outcome for '+e(c.first_name)+'">'+opts+'</select>';
      container.appendChild(row);
    });
    document.getElementById('grp-outcome').addEventListener('change',function(){
      document.querySelectorAll('.grp-per-child-input[data-child-id]').forEach(function(inp){inp.value=document.getElementById('grp-outcome').value;});
    });
  }

  function wireTopbar(){
    var tb=document.getElementById('wren-app-topbar')||document.querySelector('.wren-app-topbar');
    if(!tb)return;
    var closeBtn=document.createElement('button');
    closeBtn.id='grp-topbar-close';closeBtn.setAttribute('aria-label','Close');closeBtn.innerHTML='✕';
    closeBtn.innerHTML='&#8592;';
    closeBtn.addEventListener('click',function(){Wren.navigate('/ey/home');});
    tb.insertBefore(closeBtn,tb.firstChild);
    var saveBtn=document.createElement('button');
    saveBtn.id='grp-topbar-save';saveBtn.textContent='Save';
    saveBtn.addEventListener('click',doSave);
    var actions=tb.querySelector('.wren-app-topbar-actions');
    if(actions)actions.insertBefore(saveBtn,actions.firstChild);else tb.appendChild(saveBtn);
  }

  function doSave(){
    var saveBtn=document.getElementById('grp-topbar-save');
    if(saveBtn)saveBtn.disabled=true;
    var ids=_children.map(function(c){return c.id;});
    var time=document.getElementById('grp-time').value;
    var defOut=document.getElementById('grp-outcome').value;
    var notes=document.getElementById('grp-notes').value.trim()||null;
    var perChild={};
    document.querySelectorAll('.grp-per-child-input[data-child-id]').forEach(function(inp){
      if(inp.value&&inp.value!==defOut)perChild[inp.dataset.childId]={outcome:inp.value};
    });
    Wren.api('/api/daily-diary/group',{
      method:'POST',
      body:JSON.stringify({child_ids:ids,type:'toilet',date:new Date().toISOString().slice(0,10),
        common:{time:time,outcome:defOut,share:true},per_child:perChild,notes:notes})
    }).then(function(res){
      sessionStorage.removeItem('wren.ey.selection');
      Wren.toast('Toileting logged for '+res.created+' '+(res.created===1?'child':'children'),'success');
      setTimeout(function(){Wren.navigate('/ey/home');},1200);
    }).catch(function(err){
      if(saveBtn)saveBtn.disabled=false;
      Wren.toast('Could not save: '+(err.message||'error'),'error');
    });
  }

  document.addEventListener('wren:ready',function(){
    wireTopbar();
    initGrpTime('grp-time');
    var ids=getIds();
    if(!ids.length){Wren.toast('No children selected','error');setTimeout(function(){Wren.navigate('/ey/home');},1500);return;}
    Wren.api('/api/children').then(function(data){
      var all=Array.isArray(data)?data:(data&&data.rows?data.rows:[]);
      _children=all.filter(function(c){return ids.indexOf(c.id)!==-1;});
      renderThumbs();renderPerChild();
    });
  });
}());
</script>
</body>
</html>
