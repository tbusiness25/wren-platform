<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"  content="ladn">
  <meta name="wren-app-page" content="home">
  <meta name="wren-app-title" content="Children">
  <meta name="wren-app-chat" content="on">
  <title>Children · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    /* ── EY Home page ─────────────────────────────────────────────────────────── */
    #ey-home-page { padding: 0; }

    /* Search bar */
    #ey-search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
    }
    #ey-search-bar[hidden] { display: none; }
    #ey-search-input {
      flex: 1;
      height: 40px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      color: var(--c-text);
      font-size: .95rem;
      padding: 0 12px;
      outline: none;
    }
    #ey-search-input:focus { border-color: var(--c-blue); }
    #ey-search-input::placeholder { color: var(--c-muted); }
    #ey-search-close {
      min-width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      color: var(--c-muted);
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    #ey-search-close:hover { background: rgba(255,255,255,0.08); color: var(--c-text); }

    /* Status filter row (Scheduled · In · Key Child) */
    #ey-status-filters {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 0;
      background: var(--c-navy-mid);
      flex-wrap: wrap;
    }

    /* Group-diary default bar (shown only when nothing selected) */
    #ey-group-default-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
      flex-wrap: wrap;
    }
    #ey-group-default-bar[hidden] { display: none; }
    #ey-group-default-label {
      flex: 1;
      font-size: .84rem;
      color: var(--c-muted);
      white-space: nowrap;
    }
    #ey-group-diary-btn {
      height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--c-amber);
      background: var(--c-amber);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    #ey-group-diary-btn:hover { opacity: .9; }

    /* Filter row */
    #ey-home-filters {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
      flex-wrap: wrap;
    }
    #ey-room-chips {
      display: flex;
      gap: 6px;
      flex: 1;
      flex-wrap: wrap;
    }
    .ey-chip {
      height: 34px;
      padding: 0 14px;
      border-radius: 17px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-muted);
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }
    .ey-chip.active {
      background: var(--c-blue);
      border-color: var(--c-blue);
      color: #fff;
    }
    .ey-chip:not(.active):hover {
      background: rgba(74,154,191,0.12);
      border-color: var(--c-blue);
      color: var(--c-text);
    }
    /* Date stepper (tap-first: ‹ label › pattern) */
    .ey-date-stepper {
      display: flex; align-items: center; gap: 2px;
      background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 10px;
    }
    .ey-date-stepper button {
      min-width: 44px; min-height: 44px; background: none; border: none;
      color: var(--c-text); cursor: pointer; padding: 0 8px; border-radius: 10px;
      transition: background .15s;
    }
    .ey-date-stepper button:hover { background: rgba(255,255,255,0.06); }
    #ey-date-prev, #ey-date-next { font-size: 1.25rem; line-height: 1; }
    #ey-date-label { font-size: .82rem; font-weight: 700; min-width: 80px; text-align: center; }
    .ey-date-stepper button:disabled { opacity: .3; cursor: default; }
    #ey-date-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; border: 0; padding: 0; }

    /* Multi-select bar */
    #ey-multiselect-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--c-navy);
      border-bottom: 1px solid var(--c-border);
      flex-wrap: wrap;
    }
    #ey-multiselect-bar[hidden] { display: none; }
    #ey-multiselect-count {
      flex: 1;
      font-size: .9rem;
      font-weight: 600;
      color: var(--c-text);
      white-space: nowrap;
    }
    .ey-ms-btn {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text);
      font-size: .84rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .ey-ms-btn:hover { background: rgba(255,255,255,0.06); }
    /* Context-aware primary action (EyLog default: learning journey for one
     * child, group daily diary for many). "Log →" is now the secondary path to
     * the granular action sheet, so it falls back to the neutral .ey-ms-btn style. */
    #ey-ms-primary-btn {
      background: var(--c-blue);
      border-color: var(--c-blue);
      color: #fff;
      font-weight: 600;
    }
    #ey-ms-primary-btn:hover { opacity: .88; }


    /* Child grid — ELog density */
    #ey-child-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      padding: 12px;
    }
    @media (orientation: landscape) and (min-width: 768px) {
      #ey-child-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }

    /* Child card — ELog style, tap-to-select */
    .ey-child-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px 10px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      cursor: pointer;
      min-height: 0;
      transition: background .15s, border-color .15s, transform .1s;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .ey-child-card:hover  { background: rgba(255,255,255,0.04); }
    .ey-child-card:active { transform: scale(0.95); }
    .ey-child-card:focus-visible {
      outline: 2px solid var(--c-blue);
      outline-offset: 2px;
    }
    /* Selected state: blue ring around avatar wrapper + dim card slightly */
    .ey-child-card.selected { background: rgba(74,154,191,0.10); }
    .ey-child-card.selected .ey-child-avatar-wrap { outline: 3px solid var(--c-blue); }
    /* Checkmark badge — top-right of avatar circle */
    .ey-child-card.selected .ey-child-avatar-wrap::after {
      content: '✓';
      position: absolute;
      top: -3px;
      right: -3px;
      width: 20px;
      height: 20px;
      background: var(--c-blue);
      border-radius: 50%;
      font-size: .68rem;
      color: #fff;
      line-height: 20px;
      text-align: center;
      border: 2px solid var(--c-navy);
    }

    /* Avatar wrapper — relative for checkmark badge positioning */
    .ey-child-avatar-wrap {
      position: relative;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    /* Sign-in/out button — below avatar, separate from tap-to-select */
    .ey-signin-btn {
      min-width: 72px;
      height: 28px;
      border: none;
      border-radius: 12px;
      font-size: .72rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ey-signin-btn:hover { opacity: .85; }
    .ey-signin-btn:active { transform: scale(0.95); }
    .ey-signin-btn.sign-in { background: var(--c-green); }
    .ey-signin-btn.sign-out { background: var(--c-red); }
    /* Fallback Sign In for children with no booking today (safety net) —
       secondary/outline style so it reads as available but not "expected". */
    .ey-signin-btn.sign-in-alt {
      background: transparent;
      color: var(--c-green);
      border: 1.5px solid var(--c-green);
    }
    .ey-signin-btn.sign-in-alt:hover { background: rgba(34,197,94,.12); opacity: 1; }

    /* Avatar */
    .ey-child-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .ey-child-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .ey-child-name {
      font-size: .82rem;
      font-weight: 600;
      color: var(--c-text);
      text-align: center;
      line-height: 1.2;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 2px;
    }
    .ey-child-age {
      font-size: .73rem;
      color: var(--c-muted);
    }
    .ey-room-badge {
      font-size: .68rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .ey-room-badge.baby {
      background: rgba(74,154,191,0.18);
      color: var(--c-blue);
    }
    .ey-room-badge.pre {
      background: rgba(224,120,32,0.18);
      color: var(--c-amber);
    }
    .ey-room-badge.other {
      background: rgba(255,255,255,0.08);
      color: var(--c-muted);
    }

    /* Skeleton card */
    .ey-skeleton-card {
      min-height: 120px;
      border-radius: 12px;
    }

    /* ── Action bottom sheet ─────────────────────────────────────────────────── */
    #ey-action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #ey-action-sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    #ey-action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e293b;
      border-radius: 20px 20px 0 0;
      border-top: 1px solid #2d3748;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      z-index: 201;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(0.32,0.72,0,1);
    }
    #ey-action-sheet.open {
      transform: translateY(0);
    }
    .ey-action-sheet-handle {
      width: 36px;
      height: 4px;
      background: #4a5568;
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .ey-action-sheet-title {
      text-align: center;
      padding: 10px 16px 6px;
      font-size: .9rem;
      color: var(--c-muted);
    }
    .ey-action-sheet-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #2d3748;
      border-top: 1px solid #2d3748;
      margin-top: 8px;
    }
    .ey-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 18px 8px;
      background: #1e293b;
      border: none;
      cursor: pointer;
      color: var(--c-text);
      font-size: .82rem;
      font-weight: 600;
      transition: background .15s;
    }
    .ey-action-btn:hover, .ey-action-btn:active { background: rgba(74,154,191,0.12); }
    .ey-action-btn-icon { font-size: 1.6rem; line-height: 1; }
    .ey-action-sheet-cancel {
      display: block;
      width: 100%;
      padding: 16px;
      background: #1e293b;
      border: none;
      border-top: 1px solid #2d3748;
      color: #ef4444;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background .15s;
    }
    .ey-action-sheet-cancel:hover { background: rgba(239,68,68,0.08); }

    /* ── Daily tasks alert bar ───────────────────────────────────────────────── */
    #daily-tasks-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 8px 12px;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
    }
    #daily-tasks-bar:empty,
    #daily-tasks-bar[hidden] { display: none; }
    #daily-tasks-bar::-webkit-scrollbar { display: none; }
    .dt-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding: 7px 12px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
      white-space: nowrap;
      animation: dt-pulse 2.5s ease-in-out infinite;
    }
    .dt-chip:hover { opacity: .85; }
    .dt-chip.dt-red    { background: rgba(248,113,113,.15); color: var(--c-red);    border: 1px solid rgba(248,113,113,.3); }
    .dt-chip.dt-amber  { background: rgba(251,191,36,.12);  color: var(--c-amber);  border: 1px solid rgba(251,191,36,.3);  }
    .dt-chip.dt-orange { background: rgba(240,195,74,.12);  color: var(--c-orange); border: 1px solid rgba(240,195,74,.3);  }
    @keyframes dt-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .7; }
    }
  </style>
</head>
<body data-portal="ey">

<div id="ey-home-page">

  <!-- Daily tasks alert bar — time-triggered, hidden when all complete or before trigger time -->
  <div id="daily-tasks-bar" role="region" aria-label="Pending daily tasks" aria-live="polite"></div>

  <!-- Search bar (hidden until activated) -->
  <div id="ey-search-bar" hidden role="search" aria-label="Search children">
    <input type="search" id="ey-search-input"
           placeholder="Search by name or room…"
           autocomplete="off"
           aria-label="Search children">
    <button id="ey-search-close" aria-label="Close search">✕</button>
  </div>

  <!-- Status filter chips (EyLog-style: Scheduled · In · Key Child) -->
  <div id="ey-status-filters" role="group" aria-label="Filter by status">
    <button class="ey-chip" data-status=""          aria-pressed="false">All</button>
    <button class="ey-chip" data-status="scheduled" aria-pressed="false">Scheduled</button>
    <button class="ey-chip" data-status="in"        aria-pressed="false">In</button>
    <button class="ey-chip" data-status="key"       aria-pressed="false">Key Child</button>
    <button class="ey-chip" data-status="new"       aria-pressed="false">New starters</button>
  </div>

  <!-- Room filter chips + date selector -->
  <div id="ey-home-filters" role="toolbar" aria-label="Filter children">
    <div id="ey-room-chips" role="group" aria-label="Filter by room">
      <button class="ey-chip" data-room=""  aria-pressed="false">All</button>
      <button class="ey-chip" data-room="1" aria-pressed="false">Baby Room</button>
      <button class="ey-chip" data-room="2" aria-pressed="false">Pre-school</button>
    </div>
    <div class="ey-date-stepper" role="group" aria-label="Select date">
      <button id="ey-date-prev" type="button" aria-label="Previous day">‹</button>
      <button id="ey-date-label" type="button" aria-label="Open date picker">Today</button>
      <button id="ey-date-next" type="button" aria-label="Next day">›</button>
      <input type="date" id="ey-date-input" aria-hidden="true" tabindex="-1">
    </div>
  </div>

  <!-- Default action when NO child is selected: Group Daily Diary (EyLog landing) -->
  <div id="ey-group-default-bar" role="region" aria-label="Group actions">
    <span id="ey-group-default-label">Nothing selected — log for the whole group:</span>
    <button id="ey-group-diary-btn" type="button">📖 Group Daily Diary</button>
  </div>

  <!-- Multi-select action bar (visible whenever 1+ child is selected) -->
  <div id="ey-multiselect-bar" hidden role="toolbar" aria-label="Multi-select actions">
    <span id="ey-multiselect-count" aria-live="polite" aria-atomic="true">0 children selected</span>
    <button class="ey-ms-btn" id="ey-select-all-btn" aria-label="Select or deselect all children">Select all</button>
    <button class="ey-ms-btn" id="ey-multiselect-cancel" aria-label="Cancel selection">Cancel</button>
    <button class="ey-ms-btn" id="ey-group-actions-btn">Log →</button>
    <!-- Context-aware primary action: 1 child → learning journey; 2+ → daily diary. Label set in _updateMsBar(). -->
    <button class="ey-ms-btn" id="ey-ms-primary-btn">Open →</button>
  </div>

  <!-- Child grid — populated by JS -->
  <div id="ey-child-grid" class="loading" role="list" aria-label="Children" aria-live="polite"></div>

</div><!-- #ey-home-page -->

<!-- Action bottom sheet — slides up when "Log →" tapped -->
<div id="ey-action-sheet-backdrop" aria-hidden="true"></div>
<div id="ey-action-sheet" role="dialog" aria-modal="true" aria-label="What would you like to log?" aria-hidden="true">
  <div class="ey-action-sheet-handle" role="presentation"></div>
  <div class="ey-action-sheet-title" id="ey-action-sheet-label">What would you like to do?</div>
  <div class="ey-action-sheet-grid" id="ey-action-sheet-grid">
    <button class="ey-action-btn" data-action="observation">
      <span class="ey-action-btn-icon" aria-hidden="true">📝</span>
      <span>Observation</span>
    </button>
    <button class="ey-action-btn" data-action="sleep">
      <span class="ey-action-btn-icon" aria-hidden="true">😴</span>
      <span>Sleep</span>
    </button>
    <button class="ey-action-btn" data-action="nappies">
      <span class="ey-action-btn-icon" aria-hidden="true">🍼</span>
      <span>Nappies</span>
    </button>
    <button class="ey-action-btn" data-action="food">
      <span class="ey-action-btn-icon" aria-hidden="true">🍽️</span>
      <span>Food</span>
    </button>
    <button class="ey-action-btn" data-action="bottle">
      <span class="ey-action-btn-icon" aria-hidden="true">🍶</span>
      <span>Bottle</span>
    </button>
    <button class="ey-action-btn" data-action="toilet">
      <span class="ey-action-btn-icon" aria-hidden="true">🚽</span>
      <span>Toileting</span>
    </button>
    <button class="ey-action-btn" data-action="diary">
      <span class="ey-action-btn-icon" aria-hidden="true">📖</span>
      <span>Diary</span>
    </button>
    <button class="ey-action-btn" data-action="register">
      <span class="ey-action-btn-icon" aria-hidden="true">📋</span>
      <span>Register</span>
    </button>
    <button class="ey-action-btn" data-action="signin-all">
      <span class="ey-action-btn-icon" aria-hidden="true">✅</span>
      <span>Sign in all</span>
    </button>
    <button class="ey-action-btn" data-action="signout-all">
      <span class="ey-action-btn-icon" aria-hidden="true">🚪</span>
      <span>Sign out all</span>
    </button>
    <button class="ey-action-btn" data-action="absent-all">
      <span class="ey-action-btn-icon" aria-hidden="true">🌙</span>
      <span>Mark absent</span>
    </button>
  </div>
  <button class="ey-action-sheet-cancel" id="ey-action-sheet-cancel">Cancel</button>
</div>

<script>
(function () {
  'use strict';

  /* ── State ────────────────────────────────────────────────────────────────── */
  var _all      = [];   // all active children from API
  var _filtered = [];   // current display list after filters
  var _roomFilter   = localStorage.getItem('eyHomeRoomFilter') || '';
  var _statusFilter = localStorage.getItem('eyHomeStatusFilter') || ''; // ''|scheduled|in|key
  var _query        = '';
  var _selected     = new Set();
  var _attendance   = {};     // child_id -> { scheduled:bool, in:bool }
  var _staffId      = _jwtStaffId();  // logged-in staff id (for Key Child filter)
  var _lpTimer      = null;   // long-press timer (opens child profile)
  var _lpFired      = false;  // did long-press fire (suppress click)?
  var LONG_PRESS_MS = 500;

  /* ── Logged-in staff id from JWT (for Key Child filter) ───────────────────── */
  function _jwtStaffId() {
    try {
      var tok = sessionStorage.getItem('wrenToken');
      if (!tok) return null;
      var p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      return (p && (p.id || p.staff_id)) || null;
    } catch (ex) { return null; }
  }

  /* ── Avatar colours (10 buckets by char code mod 10) ─────────────────────── */
  var AVATAR_COLORS = [
    '#4a9abf','#e07820','#22c55e','#a855f7','#ef4444',
    '#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'
  ];
  function _color(name) {
    return AVATAR_COLORS[(name || 'A').charCodeAt(0) % AVATAR_COLORS.length];
  }

  /* ── Age from DOB ─────────────────────────────────────────────────────────── */
  function _age(dob) {
    if (!dob) return '';
    var b = new Date(dob), n = new Date();
    var y = n.getFullYear() - b.getFullYear();
    var m = n.getMonth() - b.getMonth();
    if (m < 0) { y--; m += 12; }
    if (n.getDate() < b.getDate()) { m--; if (m < 0) { y--; m += 11; } }
    return y > 0 ? y + 'y ' + m + 'm' : m + 'm';
  }

  /* ── Room badge ───────────────────────────────────────────────────────────── */
  function _badge(roomName, roomId) {
    var n = (roomName || '').toLowerCase();
    if (n.indexOf('baby') !== -1 || String(roomId) === '1') return { label: 'Baby', cls: 'baby' };
    if (n.indexOf('pre')  !== -1 || String(roomId) === '2') return { label: 'Pre',  cls: 'pre'  };
    return { label: roomName || '', cls: 'other' };
  }

  /* ── HTML escape ──────────────────────────────────────────────────────────── */
  function _e(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Render grid ──────────────────────────────────────────────────────────── */
  function _render() {
    var grid = document.getElementById('ey-child-grid');
    if (!grid) return;

    /* apply filters */
    _filtered = _all.filter(function(c) {
      var roomOk = !_roomFilter || String(c.room_id) === _roomFilter;
      var q = _query.toLowerCase();
      var qOk = !q
        || (c.first_name || '').toLowerCase().indexOf(q) !== -1
        || (c.last_name  || '').toLowerCase().indexOf(q) !== -1
        || (c.room_name  || '').toLowerCase().indexOf(q) !== -1;

      /* New starters: children enrolled but not yet started (future start_date).
       * They stay in the system for comms but are HIDDEN from the room grid by
       * default; the "New starters" chip shows only them. (Toby 2026-06-17.) */
      var notStarted = c.started === false;

      /* Status filter — EyLog: Scheduled (booked today) · In (signed-in) · Key Child · New starters */
      var statusOk;
      if (_statusFilter === 'new') {
        statusOk = notStarted;
      } else if (notStarted) {
        statusOk = false;               // not-yet-started never shows in room views
      } else if (_statusFilter === 'scheduled') {
        var sa = _attendance[c.id];
        statusOk = !!(sa && sa.scheduled);
      } else if (_statusFilter === 'in') {
        var ia = _attendance[c.id];
        statusOk = !!(ia && ia.in);
      } else if (_statusFilter === 'key') {
        statusOk = _staffId != null && String(c.key_person_id) === String(_staffId);
      } else {
        statusOk = true;
      }
      return roomOk && qOk && statusOk;
    });

    grid.classList.remove('loading');

    /* empty state */
    if (!_filtered.length) {
      var msg = _all.length === 0
        ? 'No children yet — <a href="/admin/children" style="color:var(--c-blue)">add some in the admin portal</a>'
        : 'No children match your filter.';
      grid.innerHTML =
        '<div class="app-empty-state" style="grid-column:1/-1">' +
        '  <div class="app-empty-state-icon">👶</div>' +
        '  <div class="app-empty-state-title">' + (_all.length === 0 ? 'No children yet' : 'No matches') + '</div>' +
        '  <div class="app-empty-state-msg">' + msg + '</div>' +
        '</div>';
      return;
    }

    grid.innerHTML = _filtered.map(function(c) {
      var init  = (c.first_name || '?').charAt(0).toUpperCase();
      var name  = _e(c.first_name) + ' ' + _e((c.last_name || '').charAt(0)) + '.';
      var age   = _age(c.date_of_birth);
      var bdg   = _badge(c.room_name, c.room_id);
      var col   = _color(init);
      var sel   = _selected.has(c.id);
      var aria  = _e(c.first_name + ' ' + c.last_name) +
                  (bdg.label ? ', ' + bdg.label + ' Room' : '') +
                  (age ? ', ' + age : '');

      var avatarInner = c.photo_url
        ? '<div class="ey-child-avatar"><img src="' + _e(c.photo_url) + '" alt="' + _e(c.first_name) + '" loading="lazy"></div>'
        : '<div class="ey-child-avatar" style="background:' + col + '" aria-hidden="true">' + _e(init) + '</div>';
      var avatar = '<div class="ey-child-avatar-wrap">' + avatarInner + '</div>';

      /* Sign-in/out button. Signed-in → Sign Out (red). Scheduled (booked today)
       * → Sign In (green primary). Otherwise → Sign In fallback (green outline)
       * so EVERY active child always has a working Sign In → Sign Out flow even
       * when there is no booking row for today (POST /sign-in upserts the row). */
      var at = _attendance[c.id] || {};
      var isSignedIn = !!at.in;       // has sign_in_time and no sign_out_time
      var isScheduled = !!at.scheduled;
      var signinHtml = '';
      if (isSignedIn) {
        signinHtml = '<button class="ey-signin-btn sign-out" data-child-id="' + c.id + '" data-status="in" type="button">Sign Out</button>';
      } else if (isScheduled) {
        signinHtml = '<button class="ey-signin-btn sign-in" data-child-id="' + c.id + '" data-status="scheduled" type="button">Sign In</button>';
      } else {
        signinHtml = '<button class="ey-signin-btn sign-in-alt" data-child-id="' + c.id + '" data-status="scheduled" type="button" title="No booking recorded for today — sign in anyway">Sign In</button>';
      }

      return '<div class="ey-child-card' + (sel ? ' selected' : '') + '"' +
             '     role="listitem"' +
             '     data-id="' + c.id + '"' +
             '     tabindex="0"' +
             '     aria-label="' + aria + '"' +
             '     aria-selected="' + sel + '">' +
             avatar +
             signinHtml +
             '<span class="ey-child-name" title="' + _e(c.first_name + ' ' + c.last_name) + '">' + name + '</span>' +
             (age  ? '<span class="ey-child-age">' + _e(age) + '</span>' : '') +
             (bdg.label ? '<span class="ey-room-badge ' + bdg.cls + '">' + _e(bdg.label) + '</span>' : '') +
             '</div>';
    }).join('');

    _attachCardEvents();
  }

  /* ── Card event listeners ─────────────────────────────────────────────────── */
  function _attachCardEvents() {
    var grid = document.getElementById('ey-child-grid');
    if (!grid) return;

    grid.querySelectorAll('.ey-child-card').forEach(function(card) {
      var id = parseInt(card.dataset.id, 10);

      /* Touch: long-press → open child profile (ELog pattern) */
      card.addEventListener('touchstart', function() {
        _lpFired = false;
        _lpTimer = setTimeout(function() {
          _lpFired = true;
          _lpTimer = null;
          /* Long-press: navigate to child profile page */
          Wren.navigate('/ey/child/' + id);
        }, LONG_PRESS_MS);
      }, { passive: true });

      card.addEventListener('touchend',  function() { clearTimeout(_lpTimer); }, { passive: true });
      card.addEventListener('touchmove', function() { clearTimeout(_lpTimer); _lpTimer = null; }, { passive: true });

      /* Single tap / click: always toggle selection (ELog tap-to-select) */
      card.addEventListener('click', function() {
        /* Suppress click that fired after long-press */
        if (_lpFired) { _lpFired = false; return; }
        _toggle(id);
        _render();
        _updateMsBar();
      });

      /* Keyboard: Space/Enter toggles selection; Ctrl+Enter opens profile */
      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (e.ctrlKey || e.metaKey) {
            Wren.navigate('/ey/child/' + id);
          } else {
            _toggle(id);
            _render();
            _updateMsBar();
          }
        }
      });
    });
  }

  /* ── Multi-select helpers ─────────────────────────────────────────────────── */
  function _exitMs() {
    _selected.clear();
    _clearSelection();
    var bar = document.getElementById('ey-multiselect-bar');
    if (bar) bar.hidden = true;
    _closeActionSheet();
    _render();
  }
  function _toggle(id) {
    if (_selected.has(id)) _selected.delete(id);
    else _selected.add(id);
    /* Persist on EVERY toggle so the +Observation FAB and the observation page
     * (which read sessionStorage['wren.ey.selection']) always see the live set,
     * not just when "Log →" is pressed. This was the multi-select bug: the set
     * was only saved on the action-sheet path, so FAB navigation lost it. */
    if (_selected.size) _saveSelection();
    else _clearSelection();
  }
  function _updateMsBar() {
    var n = _selected.size;
    var bar = document.getElementById('ey-multiselect-bar');
    var el  = document.getElementById('ey-multiselect-count');
    if (el) el.textContent = n + (n === 1 ? ' child selected' : ' children selected');
    if (bar) bar.hidden = (n === 0);
    /* Group-diary default bar: visible ONLY when nothing is selected (EyLog
     * landing falls back to the group daily diary when no child is picked). */
    var dflt = document.getElementById('ey-group-default-bar');
    if (dflt) dflt.hidden = (n !== 0);
    /* Update "Select all" label */
    var selAll = document.getElementById('ey-select-all-btn');
    if (selAll) selAll.textContent = (n === _filtered.length && n > 0) ? 'Deselect all' : 'Select all';
    /* Context-aware primary action label (EyLog parity): one child opens their
     * learning journey / next steps; two or more open the group daily diary. */
    var prim = document.getElementById('ey-ms-primary-btn');
    if (prim) prim.textContent = (n === 1) ? '📔 Learning journey →' : '📖 Daily diary →';
  }

  /* ── Selection state persistence (wren.ey.selection) ─────────────────────── */
  var SELECTION_KEY = 'wren.ey.selection';
  var SELECTION_TTL = 30 * 60 * 1000;

  function _saveSelection() {
    var roomId = _roomFilter === '1' ? 'baby' : (_roomFilter === '2' ? 'preschool' : '');
    sessionStorage.setItem(SELECTION_KEY, JSON.stringify({
      childIds: Array.from(_selected),
      roomId: roomId,
      timestamp: Date.now()
    }));
  }

  function _clearSelection() {
    sessionStorage.removeItem(SELECTION_KEY);
    sessionStorage.removeItem('eyGroupSelection');
  }

  function _loadSelection() {
    try {
      var raw = sessionStorage.getItem(SELECTION_KEY);
      if (!raw) return;
      var sel = JSON.parse(raw);
      if (Date.now() - sel.timestamp > SELECTION_TTL) {
        sessionStorage.removeItem(SELECTION_KEY);
        return;
      }
      if (sel.childIds && sel.childIds.length) {
        sel.childIds.forEach(function(id) { _selected.add(id); });
        _updateMsBar();
      }
    } catch(ex) {}
  }

  /* ── Room filter chips ────────────────────────────────────────────────────── */
  function _initChips() {
    document.querySelectorAll('#ey-room-chips .ey-chip').forEach(function(btn) {
      var active = btn.dataset.room === _roomFilter;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', String(active));

      btn.addEventListener('click', function() {
        _roomFilter = btn.dataset.room;
        localStorage.setItem('eyHomeRoomFilter', _roomFilter);
        document.querySelectorAll('#ey-room-chips .ey-chip').forEach(function(b) {
          var a = b.dataset.room === _roomFilter;
          b.classList.toggle('active', a);
          b.setAttribute('aria-pressed', String(a));
        });
        _render();
      });
    });
  }

  /* ── Status filter chips (Scheduled · In · Key Child) ─────────────────────── */
  function _syncStatusChips() {
    document.querySelectorAll('#ey-status-filters .ey-chip').forEach(function(b) {
      var a = (b.dataset.status || '') === _statusFilter;
      b.classList.toggle('active', a);
      b.setAttribute('aria-pressed', String(a));
    });
  }
  function _initStatusChips() {
    _syncStatusChips();
    document.querySelectorAll('#ey-status-filters .ey-chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        _statusFilter = btn.dataset.status || '';
        localStorage.setItem('eyHomeStatusFilter', _statusFilter);
        _syncStatusChips();
        _render();
      });
    });
  }

  /* ── Today's attendance (drives Scheduled / In chips) ─────────────────────── */
  function _loadAttendance() {
    Wren.api('/api/children/attendance/today').then(function(rows) {
      var list = Array.isArray(rows) ? rows : (rows && rows.rows ? rows.rows : []);
      var map = {};
      list.forEach(function(r) {
        var scheduled = (r.attendance_id != null) && !r.absent;
        var inNow     = !!(r.sign_in_time) && !r.sign_out_time;
        map[r.id] = { scheduled: scheduled, in: inNow, sign_in_time: r.sign_in_time, sign_out_time: r.sign_out_time };
      });
      _attendance = map;
      if (_statusFilter === 'scheduled' || _statusFilter === 'in') _render();
    }).catch(function() {
      _attendance = {};
    });
  }

  /* ── Sign-in/out helpers ───────────────────────────────────────────────────── */
  var _confirmTarget = null;  // pending sign-out target
  var _confirmEl = null;

  function _showConfirm(name, onConfirm, onCancel) {
    if (_confirmTarget) return;  // already showing
    _confirmTarget = { onConfirm: onConfirm || function(){}, onCancel: onCancel || function(){} };
    var overlay = document.createElement('div');
    overlay.id = 'ey-confirm-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;';
    var box = document.createElement('div');
    box.style.cssText = 'background:#1e293b;border-radius:16px;padding:24px 28px;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4);';
    box.innerHTML =
      '<p style="margin:0 0 16px;font-size:1rem;color:var(--c-text);font-weight:600;">Sign out <strong>' + name + '</strong>?</p>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;">' +
        '<button class="ey-confirm-cancel" style="padding:8px 20px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-surface);color:var(--c-text);cursor:pointer;font-weight:600;">Cancel</button>' +
        '<button class="ey-confirm-ok" style="padding:8px 20px;border:none;border-radius:8px;background:var(--c-red);color:#fff;cursor:pointer;font-weight:600;">OK</button>' +
      '</div>';
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    overlay.querySelector('.ey-confirm-cancel').onclick = function() { _hideConfirm(); _confirmTarget.onCancel(); };
    overlay.querySelector('.ey-confirm-ok').onclick = function() { _hideConfirm(); _confirmTarget.onConfirm(); };
  }
  function _hideConfirm() {
    if (document.getElementById('ey-confirm-overlay')) document.body.removeChild(document.getElementById('ey-confirm-overlay'));
    if (_confirmTarget) _confirmTarget = null;
    _confirmEl = null;
  }

  function _handleSignIn(childId) {
    Wren.api('/api/attendance/sign-in', { method: 'POST', body: { child_id: childId } }).then(function() {
      var at = _attendance[childId] || {};
      at.in = true; at.scheduled = true; at.sign_in_time = new Date().toISOString();
      _attendance[childId] = at;
      _render();
      if (window.Wren) Wren.toast('Signed in ✓', 'success');
    }).catch(function(e) {
      if (window.Wren) Wren.toast('Sign-in failed', 'error');
      console.error('[ey] sign-in error:', e);
    });
  }
  function _handleSignOut(childId, childName, btnEl) {
    _confirmEl = btnEl;
    _showConfirm(childName, function() {
      Wren.api('/api/attendance/sign-out', { method: 'POST', body: { child_id: childId } }).then(function() {
        var at = _attendance[childId] || {};
        at.in = false; at.sign_out_time = new Date().toISOString();
        _attendance[childId] = at;
        _render();
        if (window.Wren) Wren.toast('Signed out ✓', 'success');
      }).catch(function(e) {
        if (window.Wren) Wren.toast('Sign-out failed', 'error');
        console.error('[ey] sign-out error:', e);
      });
    });
  }

  /* ── Sign-in button event handling (document-level to catch dynamically added buttons) ── */
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('.ey-signin-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    var childId = parseInt(btn.dataset.childId, 10);
    var status  = btn.dataset.status; // 'in' or 'scheduled'
    /* Get child name from the parent card */
    var card = btn.closest('.ey-child-card');
    var nameEl = card ? card.querySelector('.ey-child-name') : null;
    var childName = nameEl ? nameEl.textContent.trim() : 'Child';

    if (status === 'in') {
      _handleSignOut(childId, childName, btn);
    } else {
      if (!_confirmEl) {
        _handleSignIn(childId);
      } else {
        _handleSignIn(childId);
      }
    }
  });

  /* ── Date selector (tap-first stepper) ───────────────────────────────────── */
  function _initDate() {
    var dateInput = document.getElementById('ey-date-input');
    if (!dateInput) return;
    var today = new Date().toISOString().slice(0, 10);
    var _d = localStorage.getItem('eyHomeDate') || today;
    if (_d > today) _d = today;
    dateInput.max = today;

    function _fmt(str) {
      var x = new Date(str + 'T00:00:00Z');
      return x.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'UTC' });
    }
    function _shiftDay(str, delta) {
      // Pure-UTC arithmetic: building a local Date then reading toISOString() skewed
      // the result by a day under BST, so arrows jumped 2 days. (Wrentest 2026-06-18.)
      var x = new Date(str + 'T00:00:00Z');
      x.setUTCDate(x.getUTCDate() + delta);
      return x.toISOString().slice(0, 10);
    }
    function _setDate(d) {
      if (d > today) d = today;
      _d = d;
      dateInput.value = _d;
      var lbl = document.getElementById('ey-date-label');
      if (lbl) lbl.textContent = (_d === today) ? 'Today' : _fmt(_d);
      var nb = document.getElementById('ey-date-next');
      if (nb) nb.disabled = (_d >= today);
      localStorage.setItem('eyHomeDate', _d);
    }

    _setDate(_d);
    var prevBtn = document.getElementById('ey-date-prev');
    var nextBtn = document.getElementById('ey-date-next');
    var lblBtn  = document.getElementById('ey-date-label');
    if (prevBtn) prevBtn.addEventListener('click', function() { _setDate(_shiftDay(_d, -1)); });
    if (nextBtn) nextBtn.addEventListener('click', function() { _setDate(_shiftDay(_d, 1)); });
    if (lblBtn)  lblBtn.addEventListener('click', function() {
      if (dateInput.showPicker) { try { dateInput.showPicker(); return; } catch(e) {} }
      dateInput.click();
    });
    dateInput.addEventListener('change', function() { _setDate(this.value || today); });
  }

  /* ── Search ───────────────────────────────────────────────────────────────── */
  function _initSearch() {
    var bar   = document.getElementById('ey-search-bar');
    var inp   = document.getElementById('ey-search-input');
    var close = document.getElementById('ey-search-close');

    function _open() {
      bar.hidden = false;
      inp.value  = '';
      _query     = '';
      inp.focus();
    }
    function _close() {
      bar.hidden = true;
      _query = '';
      _render();
    }

    /* / key on desktop opens search */
    document.addEventListener('keydown', function(e) {
      if (e.key === '/') {
        var tag = (document.activeElement || {}).tagName || '';
        if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT' && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
          _open();
        }
      }
      if (e.key === 'Escape' && !bar.hidden) _close();
    });

    inp.addEventListener('input', function() {
      _query = inp.value.trim();
      _render();
    });
    close.addEventListener('click', _close);

    /* Inject search button into topbar actions */
    var actions = document.querySelector('.wren-app-topbar-actions');
    if (actions) {
      var btn = document.createElement('button');
      btn.className   = 'wren-app-topbar-btn';
      btn.id          = 'ey-topbar-search-btn';
      btn.setAttribute('aria-label', 'Search children');
      btn.innerHTML   =
        '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"' +
        '     viewBox="0 0 24 24" aria-hidden="true">' +
        '  <circle cx="11" cy="11" r="7"/>' +
        '  <path d="M21 21l-4.35-4.35"/>' +
        '</svg>';
      btn.addEventListener('click', _open);
      actions.insertBefore(btn, actions.firstChild);
    }
  }

  /* ── Action bottom sheet ──────────────────────────────────────────────────── */
  /* Map of action key → log route (all routes verified against server-unified.js) */
  var ACTION_ROUTES = {
    observation: '/ey/observation/new',   // multi-fw tags + per-child save
    sleep:       '/ey/group/sleep',
    nappies:     '/ey/group/nappies',
    food:        '/ey/group/food',
    bottle:      '/ey/group/bottle',
    toilet:      '/ey/group/toilet',
    diary:       '/ey/diary/entry',       // canonical daily-diary tool (single + group)
    register:    '/ey/register'           // room sign-in/out register (P3)
  };

  /* Append the selected child ids as ?children=1,2,3 so the destination page
   * (e.g. observation-new) can auto-fill the whole group without re-picking.
   * sessionStorage 'wren.ey.selection' is still written as a fallback. */
  function _withChildren(route) {
    var ids = Array.from(_selected);
    if (!ids.length) return route;
    return route + (route.indexOf('?') === -1 ? '?' : '&') + 'children=' + ids.join(',');
  }

  function _openActionSheet() {
    var bd    = document.getElementById('ey-action-sheet-backdrop');
    var sheet = document.getElementById('ey-action-sheet');
    var n     = _selected.size;
    var label = document.getElementById('ey-action-sheet-label');
    if (label) label.textContent = 'What would you like to do? (' + n + (n === 1 ? ' child)' : ' children)');
    if (bd)    { bd.classList.add('open'); bd.setAttribute('aria-hidden', 'false'); }
    if (sheet) { sheet.classList.add('open'); sheet.setAttribute('aria-hidden', 'false'); }
  }

  function _closeActionSheet() {
    var bd    = document.getElementById('ey-action-sheet-backdrop');
    var sheet = document.getElementById('ey-action-sheet');
    if (bd)    { bd.classList.remove('open'); bd.setAttribute('aria-hidden', 'true'); }
    if (sheet) { sheet.classList.remove('open'); sheet.setAttribute('aria-hidden', 'true'); }
  }

  /* ── Group daily diary default (no children selected → group diary) ───────── */
  function _initGroupDiaryDefault() {
    var btn = document.getElementById('ey-group-diary-btn');
    if (btn) {
      btn.addEventListener('click', function() {
        /* No selection → land on the canonical daily diary tool in group mode. */
        _clearSelection();
        Wren.navigate('/ey/diary/entry');
      });
    }
    /* Set initial visibility (visible when nothing selected). */
    var dflt = document.getElementById('ey-group-default-bar');
    if (dflt) dflt.hidden = (_selected.size !== 0);
  }

  /* ── Remove the redundant top-right log/observation button from the EY topbar ─
   * EyLog keeps the single center +Observation FAB; any duplicate log button in
   * the header is removed here (idempotent — leaves the bell + avatar intact). */
  function _removeTopbarLogButton() {
    var actions = document.querySelector('#wren-app-topbar .wren-app-topbar-actions, .wren-app-topbar-actions');
    if (!actions) return;
    actions.querySelectorAll('button, a').forEach(function(el) {
      if (el.id === 'wren-app-notif-btn' || el.id === 'wren-app-avatar' ||
          el.id === 'ey-topbar-search-btn') return; /* keep bell, avatar, search */
      var label = (el.getAttribute('aria-label') || '').toLowerCase();
      var txt   = (el.textContent || '').toLowerCase();
      if (/log|observation|\bnew\b/.test(label) || /log|observation/.test(txt)) {
        el.remove();
      }
    });
  }

  /* ── Group actions ────────────────────────────────────────────────────────── */
  function _initGroupActions() {
    var logBtn  = document.getElementById('ey-group-actions-btn');
    var cancel  = document.getElementById('ey-multiselect-cancel');
    var selAll  = document.getElementById('ey-select-all-btn');
    var sheetBd = document.getElementById('ey-action-sheet-backdrop');
    var sheetCx = document.getElementById('ey-action-sheet-cancel');

    if (cancel) cancel.addEventListener('click', _exitMs);

    /* Select / deselect all */
    if (selAll) {
      selAll.addEventListener('click', function() {
        var allSelected = _selected.size === _filtered.length && _filtered.length > 0;
        if (allSelected) {
          /* Deselect all */
          _selected.clear();
        } else {
          /* Select all visible */
          _filtered.forEach(function(c) { _selected.add(c.id); });
        }
        _render();
        _updateMsBar();
      });
    }

    /* Log → opens action sheet */
    if (logBtn) {
      logBtn.addEventListener('click', function() {
        if (_selected.size === 0) return;
        _saveSelection();
        _openActionSheet();
      });
    }

    /* Context-aware primary action (EyLog parity): one child selected → open
     * that child's learning journey (Learning tab); two or more → group daily
     * diary entry pre-filled with the selected children. */
    var primBtn = document.getElementById('ey-ms-primary-btn');
    if (primBtn) {
      primBtn.addEventListener('click', function() {
        var n = _selected.size;
        if (n === 0) return;
        _saveSelection();
        if (n === 1) {
          var only = Array.from(_selected)[0];
          Wren.navigate('/ey/child/' + only + '#journey');
        } else {
          Wren.navigate(_withChildren('/ey/diary/entry'));
        }
      });
    }

    /* Sheet backdrop and cancel dismiss the sheet */
    if (sheetBd) sheetBd.addEventListener('click', _closeActionSheet);
    if (sheetCx) sheetCx.addEventListener('click', _closeActionSheet);

    /* Action buttons navigate to the relevant log page */
    var grid = document.getElementById('ey-action-sheet-grid');
    if (grid) {
      grid.querySelectorAll('.ey-action-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var action = btn.dataset.action;
          /* Group register actions: mark the whole selection in one tap by
           * looping the attendance endpoints (no navigation). */
          if (action === 'signin-all' || action === 'signout-all' || action === 'absent-all') {
            _groupRegister(action);
            return;
          }
          var route  = ACTION_ROUTES[action];
          if (!route) {
            /* Fallback to select-action page for any unmapped action */
            _saveSelection();
            Wren.navigate('/ey/log/select-action');
            return;
          }
          _saveSelection();
          _closeActionSheet();
          Wren.navigate(_withChildren(route));
        });
      });
    }
  }

  /* ── Group register: sign in / out / absent for the whole selection ───────── */
  function _groupRegister(action) {
    var ids = Array.from(_selected);
    if (!ids.length) { _closeActionSheet(); return; }
    var map = {
      'signin-all':  { url: '/api/attendance/sign-in',    verb: 'Signed in',   patch: function(at){ at.in = true;  at.scheduled = true; at.sign_in_time = new Date().toISOString(); } },
      'signout-all': { url: '/api/attendance/sign-out',   verb: 'Signed out',  patch: function(at){ at.in = false; at.sign_out_time = new Date().toISOString(); } },
      'absent-all':  { url: '/api/attendance/mark-absent', verb: 'Marked absent', patch: function(at){ at.in = false; at.scheduled = true; at.absent = true; } }
    };
    var cfg = map[action];
    if (!cfg) { _closeActionSheet(); return; }
    _closeActionSheet();
    var done = 0, failed = 0;
    Promise.all(ids.map(function(childId) {
      return Wren.api(cfg.url, { method: 'POST', body: { child_id: childId } })
        .then(function() {
          done++;
          var at = _attendance[childId] || {};
          cfg.patch(at);
          _attendance[childId] = at;
        })
        .catch(function(e) { failed++; console.error('[ey] group register error:', childId, e); });
    })).then(function() {
      _render();
      if (window.Wren) {
        if (failed) Wren.toast(cfg.verb + ' ' + done + ', ' + failed + ' failed', 'error');
        else Wren.toast(cfg.verb + ' ' + done + ' ' + (done === 1 ? 'child' : 'children') + ' ✓', 'success');
      }
      _exitMs();
    });
  }

  /* ── Load children from API ───────────────────────────────────────────────── */
  function _load() {
    var grid = document.getElementById('ey-child-grid');
    if (!grid) return;

    /* skeleton */
    grid.className = 'loading';
    grid.innerHTML = Array(8).fill(
      '<div class="app-skeleton ey-skeleton-card"></div>'
    ).join('');

    Wren.api('/api/children').then(function(data) {
      _all = Array.isArray(data) ? data : (data && data.rows ? data.rows : []);
      _render();
    }).catch(function() {
      grid.className = '';
      grid.innerHTML = '';
      if (window.Wren) Wren.toast('Could not load children', 'error');
    });
  }

  /* ── Daily tasks alert bar ───────────────────────────────────────────────── */
  var _dtTimer = null;
  function _loadDailyTasks() {
    var bar = document.getElementById('daily-tasks-bar');
    if (!bar) return;
    var COLOR_MAP = { red: 'dt-red', amber: 'dt-amber', orange: 'dt-orange' };
    var ICON_MAP  = { red: '⚠', amber: '🍽', orange: '🍵' };
    Wren.api('/api/daily-tasks/pending').then(function(d) {
      var tasks = d.pending || [];
      if (!tasks.length) { bar.hidden = true; bar.innerHTML = ''; return; }
      bar.hidden = false;
      bar.innerHTML = tasks.map(function(t) {
        var cls = COLOR_MAP[t.color] || 'dt-amber';
        var icon = ICON_MAP[t.color] || '📋';
        return '<a class="dt-chip ' + cls + '" href="' + t.link + '">' +
          icon + ' ' + t.title +
          '</a>';
      }).join('');
    }).catch(function() { /* silent — don't break home page if this endpoint fails */ });
  }

  /* ── Report reminders (2026-07-03, Toby items 6+11): 2-year checks due at the
   * configured age (settings: 22 months) + termly reports due near term end
   * (SEN children also at half-term). One popup, snoozed per-day per-device. ── */
  function _loadReportReminders() {
    var SNOOZE_KEY = 'eyReportRemindersSnoozedUntil';
    try {
      var until = localStorage.getItem(SNOOZE_KEY);
      if (until && Date.now() < parseInt(until, 10)) return;
    } catch (_) {}

    Wren.api('/api/parent-reports/reminders').then(function (data) {
      var twoYear = (data && data.two_year) || [];
      var termly  = (data && data.termly) || [];
      if (!twoYear.length && !termly.length) return;

      function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      var html = '';
      if (twoYear.length) {
        html += '<div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);margin:4px 0 6px">⭐ 2-Year checks due (from ' + (data.two_year_from_months || 22) + ' months)</div>';
        html += twoYear.map(function (c) {
          return '<a href="/ey/reports/summative?child=' + c.id + '&type=2-year%20check" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--c-border);border-radius:10px;margin-bottom:6px;color:var(--c-text);text-decoration:none">' +
            '<span style="font-weight:600">' + esc(c.first_name + ' ' + (c.last_name || '')) + '</span>' +
            '<span style="font-size:.75rem;color:var(--c-orange,#e07820);font-weight:700">' + c.age_months + ' months</span></a>';
        }).join('');
      }
      if (termly.length) {
        var label = data.termly_window === 'sen_half_term'
          ? '🗓️ SEN mid-term reviews due (' + esc((data.term || {}).name || '') + ')'
          : '🗓️ Termly reports due — ' + esc((data.term || {}).name || 'this term');
        html += '<div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);margin:10px 0 6px">' + label + '</div>';
        html += termly.slice(0, 12).map(function (c) {
          return '<a href="/ey/reports/summative?child=' + c.id + '&type=termly" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--c-border);border-radius:10px;margin-bottom:6px;color:var(--c-text);text-decoration:none">' +
            '<span style="font-weight:600">' + esc(c.first_name + ' ' + (c.last_name || '')) + (c.sen ? ' <span style="font-size:.68rem;color:var(--c-blue)">SEN</span>' : '') + '</span>' +
            '<span style="font-size:.75rem;color:var(--c-muted)">Write ›</span></a>';
        }).join('');
        if (termly.length > 12) html += '<div style="font-size:.75rem;color:var(--c-muted);text-align:center">+' + (termly.length - 12) + ' more</div>';
      }

      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:450;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center';
      overlay.innerHTML =
        '<div role="dialog" aria-label="Report reminders" style="background:var(--c-navy-mid,#0f172a);border:1px solid var(--c-border);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:75vh;display:flex;flex-direction:column">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--c-border)">' +
        '<strong style="color:var(--c-text)">📋 Reports due</strong>' +
        '<button id="ey-rem-close" aria-label="Close" style="background:none;border:none;color:var(--c-muted);font-size:1.1rem;cursor:pointer;width:36px;height:36px">✕</button></div>' +
        '<div style="overflow-y:auto;padding:12px 16px">' + html + '</div>' +
        '<div style="padding:10px 16px calc(14px + env(safe-area-inset-bottom,0));border-top:1px solid var(--c-border)">' +
        '<button id="ey-rem-snooze" style="width:100%;height:42px;border-radius:10px;background:transparent;border:1px solid var(--c-border);color:var(--c-muted);font-size:.88rem;font-weight:600;cursor:pointer">Remind me tomorrow</button></div></div>';
      document.body.appendChild(overlay);
      function _dismiss(snoozeDays) {
        try { localStorage.setItem(SNOOZE_KEY, String(Date.now() + snoozeDays * 86400000)); } catch (_) {}
        overlay.remove();
      }
      overlay.querySelector('#ey-rem-close').addEventListener('click', function(){ _dismiss(0.5); });
      overlay.querySelector('#ey-rem-snooze').addEventListener('click', function(){ _dismiss(1); });
      overlay.addEventListener('click', function(e){ if (e.target === overlay) _dismiss(0.5); });
    }).catch(function () {});
  }

  /* ── Boot on wren:ready ───────────────────────────────────────────────────── */
  document.addEventListener('wren:ready', function() {
    _initChips();
    _initStatusChips();
    _initDate();
    _initSearch();
    _initGroupActions();
    _initGroupDiaryDefault();
    _removeTopbarLogButton();
    _loadSelection();
    _loadAttendance();
    _load();
    _loadDailyTasks();
    _loadReportReminders();
    // Re-check every 5 minutes (tasks can become complete while the page is open)
    _dtTimer = setInterval(_loadDailyTasks, 5 * 60 * 1000);
  });

}());
</script>
</body>
</html>
