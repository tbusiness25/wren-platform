<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="incident-new">
  <meta name="wren-app-title"         content="Accident Report">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Accident Report · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    #inc-page { padding: 0 0 calc(env(safe-area-inset-bottom) + 24px); }
    #inc-back {
      width: 44px; height: 44px; background: transparent; border: none;
      color: var(--c-text); cursor: pointer; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    #inc-back:hover { background: rgba(255,255,255,0.06); }
    #inc-save {
      height: 36px; padding: 0 18px; background: var(--c-blue); border: none;
      border-radius: 10px; color: #fff; font-size: .9rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: opacity .15s;
    }
    #inc-save:hover  { opacity: .88; }
    #inc-save:disabled { opacity: .45; cursor: default; }

    #inc-body { padding: 16px; max-width: 640px; }

    #inc-child-card {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 12px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: 10px; margin-bottom: 16px;
    }
    #inc-child-av {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #fff; overflow: hidden;
    }
    #inc-child-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #inc-child-name { font-size: .9rem; font-weight: 600; color: var(--c-text); }
    #inc-child-room { font-size: .78rem; color: var(--c-muted); }

    .inc-section { margin-bottom: 18px; }
    .inc-label {
      display: block; font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--c-muted); margin-bottom: 6px;
    }
    .inc-input {
      width: 100%; box-sizing: border-box;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 8px; color: var(--c-text); font-size: .9rem;
      padding: 0 12px; height: 44px; outline: none;
      font-family: system-ui, Arial, sans-serif;
    }
    .inc-input:focus { border-color: var(--c-blue); }
    textarea.inc-input {
      height: auto; min-height: 90px; padding: 10px 12px;
      resize: vertical; line-height: 1.5;
    }
    textarea.inc-input::placeholder { color: var(--c-muted); }
    .inc-row { display: flex; gap: 10px; }
    .inc-row .inc-section { flex: 1; }

    /* Type chips */
    #inc-type-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .inc-type-chip {
      height: 36px; padding: 0 14px; border-radius: 18px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      color: var(--c-muted); font-size: .83rem; font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .inc-type-chip.active {
      background: rgba(224,120,32,0.15); border-color: var(--c-amber); color: var(--c-amber);
    }
  </style>
</head>
<body data-portal="ey">

<div id="inc-page">
  <div id="inc-body">

    <!-- Child card (populated by JS) -->
    <div id="inc-child-card" hidden>
      <div id="inc-child-av" aria-hidden="true">?</div>
      <div>
        <div id="inc-child-name">—</div>
        <div id="inc-child-room"></div>
      </div>
    </div>

    <!-- Incident type -->
    <div class="inc-section">
      <span class="inc-label">Type</span>
      <div id="inc-type-chips" role="group" aria-label="Incident type">
        <button type="button" class="inc-type-chip active" data-type="Accident">Accident</button>
        <button type="button" class="inc-type-chip" data-type="Incident">Incident</button>
        <button type="button" class="inc-type-chip" data-type="Near miss">Near miss</button>
        <button type="button" class="inc-type-chip" data-type="Illness">Illness</button>
      </div>
    </div>

    <div class="inc-row">
      <div class="inc-section">
        <label class="inc-label" for="inc-date">Date</label>
        <input class="inc-input" type="date" id="inc-date" aria-label="Date of incident">
      </div>
      <div class="inc-section">
        <label class="inc-label" for="inc-time">Time</label>
        <select class="inc-input" id="inc-time" aria-label="Time of incident"></select>
      </div>
    </div>

    <div class="inc-section">
      <label class="inc-label" for="inc-location">Location</label>
      <input class="inc-input" type="text" id="inc-location"
        placeholder="e.g. Pre-school room, Garden, Cloakroom…" autocomplete="off">
    </div>

    <div class="inc-section">
      <label class="inc-label" for="inc-description">What happened?</label>
      <textarea class="inc-input" id="inc-description" rows="4"
        placeholder="Describe what happened…"></textarea>
    </div>

    <div class="inc-section">
      <label class="inc-label" for="inc-injury">Injury / symptoms</label>
      <textarea class="inc-input" id="inc-injury" rows="3"
        placeholder="Describe any injury or visible symptoms…"></textarea>
    </div>

    <div class="inc-section">
      <label class="inc-label" for="inc-first-aid">First aid given</label>
      <textarea class="inc-input" id="inc-first-aid" rows="3"
        placeholder="Describe any first aid administered…"></textarea>
    </div>

    <div class="inc-section">
      <label class="inc-label" for="inc-witnesses">Witnesses (optional)</label>
      <input class="inc-input" type="text" id="inc-witnesses"
        placeholder="Names of any witnesses…" autocomplete="off">
    </div>

  </div>
</div>

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  var COLORS = ['#4a9abf','#e07820','#22c55e','#a855f7','#ef4444',
                '#06b6d4','#f59e0b','#10b981','#ec4899','#3b82f6'];
  function _color(n) { return COLORS[(n||'A').charCodeAt(0) % COLORS.length]; }
  function _e(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function _p2(n) { return (n < 10 ? '0' : '') + n; }

  var _childId   = null;
  var _child     = null;
  var _incType   = 'Accident';

  function _param(k) { return new URLSearchParams(location.search).get(k); }

  /* ── Back button ────────────────────────────────────────────────────────── */
  function _installBack() {
    var hamburger = document.getElementById('wren-app-hamburger');
    if (!hamburger) return;
    var btn = document.createElement('button');
    btn.id = 'inc-back';
    btn.setAttribute('aria-label', 'Back');
    btn.innerHTML = '&#8592;';
    btn.addEventListener('click', function() {
      if (history.length > 1) history.back();
      else Wren.navigate(_childId ? '/ey/child/' + _childId : '/ey/home');
    });
    hamburger.parentNode.insertBefore(btn, hamburger);
    hamburger.style.display = 'none';
  }

  /* ── Save button in topbar ──────────────────────────────────────────────── */
  function _installSave() {
    var tb = document.getElementById('wren-app-topbar') || document.querySelector('.wren-app-topbar');
    if (!tb) return;
    var saveBtn = document.createElement('button');
    saveBtn.id = 'inc-save';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', _doSave);
    var actions = tb.querySelector('.wren-app-topbar-actions');
    if (actions) actions.insertBefore(saveBtn, actions.firstChild);
    else tb.appendChild(saveBtn);
  }

  /* ── Date/time defaults ──────────────────────────────────────────────────── */
  function _initDateTime() {
    var now   = new Date();
    var today = now.getFullYear() + '-' + _p2(now.getMonth() + 1) + '-' + _p2(now.getDate());
    var dateEl = document.getElementById('inc-date');
    if (dateEl) { dateEl.value = today; dateEl.max = today; }

    var timeEl = document.getElementById('inc-time');
    if (timeEl) {
      var html = '';
      for (var m = 0; m < 1440; m += 5) {
        var v = _p2(Math.floor(m / 60)) + ':' + _p2(m % 60);
        html += '<option value="' + v + '">' + v + '</option>';
      }
      timeEl.innerHTML = html;
      var cur = now.getHours() * 60 + now.getMinutes();
      var near = Math.round(cur / 5) * 5;
      if (near > 1435) near = 1435;
      timeEl.value = _p2(Math.floor(near / 60)) + ':' + _p2(near % 60);
    }
  }

  /* ── Type chips ─────────────────────────────────────────────────────────── */
  function _initTypeChips() {
    document.querySelectorAll('.inc-type-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.inc-type-chip').forEach(function(c) {
          c.classList.remove('active');
        });
        chip.classList.add('active');
        _incType = chip.dataset.type;
      });
    });
  }

  /* ── Load child ─────────────────────────────────────────────────────────── */
  function _loadChild() {
    if (!_childId) return;
    Wren.api('/api/children/' + _childId + '/profile').then(function(data) {
      _child = data;
      var card = document.getElementById('inc-child-card');
      var av   = document.getElementById('inc-child-av');
      var nm   = document.getElementById('inc-child-name');
      var rm   = document.getElementById('inc-child-room');
      if (!card) return;

      var init = (data.first_name || '?').charAt(0).toUpperCase();
      if (av) {
        if (data.photo_url) {
          av.innerHTML = '<img src="' + _e(data.photo_url) + '" alt="' + _e(data.first_name) + '">';
        } else {
          av.style.background = _color(init);
          av.textContent = init;
        }
      }
      if (nm) nm.textContent = (data.first_name || '') + ' ' + (data.last_name || '');
      if (rm) rm.textContent = data.room_name || '';
      card.hidden = false;

      var titleEl = document.getElementById('wren-app-title');
      if (titleEl) titleEl.textContent = 'Accident — ' + (data.first_name || '');
    }).catch(function() {});
  }

  /* ── Save ───────────────────────────────────────────────────────────────── */
  function _doSave() {
    var saveBtn = document.getElementById('inc-save');
    if (saveBtn) saveBtn.disabled = true;

    var desc = (document.getElementById('inc-description').value || '').trim();
    if (!desc) {
      Wren.toast('Please describe what happened', 'error');
      if (saveBtn) saveBtn.disabled = false;
      return;
    }

    var dateEl  = document.getElementById('inc-date');
    var timeEl  = document.getElementById('inc-time');
    var locEl   = document.getElementById('inc-location');
    var injEl   = document.getElementById('inc-injury');
    var faEl    = document.getElementById('inc-first-aid');
    var witEl   = document.getElementById('inc-witnesses');

    var payload = {
      child_id:           _childId || null,
      incident_type:      _incType,
      incident_date:      dateEl  ? dateEl.value : new Date().toISOString().slice(0, 10),
      incident_time:      timeEl  ? timeEl.value : null,
      location:           locEl   ? (locEl.value || '').trim() : null,
      description:        desc,
      injury_description: injEl   ? (injEl.value || '').trim() || null : null,
      first_aid_given:    faEl    ? (faEl.value || '').trim() || null : null,
      witnesses:          witEl   ? (witEl.value || '').trim() || null : null,
    };

    Wren.api('/api/incidents', {
      method: 'POST',
      body: JSON.stringify(payload)
    }).then(function() {
      Wren.toast('Accident report saved', 'success');
      setTimeout(function() {
        if (_childId) Wren.navigate('/ey/child/' + _childId);
        else Wren.navigate('/ey/home');
      }, 1200);
    }).catch(function(err) {
      if (saveBtn) saveBtn.disabled = false;
      Wren.toast('Could not save: ' + (err.message || 'error'), 'error');
    });
  }

  /* ── Boot ───────────────────────────────────────────────────────────────── */
  document.addEventListener('wren:ready', function() {
    _childId = _param('child') ? parseInt(_param('child'), 10) : null;
    _installBack();
    _installSave();
    _initDateTime();
    _initTypeChips();
    _loadChild();
  });

}());
</script>
</body>
</html>
