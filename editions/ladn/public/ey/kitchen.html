<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"         content="ladn">
  <meta name="wren-app-page"        content="kitchen">
  <meta name="wren-app-title"       content="Kitchen">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>Kitchen · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    /* ── Kitchen tab bar ─────────────────────────────────────────────────────── */
    .k-tabs {
      display: flex;
      overflow-x: auto;
      background: var(--c-navy-mid);
      border-bottom: 1px solid var(--c-border);
      padding: 0 4px;
      position: sticky;
      top: 0;
      z-index: 5;
      scrollbar-width: none;
    }
    .k-tabs::-webkit-scrollbar { display: none; }
    .k-tab {
      flex-shrink: 0;
      padding: 13px 16px;
      border: none;
      background: none;
      color: var(--c-muted);
      font-weight: 700;
      font-size: .875rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      min-height: 46px;
      white-space: nowrap;
      transition: color .15s;
    }
    .k-tab.active { color: var(--c-orange); border-bottom-color: var(--c-orange); }

    /* ── Kitchen content panel ───────────────────────────────────────────────── */
    #k-panel { padding: 12px; max-width: 640px; margin: 0 auto; }

    /* ── Today ───────────────────────────────────────────────────────────────── */
    .conflict-banner {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.35);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
      color: var(--c-red);
    }
    .conflict-banner strong { display: block; margin-bottom: 4px; font-size: 1rem; }
    .meal-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--c-border);
    }
    .meal-row:last-child { border: 0; }
    .meal-type {
      font-size: .7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--c-muted);
      margin-bottom: 2px;
    }
    .meal-desc { font-size: .95rem; color: var(--c-text); }
    .alg-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
    .alg-chip {
      font-size: .7rem;
      font-weight: 700;
      background: rgba(240,195,74,.12);
      color: var(--c-orange);
      border: 1px solid rgba(240,195,74,.25);
      border-radius: 10px;
      padding: 2px 7px;
    }
    .child-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--c-navy-mid);
      border: 1px solid var(--c-border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: .82rem;
      margin: 3px;
    }
    .child-pill .alg { font-size: .72rem; color: var(--c-orange); font-weight: 700; }

    /* ── Temperatures ─────────────────────────────────────────────────────────── */
    .temp-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--c-border);
    }
    .temp-row:last-child { border: 0; }
    .temp-val { font-size: 1.25rem; font-weight: 800; text-align: right; min-width: 80px; }
    .temp-ok   { color: var(--c-green); }
    .temp-bad  { color: var(--c-red); }
    .temp-none { color: var(--c-muted); font-size: .9rem; }
    .temp-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .temp-form select,
    .temp-form input[type=number] {
      background: var(--c-navy-mid);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      color: var(--c-text);
      padding: 8px 10px;
      min-height: 44px;
      font-size: .95rem;
    }
    .temp-form input[type=number] { width: 80px; text-align: center; }
    .temp-form .step-btn {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--c-border);
      background: var(--c-navy-mid);
      color: var(--c-text);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
    }

    /* ── SFBB & Cleaning ─────────────────────────────────────────────────────── */
    .shift-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .shift-btn {
      padding: 8px 18px;
      border: 1px solid var(--c-border);
      background: none;
      color: var(--c-muted);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: .875rem;
      transition: .15s;
    }
    .shift-btn.active { background: var(--c-orange); color: #1a1200; border-color: var(--c-orange); }
    .check-section-label {
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--c-muted);
      padding: 10px 0 4px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--c-border);
    }
    .check-row:last-child { border: 0; }
    .check-row input[type=checkbox] {
      width: 22px;
      height: 22px;
      accent-color: var(--c-orange);
      flex-shrink: 0;
      cursor: pointer;
    }
    .check-row label { flex: 1; cursor: pointer; }
    .check-row .val-input {
      background: var(--c-navy-mid);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      color: var(--c-text);
      padding: 5px 8px;
      width: 80px;
      min-height: 36px;
      font-size: .9rem;
      text-align: center;
    }

    /* ── Menu browser ────────────────────────────────────────────────────────── */
    .day-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .day-nav button {
      min-width: 38px;
      min-height: 38px;
      border: 1px solid var(--c-border);
      background: none;
      color: var(--c-text);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    .day-nav-label {
      flex: 1;
      text-align: center;
      font-weight: 700;
      font-size: 1.05rem;
    }

    /* ── Misc ────────────────────────────────────────────────────────────────── */
    .k-section-title {
      font-size: .82rem;
      font-weight: 700;
      color: var(--c-blue);
      margin-bottom: 8px;
    }
    .empty-note { color: var(--c-muted); text-align: center; padding: 30px 0; font-size: .9rem; }
    .today-date { color: var(--c-muted); font-size: .82rem; font-weight: 400; margin-left: 8px; }
  </style>
</head>
<body>

<div class="k-tabs" role="tablist">
  <button class="k-tab active" role="tab" data-tab="today">Today</button>
  <button class="k-tab" role="tab" data-tab="menu">Menu</button>
  <button class="k-tab" role="tab" data-tab="temps">Temps</button>
  <button class="k-tab" role="tab" data-tab="sfbb">SFBB</button>
  <button class="k-tab" role="tab" data-tab="clean">Cleaning</button>
  <button class="k-tab" role="tab" data-tab="notes">Notes</button>
</div>
<div id="k-panel">
  <div class="empty-note">Loading…</div>
</div>

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  var today = new Date().toISOString().slice(0, 10);
  var sfbbShift = 'opening';
  var menuCache = null; // cached {group, items} from /api/kitchen/current
  // Start on today's weekday (Mon=1…Fri=5), clamp to Mon-Fri
  var menuDow = new Date().getDay();
  if (menuDow === 0 || menuDow === 6) menuDow = (menuDow === 0 ? 1 : 5);

  var DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MEALS = ['breakfast','morning_snack','lunch','afternoon_snack','snack','tea'];
  var MEAL_LABELS = {breakfast:'Breakfast',morning_snack:'Morning Snack',lunch:'Lunch',
                    afternoon_snack:'Afternoon Snack',snack:'Snack',tea:'Tea',other:'Other'};

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }

  function panel() { return document.getElementById('k-panel'); }

  function loading() { panel().innerHTML = '<div class="empty-note">Loading…</div>'; }

  // ── Tab switching ─────────────────────────────────────────────────────────────
  document.querySelector('.k-tabs').addEventListener('click', function(e) {
    var btn = e.target.closest('.k-tab');
    if (!btn) return;
    document.querySelectorAll('.k-tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    loadTab(btn.dataset.tab);
  });

  function loadTab(t) {
    loading();
    ({today: tabToday, menu: tabMenu, temps: tabTemps, sfbb: tabSfbb, clean: tabClean, notes: tabNotes}[t])();
  }

  // ── TODAY ─────────────────────────────────────────────────────────────────────
  function tabToday() {
    Promise.all([
      Wren.api('/api/kitchen/day-sheet'),
      Wren.api('/api/kitchen/allergy-briefing').catch(function() { return null; })
    ]).then(function(res) {
      var d = res[0], b = res[1];
      var conflicts = d.conflicts || [];
      var conflictHtml = '';
      if (conflicts.length) {
        conflictHtml = '<div class="conflict-banner"><strong>⚠ Allergen Alert — ' +
          conflicts.length + ' child' + (conflicts.length > 1 ? 'ren' : '') + ' with allergens matching today\'s menu</strong>' +
          conflicts.map(function(c) {
            return '<div>• ' + esc(c.name) + (c.room ? ' (' + esc(c.room) + ')' : '') + ' — ' + esc(c.allergies || '') + '</div>';
          }).join('') + '</div>';
      }

      var menuItems = d.menu_today || [];
      var menuHtml = menuItems.length ? menuItems.map(function(m) {
        var algs = (m.allergens || []).filter(function(a) { return a && String(a).trim(); });
        return '<div class="meal-row"><div><div class="meal-type">' + esc(MEAL_LABELS[m.meal_type] || m.meal_type) + '</div>' +
          '<div class="meal-desc">' + esc(m.description || '') + '</div>' +
          (algs.length ? '<div class="alg-chips">' + algs.map(function(a) { return '<span class="alg-chip">' + esc(a) + '</span>'; }).join('') + '</div>' : '') +
          '</div></div>';
      }).join('') : '<div class="empty-note">No menu set for today.</div>';

      var withAlg = d.present_with_allergies || [];
      var algHtml = withAlg.length ? withAlg.map(function(c) {
        var txt = (c.allergies || '').replace(/[\{\}"]/g, '').trim() || (c.dietary_requirements || '').replace(/[\{\}"]/g, '').trim() || 'see notes';
        return '<span class="child-pill">' + esc(c.name) + '<span class="alg">' + esc(txt) + '</span></span>';
      }).join('') : '<span style="color:var(--c-muted)">None today</span>';

      var sick = d.absent_sick || [];
      var sickHtml = sick.length ? sick.map(function(c) {
        return '<span class="child-pill">' + esc(c.name) + '</span>';
      }).join('') : '<span style="color:var(--c-muted)">None</span>';

      var dateStr = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});

      // Signed-in-now allergy briefing (children physically here, not just booked).
      var briefingHtml = '';
      if (b) {
        var confIds = {}; (b.conflicts || []).forEach(function(c) { confIds[c.id] = 1; });
        var flagged = b.flagged || [];
        var inner = flagged.length ? flagged.map(function(c) {
          var needs = [c.allergies, c.dietary_requirements, c.allergen_notes].filter(function(x) { return x && String(x).trim(); }).join('; ')
            || ((c.allergens || []).join(', ')) || 'see record';
          var clash = confIds[c.id];
          return '<div style="padding:6px 0;border-top:1px solid rgba(255,255,255,.05)' + (clash ? ';color:#ef4444' : '') + '">' +
            (clash ? '🚨 ' : '• ') + '<strong>' + esc(c.name) + '</strong> <span style="color:var(--c-muted)">(' + esc(c.room || '—') + ')</span> — ' +
            esc(needs) + (clash ? ' <b>clashes with today\'s menu</b>' : '') + '</div>';
        }).join('') : '<div style="color:var(--c-muted)">' + (b.signed_in_count ? '✅ No allergy/dietary needs among children signed in now.' : 'No children signed in yet.') + '</div>';
        briefingHtml =
          '<div class="card" style="margin-bottom:12px;border-left:4px solid #e07820">' +
            '<div class="k-section-title">👨‍🍳 Signed in now<span class="today-date">' + (b.signed_in_count || 0) + ' in · ' + (b.flagged_count || 0) + ' flagged' +
              ((b.conflicts && b.conflicts.length) ? ' · ' + b.conflicts.length + ' clash' : '') + '</span></div>' +
            inner +
          '</div>';
      }

      panel().innerHTML =
        conflictHtml +
        briefingHtml +
        '<div class="card" style="margin-bottom:12px">' +
          '<div class="k-section-title">📋 Today\'s Menu<span class="today-date">' + esc(dateStr) + '</span></div>' +
          menuHtml +
        '</div>' +
        '<div class="card" style="margin-bottom:12px">' +
          '<div class="k-section-title">⚠ Allergies (' + (d.present_count || 0) + ' children in today)</div>' +
          algHtml +
        '</div>' +
        '<div class="card">' +
          '<div class="k-section-title">🤒 Absent / Unwell</div>' +
          sickHtml +
        '</div>';
    }).catch(function() {
      panel().innerHTML = '<div class="empty-note">Could not load today\'s sheet — check your connection.</div>';
    });
  }

  // ── MENU ──────────────────────────────────────────────────────────────────────
  function tabMenu() {
    if (menuCache) { renderMenuDay(menuCache, menuDow); return; }
    Wren.api('/api/kitchen/current').then(function(d) {
      menuCache = d;
      renderMenuDay(d, menuDow);
    }).catch(function() {
      panel().innerHTML = '<div class="empty-note">Could not load menu.</div>';
    });
  }

  function renderMenuDay(d, dow) {
    var g = d.group;
    var items = (d.items || []).filter(function(m) { return m.day_of_week === dow; });

    var groupInfo = g ? '<div style="font-size:.78rem;color:var(--c-muted);margin-bottom:12px">' +
      esc(g.name) + ' · ' +
      new Date(g.date_from).toLocaleDateString('en-GB', {day:'numeric', month:'short'}) + ' – ' +
      new Date(g.date_to).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'}) +
      '</div>' : '';

    var mealsHtml = MEALS.map(function(mt) {
      var item = items.find(function(m) { return m.meal_type === mt; });
      if (!item) return '';
      var algs = (item.allergens || []).filter(function(a) { return a && String(a).trim(); });
      return '<div class="meal-row"><div><div class="meal-type">' + esc(MEAL_LABELS[mt] || mt) + '</div>' +
        '<div class="meal-desc">' + esc(item.description || '') + '</div>' +
        (algs.length ? '<div class="alg-chips">' + algs.map(function(a) { return '<span class="alg-chip">' + esc(a) + '</span>'; }).join('') + '</div>' : '') +
        '</div></div>';
    }).filter(Boolean).join('') || '<div class="empty-note">No meals set for ' + DOW_FULL[dow] + '.</div>';

    var p = panel();
    p.innerHTML =
      '<div class="day-nav">' +
        '<button id="mn-prev">◀</button>' +
        '<div class="day-nav-label">' + esc(DOW_FULL[dow]) + '</div>' +
        '<button id="mn-next">▶</button>' +
      '</div>' +
      '<div class="card">' + groupInfo + mealsHtml + '</div>';

    document.getElementById('mn-prev').onclick = function() {
      menuDow = menuDow <= 1 ? 5 : menuDow - 1;
      renderMenuDay(d, menuDow);
    };
    document.getElementById('mn-next').onclick = function() {
      menuDow = menuDow >= 5 ? 1 : menuDow + 1;
      renderMenuDay(d, menuDow);
    };
  }

  // ── TEMPERATURES ──────────────────────────────────────────────────────────────
  function tabTemps() {
    Wren.api('/api/kitchen/sensors/latest').then(function(d) {
      var thresholds = d.thresholds || [];
      var latestMap = {};
      (d.latest || []).forEach(function(r) { latestMap[r.location] = r; });

      var rows = thresholds.map(function(th) {
        var l = latestMap[th.location];
        var v = l ? Number(l.reading_c) : null;
        var safe = v != null && v >= Number(th.min_c) && v <= Number(th.max_c);
        var when = l ? new Date(l.recorded_at).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) : null;
        var cls = v == null ? 'temp-none' : (safe ? 'temp-ok' : 'temp-bad');
        var display = v == null ? 'Not logged' : (v + '°C ' + (safe ? '✓' : '⚠'));
        return '<div class="temp-row"><div style="flex:1">' +
          '<div style="font-weight:700">' + esc(th.label) + '</div>' +
          '<div style="font-size:.78rem;color:var(--c-muted)">' + th.min_c + '°C – ' + th.max_c + '°C safe' + (when ? ' · logged ' + when : '') + '</div>' +
          '</div><div class="temp-val ' + cls + '">' + esc(display) + '</div></div>';
      }).join('');

      var opts = thresholds.map(function(th) {
        return '<option value="' + esc(th.location) + '">' + esc(th.label) + '</option>';
      }).join('');

      panel().innerHTML =
        '<div class="card" style="margin-bottom:12px">' +
          '<div class="k-section-title">🌡️ Current Readings</div>' +
          (rows || '<div class="empty-note">No sensors configured.</div>') +
        '</div>' +
        '<div class="card">' +
          '<div class="k-section-title">Log a Temperature</div>' +
          '<div class="temp-form">' +
            '<select id="t-loc">' + opts + '</select>' +
            '<button class="step-btn" id="t-minus" type="button">−</button>' +
            '<input type="number" id="t-c" placeholder="°C" step="0.1">' +
            '<button class="step-btn" id="t-plus" type="button">+</button>' +
            '<button class="btn btn-orange" id="t-save">Log</button>' +
          '</div>' +
        '</div>';

      document.getElementById('t-minus').onclick = function() {
        var el = document.getElementById('t-c');
        el.value = ((parseFloat(el.value) || 0) - 0.5).toFixed(1);
      };
      document.getElementById('t-plus').onclick = function() {
        var el = document.getElementById('t-c');
        el.value = ((parseFloat(el.value) || 0) + 0.5).toFixed(1);
      };
      document.getElementById('t-save').onclick = function() {
        var v = document.getElementById('t-c').value;
        if (v === '') { Wren.toast('Enter a temperature', 'warning'); return; }
        Wren.api('/api/kitchen/sensor-log', {
          method: 'POST',
          body: { location: document.getElementById('t-loc').value, reading_c: Number(v), source: 'manual' }
        }).then(function() { Wren.toast('Logged ✓', 'success'); tabTemps(); })
          .catch(function() { Wren.toast('Failed to log', 'error'); });
      };

      // ── Cooking Temps card (added after sensor logging form) ──
      Wren.api('/api/kitchen/cooking-temps?date=' + today).then(function(cookingRows) {
        var cards = panel().querySelectorAll('.card');
        if (!cards.length) return;
        var cookingCard = document.createElement('div');
        cookingCard.className = 'card';
        cookingCard.style.marginBottom = '12px';
        cookingCard.innerHTML =
          '<div class="k-section-title">🍳 Cooking Temps</div>' +
          '<div class="temp-form" style="margin-bottom:10px">' +
            '<input type="text" id="ct-food" placeholder="Food / dish name" style="flex:1">' +
            '<button class="step-btn" id="ct-minus" type="button">−</button>' +
            '<input type="number" id="ct-c" placeholder="°C" step="0.1" style="width:80px;text-align:center">' +
            '<button class="step-btn" id="ct-plus" type="button">+</button>' +
            '<button class="btn btn-orange" id="ct-save">Log</button>' +
          '</div>' +
          (cookingRows.length ? cookingRows.map(function(r) {
            var ok = Number(r.temp_c) >= 75;
            var cls = ok ? 'temp-ok' : 'temp-bad';
            return '<div class="temp-row">' +
              '<div style="flex:1"><div style="font-weight:700">' + esc(r.food_name || '—') + '</div>' +
              (r.notes ? '<div style="font-size:.78rem;color:var(--c-muted)">' + esc(r.notes) + '</div>' : '') +
              '<div style="font-size:.75rem;color:var(--c-muted)">' + new Date(r.logged_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · by ' + esc(r.logged_by || 'staff') + '</div></div>' +
              '<div class="temp-val ' + cls + '">' + esc(r.temp_c + '°C') + (ok ? ' ✓' : ' ⚠') + '</div></div>';
          }).join('') : '<div class="empty-note">No cooking temps logged today.</div>');
        cards[cards.length - 1].insertAdjacentHTML('afterend', cookingCard.outerHTML);
        cookingCard = document.querySelector('#k-panel .card:last-of-type');
        if (!cookingCard) return;

        var ctC = document.getElementById('ct-c');
        var ctFood = document.getElementById('ct-food');
        document.getElementById('ct-minus').onclick = function() { ctC.value = ((parseFloat(ctC.value) || 0) - 0.5).toFixed(1); };
        document.getElementById('ct-plus').onclick = function() { ctC.value = ((parseFloat(ctC.value) || 0) + 0.5).toFixed(1); };
        document.getElementById('ct-save').onclick = function() {
          var food = (document.getElementById('ct-food').value || '').trim();
          var v = document.getElementById('ct-c').value;
          if (!food) { Wren.toast('Enter food name', 'warning'); return; }
          if (v === '') { Wren.toast('Enter a temperature', 'warning'); return; }
          Wren.api('/api/kitchen/cooking-temps', {
            method: 'POST',
            body: { food_name: food, temp_c: Number(v), notes: '' }
          }).then(function() { Wren.toast('Logged ✓', 'success'); tabTemps(); })
            .catch(function() { Wren.toast('Failed to log', 'error'); });
        };
      }).catch(function() { /* cooking temps optional */ });
    }).catch(function() {
      panel().innerHTML = '<div class="empty-note">Could not load temperature data.</div>';
    });
  }

  // ── NOTES ──
  function tabNotes() {
    Wren.api('/api/kitchen/notes?date=' + today).then(function(rows) {
      var content = '';
      // eslint-disable-next-line no-unused-vars
      if (rows.length) content = rows[0].content || '';
      panel().innerHTML =
        '<div class="card">' +
          '<div class="k-section-title">📝 Kitchen Notes</div>' +
          '<textarea id="kn-content" style="width:100%;min-height:200px;background:var(--c-navy-mid);border:1px solid var(--c-border);border-radius:8px;color:var(--c-text);padding:12px;font-size:.95rem;resize:vertical;font-family:inherit">' + esc(content) + '</textarea>' +
          '<button class="btn btn-orange" id="kn-save" style="margin-top:10px">Save Notes</button>' +
        '</div>';
      document.getElementById('kn-save').onclick = function() {
        Wren.api('/api/kitchen/notes', {
          method: 'POST',
          body: { date: today, content: document.getElementById('kn-content').value }
        }).then(function() { Wren.toast('Notes saved ✓', 'success'); })
          .catch(function() { Wren.toast('Save failed', 'error'); });
      };
    }).catch(function() {
      panel().innerHTML = '<div class="card"><div class="k-section-title">📝 Kitchen Notes</div><div class="empty-note">Could not load notes.</div></div>';
    });
  }

  // ── SFBB ──────────────────────────────────────────────────────────────────────
  function tabSfbb() {
    Wren.api('/api/kitchen/sfbb?date=' + today + '&shift=' + sfbbShift).then(function(d) {
      renderSfbb(d);
    }).catch(function() {
      panel().innerHTML = '<div class="empty-note">Could not load SFBB diary.</div>';
    });
  }

  function renderSfbb(d) {
    var sectionsHtml = (d.sections || []).map(function(sec) {
      return '<div class="check-section-label">' + esc(sec.section) + '</div>' +
        (sec.items || []).map(function(it, i) {
          var id = 'sf_' + sec.section.replace(/\W/g, '') + i;
          var needsVal = /°C|temperature|thermometer/i.test(it.item);
          return '<div class="check-row">' +
            '<input type="checkbox" id="' + id + '" data-sec="' + esc(sec.section) + '" data-item="' + esc(it.item) + '"' + (it.checked ? ' checked' : '') + '>' +
            '<label for="' + id + '">' + esc(it.item) + '</label>' +
            (needsVal ? '<input type="text" class="val-input" data-for="' + id + '" value="' + esc(it.value_text || '') + '" placeholder="°C">' : '') +
            '</div>';
        }).join('');
    }).join('');

    panel().innerHTML =
      '<div class="shift-tabs">' +
        '<button class="shift-btn' + (sfbbShift === 'opening' ? ' active' : '') + '" data-shift="opening">Opening Checks</button>' +
        '<button class="shift-btn' + (sfbbShift === 'closing' ? ' active' : '') + '" data-shift="closing">Closing Checks</button>' +
      '</div>' +
      '<div class="card">' +
        sectionsHtml +
        '<button class="btn btn-orange btn-block" id="sf-save" style="margin-top:16px">Save SFBB Diary</button>' +
      '</div>';

    panel().querySelectorAll('.shift-btn').forEach(function(btn) {
      btn.onclick = function() { sfbbShift = this.dataset.shift; tabSfbb(); };
    });

    document.getElementById('sf-save').onclick = function() {
      var items = [].map.call(panel().querySelectorAll('[data-sec]'), function(cb) {
        var vEl = panel().querySelector('.val-input[data-for="' + cb.id + '"]');
        return { section: cb.dataset.sec, item: cb.dataset.item, checked: cb.checked, value_text: vEl ? vEl.value : null };
      });
      Wren.api('/api/kitchen/sfbb', { method: 'POST', body: { date: today, shift: sfbbShift, items: items }})
        .then(function() { Wren.toast('SFBB diary saved ✓', 'success'); })
        .catch(function() { Wren.toast('Save failed', 'error'); });
    };
  }

  // ── CLEANING ──────────────────────────────────────────────────────────────────
  function tabClean() {
    Wren.api('/api/kitchen/cleaning?date=' + today).then(function(d) {
      var tasks = (d.tasks || []).map(function(t) {
        var doneNote = t.done && t.recorded_by ? ' <span style="color:var(--c-green);font-size:.78rem">✓ ' + esc(t.recorded_by) + '</span>' : '';
        return '<div class="check-row">' +
          '<input type="checkbox" data-id="' + t.id + '"' + (t.done ? ' checked' : '') + '>' +
          '<label><span style="font-weight:600">' + esc(t.area) + '</span> <span style="color:var(--c-muted);font-size:.82rem">(' + esc(t.frequency) + ')</span>' + doneNote + '</label>' +
          '</div>';
      }).join('');

      var dateStr = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
      panel().innerHTML =
        '<div class="card">' +
          '<div class="k-section-title">🧽 Cleaning — ' + esc(dateStr) + '</div>' +
          (tasks || '<div class="empty-note">No cleaning tasks configured.</div>') +
        '</div>';

      panel().querySelectorAll('[data-id]').forEach(function(cb) {
        cb.addEventListener('change', function() {
          var id = this.dataset.id;
          var done = this.checked;
          Wren.api('/api/kitchen/cleaning/log', { method: 'POST', body: { task_id: Number(id), date: today, done: done }})
            .then(function() { Wren.toast(done ? 'Marked done ✓' : 'Unmarked', 'success'); })
            .catch(function() { Wren.toast('Save failed', 'error'); });
        });
      });
    }).catch(function() {
      panel().innerHTML = '<div class="empty-note">Could not load cleaning tasks.</div>';
    });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  document.addEventListener('wren:ready', function() {
    loadTab('today');
  });

})();
</script>
</body>
</html>
