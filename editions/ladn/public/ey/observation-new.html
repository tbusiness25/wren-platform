  /* Render the framework chip row; highlights the active one. */
  function _renderFwChips() {
    var row = document.getElementById('obs-tag-fw-row');
    if (!row) return;
    row.innerHTML = '';
    TAG_FRAMEWORKS.forEach(function(f) {
      var on = (f.param === _tagFw);
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'obs-tag-fw-chip';
      b.setAttribute('role', 'tab');
      b.setAttribute('aria-selected', String(on));
      b.dataset.fw = f.param;
      b.textContent = f.label;
      b.style.cssText = 'flex:0 0 auto;padding:7px 13px;border-radius:16px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--c-border);' +
        (on ? 'background:var(--c-blue);border-color:var(--c-blue);color:#fff;'
            : 'background:transparent;color:var(--c-muted);');
      b.addEventListener('click', function() { _selectTagFramework(f.param); });
      row.appendChild(b);
    });
  }

  /* Switch the drawer to a framework: load (cached) statements then render. _tags is
   * NOT cleared, so selections from OTHER frameworks persist — that's the whole point. */
  /* Age-band chip row — distinct age_range values for the current framework.
   * Hidden when a framework has ≤1 band (e.g. EYFS statutory = "End of Reception"). */
  function _renderBandChips() {
    var row = document.getElementById('obs-tag-band-row');
    if (!row) return;
    var stmts = _stmtCache[_tagFw] || [];
    var bands = [];
    stmts.forEach(function(s) { if (s.age_range && bands.indexOf(s.age_range) === -1) bands.push(s.age_range); });
    bands.sort();
    if (bands.length <= 1) { row.style.display = 'none'; row.innerHTML = ''; _tagBand = ''; return; }
    if (_tagBand && bands.indexOf(_tagBand) === -1) _tagBand = '';
    row.style.display = 'flex';
    row.innerHTML = '';
    [{ label: 'All ages', val: '' }].concat(bands.map(function(b){ return { label: b, val: b }; })).forEach(function(c) {
      var on = (c.val === _tagBand);
      var b = document.createElement('button');
      b.type = 'button'; b.setAttribute('role', 'tab'); b.setAttribute('aria-selected', String(on));
      b.dataset.band = c.val; b.textContent = c.label;
      b.style.cssText = 'flex:0 0 auto;padding:5px 11px;border-radius:14px;font-size:.76rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--c-border);' +
        (on ? 'background:var(--c-navy,#1e293b);border-color:var(--c-blue);color:#fff;' : 'background:transparent;color:var(--c-muted);');
      b.addEventListener('click', function() {
        _tagBand = c.val; _renderBandChips();
        var s = document.getElementById('obs-tag-search');
        _renderTagList(s ? s.value.trim() : '');
      });
      row.appendChild(b);
    });
  }

  function _selectTagFramework(param) {
    _tagFw = param;
    _tagBand = '';                 // reset to "All ages" when switching framework
    _renderFwChips();
    var search = document.getElementById('obs-tag-search');
    var q = search ? search.value.trim() : '';
    if (_stmtCache[param]) {
      _renderBandChips(); _renderTagList(q);
    } else {
      var list = document.getElementById('obs-tag-list');
      if (list) list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--c-muted)">Loading…</div>';
      _loadStatements(param).then(function() { _renderBandChips(); _renderTagList(q); });
    }
  }

  function _closeTagDrawer() {
    var backdrop = document.getElementById('obs-tag-drawer-backdrop');
    var drawer   = document.getElementById('obs-tag-drawer');
    if (backdrop) backdrop.classList.remove('open');
    if (drawer)   { drawer.classList.remove('open'); drawer.setAttribute('aria-hidden', 'true'); }
    _renderTagChips();
    _saveDraft();   // persist tag selection into the draft so it survives navigation
    document.getElementById('obs-tags-add-btn').focus();
  }

  /* Per-framework cache: only fetch each framework's statements once (fixes the old
   * single _allStmts cache whose !length guard never reloaded after a framework switch). */
  function _loadStatements(param) {
    return Wren.api('/api/framework-statements?framework=' + encodeURIComponent(param) + '&limit=300')
      .then(function(data) {
        _stmtCache[param] = Array.isArray(data) ? data : [];
      })
      .catch(function(err) {
        _stmtCache[param] = _stmtCache[param] || [];
        if (window.Wren) Wren.toast('Could not load ' + param + ' tags', 'error');
        console.error('[obs] load statements:', err);
      });
  }

  function _renderTagList(q) {
    var list = document.getElementById('obs-tag-list');
    if (!list) return;
    var allStmts = _stmtCache[_tagFw] || [];
    var stmts = _tagBand ? allStmts.filter(function(s) { return s.age_range === _tagBand; }) : allStmts;
    var selectedIds = new Set(_tags.map(function(t) { return t.id; }));
    var filtered = q
      ? stmts.filter(function(s) {
          var hay = ((s.statement_text || '') + ' ' + (s.area || '') + ' ' + (s.aspect || '')).toLowerCase();
          return hay.indexOf(q.toLowerCase()) !== -1;
        })
      : stmts;

    if (!filtered.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--c-muted)">' +
        (allStmts.length ? 'No matching statements' : 'No statements for this framework yet') + '</div>';
      return;
    }

    /* Group by area */
    var groups = {};
    filtered.forEach(function(s) {
      var area = s.area || 'Other';
      if (!groups[area]) groups[area] = [];
      groups[area].push(s);
    });

    /* Age-band sort order (youngest first) */
    var AGE_ORDER = ['0-11','birth-11','0-12','12-24','birth-2','22-36','2-3','3-4','40-60','4-5','5+','all'];
    function _ageRank(range) {
      if (!range) return 999;
      var idx = AGE_ORDER.indexOf(range.toLowerCase().replace(/\s/g,''));
      return idx === -1 ? 500 : idx;
    }

    var html = '';
    Object.keys(groups).sort().forEach(function(area) {
      html += '<div class="obs-tag-area-heading" aria-label="Area: ' + _e(area) + '">' + _e(area) + '</div>';
      /* Sort statements within this area: age-band first, then aspect */
      groups[area].sort(function(a,b) {
        var ageA = _ageRank(a.age_range), ageB = _ageRank(b.age_range);
        if (ageA !== ageB) return ageA - ageB;
        var aspA = (a.aspect || '').toLowerCase(), aspB = (b.aspect || '').toLowerCase();
        return aspA < aspB ? -1 : aspA > aspB ? 1 : 0;
      });
      groups[area].forEach(function(s) {
        var sel = selectedIds.has(s.id);
        html += '<div class="obs-tag-stmt' + (sel ? ' selected' : '') + '" role="listitem" data-id="' + s.id + '" tabindex="0" aria-selected="' + sel + '">' +
                '  <div class="obs-tag-stmt-check" aria-hidden="true">' + (sel ? '✓' : '') + '</div>' +
                '  <div class="obs-tag-stmt-body">' +
                '    <div class="obs-tag-stmt-text">' + _e(s.statement_text) + '</div>' +
                '    <div class="obs-tag-stmt-meta">' + _e(s.aspect || '') + (s.age_range ? ' · ' + _e(s.age_range) : '') + '</div>' +
                '  </div>' +
                '</div>';
      });
    });
    list.innerHTML = html;

    list.querySelectorAll('.obs-tag-stmt').forEach(function(row) {
      function _toggleTag() {
        var id = parseInt(row.dataset.id, 10);
        var stmt = (_stmtCache[_tagFw] || []).find(function(x) { return x.id === id; });
        if (!stmt) return;
        var idx = _tags.findIndex(function(x) { return x.id === id; });
        if (idx === -1) { _tags.push(stmt); } else { _tags.splice(idx, 1); }
        var sel = _tags.some(function(x) { return x.id === id; });
        row.classList.toggle('selected', sel);
        row.setAttribute('aria-selected', String(sel));
        var check = row.querySelector('.obs-tag-stmt-check');
        if (check) check.textContent = sel ? '✓' : '';
      }
      row.addEventListener('click', _toggleTag);
      row.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); _toggleTag(); }
      });
    });
  }

  function _renderTagChips() {
    var row    = document.getElementById('obs-tags-row');
    var addBtn = document.getElementById('obs-tags-add-btn');
    if (!row || !addBtn) return;
    row.querySelectorAll('.obs-tag-chip').forEach(function(el) { el.remove(); });
    _tags.forEach(function(t) {
      var chip = document.createElement('div');

      var label = (fwShort ? fwShort + ' · ' : '') + (t.statement_text || '').substring(0, 20);
      chip.innerHTML =
        '<span title="' + _e((fwShort ? fwShort + ' — ' : '') + (t.statement_text || '')) + '">' + _e(label) + '</span>' +
        '<button class="obs-tag-chip-remove" type="button" aria-label="Remove tag" data-id="' + t.id + '">×</button>';
      chip.querySelector('.obs-tag-chip-remove').addEventListener('click', function() {
        _tags = _tags.filter(function(x) { return x.id !== t.id; });

    _updateB5mCard();

  /* ────────────────────────────────────────────────────────────────────────────
   * Save as draft — enqueues into the outbox with status:'draft' so it won't
   * auto-sync; staff can review/submit from /ey/drafts.
   * ──────────────────────────────────────────────────────────────────────────── */
  async function _saveDraftToOutbox() {
    if (!window.WrenObsOutbox) {
      if (window.Wren) Wren.toast('Outbox unavailable', 'error');
      return;
    }
    var obsText = (document.getElementById('obs-text') || {}).value.trim();
    if (!obsText) {
      _showError('Add some text before saving a draft.');
      return;
    }
    if (!_children.length) {
      // A childless draft can never be submitted (server requires child_id → 400),
      // so it would become a permanently-stuck 'failed' outbox entry. Require a child.
      _showError('Select at least one child before saving a draft.');
      return;
    }

    var draftBtn = document.getElementById('obs-topbar-draft');
    if (draftBtn) { draftBtn.disabled = true; draftBtn.textContent = 'Saving…'; }

    var dateEl   = document.getElementById('obs-date');
    var timeEl   = document.getElementById('obs-time');
    var obsDate  = (dateEl ? dateEl.value : '') + (timeEl && timeEl.value ? 'T' + timeEl.value + ':00' : 'T00:00:00');
    var shared   = !(document.getElementById('obs-private') || {}).checked; // share-all policy 2026-07-10
    var dslOnly  = !!(document.getElementById('obs-private') || {}).checked;
    var termly   = !!(document.getElementById('obs-termly') || {}).checked;
    var nextSteps = (document.getElementById('obs-next-steps') || {}).value.trim();
    var analysis  = (document.getElementById('obs-analysis') || {}).value || '';
    var comments  = (document.getElementById('obs-comments') || {}).value || '';
    var tagIds   = _tags.map(function(t) { return t.id; });
    var pendingFiles = _photoFiles.filter(function(r) { return !r.url; }).map(function(r) { return r.file; });

    /* Enqueue one entry per selected child (guaranteed ≥1 by the guard above). */
    var targets = _children;

    try {
      for (var i = 0; i < targets.length; i++) {
        var child = targets[i];
        var clientUuid = WrenObsOutbox.uuid();
        var payload = {
          child_id:              child.id,
          observation_text:      obsText,
          observation_type:      (document.getElementById('obs-planned') && document.getElementById('obs-planned').checked) ? 'planned_activity' : 'learning_story',
          photo_urls:            _photoUrls.slice(),
          shared_with_parents:   shared,
          dsl_only:              dslOnly,
          termly_update:         termly,
          next_steps:            nextSteps || null,
          analysis:              analysis.trim() || null,
          additional_comments:   comments.trim() || null,
          framework_tracker_ids: tagIds,
          obs_date:              obsDate,
          client_uuid:           clientUuid,
          _child_label:          child.first_name
        };
        await WrenObsOutbox.enqueue(payload, pendingFiles, { status: 'draft' });
      }
      _clearDraft();
      if (window.Wren) {
        Wren.toast('Saved as draft — find it in Drafts 📝', 'info', 3500);
        setTimeout(function() { Wren.navigate('/ey/drafts'); }, 1200);
      } else {
        setTimeout(function() { location.href = '/ey/drafts'; }, 1200);
      }
    } catch (err) {
      if (window.Wren) Wren.toast('Could not save draft: ' + (err.message || 'error'), 'error');
      if (draftBtn) { draftBtn.disabled = false; draftBtn.textContent = 'Draft'; }
    }
  }

  /* ────────────────────────────────────────────────────────────────────────────
   * Save
   * ──────────────────────────────────────────────────────────────────────────── */
  function _showError(msg) {
    var el = document.getElementById('obs-error');
    if (!el) return;
    el.textContent = msg;
    el.hidden = false;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function _hideError() {
    var el = document.getElementById('obs-error');
    if (el) el.hidden = true;
  }

  async function _save() {
    if (_saving) return;
    _hideError();

    var obsText = (document.getElementById('obs-text') || {}).value.trim();
    if (!_children.length) {
      _showError('Please select at least one child.');
      return;
    }
    if (!obsText) {
      _showError('Please describe what you saw.');
      return;
    }

    var dateEl = document.getElementById('obs-date');
    var timeEl = document.getElementById('obs-time');
    var obsDate = (dateEl ? dateEl.value : '') + (timeEl && timeEl.value ? 'T' + timeEl.value + ':00' : 'T00:00:00');
    var shared  = !(document.getElementById('obs-private') || {}).checked; // share-all policy 2026-07-10
    var dslOnly = !!(document.getElementById('obs-private') || {}).checked;
    var termly  = !!(document.getElementById('obs-termly') || {}).checked;
    var nextSteps = (document.getElementById('obs-next-steps') || {}).value.trim();
    var analysisV = ((document.getElementById('obs-analysis') || {}).value || '').trim();
    var commentsV = ((document.getElementById('obs-comments') || {}).value || '').trim();
    var tagIds  = _tags.map(function(t) { return t.id; });

    var saveBtn = document.getElementById('obs-topbar-save');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
    _saving = true;

    var errors  = [];
    var savedIds = [];
    var queuedCount = 0;

    /* Photo File objects that never got an online URL — these need to ride
     * along in the outbox so they can be uploaded on sync. */
    var pendingFiles = _photoFiles.filter(function(r) { return !r.url; }).map(function(r) { return r.file; });
    var childLabel = _children.map(function(c){ return c.first_name; }).join(', ');

    /* Decide whether a failure is "network-ish" (queue it) vs a real app error
     * (surface it). Wren.api rejects with the parsed JSON body {error} on a
     * non-2xx response; a genuine network failure rejects with a TypeError
     * ("Failed to fetch") and has no .error field. */
    function _isNetworkError(err) {
      if (!navigator.onLine) return true;
      if (err instanceof TypeError) return true;          // fetch network failure
      if (err && err.error) return false;                 // server returned a JSON error → real
      if (err && typeof err.message === 'string' &&
          /failed to fetch|networkerror|load failed/i.test(err.message)) return true;
      return false;
    }

    try {
      for (var i = 0; i < _children.length; i++) {
        var child = _children[i];
        var clientUuid = (window.WrenObsOutbox && WrenObsOutbox.uuid)
          ? WrenObsOutbox.uuid()
          : (Date.now() + '-' + i + '-' + Math.random().toString(16).slice(2));
        var payload = {
          child_id:            child.id,
          observation_text:    obsText,
          observation_type:    (document.getElementById('obs-planned') && document.getElementById('obs-planned').checked) ? 'planned_activity' : 'learning_story',
          photo_urls:          _photoUrls.slice(),
          shared_with_parents: shared,
          dsl_only:            dslOnly,
          termly_update:       termly,
          next_steps:          nextSteps || null,
          analysis:            analysisV || null,
          additional_comments: commentsV || null,
          framework_tracker_ids: tagIds,
          obs_date:            obsDate,
          client_uuid:         clientUuid
        };

        /* Offline up front → queue immediately, don't even attempt the network. */
        if (!navigator.onLine && window.WrenObsOutbox) {
          try {
            await WrenObsOutbox.enqueue(
              Object.assign({}, payload, { _child_label: child.first_name }),
              pendingFiles
            );
            queuedCount++;
          } catch (qe) {
            errors.push(_e(child.first_name) + ': could not save offline');
          }
          continue;
        }

        try {
          var result = await Wren.api('/api/observations', { method: 'POST', body: payload });
          savedIds.push(result.id);
        } catch (err) {
          if (_isNetworkError(err) && window.WrenObsOutbox) {
            /* Network died mid-save → fall back to the outbox, don't error. */
            try {
              await WrenObsOutbox.enqueue(
                Object.assign({}, payload, { _child_label: child.first_name }),
                pendingFiles
              );
              queuedCount++;
            } catch (qe) {
              errors.push(_e(child.first_name) + ': could not save offline');
            }
          } else {
            errors.push(_e(child.first_name) + ': ' + (err.error || err.message || 'failed'));
          }
        }
      }

      if (errors.length) {
        _showError('Some failed: ' + errors.join('; '));
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      } else {
        _clearDraft();
        /* Clear the home-grid multi-select set so it doesn't bleed into the next obs */
        try { sessionStorage.removeItem(SELECTION_KEY); sessionStorage.removeItem('eyGroupSelection'); } catch (_) {}
        if (queuedCount && !savedIds.length) {
          /* Pure offline save */
          if (window.Wren) Wren.toast('Saved offline — will sync when back online ⏳', 'info', 4000);
        } else if (queuedCount) {
          /* Mixed (rare): some online, some queued */
          if (window.Wren) Wren.toast('Saved · ' + queuedCount + ' queued offline ⏳', 'info', 4000);
        } else {
          var savedCount = savedIds.length;
          var stmtNote = (tagIds && tagIds.length)
            ? ' · ' + tagIds.length + ' statement' + (tagIds.length === 1 ? '' : 's') + ' → tracker'
            : '';
          if (window.Wren) Wren.toast('Observation saved for ' + savedCount + ' ' + (savedCount === 1 ? 'child' : 'children') + ' ✓' + stmtNote, 'success', 3000);
        }
        setTimeout(_close, queuedCount ? 1100 : 800);
      }
    } catch (e) {
      _showError(e.error || e.message || 'Save failed');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
    } finally {
      _saving = false;
    }
  }

  /* ────────────────────────────────────────────────────────────────────────────
   * Load children + pre-populate from URL param
   * ──────────────────────────────────────────────────────────────────────────── */
  /* Gather the set of pre-selected child ids, in priority order:
   *   1. ?children=1,2,3  (explicit multi-child group selection)
   *   2. ?child=:id       (legacy single-child flow)
   *   3. sessionStorage 'wren.ey.selection' (child grid multi-select on /ey/home)
   * De-duplicated, order-preserving. */
  var SELECTION_KEY = 'wren.ey.selection';
  var SELECTION_TTL = 30 * 60 * 1000;

  function _preselectedIds() {
    var ids    = [];
    var seen   = {};
    function _add(n) {
      var id = parseInt(n, 10);
      if (id && !seen[id]) { seen[id] = true; ids.push(id); }
    }

    var params = new URLSearchParams(location.search);

    /* ?children=1,2,3 */
    var multi = params.get('children');
    if (multi) multi.split(',').forEach(_add);

    /* ?child=:id (legacy single) */
    _add(params.get('child') || 0);

    /* sessionStorage selection set from the /ey/home child grid */
    try {
      var raw = sessionStorage.getItem(SELECTION_KEY);
      if (raw) {
        var sel = JSON.parse(raw);
        if (sel && sel.childIds && (!sel.timestamp || (Date.now() - sel.timestamp) <= SELECTION_TTL)) {
          sel.childIds.forEach(_add);
        }
      }
    } catch (_) {}

    return ids;
  }

  function _loadChildren() {
    Wren.api('/api/children').then(function(data) {
      _allChildren = Array.isArray(data) ? data : (data && data.rows ? data.rows : []);

      /* Pre-populate ALL pre-selected children (group observation auto-fill) */
      var preIds = _preselectedIds();
      var added  = false;
      preIds.forEach(function(id) {
        var child = _allChildren.find(function(c) { return c.id === id; });
        if (child && !_children.some(function(c) { return c.id === id; })) {
          _children.push(child);
          added = true;
        }
      });
      if (added) _renderChildChips();
    }).catch(function() {
      if (window.Wren) Wren.toast('Could not load children list', 'error');
    });
  }

  /* ────────────────────────────────────────────────────────────────────────────
   * Boot
   * ──────────────────────────────────────────────────────────────────────────── */
  document.addEventListener('wren:ready', function() {
    _injectTopbarButtons();
    _initDateTime();
    _initCards();
    _initDraft();
    _renderFrameworkBtn();
    _initChildDrawer();
    _initPhotos();
    _initTagDrawer();
    _initFrameworkBtn();

    /* Prompt 28: arriving from Trackers → "Record termly update" pre-ticks the
     * Termly Update toggle so the saved observation clears that child's reminder. */
    try {
      if (new URLSearchParams(location.search).get('termly') === '1') {
        var tu = document.getElementById('obs-termly');
        if (tu) tu.checked = true;
      }
    } catch (_) {}

    /* Voice */
    var textarea = document.getElementById('obs-text');
    if (typeof WrenVoice !== 'undefined' && textarea) {
      WrenVoice.attachTo(textarea, { context: 'observation' });
      /* Hide the manual voice button since WrenVoice attaches its own */
      var voiceBtn = document.getElementById('obs-voice-btn');
      if (voiceBtn) voiceBtn.style.display = 'none';
    }

    _loadChildren();

    /* Offline outbox status line — show queued/draft/failed counts under the
     * textarea; tappable link to /ey/drafts so staff can review the queue. */
    function _renderOutboxStatus(c) {
      var statusEl = document.getElementById('obs-draft-status');
      if (!statusEl || !c) return;
      if (c.total) {
        var bits = [];
        if (c.pending || c.syncing) bits.push((c.pending + c.syncing) + ' waiting to sync');
        if (c.draft) bits.push(c.draft + ' draft' + (c.draft > 1 ? 's' : ''));
        if (c.failed) bits.push(c.failed + ' failed');
        var label = '⏳ ' + bits.join(' · ');
        statusEl.innerHTML = '<a href="/ey/drafts" aria-label="View drafts and pending observations">' + label + '</a>';
        statusEl.style.color = c.failed ? 'var(--c-red)' : 'var(--c-muted)';
      } else {
        statusEl.innerHTML = '';
      }
    }
    window.addEventListener('wren:outbox-changed', function(e) { _renderOutboxStatus(e.detail); });
    if (window.WrenObsOutbox) WrenObsOutbox.counts().then(_renderOutboxStatus);

    /* ── Draft with Wren (Twinkl-Ari) ── */
    (function initDW() {
      var panel      = document.getElementById('dw-panel');
      var openBtn    = document.getElementById('dw-open-btn');
      var saveBtn    = document.getElementById('dw-save-btn');
      var cancelBtn  = document.getElementById('dw-cancel-btn');
      var suggestions = document.getElementById('dw-suggestions');
      var coelPanel  = document.getElementById('dw-coel');
      var coelList   = document.getElementById('dw-coel-list');
      var output     = document.getElementById('dw-output');
      var loadEl     = document.getElementById('dw-load');
      var actionsEl  = document.getElementById('dw-actions');
      var tabObs     = document.getElementById('tab-obs');
      var tabParent  = document.getElementById('tab-parent');
      var tabNext    = document.getElementById('tab-next');
      var regBtn     = document.getElementById('dw-regenerate');

      if (!panel || !openBtn) return;

      var _dwObservationId = null;
      var _dwSuggestions   = [];
      var _dwCoelSelections = [];
      var _dwCurrentObsId  = null;

      function _showDW() {
        panel.classList.add('visible');
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        openBtn.style.display = 'none';
      }
      function _hideDW() {
        panel.classList.remove('visible');
        panel.hidden = true;
        suggestions.hidden = true;
        coelPanel.hidden = true;
        output.hidden = true;
        actionsEl.hidden = true;
        loadEl.hidden = true;
        openBtn.style.display = '';
        _dwSuggestions = [];
        _dwCoelSelections = [];
      }

      /* Tab switching */
      document.querySelectorAll('.dw-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.dw-tab').forEach(function(t){ t.classList.remove('active'); });
          document.querySelectorAll('.dw-tab-body').forEach(function(b){ b.classList.remove('active'); });
          tab.classList.add('active');
          var target = document.getElementById(tab.getAttribute('data-dw-tab'));
          if (target) target.classList.add('active');
        });
      });

      /* Open button */
      openBtn.addEventListener('click', function() {
        var txt = (document.getElementById('obs-text') || {}).value.trim();
        if (!txt) {
          if (window.Wren) Wren.toast('Write some observation text first.', 'warning', 2500);
          return;
        }
        // Get the current observation ID (if editing an existing one)
        var urlParams = new URLSearchParams(location.search);
        _dwCurrentObsId = parseInt(urlParams.get('id')) || 0;
        _showDW();
        _runSuggest(txt);
      });

      /* Run suggest-statements */
      async function _runSuggest(text) {
        loadEl.hidden = false;
        suggestions.hidden = true;
        coelPanel.hidden = true;
        output.hidden = true;
        actionsEl.hidden = true;

        var childId = _children.length ? _children[0].id : 0;
        var fwList = ['birth_to_5','development_matters','coel'];

        try {
          var token = sessionStorage.getItem('wrenToken') || '';
          var obsId = _dwCurrentObsId || 'new';
          var resp = await fetch('/api/observations/' + obsId + '/suggest-statements', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': token ? 'Bearer ' + token : ''
            },
            body: JSON.stringify({ observation_text: text, child_id: childId, frameworks: fwList })
          });
          if (!resp.ok) throw new Error('suggest failed: ' + resp.status);
          var data = await resp.json();
          loadEl.hidden = true;
          _renderSuggestions(data);
        } catch (e) {
          loadEl.hidden = true;
          if (window.Wren) Wren.toast('Suggest failed: ' + e.message, 'error');
        }
      }

      /* Render suggestion list */
      function _renderSuggestions(data) {
        _dwSuggestions = data.suggestions || [];
        _dwCoelSelections = [];

        var html = '';
        var lastFw = '';
        var lastArea = '';

        for (var i = 0; i < _dwSuggestions.length; i++) {
          var s = _dwSuggestions[i];
          if (s.framework !== lastFw) {
            html += '<div class="dw-stmt-group"><div class="dw-stmt-group-title">' +
              (_FW_SHORT[s.framework] || s.framework) + '</div>';
            lastFw = s.framework;
            lastArea = '';
          }
          if (s.area && s.area !== lastArea) {
            html += '<div class="dw-stmt-group-title" style="padding-left:12px;">' + _e(s.area) + '</div>';
            lastArea = s.area;
          }
          html += '<div class="dw-stmt-item" data-stmt-id="' + s.id + '" data-fw="' + s.framework + '" data-code="' + _e(s.statement_code) + '">' +
            '<input type="checkbox">' +
            '<div class="dw-stmt-body">' +
              '<div class="dw-stmt-text">' + _e(s.statement_text) +
                (s.age_range ? '<span class="dw-age-chip">' + _e(s.age_range) + '</span>' : '') +
              '</div>' +
              '<div class="dw-stmt-meta">' + _e((s.aspect || s.area || '').substring(0, 50)) + '</div>' +
              (s._why ? '<div class="dw-stmt-why">' + _e(s._why) + '</div>' : '') +
            '</div></div>';
        }
        suggestions.innerHTML = html;
        suggestions.hidden = false;

        /* Checkbox toggles */
        suggestions.querySelectorAll('.dw-stmt-item input[type=checkbox]').forEach(function(cb) {
          cb.addEventListener('change', function() {
            var item = this.closest('.dw-stmt-item');
            item.classList.toggle('checked', this.checked);
          });
        });

        /* Render CoEL cards */
        if (data.coel_matches && data.coel_matches.length) {
          _renderCoel(data.coel_matches);
          coelPanel.hidden = false;
        }

        /* Generate draft automatically after suggestions */
        _runDraft();
      }

      /* Render CoEL cards */
      function _renderCoel(matches) {
        var coelAreas = [
          { key: 'pe', name: 'Playing and Exploring', levels: ['Finding out and exploring','Playing with what they know','Being willing to have a go'] },
          { key: 'al', name: 'Active Learning', levels: ['Being involved and concentrating','Keeping on trying','Enjoying achieving what they set out to do'] },
          { key: 'ctc', name: 'Creating and Thinking Critically', levels: ['Having their own ideas','Making links','Working with ideas'] }
        ];
        var html = '';
        for (var i = 0; i < coelAreas.length; i++) {
          var area = coelAreas[i];
          html += '<div class="dw-coel-card" data-coel-key="' + area.key + '">' +
            '<div class="dw-coel-title">' + area.name + '</div>' +
            '<div class="dw-coel-pills">';
          for (var j = 0; j < 3; j++) {
            var labels = ['Emerging','Developing','Secure'];
            html += '<button class="dw-coel-pill" data-level="' + labels[j].toLowerCase() + '">' + labels[j] + '</button>';
          }
          html += '</div></div>';
        }
        coelList.innerHTML = html;
        coelList.querySelectorAll('.dw-coel-pill').forEach(function(pill) {
          pill.addEventListener('click', function() {
            var card = this.closest('.dw-coel-card');
            card.classList.add('checked');
            card.querySelectorAll('.dw-coel-pill').forEach(function(p){ p.classList.remove('sel'); });
            this.classList.add('sel');
          });
        });
      }

      /* Generate draft (parent-friendly prose) */
      async function _runDraft() {
        var checked = [];
        var items = suggestions.querySelectorAll('.dw-stmt-item.checked');
        for (var i = 0; i < items.length; i++) {
          var ci = items[i].querySelector('input[type=checkbox]');
          var code = items[i].getAttribute('data-code');
          var fid = items[i].getAttribute('data-stmt-id');
          var fw = items[i].getAttribute('data-fw');
          checked.push({ statement_id: parseInt(fid), framework: fw, statement_code: code });
        }
        var coelSel = [];
        coelList.querySelectorAll('.dw-coel-card').forEach(function(card) {
          var sel = card.querySelector('.dw-coel-pill.sel');
          if (sel) coelSel.push({ characteristic: card.querySelector('.dw-coel-title').textContent, level: sel.getAttribute('data-level') });
        });

        try {
          var token = sessionStorage.getItem('wrenToken') || '';
          var obsId = _dwCurrentObsId || 'new';
          var txt = (document.getElementById('obs-text') || {}).value.trim();
          var childId = _children.length ? _children[0].id : 0;
          var childName = _children.length ? _children[0].first_name : '';
          var name = (new URLSearchParams(location.search)).get('child_name') || childName || 'this child';

          var resp = await fetch('/api/observations/' + obsId + '/draft', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': token ? 'Bearer ' + token : ''
            },
            body: JSON.stringify({
              observation_text: txt,
              child_name: name,
              child_pronouns: 'they',
              statement_codes: checked,
              coel_selections: coelSel
            })
          });
          if (!resp.ok) throw new Error('draft failed: ' + resp.status);
          var data = await resp.json();

          document.getElementById('dw-out-obs').value = data.polished_observation || txt;
          document.getElementById('dw-out-parent').value = data.parent_friendly_text || '';
          document.getElementById('dw-out-next').value = (data.next_steps || []).join('\n');
          output.hidden = false;
          actionsEl.hidden = false;
        } catch (e) {
          if (window.Wren) Wren.toast('Draft failed: ' + e.message, 'error');
        }
      }

      /* Save confirmed links */
      async function _handleSave() {
        var checked = [];
        suggestions.querySelectorAll('.dw-stmt-item.checked').forEach(function(item) {
          checked.push({
            statement_id: parseInt(item.getAttribute('data-stmt-id')),
            framework: item.getAttribute('data-fw'),
            statement_code: item.getAttribute('data-code'),
            is_next_step: false
          });
        });
        var coelSel = [];
        coelList.querySelectorAll('.dw-coel-card').forEach(function(card) {
          var sel = card.querySelector('.dw-coel-pill.sel');
          if (sel) coelSel.push({
            characteristic: card.querySelector('.dw-coel-title').textContent,
            level: sel.getAttribute('data-level'),
            statement_code: null
          });
        });
        var nextSteps = document.getElementById('dw-out-next').value.trim();

        saveBtn.textContent = 'Saving…'; saveBtn.disabled = true;
        try {
          var token = sessionStorage.getItem('wrenToken') || '';
          var obsId = _dwCurrentObsId || 'new';
          var resp = await fetch('/api/observations/' + obsId + '/statements', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': token ? 'Bearer ' + token : ''
            },
            body: JSON.stringify({ statements: checked, coel_selections: coelSel, next_steps_text: nextSteps })
          });
          if (!resp.ok) throw new Error('save failed: ' + resp.status);
          saveBtn.textContent = '💾 Save & close';
          saveBtn.disabled = false;
          _hideDW();
          if (window.Wren) Wren.toast('Statement links saved ✓', 'success', 2500);
        } catch (e) {
          saveBtn.textContent = '💾 Save & close';
          saveBtn.disabled = false;
          if (window.Wren) Wren.toast('Save failed: ' + e.message, 'error');
        }
      }

      /* Copy to parent message */
      document.getElementById('dw-copy-parent').addEventListener('click', function() {
        var el = document.getElementById('dw-out-parent');
        navigator.clipboard.writeText(el.value).then(function() {
          if (window.Wren) Wren.toast('Copied to clipboard ✓', 'info', 1500);
        });
      });

      /* Event bindings */
      saveBtn.addEventListener('click', _handleSave);
      cancelBtn.addEventListener('click', _hideDW);
      if (regBtn) regBtn.addEventListener('click', _runDraft);

      /* Regenerate for parent/next tabs also */
      var regP = document.getElementById('dw-regenerate-p');
      var regN = document.getElementById('dw-regenerate-n');
      if (regP) regP.addEventListener('click', _runDraft);
      if (regN) regN.addEventListener('click', _runDraft);
    })();
  });

}());
</script>
</body>
</html>
