<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"   content="ladn">
  <meta name="wren-app-page"  content="more">
  <meta name="wren-app-title" content="Child Register">
  <meta name="wren-app-chat"  content="on">
  <title>Child Register · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    #ey-register-page {
      padding: 12px 12px env(safe-area-inset-bottom, 16px);
    }

    #ey-register-back {
      width: 44px; height: 44px;
      background: transparent; border: none;
      color: var(--c-text); cursor: pointer;
      border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #ey-register-back:hover { background: rgba(255,255,255,0.06); }

    /* Summary strip */
    .reg-summary {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .reg-summary-card {
      flex: 1;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }
    .reg-summary-num {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--c-text);
    }
    .reg-summary-num.in   { color: var(--c-green, #22c55e); }
    .reg-summary-num.out  { color: var(--c-muted); }
    .reg-summary-num.abs  { color: var(--c-amber, #f59e0b); }
    .reg-summary-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--c-muted);
      margin-top: 2px;
    }

    /* Room filter chips */
    .reg-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .reg-chip {
      flex-shrink: 0;
      height: 36px;
      padding: 0 16px;
      border-radius: 18px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .reg-chip.active {
      background: var(--c-blue);
      border-color: var(--c-blue);
      color: #fff;
    }

    /* Child rows */
    .reg-list { display: flex; flex-direction: column; gap: 8px; }

    .reg-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .reg-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .reg-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(74,154,191,0.18);
      color: var(--c-blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: .95rem;
      flex-shrink: 0;
    }
    .reg-name-wrap { flex: 1; min-width: 0; }
    .reg-name {
      font-size: .95rem;
      font-weight: 700;
      color: var(--c-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reg-meta {
      font-size: .76rem;
      color: var(--c-muted);
      margin-top: 2px;
    }
    .reg-status {
      flex-shrink: 0;
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .reg-status.in   { background: rgba(34,197,94,0.15); color: var(--c-green, #22c55e); }
    .reg-status.out  { background: rgba(148,163,184,0.15); color: var(--c-muted); }
    .reg-status.abs  { background: rgba(245,158,11,0.15); color: var(--c-amber, #f59e0b); }
    .reg-status.none { background: rgba(148,163,184,0.1); color: var(--c-muted); }

    .reg-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .reg-btn {
      flex: 1;
      min-height: 44px;
      border-radius: 10px;
      border: 1px solid var(--c-border);
      background: transparent;
      color: var(--c-text);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .reg-btn:active { transform: scale(.98); }
    .reg-btn.in    { border-color: var(--c-green, #22c55e); color: var(--c-green, #22c55e); }
    .reg-btn.in:hover { background: rgba(34,197,94,0.12); }
    .reg-btn.out   { border-color: var(--c-blue); color: var(--c-blue); }
    .reg-btn.out:hover { background: rgba(74,154,191,0.12); }
    .reg-btn.abs   { border-color: var(--c-amber, #f59e0b); color: var(--c-amber, #f59e0b); }
    .reg-btn.abs:hover { background: rgba(245,158,11,0.12); }
    .reg-btn:disabled { opacity: .4; cursor: default; }

    .reg-allergy {
      margin-top: 8px;
      font-size: .76rem;
      color: var(--c-red, #ef4444);
      font-weight: 600;
    }

    .reg-room-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--c-muted);
      margin: 14px 4px 8px;
    }

    .reg-empty {
      text-align: center;
      padding: 30px 16px;
      color: var(--c-muted);
      font-size: .9rem;
    }

    #reg-queue-notice {
      display: none;
      background: rgba(74,154,191,0.12);
      border: 1px solid rgba(74,154,191,0.35);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: .82rem;
      color: #4a9abf;
      margin-bottom: 12px;
      text-align: center;
    }

    /* Absence sheet */
    .reg-sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); /* was .55 — staff found the sheet too dark */
      z-index: 900;
      display: none;
      align-items: flex-end;
    }
    .reg-sheet-backdrop.open { display: flex; }
    .reg-sheet {
      background: var(--c-surface);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border: 1px solid var(--c-border);
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    }
    .reg-sheet h3 {
      margin: 0 0 4px;
      font-size: 1.05rem;
      color: var(--c-text);
    }
    .reg-sheet-sub {
      font-size: .82rem;
      color: var(--c-muted);
      margin-bottom: 14px;
    }
    .reg-sheet select {
      width: 100%;
      min-height: 46px;
      background: var(--c-bg, #0f172a);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      color: var(--c-text);
      font-size: .92rem;
      padding: 0 12px;
      margin-bottom: 14px;
    }
    .reg-sheet-actions { display: flex; gap: 8px; }
    .reg-sheet-actions button {
      flex: 1;
      min-height: 46px;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--c-border);
      background: transparent;
      color: var(--c-text);
    }
    .reg-sheet-actions .confirm {
      background: var(--c-amber, #f59e0b);
      border-color: var(--c-amber, #f59e0b);
      color: #1a1205;
    }
  </style>
</head>
<body data-portal="ey">

<div id="ey-register-page">

  <div class="reg-summary">
    <div class="reg-summary-card"><div class="reg-summary-num in"  id="reg-count-in">–</div><div class="reg-summary-label">In</div></div>
    <div class="reg-summary-card"><div class="reg-summary-num out" id="reg-count-out">–</div><div class="reg-summary-label">Out</div></div>
    <div class="reg-summary-card"><div class="reg-summary-num abs" id="reg-count-abs">–</div><div class="reg-summary-label">Absent</div></div>
    <div class="reg-summary-card"><div class="reg-summary-num"     id="reg-count-exp">–</div><div class="reg-summary-label">Expected</div></div>
  </div>

  <div id="reg-queue-notice" role="status" aria-live="polite"></div>

  <!-- Prompt 28B: termly-update nudge — shows when key children still need theirs -->
  <a id="reg-termly-banner" href="/ey/trackers#termly" role="status"
     style="display:none;align-items:center;gap:10px;padding:11px 13px;margin-bottom:10px;
            border-radius:12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);
            color:#f1f5f9;text-decoration:none;font-size:.86rem"></a>

  <div class="reg-chips" id="reg-chips"></div>

  <div class="reg-list" id="reg-list">
    <div class="app-skeleton" style="height:96px;border-radius:12px;margin-bottom:8px"></div>
    <div class="app-skeleton" style="height:96px;border-radius:12px;margin-bottom:8px"></div>
    <div class="app-skeleton" style="height:96px;border-radius:12px"></div>
  </div>

</div><!-- #ey-register-page -->

<!-- Mark-absent sheet -->
<div class="reg-sheet-backdrop" id="reg-abs-backdrop">
  <div class="reg-sheet" role="dialog" aria-modal="true" aria-labelledby="reg-abs-title">
    <h3 id="reg-abs-title">Mark Absent</h3>
    <div class="reg-sheet-sub" id="reg-abs-sub"></div>
    <select id="reg-abs-reason" aria-label="Absence reason" style="font-size:1.15rem;padding:14px;width:100%;background:var(--c-surface);color:var(--c-text);border:2px solid var(--c-blue);border-radius:12px">
      <option value="holiday">Holiday</option>
      <option value="sick">Sick</option>
      <option value="not-booked">Not booked in</option>
      <option value="other">Other</option>
    </select>
    <div class="reg-sheet-actions">
      <button type="button" id="reg-abs-cancel">Cancel</button>
      <button type="button" class="confirm" id="reg-abs-confirm">Mark Absent</button>
    </div>
  </div>
</div>

<!-- Sign-out sheet (s03: collection tracking) -->
<div class="reg-sheet-backdrop" id="reg-signout-backdrop">
  <div class="reg-sheet" role="dialog" aria-modal="true" aria-labelledby="reg-signout-title">
    <h3 id="reg-signout-title">Sign Out</h3>
    <div class="reg-sheet-sub" id="reg-signout-sub"></div>
    <label style="font-size:.78rem;color:var(--c-muted);font-weight:700;margin-bottom:6px;display:block">Collected by</label>
    <select id="reg-signout-collector" aria-label="Collected by" style="font-size:1.05rem;padding:12px;width:100%;background:var(--c-surface);color:var(--c-text);border:1px solid var(--c-border);border-radius:10px;margin-bottom:8px">
      <option value="">— Not specified —</option>
    </select>
    <input type="text" id="reg-signout-other" placeholder="Or type a name…" style="font-size:.95rem;padding:10px;width:100%;background:var(--c-surface);color:var(--c-text);border:1px solid var(--c-border);border-radius:10px;margin-bottom:14px;display:none">
    <div class="reg-sheet-actions">
      <button type="button" id="reg-signout-cancel">Cancel</button>
      <button type="button" class="confirm" id="reg-signout-confirm">Sign Out</button>
    </div>
  </div>
</div>

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  var STATE = { children: [], room: 'all', absChildId: null, signoutChildId: null, collectors: {} };

  /* ─── Offline register outbox ──────────────────────────────────────────── */
  var _regQ = (function () {
    var DB = 'wren-reg-outbox', VER = 1, ST = 'queue', _dbp = null;
    function open() {
      if (_dbp) return _dbp;
      _dbp = new Promise(function (res, rej) {
        if (!('indexedDB' in window)) { rej(new Error('no IDB')); return; }
        var r = indexedDB.open(DB, VER);
        r.onupgradeneeded = function (e) {
          e.target.result.createObjectStore(ST, { keyPath: 'id', autoIncrement: true });
        };
        r.onsuccess = function (e) { res(e.target.result); };
        r.onerror   = function ()  { rej(r.error); };
      });
      return _dbp;
    }
    function _wrap(req) {
      return new Promise(function (res, rej) {
        req.onsuccess = function () { res(req.result); };
        req.onerror   = function () { rej(req.error); };
      });
    }
    function all() {
      return open().then(function (db) {
        return _wrap(db.transaction(ST, 'readonly').objectStore(ST).getAll());
      });
    }
    function add(item) {
      return open().then(function (db) {
        return _wrap(db.transaction(ST, 'readwrite').objectStore(ST).add(item));
      });
    }
    function del(id) {
      return open().then(function (db) {
        return _wrap(db.transaction(ST, 'readwrite').objectStore(ST).delete(id));
      });
    }
    return { all: all, add: add, del: del };
  }());

  function _updateQueueNotice() {
    _regQ.all().then(function (items) {
      var el = document.getElementById('reg-queue-notice');
      if (!el) return;
      var n = items.length;
      if (!n) { el.style.display = 'none'; return; }
      el.style.display = '';
      el.textContent = '📶 ' + n + ' action' + (n === 1 ? '' : 's') + ' queued — will sync when online';
    }).catch(function () {});
  }

  function _queueAction(url, body) {
    _regQ.add({ url: url, body: body }).then(function () {
      _updateQueueNotice();
      if (window.Wren) Wren.toast('Queued — will sync when online', 'info', 3000);
    }).catch(function () {
      if (window.Wren) Wren.toast('Action failed (offline + IDB unavailable)', 'error');
    });
  }

  var _flushing = false;
  function _flushQueue() {
    if (_flushing || !navigator.onLine) return;
    _flushing = true;
    _regQ.all().then(function (items) {
      if (!items.length) { _flushing = false; _updateQueueNotice(); return; }
      var token = (window.Wren && Wren.getToken) ? Wren.getToken() : (sessionStorage.getItem('wrenToken') || '');
      return Promise.all(items.map(function (item) {
        return fetch(item.url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' },
          body: JSON.stringify(item.body)
        }).then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        }).then(function (row) {
          return _regQ.del(item.id).then(function () { _applyAndRefresh(row); });
        }).catch(function () { /* leave queued */ });
      }));
    }).then(function () {
      _flushing = false;
      _updateQueueNotice();
    }).catch(function () { _flushing = false; });
  }

  window.addEventListener('online', _flushQueue);
  /* ─── End offline queue ────────────────────────────────────────────────── */

  function _esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function _initials(f, l) {
    return ((f || '').charAt(0) + (l || '').charAt(0)).toUpperCase() || '?';
  }
  function _time(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    } catch (_) { return ''; }
  }

  // Derive a status from an attendance row
  function _status(c) {
    if (c.absent) return 'abs';
    if (c.sign_in_time && !c.sign_out_time) return 'in';
    if (c.sign_in_time && c.sign_out_time) return 'out';
    return 'none';
  }

  function _renderChips() {
    var rooms = [];
    var seen = {};
    STATE.children.forEach(function (c) {
      var rn = c.room_name || 'Unassigned';
      if (!seen[rn]) { seen[rn] = true; rooms.push(rn); }
    });
    var chips = document.getElementById('reg-chips');
    var html = '<button class="reg-chip ' + (STATE.room === 'all' ? 'active' : '') + '" data-room="all">All</button>';
    html += rooms.map(function (rn) {
      return '<button class="reg-chip ' + (STATE.room === rn ? 'active' : '') + '" data-room="' + _esc(rn) + '">' + _esc(rn) + '</button>';
    }).join('');
    chips.innerHTML = html;
    chips.querySelectorAll('.reg-chip').forEach(function (btn) {
      btn.addEventListener('click', function () {
        STATE.room = btn.getAttribute('data-room');
        _renderChips();
        _renderList();
      });
    });
  }

  function _renderSummary() {
    var inN = 0, outN = 0, absN = 0;
    STATE.children.forEach(function (c) {
      var s = _status(c);
      if (s === 'in') inN++;
      else if (s === 'out') outN++;
      else if (s === 'abs') absN++;
    });
    document.getElementById('reg-count-in').textContent  = inN;
    document.getElementById('reg-count-out').textContent = outN;
    document.getElementById('reg-count-abs').textContent = absN;
    document.getElementById('reg-count-exp').textContent = STATE.children.length;
  }

  function _cardHTML(c) {
    var st = _status(c);
    var stLabel = { in: 'In', out: 'Out', abs: 'Absent', none: 'Not in' }[st];
    var meta = '';
    // 2026-07-10: children can leave and return (appointments) — show the whole
    // in/out timeline from attendance_events, falling back to the single pair.
    var tl = '';
    if (c.events && c.events.length) {
      var parts = [];
      for (var ei = 0; ei < c.events.length; ei++) {
        var ev = c.events[ei];
        parts.push((ev.event === 'in' ? 'In ' : 'Out ') + _time(ev.at));
      }
      tl = parts.join(' · ');
    }
    if (st === 'in')  meta = tl || ('Signed in ' + _time(c.sign_in_time));
    else if (st === 'out') meta = tl || ('In ' + _time(c.sign_in_time) + ' · Out ' + _time(c.sign_out_time));
    else if (st === 'abs') meta = c.absence_reason ? ('Absent — ' + _esc(c.absence_reason)) : 'Marked absent';
    else meta = 'Awaiting arrival';

    var allergy = c.allergies ? '<div class="reg-allergy">⚠ Allergies: ' + _esc(c.allergies) + '</div>' : '';

    return '<div class="reg-card" data-child="' + c.id + '">' +
      '<div class="reg-card-top">' +
        '<div class="reg-avatar">' + _esc(_initials(c.first_name, c.last_name)) + '</div>' +
        '<div class="reg-name-wrap">' +
          '<div class="reg-name">' + _esc(c.first_name) + ' ' + _esc(c.last_name || '') + '</div>' +
          '<div class="reg-meta">' + meta + '</div>' +
        '</div>' +
        '<span class="reg-status ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      allergy +
      '<div class="reg-actions">' +
        '<button class="reg-btn in"  data-act="sign-in"  data-child="' + c.id + '"' + (st === 'in' ? ' disabled' : '') + '>' + (st === 'out' ? 'Back In' : 'Sign In') + '</button>' +
        '<button class="reg-btn out" data-act="sign-out" data-child="' + c.id + '"' + (st === 'in' ? '' : ' disabled') + '>Sign Out</button>' +
        '<button class="reg-btn abs" data-act="absent"   data-child="' + c.id + '"' + (st === 'abs' ? ' disabled' : '') + '>Absent</button>' +
      '</div>' +
    '</div>';
  }

  function _renderList() {
    var list = document.getElementById('reg-list');
    var rooms = {};
    var order = [];
    STATE.children.forEach(function (c) {
      var rn = c.room_name || 'Unassigned';
      if (STATE.room !== 'all' && rn !== STATE.room) return;
      if (!rooms[rn]) { rooms[rn] = []; order.push(rn); }
      rooms[rn].push(c);
    });

    if (!order.length) {
      list.innerHTML = '<div class="reg-empty">No children to show for this room.</div>';
      return;
    }

    var html = '';
    order.forEach(function (rn) {
      html += '<div class="reg-room-label">' + _esc(rn) + '</div>';
      html += rooms[rn].map(_cardHTML).join('');
    });
    list.innerHTML = html;

    list.querySelectorAll('.reg-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id  = btn.getAttribute('data-child');
        var act = btn.getAttribute('data-act');
        if (act === 'sign-in')  _signIn(id);
        else if (act === 'sign-out') _signOut(id);
        else if (act === 'absent')   _openAbsence(id);
      });
    });

    _decorateTermly();
  }

  /* ── Prompt 28B: termly-update status surfacing on the register ─────────────── */
  function _decorateTermly() {
    var map = STATE.termlyMap;
    if (!map) return;
    document.querySelectorAll('#reg-list .reg-card[data-child]').forEach(function (card) {
      if (card.querySelector('.reg-termly-tag')) return;
      var st = map[card.getAttribute('data-child')];
      if (st !== 'due' && st !== 'overdue') return;
      var wrap = card.querySelector('.reg-name-wrap') || card;
      var tag = document.createElement('div');
      tag.className = 'reg-termly-tag';
      var col = st === 'overdue' ? '#ef4444' : '#f59e0b';
      tag.style.cssText = 'display:inline-block;margin-top:3px;font-size:.66rem;font-weight:700;'
        + 'text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:999px;'
        + 'color:' + col + ';background:' + col + '22;border:1px solid ' + col + '66';
      tag.textContent = 'Termly ' + st;
      wrap.appendChild(tag);
    });
  }

  function _loadTermlyStatus() {
    if (!window.Wren || !Wren.api) return;
    Wren.api('/api/observations/termly-status').then(function (d) {
      var map = {};
      (d.children || []).forEach(function (c) { map[String(c.child_id)] = c.status; });
      STATE.termlyMap = map;
      var n = (d.summary && (d.summary.outstanding || 0)) || 0;
      var banner = document.getElementById('reg-termly-banner');
      if (banner) {
        if (n > 0) {
          var who = d.scope === 'all' ? 'children' : 'of your key children';
          banner.innerHTML = '<span>📋</span><span><b>' + n + '</b> ' + who
            + ' need a termly update — tap to review</span>';
          banner.style.display = 'flex';
        } else {
          banner.style.display = 'none';
        }
      }
      _decorateTermly();
    }).catch(function () {});
  }

  function _findChild(id) {
    return STATE.children.filter(function (c) { return String(c.id) === String(id); })[0];
  }

  function _applyAndRefresh(updated) {
    // Merge returned attendance row into local child
    var c = _findChild(updated && updated.child_id);
    if (c && updated) {
      c.attendance_id   = updated.id;
      c.sign_in_time    = updated.sign_in_time;
      c.sign_out_time   = updated.sign_out_time;
      c.absent          = updated.absent;
      c.absence_reason  = updated.absence_reason;
      c.session         = updated.session;
    }
    _renderSummary();
    _renderList();
  }

  // Queue on a genuine network failure (offline OR a fetch TypeError on flaky wifi),
  // NOT on a real server error (which would get stuck re-queued forever).
  function _isNetErr(e) {
    if (!navigator.onLine) return true;
    if (e instanceof TypeError) return true;
    return !!(e && typeof e.message === 'string' && /failed to fetch|networkerror|load failed/i.test(e.message));
  }

  function _signIn(id) {
    Wren.api('/api/attendance/sign-in', { method: 'POST', body: { child_id: Number(id) } })
      .then(function (row) { _applyAndRefresh(row); Wren.toast('Signed in', 'success'); })
      .catch(function (e) {
        if (_isNetErr(e)) { _queueAction('/api/attendance/sign-in', { child_id: Number(id) }); Wren.toast('Offline — sign-in queued', 'info'); }
        else Wren.toast((e && e.error) || 'Sign-in failed', 'error');
      });
  }

  function _signOut(id) {
    // s03: open sign-out sheet with collector picker
    _openSignout(id);
  }

  function _openSignout(id) {
    STATE.signoutChildId = id;
    var c = _findChild(id);
    document.getElementById('reg-signout-sub').textContent = c ? (c.first_name + ' ' + (c.last_name || '')) : '';

    // Load authorised collectors for this child
    var sel = document.getElementById('reg-signout-collector');
    sel.innerHTML = '<option value="">— Not specified —</option>';

    Wren.api('/api/collectors/' + id).then(function (collectors) {
      STATE.collectors[id] = collectors;
      collectors.forEach(function (col) {
        if (col.can_collect) {
          var opt = document.createElement('option');
          opt.value = col.name;
          opt.textContent = col.name + (col.relationship ? ' (' + col.relationship + ')' : '');
          sel.appendChild(opt);
        }
      });
      var otherOpt = document.createElement('option');
      otherOpt.value = '__other__';
      otherOpt.textContent = '— Other (type name) —';
      sel.appendChild(otherOpt);
    }).catch(function () {
      // No collectors or error - show manual entry only
      var otherOpt = document.createElement('option');
      otherOpt.value = '__other__';
      otherOpt.textContent = '— Type name —';
      sel.appendChild(otherOpt);
    });

    document.getElementById('reg-signout-backdrop').classList.add('open');
  }

  function _closeSignout() {
    document.getElementById('reg-signout-backdrop').classList.remove('open');
    document.getElementById('reg-signout-other').style.display = 'none';
    document.getElementById('reg-signout-other').value = '';
    STATE.signoutChildId = null;
  }

  function _confirmSignout() {
    var id = STATE.signoutChildId;
    if (!id) return;
    var sel = document.getElementById('reg-signout-collector');
    var collectedBy = sel.value;

    if (collectedBy === '__other__') {
      var other = document.getElementById('reg-signout-other');
      if (!other.value.trim()) {
        Wren.toast('Please enter collector name', 'warning');
        return;
      }
      collectedBy = other.value.trim();
    }

    Wren.api('/api/attendance/sign-out', {
      method: 'POST',
      body: { child_id: Number(id), collected_by: collectedBy || null }
    })
      .then(function (row) {
        _applyAndRefresh(row);
        _closeSignout();
        Wren.toast('Signed out', 'success');
      })
      .catch(function (e) {
        if (_isNetErr(e)) {
          _queueAction('/api/attendance/sign-out', { child_id: Number(id), collected_by: collectedBy || null });
          _closeSignout();
          Wren.toast('Offline — sign-out queued', 'info');
        } else if (e && e.reason) {
          Wren.toast('⚠️ ' + e.reason, 'error', 5000);
        } else {
          Wren.toast((e && e.error) || 'Sign-out failed', 'error');
        }
      });
  }

  function _openAbsence(id) {
    STATE.absChildId = id;
    var c = _findChild(id);
    document.getElementById('reg-abs-sub').textContent = c ? (c.first_name + ' ' + (c.last_name || '')) : '';
    document.getElementById('reg-abs-reason').value = 'sick';
    document.getElementById('reg-abs-backdrop').classList.add('open');
  }

  function _closeAbsence() {
    document.getElementById('reg-abs-backdrop').classList.remove('open');
    STATE.absChildId = null;
  }

  function _confirmAbsence() {
    var id = STATE.absChildId;
    if (!id) return;
    var reason = document.getElementById('reg-abs-reason').value;
    Wren.api('/api/attendance/mark-absent', { method: 'POST', body: { child_id: Number(id), absence_reason: reason } })
      .then(function (row) {
        _applyAndRefresh(row);
        _closeAbsence();
        Wren.toast('Marked absent', 'success');
      })
      .catch(function (e) {
      if (_isNetErr(e)) {
        _queueAction('/api/attendance/mark-absent', { child_id: Number(id), absence_reason: reason });
        _closeAbsence();
        Wren.toast('Offline — absence queued', 'info');
      } else {
        Wren.toast((e && e.error) || 'Failed to mark absent', 'error');
      }
    });
  }

  function _load() {
    Wren.api('/api/attendance/today').then(function (rows) {
      STATE.children = Array.isArray(rows) ? rows : [];
      _renderChips();
      _renderSummary();
      _renderList();
    }).catch(function () {
      document.getElementById('reg-list').innerHTML =
        '<div class="reg-empty">Could not load the register. Pull down to retry.</div>';
    });
  }

  function _injectBack() {
    var hamburger = document.getElementById('wren-app-hamburger');
    if (!hamburger) return;
    var btn = document.createElement('button');
    btn.id = 'ey-register-back';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Back to More');
    btn.innerHTML =
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
      ' stroke-width="2.5" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>';
    btn.addEventListener('click', function () {
      if (history.length > 1) history.back();
      else location.href = '/ey/more';
    });
    hamburger.parentNode.insertBefore(btn, hamburger);
    hamburger.style.display = 'none';
  }

  document.addEventListener('wren:ready', function () {
    _injectBack();

    // Absence sheet
    document.getElementById('reg-abs-cancel').addEventListener('click', _closeAbsence);
    document.getElementById('reg-abs-confirm').addEventListener('click', _confirmAbsence);
    document.getElementById('reg-abs-backdrop').addEventListener('click', function (e) {
      if (e.target === this) _closeAbsence();
    });

    // Sign-out sheet (s03)
    document.getElementById('reg-signout-cancel').addEventListener('click', _closeSignout);
    document.getElementById('reg-signout-confirm').addEventListener('click', _confirmSignout);
    document.getElementById('reg-signout-backdrop').addEventListener('click', function (e) {
      if (e.target === this) _closeSignout();
    });
    document.getElementById('reg-signout-collector').addEventListener('change', function () {
      var other = document.getElementById('reg-signout-other');
      if (this.value === '__other__') {
        other.style.display = 'block';
        other.focus();
      } else {
        other.style.display = 'none';
      }
    });

    _updateQueueNotice();
    _load();
    _loadTermlyStatus();
    if (navigator.onLine) _flushQueue();
  });
}());
</script>
</body>
</html>
