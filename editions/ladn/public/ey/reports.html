<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"   content="ladn">
  <meta name="wren-app-page"  content="more">
  <meta name="wren-app-title" content="Reports">
  <meta name="wren-app-chat"  content="on">
  <title>Reports · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    #ey-reports-page {
      padding: 12px 12px env(safe-area-inset-bottom, 16px);
    }

    #ey-reports-back {
      width: 44px; height: 44px;
      background: transparent; border: none;
      color: var(--c-text); cursor: pointer;
      border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #ey-reports-back:hover { background: rgba(255,255,255,0.06); }

    .rpt-section-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--c-muted);
      margin-bottom: 8px;
    }

    /* Report type cards */
    .rpt-type-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .rpt-type-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s;
      text-align: left;
      width: 100%;
    }
    .rpt-type-card:hover   { border-color: var(--c-blue); }
    .rpt-type-card:active  { background: rgba(255,255,255,0.03); }

    .rpt-type-icon {
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      background: rgba(91,143,255,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rpt-type-body {
      flex: 1;
    }

    .rpt-type-title {
      font-size: .92rem;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 3px;
    }

    .rpt-type-desc {
      font-size: .8rem;
      color: var(--c-muted);
      line-height: 1.35;
    }

    .rpt-type-chevron {
      color: var(--c-muted);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* Recently generated reports */
    .rpt-generated-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rpt-generated-icon { font-size: 1.2rem; flex-shrink: 0; }

    .rpt-generated-body { flex: 1; min-width: 0; }
    .rpt-generated-title {
      font-size: .88rem;
      font-weight: 600;
      color: var(--c-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rpt-generated-meta {
      font-size: .76rem;
      color: var(--c-muted);
    }

    .rpt-view-btn {
      height: 30px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--c-border);
      border-radius: 8px;
      color: var(--c-text);
      font-size: .8rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .15s;
    }
    .rpt-view-btn:hover { border-color: var(--c-blue); color: var(--c-blue); }

    .rpt-info-note {
      font-size: .8rem;
      color: var(--c-muted);
      text-align: center;
      padding: 16px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body data-portal="ey">

<div id="ey-reports-page">

  <!-- Available report types (read-only for practitioners) -->
  <div class="rpt-section-label">Available Reports</div>
  <div class="rpt-info-note">
    Reports are read-only here. To generate or configure reports, use the admin portal.
  </div>

  <div class="rpt-type-list">
    <button class="rpt-type-card" data-report="child-progress" type="button">
      <div class="rpt-type-icon" aria-hidden="true">👶</div>
      <div class="rpt-type-body">
        <div class="rpt-type-title">Child Progress Report</div>
        <div class="rpt-type-desc">EYFS assessment summary, framework coverage, and next steps for a child.</div>
      </div>
      <span class="rpt-type-chevron" aria-hidden="true">›</span>
    </button>

    <button class="rpt-type-card" data-report="occupancy" type="button">
      <div class="rpt-type-icon" aria-hidden="true">🏠</div>
      <div class="rpt-type-body">
        <div class="rpt-type-title">Occupancy Report</div>
        <div class="rpt-type-desc">Room-by-room attendance and capacity figures across a date range.</div>
      </div>
      <span class="rpt-type-chevron" aria-hidden="true">›</span>
    </button>

    <button class="rpt-type-card" data-report="attendance" type="button">
      <div class="rpt-type-icon" aria-hidden="true">📅</div>
      <div class="rpt-type-body">
        <div class="rpt-type-title">Attendance Report</div>
        <div class="rpt-type-desc">Absence patterns, late arrivals, and session attendance rates.</div>
      </div>
      <span class="rpt-type-chevron" aria-hidden="true">›</span>
    </button>

    <button class="rpt-type-card" data-report="observations" type="button">
      <div class="rpt-type-icon" aria-hidden="true">📝</div>
      <div class="rpt-type-body">
        <div class="rpt-type-title">Observation Summary</div>
        <div class="rpt-type-desc">Observation counts by area, staff member, and date range.</div>
      </div>
      <span class="rpt-type-chevron" aria-hidden="true">›</span>
    </button>
  </div>

  <!-- Recently generated reports from admin -->
  <div class="rpt-section-label">Recent Reports</div>
  <div id="rpt-recent-list">
    <div class="app-skeleton" style="height:56px;border-radius:12px;margin-bottom:8px"></div>
    <div class="app-skeleton" style="height:56px;border-radius:12px;margin-bottom:8px"></div>
  </div>

</div><!-- #ey-reports-page -->

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  /* ── HTML escape ────────────────────────────────────────────────────────────── */
  function _esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Format date ────────────────────────────────────────────────────────────── */
  function _fmtDate(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch (_) { return iso.split('T')[0]; }
  }

  /* ── Report type icons ──────────────────────────────────────────────────────── */
  function _icon(type) {
    var map = {
      'child_progress': '👶',
      'occupancy':      '🏠',
      'attendance':     '📅',
      'observations':   '📝',
    };
    return map[type] || '📋';
  }

  /* ── Load recent reports from API ──────────────────────────────────────────── */
  function _loadRecent() {
    var el = document.getElementById('rpt-recent-list');
    if (!el) return;

    Wren.api('/api/reports?limit=5').then(function (data) {
      var rows = Array.isArray(data) ? data : (data && data.rows ? data.rows : []);
      if (!rows.length) {
        el.innerHTML =
          '<div style="text-align:center;padding:20px;color:var(--c-muted);font-size:.85rem">' +
          'No reports generated yet.</div>';
        return;
      }

      el.innerHTML = rows.map(function (r) {
        var title = r.report_type
          ? r.report_type.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); })
          : 'Report';
        var childName = r.child_name ? ' · ' + _esc(r.child_name) : '';
        var date = _fmtDate(r.created_at || r.generated_at);
        return '<div class="rpt-generated-card">' +
               '  <span class="rpt-generated-icon" aria-hidden="true">' + _icon(r.report_type) + '</span>' +
               '  <div class="rpt-generated-body">' +
               '    <div class="rpt-generated-title">' + _esc(title) + childName + '</div>' +
               '    <div class="rpt-generated-meta">' + date + '</div>' +
               '  </div>' +
               '  <button class="rpt-view-btn" data-id="' + r.id + '" type="button">View</button>' +
               '</div>';
      }).join('');

      el.querySelectorAll('.rpt-view-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          Wren.toast('Report viewer coming in the admin portal', 'info');
        });
      });
    }).catch(function () {
      el.innerHTML =
        '<div style="text-align:center;padding:20px;color:var(--c-muted);font-size:.85rem">' +
        'Could not load recent reports.</div>';
    });
  }

  /* ── Report type tap → route to admin ──────────────────────────────────────── */
  function _initReportTypes() {
    document.querySelectorAll('.rpt-type-card').forEach(function (card) {
      card.addEventListener('click', function () {
        Wren.toast('Open the admin portal to generate this report', 'info');
      });
    });
  }

  /* ── Back button ────────────────────────────────────────────────────────────── */
  function _injectBack() {
    var topbar    = document.getElementById('wren-app-topbar');
    var hamburger = document.getElementById('wren-app-hamburger');
    if (!topbar || !hamburger) return;

    var btn = document.createElement('button');
    btn.id   = 'ey-reports-back';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Back to More');
    btn.innerHTML =
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
      '     stroke-width="2.5" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>';
    btn.addEventListener('click', function () {
      if (history.length > 1) history.back();
      else location.href = '/ey/more';
    });
    hamburger.parentNode.insertBefore(btn, hamburger);
    hamburger.style.display = 'none';
  }

  /* ── Boot ───────────────────────────────────────────────────────────────────── */
  document.addEventListener('wren:ready', function () {
    _injectBack();
    _initReportTypes();
    _loadRecent();
  });
}());
</script>
</body>
</html>
