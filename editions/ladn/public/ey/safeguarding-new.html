<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"      content="ladn">
  <meta name="wren-app-page"     content="safeguarding-new">
  <meta name="wren-app-title"    content="Log Concern">
  <meta name="wren-app-no-bottom-nav" content="true">
  <meta name="wren-app-chat" content="on">
  <title>Log Safeguarding Concern · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    #sgn-page {
      padding: 0 0 calc(env(safe-area-inset-bottom) + 16px);
    }
    #sgn-content {
      padding: 16px;
      max-width: 680px;
    }
  </style>
</head>
<body data-portal="ey">

<div id="sgn-page">
  <div id="sgn-content">
    <div id="sgn-form-mount"></div>
  </div>
</div>

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-safeguarding-form.js" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';

  function _param(name) {
    return new URLSearchParams(location.search).get(name);
  }

  document.addEventListener('wren:ready', function () {
    var childId = _param('child') ? parseInt(_param('child')) : null;

    // Install back button in topbar
    var hamburger = document.getElementById('wren-app-hamburger');
    if (hamburger) {
      var btn = document.createElement('button');
      btn.id = 'wren-app-back-btn';
      btn.setAttribute('aria-label', 'Back');
      btn.style.cssText = 'width:44px;height:44px;background:transparent;border:none;color:var(--c-text);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0';
      btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>';
      btn.addEventListener('click', function () {
        if (document.referrer && document.referrer !== location.href) {
          history.back();
        } else {
          Wren.navigate('/ey/home');
        }
      });
      hamburger.parentNode.insertBefore(btn, hamburger);
      hamburger.style.display = 'none';
    }

    var mount = document.getElementById('sgn-form-mount');
    if (mount && window.WrenSafeguardingForm) {
      WrenSafeguardingForm.mount(mount, {
        preselectChildId: childId,
        onSaved: function (concern) {
          Wren.toast('Concern logged. DSL has been notified.', 'success');
          setTimeout(function () {
            if (document.referrer && document.referrer !== location.href) {
              history.back();
            } else {
              Wren.navigate('/ey/home');
            }
          }, 1200);
        },
        onCancel: function () {
          if (document.referrer && document.referrer !== location.href) {
            history.back();
          } else {
            Wren.navigate('/ey/home');
          }
        },
      });
    }
  });

}());
</script>
</body>
</html>
