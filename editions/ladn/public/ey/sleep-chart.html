<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="ladn">
  <title>Sleep Chart — Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .child-selector-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .child-card {
      padding: 12px;
      border-radius: 8px;
      border: 2px solid var(--c-border);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      background: white;
    }
    .child-card:hover {
      border-color: var(--c-primary);
      background: var(--c-bg-subtle);
    }
    .child-card.selected {
      border-color: var(--c-primary);
      background: var(--c-primary-light);
      font-weight: 600;
    }
    .child-card.sleeping {
      border-color: #8b5cf6;
      background: #f3e8ff;
    }
    .check-log-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0;
    }
    .check-timeline {
      margin-top: 24px;
    }
    .check-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-left: 3px solid var(--c-green);
      background: var(--c-bg-subtle);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .check-time {
      font-weight: 700;
      color: var(--c-primary);
      min-width: 80px;
    }
    .check-initial {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--c-primary);
      color: white;
      font-weight: 700;
      font-size: 14px;
    }
    .check-photo {
      max-width: 120px;
      max-height: 90px;
      border-radius: 4px;
      cursor: pointer;
      object-fit: cover;
    }
    .position-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .position-btn {
      padding: 10px;
      border: 2px solid var(--c-border);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .position-btn:hover {
      border-color: var(--c-primary);
    }
    .position-btn.selected {
      border-color: var(--c-primary);
      background: var(--c-primary-light);
      font-weight: 600;
    }
    .photo-upload-zone {
      border: 2px dashed var(--c-border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin: 12px 0;
    }
    .photo-upload-zone:hover {
      border-color: var(--c-primary);
      background: var(--c-bg-subtle);
    }
    .photo-preview {
      max-width: 200px;
      max-height: 150px;
      border-radius: 4px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">😴 Sleep Chart</div>
      <div class="page-subtitle">10-minute checks for sleeping children</div>
    </div>
  </div>

  <!-- Child selector -->
  <div class="card">
    <div style="font-weight:700;margin-bottom:12px">Select a child</div>
    <div class="child-selector-grid" id="child-grid"></div>
  </div>

  <!-- Check form (shown when child selected) -->
  <div id="check-panel" style="display:none">
    <div class="card">
      <div style="font-weight:700;margin-bottom:14px">
        Record check for <span id="selected-child-name"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Position</label>
        <div class="position-grid" id="position-grid">
          <button type="button" class="position-btn" data-pos="Back">🛏️ Back</button>
          <button type="button" class="position-btn" data-pos="Side">↔️ Side</button>
          <button type="button" class="position-btn" data-pos="Front">⬇️ Front</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Breathing</label>
        <div style="display:flex;gap:12px">
          <label style="display:flex;align-items:center;gap:6px">
            <input type="radio" name="breathing" value="true" checked>
            <span>✅ Breathing OK</span>
          </label>
          <label style="display:flex;align-items:center;gap:6px">
            <input type="radio" name="breathing" value="false">
            <span>⚠️ Concern</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Photo (optional)</label>
        <div class="photo-upload-zone" id="photo-upload-zone">
          <div>📷 Tap to add cot photo</div>
          <input type="file" id="photo-input" accept="image/*" style="display:none">
          <img id="photo-preview" class="photo-preview" style="display:none">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-control" id="check-notes" rows="2" placeholder="Any observations..."></textarea>
      </div>

      <button class="btn btn-primary check-log-btn" id="btn-log-check">✓ Log Check Now</button>
    </div>

    <!-- Today's checks timeline -->
    <div class="check-timeline">
      <div style="font-weight:700;margin-bottom:12px">Today's Checks</div>
      <div id="checks-list"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('wren:ready', async () => {
  let selectedChildId = null;
  let selectedPosition = null;
  let photoFile = null;
  let photoUrl = null;

  // Load children (currently sleeping or all)
  async function loadChildren() {
    try {
      const res = await fetch('/api/children');
      const children = await res.json();

      const grid = document.getElementById('child-grid');
      grid.innerHTML = '';

      children.forEach(child => {
        const card = document.createElement('div');
        card.className = 'child-card';
        card.innerHTML = `
          <div style="font-size:28px">😴</div>
          <div style="font-size:13px;margin-top:4px">${child.first_name} ${child.last_name}</div>
        `;
        card.addEventListener('click', () => selectChild(child));
        grid.appendChild(card);
      });
    } catch (e) {
      console.error('Failed to load children:', e);
    }
  }

  function selectChild(child) {
    selectedChildId = child.id;
    document.querySelectorAll('.child-card').forEach(c => c.classList.remove('selected'));
    event.target.closest('.child-card').classList.add('selected');

    document.getElementById('selected-child-name').textContent = `${child.first_name} ${child.last_name}`;
    document.getElementById('check-panel').style.display = 'block';

    loadChecks();
  }

  // Position selector
  document.getElementById('position-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('.position-btn');
    if (!btn) return;

    document.querySelectorAll('.position-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedPosition = btn.dataset.pos;
  });

  // Photo upload
  const photoZone = document.getElementById('photo-upload-zone');
  const photoInput = document.getElementById('photo-input');
  const photoPreview = document.getElementById('photo-preview');

  photoZone.addEventListener('click', () => photoInput.click());

  photoInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    photoFile = file;

    // Show preview
    const reader = new FileReader();
    reader.onload = (e) => {
      photoPreview.src = e.target.result;
      photoPreview.style.display = 'block';
    };
    reader.readAsDataURL(file);

    // Upload to server
    const formData = new FormData();
    formData.append('photo', file);

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      photoUrl = data.url;
    } catch (e) {
      console.error('Photo upload failed:', e);
    }
  });

  // Log check
  document.getElementById('btn-log-check').addEventListener('click', async () => {
    if (!selectedChildId) {
      alert('Please select a child');
      return;
    }

    const breathing = document.querySelector('input[name="breathing"]:checked').value === 'true';
    const notes = document.getElementById('check-notes').value.trim();

    try {
      const res = await fetch('/api/sleep/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          child_id: selectedChildId,
          position: selectedPosition,
          breathing_ok: breathing,
          notes: notes || null,
          photo_url: photoUrl
        })
      });

      if (!res.ok) throw new Error('Failed to log check');

      // Reset form
      document.querySelectorAll('.position-btn').forEach(b => b.classList.remove('selected'));
      selectedPosition = null;
      document.getElementById('check-notes').value = '';
      photoInput.value = '';
      photoPreview.style.display = 'none';
      photoUrl = null;
      photoFile = null;
      document.querySelector('input[name="breathing"][value="true"]').checked = true;

      // Reload checks
      loadChecks();

      // Success feedback
      const btn = document.getElementById('btn-log-check');
      const originalText = btn.textContent;
      btn.textContent = '✓ Check Logged!';
      btn.style.background = 'var(--c-green)';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '';
      }, 2000);

    } catch (e) {
      alert('Failed to log check: ' + e.message);
    }
  });

  // Load today's checks
  async function loadChecks() {
    if (!selectedChildId) return;

    try {
      const res = await fetch(`/api/sleep/today?child_id=${selectedChildId}`);
      const checks = await res.json();

      const list = document.getElementById('checks-list');

      if (checks.length === 0) {
        list.innerHTML = '<div style="color:var(--c-text-subtle);padding:20px;text-align:center">No checks recorded today</div>';
        return;
      }

      list.innerHTML = checks.map(check => {
        const time = new Date(check.checked_at || check.check_time).toLocaleTimeString('en-GB', {
          hour: '2-digit',
          minute: '2-digit'
        });

        return `
          <div class="check-item">
            <div class="check-time">${time}</div>
            <div class="check-initial">${check.staff_initial || 'X'}</div>
            <div style="flex:1">
              ${check.position ? `<div><strong>Position:</strong> ${check.position}</div>` : ''}
              ${check.breathing_ok !== null ? `<div><strong>Breathing:</strong> ${check.breathing_ok ? '✅ OK' : '⚠️ Concern'}</div>` : ''}
              ${check.notes ? `<div style="color:var(--c-text-subtle);margin-top:4px">${check.notes}</div>` : ''}
              ${check.photo_url ? `<img src="${check.photo_url}" class="check-photo" onclick="window.open('${check.photo_url}')">` : ''}
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      console.error('Failed to load checks:', e);
    }
  }

  // Initial load
  loadChildren();
});
</script>
</body>
</html>
