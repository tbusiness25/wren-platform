<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition"           content="ladn">
  <meta name="wren-app-page"          content="two-year-check">
  <meta name="wren-app-title"         content="2-Year Check">
  <meta name="wren-app-chat"          content="on">
  <meta name="wren-app-no-bottom-nav" content="true">
  <title>2-Year Progress Check · Wren</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-app-shell.css?v=20260704">
  <style>
    #ty-wrap { padding:16px; max-width:620px; margin:0 auto; display:flex; flex-direction:column; gap:14px;
               padding-bottom:calc(env(safe-area-inset-bottom,0px) + 90px); }
    #ty-childline { font-size:1.05rem; font-weight:700; color:var(--c-text); }
    #ty-childline small { display:block; font-weight:400; color:var(--c-muted); font-size:.82rem; margin-top:2px; }
    .ty-card { background:var(--c-surface); border:1px solid var(--c-border); border-radius:14px; padding:14px; }
    .ty-list-item { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .ty-list-item + .ty-list-item { border-top:1px solid var(--c-border); margin-top:10px; padding-top:12px; }
    .ty-li-main b { color:var(--c-text); }
    .ty-li-main small { display:block; color:var(--c-muted); font-size:.8rem; }
    .ty-actions { display:flex; gap:8px; flex-shrink:0; }
    .ty-btn { border:1px solid var(--c-border); background:var(--c-bg,transparent); color:var(--c-text);
              border-radius:10px; padding:9px 12px; font-size:.86rem; font-weight:600; cursor:pointer; min-height:40px; }
    .ty-btn.primary { background:var(--c-blue); color:#fff; border-color:var(--c-blue); }
    .ty-btn.accent  { background:var(--c-orange,#e07820); color:#fff; border-color:var(--c-orange,#e07820); }
    .ty-btn:disabled { opacity:.5; cursor:default; }
    .ty-field { display:flex; flex-direction:column; gap:6px; }
    .ty-field > label { font-size:.82rem; font-weight:600; color:var(--c-muted); }
    .ty-field textarea, .ty-field input {
      width:100%; background:var(--c-surface); border:1px solid var(--c-border); border-radius:12px;
      color:var(--c-text); padding:12px 14px; font-size:1rem; font-family:inherit; outline:none; }
    .ty-field textarea:focus, .ty-field input:focus { border-color:var(--c-blue); }
    .ty-seg { display:flex; gap:6px; flex-wrap:wrap; }
    .ty-seg button { flex:1 1 auto; min-width:96px; background:var(--c-surface); border:1px solid var(--c-border);
      color:var(--c-text); border-radius:10px; padding:10px; font-size:.85rem; cursor:pointer; min-height:44px; }
    .ty-seg button.sel { background:var(--c-blue); color:#fff; border-color:var(--c-blue); }
    .ty-yn button.sel.yes { background:#ef4444; border-color:#ef4444; color:#fff; }
    .ty-yn button.sel.no  { background:#22c55e; border-color:#22c55e; color:#fff; }
    .ty-prime { border-left:3px solid var(--c-blue); padding-left:12px; }
    .ty-muted { color:var(--c-muted); font-size:.85rem; }
    #ty-empty { color:var(--c-muted); text-align:center; padding:10px 0; }
    .ty-hidden { display:none !important; }
    h2.ty-h { font-size:1rem; margin:6px 0 0; color:var(--c-text); }
  </style>
</head>
<body>
<div id="ty-wrap">
  <div id="ty-childline">Loading…</div>

  <!-- LIST VIEW -->
  <div id="ty-list-view">
    <div class="ty-card">
      <h2 class="ty-h" style="margin-top:0">Progress checks at age two</h2>
      <p class="ty-muted">The statutory EYFS check between 24–36 months across the three prime areas.</p>
      <div id="ty-list"></div>
      <div id="ty-empty" class="ty-hidden">No 2-year check recorded yet.</div>
    </div>
    <button id="ty-new-btn" class="ty-btn primary" style="min-height:48px">＋ New 2-year check</button>
  </div>

  <!-- FORM VIEW -->
  <div id="ty-form-view" class="ty-hidden">
    <div class="ty-field">
      <label for="ty-date">Check date *</label>
      <input id="ty-date" type="date">
    </div>
    <div class="ty-field">
      <label for="ty-age">Age at check (months) *</label>
      <input id="ty-age" type="number" min="12" max="48" inputmode="numeric">
    </div>

    <div class="ty-prime">
      <div class="ty-field">
        <label for="ty-cl">Communication &amp; Language — summary *</label>
        <textarea id="ty-cl" rows="4" placeholder="Listening, understanding, speaking…"></textarea>
      </div>
      <div class="ty-field" style="margin-top:8px">
        <label>Development band *</label>
        <div class="ty-seg" data-band="cl_band"></div>
      </div>
    </div>

    <div class="ty-prime">
      <div class="ty-field">
        <label for="ty-pd">Physical Development — summary *</label>
        <textarea id="ty-pd" rows="4" placeholder="Moving &amp; handling, health &amp; self-care…"></textarea>
      </div>
      <div class="ty-field" style="margin-top:8px">
        <label>Development band *</label>
        <div class="ty-seg" data-band="pd_band"></div>
      </div>
    </div>

    <div class="ty-prime">
      <div class="ty-field">
        <label for="ty-psed">Personal, Social &amp; Emotional Development — summary *</label>
        <textarea id="ty-psed" rows="4" placeholder="Self-confidence, relationships, feelings &amp; behaviour…"></textarea>
      </div>
      <div class="ty-field" style="margin-top:8px">
        <label>Development band *</label>
        <div class="ty-seg" data-band="psed_band"></div>
      </div>
    </div>

    <div class="ty-field">
      <label>Any significant gaps / emerging SEN? *</label>
      <div class="ty-seg ty-yn" data-yn="significant_gaps"></div>
    </div>

    <div class="ty-field">
      <label for="ty-next">Next steps &amp; targeted support *</label>
      <textarea id="ty-next" rows="3"></textarea>
    </div>
    <div class="ty-field">
      <label for="ty-home">How parents/carers can support at home *</label>
      <textarea id="ty-home" rows="3"></textarea>
    </div>

    <div class="ty-field">
      <label>Shared with parents/carers? *</label>
      <div class="ty-seg ty-yn" data-yn="shared_with_parents"></div>
    </div>

    <div style="display:flex; gap:10px; margin-top:4px">
      <button id="ty-cancel" class="ty-btn" style="flex:1">Cancel</button>
      <button id="ty-save" class="ty-btn primary" style="flex:2; min-height:48px">Save check</button>
    </div>
  </div>
</div>

<script src="/js/wren-core.js?v=20260704" defer></script>
<script src="/js/wren-app-shell.js?v=20260704" defer></script>
<script>
(function () {
  'use strict';
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var _params = new URLSearchParams(location.search);
  var _childId = parseInt(_params.get('child') || _params.get('child_id') || _params.get('children') || 0, 10);
  var _child = null;
  var _editId = null;            // record id when editing, else null
  var BANDS = ['Below expected', 'In line with expected', 'Above expected'];
  var _form = { cl_band:null, pd_band:null, psed_band:null, significant_gaps:false, shared_with_parents:false };

  function _monthsBetween(dob, on) {
    if (!dob) return '';
    var d = new Date(dob), t = new Date(on);
    if (isNaN(d)) return '';
    var m = (t.getFullYear() - d.getFullYear()) * 12 + (t.getMonth() - d.getMonth());
    if (t.getDate() < d.getDate()) m -= 1;
    return m > 0 && m < 60 ? m : '';
  }

  function _buildSegs() {
    ['cl_band','pd_band','psed_band'].forEach(function(key){
      var host = document.querySelector('[data-band="'+key+'"]');
      host.innerHTML = BANDS.map(function(b){
        return '<button type="button" data-val="'+esc(b)+'">'+esc(b)+'</button>';
      }).join('');
      host.querySelectorAll('button').forEach(function(btn){
        btn.addEventListener('click', function(){
          host.querySelectorAll('button').forEach(function(b){ b.classList.remove('sel'); });
          btn.classList.add('sel'); _form[key] = btn.dataset.val;
        });
      });
    });
    document.querySelectorAll('.ty-yn').forEach(function(host){
      var key = host.dataset.yn;
      host.innerHTML = '<button type="button" data-v="1" class="yes">Yes</button>' +
                       '<button type="button" data-v="0" class="no">No</button>';
      host.querySelectorAll('button').forEach(function(btn){
        btn.addEventListener('click', function(){
          host.querySelectorAll('button').forEach(function(b){ b.classList.remove('sel'); });
          btn.classList.add('sel'); _form[key] = btn.dataset.v === '1';
        });
      });
    });
  }

  function _setSeg(key, val) {
    var host = key.indexOf('_band') > -1 ? document.querySelector('[data-band="'+key+'"]')
                                         : document.querySelector('[data-yn="'+key+'"]');
    if (!host) return;
    host.querySelectorAll('button').forEach(function(b){ b.classList.remove('sel'); });
    host.querySelectorAll('button').forEach(function(b){
      var match = (key.indexOf('_band') > -1) ? (b.dataset.val === val)
                                              : ((b.dataset.v === '1') === !!val);
      if (match) b.classList.add('sel');
    });
    _form[key] = (key.indexOf('_band') > -1) ? val : !!val;
  }

  function _showList(){ document.getElementById('ty-list-view').classList.remove('ty-hidden');
                        document.getElementById('ty-form-view').classList.add('ty-hidden');
                        window.scrollTo(0,0); }
  function _showForm(){ document.getElementById('ty-list-view').classList.add('ty-hidden');
                        document.getElementById('ty-form-view').classList.remove('ty-hidden');
                        window.scrollTo(0,0); }

  function _resetForm(){
    _editId = null;
    document.getElementById('ty-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('ty-age').value = _child ? _monthsBetween(_child.date_of_birth, new Date()) : '';
    ['ty-cl','ty-pd','ty-psed','ty-next','ty-home'].forEach(function(id){ document.getElementById(id).value=''; });
    _form = { cl_band:null, pd_band:null, psed_band:null, significant_gaps:false, shared_with_parents:false };
    document.querySelectorAll('.ty-seg button').forEach(function(b){ b.classList.remove('sel'); });
    _setSeg('significant_gaps', false); _setSeg('shared_with_parents', false);
  }

  function _fillForm(rec){
    var d = rec.data || {};
    _editId = rec.id;
    document.getElementById('ty-date').value = d.check_date || new Date().toISOString().slice(0,10);
    document.getElementById('ty-age').value  = d.age_months || '';
    document.getElementById('ty-cl').value   = d.communication_language || '';
    document.getElementById('ty-pd').value   = d.physical_development || '';
    document.getElementById('ty-psed').value = d.pse_development || '';
    document.getElementById('ty-next').value = d.next_steps || '';
    document.getElementById('ty-home').value = d.support_at_home || '';
    _setSeg('cl_band', d.cl_band); _setSeg('pd_band', d.pd_band); _setSeg('psed_band', d.psed_band);
    _setSeg('significant_gaps', !!d.significant_gaps); _setSeg('shared_with_parents', !!d.shared_with_parents);
  }

  function _renderList(checks){
    var host = document.getElementById('ty-list');
    var empty = document.getElementById('ty-empty');
    host.innerHTML = '';
    if (!checks || !checks.length) { empty.classList.remove('ty-hidden'); return; }
    empty.classList.add('ty-hidden');
    checks.forEach(function(c){
      var d = c.data || {};
      var row = document.createElement('div');
      row.className = 'ty-list-item';
      row.innerHTML =
        '<div class="ty-li-main"><b>' + esc(d.check_date || (c.submitted_at||'').slice(0,10)) + '</b>' +
        '<small>' + esc(d.age_months ? d.age_months + ' months · ' : '') +
        (c.practitioner_name ? 'by ' + esc(c.practitioner_name) : '') + '</small></div>' +
        '<div class="ty-actions">' +
          '<button class="ty-btn" data-edit="'+c.id+'">Edit</button>' +
          '<button class="ty-btn accent" data-pdf="'+c.id+'">Print</button>' +
        '</div>';
      host.appendChild(row);
    });
    host.querySelectorAll('[data-edit]').forEach(function(b){
      b.addEventListener('click', function(){
        var rec = checks.find(function(x){ return String(x.id) === b.dataset.edit; });
        if (rec) { _fillForm(rec); _showForm(); }
      });
    });
    host.querySelectorAll('[data-pdf]').forEach(function(b){
      b.addEventListener('click', function(){ window.open('/api/two-year-checks/' + b.dataset.pdf + '/pdf', '_blank'); });
    });
  }

  function _load(){
    Wren.api('/api/two-year-checks/child/' + _childId).then(function(res){
      _child = res.child || null;
      var name = _child ? ((_child.first_name||'') + ' ' + (_child.last_name||'')).trim() : ('Child ' + _childId);
      document.getElementById('ty-childline').innerHTML =
        esc(name) + '<small>Statutory 2-year progress check</small>';
      _renderList(res.checks || []);
    }).catch(function(err){
      var msg = (err && err.error) || 'Could not load 2-year checks';
      document.getElementById('ty-childline').textContent = msg;
      Wren.toast(msg, 'error');
    });
  }

  function _collect(){
    return {
      check_date: document.getElementById('ty-date').value,
      age_months: parseInt(document.getElementById('ty-age').value, 10) || null,
      communication_language: document.getElementById('ty-cl').value.trim(),
      cl_band: _form.cl_band,
      physical_development: document.getElementById('ty-pd').value.trim(),
      pd_band: _form.pd_band,
      pse_development: document.getElementById('ty-psed').value.trim(),
      psed_band: _form.psed_band,
      significant_gaps: !!_form.significant_gaps,
      next_steps: document.getElementById('ty-next').value.trim(),
      support_at_home: document.getElementById('ty-home').value.trim(),
      shared_with_parents: !!_form.shared_with_parents
    };
  }

  function _save(){
    var data = _collect();
    var missing = [];
    if (!data.check_date) missing.push('check date');
    if (!data.age_months) missing.push('age');
    if (!data.communication_language || !data.cl_band) missing.push('Communication & Language');
    if (!data.physical_development || !data.pd_band) missing.push('Physical Development');
    if (!data.pse_development || !data.psed_band) missing.push('PSED');
    if (!data.next_steps) missing.push('next steps');
    if (!data.support_at_home) missing.push('support at home');
    if (missing.length) { Wren.toast('Please complete: ' + missing.join(', '), 'warning'); return; }

    var btn = document.getElementById('ty-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    var url = _editId ? ('/api/two-year-checks/' + _editId) : ('/api/two-year-checks/child/' + _childId);
    var method = _editId ? 'PUT' : 'POST';
    Wren.api(url, { method: method, body: { data: data } }).then(function(){
      Wren.toast('2-year check saved', 'success');
      btn.disabled = false; btn.textContent = 'Save check';
      _resetForm(); _showList(); _load();
    }).catch(function(err){
      btn.disabled = false; btn.textContent = 'Save check';
      var m = (err && (err.error || (err.errors && err.errors.join(', ')))) || 'Could not save';
      Wren.toast(m, 'error');
    });
  }

  document.addEventListener('wren:ready', function(){
    // Back button in the topbar
    var tb = document.querySelector('.wren-app-topbar');
    if (tb && !document.getElementById('ty-back')) {
      var b = document.createElement('button'); b.id='ty-back'; b.setAttribute('aria-label','Back');
      b.style.cssText='width:44px;height:44px;background:transparent;border:none;color:var(--c-muted);font-size:1.25rem;cursor:pointer';
      b.innerHTML='&#8592;';
      b.addEventListener('click', function(){
        if (document.getElementById('ty-form-view').classList.contains('ty-hidden')) {
          if (_childId) Wren.navigate('/ey/child/' + _childId); else Wren.navigate('/ey/home');
        } else { _showList(); }
      });
      tb.insertBefore(b, tb.firstChild);
    }

    if (!_childId) { document.getElementById('ty-childline').textContent = 'No child selected.'; return; }
    _buildSegs();
    document.getElementById('ty-new-btn').addEventListener('click', function(){ _resetForm(); _showForm(); });
    document.getElementById('ty-cancel').addEventListener('click', function(){ _showList(); });
    document.getElementById('ty-save').addEventListener('click', _save);
    _load();
  });
}());
</script>
</body>
</html>
