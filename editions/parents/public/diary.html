<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Little Angels — Daily Diary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px;transition:.15s}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
/* Content */
main{padding:14px 16px;max-width:680px;margin:0 auto}
.page-title{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:14px}
/* Diary cards */
.diary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.diary-date{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--blue);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.mood-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;background:var(--navy);border-radius:10px;padding:12px 14px}
.mood-emoji{font-size:2.2rem;line-height:1}
.mood-label{font-size:1rem;font-weight:700}
.section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.section-content{font-size:.88rem;line-height:1.6;color:var(--text);margin-bottom:12px}
.diary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.info-block{background:var(--navy);border-radius:10px;padding:11px 13px}
/* Photos */
.photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:80px;height:80px;border-radius:10px;object-fit:cover;cursor:pointer;transition:.15s;flex-shrink:0}
.photo-thumb:hover{opacity:.8;transform:scale(1.02)}
.more-photos-badge{width:80px;height:80px;border-radius:10px;background:rgba(74,154,191,.18);border:1px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--blue);font-weight:700;cursor:pointer;flex-shrink:0}
/* Load more */
.load-more-btn{display:block;width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;color:var(--blue);font-size:.9rem;font-weight:600;cursor:pointer;text-align:center;transition:.15s;min-height:44px}
.load-more-btn:hover{border-color:var(--blue);background:rgba(74,154,191,.08)}
/* States */
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:12px}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:12px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:10px}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.5rem;cursor:pointer;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#94a3b8;font-size:20px;text-decoration:none">💬</a>
</div>

<main>
  <div class="page-title">📖 Daily Diary</div>
  <div id="diaryContent"><div class="spinner">⏳</div></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close-btn">×</button>
  <img id="lbImg" src="" alt="">
  <a id="lbDownload" href="" download style="background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:.82rem;text-decoration:none">⬇ Download</a>
</div>

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/timeline.html" class="nav-btn"><span>📰</span><span>Timeline</span></a>
  <a href="/diary.html" class="nav-btn active"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn"><span>🍽️</span><span>Menu</span></a>
  <a href="/reports.html" class="nav-btn"><span>📊</span><span>Reports</span></a>
  <a href="/resources.html" class="nav-btn"><span>📁</span><span>Resources</span></a>
</nav>

<script>
const PAGE_SIZE = 7;
let allEntries = [];
let shown = 0;
let TOKEN, childId, parentName;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function api(url, opts={}){
  opts.headers = {...(opts.headers||{}),'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
  if(opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  return fetch(url, opts).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));
}

const MOOD_MAP = {
  happy:    {emoji:'😊', label:'Happy'},
  brilliant:{emoji:'⭐', label:'Brilliant'},
  okay:     {emoji:'😐', label:'Okay'},
  unsettled:{emoji:'😟', label:'Unsettled'},
  tired:    {emoji:'😴', label:'Tired'},
  excited:  {emoji:'🤩', label:'Excited'},
  calm:     {emoji:'😌', label:'Calm'},
  sad:      {emoji:'😢', label:'Sad'},
};

function getMood(text){
  if(!text) return null;
  const key = text.toLowerCase().trim();
  return MOOD_MAP[key] || {emoji:'😊', label: text};
}

function fmtFullDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return String(d);
  return dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function renderEntries(){
  const container = document.getElementById('diaryContent');
  const slice = allEntries.slice(0, shown);
  if(!slice.length){
    container.innerHTML = `<div class="empty"><span class="icon">📖</span>No diary entries shared yet.<br><span style="font-size:.85rem">Your key person will add updates soon!</span></div>`;
    return;
  }
  let html = '';
  slice.forEach((entry, idx) => {
    const mood = getMood(entry.mood);
    const photos = Array.isArray(entry.photo_urls) ? entry.photo_urls : [];
    const mealsText = entry.meals
      ? (typeof entry.meals === 'string' ? entry.meals : (Array.isArray(entry.meals) ? entry.meals.join(', ') : JSON.stringify(entry.meals)))
      : null;

    html += `<div class="diary-card">
      <div class="diary-date">${esc(fmtFullDate(entry.date || entry.created_at))}</div>`;

    if(mood){
      html += `<div class="mood-row"><div class="mood-emoji">${mood.emoji}</div><div><div class="section-label">Mood today</div><div class="mood-label">${esc(mood.label)}</div></div></div>`;
    }

    const blocks = [];
    if(mealsText) blocks.push({label:'Meals', content: mealsText});
    if(entry.activities) blocks.push({label:'Activities', content: entry.activities});

    if(blocks.length === 2){
      html += `<div class="diary-grid">`;
      blocks.forEach(b => {
        html += `<div class="info-block"><div class="section-label">${esc(b.label)}</div><div style="font-size:.86rem;line-height:1.5;margin-top:4px">${esc(b.content)}</div></div>`;
      });
      html += `</div>`;
    } else {
      blocks.forEach(b => {
        html += `<div class="section-label">${esc(b.label)}</div><div class="section-content">${esc(b.content)}</div>`;
      });
    }

    if(entry.naps){
      html += `<div class="section-label">Rest &amp; Naps</div><div class="section-content">${esc(entry.naps)}</div>`;
    }

    if(entry.notes){
      html += `<div style="background:rgba(74,154,191,.07);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:10px">
        <div class="section-label" style="margin-bottom:4px">Notes from your key person</div>
        <div style="font-size:.88rem;line-height:1.65;color:var(--text)">${esc(entry.notes)}</div>
      </div>`;
    }

    if(photos.length){
      html += `<div class="section-label" style="margin-top:4px">Photos</div><div class="photo-strip">`;
      const show = photos.slice(0,3);
      show.forEach(url => {
        html += `<img class="photo-thumb" src="${esc(url)}" loading="lazy" alt="" data-action="open-lightbox" data-url="${esc(url)}">`;
      });
      if(photos.length > 3){
        html += `<div class="more-photos-badge" data-action="open-lightbox" data-url="${esc(photos[3])}">+${photos.length-3} more</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  });

  if(shown < allEntries.length){
    html += `<button class="load-more-btn" data-action="load-more">Load more entries</button>`;
  }

  container.innerHTML = html;
}

function loadMore(){
  shown = Math.min(shown + PAGE_SIZE, allEntries.length);
  renderEntries();
}

function openLightbox(url){
  document.getElementById('lbImg').src = url;
  document.getElementById('lbDownload').href = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
document.getElementById('lb-close-btn').addEventListener('click', closeLightbox);
document.getElementById('diaryContent').addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  if (el.dataset.action === 'open-lightbox') openLightbox(el.dataset.url);
  else if (el.dataset.action === 'load-more') loadMore();
});

document.addEventListener('DOMContentLoaded', async () => {
  TOKEN = localStorage.getItem('wren_parent_token');
  if(!TOKEN){ window.location.replace('/login.html'); throw new Error(''); }
  try {
    const payload = JSON.parse(atob(TOKEN.split('.')[1]));
    childId = payload.child_id;
    parentName = payload.name || 'Parent';
    if(payload.exp * 1000 < Date.now()){ window.location.replace('/login.html'); throw new Error(''); }
  } catch(e){ window.location.replace('/login.html'); throw new Error(''); }

  // Show child name
  try {
    const child = JSON.parse(localStorage.getItem('wren_parent_child') || 'null');
    if(child){ document.getElementById('child-name-display').textContent = (child.preferred_name || child.first_name || '') + ' ' + (child.last_name || ''); }
  } catch(e){}

  const container = document.getElementById('diaryContent');
  try {
    const data = await api('/api/parents/child/' + childId + '/diary');
    allEntries = Array.isArray(data) ? data : (data.entries || []);
    // Sort newest first
    allEntries.sort((a,b) => new Date(b.date || b.created_at) - new Date(a.date || a.created_at));
    shown = Math.min(PAGE_SIZE, allEntries.length);
    renderEntries();
  } catch(e){
    container.innerHTML = `<div class="empty"><span class="icon">⚠️</span>Couldn't load diary entries.<br><small style="color:var(--danger)">${esc(e.message||'Unknown error')}</small></div>`;
  }
});
</script>
</body>
</html>
