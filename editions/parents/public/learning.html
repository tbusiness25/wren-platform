<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your Nursery — Learning Journey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px;transition:.15s}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
main{padding:14px 16px;max-width:680px;margin:0 auto}
.intro-banner{background:linear-gradient(135deg,rgba(74,154,191,.15),rgba(74,154,191,.05));border:1px solid rgba(74,154,191,.25);border-radius:14px;padding:16px;margin-bottom:18px;font-size:.9rem;line-height:1.6;color:var(--muted)}
.intro-banner strong{color:var(--text)}
/* Timeline */
.timeline{position:relative;padding-left:48px}
.timeline::before{content:'';position:absolute;left:16px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-40px;top:8px;width:32px;height:32px;border-radius:50%;background:var(--surface);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--blue);text-align:center;line-height:1.1}
.obs-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;transition:.15s}
.obs-card:hover{border-color:var(--blue)}
.obs-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.obs-title{font-size:.95rem;font-weight:700;flex:1}
.obs-date{font-size:.72rem;color:var(--muted);margin-bottom:8px}
.obs-text{font-size:.87rem;line-height:1.65;color:var(--text)}
.obs-text-short{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.read-more{background:none;border:none;color:var(--blue);font-size:.82rem;cursor:pointer;padding:4px 0;min-height:32px}
/* EYFS chips */
.eyfs-chips{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.chip{display:inline-block;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:600}
.chip-cl{background:#1e3a5f;color:#7dd3fc}
.chip-pd{background:#1a3d20;color:#86efac}
.chip-pse{background:#3d2a00;color:#fcd34d}
.chip-lit{background:#2d1a00;color:#fb923c}
.chip-math{background:#2d0d2d;color:#e879f9}
.chip-utw{background:#0d2a2a;color:#5eead4}
.chip-ead{background:#2d1a2d;color:#c084fc}
.chip-default{background:rgba(74,154,191,.15);color:var(--blue)}
/* Next steps */
.next-steps{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:11px 13px;margin-top:10px}
.next-steps-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#22c55e;margin-bottom:5px}
.next-steps-text{font-size:.85rem;line-height:1.55;color:var(--text)}
/* Photos */
.photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.photo-thumb{width:76px;height:76px;border-radius:10px;object-fit:cover;cursor:pointer;transition:.15s;flex-shrink:0}
.photo-thumb:hover{opacity:.8}
/* Footer credit */
.obs-footer{font-size:.72rem;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
/* States */
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:12px}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:12px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:10px}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.5rem;cursor:pointer;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#94a3b8;font-size:20px;text-decoration:none">💬</a>
</div>

<main>
  <div id="introArea"></div>
  <div id="learningContent"><div class="spinner">⏳</div></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close-btn">×</button>
  <img id="lbImg" src="" alt="">
</div>

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/timeline.html" class="nav-btn"><span>📰</span><span>Timeline</span></a>
  <a href="/diary.html" class="nav-btn"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn active"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn"><span>🍽️</span><span>Menu</span></a>
  <a href="/reports.html" class="nav-btn"><span>📊</span><span>Reports</span></a>
  <a href="/resources.html" class="nav-btn"><span>📁</span><span>Resources</span></a>
</nav>

<script>
let TOKEN, childId, parentName, childName;
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function api(url, opts={}){
  opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
  if(opts.body && typeof opts.body!=='string') opts.body=JSON.stringify(opts.body);
  return fetch(url,opts).then(r=>r.ok?r.json():r.json().then(e=>Promise.reject(e)));
}
function fmtDate(d){
  if(!d) return '';
  const dt=new Date(d);
  if(isNaN(dt)) return String(d);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

const EYFS_COLORS = {
  'Communication and Language':'chip-cl',
  'Physical Development':'chip-pd',
  'Personal, Social and Emotional Development':'chip-pse',
  'Personal Social and Emotional':'chip-pse',
  'Literacy':'chip-lit',
  'Mathematics':'chip-math',
  'Understanding the World':'chip-utw',
  'Expressive Arts and Design':'chip-ead',
};
function eyfsChip(area){
  const cls = EYFS_COLORS[area] || 'chip-default';
  return `<span class="chip ${cls}">${esc(area)}</span>`;
}

function toggleText(id){
  const el = document.getElementById('ot-'+id);
  const btn = document.getElementById('rm-'+id);
  if(!el) return;
  const isShort = el.classList.contains('obs-text-short');
  el.classList.toggle('obs-text-short', !isShort);
  btn.textContent = isShort ? 'Show less' : 'Read more';
}

function openLightbox(url){
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
document.getElementById('lb-close-btn').addEventListener('click', closeLightbox);
document.getElementById('learningContent').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'toggle-text') toggleText(btn.dataset.uid);
  else if (btn.dataset.action === 'open-lightbox') openLightbox(btn.dataset.url);
});

document.addEventListener('DOMContentLoaded', async () => {
  TOKEN = localStorage.getItem('wren_parent_token');
  if(!TOKEN){ window.location.replace('/login.html'); throw new Error(''); }
  try {
    const p = JSON.parse(atob(TOKEN.split('.')[1]));
    childId = p.child_id;
    parentName = p.name || 'Parent';
    if(p.exp*1000 < Date.now()){ window.location.replace('/login.html'); throw new Error(''); }
  } catch(e){ window.location.replace('/login.html'); throw new Error(''); }

  try {
    const child = JSON.parse(localStorage.getItem('wren_parent_child')||'null');
    childName = child ? (child.preferred_name || child.first_name || 'your child') : 'your child';
    if(child){ document.getElementById('child-name-display').textContent = (child.preferred_name || child.first_name||'')+ ' '+(child.last_name||''); }
  } catch(e){ childName = 'your child'; }

  document.getElementById('introArea').innerHTML = `
    <div class="intro-banner">Here are <strong>${esc(childName)}'s</strong> learning highlights shared by our team at Your Nursery 🌟<br>
    <span style="font-size:.8rem">Each observation reflects a magical moment in their development journey.</span></div>`;

  const container = document.getElementById('learningContent');
  try {
    const data = await api('/api/parents/child/'+childId+'/observations');
    const rows = Array.isArray(data) ? data : (data.observations || []);

    if(!rows.length){
      container.innerHTML = `<div class="empty">
        <span class="icon">🌱</span>
        <strong style="color:var(--text);display:block;margin-bottom:8px">No learning moments shared yet</strong>
        Your key person will share observations as they capture special moments.<br>
        <span style="font-size:.8rem;margin-top:8px;display:block">Check back soon — every day brings something new!</span>
      </div>`;
      return;
    }

    let html = '<div class="timeline">';
    rows.forEach((obs, idx) => {
      const dt = new Date(obs.created_at || obs.date);
      const dayNum = isNaN(dt) ? '?' : dt.getDate();
      const mon = isNaN(dt) ? '' : dt.toLocaleDateString('en-GB',{month:'short'});
      const areas = Array.isArray(obs.eyfs_areas) ? obs.eyfs_areas : [];
      const photos = Array.isArray(obs.photo_urls) ? obs.photo_urls : [];
      const text = obs.observation_text || '';
      const isLong = text.length > 200;
      const uid = 'obs'+idx;

      html += `<div class="tl-item">
        <div class="tl-dot">${dayNum}<br><span style="font-size:.6rem">${mon}</span></div>
        <div class="obs-card">
          <div class="obs-header">
            <div class="obs-title">🌟 ${esc(obs.title || 'Observation')}</div>
          </div>
          <div class="obs-date">${esc(fmtDate(obs.created_at || obs.date))}</div>
          <div class="obs-text ${isLong?'obs-text-short':''}" id="ot-${uid}">${esc(text)}</div>
          ${isLong ? `<button class="read-more" id="rm-${uid}" data-action="toggle-text" data-uid="${uid}">Read more</button>` : ''}
          ${areas.length ? `<div class="eyfs-chips">${areas.map(eyfsChip).join('')}</div>` : ''}
          ${obs.next_steps ? `<div class="next-steps"><div class="next-steps-label">What's next</div><div class="next-steps-text">${esc(obs.next_steps)}</div></div>` : ''}
          ${photos.length ? `<div class="photo-strip">${photos.map(u=>`<img class="photo-thumb" src="${esc(u)}" loading="lazy" alt="" data-action="open-lightbox" data-url="${esc(u)}">`).join('')}</div>` : ''}
          <div class="obs-footer">Shared by ${esc(obs.staff_first_name || 'your key person')}</div>
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } catch(e){
    container.innerHTML = `<div class="empty"><span class="icon">⚠️</span>Couldn't load learning moments.<br><small style="color:var(--danger)">${esc(e.message||'Unknown error')}</small></div>`;
  }
});
</script>
</body>
</html>
