<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Nursery — Parents Portal</title>
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',system-ui,sans-serif;color:#fff}
.wrap{text-align:center;padding:32px 24px;max-width:340px}
.logo{font-size:48px;margin-bottom:16px}
h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
p{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:24px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.15);border-top-color:#4a9abf;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px}
.error-box{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:16px;margin-top:16px;display:none}
.error-box p{color:#fca5a5;margin:0}
.error-box a{color:#4a9abf;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:baseline;justify-content:center;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800;line-height:1;margin-bottom:12px">
    <span style="font-size:2rem;color:#4a9abf;letter-spacing:-0.02em">w</span><span style="font-size:1.6rem;color:#f1f5f9;letter-spacing:-0.02em">ren</span>
    <span style="font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:#94a3b8;text-transform:uppercase;margin-left:8px;align-self:center">PARENTS</span>
  </div>
  <h1>Your Nursery</h1>
  <p>Parents Portal</p>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Signing you in…</div>
  <div class="error-box" id="err">
    <p id="err-msg">We couldn't find a child linked to your email.</p>
    <p style="margin-top:8px;font-size:12px">Please contact us on <a href="tel:01234567890">01234 567890</a> or <a href="mailto:office@example.com">office@example.com</a></p>
  </div>
</div>
<script>
async function tryAutoLogin() {
  // 1. Try silent refresh first (uses httpOnly cookie — no CF OTP needed after first login)
  try {
    const r = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
    if (r.ok) {
      const d = await r.json();
      if (d.token) {
        localStorage.setItem('wren_parent_token', d.token);
        document.getElementById('status').textContent = 'Welcome back…';
        window.location.replace('/index.html');
        return;
      }
    }
  } catch(e) {}

  // 2. Try CF Access auto-login (first time or cookie expired)
  try {
    const r = await fetch('/api/auth/cf-auto-login', { credentials: 'include' });
    if (r.ok) {
      const d = await r.json();
      if (d.token) {
        localStorage.setItem('wren_parent_token', d.token);
        document.getElementById('status').textContent = 'Welcome…';
        window.location.replace('/index.html');
        return;
      }
    }
    const d = await r.json();
    if (d.error === 'no_child') {
      showError("We couldn't find a child linked to your email address. If you've just enrolled, please allow 24 hours for access to be set up.");
    } else {
      showError("Something went wrong. Please try again or contact the nursery.");
    }
  } catch(e) {
    showError("Couldn't connect to the portal. Please check your connection and try again.");
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err').style.display = 'block';
}

tryAutoLogin();
</script>
</body>
</html>
