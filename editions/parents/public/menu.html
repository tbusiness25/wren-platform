<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Little Angels — Weekly Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
main{padding:14px 16px;max-width:900px;margin:0 auto}
.page-title{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:4px}
.week-label{font-size:.82rem;color:var(--muted);margin-bottom:16px}
/* Menu grid — scrollable on mobile */
.menu-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:20px;border-radius:14px;border:1px solid var(--border)}
table.menu-table{width:100%;border-collapse:collapse;min-width:520px}
.menu-table th{background:#16202e;padding:10px 10px 8px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:left;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.menu-table th:first-child{min-width:90px}
.menu-table td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:top;font-size:.85rem;line-height:1.5}
.menu-table tr:last-child td{border-bottom:none}
.menu-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.day-cell{font-weight:700;font-size:.85rem;color:var(--blue);white-space:nowrap;padding-top:13px}
.meal-cell{min-width:110px}
.meal-desc{font-size:.85rem;color:var(--text);line-height:1.5;margin-bottom:5px}
/* Allergen chips */
.allergens{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.al-chip{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;width:22px;height:22px;font-size:.68rem;font-weight:700}
.al-G{background:#78350f22;color:#d97706;border:1px solid #78350f44}
.al-M{background:#1e3a5f22;color:#60a5fa;border:1px solid #1e3a5f44}
.al-E{background:#3d2a0022;color:#fbbf24;border:1px solid #3d2a0044}
.al-N{background:#2d1a1a22;color:#f87171;border:1px solid #2d1a1a44}
.al-F{background:#0d2a2a22;color:#34d399;border:1px solid #0d2a2a44}
.al-S{background:#2d1a2d22;color:#c084fc;border:1px solid #2d1a2d44}
/* Allergen key */
.allergen-key{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.allergen-key h3{font-size:.85rem;font-weight:700;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.key-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:420px){.key-grid{grid-template-columns:repeat(6,1fr)}}
.key-item{display:flex;align-items:center;gap:6px;font-size:.8rem}
/* States */
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:12px}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#94a3b8;font-size:20px;text-decoration:none">💬</a>
</div>

<main>
  <div class="page-title">🍽️ Weekly Menu</div>
  <div id="weekLabel" class="week-label"></div>
  <div id="menuContent"><div class="spinner">⏳</div></div>

  <div class="allergen-key">
    <h3>Allergen Key</h3>
    <div class="key-grid">
      <div class="key-item"><span class="al-chip al-G">G</span> Gluten</div>
      <div class="key-item"><span class="al-chip al-M">M</span> Milk</div>
      <div class="key-item"><span class="al-chip al-E">E</span> Eggs</div>
      <div class="key-item"><span class="al-chip al-N">N</span> Nuts</div>
      <div class="key-item"><span class="al-chip al-F">F</span> Fish</div>
      <div class="key-item"><span class="al-chip al-S">S</span> Soya</div>
    </div>
    <p style="font-size:.75rem;color:var(--muted);margin-top:12px">Always inform staff of any allergies or dietary requirements not recorded in your child's profile.</p>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/timeline.html" class="nav-btn"><span>📰</span><span>Timeline</span></a>
  <a href="/diary.html" class="nav-btn"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn active"><span>🍽️</span><span>Menu</span></a>
  <a href="/reports.html" class="nav-btn"><span>📊</span><span>Reports</span></a>
  <a href="/resources.html" class="nav-btn"><span>📁</span><span>Resources</span></a>
</nav>

<script>
let TOKEN;
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function api(url, opts={}){
  opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
  return fetch(url,opts).then(r=>r.ok?r.json():r.json().then(e=>Promise.reject(e)));
}

const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const MEAL_TYPES_ORDER = ['breakfast','morning_snack','lunch','afternoon_snack','tea'];
const MEAL_LABELS = {breakfast:'Breakfast',morning_snack:'Morning Snack',lunch:'Lunch',afternoon_snack:'Afternoon Snack',tea:'Tea'};

// Normalise day to 0-indexed Monday=0
function normDay(day){
  if(typeof day === 'number') return day - 1; // 1=Mon → 0
  if(typeof day === 'string'){
    const d = day.toLowerCase();
    const map = {monday:0,tuesday:1,wednesday:2,thursday:3,friday:4,'1':0,'2':1,'3':2,'4':3,'5':4};
    if(d in map) return map[d];
    const n = parseInt(d);
    if(!isNaN(n)) return n-1;
  }
  return -1;
}

// Normalise meal_type key
function normMealType(mt){
  if(!mt) return '';
  const s = mt.toLowerCase().replace(/[\s-]/g,'_');
  const map = {
    breakfast:'breakfast',
    morning_snack:'morning_snack',morning_snacks:'morning_snack',snack:'morning_snack',am_snack:'morning_snack',
    lunch:'lunch',
    afternoon_snack:'afternoon_snack',afternoon_snacks:'afternoon_snack',pm_snack:'afternoon_snack',
    tea:'tea',dinner:'tea',supper:'tea'
  };
  return map[s] || s;
}

function allergenChips(allergens){
  if(!allergens) return '';
  const codes = ['G','M','E','N','F','S'];
  const str = allergens.toUpperCase();
  const chips = codes.filter(c => str.includes(c)).map(c => `<span class="al-chip al-${c}" title="${{G:'Gluten',M:'Milk',E:'Eggs',N:'Nuts',F:'Fish',S:'Soya'}[c]}">${c}</span>`);
  return chips.length ? `<div class="allergens">${chips.join('')}</div>` : '';
}

function renderMenu(items){
  // Build a 5 x meal_type grid
  const grid = {}; // grid[day][mealType] = {desc, allergens}
  for(let i=0;i<5;i++) grid[i] = {};

  items.forEach(item => {
    const day = normDay(item.day_of_week);
    const mt = normMealType(item.meal_type);
    if(day < 0 || day > 4) return;
    grid[day][mt] = {desc: item.description || item.meal_description || '', allergens: item.allergens || ''};
  });

  // Determine which meal columns have any data
  const activeMeals = MEAL_TYPES_ORDER.filter(mt => Object.values(grid).some(d => d[mt]));
  if(!activeMeals.length){
    return `<div class="empty"><span class="icon">🍽️</span>Menu not published yet.<br><span style="font-size:.85rem">Check back soon!</span></div>`;
  }

  let html = `<div class="menu-wrap"><table class="menu-table"><thead><tr>
    <th>Day</th>
    ${activeMeals.map(mt=>`<th>${esc(MEAL_LABELS[mt]||mt)}</th>`).join('')}
  </tr></thead><tbody>`;

  DAY_NAMES.forEach((dayName, di) => {
    html += `<tr><td class="day-cell">${dayName}</td>`;
    activeMeals.forEach(mt => {
      const cell = grid[di][mt];
      if(cell && cell.desc){
        html += `<td class="meal-cell"><div class="meal-desc">${esc(cell.desc)}</div>${allergenChips(cell.allergens)}</td>`;
      } else {
        html += `<td class="meal-cell" style="color:var(--muted);font-size:.8rem">—</td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

document.addEventListener('DOMContentLoaded', async () => {
  TOKEN = localStorage.getItem('wren_parent_token');
  if(!TOKEN){ window.location.replace('/login.html'); throw new Error(''); }
  try {
    const p = JSON.parse(atob(TOKEN.split('.')[1]));
    if(p.exp*1000 < Date.now()){ window.location.replace('/login.html'); throw new Error(''); }
  } catch(e){ window.location.replace('/login.html'); throw new Error(''); }

  try {
    const child = JSON.parse(localStorage.getItem('wren_parent_child')||'null');
    if(child){ document.getElementById('child-name-display').textContent = (child.preferred_name||child.first_name||'')+' '+(child.last_name||''); }
  } catch(e){}

  const container = document.getElementById('menuContent');
  try {
    const data = await api('/api/parents/menu');
    const items = Array.isArray(data) ? data : (data.items || data.menu || []);

    if(!items.length){
      container.innerHTML = `<div class="empty"><span class="icon">🍽️</span>Menu not published yet.<br><span style="font-size:.85rem">Our kitchen team will update this soon!</span></div>`;
      return;
    }

    // Try to show week label from date_from / date_to
    const first = items[0];
    if(first && (first.date_from || first.week_commencing)){
      const df = new Date(first.date_from || first.week_commencing);
      if(!isNaN(df)){
        const dt = new Date(df);
        const end = new Date(df); end.setDate(dt.getDate()+4);
        document.getElementById('weekLabel').textContent =
          'Week of ' + dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) +
          ' – ' + end.toLocaleDateString('en-GB',{day:'numeric',month:'long'});
      }
    }

    container.innerHTML = renderMenu(items);
  } catch(e){
    container.innerHTML = `<div class="empty"><span class="icon">⚠️</span>Couldn't load menu.<br><small style="color:var(--danger)">${esc(e.message||'Unknown error')}</small></div>`;
  }
});
</script>
</body>
</html>
