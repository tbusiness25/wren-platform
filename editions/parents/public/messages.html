<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your Nursery — Messages</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
main{padding:14px 16px;max-width:680px;margin:0 auto}
.threads-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.threads-title{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.1rem;font-weight:700}
.thread-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s;position:relative}
.thread-card:hover{border-color:var(--blue)}
.thread-card.unread{border-left:3px solid var(--blue)}
.thread-subject{font-size:.92rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;padding-right:60px}
.thread-preview{font-size:.82rem;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.thread-meta{font-size:.72rem;color:var(--muted);margin-top:6px}
.unread-badge{background:var(--blue);color:#fff;border-radius:99px;font-size:.65rem;padding:2px 8px;font-weight:700;flex-shrink:0}
.unread-dot{position:absolute;top:14px;right:14px;width:10px;height:10px;border-radius:50%;background:var(--blue)}
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.9rem;min-height:44px;padding:0 8px 0 0;display:flex;align-items:center;gap:6px}
.thread-view-title{flex:1;font-size:.95rem;font-weight:700;line-height:1.3}
.convo-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:120px}
.bubble{max-width:82%;padding:11px 14px;border-radius:14px;font-size:.87rem;line-height:1.6}
.bubble.staff{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.bubble.parent{background:rgba(74,154,191,.18);border:1px solid rgba(74,154,191,.35);align-self:flex-end;border-bottom-right-radius:4px}
.bubble-name{font-size:.7rem;color:var(--muted);margin-bottom:3px;font-weight:600}
.bubble-time{font-size:.65rem;color:#64748b;margin-top:5px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.bubble-read{font-size:.62rem;color:var(--green)}
.bubble img{max-width:100%;border-radius:8px;margin-top:6px;display:block}
.reply-area{position:sticky;bottom:72px;background:var(--navy);padding-top:10px;padding-bottom:6px;border-top:1px solid var(--border);margin-top:8px}
.reply-row{display:flex;gap:8px;align-items:flex-end}
.reply-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:.88rem;resize:none;height:48px;max-height:120px;outline:none;font-family:inherit;transition:.15s;line-height:1.4}
.reply-input:focus{border-color:var(--blue)}
.send-btn{background:var(--orange);border:none;border-radius:12px;color:#fff;padding:0 18px;font-weight:700;cursor:pointer;min-height:48px;font-size:.9rem;transition:.15s;flex-shrink:0}
.send-btn:hover{background:#c96810}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.photo-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--blue);padding:0 14px;cursor:pointer;min-height:48px;font-size:1.1rem;flex-shrink:0;transition:.15s}
.photo-btn:hover{border-color:var(--blue)}
.photo-preview-wrap{display:none;padding:6px 0;align-items:center;gap:8px}
.photo-preview-wrap.show{display:flex}
.photo-preview-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.photo-remove-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.85rem;padding:4px}
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:12px}
.empty-note{background:rgba(74,154,191,.08);border:1px solid rgba(74,154,191,.2);border-radius:12px;padding:16px;font-size:.87rem;color:var(--muted);line-height:1.6;text-align:center;margin-top:6px}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#4a9abf;font-size:20px;text-decoration:none">💬</a>
</div>

<main id="mainContent">
  <div class="spinner">⏳</div>
</main>

<!-- Hidden file input for photo attach -->
<input type="file" id="photoInput" accept="image/jpeg,image/png" style="display:none">

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/timeline.html" class="nav-btn"><span>📰</span><span>Timeline</span></a>
  <a href="/diary.html" class="nav-btn"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn"><span>🍽️</span><span>Menu</span></a>
  <a href="/messages.html" class="nav-btn active"><span>💬</span><span>Messages</span></a>
</nav>

<script>
let TOKEN, childId, parentName;
let currentThreadId = null;
let selectedPhotoFile = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function api(url, opts = {}) {
  opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
  if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  return fetch(url, opts).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));
}

function apiBare(url, opts = {}) {
  // For FormData uploads — no Content-Type header
  opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + TOKEN };
  return fetch(url, opts).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  const now = new Date();
  const diffDays = Math.floor((now - dt) / 86400000);
  if (diffDays === 0) return dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return dt.toLocaleDateString('en-GB', { weekday: 'short' });
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function relRead(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Read';
  if (m < 60) return `Read ${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `Read ${h}h ago`;
  return 'Read ' + fmtDate(ts);
}

function showThreadList() {
  currentThreadId = null;
  selectedPhotoFile = null;
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="spinner">⏳</div>';

  api('/api/messages/threads?child_id=' + childId)
    .then(data => {
      const threads = Array.isArray(data) ? data : (data.threads || []);
      if (!threads.length) {
        main.innerHTML = `
          <div class="threads-header"><div class="threads-title">💬 Messages</div></div>
          <div class="empty"><span class="icon">💬</span>No messages yet</div>
          <div class="empty-note">Messages are started by the nursery team — check back soon!<br>If you have an urgent query, please call us on <strong style="color:var(--text)">01234 567890</strong>.</div>`;
        return;
      }
      let html = `<div class="threads-header"><div class="threads-title">💬 Messages</div></div>`;
      threads.forEach(t => {
        const unread = parseInt(t.unread_count) || 0;
        html += `<div class="thread-card ${unread ? 'unread' : ''}" data-action="show-thread" data-thread-id="${t.id}" data-thread-subject="${encodeURIComponent(t.subject || 'Message')}">
          <div class="thread-subject">${esc(t.subject || 'Message')}${unread ? `<span class="unread-badge">${unread} new</span>` : ''}</div>
          <div class="thread-meta">${t.last_message_at ? fmtDate(t.last_message_at) : ''}</div>
          ${unread ? '<div class="unread-dot"></div>' : ''}
        </div>`;
      });
      main.innerHTML = html;
    })
    .catch(e => {
      main.innerHTML = `<div class="empty"><span class="icon">⚠️</span>Couldn't load messages.<br><small style="color:var(--danger)">${esc(e.message || 'Unknown error')}</small></div>`;
    });
}

function showThread(threadId, subject) {
  currentThreadId = threadId;
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="back-bar">
      <button class="back-btn" data-action="show-thread-list">← Back</button>
      <div class="thread-view-title">${esc(subject)}</div>
    </div>
    <div class="spinner">⏳</div>`;

  // Mark as read
  api('/api/messages/thread/' + threadId + '/read', { method: 'POST' }).catch(() => {});

  api('/api/messages/thread/' + threadId)
    .then(data => {
      const msgs = Array.isArray(data) ? data : (data.messages || []);

      let bubbles = '';
      if (!msgs.length) {
        bubbles = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:.85rem">No messages yet.</div>';
      } else {
        msgs.forEach(m => {
          const isSelf = m.sender_type === 'parent';
          const senderName = isSelf ? 'You' : esc(m.staff_name || m.sender_name || 'Your Nursery Team');
          const readStr = isSelf && m.read_at ? `<span class="bubble-read">✓✓ ${relRead(m.read_at)}</span>` : '';
          const photoHtml = m.attachment_path
            ? `<img src="${esc(m.attachment_path)}" alt="Attached photo" loading="lazy" onerror="this.style.display='none'">`
            : '';
          const pendingBadge = m.pending_review ? '<div style="font-size:.7rem;color:#f59e0b;margin-top:4px">⏳ Pending review</div>' : '';
          bubbles += `<div class="bubble ${isSelf ? 'parent' : 'staff'}">
            <div class="bubble-name">${senderName}</div>
            ${esc(m.body || '')}
            ${photoHtml}
            ${pendingBadge}
            <div class="bubble-time">${fmtDate(m.created_at)}${readStr}</div>
          </div>`;
        });
      }

      main.innerHTML = `
        <div class="back-bar">
          <button class="back-btn" data-action="show-thread-list">← Back</button>
          <div class="thread-view-title">${esc(subject)}</div>
        </div>
        <div class="convo-wrap" id="convoWrap">${bubbles}</div>
        <div class="reply-area">
          <div class="photo-preview-wrap" id="photoPreviewWrap">
            <img class="photo-preview-thumb" id="photoPreviewThumb" src="" alt="">
            <span id="photoPreviewName" style="font-size:.78rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
            <button class="photo-remove-btn" data-action="clear-photo">✕</button>
          </div>
          <div class="reply-row">
            <button class="photo-btn" data-action="attach-photo" title="Attach photo">📎</button>
            <textarea class="reply-input" id="replyInput" placeholder="Write a reply…" rows="2" data-thread-id="${threadId}"></textarea>
            <button class="send-btn" id="sendBtn" data-action="send-reply" data-thread-id="${threadId}">Send</button>
          </div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:5px;text-align:right">Ctrl+Enter to send · Max 5MB photo (JPEG/PNG)</div>
        </div>`;

      const cw = document.getElementById('convoWrap');
      if (cw) cw.scrollTop = cw.scrollHeight;
    })
    .catch(e => {
      main.innerHTML = `
        <div class="back-bar">
          <button class="back-btn" data-action="show-thread-list">← Back</button>
          <div class="thread-view-title">${esc(subject)}</div>
        </div>
        <div class="empty"><span class="icon">⚠️</span>Couldn't load.<br><small style="color:var(--danger)">${esc(e.message || 'Unknown error')}</small></div>`;
    });
}

document.getElementById('photoInput').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Photo must be under 5MB'); this.value = ''; return; }
  selectedPhotoFile = file;
  const thumb = document.getElementById('photoPreviewThumb');
  const nameEl = document.getElementById('photoPreviewName');
  const wrap = document.getElementById('photoPreviewWrap');
  if (thumb && wrap) {
    const reader = new FileReader();
    reader.onload = e => { thumb.src = e.target.result; };
    reader.readAsDataURL(file);
    nameEl.textContent = file.name;
    wrap.classList.add('show');
  }
  this.value = '';
});

function clearPhoto() {
  selectedPhotoFile = null;
  const wrap = document.getElementById('photoPreviewWrap');
  if (wrap) wrap.classList.remove('show');
}

async function sendReply(threadId) {
  const input = document.getElementById('replyInput');
  const btn   = document.getElementById('sendBtn');
  if (!input) return;
  const body = input.value.trim();
  if (!body && !selectedPhotoFile) return;

  input.disabled = true;
  btn.disabled = true;
  btn.textContent = '…';

  try {
    if (selectedPhotoFile) {
      const fd = new FormData();
      fd.append('photo', selectedPhotoFile);
      if (body) fd.append('body', body);
      await apiBare('/api/messages/thread/' + threadId + '/reply-photo', { method: 'POST', body: fd });
    } else {
      await api('/api/messages/thread/' + threadId + '/reply', { method: 'POST', body: { body } });
    }
    clearPhoto();
    const titleEl = document.querySelector('.thread-view-title');
    const subject = titleEl ? titleEl.textContent : 'Message';
    showThread(threadId, subject);
  } catch (e) {
    input.disabled = false;
    btn.disabled = false;
    btn.textContent = 'Send';
    alert('Failed to send: ' + (e.error || e.message || 'Unknown error'));
  }
}

document.getElementById('mainContent').addEventListener('click', function(e) {
  const st = e.target.closest('[data-action="show-thread"]');
  if (st) { showThread(parseInt(st.dataset.threadId), decodeURIComponent(st.dataset.threadSubject)); return; }
  const stl = e.target.closest('[data-action="show-thread-list"]');
  if (stl) { showThreadList(); return; }
  const cp = e.target.closest('[data-action="clear-photo"]');
  if (cp) { clearPhoto(); return; }
  const ap = e.target.closest('[data-action="attach-photo"]');
  if (ap) { document.getElementById('photoInput').click(); return; }
  const sr = e.target.closest('[data-action="send-reply"]');
  if (sr) { sendReply(parseInt(sr.dataset.threadId)); return; }
});
document.getElementById('mainContent').addEventListener('keydown', function(e) {
  if (e.target.id === 'replyInput' && (e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const tid = parseInt(e.target.dataset.threadId);
    if (tid) sendReply(tid);
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  TOKEN = localStorage.getItem('wren_parent_token');
  if (!TOKEN) { window.location.replace('/login.html'); return; }
  try {
    const p = JSON.parse(atob(TOKEN.split('.')[1]));
    childId = p.child_id;
    parentName = p.name || 'Parent';
    if (p.exp * 1000 < Date.now()) { window.location.replace('/login.html'); return; }
  } catch { window.location.replace('/login.html'); return; }

  try {
    const child = JSON.parse(localStorage.getItem('wren_parent_child') || 'null');
    if (child) {
      document.getElementById('child-name-display').textContent = (child.preferred_name || child.first_name || '') + ' ' + (child.last_name || '');
    }
  } catch {}

  showThreadList();
});
</script>
</body>
</html>
