<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Little Angels</title>
<meta name="theme-color" content="#2d5a4a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:#2d5a4a;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px 24px;line-height:1.6}
.logo{background:#fff;border-radius:16px;padding:16px 22px;margin-bottom:28px}
.logo img{height:48px;display:block}
h1{font-family:'Crimson Pro',Georgia,serif;font-size:1.9rem;margin-bottom:12px}
p{opacity:.9;max-width:420px;margin:0 auto 26px}
button{background:#f0a050;color:#1e3d31;border:0;border-radius:12px;padding:13px 26px;
  font:700 1rem Nunito,sans-serif;cursor:pointer;min-height:48px}
button:hover{background:#d8823a}
.small{margin-top:22px;font-size:.82rem;opacity:.7}
</style>
</head>
<body>
  <div class="logo"><img src="/little-angels-logo.png" alt="Little Angels Day Nursery"></div>
  <h1>You're offline 🐣</h1>
  <p>We can't reach Little Angels right now. Check your connection and try again — your child's latest updates will load as soon as you're back online.</p>
  <button onclick="location.reload()">Try again</button>
  <div class="small">Little Angels Day Nursery · Ealing, W13 9LU</div>
  <script>
    // Auto-retry the home page the moment connectivity returns.
    window.addEventListener('online', function () { location.href = '/welcome'; });
  </script>
</body>
</html>
