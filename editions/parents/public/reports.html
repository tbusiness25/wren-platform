<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Little Angels — Reports</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;--purple:#8b5cf6;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar .ttl{font-family:'Nunito',Arial,sans-serif;font-weight:800;font-size:1.05rem}
.topbar .ttl b{color:var(--blue)}.topbar .ttl i{color:var(--orange);font-style:normal}
main{padding:14px 16px;max-width:680px;margin:0 auto}
.page-title{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:14px}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;border-left:3px solid var(--blue)}
.report-card.sent{border-left-color:var(--green)}
.report-card.draft{border-left-color:var(--orange)}
.report-card.ack{border-left-color:var(--green);opacity:.7}
.report-type{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:2px 8px;border-radius:5px;margin-bottom:8px}
.report-type.termly{background:rgba(74,154,191,.16);color:var(--blue)}
.report-type.annual{background:rgba(139,92,246,.16);color:var(--purple)}
.report-type.2year{background:rgba(224,120,32,.16);color:var(--orange)}
.report-type.settling{background:rgba(34,197,94,.16);color:var(--green)}
.report-type.transition{background:rgba(236,72,153,.16);color:#ec4899}
.report-child{font-weight:700;font-size:.95rem;margin-bottom:4px}
.report-date{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:10px}
.report-meta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.report-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase}
.report-badge.sent{background:rgba(34,197,94,.16);color:var(--green)}
.report-badge.draft{background:rgba(224,120,32,.16);color:var(--orange)}
.report-badge.preview{background:rgba(74,154,191,.16);color:var(--blue)}
.report-preview{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:12px;background:var(--navy);border-radius:10px;padding:12px;max-height:200px;overflow:auto;white-space:pre-wrap}
.report-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:.15s;font-family:system-ui,sans-serif}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#3a8aaf}
.btn-sm{padding:5px 12px;font-size:.75rem}
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-body{padding:18px;overflow-y:auto;font-size:.88rem;line-height:1.7;white-space:pre-wrap}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px;transition:.15s}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:12px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:80vh;border-radius:10px}
.lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.5rem;cursor:pointer;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#94a3b8;font-size:20px;text-decoration:none">💬</a>
</div>

<main>
  <div class="page-title">📊 Reports</div>
  <div id="reportsContent"><div class="spinner">⏳</div></div>
</main>

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/timeline.html" class="nav-btn"><span>📰</span><span>Timeline</span></a>
  <a href="/diary.html" class="nav-btn"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn"><span>🍽️</span><span>Menu</span></a>
  <a href="/resources.html" class="nav-btn"><span>📁</span><span>Resources</span></a>
  <a href="/reports.html" class="nav-btn active"><span>📊</span><span>Reports</span></a>
</nav>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Report</h3>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let TOKEN, childId, reports = [];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function api(url, opts={}){
  opts.headers = {...(opts.headers||{}),'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
  if(opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  return fetch(url, opts).then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e)));
}

const TYPE_CLASS = {
  termly_progress:'termly', annual:'annual', '2year_check':'2year', '2-year check':'2year',
  settling_in:'settling', settling:'settling', transition:'transition',
  progress:'termly', leaving:'transition'
};
function typeClass(type){ return TYPE_CLASS[type] || 'termly'; }
function typeLabel(type){
  return (type||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}
function dateStr(d){
  if(!d) return '';
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

async function loadReports(){
  try {
    reports = await api('/api/parents/report');
    if(!reports || !reports.length) reports = await reports; // unwrap { reports }
    renderReports(reports);
  } catch(e) {
    document.getElementById('reportsContent').innerHTML =
      '<div class="empty"><div class="icon">⚠️</div><p style="font-size:.85rem">Could not load reports.</p></div>';
  }
}

function renderReports(list){
  const el = document.getElementById('reportsContent');
  if(!list || !list.length){
    el.innerHTML = '<div class="empty"><div class="icon">📊</div><p>No reports available yet</p><p style="font-size:.82rem;margin-top:8px;color:var(--muted)">Reports shared with you by staff will appear here</p></div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const cls = typeClass(r.report_type);
    const statusClass = r.status === 'sent' || r.status === 'finalised' ? 'sent' : r.status === 'draft' ? 'draft' : 'preview';
    const statusBadge = r.ack ? '<span class="report-badge sent">Sent</span>' :
                        r.status === 'draft' ? '<span class="report-badge draft">Draft</span>' :
                        '<span class="report-badge preview">Shared</span>';
    const preview = r.draft_content || r.final_content || r.generated_text || 'Tap to view';
    const shortPreview = preview ? preview.slice(0, 300) : '';
    return `<div class="report-card ${statusClass}" data-id="${r.id}">
      <span class="report-type ${cls}">${typeLabel(r.report_type)}</span>
      <div class="report-date">${dateStr(r.created_at)}</div>
      ${statusBadge}
      ${shortPreview ? `<div class="report-preview">${esc(shortPreview)}${preview.length > 300 ? '...' : ''}</div>` : '<div class="report-preview">Tap to view report</div>'}
      <div class="report-actions">
        <button class="btn btn-primary btn-sm" onclick="viewReport(${r.id},\`${esc(JSON.stringify(r).replace(/`/g,'\\`'))}\`)">View Report</button>
      </div>
    </div>`;
  }).join('');
}

function viewReport(id, rStr){
  const r = JSON.parse(rStr || 'null');
  if(!r) return;
  const content = r.draft_content || r.final_content || r.generated_text || r.content || 'No content available';
  const typeLabel = typeLabel(r.report_type);
  document.getElementById('modal-title').textContent = `${typeLabel} — ${dateStr(r.created_at)}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:12px;display:flex;gap:8px">
      ${r.ack || r.status === 'sent' || r.status === 'finalised' ? '<span class="report-badge sent">Sent to parent</span>' :
        r.status === 'draft' ? '<span class="report-badge draft">Draft</span>' :
        '<span class="report-badge preview">Shared</span>'}
    </div>
    ${esc(content)}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if(e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// Auth + load
if(!window.location.search.includes('demo')){
  const token = 'undefined';
  if(token && token !== 'undefined'){
    TOKEN = localStorage.getItem('wren_parent_token');
    if(TOKEN){
      // Validate token exists; if not, redirect to login
      api('/api/parents/settings').catch(() => {
        document.getElementById('reportsContent').innerHTML =
          '<div class="empty"><div class="icon">🔒</div><p>Please sign in</p></div>';
        window.location.href = '/login.html';
      });
    }
  }
}

// Check for parent token and load
const tok = localStorage.getItem('wren_parent_token');
if(tok){
  TOKEN = tok;
  api('/api/parents/report').then(d => {
    if(d && d.reports !== undefined){
      loadReports();
    } else {
      document.getElementById('reportsContent').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Could not load reports. Please try again.</p></div>';
    }
  }).catch(e => {
    document.getElementById('reportsContent').innerHTML =
      '<div class="empty"><div class="icon">🔒</div><p>Please sign in to view reports.</p></div>';
  });
} else {
  document.getElementById('reportsContent').innerHTML =
    '<div class="empty"><div class="icon">🔒</div><p>Please <a href="/login.html" style="color:var(--blue)">sign in</a> to view reports.</p></div>';
}
</script>
</body>
</html>
