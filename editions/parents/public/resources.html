<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your Nursery — Resources</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;--surface:#1e293b;--border:#2d3748;
  --blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--danger:#ef4444;
}
body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:72px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 12px;font-size:.6rem;color:#94a3b8;text-decoration:none;min-height:60px}
.nav-btn.active{color:var(--blue)}
.nav-btn span:first-child{font-size:1.2rem}
main{padding:14px 16px;max-width:760px;margin:0 auto}
.section-heading{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--text)}
/* Article cards */
.article-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px}
@media(min-width:500px){.article-grid{grid-template-columns:1fr 1fr}}
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:.15s}
.article-card:hover{border-color:var(--blue)}
.cat-badge{display:inline-block;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:600;background:rgba(74,154,191,.15);color:var(--blue);margin-bottom:2px}
.article-title{font-size:.92rem;font-weight:700;line-height:1.4}
.article-excerpt{font-size:.83rem;color:var(--muted);line-height:1.55;flex:1}
.read-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:.82rem;font-weight:600;cursor:pointer;min-height:40px;align-self:flex-start;transition:.15s}
.read-btn:hover{background:#3d85a8}
/* Drive files */
.drive-note{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:12px 14px;font-size:.83rem;color:#fca5a5;margin-bottom:14px}
.file-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(min-width:500px){.file-grid{grid-template-columns:repeat(3,1fr)}}
.file-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:.15s}
.file-card:hover{border-color:var(--blue)}
.file-icon-lg{font-size:2.2rem}
.file-name{font-size:.78rem;line-height:1.4;color:var(--text);word-break:break-word}
.file-folder{font-size:.68rem;color:var(--muted)}
.open-btn{background:var(--navy);border:1px solid var(--border);color:var(--blue);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;min-height:36px;transition:.15s}
.open-btn:hover{border-color:var(--blue);background:rgba(74,154,191,.08)}
/* Article modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;max-height:88vh;overflow-y:auto;width:100%;max-width:640px}
@media(min-width:600px){.modal-sheet{border-radius:16px;max-height:85vh}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.modal-title{font-size:1rem;font-weight:700;line-height:1.4;flex:1}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-body{font-size:.9rem;line-height:1.75;color:var(--text)}
.modal-body p{margin-bottom:12px}
/* States */
.spinner{text-align:center;padding:40px;color:var(--blue);font-size:2rem}
.empty{text-align:center;padding:30px 20px;color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;gap:0;font-family:'Nunito',Arial,sans-serif;font-weight:800">
    <span style="font-size:1.4rem;color:#4a9abf">w</span><span style="font-size:1.1rem;color:#f1f5f9">ren</span>
    <span style="font-size:.55rem;font-weight:700;letter-spacing:.15em;color:#94a3b8;text-transform:uppercase;margin-left:6px;align-self:center">PARENTS</span>
  </div>
  <div id="child-name-display" style="flex:1;text-align:center;font-size:.85rem;color:#94a3b8"></div>
  <a href="/messages.html" style="color:#94a3b8;font-size:20px;text-decoration:none">💬</a>
</div>

<main>
  <div style="font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:16px">📁 Resources</div>

  <!-- Articles section -->
  <div class="section-heading">📰 Articles from Your Nursery</div>
  <div id="articlesContent"><div class="spinner">⏳</div></div>

  <!-- Drive files section -->
  <div class="section-heading" style="margin-top:8px">📂 Parent Resources</div>
  <div id="driveContent"><div class="spinner">⏳</div></div>
</main>

<!-- Article modal -->
<div class="modal-overlay" id="articleModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modal-close-btn">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/index.html" class="nav-btn"><span>🏠</span><span>Home</span></a>
  <a href="/diary.html" class="nav-btn"><span>📖</span><span>Diary</span></a>
  <a href="/learning.html" class="nav-btn"><span>🌱</span><span>Learning</span></a>
  <a href="/menu.html" class="nav-btn"><span>🍽️</span><span>Menu</span></a>
  <a href="/resources.html" class="nav-btn active"><span>📁</span><span>Resources</span></a>
</nav>

<script>
let TOKEN;
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripHtml(h){ const d=document.createElement('div');d.innerHTML=h;return d.textContent||d.innerText||''; }
function api(url,opts={}){
  opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'};
  return fetch(url,opts).then(r=>r.ok?r.json():r.json().then(e=>Promise.reject(e)));
}

function fileIcon(name){
  if(!name) return '📄';
  const ext = name.split('.').pop().toLowerCase();
  if(ext==='pdf') return '📄';
  if(['doc','docx'].includes(ext)) return '📝';
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
  if(['mp4','mov','avi','webm'].includes(ext)) return '🎬';
  if(['xls','xlsx','csv'].includes(ext)) return '📊';
  return '📄';
}

let _articles = [];

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('articlesContent').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="open-article"]');
  if (!btn) return;
  openArticle(parseInt(btn.dataset.idx));
});
document.getElementById('driveContent').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="open-file"]');
  if (!btn) return;
  openFile(btn.dataset.path, btn.dataset.name);
});

function openArticle(idx){
  const a = _articles[idx];
  if(!a) return;
  document.getElementById('modalTitle').textContent = a.title || 'Article';
  const body = a.content_html || a.content || a.body || '';
  // If HTML, inject directly; if plain text wrap in p tags
  const isHtml = /<[a-z]/i.test(body);
  document.getElementById('modalBody').innerHTML = isHtml ? body : `<p>${esc(body).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</p>`;
  document.getElementById('articleModal').classList.add('open');
}
function closeModal(){ document.getElementById('articleModal').classList.remove('open'); }
document.getElementById('articleModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

document.addEventListener('DOMContentLoaded', async () => {
  TOKEN = localStorage.getItem('wren_parent_token');
  if(!TOKEN){ window.location.replace('/login.html'); throw new Error(''); }
  try {
    const p = JSON.parse(atob(TOKEN.split('.')[1]));
    if(p.exp*1000 < Date.now()){ window.location.replace('/login.html'); throw new Error(''); }
  } catch(e){ window.location.replace('/login.html'); throw new Error(''); }

  try {
    const child = JSON.parse(localStorage.getItem('wren_parent_child')||'null');
    if(child){ document.getElementById('child-name-display').textContent=(child.preferred_name||child.first_name||'')+' '+(child.last_name||''); }
  } catch(e){}

  // Load articles and drive files in parallel
  const [articlesResult, driveResult] = await Promise.allSettled([
    api('/api/parents/articles'),
    api('/api/parents/resources')
  ]);

  // --- Articles ---
  const artEl = document.getElementById('articlesContent');
  if(articlesResult.status === 'fulfilled'){
    const data = articlesResult.value;
    const arts = Array.isArray(data) ? data : (data.articles || []);
    _articles = arts;
    if(!arts.length){
      artEl.innerHTML = '<div class="empty">No articles published yet. Check back soon!</div>';
    } else {
      artEl.innerHTML = `<div class="article-grid">${arts.map((a,i) => {
        const cat = a.category || a.tag || '';
        const rawText = stripHtml(a.content_html || a.content || a.excerpt || '');
        const excerpt = rawText.length > 150 ? rawText.slice(0,150)+'…' : rawText;
        return `<div class="article-card">
          ${cat ? `<span class="cat-badge">${esc(cat)}</span>` : ''}
          <div class="article-title">${esc(a.title||'Article')}</div>
          ${excerpt ? `<div class="article-excerpt">${esc(excerpt)}</div>` : ''}
          <button class="read-btn" data-action="open-article" data-idx="${i}">Read →</button>
        </div>`;
      }).join('')}</div>`;
    }
  } else {
    artEl.innerHTML = '<div class="empty" style="color:var(--danger)">Articles unavailable at the moment.</div>';
  }

  // --- Drive files ---
  const driveEl = document.getElementById('driveContent');
  if(driveResult.status === 'fulfilled'){
    const data = driveResult.value;
    // Data may be {folders: {FolderName: [files]}} or {files: [...]} or an array
    let files = [];
    if(Array.isArray(data)){ files = data; }
    else if(data.files){ files = data.files; }
    else if(data.folders){
      // Flatten folder structure
      Object.entries(data.folders).forEach(([folder, flist]) => {
        (flist||[]).forEach(f => files.push({...f, folder}));
      });
    }

    if(!files.length){
      driveEl.innerHTML = '<div class="empty">No parent resources found.</div>';
    } else {
      driveEl.innerHTML = `<div class="file-grid">${files.map(f => {
        const icon = fileIcon(f.name);
        const folderName = f.folder || f.parent_folder || '';
        const path = f.path || f.id || '';
        return `<div class="file-card">
          <div class="file-icon-lg">${icon}</div>
          <div class="file-name">${esc(f.name||'File')}</div>
          ${folderName?`<div class="file-folder">${esc(folderName)}</div>`:''}
          <button class="open-btn" data-action="open-file" data-path="${esc(path)}" data-name="${esc(f.name||'file')}">Open</button>
        </div>`;
      }).join('')}</div>`;
    }
  } else {
    driveEl.innerHTML = '<div class="drive-note">Drive resources temporarily unavailable. Please check back later or contact the nursery office.</div>';
  }
});

function openFile(path, name){
  if(!path) return;
  const url = '/api/parents/resources/file?path=' + encodeURIComponent(path);
  window.open(url, '_blank');
}
</script>
</body>
</html>
