<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Plans — Little Angels</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:system-ui,Arial,sans-serif;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #2d3748;padding:12px 20px;display:flex;align-items:center;gap:14px}
.top-bar img{height:44px;border-radius:8px;background:#fff;padding:2px}
.top-bar h1{font-size:1.1rem;font-family:'Arial Rounded MT Bold',Nunito,Arial,sans-serif;color:#4a9abf;flex:1}
.top-bar a{color:#94a3b8;font-size:.85rem;text-decoration:none}
.top-bar a:hover{color:#f1f5f9}
.container{max-width:720px;margin:0 auto;padding:20px 16px}
.intro-card{background:#1e293b;border:1px solid #2d3748;border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:.88rem;color:#94a3b8}
.intro-card strong{color:#4a9abf}
.plan-block{background:#1e293b;border:1px solid #2d3748;border-radius:12px;margin-bottom:16px;overflow:hidden}
.plan-head{padding:16px 20px;border-bottom:1px solid #2d3748}
.plan-name{font-size:1rem;font-weight:700;color:#f1f5f9;margin-bottom:6px}
.plan-meta{font-size:.78rem;color:#94a3b8;display:flex;gap:12px;flex-wrap:wrap}
.plan-desc{font-size:.84rem;color:#94a3b8;margin-top:8px;line-height:1.5}
.items-list{padding:12px 20px}
.item-card{border-left:4px solid #2d3748;border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#0f172a}
.item-card.pri-high{border-left-color:#ef4444}
.item-card.pri-medium{border-left-color:#f59e0b}
.item-card.pri-low{border-left-color:#22c55e}
.item-card.done{opacity:.7}
.item-title{font-weight:600;font-size:.9rem;color:#f1f5f9;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.item-title.done-text{text-decoration:line-through;color:#64748b}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-completed{background:#22c55e}
.dot-in-progress{background:#4a9abf}
.dot-blocked{background:#ef4444}
.dot-todo{background:#64748b}
.item-meta{font-size:.75rem;color:#94a3b8;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge-red{background:#450a0a;color:#ef4444}
.badge-blue{background:#0c2d48;color:#4a9abf}
.badge-gray{background:#1e293b;color:#94a3b8;border:1px solid #2d3748}
.badge-green{background:#064e23;color:#22c55e}
.item-desc{font-size:.82rem;color:#94a3b8;margin-bottom:10px;line-height:1.5}
.comments-section{margin-top:8px;border-top:1px solid #1e293b;padding-top:8px}
.comment-toggle{font-size:.78rem;color:#4a9abf;cursor:pointer;background:none;border:none;padding:0}
.comment-toggle:hover{text-decoration:underline}
.comments-inner{margin-top:8px;display:none}
.comments-inner.open{display:block}
.comment-bubble{background:#1e293b;border-radius:8px;padding:8px 10px;margin-bottom:6px}
.comment-author{font-size:.7rem;color:#4a9abf;font-weight:600;margin-bottom:2px}
.comment-body{font-size:.82rem;color:#f1f5f9}
.comment-form{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;background:#1e293b;border:1.5px solid #2d3748;border-radius:8px;padding:8px 10px;color:#f1f5f9;font-size:.82rem;outline:none}
.comment-input:focus{border-color:#4a9abf}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:.15s}
.btn-primary{background:#4a9abf;color:#fff}
.btn-primary:hover{background:#3a8aaf}
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8}
.empty-state h3{color:#4a9abf;margin-bottom:8px}
.empty-state p{font-size:.88rem;line-height:1.6}
.loading{text-align:center;padding:40px;color:#94a3b8}
.progress-bar-wrap{height:4px;background:#2d3748;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:#4a9abf;border-radius:2px;transition:.3s}
.tag-chip{display:inline-block;padding:2px 7px;border-radius:10px;background:#1a3040;color:#4a9abf;font-size:.68rem;margin:1px}
@media(max-width:500px){.plan-meta{flex-direction:column;gap:4px}}
</style>
<script src="/pwa.js" defer></script>
</head>
<body>

<div class="top-bar">
  <img src="/little-angels-logo.png" alt="Little Angels" onerror="this.style.display='none'">
  <h1>Action Plans</h1>
  <a href="/welcome">← Back</a>
</div>

<div class="container">
  <div class="intro-card">
    These are action plans your nursery has shared with you about <strong>your child's care</strong>. You can read progress updates and leave comments for the nursery team.
  </div>

  <div id="content"><div class="loading">Loading your action plans…</div></div>
</div>

<script>
async function load(){
  const el=document.getElementById('content');
  try{
    const plans=await fetch('/api/action-plans').then(r=>r.ok?r.json():[]);
    if(!plans.length){
      el.innerHTML=`<div class="empty-state"><h3>No plans shared yet</h3><p>When the nursery shares an action plan with you — such as a settling-in plan or support plan for your child — it will appear here.</p></div>`;
      return;
    }
    el.innerHTML='';
    for(const plan of plans){
      let items=[];
      try{items=await fetch('/api/action-plan-items?plan_id='+plan.id).then(r=>r.ok?r.json():[]);}catch{}
      const done=items.filter(i=>i.status==='completed').length;
      const pct=items.length?Math.round(done/items.length*100):0;
      const block=document.createElement('div');
      block.className='plan-block';
      block.innerHTML=`
        <div class="plan-head">
          <div class="plan-name">${esc(plan.title)}</div>
          <div class="plan-meta">
            ${plan.child_name?`<span>👶 ${esc(plan.child_name)}</span>`:''}
            ${plan.category?`<span>${esc(plan.category.replace('_',' '))}</span>`:''}
            ${plan.target_date?`<span>Target: ${fmtDate(plan.target_date)}</span>`:''}
            <span>${pct}% complete</span>
          </div>
          ${plan.description?`<div class="plan-desc">${esc(plan.description)}</div>`:''}
          <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        </div>
        <div class="items-list">${renderItems(items,plan.id)}</div>`;
      el.appendChild(block);
      // Wire up comment toggles for this block
      block.querySelectorAll('[data-toggle-comments]').forEach(btn=>{
        btn.addEventListener('click',async()=>{
          const inner=document.getElementById('ci-'+btn.dataset.toggleComments);
          if(!inner) return;
          inner.classList.toggle('open');
          if(inner.classList.contains('open')&&!inner.dataset.loaded){
            inner.dataset.loaded='1';
            await loadComments(btn.dataset.toggleComments,inner);
          }
        });
      });
      block.querySelectorAll('[data-post-comment]').forEach(btn=>{
        btn.addEventListener('click',async()=>{
          const itemId=btn.dataset.postComment;
          const inp=document.getElementById('cinp-'+itemId);
          if(!inp||!inp.value.trim()) return;
          try{
            await fetch('/api/action-plan-items/'+itemId+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({body:inp.value.trim()})});
            inp.value='';
            const inner=document.getElementById('ci-'+itemId);
            await loadComments(itemId,inner);
          } catch(e){alert('Could not post comment: '+e.message);}
        });
      });
    }
  } catch(e){el.innerHTML=`<div class="empty-state"><h3>Oops</h3><p>${esc(e.message)}</p></div>`;}
}

function renderItems(items, planId){
  if(!items.length) return '<div style="padding:8px 0;color:#64748b;font-size:.85rem">No actions listed yet.</div>';
  return items.map(item=>{
    const done=item.status==='completed';
    const overdue=item.deadline&&!done&&new Date(item.deadline)<new Date();
    const dotClass={completed:'dot-completed','in-progress':'dot-in-progress',blocked:'dot-blocked',todo:'dot-todo'}[item.status]||'dot-todo';
    const dlBadge=item.deadline?`<span class="badge ${overdue?'badge-red':'badge-gray'}">${overdue?'⚠ ':''}${fmtDate(item.deadline)}</span>`:'';
    const tags=(item.tags||[]).map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('');
    return `<div class="item-card pri-${item.priority||'medium'} ${done?'done':''}">
      <div class="item-title ${done?'done-text':''}">
        <span class="status-dot ${dotClass}" title="${esc(item.status)}"></span>
        ${esc(item.title)}
      </div>
      <div class="item-meta">
        ${dlBadge}
        ${item.assignee_name?`<span>👤 ${esc(item.assignee_name)}</span>`:''}
        <span class="badge ${done?'badge-green':'badge-gray'}">${esc(item.status||'todo').replace('-',' ')}</span>
        ${tags}
      </div>
      ${item.description?`<div class="item-desc">${esc(item.description)}</div>`:''}
      <div class="comments-section">
        <button class="comment-toggle" data-toggle-comments="${item.id}">💬 Comments${item.comment_count?` (${item.comment_count})`:''}</button>
        <div class="comments-inner" id="ci-${item.id}">
          <div class="comment-form">
            <input class="comment-input" id="cinp-${item.id}" placeholder="Leave a message for the nursery team…">
            <button class="btn btn-primary" data-post-comment="${item.id}">Send</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadComments(itemId, container){
  try{
    const comments=await fetch('/api/action-plan-items/'+itemId+'/comments').then(r=>r.ok?r.json():[]);
    const existing=container.querySelector('.comments-list');
    if(existing) existing.remove();
    const list=document.createElement('div');
    list.className='comments-list';
    if(comments.length){
      list.innerHTML=comments.map(c=>`<div class="comment-bubble"><div class="comment-author">${esc(c.author_name)} · ${fmtDate(c.created_at)}</div><div class="comment-body">${esc(c.body)}</div></div>`).join('');
    } else {
      list.innerHTML='<p style="color:#64748b;font-size:.8rem;margin-bottom:6px">No comments yet.</p>';
    }
    container.insertBefore(list, container.firstChild);
  } catch{}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';}

load();
</script>
</body>
</html>
