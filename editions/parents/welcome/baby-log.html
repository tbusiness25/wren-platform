<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Nursery — Baby Log</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d5a4a;--orange:#f0a050;--cream:#fefcf8;--cream-d:#f5f0e8;--text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6}
h1,h3{font-family:'Crimson Pro',Georgia,serif}a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100}.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px}.nav-links{display:flex;gap:4px;flex-wrap:wrap}.nav-link{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600;padding:6px 12px;border-radius:6px}
.nav-link.active{color:#fff;border-bottom:2px solid var(--orange);border-radius:0;padding-bottom:4px}.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.hero{background:var(--green);color:#fff;padding:40px 20px 28px;text-align:center}.hero h1{font-size:2rem;margin-bottom:8px}.hero p{opacity:.88;max-width:560px;margin:0 auto;font-size:.95rem}
.container{max-width:680px;margin:0 auto;padding:26px 20px}
.kids{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.kid{background:#fff;border:2px solid var(--border);border-radius:30px;padding:7px 16px;font-weight:700;cursor:pointer;color:var(--green)}.kid.active{background:var(--green);color:#fff;border-color:var(--green)}
.btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:18px}
.logbtn{background:#fff;border:2px solid var(--border);border-radius:16px;padding:18px 10px;font-size:1rem;font-weight:800;color:var(--green);cursor:pointer;text-align:center;min-height:84px}
.logbtn:hover{border-color:var(--green)}.logbtn .ic{font-size:1.8rem;display:block;margin-bottom:4px}
.panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;display:none}
.panel.show{display:block}.panel h3{color:var(--green);margin-bottom:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.chip{background:var(--cream-d);border:2px solid var(--border);border-radius:24px;padding:8px 16px;font-weight:700;cursor:pointer;min-height:44px}
.chip.sel{background:var(--green);color:#fff;border-color:var(--green)}
input[type=number],input[type=time],input[type=text]{font-family:inherit;font-size:1rem;padding:10px;border:1px solid var(--border);border-radius:10px;min-height:44px}
.save{background:var(--orange);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-weight:800;font-size:1rem;cursor:pointer;min-height:48px}
.cancel{background:none;border:none;color:var(--text-m);font-weight:700;cursor:pointer;padding:12px}
.recent{margin-top:22px}.recent h3{color:var(--green);margin-bottom:10px}
.ent{background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.ent .ic{font-size:1.4rem}.ent .t{font-size:.78rem;color:var(--text-m)}.ent .tag{margin-left:auto;font-size:.72rem;font-weight:700;color:#fff;background:var(--green);border-radius:10px;padding:2px 8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;opacity:0;transition:.2s;z-index:200}.toast.show{opacity:1}
</style><script src="/pwa.js" defer></script>
</head><body>
<nav class="nav"><div class="nav-inner">
  <a href="/welcome" class="nav-logo"><img src="/little-angels-logo.png" alt="Your Nursery"></a>
  <div class="nav-links">
    <a href="/welcome" class="nav-link">Home</a>
    <a href="/welcome/baby-log" class="nav-link active">Baby Log</a>
    <a href="/welcome/diary" class="nav-link">Diary</a>
    <a href="/welcome/learning-journey" class="nav-link">Learning Journey</a>
  </div>
</div></nav>
<div class="hero"><h1>Baby Log</h1><p>Log feeds, sleeps and nappies at home — your key person sees them too, so we pick up right where you left off.</p></div>
<div class="container">
  <div class="kids" id="kids"></div>
  <div class="btns" id="btns">
    <div class="logbtn" data-t="bottle"><span class="ic">🍼</span>Bottle</div>
    <div class="logbtn" data-t="breast"><span class="ic">🤱</span>Feed</div>
    <div class="logbtn" data-t="nappy"><span class="ic">💩</span>Nappy</div>
    <div class="logbtn" data-t="sleep"><span class="ic">😴</span>Sleep</div>
    <div class="logbtn" data-t="note"><span class="ic">📝</span>Note</div>
  </div>
  <div class="panel" id="panel"></div>
  <div class="recent"><h3>Today so far</h3><div id="recent"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var KIDS=[],cur=null,conf=null,sel={};
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function nowHM(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}
var CONF={
 bottle:{type:'drink',title:'🍼 Bottle',html:'<div class="row"><input type="number" id="f-ml" placeholder="ml" min="0" step="10" style="width:90px">'+
   '<span class="chip" data-k="drink_type" data-v="formula">Formula</span><span class="chip" data-k="drink_type" data-v="EBM">Breast milk</span><span class="chip" data-k="drink_type" data-v="cow">Cow\'s</span><span class="chip" data-k="drink_type" data-v="water">Water</span></div>'},
 breast:{type:'drink',fixed:{drink_type:'other'},title:'🤱 Breastfed',html:'<div class="row"><input type="number" id="f-dur" placeholder="minutes" min="0" style="width:120px"></div>'},
 nappy:{type:'nappy',title:'💩 Nappy',html:'<div class="row"><span class="chip" data-k="nappy_state" data-v="wet">Wet</span><span class="chip" data-k="nappy_state" data-v="soiled">Soiled</span><span class="chip" data-k="nappy_state" data-v="clean">Clean</span><span class="chip" data-k="nappy_state" data-v="toilet">Toilet</span></div>'},
 sleep:{type:'sleep',title:'😴 Sleep',html:'<div class="row"><input type="number" id="f-dur" placeholder="minutes asleep" min="0" style="width:150px"><span class="chip" data-k="sleep_quality" data-v="sound">Sound</span><span class="chip" data-k="sleep_quality" data-v="restless">Restless</span><span class="chip" data-k="sleep_quality" data-v="woke">Woke</span></div>'},
 note:{type:'note',title:'📝 Note',html:'<div class="row"><input type="text" id="f-note" placeholder="Anything to share…" style="flex:1;min-width:200px"></div>'}
};
function openForm(form){conf=CONF[form];sel={};var p=document.getElementById('panel');
  p.innerHTML='<h3>'+conf.title+'</h3>'+conf.html+'<div class="row"><label style="font-weight:700">Time</label><input type="time" id="f-time" value="'+nowHM()+'"></div>'+
    '<button class="save" id="f-save">Save</button><button class="cancel" id="f-cancel">Cancel</button>';
  p.classList.add('show');
  p.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){
    p.querySelectorAll('.chip[data-k="'+this.dataset.k+'"]').forEach(function(x){x.classList.remove('sel');});
    this.classList.add('sel');sel[this.dataset.k]=this.dataset.v;});});
  document.getElementById('f-cancel').onclick=function(){p.classList.remove('show');};
  document.getElementById('f-save').onclick=save;
}
function save(){
  if(cur===null){toast('Pick your child first');return;}
  var tm=document.getElementById('f-time').value||nowHM();var occ=new Date();var hm=tm.split(':');occ.setHours(+hm[0],+hm[1],0,0);
  var body={child_id:cur,entry_type:conf.type,occurred_at:occ.toISOString()};
  Object.assign(body,conf.fixed||{},sel);
  var ml=document.getElementById('f-ml');if(ml&&ml.value)body.drink_ml=parseInt(ml.value);
  var du=document.getElementById('f-dur');if(du&&du.value)body.duration_minutes=parseInt(du.value);
  var nt=document.getElementById('f-note');if(nt&&nt.value)body.notes=nt.value;
  fetch('/welcome/baby-log/api/log',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(body)})
   .then(function(r){return r.json();}).then(function(d){if(d.ok){toast('Saved ✓');document.getElementById('panel').classList.remove('show');loadRecent();}else toast(d.error||'Could not save');}).catch(function(){toast('Could not save');});
}
var ICON={drink:'🍼',food:'🍽️',nappy:'💩',sleep:'😴',note:'📝'};
function det(e){return e.drink_ml?(e.drink_ml+'ml '+(e.drink_type||'')):e.nappy_state?e.nappy_state:e.entry_type==='sleep'?((e.duration_minutes?e.duration_minutes+' min ':'')+(e.sleep_quality||'')):e.duration_minutes?(e.duration_minutes+' min'):(e.notes||'');}
function loadRecent(){
  fetch('/welcome/diary/api/days'+(cur?('?child_id='+cur):''),{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    var today=new Date().toISOString().slice(0,10);var ents=(d.entries||[]).filter(function(e){return (e.occurred_at||'').slice(0,10)===today;});
    var el=document.getElementById('recent');
    if(!ents.length){el.innerHTML='<p style="color:#5a5a5a">Nothing logged today yet.</p>';return;}
    el.innerHTML=ents.slice(0,20).map(function(e){var tm=e.occurred_at?new Date(e.occurred_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
      return '<div class="ent"><span class="ic">'+(ICON[e.entry_type]||'•')+'</span><div><div style="font-weight:700;text-transform:capitalize">'+esc(e.entry_type)+' <span style="font-weight:400">'+esc(det(e))+'</span></div><div class="t">'+tm+'</div></div><span class="tag">'+(e.source==='parent'?'You':'Nursery')+'</span></div>';}).join('');
  }).catch(function(){});
}
fetch('/welcome/diary/api/days',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
  KIDS=d.children||[];
  if(!KIDS.length){document.getElementById('btns').style.display='none';document.getElementById('kids').innerHTML='<p style="color:#5a5a5a">We couldn\'t find your child — please check the office has your email.</p>';return;}
  cur=KIDS[0].id;
  document.getElementById('kids').innerHTML=KIDS.length<2?'':KIDS.map(function(c){return '<div class="kid'+(c.id===cur?' active':'')+'" data-id="'+c.id+'">'+esc(c.first_name)+'</div>';}).join('');
  document.querySelectorAll('.kid').forEach(function(b){b.addEventListener('click',function(){cur=parseInt(this.dataset.id);document.querySelectorAll('.kid').forEach(function(x){x.classList.remove('active');});this.classList.add('active');loadRecent();});});
  loadRecent();
});
document.querySelectorAll('.logbtn').forEach(function(b){b.addEventListener('click',function(){openForm(this.dataset.t);});});
</script></body></html>
