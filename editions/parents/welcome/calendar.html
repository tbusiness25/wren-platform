<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>School Calendar — Parents Portal</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0f172a;--surface:#1e293b;--border:#2d3748;--blue:#4a9abf;--orange:#e07820;
      --text:#f1f5f9;--muted:#94a3b8;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b}
    body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;padding-bottom:24px}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;
      display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
    .back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;
      font-weight:600;padding:4px;min-height:44px;display:flex;align-items:center;gap:4px}
    .topbar h1{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:.95rem;flex:1}
    .topbar h1 .blue{color:var(--blue)} .topbar h1 .orange{color:var(--orange)}
    .content{padding:16px;max-width:720px;margin:0 auto}

    .cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-title{font-size:16px;font-weight:700}
    .nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;
      color:var(--text);cursor:pointer;padding:8px 14px;font-size:16px;min-height:44px;min-width:44px}
    .nav-btn:hover{border-color:var(--blue)}

    .view-row{display:flex;gap:8px;margin-bottom:14px}
    .vbtn{background:var(--surface);border:1px solid var(--border);border-radius:8px;
      color:var(--muted);cursor:pointer;padding:8px 14px;font-size:13px;font-weight:600;min-height:40px}
    .vbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)}
    .ldot{width:8px;height:8px;border-radius:50%}

    .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);
      border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .day-header{background:var(--surface);text-align:center;padding:6px 2px;
      font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
    .day-cell{background:var(--surface);min-height:72px;padding:3px;cursor:default}
    .day-cell.other-month{background:#0b1525}
    .day-cell.today{outline:2px solid var(--blue);outline-offset:-2px}
    .day-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:2px;padding:1px 2px}
    .day-cell.today .day-num{color:var(--blue)}
    .ev-chip{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:700;
      margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
      cursor:pointer;color:#fff;display:block}
    .ev-chip:hover{opacity:.8}
    .more-ev{font-size:9px;color:var(--muted);cursor:pointer;padding-left:2px}

    .agenda-group{margin-bottom:16px}
    .agenda-date-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.08em;color:var(--muted);margin-bottom:6px;padding:0 2px}
    .agenda-ev{display:flex;align-items:center;gap:10px;padding:12px 14px;
      background:var(--surface);border:1px solid var(--border);border-radius:10px;
      margin-bottom:6px;cursor:pointer;transition:.1s}
    .agenda-ev:hover{border-color:var(--blue)}
    .ag-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .ag-label{font-size:14px;font-weight:600;flex:1}
    .ag-sub{font-size:12px;color:var(--muted)}
    .empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}

    .ics-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:14px 16px;margin-top:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .ics-section p{font-size:13px;color:var(--muted)}
    .ics-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;
      padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;min-height:44px}
    .ics-btn:hover{opacity:.85}

    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
      display:none;align-items:flex-end;justify-content:center}
    .detail-overlay.open{display:flex}
    .detail-sheet{background:var(--surface);border-radius:20px 20px 0 0;
      padding:20px 20px 32px;width:100%;max-width:600px;max-height:70vh;overflow-y:auto}
    .detail-sheet h3{font-size:16px;font-weight:700;margin-bottom:6px}
    .detail-date{font-size:13px;color:var(--muted);margin-bottom:10px}
    .detail-desc{font-size:14px;line-height:1.6;color:var(--muted)}
    .sheet-close{float:right;background:none;border:none;color:var(--muted);
      font-size:22px;cursor:pointer;min-height:44px;min-width:44px;
      display:flex;align-items:center;justify-content:center}
    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);
      border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
<script src="/pwa.js" defer></script>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <h1><span class="blue">Your Nursery</span> <span class="orange">Day Nursery</span></h1>
</div>

<div class="content">
  <h2 style="font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.2rem;margin-bottom:14px">📅 School Calendar</h2>

  <div id="loading" class="spinner"></div>
  <div id="cal-wrap" style="display:none">
    <div class="cal-nav-row">
      <button class="nav-btn" onclick="prevPeriod()">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="nav-btn" onclick="nextPeriod()">›</button>
    </div>
    <div class="view-row">
      <button class="vbtn active" id="vbtn-month" onclick="setView('month')">Month</button>
      <button class="vbtn" id="vbtn-list" onclick="setView('list')">List</button>
      <button class="vbtn" id="vbtn-week" onclick="setView('week')">This Week</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="ldot" style="background:#4a9abf"></div>Term</div>
      <div class="legend-item"><div class="ldot" style="background:#e07820"></div>Half Term</div>
      <div class="legend-item"><div class="ldot" style="background:#22c55e"></div>Trip</div>
      <div class="legend-item"><div class="ldot" style="background:#f59e0b"></div>Parents Evening</div>
      <div class="legend-item"><div class="ldot" style="background:#06b6d4"></div>Club</div>
    </div>
    <div id="cal-container"></div>
    <div class="ics-section">
      <div><p>📲 Add all events to your phone calendar</p><p style="font-size:11px;margin-top:2px">Works with Apple Calendar, Google Calendar, Outlook</p></div>
      <button class="ics-btn" onclick="subscribeICS()">⬇ Subscribe (.ics)</button>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-sheet">
    <button class="sheet-close" onclick="closeDetail()">×</button>
    <div id="detail-colour-bar" style="width:32px;height:4px;border-radius:2px;margin-bottom:10px"></div>
    <h3 id="detail-title"></h3>
    <div class="detail-date" id="detail-date"></div>
    <div class="detail-desc" id="detail-desc"></div>
  </div>
</div>

<script>
let EVENTS = [];
let VIEW = 'month';
let CURSOR = new Date();
const TYPE_LABELS = { term:'Term', half_term:'Half Term', trip:'School Trip',
  parents_evening:"Parents' Evening", announcement:'Announcement', club:'Club' };

async function init() {
  const data = await fetch('/api/primary-demo/calendar').then(r=>r.json()).catch(()=>[]);
  EVENTS = data;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('cal-wrap').style.display = 'block';
  goToday();
}

function goToday() { CURSOR = new Date(); render(); }
function prevPeriod() {
  if (VIEW === 'month') CURSOR = new Date(CURSOR.getFullYear(), CURSOR.getMonth()-1, 1);
  else if (VIEW === 'week') CURSOR.setDate(CURSOR.getDate()-7);
  else CURSOR.setMonth(CURSOR.getMonth()-1);
  render();
}
function nextPeriod() {
  if (VIEW === 'month') CURSOR = new Date(CURSOR.getFullYear(), CURSOR.getMonth()+1, 1);
  else if (VIEW === 'week') CURSOR.setDate(CURSOR.getDate()+7);
  else CURSOR.setMonth(CURSOR.getMonth()+1);
  render();
}
function setView(v) {
  VIEW = v;
  ['month','list','week'].forEach(x => document.getElementById('vbtn-'+x)?.classList.toggle('active', x===v));
  render();
}

function ds(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s) { if (!s) return ''; return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'}); }

function getEventsForDate(dateStr) {
  return EVENTS.filter(e => {
    if (e.recurring !== undefined && e.day_of_week !== undefined) {
      return new Date(dateStr+'T00:00:00').getDay() === e.day_of_week;
    }
    const start = e.start ? String(e.start).slice(0,10) : null;
    const end = e.end ? String(e.end).slice(0,10) : start;
    if (!start) return false;
    return dateStr >= start && dateStr <= (end || start);
  });
}

function render() {
  if (VIEW === 'month') renderMonth();
  else if (VIEW === 'week') renderWeek();
  else renderList();
}

function renderMonth() {
  const y = CURSOR.getFullYear(), m = CURSOR.getMonth();
  document.getElementById('cal-title').textContent = new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const startDow = (new Date(y,m,1).getDay()+6)%7;
  const todayStr = ds(new Date());
  const days = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  let html = '<div class="month-grid">';
  days.forEach(d => html += `<div class="day-header">${d}</div>`);
  let d = new Date(y,m,1); d.setDate(d.getDate()-startDow);
  for (let cell=0; cell<42; cell++) {
    const dStr = ds(d), otherM = d.getMonth()!==m, today = dStr===todayStr;
    const evs = getEventsForDate(dStr);
    const show = evs.slice(0,2), more = evs.length-show.length;
    html += `<div class="day-cell${otherM?' other-month':''}${today?' today':''}">`;
    html += `<div class="day-num">${d.getDate()}</div>`;
    show.forEach(e => html += `<div class="ev-chip" style="background:${e.colour||'#4a9abf'}" onclick='showDetail(${safeJson(e)})'>${escHtml(e.title)}</div>`);
    if (more) html += `<div class="more-ev">+${more}</div>`;
    html += '</div>';
    d.setDate(d.getDate()+1);
    if (cell>=34 && d.getMonth()!==m) break;
  }
  html += '</div>';
  document.getElementById('cal-container').innerHTML = html;
}

function renderWeek() {
  const start = new Date(CURSOR); start.setDate(start.getDate()-((start.getDay()+6)%7));
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d; });
  const r = `${days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  document.getElementById('cal-title').textContent = r;
  const todayStr = ds(new Date());
  let html = '';
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  days.forEach(d => {
    const dStr = ds(d), today = dStr===todayStr;
    const evs = getEventsForDate(dStr);
    if (!evs.length && !today) return;
    const lbl = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    html += `<div class="agenda-group"><div class="agenda-date-lbl" style="${today?'color:var(--blue)':''}">${lbl}${today?' — Today':''}</div>`;
    if (evs.length) evs.forEach(e => html += agendaRow(e));
    else html += `<div style="font-size:13px;color:var(--muted);padding:8px 0">No events</div>`;
    html += '</div>';
  });
  if (!html) html = '<div class="empty">No events this week</div>';
  document.getElementById('cal-container').innerHTML = html;
}

function renderList() {
  const y = CURSOR.getFullYear(), m = CURSOR.getMonth();
  document.getElementById('cal-title').textContent = new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const daysInMonth = new Date(y,m+1,0).getDate();
  let html = '';
  for (let day=1; day<=daysInMonth; day++) {
    const dStr = ds(new Date(y,m,day));
    const evs = getEventsForDate(dStr);
    if (!evs.length) continue;
    html += `<div class="agenda-group"><div class="agenda-date-lbl">${fmtDate(dStr)}</div>`;
    evs.forEach(e => html += agendaRow(e));
    html += '</div>';
  }
  if (!html) html = '<div class="empty">No events this month</div>';
  document.getElementById('cal-container').innerHTML = html;
}

function agendaRow(e) {
  return `<div class="agenda-ev" onclick='showDetail(${safeJson(e)})'>
    <div class="ag-dot" style="background:${e.colour||'#4a9abf'}"></div>
    <div><div class="ag-label">${escHtml(e.title)}</div>
    <div class="ag-sub">${TYPE_LABELS[e.type]||e.type||''}</div></div>
  </div>`;
}

function showDetail(e) {
  document.getElementById('detail-colour-bar').style.background = e.colour || '#4a9abf';
  document.getElementById('detail-title').textContent = e.title || '—';
  document.getElementById('detail-desc').textContent = e.description || '';
  const startFmt = e.start ? fmtDate(String(e.start).slice(0,10)) : '';
  const endFmt = e.end && e.end!==e.start ? ' – '+fmtDate(String(e.end).slice(0,10)) : '';
  document.getElementById('detail-date').textContent = (TYPE_LABELS[e.type]||'') + (startFmt ? ' · '+startFmt+endFmt : '');
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }

async function subscribeICS() {
  const token = await fetch('/api/primary-demo/calendar-token').then(r=>r.json()).then(d=>d.token).catch(()=>'demo');
  const url = `/api/primary-demo/calendar.ics?token=${token}`;
  const a = document.createElement('a'); a.href = url; a.download = 'school-calendar.ics'; a.click();
}

function safeJson(e) {
  const s = JSON.stringify({title:e.title,type:e.type,start:e.start,end:e.end,description:e.description,colour:e.colour});
  return s.replace(/'/g,'&#39;').replace(/\\/g,'\\\\');
}
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
