<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Nursery — Your Child's Daily Diary</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d5a4a;--orange:#f0a050;--cream:#fefcf8;--cream-d:#f5f0e8;--text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6}
h1,h3{font-family:'Crimson Pro',Georgia,serif}a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100}.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px}.nav-links{display:flex;gap:4px;flex-wrap:wrap}.nav-link{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600;padding:6px 12px;border-radius:6px}
.nav-link.active{color:#fff;border-bottom:2px solid var(--orange);border-radius:0;padding-bottom:4px}.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.hero{background:var(--green);color:#fff;padding:40px 20px 28px;text-align:center}.hero h1{font-size:2rem;margin-bottom:8px}.hero p{opacity:.88;max-width:560px;margin:0 auto}
.container{max-width:700px;margin:0 auto;padding:26px 20px}
.kids{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.kid{background:#fff;border:2px solid var(--border);border-radius:30px;padding:7px 16px;font-weight:700;cursor:pointer;color:var(--green)}.kid.active{background:var(--green);color:#fff;border-color:var(--green)}
.day h3{color:var(--green);margin:18px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.ent{background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.ent .ic{font-size:1.4rem}.ent .t{font-size:.78rem;color:var(--text-m)}.ent .tag{margin-left:auto;font-size:.72rem;font-weight:700;color:#fff;background:var(--green);border-radius:10px;padding:2px 8px}.ent .tag.you{background:var(--orange)}
.empty{text-align:center;color:var(--text-m);padding:50px 20px}.empty .big{font-size:2.4rem;margin-bottom:10px}
.cta{display:block;text-align:center;background:var(--orange);color:#fff;border-radius:12px;padding:12px;font-weight:800;margin-bottom:18px}
</style></head><body>
<nav class="nav"><div class="nav-inner">
  <a href="/welcome" class="nav-logo"><img src="/little-angels-logo.png" alt="Your Nursery"></a>
  <div class="nav-links">
    <a href="/welcome" class="nav-link">Home</a>
    <a href="/welcome/baby-log" class="nav-link">Baby Log</a>
    <a href="/welcome/diary" class="nav-link active">Diary</a>
    <a href="/welcome/learning-journey" class="nav-link">Learning Journey</a>
  </div>
</div></nav>
<div class="hero"><h1>Daily Diary</h1><p>Feeds, naps and nappies — at nursery and at home, in one timeline.</p></div>
<div class="container">
  <a href="/welcome/baby-log" class="cta">＋ Log a feed, sleep or nappy</a>
  <div class="kids" id="kids"></div>
  <div id="feed"><div class="empty">Loading…</div></div>
</div>
<script>
var ICON={drink:'🍼',food:'🍽️',nappy:'💩',sleep:'😴',note:'📝'};
var DATA=null,cur=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function detail(e){return e.drink_ml?(e.drink_ml+'ml '+esc(e.drink_type||'')):e.nappy_state?esc(e.nappy_state):(e.entry_type==='sleep')?((e.duration_minutes?e.duration_minutes+' min ':'')+esc(e.sleep_quality||'')):e.duration_minutes?(e.duration_minutes+' min'):(e.food_amount?esc(e.food_amount)+' ':'')+esc(e.notes||'');}
function render(){
  var feed=document.getElementById('feed');
  var ents=(DATA.entries||[]).filter(function(e){return cur===null||e.child_id===cur;});
  if(!ents.length){feed.innerHTML='<div class="empty"><div class="big">📖</div><p>No diary entries yet. Tap <b>Log a feed, sleep or nappy</b> above, or your key person\'s entries will appear here.</p></div>';return;}
  var byDay={};ents.forEach(function(e){var d=(e.occurred_at||'').slice(0,10);(byDay[d]=byDay[d]||[]).push(e);});
  feed.innerHTML=Object.keys(byDay).sort().reverse().map(function(d){
    var lbl=new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    return '<div class="day"><h3>'+lbl+'</h3>'+byDay[d].map(function(e){
      var tm=e.occurred_at?new Date(e.occurred_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
      return '<div class="ent"><span class="ic">'+(ICON[e.entry_type]||'•')+'</span><div><div style="font-weight:700;text-transform:capitalize">'+esc(e.entry_type)+' <span style="font-weight:400">'+detail(e)+'</span></div><div class="t">'+tm+'</div></div><span class="tag'+(e.source==='parent'?' you':'')+'">'+(e.source==='parent'?'You':'Nursery')+'</span></div>';
    }).join('')+'</div>';
  }).join('');
}
function renderKids(){
  if(DATA.children.length<2){document.getElementById('kids').style.display='none';return;}
  document.getElementById('kids').innerHTML='<div class="kid'+(cur===null?' active':'')+'" data-id="">All</div>'+DATA.children.map(function(c){return '<div class="kid'+(cur===c.id?' active':'')+'" data-id="'+c.id+'">'+esc(c.first_name)+'</div>';}).join('');
  document.querySelectorAll('.kid').forEach(function(b){b.addEventListener('click',function(){cur=this.dataset.id?parseInt(this.dataset.id):null;renderKids();render();});});
}
fetch('/welcome/diary/api/days',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
  DATA=d;if(!d.children||!d.children.length){document.getElementById('feed').innerHTML='<div class="empty"><div class="big">👋</div><p>We couldn\'t find your child — please check the office has your email.</p></div>';return;}
  renderKids();render();
}).catch(function(){document.getElementById('feed').innerHTML='<div class="empty">Could not load right now.</div>';});
</script></body></html>
