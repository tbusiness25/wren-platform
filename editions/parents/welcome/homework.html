<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Homework — Parents Portal</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0f172a;--surface:#1e293b;--border:#2d3748;--blue:#4a9abf;--orange:#e07820;
      --text:#f1f5f9;--muted:#94a3b8;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b}
    body{background:var(--navy);color:var(--text);font-family:system-ui,Arial,sans-serif;min-height:100vh}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;
      display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
    .back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;
      font-weight:600;padding:4px;min-height:44px;display:flex;align-items:center;gap:4px}
    .topbar h1{font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:.95rem}
    .topbar h1 .blue{color:var(--blue)} .topbar h1 .orange{color:var(--orange)}
    .content{padding:16px;max-width:720px;margin:0 auto}
    .section-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:var(--muted);margin:20px 0 8px;padding:0 2px}
    .hw-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:16px;margin-bottom:10px;transition:.15s}
    .hw-card.done-card{opacity:.6;margin-bottom:8px}
    .hw-card:hover{border-color:#3d4a5c}
    .hw-title{font-size:15px;font-weight:700;margin-bottom:4px}
    .hw-meta{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;
      background:var(--navy);color:var(--muted)}
    .due-overdue{color:var(--danger)!important;font-weight:700}
    .due-today{color:var(--warning)!important;font-weight:700}
    .hw-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px}
    .hw-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
      border:none;min-height:40px;transition:.15s}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-primary:hover{opacity:.85}
    .btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
    .btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
    .btn-done{background:#14532d;color:#4ade80;border:1px solid #166534}
    .btn-done:hover{background:#166534}
    .done-badge{display:inline-flex;align-items:center;gap:4px;background:#14532d;color:#4ade80;
      border:1px solid #166534;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600}
    .ext-link{color:var(--blue);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .ext-link:hover{text-decoration:underline}
    .attach-link{color:var(--muted);font-size:12px;text-decoration:none}
    .attach-link:hover{color:var(--text)}
    .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-row select{padding:8px 12px;border-radius:8px;border:1px solid var(--border);
      background:var(--surface);color:var(--text);font-size:13px}
    .empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
    .submit-form{background:var(--navy);border:1px solid var(--border);border-radius:10px;
      padding:14px;margin-top:10px;display:none}
    .submit-form.open{display:block}
    .form-field{margin-bottom:10px}
    .form-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .form-field textarea,.form-field input{width:100%;padding:8px 12px;border-radius:8px;
      border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);
      border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a5f;
      color:var(--blue);border:1px solid var(--blue);border-radius:10px;padding:10px 20px;
      font-size:13px;font-weight:600;z-index:9999;transition:.3s;pointer-events:none}
    .child-filter{font-size:13px;color:var(--muted);padding:8px 12px;background:var(--surface);
      border:1px solid var(--border);border-radius:8px}
  </style>
<script src="/pwa.js" defer></script>
</head>
<body>
<div class="topbar">
  <button class="back-btn" id="btn-back">← Back</button>
  <h1><span class="blue">Your Nursery</span> <span class="orange">Day Nursery</span></h1>
</div>

<div class="content">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <h2 style="font-family:'Arial Rounded MT Bold','Nunito',Arial,sans-serif;font-size:1.2rem">📚 Homework</h2>
  </div>

  <div id="child-filter-row" class="filter-row" style="display:none"></div>

  <div id="hw-loading" style="text-align:center;padding:40px"><div class="spinner"></div></div>
  <div id="hw-content" style="display:none"></div>
</div>

<div id="toast" class="toast" style="opacity:0"></div>

<script>
const EMAIL = document.cookie.match(/CF_Authorization=/)
  ? '' : (document.location.search.match(/email=([^&]+)/)?.[1] || '');

let ALL_HW = [];
let CHILDREN = [];
let FILTER_CHILD = null;

async function init() {
  const res = await fetch('/api/primary-demo/homework').catch(() => null);
  if (!res || !res.ok) {
    document.getElementById('hw-loading').innerHTML = '<p style="color:#94a3b8">Unable to load homework. Please try again later.</p>';
    return;
  }
  const data = await res.json();
  ALL_HW = data.homework || [];
  CHILDREN = data.children || [];

  // Child filter if multi-child
  if (CHILDREN.length > 1) {
    const row = document.getElementById('child-filter-row');
    row.style.display = 'flex';
    row.innerHTML = '<select class="child-filter" id="child-filter-select"><option value="">All children</option>' +
      CHILDREN.map(c => `<option value="${c.id}">${c.first_name} ${c.last_name}</option>`).join('') + '</select>';
    document.getElementById('child-filter-select').addEventListener('change', function() { filterChild(this.value); });
  }

  document.getElementById('hw-loading').style.display = 'none';
  document.getElementById('hw-content').style.display = 'block';
  render();
}

function filterChild(val) {
  FILTER_CHILD = val ? parseInt(val) : null;
  render();
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() + 7);
  const weekEndStr = weekEnd.toISOString().slice(0,10);

  let hw = ALL_HW.filter(h => !FILTER_CHILD || h.class_pupils_ids?.includes(FILTER_CHILD));
  if (!hw.length) hw = ALL_HW; // fallback if no class matching

  const doneItems = hw.filter(h => h._done);
  const activeItems = hw.filter(h => !h._done);

  const dueToday = activeItems.filter(h => h.due_date === today);
  const dueThisWeek = activeItems.filter(h => h.due_date > today && h.due_date <= weekEndStr);
  const upcoming = activeItems.filter(h => h.due_date > weekEndStr);
  const overdue = activeItems.filter(h => h.due_date < today);

  let html = '';
  if (overdue.length) {
    html += '<div class="section-label" style="color:var(--danger)">⚠️ Overdue</div>';
    html += overdue.map(renderCard).join('');
  }
  if (dueToday.length) {
    html += '<div class="section-label" style="color:var(--warning)">📅 Due Today</div>';
    html += dueToday.map(renderCard).join('');
  }
  if (dueThisWeek.length) {
    html += '<div class="section-label">📆 Due This Week</div>';
    html += dueThisWeek.map(renderCard).join('');
  }
  if (upcoming.length) {
    html += '<div class="section-label">🗓️ Upcoming</div>';
    html += upcoming.map(renderCard).join('');
  }
  if (!overdue.length && !dueToday.length && !dueThisWeek.length && !upcoming.length) {
    html += '<div class="empty">🎉 No outstanding homework right now!</div>';
  }
  if (doneItems.length) {
    html += '<div class="section-label">✅ Completed</div>';
    html += doneItems.map(renderCard).join('');
  }

  document.getElementById('hw-content').innerHTML = html;
}

function renderCard(h) {
  const today = new Date().toISOString().slice(0,10);
  const isOverdue = h.due_date < today && !h._done;
  const isDueToday = h.due_date === today && !h._done;
  const dueClass = isOverdue ? 'due-overdue' : isDueToday ? 'due-today' : '';
  const typeLabel = {worksheet:'📄 Worksheet', reading:'📚 Reading', project:'🔬 Project',
    research:'🔍 Research', online_task:'💻 Online Task', practice:'🏆 Practice'}[h.type] || h.type;
  const dueFmt = h.due_date ? new Date(h.due_date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) : '—';

  let attachHtml = '';
  if (h.attachment_paths && h.attachment_paths.length) {
    attachHtml = h.attachment_paths.map((p,i) =>
      `<a href="/api/primary-demo/homework-file?path=${encodeURIComponent(p)}" class="attach-link" target="_blank">📎 Attachment ${i+1}</a>`
    ).join(' ');
  }

  const subForm = `<div class="submit-form" id="sf-${h.id}">
    <div class="form-field"><label>Notes (optional)</label>
      <textarea id="sf-text-${h.id}" rows="2" placeholder="Add a note…"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" data-action="submit-done" data-id="${h.id}">Mark as Done</button>
      <button class="btn btn-secondary" data-action="toggle-submit" data-id="${h.id}">Cancel</button>
    </div>
  </div>`;

  const actions = h._done
    ? `<span class="done-badge">✅ Done on ${new Date(h._done_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`
    : `<button class="btn btn-done" data-action="toggle-submit" data-id="${h.id}">✅ Mark as Done</button>`;

  return `<div class="hw-card ${h._done ? 'done-card' : ''}" id="hwc-${h.id}">
    <div class="hw-title">${escHtml(h.title)}</div>
    <div class="hw-meta">
      <span class="type-badge">${typeLabel}</span>
      <span class="${dueClass}">Due ${dueFmt}</span>
      ${h.estimated_duration_minutes ? `<span>~${h.estimated_duration_minutes} min</span>` : ''}
      ${h.class_name ? `<span>${escHtml(h.class_name)}</span>` : ''}
      ${h.subject_name ? `<span>${escHtml(h.subject_name)}</span>` : ''}
    </div>
    ${h.description ? `<div class="hw-desc">${escHtml(h.description)}</div>` : ''}
    <div class="hw-actions">
      ${actions}
      ${h.external_resource_url ? `<a href="${escHtml(h.external_resource_url)}" target="_blank" class="ext-link">🔗 Open resource</a>` : ''}
      ${attachHtml}
    </div>
    ${h._done ? '' : subForm}
  </div>`;
}

function toggleSubmitForm(hwId) {
  const sf = document.getElementById('sf-' + hwId);
  if (sf) sf.classList.toggle('open');
}

async function submitDone(hwId, btn) {
  const text = document.getElementById('sf-text-' + hwId)?.value.trim() || '';
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const r = await fetch(`/api/primary-demo/homework/${hwId}/done`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    });
    if (!r.ok) throw new Error('Failed');
    // Update local state
    const hw = ALL_HW.find(h => h.id === hwId);
    if (hw) { hw._done = true; hw._done_at = new Date().toISOString(); }
    showToast('Marked as done! 🎉');
    render();
  } catch(e) {
    showToast('Could not save — please try again', true);
    if (btn) { btn.disabled = false; btn.textContent = 'Mark as Done'; }
  }
}

function showToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = error ? '#3b1111' : '#1e3a5f';
  t.style.color = error ? 'var(--danger)' : 'var(--blue)';
  t.style.borderColor = error ? 'var(--danger)' : 'var(--blue)';
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('btn-back').addEventListener('click', function() { history.back(); });
document.getElementById('hw-content').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  if (btn.dataset.action === 'submit-done') submitDone(id, btn);
  else if (btn.dataset.action === 'toggle-submit') toggleSubmitForm(id);
});
init();
</script>
</body>
</html>
