<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Angels — Your Child's Learning Journey</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d5a4a;--orange:#f0a050;--cream:#fefcf8;--cream-d:#f5f0e8;--text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Crimson Pro',Georgia,serif}
a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px;display:block}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-link{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600;padding:6px 12px;border-radius:6px}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}.nav-link.active{color:#fff;border-bottom:2px solid var(--orange);border-radius:0;padding-bottom:4px}
.hero{background:var(--green);color:#fff;padding:46px 20px 32px;text-align:center}.hero h1{font-size:2.1rem;margin-bottom:10px}.hero p{opacity:.88;max-width:560px;margin:0 auto}
.container{max-width:820px;margin:0 auto;padding:30px 20px}
.kids{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.kid{background:#fff;border:2px solid var(--border);border-radius:30px;padding:7px 16px;font-weight:700;cursor:pointer;color:var(--green)}
.kid.active{background:var(--green);color:#fff;border-color:var(--green)}
.obs{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.obs h3{color:var(--green);font-size:1.2rem;margin-bottom:4px}
.obs .meta{font-size:.8rem;color:var(--text-m);margin-bottom:10px}
.obs .areas{margin-top:10px}.area{display:inline-block;background:var(--cream-d);border-radius:20px;padding:2px 11px;font-size:.76rem;font-weight:700;color:var(--green);margin:2px}
.obs .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.obs .photos img{width:120px;height:120px;object-fit:cover;border-radius:10px}
.empty{text-align:center;color:var(--text-m);padding:50px 20px}.empty .big{font-size:2.4rem;margin-bottom:10px}
</style><script src="/pwa.js" defer></script>
</head><body>
<nav class="nav"><div class="nav-inner">
  <a href="/welcome" class="nav-logo"><img src="/little-angels-logo.png" alt="Little Angels Day Nursery"></a>
  <div class="nav-links">
    <a href="/welcome" class="nav-link">Home</a>
    <a href="/welcome/learning-journey" class="nav-link active">Learning Journey</a>
      <a href="/welcome/baby-log" class="nav-link">Baby Log</a>
    <a href="/welcome/diary" class="nav-link">Diary</a>
    <a href="/welcome/planning" class="nav-link">Planning</a>
    <a href="/welcome/records" class="nav-link">Records</a>
    <a href="/welcome/menu" class="nav-link">Menu</a>
  </div>
</div></nav>
<div class="hero"><h1>Your Child's Learning Journey</h1><p>Observations and special moments your child's key person has shared with you.</p></div>
<div class="container">
  <div class="kids" id="kids"></div>
  <div id="feed"><div class="empty">Loading…</div></div>
</div>
<script>
var DATA=null, current=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmt(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}catch(e){return d;}}
function render(){
  var feed=document.getElementById('feed');
  var obs=DATA.observations.filter(function(o){return current===null||o.child_id===current;});
  if(!obs.length){feed.innerHTML='<div class="empty"><div class="big">🌱</div><p>No shared observations yet. New moments your child\'s key person shares will appear here.</p></div>';return;}
  feed.innerHTML=obs.map(function(o){
    var areas=(o.eyfs_areas||[]);if(typeof areas==='string'){try{areas=JSON.parse(areas);}catch(e){areas=[areas];}}
    var ph=(o.photo_urls||[]);if(typeof ph==='string'){try{ph=JSON.parse(ph);}catch(e){ph=[];}}
    return '<div class="obs"><h3>'+esc(o.title||'Observation')+'</h3>'+
      '<div class="meta">'+fmt(o.created_at)+(o.staff?(' · by '+esc(o.staff)):'')+'</div>'+
      '<div>'+esc(o.observation_text||'').replace(/\n/g,'<br>')+'</div>'+
      (areas.length?'<div class="areas">'+areas.map(function(a){return '<span class="area">'+esc(a)+'</span>';}).join('')+'</div>':'')+
      (ph.length?'<div class="photos">'+ph.map(function(u){return '<img src="'+esc(u)+'" alt="" loading="lazy">';}).join('')+'</div>':'')+
      '</div>';
  }).join('');
}
function renderKids(){
  if(DATA.children.length<2){document.getElementById('kids').style.display='none';return;}
  document.getElementById('kids').innerHTML='<div class="kid'+(current===null?' active':'')+'" data-id="">All</div>'+
    DATA.children.map(function(c){return '<div class="kid'+(current===c.id?' active':'')+'" data-id="'+c.id+'">'+esc(c.first_name)+'</div>';}).join('');
  document.querySelectorAll('.kid').forEach(function(b){b.addEventListener('click',function(){current=this.dataset.id?parseInt(this.dataset.id):null;renderKids();render();});});
}
fetch('/welcome/learning-journey/api/journey',{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
  DATA=d;if(!d.children||!d.children.length){document.getElementById('feed').innerHTML='<div class="empty"><div class="big">👋</div><p>We couldn\'t find your child\'s record yet. Please check with the office that we have your email on file.</p></div>';return;}
  renderKids();render();
}).catch(function(){document.getElementById('feed').innerHTML='<div class="empty">Could not load right now. Please try again shortly.</div>';});
</script></body></html>
