<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Box — Your Nursery Parent Hub</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d5a4a;--green-d:#1e3d31;--green-l:#3d7a64;
  --orange:#f0a050;--orange-d:#d8823a;
  --cream:#fefcf8;--cream-d:#f5f0e8;
  --text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0;
}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6}
h1,h2,h3,h4{font-family:'Crimson Pro',Georgia,serif}
a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px;display:block}
.nav-links{display:flex;gap:4px}
.nav-link{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600;padding:6px 14px;border-radius:6px;transition:.15s}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-link.active{color:#fff;border-bottom:2px solid var(--orange);border-radius:0;padding-bottom:4px}

.hero{background:var(--green);color:#fff;padding:48px 20px 32px;text-align:center}
.hero h1{font-size:2.2rem;margin-bottom:10px}
.hero p{font-size:1rem;opacity:.88;max-width:520px;margin:0 auto}

.container{max-width:960px;margin:0 auto;padding:32px 20px 60px}

/* Filter tabs */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-m);font-size:.85rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.15s}
.filter-btn:hover{border-color:var(--green);color:var(--green)}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#fff}

/* Child tabs (if multiple children) */
.child-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.child-tab{padding:8px 18px;border-radius:8px;border:2px solid var(--border);
  background:transparent;color:var(--text-m);font-size:.9rem;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.15s}
.child-tab:hover{border-color:var(--green)}
.child-tab.active{background:var(--green);border-color:var(--green);color:#fff}

/* Timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:24px}
.timeline-item::before{content:'';position:absolute;left:-22px;top:18px;width:12px;height:12px;
  border-radius:50%;background:var(--green);border:2px solid var(--cream);box-shadow:0 0 0 2px var(--green)}
.memory-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 22px}
.memory-card:hover{box-shadow:0 4px 16px rgba(45,90,74,.1)}
.memory-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.memory-badge{padding:3px 12px;border-radius:20px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-milestone{background:rgba(45,90,74,.1);color:var(--green)}
.badge-first_word{background:rgba(74,154,191,.12);color:#2d7aa0}
.badge-first_steps{background:rgba(34,197,94,.1);color:#166534}
.badge-favourite{background:rgba(240,160,80,.12);color:var(--orange-d)}
.badge-drawing{background:rgba(168,85,247,.1);color:#7c3aed}
.badge-everyday_joy{background:rgba(34,197,94,.08);color:#15803d}
.badge-general{background:rgba(0,0,0,.05);color:var(--text-m)}
.memory-date{font-size:.82rem;color:var(--text-m);margin-left:auto}
.memory-title{font-family:'Crimson Pro',serif;font-size:1.3rem;font-weight:700;color:var(--green);margin-bottom:6px}
.memory-desc{font-size:.9rem;color:var(--text-m);line-height:1.65}
.memory-footer{margin-top:10px;font-size:.8rem;color:var(--text-m)}

.empty-state{text-align:center;padding:60px 20px}
.empty-state h2{font-size:1.6rem;color:var(--green);margin-bottom:10px}
.empty-state p{color:var(--text-m);max-width:360px;margin:0 auto}
.empty-icon{font-size:3rem;margin-bottom:16px}

.loading{text-align:center;padding:40px;color:var(--text-m)}

footer{background:var(--green-d);color:rgba(255,255,255,.7);text-align:center;padding:20px;font-size:.82rem;margin-top:48px}
footer strong{color:#fff}
footer a{color:rgba(255,255,255,.8)}
</style>
<script src="/pwa.js" defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/welcome" class="nav-logo">
      <img src="/little-angels-logo.png" alt="Your Nursery">
    </a>
    <div class="nav-links">
      <a href="/welcome" class="nav-link">Home</a>
      <a href="/welcome/memory-box" class="nav-link active">Memory Box</a>
      <a href="/welcome/planning" class="nav-link">Planning</a>
      <a href="/welcome/phonics" class="nav-link">Phonics</a>
      <a href="/welcome/resources" class="nav-link">Resources</a>
      <a href="/welcome/records" class="nav-link">Records</a>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>💝 Memory Box</h1>
  <p>Special moments and milestones from your child's time at Your Nursery</p>
</div>

<div class="container">
  <div id="child-tabs-wrap" style="display:none" class="child-tabs" id="childTabs"></div>
  <div class="filter-row" id="filterRow"></div>
  <div id="content"><div class="loading">Loading memories…</div></div>
</div>

<footer>
  <strong>Your Nursery</strong> · 1A Example Lane, Ealing, W13 9LU<br>
  Office: 01234 567890 · admissions@example-nursery.co.uk<br>
  Mon–Fri 8:00am–6:00pm · Established 1990
</footer>

<script>
'use strict';
let allEntries = [], allChildren = [], selectedChildId = null, activeFilter = 'all';

const $ = id => document.getElementById(id);
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

const TYPE_LABELS = {
  first_word:'First Word 🗣',first_steps:'First Steps 👣',favourite:'Favourite Thing ❤️',
  drawing:'Drawing 🎨',milestone:'Milestone 🏆',everyday_joy:'Everyday Joy 🌟',general:'Memory 💝'
};

async function init() {
  try {
    const d = await fetch('/api/memory-box').then(r=>r.json());
    allEntries  = d.entries  || [];
    allChildren = d.children || [];
    renderChildTabs();
    renderFilterRow();
    renderTimeline();
  } catch(e) {
    $('content').innerHTML = `<div class="empty-state"><div class="empty-icon">💝</div><h2>Memory Box</h2><p>Could not load memories right now. Please try again later.</p></div>`;
  }
}

function renderChildTabs() {
  if (allChildren.length <= 1) { $('child-tabs-wrap').style.display='none'; return; }
  $('child-tabs-wrap').style.display = 'flex';
  $('child-tabs-wrap').innerHTML =
    `<button class="child-tab active" data-child-id="">All children</button>` +
    allChildren.map(c =>
      `<button class="child-tab" data-child-id="${c.id}">${escH(c.first_name)} ${escH(c.last_name)}</button>`
    ).join('');
}

function renderFilterRow() {
  const types = [...new Set(allEntries.map(e=>e.milestone_type||'general'))];
  $('filterRow').innerHTML =
    `<button class="filter-btn active" data-filter="all">All</button>` +
    types.map(t => {
      const label = TYPE_LABELS[t]||t;
      return `<button class="filter-btn" data-filter="${escH(t)}">${escH(label)}</button>`;
    }).join('');
}

function setChild(id, btn) {
  selectedChildId = id;
  document.querySelectorAll('#child-tabs-wrap .child-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTimeline();
}

function setFilter(type, btn) {
  activeFilter = type;
  document.querySelectorAll('#filterRow .filter-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTimeline();
}

function renderTimeline() {
  let filtered = allEntries;
  if (selectedChildId) filtered = filtered.filter(e=>e.child_id===selectedChildId);
  if (activeFilter !== 'all') filtered = filtered.filter(e=>(e.milestone_type||'general')===activeFilter);

  if (!filtered.length) {
    $('content').innerHTML = `<div class="empty-state"><div class="empty-icon">💝</div><h2>No memories yet</h2><p>Your nursery team will add special moments here as they happen.</p></div>`;
    return;
  }

  $('content').innerHTML = `<div class="timeline">${
    filtered.map(e => {
      const type = e.milestone_type||'general';
      const label = TYPE_LABELS[type]||(type||'Memory');
      const childPill = allChildren.length > 1 && e.child_name
        ? `<span style="font-size:.78rem;color:var(--text-m);font-weight:600">${escH(e.child_name)}</span>`
        : '';
      return `<div class="timeline-item">
        <div class="memory-card">
          <div class="memory-top">
            <span class="memory-badge badge-${escH(type)}">${escH(label)}</span>
            ${childPill}
            <span class="memory-date">${fmtDate(e.happened_on)}</span>
          </div>
          <div class="memory-title">${escH(e.title)}</div>
          ${e.description ? `<div class="memory-desc">${escH(e.description)}</div>` : ''}
          ${e.added_by_name ? `<div class="memory-footer">Recorded by your Your Nursery team</div>` : ''}
        </div>
      </div>`;
    }).join('')
  }</div>`;
}

document.getElementById('child-tabs-wrap').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-child-id]');
  if (!btn) return;
  const val = btn.dataset.childId;
  setChild(val ? parseInt(val) : null, btn);
});
document.getElementById('filterRow').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-filter]');
  if (btn) setFilter(btn.dataset.filter, btn);
});
init();
</script>
</body>
</html>
