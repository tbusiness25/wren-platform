<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Module — Little Angels</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2d5a4a;--green-d:#1e3d31;--green-l:#3d7a64;
  --orange:#f0a050;--orange-d:#d8823a;
  --cream:#fefcf8;--cream-d:#f5f0e8;
  --text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0;
  --blue:#4a9abf;
}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6}
h1,h2,h3,h4{font-family:'Crimson Pro',Georgia,serif}
a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px;display:block}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-link{color:rgba(255,255,255,.8);font-size:.88rem;font-weight:600;padding:6px 12px;border-radius:6px;transition:.15s}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-link.active{color:#fff}
.btn{display:inline-block;padding:10px 22px;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;transition:.15s;border:none;text-decoration:none}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-d)}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:var(--orange-d);color:#fff}
.btn-ghost{background:transparent;color:var(--green);border:1px solid var(--green)}.btn-ghost:hover{background:var(--green);color:#fff}
.container{max-width:860px;margin:0 auto;padding:36px 20px}

/* Header */
.module-header{background:var(--green);color:#fff;padding:48px 20px 36px}
.header-inner{max-width:860px;margin:0 auto}
.header-back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.75);font-size:.85rem;font-weight:600;margin-bottom:16px}
.header-back:hover{color:#fff}
.header-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:800}
.badge-cat{background:rgba(255,255,255,.15);color:#fff}
.badge-age{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
.badge-fmt{background:var(--orange);color:#fff}
.badge-dur{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.header-title{font-size:2rem;line-height:1.25;margin-bottom:10px}
.header-summary{font-size:1rem;opacity:.85;max-width:680px;line-height:1.65}

/* Progress bar (quiz) */
.progress-bar-wrap{background:var(--green-d);padding:10px 20px}
.progress-bar-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:12px}
.progress-label{font-size:.82rem;color:rgba(255,255,255,.8);flex-shrink:0}
.progress-track{flex:1;height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--orange);border-radius:99px;transition:.4s}

/* ── Document renderer ── */
.doc-section{margin-bottom:36px}
.doc-section h2{font-size:1.6rem;color:var(--green);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--cream-d)}
.doc-body{font-size:.96rem;line-height:1.75;color:var(--text)}
.doc-body p{margin-bottom:12px}
.doc-body ul,.doc-body ol{padding-left:24px;margin-bottom:12px}
.doc-body li{margin-bottom:6px}
.doc-body strong{color:var(--green-d)}
.doc-body em{color:var(--text-m)}
.doc-further{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-top:28px}
.doc-further h3{font-size:1.1rem;color:var(--green);margin-bottom:10px}
.doc-further ul{padding-left:20px}
.doc-further li{font-size:.88rem;color:var(--text-m);margin-bottom:6px}
.sources{background:var(--cream-d);border-radius:10px;padding:14px 18px;margin-top:20px}
.sources h4{font-size:.8rem;font-weight:800;text-transform:uppercase;color:var(--text-m);margin-bottom:8px}
.sources ul{padding-left:16px}
.sources li{font-size:.78rem;color:var(--text-m);margin-bottom:4px}

/* ── Infographic renderer ── */
.infographic{display:flex;flex-direction:column;gap:20px}
.info-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 24px;display:flex;gap:18px;align-items:flex-start}
.info-icon{width:52px;height:52px;border-radius:12px;background:var(--cream-d);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.info-content{flex:1;min-width:0}
.info-heading{font-family:'Crimson Pro',Georgia,serif;font-size:1.25rem;color:var(--green);margin-bottom:6px}
.info-body{font-size:.9rem;color:var(--text-m);line-height:1.6}
.stat-callout{display:inline-block;background:var(--orange);color:#fff;font-size:.82rem;font-weight:700;padding:4px 12px;border-radius:8px;margin-top:8px}

/* ── Quiz renderer ── */
.quiz-intro{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:28px;font-size:.96rem;line-height:1.7}
.quiz-intro h2{color:var(--green);margin-bottom:10px}
.question-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:0}
.q-num{font-size:.78rem;font-weight:800;color:var(--text-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.q-text{font-family:'Crimson Pro',Georgia,serif;font-size:1.35rem;color:var(--text);margin-bottom:22px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:12px 18px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600;transition:.15s;color:var(--text);background:#fff}
.option:hover:not(.disabled){background:var(--cream-d);border-color:var(--green-l)}
.option.selected{border-color:var(--blue);background:#e8f4fd}
.option.correct{border-color:#22c55e;background:#f0fdf4;color:#15803d}
.option.wrong{border-color:#ef4444;background:#fef2f2;color:#b91c1c}
.option.disabled{cursor:default}
.explanation{background:var(--cream-d);border-radius:10px;padding:14px 18px;margin-top:16px;font-size:.88rem;line-height:1.6;color:var(--text-m);display:none}
.explanation.visible{display:block}
.explanation strong{color:var(--green)}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
.quiz-score-bar{display:flex;gap:6px;margin:20px 0 0}
.score-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.score-dot.correct{background:#22c55e}
.score-dot.wrong{background:#ef4444}
/* Results */
.results{text-align:center;padding:40px 20px}
.results-score{font-size:3.5rem;font-weight:800;line-height:1;margin-bottom:6px}
.results-label{font-size:1rem;color:var(--text-m);margin-bottom:24px}
.results-pass{color:#15803d}.results-fail{color:#b91c1c}

/* Mixed — tabs */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--cream-d);margin-bottom:24px;overflow-x:auto}
.tab{padding:10px 20px;border:none;background:none;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--text-m);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Key takeaways */
.takeaways{background:#eef6f1;border:1px solid #cfe6da;border-left:4px solid var(--green);border-radius:12px;padding:18px 22px;margin-bottom:30px}
.takeaways h3{font-size:1.15rem;color:var(--green);margin-bottom:10px}
.takeaways ul{padding-left:20px}
.takeaways li{font-size:.92rem;color:var(--text);margin-bottom:7px;line-height:1.55}
/* When to seek help */
.seek-help{background:#fff7ed;border:1px solid #fed7aa;border-left:4px solid var(--orange-d);border-radius:12px;padding:18px 22px;margin:28px 0}
.seek-help h3{font-size:1.15rem;color:var(--orange-d);margin-bottom:10px}
.seek-help ul{padding-left:20px}
.seek-help li{font-size:.92rem;color:var(--text);margin-bottom:8px;line-height:1.6}
.seek-help strong{color:var(--green-d)}
/* Completion check */
.check-intro{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin:28px 0 16px;text-align:center}
.check-intro h3{color:var(--green);font-size:1.3rem;margin-bottom:6px}
.check-intro p{font-size:.92rem;color:var(--text-m)}
/* Reward progress */
.reward-progress{background:#fffaf0;border:1px dashed var(--orange-d);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:.9rem;color:var(--text);line-height:1.5}
.reward-progress.done{background:#f0fdf4;border:1px solid #22c55e;color:#166534}
.reward-remaining{margin-top:8px;font-size:.82rem;color:var(--text-m)}
/* Completion banner */
.completion-banner{background:#f0fdf4;border:2px solid #22c55e;border-radius:14px;padding:24px;text-align:center;margin-top:28px}
.completion-banner h2{color:#15803d;margin-bottom:8px}
.completion-banner p{color:#166534;font-size:.92rem;margin-bottom:16px}

footer{background:var(--green-d);color:rgba(255,255,255,.7);text-align:center;padding:24px 20px;font-size:.82rem;margin-top:48px}
footer strong{color:#fff}

/* Markdown renderer */
.markdown h2{font-size:1.5rem;color:var(--green);margin:24px 0 10px}
.markdown h3{font-size:1.25rem;color:var(--green-d);margin:18px 0 8px}
.markdown p{margin-bottom:12px;line-height:1.75}
.markdown ul,.markdown ol{padding-left:24px;margin-bottom:12px}
.markdown li{margin-bottom:6px;line-height:1.65}
.markdown strong{color:var(--green-d);font-weight:700}
.markdown blockquote{border-left:3px solid var(--orange);padding-left:14px;color:var(--text-m);font-style:italic;margin:14px 0}
</style>
<script src="/pwa.js" defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/welcome" class="nav-logo"><img src="/little-angels-logo.png" alt="Little Angels Day Nursery"></a>
    <div class="nav-links">
      <a href="/welcome" class="nav-link">Home</a>
      <a href="/welcome/study" class="nav-link active">Study</a>
      <a href="/welcome/resources" class="nav-link">Resources</a>
    </div>
  </div>
</nav>

<div id="moduleHeader" class="module-header"></div>
<div id="progressBarWrap" style="display:none" class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <span class="progress-label" id="progressLabel">Question 1 of 10</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>
</div>

<div class="container" id="moduleContent"></div>

<footer>
  <strong>Little Angels Day Nursery</strong><br>
  1A Dudley Gardens, Ealing, W13 9LU | Office: 020 8051 0349<br>
  Mon–Fri 8:00am–6:00pm | <a href="mailto:admissions@littleangelsealing.co.uk" style="color:rgba(255,255,255,.8)">admissions@littleangelsealing.co.uk</a>
</footer>

<script>
const FORMAT_ICONS = {quiz:'🧩',document:'📄',infographic:'📊',mixed:'✨'};
const FORMAT_LABELS = {quiz:'Quiz',document:'Article',infographic:'Visual guide',mixed:'Full module'};
const AGE_LABELS = {baby:'0–2 years',toddler:'1–3 years',preschool:'2–5 years',all:'All ages'};
const CATEGORY_LABELS = {
  school_readiness:'School Readiness',behaviour:'Behaviour',home_learning:'Home Learning',
  phonics:'Phonics',nutrition:'Nutrition',health:'Health',
  safeguarding_at_home:'Safeguarding',development_milestones:'Development',
  wellbeing:'Wellbeing',transitions:'Transitions'
};

const slug = location.pathname.split('/study/')[1]?.replace(/\/$/, '');
let module = null, attemptId = null, startTime = Date.now();
let quizState = { current: 0, answers: [], score: 0 };

function md(text) {
  if (!text) return '';
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hublp])/gm, '<p>')
    .replace(/<p><\/p>/g, '')
    + '</p>';
}

async function init() {
  if (!slug) { location.href = '/welcome/study'; return; }
  const res = await fetch('/api/study/modules/' + slug);
  if (!res.ok) { document.getElementById('moduleContent').innerHTML = '<p>Module not found.</p>'; return; }
  module = await res.json();
  renderHeader();
  await startAttempt();
  renderContent();
}

function renderHeader() {
  document.title = module.title + ' — Little Angels';
  document.getElementById('moduleHeader').innerHTML = `
    <div class="header-inner">
      <a href="/welcome/study" class="header-back">← Back to all modules</a>
      <div class="header-meta">
        <span class="badge badge-cat">${CATEGORY_LABELS[module.category]||module.category}</span>
        <span class="badge badge-age">${AGE_LABELS[module.age_group]||module.age_group}</span>
        <span class="badge badge-fmt">${FORMAT_LABELS[module.format]||module.format}</span>
        ${module.duration_minutes?`<span class="badge badge-dur">${module.duration_minutes} min</span>`:''}
      </div>
      <h1 class="header-title">${module.title}</h1>
      ${module.summary?`<p class="header-summary">${module.summary}</p>`:''}
    </div>`;
}

async function startAttempt() {
  try {
    const r = await fetch('/api/study/attempt/start', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ module_id: module.id })
    });
    if (r.ok) { const d = await r.json(); attemptId = d.attempt_id; }
  } catch(_) {}
  startTime = Date.now();
}

async function completeAttempt(score, answers) {
  await completeAttemptReturning(score, answers);
}

async function completeAttemptReturning(score, answers) {
  const minutes = Math.round((Date.now() - startTime) / 60000) || 1;
  try {
    const r = await fetch('/api/study/attempt/complete', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ attempt_id: attemptId, score, answers, time_spent_minutes: minutes })
    });
    if (r.ok) return await r.json();
  } catch(_) {}
  return null;
}

async function loadRewardProgress() {
  try {
    const r = await fetch('/api/study/reward-progress');
    if (!r.ok) return;
    const p = await r.json();
    const box = document.getElementById('rewardProgressBox');
    if (!box) return;
    const pence = p.amount_pence || 5000;
    const pounds = '£' + Math.round(pence/100);
    if (p.all_done) {
      box.style.display = '';
      box.innerHTML = `<div class="reward-progress done">
        🎉 <strong>All guides complete!</strong> A <strong>${pounds} credit</strong> off your next invoice has been requested and is awaiting manager approval. We'll be in touch.</div>`;
    } else if (p.total) {
      box.style.display = '';
      box.innerHTML = `<div class="reward-progress">
        <strong>${pounds} reward progress:</strong> ${p.completed} of ${p.total} guides complete.
        Finish them all to earn a ${pounds} credit off your next invoice.
        ${p.remaining.length?`<div class="reward-remaining">Still to do: ${p.remaining.map(x=>esc(x.title)).join(' · ')}</div>`:''}</div>`;
    }
  } catch(_) {}
}

// ── Renderers ─────────────────────────────────────────────────────────────────

function renderContent() {
  const c = module.content_json;
  const el = document.getElementById('moduleContent');
  if (!c) { el.innerHTML = '<p style="color:#888">Content coming soon.</p>'; return; }

  switch(module.format) {
    case 'document':     renderDocument(c, el); break;
    case 'infographic':  renderInfographic(c, el); break;
    case 'quiz':         renderQuiz(c, el); break;
    case 'mixed':        renderMixed(c, el); break;
    default:             el.innerHTML = '<pre style="white-space:pre-wrap;font-size:.85rem">' + JSON.stringify(c,null,2) + '</pre>';
  }
}

function esc(t){ return (t==null?'':String(t)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderDocument(c, el) {
  const takeaways = c.key_takeaways?.length ? `
    <div class="takeaways">
      <h3>Key takeaways</h3>
      <ul>${c.key_takeaways.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
    </div>` : '';

  const sections = (c.sections||[]).map(s => `
    <div class="doc-section">
      <h2>${s.heading||''}</h2>
      <div class="doc-body markdown">${md(s.body_markdown||s.body||'')}</div>
    </div>`).join('');

  const seekHelp = c.when_to_seek_help?.length ? `
    <div class="seek-help">
      <h3>When to seek help</h3>
      <ul>${c.when_to_seek_help.map(s=>`<li>${md(s).replace(/^<p>|<\/p>$/g,'')}</li>`).join('')}</ul>
    </div>` : '';

  const further = c.further_reading?.length ? `
    <div class="doc-further">
      <h3>Further reading</h3>
      <ul>${c.further_reading.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
    </div>` : '';

  const sources = c.sources?.length ? `
    <div class="sources">
      <h4>Sources</h4>
      <ul>${c.sources.map(s=>`<li>${esc(s)}</li>`).join('')}</ul>
    </div>` : '';

  // If the guide has a completion_check, the "Mark complete" button is gated
  // behind passing it. Otherwise show the simple completion banner.
  const hasCheck = Array.isArray(c.completion_check) && c.completion_check.length;
  el.innerHTML = takeaways + sections + seekHelp + further + sources +
                 (hasCheck ? `<div id="completionCheck"></div>` : completionBannerHtml());

  if (hasCheck) renderCompletionCheck(c.completion_check, c.passing_score || 60);
  else el.querySelector('.btn-complete')?.addEventListener('click', () => markDocComplete());
}

// Short "completion check" quiz embedded at the end of a document guide.
let checkState = { current: 0, answers: [], score: 0 };
function renderCompletionCheck(questions, passing) {
  checkState = { current: 0, answers: new Array(questions.length).fill(null), score: 0 };
  const wrap = document.getElementById('completionCheck');
  wrap.innerHTML = `
    <div class="check-intro">
      <h3>Quick completion check</h3>
      <p>A few short questions to wrap up. Answer them to mark this guide complete and progress toward your £50 reward.</p>
    </div>
    <div id="checkArea"></div>`;
  renderCheckQuestion(questions, passing);
}

function renderCheckQuestion(questions, passing) {
  const i = checkState.current;
  if (i >= questions.length) return showCheckResults(questions, passing);
  const q = questions[i];
  const total = questions.length;
  const answered = checkState.answers[i] !== null;
  const selected = checkState.answers[i];
  document.getElementById('checkArea').innerHTML = `
    <div class="question-card">
      <div class="q-num">Question ${i+1} of ${total}</div>
      <div class="q-text">${esc(q.question)}</div>
      <div class="options">
        ${(q.options||[]).map((opt,j)=>{
          let cls='option';
          if(answered){ cls+=' disabled'; if(j===q.correct_index) cls+=' correct'; else if(j===selected) cls+=' wrong'; }
          else if(j===selected) cls+=' selected';
          return `<div class="${cls}" data-idx="${j}">${esc(opt)}</div>`;
        }).join('')}
      </div>
      <div class="explanation${answered?' visible':''}"><strong>Explanation:</strong> ${esc(q.explanation||'')}</div>
      <div class="quiz-nav">
        <span style="font-size:.85rem;color:var(--text-m)">${answered?'':'Choose an answer'}</span>
        ${answered ? `<button class="btn btn-green" id="btnCheckNext">${i===total-1?'Finish':'Next →'}</button>` : ''}
      </div>
    </div>`;
  if (!answered) {
    document.querySelectorAll('#checkArea .option').forEach(opt=>{
      opt.addEventListener('click', ()=>{
        checkState.answers[i]=parseInt(opt.dataset.idx);
        if(parseInt(opt.dataset.idx)===q.correct_index) checkState.score++;
        renderCheckQuestion(questions, passing);
      });
    });
  } else {
    document.getElementById('btnCheckNext')?.addEventListener('click', ()=>{
      checkState.current++; renderCheckQuestion(questions, passing);
    });
  }
}

async function showCheckResults(questions, passing) {
  const pct = Math.round(checkState.score / questions.length * 100);
  const pass = pct >= passing;
  document.getElementById('checkArea').innerHTML = `
    <div class="results">
      <div class="results-score ${pass?'results-pass':'results-fail'}">${pct}%</div>
      <div class="results-label">${checkState.score} of ${questions.length} correct${pass?' — guide complete!':' — have another go to finish.'}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px">
        ${!pass?`<button class="btn btn-ghost" id="btnCheckRetake">Try again</button>`:''}
      </div>
    </div>`;
  if (pass) {
    const r = await completeAttemptReturning(pct, checkState.answers);
    showCompletionBannerWithReward(r && r.credit_earned);
  } else {
    document.getElementById('btnCheckRetake')?.addEventListener('click', ()=>{
      renderCompletionCheck(questions, passing);
    });
  }
}

function showCompletionBannerWithReward(creditEarned) {
  const wrap = document.getElementById('completionCheck');
  const banner = document.createElement('div');
  banner.innerHTML = completionBannerHtml(creditEarned);
  wrap.appendChild(banner);
  wrap.querySelector('.btn-complete')?.addEventListener('click', ()=> showRewardScreen());
  loadRewardProgress();
}

async function markDocComplete() {
  await completeAttempt(100, null);
  showRewardScreen();
}

function renderInfographic(c, el) {
  const sections = (c.sections||[]).map(s => `
    <div class="info-section">
      <div class="info-icon">${iconForSuggestion(s.icon_suggestion)}</div>
      <div class="info-content">
        <div class="info-heading">${s.heading||''}</div>
        <div class="info-body">${s.body||''}</div>
        ${s.stat_callout?`<span class="stat-callout">${s.stat_callout}</span>`:''}
      </div>
    </div>`).join('');

  const sources = c.sources?.length ? `
    <div class="sources" style="margin-top:28px">
      <h4>Sources</h4>
      <ul>${c.sources.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>` : '';

  el.innerHTML = `<div class="infographic">${sections}</div>${sources}${completionBannerHtml()}`;
  el.querySelector('.btn-complete')?.addEventListener('click', () => markDocComplete());
}

function renderQuiz(c, el) {
  document.getElementById('progressBarWrap').style.display = '';
  const questions = c.questions || [];
  quizState = { current: 0, answers: new Array(questions.length).fill(null), score: 0 };

  el.innerHTML = `
    ${c.intro ? `<div class="quiz-intro"><h2>About this module</h2><p>${c.intro}</p></div>` : ''}
    <div id="quizArea"></div>`;

  renderQuestion(questions);
}

function renderQuestion(questions) {
  const i = quizState.current;
  if (i >= questions.length) { showQuizResults(questions); return; }
  const q = questions[i];
  const total = questions.length;

  document.getElementById('progressLabel').textContent = `Question ${i+1} of ${total}`;
  document.getElementById('progressFill').style.width = ((i+1)/total*100)+'%';

  const answered = quizState.answers[i] !== null;
  const selected  = quizState.answers[i];

  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-num">Question ${i+1} of ${total}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">
        ${(q.options||[]).map((opt,j)=>{
          let cls = 'option';
          if(answered){ cls+=' disabled'; if(j===q.correct_index) cls+=' correct'; else if(j===selected) cls+=' wrong'; }
          else if(j===selected) cls+=' selected';
          return `<div class="${cls}" data-idx="${j}">${opt}</div>`;
        }).join('')}
      </div>
      <div class="explanation${answered?' visible':''}" id="explanation">
        <strong>Explanation:</strong> ${q.explanation||''}
      </div>
      <div class="quiz-score-bar">
        ${quizState.answers.map((a,k)=>{
          if(a===null) return '<div class="score-dot"></div>';
          return `<div class="score-dot ${a===questions[k].correct_index?'correct':'wrong'}"></div>`;
        }).join('')}
      </div>
      <div class="quiz-nav">
        <span style="font-size:.85rem;color:var(--text-m)">${answered?'Click Next to continue':''}</span>
        ${answered ? `<button class="btn btn-green" id="btnNext">${i===total-1?'See results':'Next →'}</button>` : ''}
      </div>
    </div>`;

  if (!answered) {
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => selectAnswer(parseInt(opt.dataset.idx), q, questions));
    });
  } else {
    document.getElementById('btnNext')?.addEventListener('click', () => {
      quizState.current++;
      renderQuestion(questions);
    });
  }
}

function selectAnswer(idx, q, questions) {
  quizState.answers[quizState.current] = idx;
  if (idx === q.correct_index) quizState.score++;
  renderQuestion(questions);
}

async function showQuizResults(questions) {
  document.getElementById('progressBarWrap').style.display='none';
  const pct = Math.round(quizState.score / questions.length * 100);
  const pass = pct >= (module.content_json.passing_score||70);
  await completeAttempt(pct, quizState.answers);

  document.getElementById('quizArea').innerHTML = `
    <div class="results">
      <div class="results-score ${pass?'results-pass':'results-fail'}">${pct}%</div>
      <div class="results-label">${quizState.score} of ${questions.length} correct${pass?' — well done!':' — have another go!'}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${pass?`<button class="btn btn-orange" data-action="show-reward">Claim your reward →</button>`:''}
        <button class="btn btn-ghost" data-action="retake-quiz">Retake quiz</button>
      </div>
    </div>
    <div style="margin-top:32px">
      <h3 style="font-family:'Crimson Pro',serif;font-size:1.3rem;color:var(--green);margin-bottom:16px">Question review</h3>
      ${questions.map((q,i)=>{
        const ans = quizState.answers[i];
        const correct = ans === q.correct_index;
        return `<div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;border-left:4px solid ${correct?'#22c55e':'#ef4444'}">
          <div style="font-weight:700;margin-bottom:8px">${q.question}</div>
          <div style="font-size:.88rem;color:var(--text-m);margin-bottom:6px">Your answer: <strong>${q.options?.[ans]??'—'}</strong></div>
          ${!correct?`<div style="font-size:.88rem;color:#15803d;margin-bottom:6px">Correct: <strong>${q.options?.[q.correct_index]}</strong></div>`:''}
          <div style="font-size:.85rem;color:var(--text-m);background:var(--cream-d);padding:10px;border-radius:8px">${q.explanation||''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function retakeQuiz() {
  quizState = { current: 0, answers: new Array(module.content_json.questions.length).fill(null), score: 0 };
  document.getElementById('progressBarWrap').style.display='';
  renderQuestion(module.content_json.questions);
}

function renderMixed(c, el) {
  const sections = c.sections || [];
  if (!sections.length) { el.innerHTML = '<p>No content yet.</p>'; return; }

  const tabs = sections.map((s,i)=>{
    const label = s.type==='quiz'?'Quiz':s.type==='infographic'?'Visual guide':s.title||s.heading||`Part ${i+1}`;
    return `<button class="tab${i===0?' active':''}" data-tab="${i}">${label}</button>`;
  }).join('');

  const panels = sections.map((s,i)=>`
    <div class="tab-panel${i===0?' active':''}" id="tab-panel-${i}"></div>`).join('');

  el.innerHTML = `<div class="tab-bar">${tabs}</div>${panels}`;

  el.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      el.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      el.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-panel-'+tab.dataset.tab).classList.add('active');
    });
  });

  sections.forEach((s,i)=>{
    const panel = document.getElementById('tab-panel-'+i);
    if (s.type==='quiz')         renderQuizSection(s, panel);
    else if (s.type==='infographic') renderInfographic(s, panel);
    else                         renderDocument(s, panel);
  });
}

function renderQuizSection(s, el) {
  // Inline quiz within mixed
  const fakeModule = { content_json: s };
  const savedModule = module;
  module = fakeModule;
  renderQuiz(s, el);
  module = savedModule;
}

function completionBannerHtml(creditEarned) {
  return `
    <div class="completion-banner">
      <h2>${creditEarned ? 'Guide complete — and that was the last one! 🎉' : 'Guide complete! 🎉'}</h2>
      <p>${creditEarned
          ? 'You have now finished all the guides. A £50 credit toward your next invoice has been requested and is awaiting manager approval.'
          : 'Well done. Choose a keepsake reward — a printable sticker sheet, home activity card, book recommendations, or a named certificate for your child.'}</p>
      <div id="rewardProgressBox" style="display:none"></div>
      <button class="btn btn-orange btn-complete">Choose your keepsake reward →</button>
    </div>`;
}

function showRewardScreen() {
  location.href = `/welcome/study/${slug}/completed`;
}

function iconForSuggestion(s) {
  if (!s) return '📌';
  const map = { 'speech bubble':'💬','star':'⭐','heart':'❤️','book':'📚','brain':'🧠','family':'👨‍👩‍👧','child':'👶','food':'🍎','sleep':'😴','play':'🎮','school':'🏫','check':'✅','idea':'💡','warning':'⚠️','question':'❓','pencil':'✏️','clock':'⏰' };
  const sl = s.toLowerCase();
  for (const [key,val] of Object.entries(map)) { if (sl.includes(key)) return val; }
  return '📌';
}

// Delegation for quiz result buttons.
// NOTE: #quizArea is created dynamically (quiz/mixed formats only), so it does
// NOT exist at page load. Binding the listener to getElementById('quizArea')
// here threw "Cannot read properties of null" on EVERY module, crashing the
// script before init() ran — leaving the page blank for all formats. Delegate
// from document instead so the page always renders and quiz buttons still work.
document.addEventListener('click', function(e) {
  if (!e.target.closest('#quizArea')) return;
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'show-reward') showRewardScreen();
  else if (btn.dataset.action === 'retake-quiz') retakeQuiz();
});
init();
</script>
</body>
</html>
