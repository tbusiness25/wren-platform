<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reward Wallet — Little Angels</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d5a4a;--green-d:#1e3d31;--orange:#f0a050;--orange-d:#d8823a;--cream:#fefcf8;--cream-d:#f5f0e8;--text:#2a2a2a;--text-m:#5a5a5a;--border:#e8e0d0;--blue:#4a9abf;}
body{font-family:'Nunito',system-ui,Arial,sans-serif;background:var(--cream);color:var(--text);line-height:1.6}
h1,h2,h3{font-family:'Crimson Pro',Georgia,serif}
a{color:var(--green);text-decoration:none}
.nav{background:var(--green);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px}
.nav-logo img{height:40px;display:block}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-link{color:rgba(255,255,255,.8);font-size:.88rem;font-weight:600;padding:6px 12px;border-radius:6px;transition:.15s}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.btn{display:inline-block;padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;border:none;text-decoration:none}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-d)}
.hero{background:var(--green);color:#fff;padding:52px 20px 32px;text-align:center}
.hero h1{font-size:2rem;margin-bottom:8px}
.hero p{font-size:.95rem;opacity:.85;max-width:500px;margin:0 auto}
.container{max-width:860px;margin:0 auto;padding:36px 20px}
.rewards-list{display:flex;flex-direction:column;gap:14px}
.reward-row{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:16px}
.reward-icon-box{width:48px;height:48px;border-radius:10px;background:var(--cream-d);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.reward-info{flex:1;min-width:0}
.reward-title{font-weight:700;font-size:.95rem;color:var(--text)}
.reward-meta{font-size:.8rem;color:var(--text-m);margin-top:2px}
.reward-date{font-size:.78rem;color:var(--text-m)}
.download-btn{padding:8px 16px;border-radius:8px;background:var(--green);color:#fff;border:none;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit}
.download-btn:hover{background:var(--green-d)}
.empty{text-align:center;padding:60px 20px;color:var(--text-m)}
.empty h3{font-size:1.4rem;margin-bottom:8px}
footer{background:var(--green-d);color:rgba(255,255,255,.7);text-align:center;padding:24px 20px;font-size:.82rem;margin-top:48px}
footer strong{color:#fff}
</style>
<script src="/pwa.js" defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/welcome" class="nav-logo"><img src="/little-angels-logo.png" alt="Little Angels Day Nursery"></a>
    <div class="nav-links">
      <a href="/welcome" class="nav-link">Home</a>
      <a href="/welcome/study" class="nav-link">Study</a>
    </div>
  </div>
</nav>

<div class="hero">
  <h1>My Reward Wallet 🏆</h1>
  <p>All your earned rewards in one place. Download any reward again at any time.</p>
</div>

<div class="container">
  <div id="rewardsList"></div>
</div>

<footer>
  <strong>Little Angels Day Nursery</strong><br>
  1A Dudley Gardens, Ealing, W13 9LU | Office: 020 8051 0349<br>
  Mon–Fri 8:00am–6:00pm | <a href="mailto:admissions@littleangelsealing.co.uk" style="color:rgba(255,255,255,.8)">admissions@littleangelsealing.co.uk</a>
</footer>

<script>
const REWARD_ICONS = {sticker:'⭐',activity_voucher:'🎨',book_recommendation:'📚',certificate:'🏆'};
const REWARD_LABELS = {sticker:'Sticker Sheet',activity_voucher:'Home Activity Card',book_recommendation:'Book Recommendations',certificate:'Certificate'};
const CATEGORY_LABELS = {school_readiness:'School Readiness',behaviour:'Behaviour',home_learning:'Home Learning',phonics:'Phonics',nutrition:'Nutrition',health:'Health',safeguarding_at_home:'Safeguarding',development_milestones:'Development',wellbeing:'Wellbeing',transitions:'Transitions'};

async function init() {
  const res = await fetch('/api/study/reward/mine');
  const rewards = res.ok ? await res.json() : [];
  const el = document.getElementById('rewardsList');

  if (!rewards.length) {
    el.innerHTML = '<div class="empty"><h3>No rewards yet</h3><p>Complete a learning module to earn your first reward.</p><a href="/welcome/study" class="btn btn-green" style="margin-top:16px;display:inline-block">Browse modules →</a></div>';
    return;
  }

  el.innerHTML = '<div class="rewards-list">' + rewards.map(r => `
    <div class="reward-row">
      <div class="reward-icon-box">${REWARD_ICONS[r.reward_type]||'🎁'}</div>
      <div class="reward-info">
        <div class="reward-title">${REWARD_LABELS[r.reward_type]||r.reward_type}</div>
        <div class="reward-meta">${r.module_title||''} · ${CATEGORY_LABELS[r.category]||r.category||''}</div>
        <div class="reward-date">Earned ${new Date(r.earned_at).toLocaleDateString('en-GB')}</div>
      </div>
      <button class="download-btn" data-action="download-reward" data-id="${r.id}">Download PDF</button>
    </div>`).join('') + '</div>';
}

function download(id) {
  window.open('/api/study/reward/' + id + '/pdf', '_blank');
}

document.getElementById('rewardsList').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="download-reward"]');
  if (btn) download(parseInt(btn.dataset.id));
});
init();
</script>
</body>
</html>
