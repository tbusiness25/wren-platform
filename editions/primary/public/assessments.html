<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="primary">
  <title>Assessments — Wren Primary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .grade-wts { background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:4px;font-weight:600;font-size:12px; }
    .grade-exs { background:#dcfce7;color:#166534;padding:2px 8px;border-radius:4px;font-weight:600;font-size:12px; }
    .grade-gds { background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:4px;font-weight:600;font-size:12px; }
    .grade-num { background:#f3e8ff;color:#581c87;padding:2px 8px;border-radius:4px;font-weight:600;font-size:12px; }
    .markbook-table td { padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle; }
    .markbook-table th { padding:6px 10px;background:var(--surface);font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase; }
  </style>
</head>
<body>

<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Assessments</div>
      <div class="page-subtitle">Primary markbook</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-primary" onclick="openNewAssessment()">+ Record Assessment</button>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border)">
    <button class="tab-btn active" id="tab-formative" onclick="showTab('formative')">Formative</button>
    <button class="tab-btn" id="tab-phonics" onclick="showTab('phonics')">Phonics Check</button>
    <button class="tab-btn" id="tab-sats" onclick="showTab('sats')">SATs / Summative</button>
    <button class="tab-btn" id="tab-overview" onclick="showTab('overview')">Class Overview</button>
  </div>

  <!-- Filters -->
  <div class="filter-bar" style="margin-bottom:16px">
    <select class="form-control" id="filter-class" onchange="loadAssessments()" style="width:150px">
      <option value="">All Classes</option>
    </select>
    <select class="form-control" id="filter-year" onchange="loadAssessments()" style="width:150px">
      <option value="">All Years</option>
      <option value="R">Reception</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
      <option value="5">Year 5</option>
      <option value="6">Year 6</option>
    </select>
    <select class="form-control" id="filter-subject" onchange="loadAssessments()" style="width:150px">
      <option value="">All Subjects</option>
      <option value="English">English</option>
      <option value="Maths">Maths</option>
      <option value="Science">Science</option>
      <option value="Reading">Reading</option>
      <option value="Writing">Writing</option>
      <option value="SPaG">SPaG</option>
      <option value="Phonics">Phonics</option>
    </select>
    <select class="form-control" id="filter-term" onchange="loadAssessments()" style="width:140px">
      <option value="">All Terms</option>
      <option value="Autumn 1">Autumn 1</option>
      <option value="Autumn 2">Autumn 2</option>
      <option value="Spring 1">Spring 1</option>
      <option value="Spring 2">Spring 2</option>
      <option value="Summer 1">Summer 1</option>
      <option value="Summer 2">Summer 2</option>
    </select>
    <select class="form-control" id="filter-ay" onchange="loadAssessments()" style="width:140px">
      <option value="2025-2026">2025–2026</option>
      <option value="2024-2025">2024–2025</option>
    </select>
  </div>

  <!-- Panes -->
  <div id="pane-formative">
    <div id="formative-area"><div class="loading-state"><div class="spinner"></div><span>Loading...</span></div></div>
  </div>
  <div id="pane-phonics" style="display:none">
    <div id="phonics-area"><div class="empty-state">Filter by Year 1 and load</div></div>
  </div>
  <div id="pane-sats" style="display:none">
    <div id="sats-area"><div class="empty-state">SATs data for Year 2 and Year 6</div></div>
  </div>
  <div id="pane-overview" style="display:none">
    <div id="overview-area"><div class="loading-state"><div class="spinner"></div><span>Loading...</span></div></div>
  </div>
</div>

<!-- New Assessment Modal -->
<div id="assess-modal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title">Record Assessment</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Class / Year Group</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <select class="form-control" id="new-class-sel" onchange="loadClassPupils()">
            <option value="">Select class...</option>
          </select>
          <select class="form-control" id="new-year-sel">
            <option value="">All years in class</option>
            <option value="R">Reception</option>
            <option value="1">Year 1</option><option value="2">Year 2</option>
            <option value="3">Year 3</option><option value="4">Year 4</option>
            <option value="5">Year 5</option><option value="6">Year 6</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Pupil</label>
        <select class="form-control" id="new-child-id">
          <option value="">Select pupil...</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Subject *</label>
          <select class="form-control" id="new-subject">
            <option value="English">English</option>
            <option value="Reading">Reading</option>
            <option value="Writing">Writing</option>
            <option value="SPaG">SPaG</option>
            <option value="Maths">Maths</option>
            <option value="Science">Science</option>
            <option value="Phonics">Phonics</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Assessment Type</label>
          <select class="form-control" id="new-type">
            <option value="formative">Formative</option>
            <option value="phonics_check">Phonics Check</option>
            <option value="sats_ks1">SATs KS1</option>
            <option value="sats_ks2">SATs KS2</option>
            <option value="summative">Summative</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Grade / Score *</label>
          <select class="form-control" id="new-grade-sel" onchange="syncGrade()">
            <option value="">WTS / EXS / GDS or score...</option>
            <option value="WTS">WTS — Working Towards Standard</option>
            <option value="EXS">EXS — Expected Standard</option>
            <option value="GDS">GDS — Greater Depth Standard</option>
            <option value="custom">Enter score...</option>
          </select>
          <input class="form-control" id="new-grade-custom" placeholder="e.g. 67" style="margin-top:4px;display:none">
        </div>
        <div class="form-group">
          <label class="form-label">Term</label>
          <select class="form-control" id="new-term">
            <option value="Autumn 1">Autumn 1</option>
            <option value="Autumn 2">Autumn 2</option>
            <option value="Spring 1">Spring 1</option>
            <option value="Spring 2">Spring 2</option>
            <option value="Summer 1">Summer 1</option>
            <option value="Summer 2">Summer 2</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-control" id="new-notes" rows="2" placeholder="Optional comments..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAssessment()">Save Assessment</button>
    </div>
  </div>
</div>

<script>
let allAssessments = [];
let allChildren = [];
let currentTab = 'formative';

document.addEventListener('wren:ready', init);

async function init() {
  await loadChildren();
  await loadAssessments();
}

async function loadChildren() {
  try {
    allChildren = await Wren.api('/api/children');
    const classes = [...new Set(allChildren.map(c => c.class_group).filter(Boolean))].sort();
    ['filter-class','new-class-sel'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const extra = id === 'filter-class' ? '<option value="">All Classes</option>' : '<option value="">Select class...</option>';
      sel.innerHTML = extra + classes.map(c => `<option value="${c}">${c}</option>`).join('');
    });
  } catch(e) {}
}

async function loadAssessments() {
  const cls = document.getElementById('filter-class').value;
  const yr = document.getElementById('filter-year').value;
  const subj = document.getElementById('filter-subject').value;
  const term = document.getElementById('filter-term').value;
  const ay = document.getElementById('filter-ay').value;
  try {
    let url = '/api/assessments-primary?';
    if (cls) url += 'class_group=' + encodeURIComponent(cls) + '&';
    if (subj) url += 'subject=' + encodeURIComponent(subj) + '&';
    if (term) url += 'term=' + encodeURIComponent(term) + '&';
    if (ay) url += 'academic_year=' + encodeURIComponent(ay) + '&';
    allAssessments = await Wren.api(url);
    renderCurrentTab();
  } catch(e) {
    document.getElementById('formative-area').innerHTML = '<div class="empty-state">Failed to load assessments</div>';
  }
}

function renderCurrentTab() {
  if (currentTab === 'formative') renderFormative();
  else if (currentTab === 'phonics') renderPhonics();
  else if (currentTab === 'sats') renderSATs();
  else if (currentTab === 'overview') renderOverview();
}

function showTab(tab) {
  currentTab = tab;
  ['formative','phonics','sats','overview'].forEach(t => {
    document.getElementById('pane-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  renderCurrentTab();
}

function gradeTag(grade) {
  if (!grade) return '—';
  if (grade === 'WTS') return '<span class="grade-wts">WTS</span>';
  if (grade === 'EXS') return '<span class="grade-exs">EXS</span>';
  if (grade === 'GDS') return '<span class="grade-gds">GDS</span>';
  return '<span class="grade-num">' + grade + '</span>';
}

function renderFormative() {
  const data = allAssessments.filter(a => a.assessment_type === 'formative' || a.assessment_type === 'summative');
  const area = document.getElementById('formative-area');
  if (!data.length) { area.innerHTML = '<div class="empty-state">No formative assessments found</div>'; return; }
  area.innerHTML = tableHTML(data);
}

function renderPhonics() {
  const data = allAssessments.filter(a => a.assessment_type === 'phonics_check' || a.subject === 'Phonics');
  const area = document.getElementById('phonics-area');
  if (!data.length) { area.innerHTML = '<div class="empty-state">No phonics check data found. Record assessments with type "Phonics Check".</div>'; return; }
  // Phonics check: pass = 32+, total = 40
  area.innerHTML = '<div style="margin-bottom:12px;padding:12px;background:#f0fdf4;border-radius:8px;font-size:13px"><strong>Year 1 Phonics Screening Check</strong>: Pass threshold = 32/40. Year 2 pupils may have retake data.</div>' +
    tableHTML(data, true);
}

function renderSATs() {
  const data = allAssessments.filter(a => a.assessment_type && a.assessment_type.startsWith('sats'));
  const area = document.getElementById('sats-area');
  if (!data.length) { area.innerHTML = '<div class="empty-state">No SATs data found. Record assessments with type "SATs KS1" or "SATs KS2".</div>'; return; }
  area.innerHTML = tableHTML(data);
}

function renderOverview() {
  // Pivot: pupil vs subject, latest grade
  const area = document.getElementById('overview-area');
  if (!allAssessments.length) { area.innerHTML = '<div class="empty-state">No assessment data</div>'; return; }
  const subjects = [...new Set(allAssessments.map(a => a.subject))].sort();
  const pupils = {};
  allAssessments.forEach(a => {
    const key = a.child_id;
    if (!pupils[key]) pupils[key] = { first_name: a.first_name, last_name: a.last_name, class_group: a.class_group, year_group: a.year_group, grades: {} };
    // Keep latest per subject (API returns sorted by name/subject, take last seen)
    pupils[key].grades[a.subject] = a.grade;
  });
  const rows = Object.values(pupils).sort((a,b) => a.last_name.localeCompare(b.last_name));
  let html = '<div class="table-wrapper"><table class="data-table markbook-table"><thead><tr><th>Name</th><th>Class</th>' +
    subjects.map(s => `<th>${s}</th>`).join('') + '</tr></thead><tbody>' +
    rows.map(p => `<tr><td><strong>${p.first_name} ${p.last_name}</strong></td><td>${p.class_group||'—'}</td>` +
      subjects.map(s => `<td>${gradeTag(p.grades[s])}</td>`).join('') + '</tr>').join('') +
    '</tbody></table></div>';
  area.innerHTML = html;
}

function tableHTML(data, phonics) {
  return '<div class="table-wrapper"><table class="data-table markbook-table"><thead><tr>' +
    '<th>Name</th><th>Class</th><th>Year</th><th>Subject</th><th>Term</th><th>Grade</th><th>Type</th><th>Assessed By</th><th></th>' +
    '</tr></thead><tbody>' +
    data.map(a => `<tr>
      <td><strong>${a.first_name} ${a.last_name}</strong></td>
      <td>${a.class_group||'—'}</td>
      <td>${a.year_group||'—'}</td>
      <td>${a.subject}</td>
      <td>${a.term||'—'}</td>
      <td>${gradeTag(a.grade)}${phonics&&parseInt(a.grade)>=32?'<span class="badge badge-green" style="margin-left:4px">Pass</span>':''}</td>
      <td style="font-size:12px;color:var(--text-muted)">${a.assessment_type||'—'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${a.assessed_by_name||'—'}</td>
      <td><button class="btn btn-secondary" style="padding:2px 8px;font-size:12px" onclick="editAssessment(${a.id},'${a.grade}','${a.notes||''}')">Edit</button></td>
    </tr>`).join('') +
    '</tbody></table></div>';
}

function loadClassPupils() {
  const cls = document.getElementById('new-class-sel').value;
  const sel = document.getElementById('new-child-id');
  const filtered = cls ? allChildren.filter(c => c.class_group === cls) : allChildren;
  sel.innerHTML = '<option value="">— whole class —</option>' +
    filtered.sort((a,b) => a.last_name.localeCompare(b.last_name))
      .map(c => `<option value="${c.id}">${c.last_name}, ${c.first_name}</option>`).join('');
}

function syncGrade() {
  const sel = document.getElementById('new-grade-sel').value;
  document.getElementById('new-grade-custom').style.display = sel === 'custom' ? 'block' : 'none';
}

function openNewAssessment() {
  document.getElementById('assess-modal').style.display = 'flex';
  loadClassPupils();
}

function closeModal() { document.getElementById('assess-modal').style.display = 'none'; }

async function saveAssessment() {
  const gradeSel = document.getElementById('new-grade-sel').value;
  const grade = gradeSel === 'custom' ? document.getElementById('new-grade-custom').value.trim() : gradeSel;
  const childId = document.getElementById('new-child-id').value;
  if (!childId) { alert('Select a pupil'); return; }
  if (!grade) { alert('Grade/score required'); return; }
  const body = {
    child_id: parseInt(childId),
    subject: document.getElementById('new-subject').value,
    grade,
    assessment_type: document.getElementById('new-type').value,
    term: document.getElementById('new-term').value,
    notes: document.getElementById('new-notes').value.trim() || null,
    academic_year: document.getElementById('filter-ay').value || '2025-2026'
  };
  try {
    await Wren.api('/api/assessments-primary', { method: 'POST', body });
    closeModal();
    loadAssessments();
  } catch(e) { alert('Error: ' + e.message); }
}

async function editAssessment(id, currentGrade, currentNotes) {
  const grade = prompt('New grade (WTS/EXS/GDS or score):', currentGrade);
  if (!grade) return;
  const notes = prompt('Notes:', currentNotes);
  try {
    await Wren.api('/api/assessments-primary/' + id, { method: 'PUT', body: { grade, notes } });
    loadAssessments();
  } catch(e) { alert('Error: ' + e.message); }
}

function exportCSV() {
  const headers = ['Name','Class','Year Group','Subject','Term','Grade','Type','Notes'];
  const rows = allAssessments.map(a => [a.first_name+' '+a.last_name, a.class_group||'', a.year_group||'', a.subject, a.term||'', a.grade, a.assessment_type||'', a.notes||'']);
  const csv = [headers,...rows].map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'assessments-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
