<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="primary">
  <title>School Calendar — Wren Primary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .cal-toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .cal-nav { display:flex; align-items:center; gap:8px; }
    .cal-nav button { background:var(--surface); border:1px solid var(--border); border-radius:8px;
      color:var(--text); cursor:pointer; padding:8px 12px; font-size:14px; min-height:40px; }
    .cal-nav button:hover { border-color:var(--primary); }
    .cal-title { font-size:18px; font-weight:700; min-width:180px; text-align:center; }
    .view-btns { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .view-btn { background:var(--surface); border:none; color:var(--text-muted); cursor:pointer;
      padding:8px 16px; font-size:13px; font-weight:600; transition:.15s; }
    .view-btn.active { background:var(--primary); color:#fff; }
    .ics-link { font-size:12px; color:var(--primary); text-decoration:none; margin-left:auto; }
    .ics-link:hover { text-decoration:underline; }

    /* ── Month grid ── */
    .month-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px;
      background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .day-header { background:var(--surface); text-align:center; padding:6px 4px;
      font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; }
    .day-cell { background:var(--card-bg); min-height:80px; padding:4px; position:relative;
      cursor:default; }
    .day-cell:hover { background:rgba(74,154,191,.04); }
    .day-cell.other-month { background:#0f1a2a; }
    .day-cell.today { outline:2px solid var(--primary); outline-offset:-2px; }
    .day-num { font-size:12px; font-weight:700; margin-bottom:2px; color:var(--text-muted); }
    .day-cell.today .day-num { color:var(--primary); }
    .event-chip { border-radius:4px; padding:1px 5px; font-size:10px; font-weight:600;
      margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      cursor:pointer; color:#fff; }
    .event-chip:hover { opacity:.85; }
    .more-events { font-size:10px; color:var(--text-muted); cursor:pointer; margin-top:2px; }
    .more-events:hover { color:var(--primary); }

    /* ── Week view ── */
    .week-grid { display:grid; grid-template-columns:60px repeat(7,1fr); gap:1px;
      background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .week-time { background:var(--surface); padding:4px 6px; font-size:10px;
      color:var(--text-muted); text-align:right; }
    .week-day-header { background:var(--surface); padding:8px 4px; text-align:center;
      font-size:12px; font-weight:700; }
    .week-day-header small { display:block; font-weight:400; color:var(--text-muted); font-size:11px; }
    .week-cell { background:var(--card-bg); min-height:60px; padding:4px; }
    .week-allday-row { display:grid; grid-template-columns:60px repeat(7,1fr); gap:1px;
      background:var(--border); margin-bottom:1px; }
    .week-allday-label { background:var(--surface); padding:4px 6px; font-size:10px;
      color:var(--text-muted); text-align:right; display:flex; align-items:center; justify-content:flex-end; }

    /* ── List / Agenda view ── */
    .agenda-group { margin-bottom:20px; }
    .agenda-date { font-size:12px; font-weight:700; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; padding:0 2px; }
    .agenda-event { display:flex; align-items:center; gap:10px; padding:10px 12px;
      background:var(--card-bg); border:1px solid var(--border); border-radius:8px;
      margin-bottom:6px; cursor:pointer; }
    .agenda-event:hover { border-color:var(--primary); }
    .agenda-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .agenda-label { font-size:14px; font-weight:600; flex:1; }
    .agenda-type { font-size:11px; color:var(--text-muted); }

    /* ── Legend ── */
    .legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-muted); }
    .legend-dot { width:10px; height:10px; border-radius:50%; }

    /* ── Detail modal ── */
    .cal-modal { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500;
      display:none; align-items:center; justify-content:center; padding:16px; }
    .cal-modal.open { display:flex; }
    .cal-modal-box { background:var(--card-bg); border:1px solid var(--border);
      border-radius:14px; padding:24px; max-width:420px; width:100%; }
    .cal-modal-title { font-size:17px; font-weight:700; margin-bottom:6px; }
    .cal-modal-type { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
    .cal-modal-desc { font-size:14px; color:var(--muted); line-height:1.5; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">School Calendar</div>
      <div class="page-subtitle">Events, trips, clubs and parents evenings</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/api/calendar.ics" class="btn btn-secondary" style="font-size:13px">📥 Subscribe (.ics)</a>
    </div>
  </div>

  <div class="cal-toolbar">
    <div class="cal-nav">
      <button onclick="prevPeriod()">‹</button>
      <div class="cal-title" id="cal-title">Loading…</div>
      <button onclick="nextPeriod()">›</button>
      <button onclick="goToday()" style="font-size:12px;padding:6px 10px">Today</button>
    </div>
    <div class="view-btns">
      <button class="view-btn active" id="vbtn-month" onclick="setView('month')">Month</button>
      <button class="view-btn" id="vbtn-week" onclick="setView('week')">Week</button>
      <button class="view-btn" id="vbtn-list" onclick="setView('list')">List</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4a9abf"></div> Term</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e07820"></div> Half Term</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Trip</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Parents Evening</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> Announcement</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div> Club</div>
  </div>

  <div id="cal-container"></div>
</div>

<!-- Event detail modal -->
<div class="cal-modal" id="event-modal">
  <div class="cal-modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div class="cal-modal-title" id="em-title"></div>
        <div class="cal-modal-type" id="em-type"></div>
      </div>
      <button onclick="closeEventModal()" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer">×</button>
    </div>
    <div id="em-dates" style="font-size:13px;color:var(--text-muted);margin-bottom:8px"></div>
    <div class="cal-modal-desc" id="em-desc"></div>
  </div>
</div>

<script>
let EVENTS = [];
let VIEW = 'month';
let CURSOR = new Date();

const TYPE_LABELS = { term:'Term', half_term:'Half Term', trip:'School Trip',
  parents_evening:"Parents' Evening", announcement:'Announcement', club:'Club' };

document.addEventListener('wren:ready', init);

async function init() {
  EVENTS = await fetch('/api/calendar').then(r=>r.json()).catch(()=>[]);
  goToday();
}

function goToday() { CURSOR = new Date(); render(); }
function prevPeriod() {
  if (VIEW === 'month') CURSOR = new Date(CURSOR.getFullYear(), CURSOR.getMonth()-1, 1);
  else if (VIEW === 'week') CURSOR.setDate(CURSOR.getDate()-7);
  else CURSOR.setMonth(CURSOR.getMonth()-1);
  render();
}
function nextPeriod() {
  if (VIEW === 'month') CURSOR = new Date(CURSOR.getFullYear(), CURSOR.getMonth()+1, 1);
  else if (VIEW === 'week') CURSOR.setDate(CURSOR.getDate()+7);
  else CURSOR.setMonth(CURSOR.getMonth()+1);
  render();
}
function setView(v) {
  VIEW = v;
  ['month','week','list'].forEach(x => document.getElementById('vbtn-'+x)?.classList.toggle('active', x===v));
  render();
}

function render() {
  if (VIEW === 'month') renderMonth();
  else if (VIEW === 'week') renderWeek();
  else renderList();
}

// ── Resolve events to concrete dates for rendering ──
function getEventsForDate(dateStr) {
  return EVENTS.filter(e => {
    if (e.recurring && e.day_of_week !== undefined) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.getDay() === e.day_of_week;
    }
    const start = e.start ? String(e.start).slice(0,10) : null;
    const end = e.end ? String(e.end).slice(0,10) : start;
    if (!start) return false;
    return dateStr >= start && dateStr <= (end || start);
  });
}

function fmtDate(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
}

function dateStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

// ── Month view ──
function renderMonth() {
  const year = CURSOR.getFullYear(), month = CURSOR.getMonth();
  document.getElementById('cal-title').textContent = new Date(year, month, 1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const todayStr = dateStr(new Date());
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  let html = '<div class="month-grid">';
  days.forEach(d => { html += `<div class="day-header">${d}</div>`; });

  let d = new Date(firstDay); d.setDate(d.getDate() - startDow);
  for (let cell = 0; cell < 42; cell++) {
    const ds = dateStr(d);
    const otherMonth = d.getMonth() !== month;
    const isToday = ds === todayStr;
    const dayEvents = getEventsForDate(ds);
    const show = dayEvents.slice(0, 3);
    const more = dayEvents.length - show.length;

    html += `<div class="day-cell${otherMonth?' other-month':''}${isToday?' today':''}">`;
    html += `<div class="day-num">${d.getDate()}</div>`;
    show.forEach(e => {
      html += `<div class="event-chip" style="background:${e.colour||'#4a9abf'}" onclick="showEvent(${JSON.stringify(escEvent(e)).replace(/'/g,'&#39;')})">${escHtml(e.title)}</div>`;
    });
    if (more > 0) html += `<div class="more-events">+${more} more</div>`;
    html += '</div>';
    d.setDate(d.getDate() + 1);
    if (cell >= 34 && d.getMonth() !== month) break;
  }
  html += '</div>';
  document.getElementById('cal-container').innerHTML = html;
}

// ── Week view ──
function renderWeek() {
  const startOfWeek = new Date(CURSOR);
  startOfWeek.setDate(startOfWeek.getDate() - ((startOfWeek.getDay()+6)%7));
  const todayStr = dateStr(new Date());
  const days = [];
  for (let i=0; i<7; i++) { const d = new Date(startOfWeek); d.setDate(d.getDate()+i); days.push(d); }

  const rangeStart = days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const rangeEnd = days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('cal-title').textContent = `${rangeStart} – ${rangeEnd}`;

  let html = '<div class="week-allday-row">';
  html += '<div class="week-allday-label">All day</div>';
  days.forEach(d => {
    const ds = dateStr(d);
    const evs = getEventsForDate(ds).filter(e => e.allDay || e.type === 'term' || e.type === 'half_term' || e.type === 'trip' || e.type === 'parents_evening' || e.type === 'announcement');
    html += `<div style="background:var(--card-bg);padding:4px;min-height:36px">`;
    evs.forEach(e => { html += `<div class="event-chip" style="background:${e.colour||'#4a9abf'};margin-bottom:2px" onclick="showEvent(${JSON.stringify(escEvent(e)).replace(/'/g,'&#39;')})">${escHtml(e.title)}</div>`; });
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="week-grid">';
  html += '<div class="week-day-header"></div>';
  days.forEach(d => {
    const ds = dateStr(d);
    const isToday = ds === todayStr;
    html += `<div class="week-day-header" style="${isToday?'color:var(--primary)':''}">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][(d.getDay()+6)%7]}<small>${d.getDate()}</small></div>`;
  });

  // Club sessions (recurring)
  html += '<div class="week-time" style="font-size:10px">Clubs</div>';
  days.forEach(d => {
    const ds = dateStr(d);
    const clubs = EVENTS.filter(e => e.type === 'club' && e.day_of_week === d.getDay());
    html += `<div class="week-cell">`;
    clubs.forEach(e => { html += `<div class="event-chip" style="background:${e.colour}" onclick="showEvent(${JSON.stringify(escEvent(e)).replace(/'/g,'&#39;')})">${escHtml(e.title)}</div>`; });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('cal-container').innerHTML = html;
}

// ── List / Agenda view ──
function renderList() {
  const year = CURSOR.getFullYear(), month = CURSOR.getMonth();
  document.getElementById('cal-title').textContent = new Date(year, month, 1).toLocaleDateString('en-GB', { month:'long', year:'numeric' });

  const daysInMonth = new Date(year, month+1, 0).getDate();
  let html = '';
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = dateStr(new Date(year, month, day));
    const evs = getEventsForDate(ds);
    if (!evs.length) continue;
    const dateLabel = new Date(ds+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    html += `<div class="agenda-group"><div class="agenda-date">${dateLabel}</div>`;
    evs.forEach(e => {
      html += `<div class="agenda-event" onclick="showEvent(${JSON.stringify(escEvent(e)).replace(/'/g,'&#39;')})">
        <div class="agenda-dot" style="background:${e.colour||'#4a9abf'}"></div>
        <div>
          <div class="agenda-label">${escHtml(e.title)}</div>
          <div class="agenda-type">${TYPE_LABELS[e.type]||e.type||''}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  if (!html) html = '<div class="empty-state">No events this month</div>';
  document.getElementById('cal-container').innerHTML = html;
}

function escEvent(e) {
  return { title: e.title, type: e.type, start: e.start, end: e.end, description: e.description, colour: e.colour };
}

function showEvent(eStr) {
  const e = typeof eStr === 'string' ? JSON.parse(eStr) : eStr;
  document.getElementById('em-title').textContent = e.title || '—';
  document.getElementById('em-type').textContent = TYPE_LABELS[e.type] || e.type || '';
  const startFmt = e.start ? fmtDate(String(e.start).slice(0,10)) : '';
  const endFmt = e.end && e.end !== e.start ? ` – ${fmtDate(String(e.end).slice(0,10))}` : '';
  document.getElementById('em-dates').textContent = startFmt + endFmt;
  document.getElementById('em-desc').textContent = e.description || '';
  document.getElementById('event-modal').classList.add('open');
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEventModal(); });

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
