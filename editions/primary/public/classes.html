<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="primary">
  <title>Classes — Wren Primary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Classes</div>
      <div class="page-subtitle">Year groups and registers</div>
    </div>
  </div>
  <div id="classes-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
    <div class="empty-state">Loading…</div>
  </div>
</div>
<script>
async function init() {
  const data = await Wren.api('/api/classes').catch(()=>[]);
  const yrLabel = y => y === 0 ? 'Reception' : `Year ${y}`;
  document.getElementById('classes-grid').innerHTML = data.length ? data.map(c => `
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer"
         data-class-id="${c.id}">
      <div style="font-size:28px;margin-bottom:8px">🏫</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:4px">${c.name}</div>
      <div style="color:var(--text-muted);font-size:13px">${yrLabel(c.year_group)} &nbsp;·&nbsp; KS${c.key_stage}</div>
      <div style="color:var(--text-muted);font-size:13px;margin-top:4px">Teacher: ${c.teacher_name||'—'}</div>
      <div style="color:var(--text-muted);font-size:13px">Room: ${c.room||'—'} &nbsp;·&nbsp; ${c.current_pupils} pupils</div>
    </div>`).join('') : '<div class="empty-state">No items yet</div>';
}
document.addEventListener('wren:ready', function() {
  document.getElementById('classes-grid').addEventListener('click', function(e) {
    const card = e.target.closest('[data-class-id]');
    if (card) location.href = '/homework.html?class_id=' + card.dataset.classId;
  });
  init();
});
</script>
</body>
</html>
