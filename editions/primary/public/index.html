<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wren</title>
</head>
<body>
<!-- Role-aware entry point. The shared shell's "Home" link and the demo-login
     redirect both target /index.html; the primary edition had none, so they
     bounced to login. This routes each role to its real landing page. -->
<script>
(function () {
  var t = sessionStorage.getItem('wrenToken') || localStorage.getItem('wrenToken');
  if (!t) { location.replace('/login.html'); return; }
  var role = '';
  try { role = (JSON.parse(atob(t.split('.')[1])) || {}).role || ''; } catch (e) {}
  var adminRoles = ['headteacher', 'business_manager', 'admin', 'manager', 'deputy_manager'];
  location.replace(adminRoles.indexOf(role) >= 0 ? '/app.html' : '/learning.html');
})();
</script>
</body>
</html>
