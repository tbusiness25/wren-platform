<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="primary">
  <title>Pupils — Wren Primary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>

<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Pupils</div>
      <div class="page-subtitle" id="subtitle">Loading...</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-primary" onclick="openAddPupil()">+ Add Pupil</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px" id="stats-bar">
    <div class="stat-card blue"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Total Pupils</span></div>
    <div class="stat-card green"><span class="stat-value" id="stat-ks1">—</span><span class="stat-label">KS1</span></div>
    <div class="stat-card amber"><span class="stat-value" id="stat-ks2">—</span><span class="stat-label">KS2</span></div>
    <div class="stat-card red"><span class="stat-value" id="stat-pp">—</span><span class="stat-label">Pupil Premium</span></div>
    <div class="stat-card grey" style="border-left:4px solid #8b5cf6"><span class="stat-value" id="stat-sen">—</span><span class="stat-label">SEN</span></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search pupils..." oninput="filterPupils()">
    </div>
    <select class="form-control" id="year-filter" onchange="filterPupils()" style="flex:0 0 150px">
      <option value="">All Year Groups</option>
      <option value="R">Reception</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
      <option value="5">Year 5</option>
      <option value="6">Year 6</option>
    </select>
    <select class="form-control" id="class-filter" onchange="filterPupils()" style="flex:0 0 150px">
      <option value="">All Classes</option>
    </select>
    <select class="form-control" id="flag-filter" onchange="filterPupils()" style="flex:0 0 150px">
      <option value="">All Pupils</option>
      <option value="pp">Pupil Premium</option>
      <option value="sen">SEN</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-muted);cursor:pointer">
      <input type="checkbox" id="view-toggle" onchange="toggleView()"> Card view
    </label>
  </div>

  <!-- Pupil table/cards area -->
  <div id="pupils-area">
    <div class="loading-state"><div class="spinner"></div><span>Loading pupils...</span></div>
  </div>
</div>

<!-- Add Pupil Modal -->
<div id="add-modal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeAddPupil()"></div>
  <div class="modal-content" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title">Add Pupil</div>
      <button class="modal-close" onclick="closeAddPupil()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">First Name *</label>
          <input class="form-control" id="new-first" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name *</label>
          <input class="form-control" id="new-last" required>
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input class="form-control" id="new-dob" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Year Group *</label>
          <select class="form-control" id="new-year">
            <option value="R">Reception</option>
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="3">Year 3</option>
            <option value="4">Year 4</option>
            <option value="5">Year 5</option>
            <option value="6">Year 6</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Class Group</label>
          <input class="form-control" id="new-class" placeholder="e.g. 3B">
        </div>
        <div class="form-group">
          <label class="form-label">UPN</label>
          <input class="form-control" id="new-upn" placeholder="Unique Pupil Number">
        </div>
      </div>
      <div style="display:flex;gap:20px;margin-top:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="new-pp"> Pupil Premium
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="new-sen"> SEN
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddPupil()">Cancel</button>
      <button class="btn btn-primary" onclick="savePupil()">Add Pupil</button>
    </div>
  </div>
</div>

<script>
let allPupils = [];
let cardView = false;

document.addEventListener('wren:ready', init);

async function init() {
  await loadPupils();
}

async function loadPupils() {
  try {
    allPupils = await Wren.api('/api/children');
    updateStats();
    buildClassFilter();
    renderPupils();
  } catch(e) {
    document.getElementById('pupils-area').innerHTML = '<div class="empty-state">Failed to load pupils</div>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allPupils.length;
  const ks1 = allPupils.filter(p => ['R','1','2'].includes(String(p.year_group)));
  const ks2 = allPupils.filter(p => ['3','4','5','6'].includes(String(p.year_group)));
  document.getElementById('stat-ks1').textContent = ks1.length;
  document.getElementById('stat-ks2').textContent = ks2.length;
  document.getElementById('stat-pp').textContent = allPupils.filter(p => p.pupil_premium).length;
  document.getElementById('stat-sen').textContent = allPupils.filter(p => p.sen_status && p.sen_status !== 'none').length;

  const total = allPupils.length;
  document.getElementById('subtitle').textContent = total + ' pupil' + (total !== 1 ? 's' : '') + ' enrolled';
}

function buildClassFilter() {
  const classes = [...new Set(allPupils.map(p => p.class_group).filter(Boolean))].sort();
  const sel = document.getElementById('class-filter');
  sel.innerHTML = '<option value="">All Classes</option>' +
    classes.map(c => `<option value="${c}">${c}</option>`).join('');
}

function filterPupils() {
  const q = document.getElementById('search').value.toLowerCase();
  const yr = document.getElementById('year-filter').value;
  const cls = document.getElementById('class-filter').value;
  const flag = document.getElementById('flag-filter').value;
  let filtered = allPupils.filter(p => {
    const name = (p.first_name + ' ' + p.last_name).toLowerCase();
    if (q && !name.includes(q)) return false;
    if (yr && String(p.year_group) !== yr) return false;
    if (cls && p.class_group !== cls) return false;
    if (flag === 'pp' && !p.pupil_premium) return false;
    if (flag === 'sen' && (!p.sen_status || p.sen_status === 'none')) return false;
    return true;
  });
  renderPupils(filtered);
}

function renderPupils(pupils) {
  pupils = pupils || allPupils;
  const area = document.getElementById('pupils-area');
  if (!pupils.length) { area.innerHTML = '<div class="empty-state">No pupils found</div>'; return; }

  if (cardView) {
    renderCards(pupils, area);
  } else {
    renderTable(pupils, area);
  }
}

function renderTable(pupils, area) {
  // Group by year group
  const groups = {};
  const ORDER = ['R','1','2','3','4','5','6'];
  pupils.forEach(p => {
    const yr = String(p.year_group || 'Unknown');
    if (!groups[yr]) groups[yr] = [];
    groups[yr].push(p);
  });

  let html = '';
  ORDER.forEach(yr => {
    if (!groups[yr]) return;
    const label = yr === 'R' ? 'Reception' : 'Year ' + yr;
    const ks = ['R','1','2'].includes(yr) ? 'KS1' : 'KS2';
    html += `
      <div style="margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <h3 style="margin:0;font-size:16px;font-weight:600">${label}</h3>
          <span class="badge badge-blue">${ks}</span>
          <span style="color:var(--text-muted);font-size:13px">${groups[yr].length} pupils</span>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr>
              <th>Name</th>
              <th>Class</th>
              <th>Key Stage</th>
              <th>Attendance</th>
              <th>SEN</th>
              <th>PP</th>
              <th>UPN</th>
            </tr></thead>
            <tbody>
              ${groups[yr].map(p => `
                <tr onclick="viewPupil(${p.id})" style="cursor:pointer">
                  <td><strong>${p.first_name} ${p.last_name}</strong></td>
                  <td>${p.class_group || '—'}</td>
                  <td>${ks}</td>
                  <td>${p.attendance_pct != null ? p.attendance_pct + '%' : '—'}</td>
                  <td>${p.sen_status && p.sen_status !== 'none' ? '<span class="badge badge-purple">' + p.sen_status.toUpperCase() + '</span>' : '—'}</td>
                  <td>${p.pupil_premium ? '<span class="badge badge-green">PP</span>' : '—'}</td>
                  <td style="font-size:12px;color:var(--text-muted)">${p.upn || '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  });

  // Unknown year group
  if (groups['Unknown']) {
    html += `<div style="margin-bottom:24px"><h3 style="font-size:16px;font-weight:600;margin-bottom:8px">Unassigned</h3>
      <div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Class</th><th>SEN</th><th>PP</th></tr></thead>
      <tbody>${groups['Unknown'].map(p => `<tr onclick="viewPupil(${p.id})" style="cursor:pointer"><td>${p.first_name} ${p.last_name}</td><td>${p.class_group||'—'}</td><td>${p.sen_status&&p.sen_status!=='none'?'SEN':'—'}</td><td>${p.pupil_premium?'PP':'—'}</td></tr>`).join('')}</tbody></table></div></div>`;
  }

  area.innerHTML = html;
}

function renderCards(pupils, area) {
  area.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">' +
    pupils.map(p => {
      const yr = String(p.year_group || '');
      const ks = ['R','1','2'].includes(yr) ? 'KS1' : yr ? 'KS2' : '';
      const label = yr === 'R' ? 'Reception' : yr ? 'Year ' + yr : '—';
      return `<div class="card" onclick="viewPupil(${p.id})" style="cursor:pointer;padding:16px">
        <div style="font-weight:600;margin-bottom:4px">${p.first_name} ${p.last_name}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">${label} ${p.class_group ? '· ' + p.class_group : ''}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${ks ? `<span class="badge badge-blue">${ks}</span>` : ''}
          ${p.pupil_premium ? '<span class="badge badge-green">PP</span>' : ''}
          ${p.sen_status && p.sen_status !== 'none' ? `<span class="badge badge-purple">${p.sen_status.toUpperCase()}</span>` : ''}
        </div>
      </div>`;
    }).join('') + '</div>';
}

function toggleView() {
  cardView = document.getElementById('view-toggle').checked;
  renderPupils();
}

function viewPupil(id) {
  window.location.href = '/profile.html?id=' + id;
}

function openAddPupil() { document.getElementById('add-modal').style.display = 'flex'; }
function closeAddPupil() { document.getElementById('add-modal').style.display = 'none'; }

async function savePupil() {
  const body = {
    first_name: document.getElementById('new-first').value.trim(),
    last_name: document.getElementById('new-last').value.trim(),
    date_of_birth: document.getElementById('new-dob').value || null,
    year_group: document.getElementById('new-year').value,
    class_group: document.getElementById('new-class').value.trim() || null,
    upn: document.getElementById('new-upn').value.trim() || null,
    pupil_premium: document.getElementById('new-pp').checked,
    is_active: true
  };
  if (!body.first_name || !body.last_name) { alert('First and last name required'); return; }
  try {
    await Wren.api('/api/children', { method: 'POST', body: body });
    closeAddPupil();
    loadPupils();
  } catch(e) { alert('Error: ' + e.message); }
}

function exportCSV() {
  const headers = ['First Name','Last Name','Year Group','Class','Key Stage','PP','SEN','UPN'];
  const rows = allPupils.map(p => {
    const yr = String(p.year_group || '');
    const ks = ['R','1','2'].includes(yr) ? 'KS1' : yr ? 'KS2' : '';
    return [p.first_name, p.last_name, yr === 'R' ? 'Reception' : yr ? 'Year '+yr : '', p.class_group||'', ks, p.pupil_premium?'Yes':'', p.sen_status&&p.sen_status!=='none'?p.sen_status:'', p.upn||''];
  });
  const csv = [headers, ...rows].map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'pupils-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
