<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="wren-edition" content="primary">
<title>Ofsted Prep — Wren Primary</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<style>
.op-layout { max-width:900px; margin:0 auto; }
.op-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; }
.op-tab { padding:8px 18px; border-radius:10px; border:1px solid var(--c-border); background:none; color:var(--c-muted); cursor:pointer; font-size:.85rem; font-weight:600; font-family:inherit; transition:.15s; }
.op-tab.active { background:var(--c-blue); color:#fff; border-color:var(--c-blue); }
.op-panel { display:none; }
.op-panel.active { display:block; }

.check-list { display:flex; flex-direction:column; gap:6px; }
.check-item {
  display:flex; align-items:flex-start; gap:12px;
  background:var(--c-surface); border:1px solid var(--c-border); border-radius:10px;
  padding:12px 14px; cursor:pointer; transition:.15s;
}
.check-item:hover { border-color:var(--c-blue); }
.check-item.done { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.05); }
.check-item.na   { opacity:.5; }
.check-cb { width:22px; height:22px; border-radius:6px; border:2px solid var(--c-border); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:.15s; background:var(--c-bg); }
.check-item.done .check-cb { background:#22c55e; border-color:#22c55e; color:#fff; }
.check-item.done .check-cb::after { content:'✓'; font-size:.85rem; font-weight:700; }
.check-label { flex:1; }
.check-label .cn { font-size:.9rem; font-weight:600; color:var(--c-text); margin-bottom:2px; }
.check-label .cd { font-size:.78rem; color:var(--c-muted); }
.check-rag { font-size:.72rem; font-weight:700; padding:3px 8px; border-radius:6px; flex-shrink:0; }

.rag-g { background:rgba(34,197,94,.12); color:#22c55e; }
.rag-a { background:rgba(245,158,11,.12); color:#f59e0b; }
.rag-r { background:rgba(239,68,68,.12); color:#ef4444; }

.progress-bar { height:8px; background:#1e293b; border-radius:4px; overflow:hidden; border:1px solid var(--c-border); }
.progress-fill { height:100%; border-radius:4px; background:var(--c-blue); transition:width .4s ease; }

.sef-area {
  width:100%; min-height:120px; background:var(--c-bg); border:1px solid var(--c-border);
  border-radius:10px; padding:12px; color:var(--c-text); font-family:inherit; font-size:.88rem;
  resize:vertical; line-height:1.6;
}
.sef-area:focus { outline:none; border-color:var(--c-blue); }

.live-badge { display:inline-flex; align-items:center; gap:4px; font-size:.72rem; font-weight:700; padding:3px 8px; border-radius:6px; }
</style>
</head>
<body>
<div id="wren-content">
  <div class="op-layout">

    <div class="page-header">
      <div>
        <div class="page-title">Ofsted Prep</div>
        <div class="page-subtitle">Inspection readiness — self-evaluation & evidence</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="exportChecklist()">Export PDF</button>
        <button class="btn btn-primary" onclick="saveAll()">Save progress</button>
      </div>
    </div>

    <!-- Progress summary -->
    <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:14px;padding:16px 20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:.85rem;font-weight:700;color:var(--c-text)">Overall readiness</span>
        <span style="font-size:.85rem;font-weight:700;color:var(--c-blue)" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap" id="prog-breakdown"></div>
    </div>

    <!-- Tabs -->
    <div class="op-tabs">
      <button class="op-tab active" onclick="switchTab('quality',this)">Quality of Education</button>
      <button class="op-tab" onclick="switchTab('behaviour',this)">Behaviour & Attitudes</button>
      <button class="op-tab" onclick="switchTab('personal',this)">Personal Development</button>
      <button class="op-tab" onclick="switchTab('leadership',this)">Leadership & Mgmt</button>
      <button class="op-tab" onclick="switchTab('sef',this)">SEF</button>
      <button class="op-tab" onclick="switchTab('evidence',this)">Evidence Bank</button>
    </div>

    <!-- Quality of Education -->
    <div class="op-panel active" id="panel-quality">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Quality of Education</h3>
      <div class="check-list" id="cl-quality"></div>
    </div>

    <!-- Behaviour & Attitudes -->
    <div class="op-panel" id="panel-behaviour">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Behaviour & Attitudes</h3>
      <div class="check-list" id="cl-behaviour"></div>
    </div>

    <!-- Personal Development -->
    <div class="op-panel" id="panel-personal">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Personal Development</h3>
      <div class="check-list" id="cl-personal"></div>
    </div>

    <!-- Leadership & Management -->
    <div class="op-panel" id="panel-leadership">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Leadership & Management</h3>
      <div class="check-list" id="cl-leadership"></div>
    </div>

    <!-- SEF -->
    <div class="op-panel" id="panel-sef">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px">Self-Evaluation Form (SEF)</h3>
      <div style="display:flex;flex-direction:column;gap:20px">
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Context of the school</label>
          <textarea class="sef-area" id="sef-context" placeholder="Describe the school's context: location, intake, demographics, key challenges…"></textarea>
        </div>
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Quality of Education — self-evaluation</label>
          <textarea class="sef-area" id="sef-qoe" placeholder="Evaluate the intent, implementation and impact of your curriculum…"></textarea>
        </div>
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Behaviour & Attitudes — self-evaluation</label>
          <textarea class="sef-area" id="sef-beh" placeholder="Describe your approach to behaviour, attendance culture and pupil attitudes…"></textarea>
        </div>
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Personal Development — self-evaluation</label>
          <textarea class="sef-area" id="sef-pd" placeholder="Describe PSHE, safeguarding culture, enrichment activities, pupil voice…"></textarea>
        </div>
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Leadership & Management — self-evaluation</label>
          <textarea class="sef-area" id="sef-lead" placeholder="Describe strategic leadership, staff development, governance, SEND…"></textarea>
        </div>
        <div>
          <label style="display:block;font-weight:600;font-size:.88rem;margin-bottom:6px">Overall effectiveness — judgement</label>
          <select class="form-control" id="sef-overall" style="max-width:300px">
            <option value="">Select judgement</option>
            <option value="outstanding">Outstanding</option>
            <option value="good">Good</option>
            <option value="requires_improvement">Requires Improvement</option>
            <option value="inadequate">Inadequate</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveSEF()">Save SEF</button>
      </div>
    </div>

    <!-- Evidence Bank -->
    <div class="op-panel" id="panel-evidence">
      <h3 style="font-size:.9rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Evidence Bank</h3>
      <p style="font-size:.85rem;color:var(--c-muted);margin-bottom:16px">Key live metrics Ofsted will look at — pulled directly from your data.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px" id="evidence-grid">
        <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
const CHECKLISTS = {
  quality: [
    { id:'q1', label:'Curriculum intent documented (long-term plans for all subjects)', desc:'Plans available for every year group and subject', rag:'a' },
    { id:'q2', label:'Phonics programme is systematic and rigorous (DfE validated)', desc:'Evidence: timetable, groupings, Y1 screening results', rag:'a' },
    { id:'q3', label:'Reading is a whole-school priority', desc:'Reading spine, book corners, explicit vocabulary teaching', rag:'a' },
    { id:'q4', label:'Assessment informs teaching (formative + summative)', desc:'Marking policy followed, data drives intervention groupings', rag:'a' },
    { id:'q5', label:'KS1 and KS2 outcomes analysed and understood', desc:'Targets set, underperforming groups identified', rag:'r' },
    { id:'q6', label:'SEND pupils access full curriculum with high expectations', desc:'Graduated response, EHCP outcomes tracked, TA deployment', rag:'a' },
    { id:'q7', label:'Homework/extended learning supports the curriculum', desc:'Consistent policy, feedback loop with families', rag:'g' },
    { id:'q8', label:'Ofsted research reviews consulted (mathematics, reading, science…)', desc:'Subject leads aware of relevant research reviews', rag:'a' },
  ],
  behaviour: [
    { id:'b1', label:'Attendance consistently ≥96%', desc:'Weekly register reviewed; PA pupils have support plans', rag:'g' },
    { id:'b2', label:'Persistent absence (PA) cases managed proactively', desc:'PA rate &lt;10%; EWO referrals in place where needed', rag:'a' },
    { id:'b3', label:'Behaviour policy is clear, consistent, and positively framed', desc:'Staff trained; rewards (inc. Wren Points) actively used', rag:'g' },
    { id:'b4', label:'Bullying incidents logged, investigated, and resolved', desc:'Logs available; parents informed; outcomes recorded', rag:'g' },
    { id:'b5', label:'Exclusions are rare; alternatives explored first', desc:'Exclusion register up to date; reintegration plans in place', rag:'g' },
    { id:'b6', label:'Pupils are punctual; late arrivals tracked', desc:'Morning register / late codes used correctly', rag:'g' },
  ],
  personal: [
    { id:'p1', label:'PSHE / RSHE is age-appropriate and meets statutory requirements', desc:'Scheme of work reviewed 2024; parents informed of content', rag:'a' },
    { id:'p2', label:'Safeguarding culture is embedded — all staff trained', desc:'DSL in place; SCR up to date; safer recruitment followed', rag:'g' },
    { id:'p3', label:'Pupils know how to stay safe online', desc:'e-Safety taught explicitly; parent course available', rag:'a' },
    { id:'p4', label:'Enrichment activities broaden pupils' experiences', desc:'Trips, visitors, clubs, arts, sports provision documented', rag:'g' },
    { id:'p5', label:'British values and SMSC are woven into the curriculum', desc:'Evidence in planning; assemblies log available', rag:'a' },
    { id:'p6', label:'Pupil voice is heard and acted upon', desc:'School council, pupil surveys, feedback loops', rag:'a' },
  ],
  leadership: [
    { id:'l1', label:'School improvement priorities are clear and data-driven', desc:'SDP current; progress reviewed termly', rag:'a' },
    { id:'l2', label:'Governors provide appropriate challenge and support', desc:'Minutes demonstrate scrutiny; governors know the school', rag:'g' },
    { id:'l3', label:'Staff CPD is purposeful and linked to school priorities', desc:'CPD log; subject leadership development; ECT support', rag:'g' },
    { id:'l4', label:'Workload and wellbeing actively managed', desc:'Staff survey results; flexible working policy; reduced admin', rag:'a' },
    { id:'l5', label:'Safeguarding is effective — single central record current', desc:'All staff DBS checked; SCR audited this term', rag:'g' },
    { id:'l6', label:'SEND leadership is strong; graduated response followed', desc:'SENCO qualified; EHCP reviews on time; governor link', rag:'a' },
    { id:'l7', label:'Pupil Premium strategy published and impact evaluated', desc:'Strategy on website; spending justified; outcomes measured', rag:'a' },
    { id:'l8', label:'Financial management is sound', desc:'Budget balanced; resource allocation supports school vision', rag:'g' },
  ],
};

const state = {};
let pupils = [], att = {}, beh = {};

document.addEventListener('wren:ready', init);

async function init() {
  loadState();
  renderAllChecklists();
  updateProgress();
  loadSEF();
  loadEvidence();
}

function loadState() {
  try { Object.assign(state, JSON.parse(localStorage.getItem('op-state-primary') || '{}')); } catch {}
}
function saveState() {
  localStorage.setItem('op-state-primary', JSON.stringify(state));
  Wren.toast('Progress saved', 'success');
}

function renderChecklist(id, items) {
  const el = document.getElementById('cl-' + id);
  el.innerHTML = items.map(item => {
    const done = state[item.id] === 'done';
    return `<div class="check-item ${done?'done':''}" onclick="toggleItem('${item.id}',this)">
      <div class="check-cb"></div>
      <div class="check-label">
        <div class="cn">${item.label}</div>
        <div class="cd">${item.desc}</div>
      </div>
      <span class="check-rag rag-${done?'g':item.rag}">${done?'Done':item.rag.toUpperCase()}</span>
    </div>`;
  }).join('');
}

function renderAllChecklists() {
  Object.entries(CHECKLISTS).forEach(([id, items]) => renderChecklist(id, items));
}

function toggleItem(id, el) {
  const done = el.classList.toggle('done');
  state[id] = done ? 'done' : null;
  const cb = el.querySelector('.check-cb');
  cb.style.background = done ? '#22c55e' : '';
  cb.style.borderColor = done ? '#22c55e' : '';
  const rag = el.querySelector('.check-rag');
  if (rag) { rag.textContent = done ? 'Done' : 'A'; rag.className = 'check-rag rag-' + (done ? 'g' : 'a'); }
  updateProgress();
}

function updateProgress() {
  const all = Object.values(CHECKLISTS).flat();
  const total = all.length;
  const done  = all.filter(i => state[i.id] === 'done').length;
  const pct   = Math.round(done / total * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const breakdown = Object.entries(CHECKLISTS).map(([id, items]) => {
    const d = items.filter(i => state[i.id]==='done').length;
    const label = {quality:'Quality',behaviour:'Behaviour',personal:'Personal Dev',leadership:'Leadership'}[id];
    const col = d === items.length ? '#22c55e' : d > 0 ? '#f59e0b' : '#ef4444';
    return `<span style="font-size:.75rem;color:${col};font-weight:600">${label}: ${d}/${items.length}</span>`;
  });
  document.getElementById('prog-breakdown').innerHTML = breakdown.join('');
}

function switchTab(id, btn) {
  document.querySelectorAll('.op-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.op-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'evidence') loadEvidence();
}

function saveSEF() {
  state.sef_context  = document.getElementById('sef-context').value;
  state.sef_qoe      = document.getElementById('sef-qoe').value;
  state.sef_beh      = document.getElementById('sef-beh').value;
  state.sef_pd       = document.getElementById('sef-pd').value;
  state.sef_lead     = document.getElementById('sef-lead').value;
  state.sef_overall  = document.getElementById('sef-overall').value;
  saveState();
}

function loadSEF() {
  if (state.sef_context)  document.getElementById('sef-context').value  = state.sef_context;
  if (state.sef_qoe)      document.getElementById('sef-qoe').value      = state.sef_qoe;
  if (state.sef_beh)      document.getElementById('sef-beh').value      = state.sef_beh;
  if (state.sef_pd)       document.getElementById('sef-pd').value       = state.sef_pd;
  if (state.sef_lead)     document.getElementById('sef-lead').value     = state.sef_lead;
  if (state.sef_overall)  document.getElementById('sef-overall').value  = state.sef_overall;
}

function saveAll() { saveSEF(); saveState(); }

async function loadEvidence() {
  try {
    const [pupils, att, senList] = await Promise.all([
      Wren.api('/api/children'),
      Wren.api('/api/attendance/summary').catch(() => ({})),
      Wren.api('/api/sen').catch(() => []),
    ]);
    const total    = Array.isArray(pupils) ? pupils.length : 0;
    const pp       = Array.isArray(pupils) ? pupils.filter(p => p.pupil_premium).length : 0;
    const sen      = Array.isArray(pupils) ? pupils.filter(p => p.sen_status && p.sen_status !== 'none').length : 0;
    const attPct   = att?.weekly_pct ?? att?.overall_pct ?? null;
    const paPct    = att?.pa_pct ?? null;
    const ehcp     = Array.isArray(senList) ? senList.filter(s => s.sen_status === 'ehcp' || s.ehcp_id).length : 0;

    const evidence = [
      { icon:'🎓', label:'Total Pupils on Roll', val:total, hint:'Updated from your pupils register' },
      { icon:'📅', label:'Attendance (this week)', val:attPct!=null?attPct+'%':'No data', hint:'DfE threshold: ≥96%', col: attPct>=96?'#22c55e':attPct>=90?'#f59e0b':'#ef4444' },
      { icon:'⚠️', label:'Persistent Absence Rate', val:paPct!=null?paPct+'%':'No data', hint:'Below 90% attendance', col: paPct!=null?(paPct<=5?'#22c55e':paPct<=10?'#f59e0b':'#ef4444'):null },
      { icon:'🧩', label:'SEN Pupils', val:sen, hint:'On SEND register' },
      { icon:'📋', label:'EHCP Plans', val:ehcp, hint:'Active EHCPs' },
      { icon:'💰', label:'Pupil Premium Pupils', val:pp, hint:'Eligible for PP funding' },
    ];

    document.getElementById('evidence-grid').innerHTML = evidence.map(e =>
      `<div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;padding:14px">
        <div style="font-size:1.4rem;margin-bottom:6px">${e.icon}</div>
        <div style="font-size:1.5rem;font-weight:800;color:${e.col||'var(--c-text)'};">${e.val}</div>
        <div style="font-size:.82rem;font-weight:700;color:var(--c-text);margin:3px 0">${e.label}</div>
        <div style="font-size:.73rem;color:var(--c-muted)">${e.hint}</div>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('evidence-grid').innerHTML = '<p style="color:var(--c-muted)">Could not load live data</p>';
  }
}

function exportChecklist() {
  const all = Object.values(CHECKLISTS).flat();
  const done = all.filter(i => state[i.id] === 'done').length;
  let txt = `OFSTED READINESS CHECKLIST\nExported: ${new Date().toLocaleDateString('en-GB')}\n${'='.repeat(50)}\nOverall: ${done}/${all.length} complete\n\n`;
  Object.entries(CHECKLISTS).forEach(([id, items]) => {
    const label = {quality:'Quality of Education',behaviour:'Behaviour & Attitudes',personal:'Personal Development',leadership:'Leadership & Management'}[id];
    txt += `\n${label}\n${'-'.repeat(40)}\n`;
    items.forEach(i => { txt += `[${state[i.id]==='done'?'X':' '}] ${i.label}\n`; });
  });
  if (state.sef_overall) txt += `\nSEF Judgement: ${state.sef_overall}\n`;
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(txt);
  a.download = 'ofsted-readiness-' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}
</script>
</body>
</html>
