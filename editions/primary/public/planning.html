<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="wren-edition" content="primary">
<title>Planning — Wren Primary</title>
<link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
<script src="/js/twinkl-modal.js" defer></script>
<style>
.plan-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.plan-header .page-title{flex:1}
.plan-header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.plan-tabs{display:flex;gap:0;border-bottom:2px solid #2d3748;margin-bottom:20px;overflow-x:auto}
.plan-tab{background:none;border:none;color:#94a3b8;padding:10px 18px;cursor:pointer;font-size:.88rem;font-weight:600;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.plan-tab.active{color:#4a9abf;border-bottom-color:#4a9abf}
.plan-tab:hover:not(.active){color:#f1f5f9}
.tab-panel{display:none}.tab-panel.active{display:block}
/* Long term */
.lt-scroll{overflow-x:auto;padding-bottom:8px}
.lt-grid{display:grid;gap:6px;min-width:700px}
.lt-header{background:#0f172a;padding:8px 10px;border-radius:8px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:center}
.lt-subject{background:#0f172a;padding:8px 10px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:700;color:#f1f5f9}
.lt-subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lt-cell{background:#1e293b;border:1px solid #2d3748;border-radius:8px;padding:8px;min-height:80px}
.lt-cell textarea{width:100%;background:transparent;border:none;color:#f1f5f9;font-size:.78rem;line-height:1.5;resize:none;outline:none;min-height:55px;padding:0}
.lt-ai-btn{background:#4a9abf18;border:1px solid #4a9abf44;color:#4a9abf;border-radius:6px;padding:3px 8px;font-size:.7rem;cursor:pointer}
.lt-ai-btn:hover{background:#4a9abf33}
.lt-year-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
/* Medium term */
.mt-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.mt-theme-bar{background:#4a9abf18;border:1px solid #4a9abf44;border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.mt-area-block{background:#1e293b;border:1px solid #2d3748;border-radius:12px;padding:16px;margin-bottom:12px}
.mt-area-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;cursor:pointer}
.mt-area-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.88rem}
.mt-intentions{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.mt-intention{display:flex;align-items:flex-start;gap:8px}
.mt-intention input{flex:1;background:#0f172a;border:1px solid #2d3748;border-radius:6px;color:#f1f5f9;padding:6px 10px;font-size:.82rem;outline:none}
.mt-intention input:focus{border-color:#4a9abf}
.mt-intention-del{background:none;border:none;color:#64748b;cursor:pointer;font-size:.9rem;padding:4px;flex-shrink:0}
.mt-intention-del:hover{color:#ef4444}
.add-intention-btn{background:none;border:1px dashed #2d3748;color:#64748b;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.78rem}
.add-intention-btn:hover{border-color:#4a9abf;color:#4a9abf}
.mt-vocab-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.mt-vocab-input{flex:1;background:#0f172a;border:1px solid #2d3748;border-radius:6px;color:#f1f5f9;padding:6px 10px;font-size:.78rem;outline:none}
/* Weekly */
.week-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.week-nav-btn{padding:6px 12px;background:#1e293b;border:1px solid #2d3748;border-radius:8px;color:#94a3b8;cursor:pointer;font-size:.85rem}
.week-nav-btn:hover{border-color:#4a9abf;color:#f1f5f9}
.week-label{font-size:.9rem;font-weight:700;color:#f1f5f9;min-width:200px;text-align:center}
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:900px){.days-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.days-grid{grid-template-columns:1fr}}
.day-col{background:#1e293b;border:1px solid #2d3748;border-radius:12px;overflow:hidden}
.day-header{padding:10px 14px;border-bottom:1px solid #2d3748;display:flex;justify-content:space-between;align-items:center}
.day-header-name{font-weight:800;font-size:.88rem}
.day-header-name.mon{color:#7dd3fc}.day-header-name.tue{color:#fbbf24}
.day-header-name.wed{color:#c4b5fd}.day-header-name.thu{color:#86efac}.day-header-name.fri{color:#fca5a5}
.day-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.activity-card{background:#0f172a;border:1px solid #2d3748;border-radius:10px;padding:10px 12px;position:relative}
.activity-card.ai-generated{border-left:3px solid #e07820}
.card-area-badge{display:inline-block;border-radius:5px;padding:2px 8px;font-size:.65rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;background:#4a9abf22;color:#4a9abf}
.card-title{font-size:.85rem;font-weight:700;color:#f1f5f9;margin-bottom:4px;line-height:1.3}
.card-meta{font-size:.74rem;color:#64748b;line-height:1.5}
.card-actions{position:absolute;top:6px;right:8px;display:flex;gap:4px;opacity:0;transition:.15s}
.activity-card:hover .card-actions{opacity:1}
.card-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:.8rem;padding:2px 4px}
.card-btn:hover{color:#4a9abf}
.card-btn.del:hover{color:#ef4444}
.day-actions{display:flex;gap:6px;padding:0 10px 10px;flex-wrap:wrap}
.day-add-btn{flex:1;padding:7px 10px;border-radius:8px;font-size:.78rem;cursor:pointer;border:1px dashed #2d3748;background:none;color:#64748b}
.day-add-btn:hover{border-color:#4a9abf;color:#4a9abf}
.day-ai-btn{flex:1;padding:7px 10px;border-radius:8px;font-size:.78rem;cursor:pointer;border:1px solid #e0782044;background:#e0782011;color:#e07820}
.day-ai-btn:hover{background:#e0782033}
.day-ai-btn:disabled{opacity:.5;cursor:not-allowed}
/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.plan-modal,.act-modal{background:#1e293b;border:1px solid #2d3748;border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.plan-modal h3,.act-modal h3{color:#4a9abf;font-size:1rem;font-weight:700;margin-bottom:18px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.78rem;color:#94a3b8;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0f172a;border:1.5px solid #2d3748;border-radius:10px;padding:9px 12px;color:#f1f5f9;font-size:.88rem;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#4a9abf}
.form-group textarea{min-height:70px;resize:vertical}
.spin-inline{display:inline-block;width:14px;height:14px;border:2px solid #4a9abf44;border-top-color:#4a9abf;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="wren-content">

<div class="plan-header">
  <div>
    <div class="page-title">📋 Planning</div>
    <div class="page-subtitle" id="room-subtitle">Multi-level curriculum planning</div>
  </div>
  <div class="plan-header-controls">
    <select id="room-sel" class="form-control" style="width:180px" onchange="onRoomChange()">
      <option value="">Select year group…</option>
    </select>
    <button class="btn btn-ghost" style="min-width:44px" onclick="openSettings()">⚙️ Settings</button>
  </div>
</div>

<div class="plan-tabs">
  <button class="plan-tab active" data-tab="long-term" onclick="switchTab('long-term')">Long Term (Year)</button>
  <button class="plan-tab" data-tab="medium-term" onclick="switchTab('medium-term')">Medium Term (Unit)</button>
  <button class="plan-tab" data-tab="weekly" onclick="switchTab('weekly')">Weekly (Lessons)</button>
</div>

<!-- LONG TERM -->
<div id="tab-long-term" class="tab-panel active">
  <div class="lt-year-bar">
    <span style="font-size:.82rem;color:#64748b">Academic year:</span>
    <select id="lt-year" class="form-control" style="width:130px" onchange="loadLongTerm()">
      <option value="2024-2025">2024–2025</option>
      <option value="2025-2026" selected>2025–2026</option>
      <option value="2026-2027">2026–2027</option>
    </select>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-primary" onclick="saveLongTerm()">Save all</button>
  </div>
  <div class="lt-scroll">
    <div class="lt-grid" id="lt-grid"></div>
  </div>
</div>

<!-- MEDIUM TERM (Unit Plan) -->
<div id="tab-medium-term" class="tab-panel">
  <div class="mt-controls">
    <div>
      <label style="font-size:.75rem;color:#64748b;display:block;margin-bottom:4px">Term</label>
      <select id="mt-term" class="form-control" style="width:140px" onchange="loadMediumTerm()">
        <option>Autumn 1</option><option>Autumn 2</option>
        <option>Spring 1</option><option>Spring 2</option>
        <option>Summer 1</option><option>Summer 2</option>
      </select>
    </div>
    <div>
      <label style="font-size:.75rem;color:#64748b;display:block;margin-bottom:4px">Year</label>
      <select id="mt-year" class="form-control" style="width:130px" onchange="loadMediumTerm()">
        <option value="2024-2025">2024–2025</option>
        <option value="2025-2026" selected>2025–2026</option>
        <option value="2026-2027">2026–2027</option>
      </select>
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-ghost" id="mt-ai-btn" onclick="aiGenerateMediumTerm()">✨ AI Generate Unit Plan</button>
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-primary" onclick="saveMediumTerm()">Save</button>
    </div>
  </div>
  <div class="mt-theme-bar">
    <span style="font-size:.78rem;color:#94a3b8;white-space:nowrap">Unit theme / title:</span>
    <input type="text" id="mt-theme" class="form-control" placeholder="e.g. Animals and their habitats" style="flex:1;max-width:400px">
  </div>
  <div id="mt-areas"></div>
</div>

<!-- WEEKLY (Lesson Sequence) -->
<div id="tab-weekly" class="tab-panel">
  <div class="week-bar">
    <button class="week-nav-btn" onclick="changeWeek(-1)">← Prev</button>
    <span class="week-label" id="week-label"></span>
    <button class="week-nav-btn" onclick="changeWeek(1)">Next →</button>
    <input type="date" id="week-date" class="form-control" style="width:160px" onchange="onWeekDateChange()">
  </div>
  <div class="days-grid" id="days-grid"></div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="plan-modal" onclick="event.stopPropagation()">
  <h3>⚙️ Planning Settings</h3>
  <p style="font-size:.85rem;color:#94a3b8">Configure planning levels for this year group.</p>
  <div class="modal-btns">
    <button class="btn btn-ghost" onclick="document.getElementById('settings-modal').classList.remove('open')">Close</button>
  </div>
</div>
</div>

<!-- Activity modal -->
<div class="modal-overlay" id="activity-modal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="act-modal" onclick="event.stopPropagation()">
  <h3 id="act-modal-title">Add Lesson</h3>
  <input type="hidden" id="act-id">
  <input type="hidden" id="act-day">
  <div class="form-group">
    <label>Subject</label>
    <select id="act-area">
      <option value="English">English</option>
      <option value="Mathematics">Mathematics</option>
      <option value="Science">Science</option>
      <option value="History">History</option>
      <option value="Geography">Geography</option>
      <option value="Art & Design">Art & Design</option>
      <option value="PE">PE</option>
      <option value="Music">Music</option>
      <option value="Computing">Computing</option>
      <option value="RE">RE</option>
      <option value="PSHE">PSHE</option>
      <option value="MFL">MFL</option>
    </select>
  </div>
  <div class="form-group">
    <label>Lesson Title *</label>
    <input type="text" id="act-title" placeholder="e.g. Introduction to fractions">
  </div>
  <div class="form-group">
    <label>Learning Objective</label>
    <textarea id="act-role" placeholder="By the end of this lesson, children will be able to…"></textarea>
  </div>
  <div class="form-group">
    <label style="display:flex;justify-content:space-between;align-items:center">
      Resources / NC Reference
      <button type="button" onclick="planOpenTwinkl()"
        style="font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:#00b3e1;color:#fff;cursor:pointer;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px">
        <img src="https://www.twinkl.co.uk/favicon.ico" width="11" height="11" alt="">
        Search Twinkl
      </button>
    </label>
    <input type="text" id="act-resources" placeholder="e.g. whiteboards, KS2 NC: Number — fractions">
    <div id="plan-twinkl-attached" style="margin-top:6px"></div>
  </div>
  <div class="form-group">
    <label>✨ AI generate lesson idea</label>
    <button class="btn btn-ghost" id="act-ai-btn" style="font-size:.82rem" onclick="aiSingleActivity()">Generate for this subject</button>
    <div id="act-ai-result" style="display:none;margin-top:8px;background:#0f172a;border:1px solid #e0782033;border-radius:8px;padding:10px;font-size:.82rem;color:#f1f5f9"></div>
  </div>
  <div class="modal-btns">
    <button class="btn btn-ghost" onclick="document.getElementById('activity-modal').classList.remove('open')">Cancel</button>
    <button class="btn btn-primary" onclick="saveActivity()">Save</button>
  </div>
</div>
</div>

<script>
const NC_SUBJECTS = ['English','Mathematics','Science','History','Geography','Art & Design','PE','Music','Computing','RE','PSHE','MFL'];
const TERMS = ['Autumn 1','Autumn 2','Spring 1','Spring 2','Summer 1','Summer 2'];
const DAYS = ['monday','tuesday','wednesday','thursday','friday'];
const DAY_COLOURS = {monday:'mon',tuesday:'tue',wednesday:'wed',thursday:'thu',friday:'fri'};

const SUBJ_DOT = {
  'English':'#4a9abf','Mathematics':'#e07820','Science':'#22c55e','History':'#a855f7',
  'Geography':'#14b8a6','Art & Design':'#ec4899','PE':'#f59e0b','Music':'#06b6d4',
  'Computing':'#6366f1','RE':'#f97316','PSHE':'#84cc16','MFL':'#8b5cf6'
};

let rooms = [], currentRoom = null;
let currentWeek = getMonday(new Date());
let weekActivities = {}, medTermData = { learning_intentions:{}, key_vocab:{} };

function getMonday(d) {
  const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
  const m = new Date(d); m.setDate(d.getDate()+diff);
  return m.toISOString().slice(0,10);
}
function formatWeek(w) {
  const d = new Date(w+'T00:00:00'), e = new Date(d); e.setDate(d.getDate()+4);
  return `w/c ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${e.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('wren:ready', async function() {
  rooms = await Wren.api('/api/staff/rooms').catch(() => []);
  const sel = document.getElementById('room-sel');
  rooms.forEach(r => { const o = document.createElement('option'); o.value = r.id; o.textContent = r.name; sel.appendChild(o); });
  if (rooms.length) { sel.value = rooms[0].id; currentRoom = rooms[0]; }
  document.getElementById('week-label').textContent = formatWeek(currentWeek);
  document.getElementById('week-date').value = currentWeek;
  buildLongTermGrid();
  buildMediumTermAreas();
  buildWeekDays();
  await loadCurrentTab();
});

function onRoomChange() {
  const id = parseInt(document.getElementById('room-sel').value);
  currentRoom = rooms.find(r => r.id === id) || null;
  loadCurrentTab();
}

let activeTab = 'long-term';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.plan-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  loadCurrentTab();
}
async function loadCurrentTab() {
  if (!currentRoom) return;
  if (activeTab === 'long-term') await loadLongTerm();
  if (activeTab === 'medium-term') await loadMediumTerm();
  if (activeTab === 'weekly') await loadWeeklyActivities();
}

// Long term
function buildLongTermGrid() {
  const cols = 1 + TERMS.length;
  document.getElementById('lt-grid').style.gridTemplateColumns = `180px repeat(${TERMS.length},1fr)`;
  let html = '<div class="lt-header"></div>';
  TERMS.forEach(t => html += `<div class="lt-header">${esc(t)}</div>`);
  NC_SUBJECTS.forEach(subj => {
    html += `<div class="lt-subject"><div class="lt-subj-dot" style="background:${SUBJ_DOT[subj]||'#4a9abf'}"></div>${esc(subj)}</div>`;
    TERMS.forEach(term => {
      html += `<div class="lt-cell"><textarea id="lt-${CSS.escape(subj)}-${CSS.escape(term)}" placeholder="Unit title…" onblur="autoSaveLtCell('${esc(subj)}','${esc(term)}',this.value)"></textarea><div><button class="lt-ai-btn" onclick="suggestUnit('${esc(subj)}','${esc(term)}')">✨ Suggest</button></div></div>`;
    });
  });
  document.getElementById('lt-grid').innerHTML = html;
}

async function loadLongTerm() {
  if (!currentRoom) return;
  const year = document.getElementById('lt-year').value;
  const rows = await Wren.api(`/api/planning/long-term?room_id=${currentRoom.id}&year=${year}`).catch(() => []);
  const data = {};
  rows.forEach(r => { data[r.term_name] = r.eyfs_grid || {}; });
  NC_SUBJECTS.forEach(subj => {
    TERMS.forEach(term => {
      const el = document.getElementById(`lt-${CSS.escape(subj)}-${CSS.escape(term)}`);
      if (el) el.value = data[term]?.[subj] || '';
    });
  });
}

async function autoSaveLtCell(subj, term, text) {
  if (!currentRoom || !text.trim()) return;
  Wren.api('/api/planning/term-cell', { method:'POST', body:{ room_id:currentRoom.id, term, year:document.getElementById('lt-year').value, area:subj, text } }).catch(()=>{});
}

async function saveLongTerm() {
  if (!currentRoom) { Wren.toast('Select a year group first','warning'); return; }
  const year = document.getElementById('lt-year').value;
  const saves = [];
  NC_SUBJECTS.forEach(subj => {
    TERMS.forEach(term => {
      const text = document.getElementById(`lt-${CSS.escape(subj)}-${CSS.escape(term)}`)?.value?.trim() || '';
      if (text) saves.push(Wren.api('/api/planning/term-cell',{method:'POST',body:{room_id:currentRoom.id,term,year,area:subj,text}}));
    });
  });
  await Promise.all(saves).catch(()=>{});
  Wren.toast('Long-term plan saved ✓','success');
}

async function suggestUnit(subj, term) {
  if (!currentRoom) return;
  const btn = event.target; btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:10px;height:10px;border:2px solid #4a9abf44;border-top-color:#4a9abf;border-radius:50%;animation:spin .6s linear infinite"></span>';
  try {
    const data = await Wren.api('/api/planning/ai-long-term-suggest',{method:'POST',body:{room_id:currentRoom.id,term,eyfs_area:subj}});
    const el = document.getElementById(`lt-${CSS.escape(subj)}-${CSS.escape(term)}`);
    if (el && data.suggestions?.length) { el.value=data.suggestions[0]; autoSaveLtCell(subj,term,data.suggestions[0]); }
    if (data.suggestions?.length) Wren.toast(data.suggestions.join(' | '),'info');
  } catch(e){ Wren.toast('AI unavailable','error'); }
  finally{ btn.disabled=false; btn.innerHTML='✨ Suggest'; }
}

// Medium term
function buildMediumTermAreas() {
  document.getElementById('mt-areas').innerHTML = NC_SUBJECTS.map(subj => `
    <div class="mt-area-block" id="mta-${CSS.escape(subj)}">
      <div class="mt-area-header" onclick="toggleMt('${esc(subj)}')">
        <div class="mt-area-title"><div class="lt-subj-dot" style="background:${SUBJ_DOT[subj]||'#4a9abf'}"></div>${esc(subj)}</div>
        <span style="color:#64748b;transition:.2s">▼</span>
      </div>
      <div class="mt-area-body">
        <ul class="mt-intentions" id="mti-${CSS.escape(subj)}"></ul>
        <button class="add-intention-btn" onclick="addObj('${esc(subj)}')">+ Add learning objective</button>
        <div class="mt-vocab-row">
          <span style="font-size:.75rem;color:#64748b;white-space:nowrap;min-width:100px">Key vocabulary:</span>
          <input type="text" class="mt-vocab-input" id="mtv-${CSS.escape(subj)}" placeholder="word1, word2…">
        </div>
      </div>
    </div>`).join('');
}

let medData = { learning_intentions:{}, key_vocab:{} };

function toggleMt(subj) { document.getElementById('mta-'+CSS.escape(subj))?.classList.toggle('collapsed'); }

function renderObjs(subj, objs) {
  const ul = document.getElementById('mti-'+CSS.escape(subj));
  if (!ul) return;
  ul.innerHTML = (objs||[]).map((o,i) => `<li class="mt-intention"><input type="text" value="${esc(o)}" placeholder="Learning objective…"><button class="mt-intention-del" onclick="delObj('${esc(subj)}',${i})">✕</button></li>`).join('');
}

async function loadMediumTerm() {
  if (!currentRoom) return;
  const term = document.getElementById('mt-term').value, year = document.getElementById('mt-year').value;
  const data = await Wren.api(`/api/planning/medium-term?room_id=${currentRoom.id}&term=${encodeURIComponent(term)}&year=${year}`).catch(() => null);
  medData = data ? { learning_intentions: data.learning_intentions||{}, key_vocab: data.key_vocab||{} } : { learning_intentions:{}, key_vocab:{} };
  document.getElementById('mt-theme').value = data?.theme || '';
  NC_SUBJECTS.forEach(subj => {
    renderObjs(subj, medData.learning_intentions[subj] || []);
    const v = document.getElementById('mtv-'+CSS.escape(subj));
    if (v) v.value = medData.key_vocab[subj] || '';
  });
}

function addObj(subj) {
  if (!Array.isArray(medData.learning_intentions[subj])) medData.learning_intentions[subj] = [];
  medData.learning_intentions[subj].push('');
  renderObjs(subj, medData.learning_intentions[subj]);
}
function delObj(subj, idx) {
  if (!Array.isArray(medData.learning_intentions[subj])) return;
  medData.learning_intentions[subj].splice(idx,1); renderObjs(subj, medData.learning_intentions[subj]);
}

async function saveMediumTerm() {
  if (!currentRoom) { Wren.toast('Select a year group first','warning'); return; }
  const li={}, kv={};
  NC_SUBJECTS.forEach(subj => {
    const ul = document.getElementById('mti-'+CSS.escape(subj));
    li[subj] = ul ? [...ul.querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean) : [];
    const v = document.getElementById('mtv-'+CSS.escape(subj));
    kv[subj] = v?.value?.trim() || '';
  });
  await Wren.api('/api/planning/medium-term',{method:'POST',body:{room_id:currentRoom.id,term_name:document.getElementById('mt-term').value,academic_year:document.getElementById('mt-year').value,theme:document.getElementById('mt-theme').value.trim(),learning_intentions:li,key_vocab:kv}}).catch(e=>Wren.toast(e.message,'error'));
  Wren.toast('Unit plan saved ✓','success');
}

async function aiGenerateMediumTerm() {
  if (!currentRoom) { Wren.toast('Select a year group','warning'); return; }
  const theme = document.getElementById('mt-theme').value.trim();
  if (!theme) { Wren.toast('Enter a unit title first','warning'); return; }
  const btn = document.getElementById('mt-ai-btn'); btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:12px;height:12px;border:2px solid #4a9abf44;border-top-color:#4a9abf;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px"></span>Generating…';
  try {
    const data = await Wren.api('/api/planning/ai-medium-term',{method:'POST',body:{room_id:currentRoom.id,term_name:document.getElementById('mt-term').value,academic_year:document.getElementById('mt-year').value,theme}});
    medData = {learning_intentions:data.learning_intentions||{}, key_vocab:data.key_vocab||{}};
    NC_SUBJECTS.forEach(subj => {
      renderObjs(subj, medData.learning_intentions[subj]||[]);
      const v = document.getElementById('mtv-'+CSS.escape(subj));
      if (v) v.value = medData.key_vocab[subj]||'';
    });
    Wren.toast('Unit plan generated ✓','success');
  } catch(e){ Wren.toast('AI failed: '+e.message,'error'); }
  finally{ btn.disabled=false; btn.innerHTML='✨ AI Generate Unit Plan'; }
}

// Weekly
function buildWeekDays() {
  document.getElementById('days-grid').innerHTML = DAYS.map(day => {
    const cap = day.charAt(0).toUpperCase()+day.slice(1);
    return `<div class="day-col">
      <div class="day-header"><span class="day-header-name ${DAY_COLOURS[day]}">${cap}</span></div>
      <div class="day-body" id="day-body-${day}"><div style="color:#475569;font-size:.78rem;text-align:center;padding:12px">No lessons yet</div></div>
      <div class="day-actions">
        <button class="day-add-btn" onclick="openActModal('${day}')">+ Add</button>
        <button class="day-ai-btn" id="ai-btn-${day}" onclick="aiPlanDay('${day}')">✨ AI plan</button>
      </div>
    </div>`;
  }).join('');
}

async function loadWeeklyActivities() {
  if (!currentRoom) return;
  weekActivities = await Wren.api(`/api/planning/activities?room_id=${currentRoom.id}&week=${currentWeek}`).catch(()=>({}));
  renderWeekDays();
}

function renderWeekDays() {
  DAYS.forEach(day => {
    const body = document.getElementById('day-body-'+day);
    if (!body) return;
    const acts = weekActivities[day]||[];
    body.innerHTML = acts.length ? acts.map(a=>`
      <div class="activity-card${a.ai_generated?' ai-generated':''}">
        <div class="card-actions">
          <button class="card-btn" onclick="openActModalEdit(${JSON.stringify(a).replace(/"/g,'&quot;')})">✏️</button>
          <button class="card-btn del" onclick="deleteActivity(${a.id},'${day}')">🗑</button>
        </div>
        <span class="card-area-badge" style="background:${SUBJ_DOT[a.eyfs_area]||'#4a9abf'}22;color:${SUBJ_DOT[a.eyfs_area]||'#4a9abf'}">${esc(a.eyfs_area)}</span>
        <div class="card-title">${esc(a.activity_title)}</div>
        ${a.role_of_adult?`<div class="card-meta">🎯 ${esc(a.role_of_adult)}</div>`:''}
        ${a.resources?`<div class="card-meta">📦 ${esc(a.resources)}</div>`:''}
      </div>`).join('') : '<div style="color:#475569;font-size:.78rem;text-align:center;padding:12px">No lessons yet</div>';
  });
}

function changeWeek(delta) {
  const d=new Date(currentWeek+'T00:00:00'); d.setDate(d.getDate()+delta*7);
  currentWeek=d.toISOString().slice(0,10);
  document.getElementById('week-label').textContent=formatWeek(currentWeek);
  document.getElementById('week-date').value=currentWeek;
  if(currentRoom) loadWeeklyActivities();
}
function onWeekDateChange() {
  const val=document.getElementById('week-date').value;
  if(val){ currentWeek=getMonday(new Date(val+'T00:00:00')); document.getElementById('week-label').textContent=formatWeek(currentWeek); document.getElementById('week-date').value=currentWeek; if(currentRoom)loadWeeklyActivities(); }
}
async function deleteActivity(id,day) {
  if(!confirm('Delete this lesson?')) return;
  await Wren.api(`/api/planning/weekly/${id}`,{method:'DELETE'}).catch(()=>{});
  weekActivities[day]=(weekActivities[day]||[]).filter(a=>a.id!==id); renderWeekDays();
  Wren.toast('Deleted ✓');
}
async function aiPlanDay(day) {
  if(!currentRoom){Wren.toast('Select a year group','warning');return;}
  const btn=document.getElementById('ai-btn-'+day); btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:10px;height:10px;border:2px solid #e0782044;border-top-color:#e07820;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px"></span>Planning…';
  const d=new Date(currentWeek+'T00:00:00'); d.setDate(d.getDate()+DAYS.indexOf(day));
  try {
    const saved=await Wren.api('/api/planning/ai-day',{method:'POST',body:{room_id:currentRoom.id,date:d.toISOString().slice(0,10)}});
    weekActivities[day]=[...(weekActivities[day]||[]),...saved]; renderWeekDays();
    Wren.toast(`✨ ${saved.length} lessons generated`,'success');
  } catch(e){Wren.toast('AI failed: '+e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='✨ AI plan';}
}

function openActModal(day) {
  document.getElementById('act-modal-title').textContent='Add Lesson — '+day.charAt(0).toUpperCase()+day.slice(1);
  ['act-id','act-title','act-role','act-resources'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('act-day').value=day;
  document.getElementById('act-area').value='English';
  document.getElementById('act-ai-result').style.display='none';
  const pt = document.getElementById('plan-twinkl-attached'); if(pt) pt.innerHTML='';
  document.getElementById('activity-modal').classList.add('open');
}
function openActModalEdit(a) {
  try {
    const data=typeof a==='string'?JSON.parse(a.replace(/&quot;/g,'"')):a;
    document.getElementById('act-modal-title').textContent='Edit Lesson';
    document.getElementById('act-id').value=data.id;
    document.getElementById('act-day').value=data.day;
    document.getElementById('act-area').value=data.eyfs_area||'English';
    document.getElementById('act-title').value=data.activity_title||'';
    document.getElementById('act-role').value=data.role_of_adult||'';
    document.getElementById('act-resources').value=data.resources||'';
    document.getElementById('act-ai-result').style.display='none';
    const pt = document.getElementById('plan-twinkl-attached'); if(pt) pt.innerHTML='';
    document.getElementById('activity-modal').classList.add('open');
    if(data.id) loadPlanTwinklResources(data.id);
  }catch(e){}
}
async function saveActivity() {
  const title=document.getElementById('act-title').value.trim();
  if(!title||!currentRoom){Wren.toast('Title and year group required','warning');return;}
  const id=document.getElementById('act-id').value, day=document.getElementById('act-day').value;
  const body={room_id:currentRoom.id,week_commencing:currentWeek,day,eyfs_area:document.getElementById('act-area').value,activity_title:title,role_of_adult:document.getElementById('act-role').value.trim()||null,resources:document.getElementById('act-resources').value.trim()||null,eyfs_areas:[document.getElementById('act-area').value]};
  try {
    let saved;
    if(id){saved=await Wren.api(`/api/planning/weekly/${id}`,{method:'PATCH',body});const idx=(weekActivities[day]||[]).findIndex(a=>a.id===parseInt(id));if(idx!==-1)weekActivities[day][idx]=saved;}
    else{saved=await Wren.api('/api/planning/weekly',{method:'POST',body});if(!weekActivities[day])weekActivities[day]=[];weekActivities[day].push(saved);}
    renderWeekDays();
    document.getElementById('activity-modal').classList.remove('open');
    Wren.toast('Saved ✓','success');
  }catch(e){Wren.toast('Failed: '+e.message,'error');}
}
async function aiSingleActivity() {
  if(!currentRoom) return;
  const area=document.getElementById('act-area').value;
  const btn=document.getElementById('act-ai-btn'); btn.disabled=true;
  try {
    const data=await Wren.api('/api/planning/ai-activity',{method:'POST',body:{eyfs_area:area,room_id:currentRoom.id}});
    document.getElementById('act-title').value=data.activity_title||'';
    document.getElementById('act-role').value=data.role_of_adult||'';
    document.getElementById('act-resources').value=data.resources||'';
    const r=document.getElementById('act-ai-result'); r.style.display='block'; r.textContent=data.activity_description||'';
  }catch(e){Wren.toast('AI unavailable','error');}
  finally{btn.disabled=false;}
}

function openSettings(){document.getElementById('settings-modal').classList.add('open');}

// ── Twinkl integration ──────────────────────────────────────────────────────

let planTwinklModal = null;

function planOpenTwinkl() {
  if (!window.TwinklModal) { Wren.toast('Twinkl not available', 'error'); return; }
  if (!planTwinklModal) {
    planTwinklModal = new TwinklModal({ onAttach: onPlanTwinklAttach });
  }
  const actId = document.getElementById('act-id').value;
  const title = document.getElementById('act-title').value.trim();
  planTwinklModal.open({
    entityType: 'lesson_plan',
    entityId: actId || '__pending__',
    title,
  });
}

function onPlanTwinklAttach(resource) {
  const list = document.getElementById('plan-twinkl-attached');
  const actId = document.getElementById('act-id').value;
  if (actId) {
    loadPlanTwinklResources(parseInt(actId));
  } else if (list) {
    TwinklModal.renderAttached(list, [resource]);
  }
  Wren.toast('Twinkl resource attached', 'success');
}

async function loadPlanTwinklResources(actId) {
  if (!actId) return;
  try {
    const data = await Wren.api(`/api/twinkl/resources?entity_type=lesson_plan&entity_id=${actId}`);
    const list = document.getElementById('plan-twinkl-attached');
    if (list && data.length) {
      TwinklModal.renderAttached(list, data, (id) => loadPlanTwinklResources(actId));
    } else if (list) {
      list.innerHTML = '';
    }
  } catch { /* non-critical */ }
}
