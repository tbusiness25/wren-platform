<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="primary">
  <title>Attendance — Parent Portal</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header"><div><div class="page-title">Attendance</div><div class="page-subtitle">Your child's attendance record</div></div></div>
  <div id="att-content"><div class="empty-state">Loading…</div></div>
</div>
<script>
async function init() {
  const params = new URLSearchParams(window.location.search);
  const childId = params.get('child_id') || 1;
  const data = await Wren.api(`/api/attendance-register?pupil_id=${childId}`).catch(()=>[]);
  if (!data.length) { document.getElementById('att-content').innerHTML = '<div class="empty-state">No attendance records found</div>'; return; }
  const total = data.length, present = data.filter(r => r.am_status==='present'||r.pm_status==='present').length;
  const pct = total ? Math.round(present/total*100) : 0;
  document.getElementById('att-content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px">
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
        <div style="font-size:32px;font-weight:700;color:${pct>=96?'#4ade80':pct>=90?'#facc15':'#f87171'}">${pct}%</div>
        <div style="font-size:13px;color:var(--text-muted)">Attendance Rate</div>
      </div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
        <div style="font-size:32px;font-weight:700">${total}</div>
        <div style="font-size:13px;color:var(--text-muted)">Days Recorded</div>
      </div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
        <div style="font-size:32px;font-weight:700;color:#f87171">${total-present}</div>
        <div style="font-size:13px;color:var(--text-muted)">Absences</div>
      </div>
    </div>
    <div style="color:var(--text-muted);font-size:13px;text-align:center">Detailed register — recent sessions shown. Contact school to report absence.</div>`;
}
document.addEventListener('wren:ready', init);
</script>
</body>
</html>
