<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>AI Demo — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/_shared/wren-demo-banner.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .ai-demo-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-top:24px; }
    .ai-task-btn {
      background:var(--card-bg); border:1px solid var(--border); border-radius:14px;
      padding:20px 18px; cursor:pointer; text-align:left; color:var(--text);
      font-family:inherit; font-size:.88rem; transition:border-color .15s,background .15s;
      display:flex; flex-direction:column; gap:8px;
    }
    .ai-task-btn:hover:not(:disabled) { border-color:#4a9abf; background:rgba(74,154,191,.07); }
    .ai-task-btn:disabled { opacity:.45; cursor:not-allowed; }
    .ai-task-icon { font-size:1.6rem; line-height:1; }
    .ai-task-label { font-weight:700; font-size:.9rem; }
    .ai-task-sub { font-size:.76rem; color:var(--text-muted); line-height:1.45; }
    .ai-output-wrap {
      margin-top:28px; background:rgba(0,0,0,.25); border:1px solid var(--border);
      border-radius:14px; padding:24px; min-height:120px; display:none;
    }
    .ai-output-wrap.active { display:block; }
    .ai-output-text { font-size:.92rem; line-height:1.8; color:var(--text); white-space:pre-wrap; }
    .ai-cursor { display:inline-block; width:2px; height:1em; background:#4a9abf; animation:blink .7s infinite; vertical-align:text-bottom; margin-left:1px; }
    .ai-spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(74,154,191,.3); border-top-color:#4a9abf; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    .ai-meta { font-size:.75rem; color:var(--text-muted); margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-family:monospace; }
    .ai-tier-note { display:inline-flex; align-items:center; gap:6px; font-size:.76rem; color:var(--text-muted); background:rgba(74,154,191,.06); border:1px solid rgba(74,154,191,.2); border-radius:8px; padding:6px 12px; margin-bottom:20px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">🤖 AI Speed Demo</div>
    <div class="page-subtitle">Try Wren AI — use the Demo Controls badge (top-right) to switch hardware tiers</div>
  </div>

  <div class="ai-tier-note">
    🐦 <strong>Tip:</strong> Click the <strong>Demo</strong> badge (top-right) to switch between Tier 1 / 2 / 3 — then run any task below to feel the speed difference
  </div>

  <div class="ai-demo-grid" id="ai-task-grid">
    <button class="ai-task-btn" data-task="report" data-input='{"name":"Aisha","year":"Year 11","strengths":"analytical writing, group discussions, independent research","dev":"time management under exam conditions, concise paragraph structure"}'>
      <span class="ai-task-icon">📋</span>
      <span class="ai-task-label">Write a parent report</span>
      <span class="ai-task-sub">Aisha, Year 11 — end-of-year GCSE progress</span>
    </button>
    <button class="ai-task-btn" data-task="behaviour" data-input='{"scenario":"A Year 9 student has been persistently disrupting English lessons, refusing to follow teacher instructions, and has made a derogatory comment toward another pupil in front of the class"}'>
      <span class="ai-task-icon">📊</span>
      <span class="ai-task-label">Behaviour incident write-up</span>
      <span class="ai-task-sub">Year 9 — persistent disruption, restorative approach</span>
    </button>
    <button class="ai-task-btn" data-task="send" data-input='{"need":"Year 10 pupil with autism spectrum condition (Level 1), significant anxiety in exam situations, strong written ability but struggles with verbal contributions and group work"}'>
      <span class="ai-task-icon">💜</span>
      <span class="ai-task-label">SEND intervention plan</span>
      <span class="ai-task-sub">Year 10 — ASC, exam anxiety, social interaction</span>
    </button>
    <button class="ai-task-btn" data-task="cover" data-input='{"subject":"KS4 English Literature","topic":"Power and Conflict poetry — comparing Exposure and Bayonet Charge","duration":"60 minute"}'>
      <span class="ai-task-icon">📚</span>
      <span class="ai-task-label">Cover lesson plan</span>
      <span class="ai-task-sub">KS4 English — Power and Conflict poetry comparison</span>
    </button>
  </div>

  <div class="ai-output-wrap" id="ai-output">
    <div class="ai-output-text" id="ai-text"></div>
    <div class="ai-meta" id="ai-meta" style="display:none"></div>
  </div>
</div>

<script src="/_shared/wren-demo-banner.js" defer></script>
<script>
(function () {
  let busy = false;

  document.getElementById('ai-task-grid').addEventListener('click', async (e) => {
    const btn = e.target.closest('.ai-task-btn');
    if (!btn || busy) return;

    const task = btn.dataset.task;
    const input = JSON.parse(btn.dataset.input || '{}');
    const tier = (window.WrenDemo?.getTier) ? window.WrenDemo.getTier() : '2';

    busy = true;
    document.querySelectorAll('.ai-task-btn').forEach(b => b.disabled = true);

    const outputWrap = document.getElementById('ai-output');
    const textEl = document.getElementById('ai-text');
    const metaEl = document.getElementById('ai-meta');

    outputWrap.classList.add('active');
    textEl.innerHTML = '<span class="ai-spinner"></span><em style="color:var(--text-muted)">Thinking… (Tier ' + tier + ' hardware simulation)</em>';
    metaEl.style.display = 'none';

    const t0 = Date.now();
    let accumulated = '';
    let tokens = 0;
    let firstToken = false;

    try {
      const resp = await fetch('/api/demo-ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + (sessionStorage.getItem('wrenToken') || sessionStorage.getItem('wren_token') || '') },
        body: JSON.stringify({ tier, task, input })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        textEl.innerHTML = '<span style="color:var(--danger)">' + (err.error || 'AI unavailable — try again shortly') + '</span>';
        return;
      }

      const reader = resp.body.getReader();
      const dec = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const raw = dec.decode(value, { stream: true });
        for (const line of raw.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const d = line.slice(6).trim();
          if (d === '[DONE]') continue;
          try {
            const content = JSON.parse(d).choices?.[0]?.delta?.content;
            if (content) {
              if (!firstToken) {
                firstToken = true;
                textEl.textContent = '';
              }
              accumulated += content;
              tokens++;
              textEl.innerHTML = accumulated.replace(/\n/g, '<br>') + '<span class="ai-cursor"></span>';
            }
          } catch (_) {}
        }
      }

      textEl.innerHTML = accumulated.replace(/\n/g, '<br>');
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
      const tps = tokens > 0 ? Math.round(tokens / (Date.now() - t0) * 1000) : 0;
      metaEl.textContent = `Generated in ${elapsed}s · ~${tps} tok/s · Simulating Tier ${tier} hardware`;
      metaEl.style.display = 'block';

    } catch (e) {
      textEl.innerHTML = '<span style="color:var(--danger)">Connection error — ' + e.message + '</span>';
    } finally {
      busy = false;
      document.querySelectorAll('.ai-task-btn').forEach(b => b.disabled = false);
    }
  });
})();
</script>
</body>
</html>
