<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>Assessments — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .p8-pos{color:#166534;font-weight:700;} .p8-neg{color:#991b1b;font-weight:700;}
    .grade-badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:12px;font-weight:600;}
    .grade-9,.grade-8{background:#dbeafe;color:#1e40af;}
    .grade-7,.grade-6,.grade-5{background:#dcfce7;color:#166534;}
    .grade-4{background:#fef9c3;color:#854d0e;}
    .grade-3,.grade-2,.grade-1,.grade-U{background:#fee2e2;color:#991b1b;}
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div><div class="page-title">Assessments</div><div class="page-subtitle">KS3 / KS4 / KS5 Markbook</div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="exportCSV()">Export</button>
      <button class="btn btn-primary" onclick="openNewAssessment()">+ Record Assessment</button>
    </div>
  </div>

  <div style="display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border)">
    <button class="tab-btn active" id="tab-ks3" onclick="showTab('ks3')">KS3</button>
    <button class="tab-btn" id="tab-ks4" onclick="showTab('ks4')">KS4 / GCSE</button>
    <button class="tab-btn" id="tab-ks5" onclick="showTab('ks5')">KS5 / A Level</button>
    <button class="tab-btn" id="tab-p8" onclick="showTab('p8')">Progress 8</button>
    <button class="tab-btn" id="tab-overview" onclick="showTab('overview')">Overview</button>
  </div>

  <div class="filter-bar" style="margin-bottom:16px">
    <select class="form-control" id="filter-class" onchange="loadAssessments()" style="width:150px"><option value="">All Forms</option></select>
    <select class="form-control" id="filter-subject" onchange="loadAssessments()" style="width:150px">
      <option value="">All Subjects</option>
      <option value="English Language">English Language</option><option value="English Literature">English Literature</option>
      <option value="Maths">Maths</option><option value="Science">Science</option>
      <option value="Biology">Biology</option><option value="Chemistry">Chemistry</option><option value="Physics">Physics</option>
      <option value="History">History</option><option value="Geography">Geography</option>
      <option value="French">French</option><option value="Spanish">Spanish</option>
      <option value="Computer Science">Computer Science</option><option value="Art">Art</option><option value="Music">Music</option><option value="PE">PE</option>
    </select>
    <select class="form-control" id="filter-term" onchange="loadAssessments()" style="width:140px">
      <option value="">All Terms</option>
      <option value="Autumn 1">Autumn 1</option><option value="Autumn 2">Autumn 2</option>
      <option value="Spring 1">Spring 1</option><option value="Spring 2">Spring 2</option>
      <option value="Summer 1">Summer 1</option><option value="Summer 2">Summer 2</option>
    </select>
    <select class="form-control" id="filter-ay" onchange="loadAssessments()" style="width:140px">
      <option value="2025-2026">2025–2026</option><option value="2024-2025">2024–2025</option>
    </select>
  </div>

  <div id="pane-ks3"><div id="ks3-area"><div class="loading-state"><div class="spinner"></div><span>Loading...</span></div></div></div>
  <div id="pane-ks4" style="display:none"><div id="ks4-area"><div class="empty-state">KS4 / GCSE data</div></div></div>
  <div id="pane-ks5" style="display:none"><div id="ks5-area"><div class="empty-state">KS5 / A Level data</div></div></div>
  <div id="pane-p8" style="display:none">
    <div style="margin-bottom:12px;display:flex;gap:12px;align-items:center">
      <div class="form-group" style="margin:0"><label class="form-label">Year 11 Form</label>
        <select class="form-control" id="p8-class" style="width:150px"><option value="">All Year 11</option></select>
      </div>
      <div style="margin-top:20px"><button class="btn btn-primary" onclick="loadP8()">Calculate Progress 8</button></div>
    </div>
    <div id="p8-area"><div class="empty-state">Progress 8 uses GCSE-type assessments for Year 11 pupils. Record assessments with type "gcse" to see results here.</div></div>
  </div>
  <div id="pane-overview" style="display:none"><div id="overview-area"><div class="loading-state"><div class="spinner"></div><span>Loading...</span></div></div></div>
</div>

<div id="assess-modal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content" style="max-width:480px">
    <div class="modal-header"><div class="modal-title">Record Assessment</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Pupil *</label>
        <select class="form-control" id="new-child-id"><option value="">Select pupil...</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Subject *</label>
          <select class="form-control" id="new-subject">
            <option value="English Language">English Language</option><option value="English Literature">English Literature</option>
            <option value="Maths">Maths</option><option value="Science">Science</option>
            <option value="History">History</option><option value="Geography">Geography</option>
            <option value="French">French</option><option value="Spanish">Spanish</option>
            <option value="Computer Science">Computer Science</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-control" id="new-type">
            <option value="formative">Formative</option><option value="summative">Summative</option>
            <option value="gcse">GCSE</option><option value="a_level">A Level</option>
            <option value="mock">Mock Exam</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Grade *</label>
          <input class="form-control" id="new-grade" placeholder="9–1, A*–U, or %">
        </div>
        <div class="form-group"><label class="form-label">Score</label>
          <input class="form-control" id="new-score" type="number" placeholder="Raw score">
        </div>
        <div class="form-group"><label class="form-label">Term</label>
          <select class="form-control" id="new-term">
            <option value="Autumn 1">Autumn 1</option><option value="Autumn 2">Autumn 2</option>
            <option value="Spring 1">Spring 1</option><option value="Spring 2">Spring 2</option>
            <option value="Summer 1">Summer 1</option><option value="Summer 2">Summer 2</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="new-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAssessment()">Save</button>
    </div>
  </div>
</div>

<script>
let allAssessments=[];
let allChildren=[];
let currentTab='ks3';
document.addEventListener('wren:ready',init);
async function init(){await loadChildren();await loadAssessments();}

async function loadChildren(){
  try{
    const res=await fetch('/api/children',{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    allChildren=await res.json();
    const forms=[...new Set(allChildren.map(c=>c.class_group||c.form_group).filter(Boolean))].sort();
    ['filter-class','p8-class'].forEach(id=>{
      const sel=document.getElementById(id);
      if(sel) sel.innerHTML='<option value="">'+( id==='filter-class'?'All Forms':'All Year 11')+'</option>'+forms.map(f=>`<option value="${f}">${f}</option>`).join('');
    });
    document.getElementById('new-child-id').innerHTML='<option value="">Select pupil...</option>'+
      allChildren.sort((a,b)=>a.last_name.localeCompare(b.last_name))
        .map(c=>`<option value="${c.id}">${c.last_name}, ${c.first_name} (Yr${c.year_group||'?'})</option>`).join('');
  }catch(e){}
}

async function loadAssessments(){
  const cls=document.getElementById('filter-class').value;
  const subj=document.getElementById('filter-subject').value;
  const term=document.getElementById('filter-term').value;
  const ay=document.getElementById('filter-ay').value;
  try{
    let url='/api/assessments-secondary?';
    if(cls) url+='class_group='+encodeURIComponent(cls)+'&';
    if(subj) url+='subject='+encodeURIComponent(subj)+'&';
    if(term) url+='term='+encodeURIComponent(term)+'&';
    if(ay) url+='academic_year='+encodeURIComponent(ay)+'&';
    const res=await fetch(url,{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    allAssessments=await res.json();
    renderCurrentTab();
  }catch(e){}
}

function showTab(tab){
  currentTab=tab;
  ['ks3','ks4','ks5','p8','overview'].forEach(t=>{
    document.getElementById('pane-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  renderCurrentTab();
}

function renderCurrentTab(){
  if(currentTab==='ks3') renderKS('ks3-area',['7','8','9']);
  else if(currentTab==='ks4') renderKS('ks4-area',['10','11']);
  else if(currentTab==='ks5') renderKS('ks5-area',['12','13']);
  else if(currentTab==='overview') renderOverview();
}

function gradeBadge(g){
  if(!g) return '—';
  const n=parseInt(g);
  if(!isNaN(n)&&n>=1&&n<=9) return `<span class="grade-badge grade-${n}">${g}</span>`;
  return `<span class="grade-badge">${g}</span>`;
}

function renderKS(areaId,years){
  const data=allAssessments.filter(a=>years.includes(String(a.year_group)));
  const area=document.getElementById(areaId);
  if(!data.length){area.innerHTML='<div class="empty-state">No assessment data for this key stage</div>';return;}
  area.innerHTML='<div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Form</th><th>Year</th><th>Subject</th><th>Term</th><th>Grade</th><th>Score</th><th>Type</th><th>Assessed By</th></tr></thead><tbody>'+
    data.map(a=>`<tr><td><strong>${a.first_name} ${a.last_name}</strong></td><td>${a.class_group||'—'}</td><td>${a.year_group||'—'}</td><td>${a.subject}</td><td>${a.term||'—'}</td><td>${gradeBadge(a.grade)}</td><td>${a.score||'—'}</td><td style="font-size:12px;color:var(--text-muted)">${a.assessment_type||'—'}</td><td style="font-size:12px;color:var(--text-muted)">${a.assessed_by_name||'—'}</td></tr>`).join('')+
    '</tbody></table></div>';
}

function renderOverview(){
  const area=document.getElementById('overview-area');
  if(!allAssessments.length){area.innerHTML='<div class="empty-state">No data</div>';return;}
  const subjects=[...new Set(allAssessments.map(a=>a.subject))].sort();
  const pupils={};
  allAssessments.forEach(a=>{
    if(!pupils[a.child_id]) pupils[a.child_id]={first_name:a.first_name,last_name:a.last_name,class_group:a.class_group,year_group:a.year_group,grades:{}};
    pupils[a.child_id].grades[a.subject]=a.grade;
  });
  const rows=Object.values(pupils).sort((a,b)=>a.last_name.localeCompare(b.last_name));
  area.innerHTML='<div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Form</th><th>Yr</th>'+subjects.map(s=>`<th>${s}</th>`).join('')+'</tr></thead><tbody>'+
    rows.map(p=>`<tr><td><strong>${p.first_name} ${p.last_name}</strong></td><td>${p.class_group||'—'}</td><td>${p.year_group||'—'}</td>`+subjects.map(s=>`<td>${gradeBadge(p.grades[s])}</td>`).join('')+'</tr>').join('')+
    '</tbody></table></div>';
}

async function loadP8(){
  const cls=document.getElementById('p8-class').value;
  const ay=document.getElementById('filter-ay').value||'2025-2026';
  try{
    let url='/api/assessments-secondary/progress8?academic_year='+encodeURIComponent(ay);
    if(cls) url+='&class_group='+encodeURIComponent(cls);
    const res=await fetch(url,{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    const rows=await res.json();
    const area=document.getElementById('p8-area');
    if(!rows.length){area.innerHTML='<div class="empty-state">No Year 11 GCSE data found</div>';return;}
    const avg=(rows.reduce((s,r)=>s+r.p8_score,0)/rows.length).toFixed(2);
    area.innerHTML=`<div class="card" style="padding:12px 16px;margin-bottom:16px;border-left:4px solid #2563eb"><strong>School Progress 8 Score: <span class="${parseFloat(avg)>=0?'p8-pos':'p8-neg'}">${avg}</span></strong> (${rows.length} pupils)</div>`+
      '<div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Form</th><th>P8 Score</th><th>Total Points</th></tr></thead><tbody>'+
      rows.map(r=>`<tr><td><strong>${r.first_name} ${r.last_name}</strong></td><td>${r.class_group||'—'}</td><td class="${r.p8_score>=0?'p8-pos':'p8-neg'}">${r.p8_score}</td><td>${r.total_points}</td></tr>`).join('')+
      '</tbody></table></div>';
  }catch(e){document.getElementById('p8-area').innerHTML='<div class="empty-state">Failed to load</div>';}
}

function openNewAssessment(){document.getElementById('assess-modal').style.display='flex';}
function closeModal(){document.getElementById('assess-modal').style.display='none';}

async function saveAssessment(){
  const childId=document.getElementById('new-child-id').value;
  const grade=document.getElementById('new-grade').value.trim();
  if(!childId||!grade){alert('Pupil and grade required');return;}
  try{
    const body={child_id:parseInt(childId),subject:document.getElementById('new-subject').value,grade,score:document.getElementById('new-score').value||null,assessment_type:document.getElementById('new-type').value,term:document.getElementById('new-term').value,notes:document.getElementById('new-notes').value.trim()||null,academic_year:document.getElementById('filter-ay').value||'2025-2026'};
    const res=await fetch('/api/assessments-secondary',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+sessionStorage.getItem('wren_token')},body:JSON.stringify(body)});
    if(!res.ok) throw new Error((await res.json()).error);
    closeModal();loadAssessments();
  }catch(e){alert('Error: '+e.message);}
}

function exportCSV(){
  const headers=['Name','Form','Year','Subject','Term','Grade','Score','Type'];
  const rows=allAssessments.map(a=>[a.first_name+' '+a.last_name,a.class_group||'',a.year_group||'',a.subject,a.term||'',a.grade,a.score||'',a.assessment_type||'']);
  const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='assessments.csv';a.click();
}
</script>
</body>
</html>
