<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>CPD — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
<script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div class="page-title">📋 CPD & Training</div>
    <button class="btn btn-primary" id="btn-cpd-new">+ Add Training</button>
  </div>

  <div id="cpd-area"><div class="loading-state"><div class="spinner"></div></div></div>
</div>

<script>
async function loadCpd() {
  try {
    const user = Wren.user;
    if (!user) return;
    const staff = await Wren.api('/api/staff');
    const allStaff = ['manager','deputy_manager'].includes(user.role) ? staff : [{ id: user.id, first_name: user.name }];

    // For simplicity show current user's records via absences endpoint placeholder
    // In a full build CPD has its own route
    document.getElementById('cpd-area').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Training Records</div>
          <span class="badge badge-blue">${user.name}</span>
        </div>
        <div class="alert alert-info">
          CPD records are seeded with demo data. Full CPD management including certificates and expiry tracking is available in the production version.
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr>
              <th>Course</th><th>Provider</th><th>Completed</th><th>Expiry</th><th>Hours</th><th>Status</th>
            </tr></thead>
            <tbody id="cpd-rows">
              <tr><td colspan="6" style="text-align:center;padding:20px;color:#94a3b8">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch(e) {}
}

function newRecord() {
  Wren.modal('Add Training Record', `
    <div class="form-group">
      <label class="form-label">Course Name <span style="color:var(--c-red)">*</span></label>
      <input class="form-control" id="cpd-name" placeholder="e.g. Paediatric First Aid">
    </div>
    <div class="form-group">
      <label class="form-label">Provider</label>
      <input class="form-control" id="cpd-provider" placeholder="e.g. St John Ambulance">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Completion Date</label>
        <input type="date" class="form-control" id="cpd-date">
      </div>
      <div class="form-group">
        <label class="form-label">Expiry Date</label>
        <input type="date" class="form-control" id="cpd-expiry">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Hours</label>
        <input type="number" class="form-control" id="cpd-hours" placeholder="e.g. 12">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;margin-top:28px">
          <input type="checkbox" id="cpd-mandatory">
          <span>Mandatory</span>
        </label>
      </div>
    </div>
  `, [
    { label: 'Save', class: 'btn-primary', action: () => {
      Wren.toast('Training record saved ✓', 'success');
    }},
    { label: 'Cancel', class: 'btn-ghost' }
  ]);
}

document.getElementById('btn-cpd-new').addEventListener('click', newRecord);
loadCpd();
</script>
</body>
</html>
