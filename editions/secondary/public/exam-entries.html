<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>Exam Entries — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .grade-9 { color:#4ade80; } .grade-8 { color:#86efac; } .grade-7 { color:#a3e635; }
    .grade-6 { color:#facc15; } .grade-5 { color:#fb923c; } .grade-4 { color:#f87171; }
    .grade-low { color:#94a3b8; }
    .grade-cell { font-weight:700;font-size:14px;text-align:center; }
    .exam-table { width:100%;border-collapse:collapse; }
    .exam-table th { background:var(--surface);padding:10px 12px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;text-align:left; }
    .exam-table td { padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px; }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div><div class="page-title">Exam Entries</div><div class="page-subtitle">GCSE predicted and mock grades</div></div>
    <div>
      <select class="btn btn-secondary" id="filter-yr">
        <option value="11">Year 11</option>
        <option value="10">Year 10</option>
        <option value="all">All years</option>
      </select>
    </div>
  </div>

  <div id="exam-content"><div class="empty-state">Loading…</div></div>
</div>
<script>
async function init() { load(); }

const _auth = () => ({ Authorization: 'Bearer ' + (sessionStorage.getItem('wrenToken') || sessionStorage.getItem('wren_token') || '') });

async function load() {
  const data = await fetch('/api/exam-entries', { headers: _auth() }).then(r=>r.json()).catch(()=>[]);
  if (!data.length) { document.getElementById('exam-content').innerHTML = '<div class="empty-state">No items yet</div>'; return; }
  const gradeClass = g => {
    if (!g) return 'grade-low';
    const n = parseInt(g);
    if (n >= 9) return 'grade-9';
    if (n >= 8) return 'grade-8';
    if (n >= 7) return 'grade-7';
    if (n >= 6) return 'grade-6';
    if (n >= 5) return 'grade-5';
    if (n >= 4) return 'grade-4';
    return 'grade-low';
  };
  document.getElementById('exam-content').innerHTML = `<div style="overflow-x:auto"><table class="exam-table">
    <thead><tr>
      <th>Pupil</th><th>Subject</th><th>Board</th><th>Qualification</th><th>Tier</th>
      <th>Target</th><th>Predicted</th><th>Mock</th><th>Final</th>
    </tr></thead>
    <tbody>${data.map(e => `<tr>
      <td>${e.pupil_name||'—'}</td>
      <td>${e.subject_name||'—'}</td>
      <td>${e.exam_board||'—'}</td>
      <td>${e.qualification||'—'}</td>
      <td>${e.tier||'—'}</td>
      <td class="grade-cell ${gradeClass(e.target_grade)}">${e.target_grade||'—'}</td>
      <td class="grade-cell ${gradeClass(e.predicted_grade)}">${e.predicted_grade||'—'}</td>
      <td class="grade-cell ${gradeClass(e.mock_grade)}">${e.mock_grade||'—'}</td>
      <td class="grade-cell ${gradeClass(e.final_grade)}">${e.final_grade||'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}
document.getElementById('filter-yr').addEventListener('change', load);
document.addEventListener('wren:ready', init);
</script>
</body>
</html>
