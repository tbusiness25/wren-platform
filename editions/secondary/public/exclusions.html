<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>Exclusions — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div><div class="page-title">Exclusions Log</div><div class="page-subtitle" id="subtitle">Fixed-term, lunchtime &amp; permanent exclusions</div></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="showTab('stats')">Stats</button>
      <button class="btn btn-primary" onclick="openNewEntry()">+ Log Exclusion</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px">
    <div class="stat-card amber"><span class="stat-value" id="stat-fixed">—</span><span class="stat-label">Fixed Term</span></div>
    <div class="stat-card red"><span class="stat-value" id="stat-perm">—</span><span class="stat-label">Permanent</span></div>
    <div class="stat-card grey" style="border-left:4px solid #94a3b8"><span class="stat-value" id="stat-days">—</span><span class="stat-label">Days Lost</span></div>
    <div class="stat-card blue"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Total</span></div>
  </div>

  <div style="display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border)">
    <button class="tab-btn active" id="tab-log" onclick="showTab('log')">Log</button>
    <button class="tab-btn" id="tab-stats" onclick="showTab('stats')">Pupil Stats</button>
  </div>

  <div class="filter-bar" style="margin-bottom:16px">
    <select class="form-control" id="filter-class" onchange="loadExclusions()" style="width:150px"><option value="">All Forms</option></select>
    <select class="form-control" id="filter-type" onchange="loadExclusions()" style="width:160px">
      <option value="">All Types</option>
      <option value="fixed_term">Fixed Term</option>
      <option value="permanent">Permanent</option>
      <option value="lunchtime">Lunchtime</option>
    </select>
    <input type="date" class="form-control" id="filter-from" onchange="loadExclusions()" style="width:150px">
    <input type="date" class="form-control" id="filter-to" onchange="loadExclusions()" style="width:150px">
  </div>

  <div id="pane-log"><div id="log-area"><div class="loading-state"><div class="spinner"></div><span>Loading...</span></div></div></div>
  <div id="pane-stats" style="display:none">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
      <div class="form-group" style="margin:0"><label class="form-label">From</label><input type="date" class="form-control" id="stats-from" style="width:160px"></div>
      <div style="margin-top:20px"><button class="btn btn-primary" onclick="loadStats()">Load Stats</button></div>
    </div>
    <div id="stats-area"><div class="empty-state">Select from date and load</div></div>
  </div>
</div>

<div id="excl-modal" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-content" style="max-width:480px">
    <div class="modal-header"><div class="modal-title">Log Exclusion</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Pupil *</label>
        <select class="form-control" id="new-child-id"><option value="">Select pupil...</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Date *</label><input type="date" class="form-control" id="new-date"></div>
        <div class="form-group"><label class="form-label">Type *</label>
          <select class="form-control" id="new-type">
            <option value="fixed_term">Fixed Term</option>
            <option value="lunchtime">Lunchtime</option>
            <option value="permanent">Permanent</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Days</label><input type="number" class="form-control" id="new-days" value="1" min="0.5" step="0.5"></div>
        <div class="form-group"><label class="form-label">Reinstatement Date</label><input type="date" class="form-control" id="new-reinstate"></div>
      </div>
      <div class="form-group"><label class="form-label">Reason *</label><textarea class="form-control" id="new-reason" rows="3" placeholder="Reason for exclusion..."></textarea></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" id="new-notes" rows="2"></textarea></div>
      <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="new-gov-review"> Governors' review required</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script>
let allExclusions=[];
let allChildren=[];
document.addEventListener('wren:ready',init);
async function init(){
  document.getElementById('new-date').value=new Date().toISOString().slice(0,10);
  await loadChildren();loadExclusions();
}
async function loadChildren(){
  try{
    const res=await fetch('/api/children',{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    allChildren=await res.json();
    const forms=[...new Set(allChildren.map(c=>c.class_group||c.form_group).filter(Boolean))].sort();
    document.getElementById('filter-class').innerHTML='<option value="">All Forms</option>'+forms.map(f=>`<option value="${f}">${f}</option>`).join('');
    document.getElementById('new-child-id').innerHTML='<option value="">Select pupil...</option>'+
      allChildren.sort((a,b)=>a.last_name.localeCompare(b.last_name))
        .map(c=>`<option value="${c.id}">${c.last_name}, ${c.first_name} (Yr${c.year_group||'?'})</option>`).join('');
  }catch(e){}
}
async function loadExclusions(){
  const cls=document.getElementById('filter-class').value;
  const type=document.getElementById('filter-type').value;
  const from=document.getElementById('filter-from').value;
  const to=document.getElementById('filter-to').value;
  try{
    let url='/api/exclusions?';
    if(cls) url+='class_group='+encodeURIComponent(cls)+'&';
    if(type) url+='type='+encodeURIComponent(type)+'&';
    if(from) url+='from='+from+'&';
    if(to) url+='to='+to+'&';
    const res=await fetch(url,{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    allExclusions=await res.json();
    updateStats(allExclusions);
    renderLog(allExclusions);
  }catch(e){document.getElementById('log-area').innerHTML='<div class="empty-state">Failed to load exclusions</div>';}
}
function updateStats(data){
  const fixed=data.filter(e=>e.type==='fixed_term');
  const perm=data.filter(e=>e.type==='permanent');
  document.getElementById('stat-fixed').textContent=fixed.length;
  document.getElementById('stat-perm').textContent=perm.length;
  document.getElementById('stat-days').textContent=fixed.reduce((s,e)=>s+parseFloat(e.days||0),0);
  document.getElementById('stat-total').textContent=data.length;
}
function renderLog(data){
  const area=document.getElementById('log-area');
  if(!data.length){area.innerHTML='<div class="empty-state">No exclusions found</div>';return;}
  const typeLabel={fixed_term:'Fixed Term',permanent:'Permanent',lunchtime:'Lunchtime'};
  const typeBadge={fixed_term:'badge-amber',permanent:'badge-red',lunchtime:'badge-grey'};
  area.innerHTML='<div class="table-wrapper"><table class="data-table"><thead><tr><th>Date</th><th>Pupil</th><th>Form</th><th>Type</th><th>Days</th><th>Reason</th><th>Reinstatement</th><th>Gov. Review</th><th>Logged By</th></tr></thead><tbody>'+
    data.map(e=>`<tr>
      <td style="white-space:nowrap">${e.date}</td>
      <td><strong>${e.first_name} ${e.last_name}</strong></td>
      <td>${e.class_group||'—'}</td>
      <td><span class="badge ${typeBadge[e.type]||'badge-grey'}">${typeLabel[e.type]||e.type}</span></td>
      <td>${e.days||'—'}</td>
      <td style="max-width:250px">${e.reason}</td>
      <td>${e.reinstatement_date||'—'}</td>
      <td>${e.governors_review?'<span class="badge badge-amber">Yes</span>':'—'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${e.logged_by_name||'—'}</td>
    </tr>`).join('')+
    '</tbody></table></div>';
}
async function loadStats(){
  const from=document.getElementById('stats-from').value;
  const cls=document.getElementById('filter-class').value;
  try{
    let url='/api/exclusions/stats?';
    if(from) url+='from='+from+'&';
    if(cls) url+='class_group='+encodeURIComponent(cls)+'&';
    const res=await fetch(url,{headers:{Authorization:'Bearer '+sessionStorage.getItem('wren_token')}});
    const rows=await res.json();
    const area=document.getElementById('stats-area');
    if(!rows.length){area.innerHTML='<div class="empty-state">No exclusion data in this period</div>';return;}
    area.innerHTML='<div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Form</th><th>Year</th><th>Fixed Term</th><th>Permanent</th><th>Lunchtime</th><th>Days Lost</th></tr></thead><tbody>'+
      rows.map(r=>`<tr><td><strong>${r.first_name} ${r.last_name}</strong></td><td>${r.class_group||'—'}</td><td>${r.year_group||'—'}</td><td>${r.fixed_term_count}</td><td>${r.permanent_count>0?'<span class="badge badge-red">'+r.permanent_count+'</span>':0}</td><td>${r.lunchtime_count}</td><td><strong>${r.total_days_excluded}</strong></td></tr>`).join('')+
      '</tbody></table></div>';
  }catch(e){document.getElementById('stats-area').innerHTML='<div class="empty-state">Failed to load</div>';}
}
function showTab(tab){
  ['log','stats'].forEach(t=>{
    document.getElementById('pane-'+t).style.display=t===tab?'block':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}
function openNewEntry(){document.getElementById('excl-modal').style.display='flex';}
function closeModal(){document.getElementById('excl-modal').style.display='none';}
async function saveEntry(){
  const childId=document.getElementById('new-child-id').value;
  const reason=document.getElementById('new-reason').value.trim();
  const type=document.getElementById('new-type').value;
  if(!childId||!reason){alert('Pupil and reason required');return;}
  try{
    const body={child_id:parseInt(childId),date:document.getElementById('new-date').value,type,reason,days:parseFloat(document.getElementById('new-days').value)||1,reinstatement_date:document.getElementById('new-reinstate').value||null,governors_review:document.getElementById('new-gov-review').checked,notes:document.getElementById('new-notes').value.trim()||null};
    const res=await fetch('/api/exclusions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+sessionStorage.getItem('wren_token')},body:JSON.stringify(body)});
    if(!res.ok) throw new Error((await res.json()).error);
    closeModal();loadExclusions();
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
