<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>IT Settings — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <script src="/js/it-settings.js" defer></script>
  <style>
    .it-toggle { position:relative; display:inline-block; width:48px; height:26px; flex-shrink:0; }
    .it-toggle input { opacity:0; width:0; height:0; position:absolute; }
    .it-toggle-slider { position:absolute; inset:0; cursor:pointer; background:#2d3748; border-radius:26px; transition:.2s; }
    .it-toggle-slider::before { content:''; position:absolute; height:20px; width:20px; left:3px; bottom:3px; background:#64748b; border-radius:50%; transition:.2s; }
    .it-toggle input:checked + .it-toggle-slider { background:#22c55e; }
    .it-toggle input:checked + .it-toggle-slider::before { transform:translateX(22px); background:#fff; }
    .settings-section { margin-bottom:0; }
    .settings-section-title { font-size:.75rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#4a9abf; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid #2d3748; }
    .module-row:last-child { border-bottom:none !important; }
    @media (max-width: 600px) { .it-tab-btn { padding:8px 12px !important; font-size:.82rem !important; } }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="loading-state">
    <div class="spinner"></div>
    <div style="margin-top:12px;color:#94a3b8;font-size:.85rem">Loading IT Settings…</div>
  </div>
</div>
</body>
</html>
