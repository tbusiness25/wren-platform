<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="wren-edition" content="secondary">
  <title>Resources — Wren Secondary</title>
  <link rel="stylesheet" href="/css/wren.css">
  <link rel="stylesheet" href="/css/wren-shell-v2.css">
  <link rel="stylesheet" href="/css/design-tokens.css">
  <script src="/js/wren-shell-v2.js" defer></script>
  <style>
    .res-card { background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:flex-start; }
    .res-card:hover { border-color:var(--primary); }
    .res-favicon { width:28px;height:28px;border-radius:6px;object-fit:contain;background:var(--surface);padding:4px;flex-shrink:0; }
    .source-badge { display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--surface);color:var(--text-muted); }
  </style>
</head>
<body>
<div id="wren-content">
  <div class="page-header">
    <div>
      <div class="page-title">Resources Library</div>
      <div class="page-subtitle">Curated teaching resources</div>
    </div>
    <button class="btn btn-primary" id="btn-open-add">+ Add Resource</button>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
    <select class="form-control" id="filter-subj" style="max-width:180px">
      <option value="">All Subjects</option>
    </select>
    <select class="form-control" id="filter-yr" style="max-width:120px">
      <option value="">All Years</option>
      <option value="7">Year 7</option>
      <option value="8">Year 8</option>
      <option value="9">Year 9</option>
      <option value="10">Year 10</option>
      <option value="11">Year 11</option>
    </select>
    <select class="form-control" id="filter-src" style="max-width:160px">
      <option value="">All Sources</option>
      <option value="twinkl">Twinkl</option>
      <option value="bbc_bitesize">BBC Bitesize</option>
      <option value="oak_national">Oak National</option>
      <option value="white_rose">White Rose</option>
      <option value="bug_club">Bug Club / MyMaths</option>
      <option value="internal">Internal</option>
    </select>
    <input class="form-control" id="filter-search" placeholder="Search…" style="max-width:200px">
  </div>

  <div id="res-list" style="display:flex;flex-direction:column;gap:10px"><div class="empty-state">Loading…</div></div>
</div>

<script>
async function init() {
  const subjects = await fetch('/api/subjects').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('filter-subj');
  subjects.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
  load();
}

async function load() {
  const p = new URLSearchParams();
  const subj = document.getElementById('filter-subj').value;
  const yr   = document.getElementById('filter-yr').value;
  const src  = document.getElementById('filter-src').value;
  const q    = document.getElementById('filter-search').value.trim();
  if (subj) p.set('subject_id', subj);
  if (yr)   p.set('year_group', yr);
  if (src)  p.set('source', src);
  if (q)    p.set('search', q);
  const data = await fetch('/api/teaching-resources?' + p).then(r=>r.json()).catch(()=>[]);
  const sourceLabel = { twinkl:'Twinkl', bbc_bitesize:'BBC Bitesize', oak_national:'Oak National', white_rose:'White Rose', bug_club:'Bug Club', internal:'Internal' };
  const typeEmoji = { worksheet:'📄', video:'🎬', interactive:'💻', plan:'📋', assessment:'📝' };
  document.getElementById('res-list').innerHTML = data.length ? data.map(r => `
    <div class="res-card">
      ${r.favicon ? `<img class="res-favicon" src="${r.favicon}" alt="" onerror="this.style.display='none'">` : `<div class="res-favicon" style="display:flex;align-items:center;justify-content:center;font-size:16px">${typeEmoji[r.type]||'📄'}</div>`}
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;margin-bottom:2px">${r.title}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${r.subject_name||'—'} &nbsp;·&nbsp; ${r.year_group !== null ? (r.year_group === 0 ? 'Year 6' : 'Y'+r.year_group) : '—'} &nbsp;·&nbsp; ${typeEmoji[r.type]||''} ${r.type||'—'}</div>
        ${r.description ? `<div style="font-size:12px;color:var(--text-muted)">${r.description.slice(0,120)}…</div>` : ''}
        <div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="source-badge">${sourceLabel[r.source]||r.source}</span>
          ${(r.tags||[]).slice(0,3).map(t=>`<span style="font-size:10px;background:var(--surface);padding:2px 6px;border-radius:4px;color:var(--text-muted)">#${t}</span>`).join('')}
          ${r.url ? `<a href="${r.url}" target="_blank" class="btn btn-sm" style="margin-left:auto">Open →</a>` : ''}
        </div>
      </div>
    </div>`).join('') : '<div class="empty-state">No items yet</div>';
}

function openAdd() { wrenToast('Add resource form coming soon', 'info'); }
document.getElementById('btn-open-add').addEventListener('click', openAdd);
document.getElementById('filter-subj').addEventListener('change', load);
document.getElementById('filter-yr').addEventListener('change', load);
document.getElementById('filter-src').addEventListener('change', load);
document.getElementById('filter-search').addEventListener('input', load);
document.addEventListener('wren:ready', init);
</script>
</body>
</html>
