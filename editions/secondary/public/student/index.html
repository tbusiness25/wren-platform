<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Student Portal — Wren Secondary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--border:#2d3748;--blue:#4a9abf;--orange:#e07820;--text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7}
body{background:var(--bg);min-height:100dvh;font-family:system-ui,Arial,sans-serif;color:var(--text);padding-bottom:80px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-name{font-size:1.1rem;font-weight:900;letter-spacing:-.5px}
.logo-name .w{color:var(--blue)}.logo-name .ren{color:var(--orange)}
.portal-badge{font-size:.65rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;border:1px solid var(--border);border-radius:4px;padding:2px 7px}
.user-name{font-size:.82rem;color:var(--muted)}
.signout{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:6px}
.signout:hover{color:var(--red)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:inherit;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;transition:.15s}
.nav-item.active{color:var(--blue)}
.nav-icon{font-size:1.3rem;line-height:1}

/* Sections */
.section{display:none;padding:16px 14px}
.section.active{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}

/* Hero */
.hero{background:linear-gradient(135deg,#162236 0%,var(--card) 100%);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.hero-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:1.15rem;font-weight:800}
.hero-detail{font-size:.8rem;color:var(--muted);margin-top:2px}
.hero-stat-row{display:flex;gap:10px;margin-top:12px}
.hero-stat{background:rgba(255,255,255,.05);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hero-stat .val{font-size:1.1rem;font-weight:800;color:var(--blue)}
.hero-stat .lbl{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

/* Today timetable */
.period-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.period-num{font-size:.7rem;font-weight:800;color:var(--dim);width:20px;flex-shrink:0;text-align:center}
.period-time{font-size:.72rem;color:var(--dim);width:80px;flex-shrink:0}
.period-info{flex:1;min-width:0}
.period-subject{font-size:.9rem;font-weight:700}
.period-room{font-size:.75rem;color:var(--muted);margin-top:1px}
.period-teacher{font-size:.72rem;color:var(--dim)}
.period-now{border-color:var(--blue);background:rgba(74,154,191,.08)}
.period-now .period-num{color:var(--blue)}
.now-badge{background:var(--blue);color:#fff;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:auto;flex-shrink:0}

/* Homework list */
.hw-item{padding:12px 0;border-bottom:1px solid var(--border)}
.hw-item:last-child{border-bottom:none}
.hw-subject{font-size:.78rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em}
.hw-title{font-size:.92rem;font-weight:600;margin:2px 0}
.hw-meta{font-size:.75rem;color:var(--muted)}
.hw-due{font-weight:700}
.hw-due.overdue{color:var(--red)}
.hw-due.today{color:var(--yellow)}
.hw-due.soon{color:var(--orange)}
.hw-badge{display:inline-block;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}
.hw-badge.submitted{background:rgba(34,197,94,.15);color:var(--green)}
.hw-badge.pending{background:rgba(245,158,11,.15);color:var(--yellow)}
.hw-badge.overdue{background:rgba(239,68,68,.15);color:var(--red)}

/* Points / behaviour */
.points-hero{text-align:center;padding:16px 0 8px}
.points-total{font-size:3rem;font-weight:900;color:var(--orange);line-height:1}
.points-label{font-size:.8rem;color:var(--muted);margin-top:4px}
.award-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.award-item:last-child{border-bottom:none}
.award-icon{font-size:1.5rem;width:36px;text-align:center;flex-shrink:0}
.award-info{flex:1;min-width:0}
.award-cat{font-size:.75rem;font-weight:700;color:var(--orange)}
.award-reason{font-size:.85rem;margin-top:1px}
.award-meta{font-size:.72rem;color:var(--dim)}
.award-pts{font-size:.95rem;font-weight:800;color:var(--orange);margin-left:auto;flex-shrink:0}
.behaviour-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.behaviour-item:last-child{border-bottom:none}
.beh-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.beh-dot.positive{background:var(--green)}
.beh-dot.negative{background:var(--red)}
.beh-type{font-size:.75rem;font-weight:700;text-transform:capitalize}
.beh-note{font-size:.82rem;color:var(--muted);margin-top:1px}
.beh-meta{font-size:.72rem;color:var(--dim)}

/* Attendance */
.att-ring-wrap{display:flex;justify-content:center;margin-bottom:16px}
.att-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.att-stat{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
.att-stat .val{font-size:1.2rem;font-weight:800;color:var(--blue)}
.att-stat .lbl{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.att-records{margin-top:12px}
.att-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.att-row:last-child{border-bottom:none}
.att-code{font-size:.75rem;font-weight:700;padding:2px 8px;border-radius:5px}
.att-code.present{background:rgba(34,197,94,.15);color:var(--green)}
.att-code.absent{background:rgba(239,68,68,.15);color:var(--red)}
.att-code.late{background:rgba(245,158,11,.15);color:var(--yellow)}
.att-code.auth{background:rgba(148,163,184,.1);color:var(--muted)}

/* Full timetable */
.day-header{font-size:.78rem;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;padding:6px 0 8px;margin-top:8px}

/* Grades / assessments */
.grade-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.grade-subject{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.grade-title{font-size:.92rem;font-weight:600;margin:2px 0}
.grade-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.grade-chip{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;font-size:1rem;font-weight:900;flex-shrink:0}
.g9{background:rgba(168,85,247,.2);color:#a855f7}
.g8{background:rgba(59,130,246,.2);color:#3b82f6}
.g7{background:rgba(34,197,94,.2);color:#22c55e}
.g6{background:rgba(20,184,166,.2);color:#14b8a6}
.g5{background:rgba(234,179,8,.2);color:#eab308}
.g4{background:rgba(249,115,22,.2);color:#f97316}
.g3{background:rgba(239,68,68,.2);color:#ef4444}
.g2{background:rgba(239,68,68,.15);color:#ef4444}
.g1{background:rgba(239,68,68,.1);color:#ef4444}
.grade-detail{flex:1;min-width:0}
.grade-term{font-size:.72rem;color:var(--dim)}
.grade-comment{font-size:.78rem;color:var(--muted);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Homework submission */
.hw-submit-area{margin-top:8px}
.hw-submit-area textarea{width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:.88rem;resize:vertical;min-height:80px;outline:none;transition:.2s}
.hw-submit-area textarea:focus{border-color:var(--blue)}
.btn-sm{padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:.2s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-hdr h2{font-size:1rem;font-weight:800}

/* Empty state */
.empty-state{text-align:center;padding:32px 16px;color:var(--dim)}
.empty-state .icon{font-size:2.5rem;margin-bottom:8px}
.empty-state p{font-size:.85rem}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid var(--border);color:#f1f5f9;padding:10px 18px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-name"><span class="w">w</span><span class="ren">ren</span></div>
    <div class="portal-badge">Student</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="user-name" id="top-name"></span>
    <button class="signout" onclick="signOut()">Sign out</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="showTab('home',this)">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-item" onclick="showTab('timetable',this)">
    <span class="nav-icon">📅</span>Timetable
  </button>
  <button class="nav-item" onclick="showTab('homework',this)">
    <span class="nav-icon">📚</span>Homework
  </button>
  <button class="nav-item" onclick="showTab('grades',this)">
    <span class="nav-icon">📊</span>Grades
  </button>
  <button class="nav-item" onclick="showTab('points',this)">
    <span class="nav-icon">⭐</span>Points
  </button>
</div>

<!-- HOME -->
<div id="section-home" class="section active">
  <!-- Hero -->
  <div class="hero">
    <div class="hero-avatar" id="hero-avatar">?</div>
    <div class="hero-info">
      <div class="hero-name" id="hero-name">Loading…</div>
      <div class="hero-detail" id="hero-detail"></div>
    </div>
  </div>
  <div class="hero-stat-row" id="hero-stats" style="margin-bottom:12px">
    <div class="hero-stat"><div class="val" id="stat-att">–</div><div class="lbl">Attendance</div></div>
    <div class="hero-stat"><div class="val" id="stat-pts" style="color:var(--orange)">–</div><div class="lbl">Wren Pts</div></div>
    <div class="hero-stat"><div class="val" id="stat-hw" style="color:var(--yellow)">–</div><div class="lbl">HW Due</div></div>
  </div>

  <!-- Today's timetable -->
  <div class="card">
    <div class="card-title" id="today-label">Today's Timetable</div>
    <div id="today-periods"><div style="color:var(--dim);font-size:.85rem">Loading…</div></div>
  </div>

  <!-- Homework due soon -->
  <div class="card">
    <div class="section-hdr">
      <div class="card-title" style="margin:0">Upcoming Homework</div>
      <button class="btn-sm btn-ghost" onclick="showTab('homework',document.querySelectorAll('.nav-item')[2])">View all</button>
    </div>
    <div id="home-hw"><div style="color:var(--dim);font-size:.85rem">Loading…</div></div>
  </div>
</div>

<!-- TIMETABLE -->
<div id="section-timetable" class="section">
  <div class="section-hdr">
    <h2>My Timetable</h2>
    <button class="btn-sm btn-ghost" onclick="copyIcal()">📅 Subscribe</button>
  </div>
  <div id="full-timetable"><div class="empty-state"><div class="icon">📅</div><p>Loading timetable…</p></div></div>
</div>

<!-- HOMEWORK -->
<div id="section-homework" class="section">
  <h2 style="margin-bottom:12px">Homework</h2>
  <div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">
    <button class="btn-sm btn-blue" id="hw-filter-all" onclick="filterHW('all',this)">All</button>
    <button class="btn-sm btn-ghost" id="hw-filter-pending" onclick="filterHW('pending',this)">Pending</button>
    <button class="btn-sm btn-ghost" id="hw-filter-submitted" onclick="filterHW('submitted',this)">Submitted</button>
    <button class="btn-sm btn-ghost" id="hw-filter-overdue" onclick="filterHW('overdue',this)">Overdue</button>
  </div>
  <div id="hw-list"><div class="empty-state"><div class="icon">📚</div><p>Loading homework…</p></div></div>
</div>

<!-- GRADES -->
<div id="section-grades" class="section">
  <div class="section-hdr">
    <h2>My Grades</h2>
    <select id="grade-term-filter" onchange="renderGrades()" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;font-size:.8rem;outline:none">
      <option value="">All terms</option>
    </select>
  </div>
  <div id="grades-list"><div class="empty-state"><div class="icon">📊</div><p>Loading grades…</p></div></div>
</div>

<!-- POINTS -->
<div id="section-points" class="section">
  <div class="card">
    <div class="points-hero">
      <div class="points-total" id="total-points">–</div>
      <div class="points-label">Wren Points</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:4px">
      <div style="text-align:center;flex:1"><div style="font-size:1.1rem;font-weight:800;color:var(--green)" id="pos-count">–</div><div style="font-size:.65rem;color:var(--dim);text-transform:uppercase">Positive</div></div>
      <div style="text-align:center;flex:1"><div style="font-size:1.1rem;font-weight:800;color:var(--red)" id="neg-count">–</div><div style="font-size:.65rem;color:var(--dim);text-transform:uppercase">Negative</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Recent Awards</div>
    <div id="awards-list"><div style="color:var(--dim);font-size:.85rem">Loading…</div></div>
  </div>
  <div class="card">
    <div class="card-title">Behaviour Events</div>
    <div id="behaviour-list"><div style="color:var(--dim);font-size:.85rem">Loading…</div></div>
  </div>
</div>

<script>
const tok = sessionStorage.getItem('wrenStudentToken');
const stu = JSON.parse(sessionStorage.getItem('wrenStudentData') || '{}');
if (!tok) { window.location.href = '/student/login.html'; }

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  el.classList.add('active');
  if (!loaded[name]) { loaded[name]=true; loaders[name]?.(); }
}

function signOut() {
  sessionStorage.removeItem('wrenStudentToken');
  sessionStorage.removeItem('wrenStudentData');
  window.location.href = '/student/login.html';
}

async function api(path) {
  const res = await fetch(path, { headers: { Authorization: 'Bearer '+tok } });
  if (res.status===401) { signOut(); throw new Error('auth'); }
  return res.json();
}

function toast(m, ms=2500) {
  const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), ms);
}

// ── Init ──
document.getElementById('top-name').textContent = stu.first_name || '';

let allHW = [], allGrades = [], allTimetable = [], allPeriods = [];
const loaded = { home: false, timetable: false, homework: false, grades: false, points: false };

// Load home immediately
loaded.home = true;

(async () => {
  try {
    // Parallel: student info + timetable + homework + attendance + behaviour + points
    const [me, tt, hw, att, beh, pts] = await Promise.all([
      api('/api/secondary-student/student/me'),
      api('/api/secondary-student/student/timetable'),
      api('/api/secondary-student/student/homework'),
      api('/api/secondary-student/student/attendance'),
      api('/api/secondary-student/student/behaviour'),
      api('/api/secondary-student/student/wren-points'),
    ]);

    allTimetable = tt.timetable || [];
    allPeriods = tt.periods || [];
    allHW = hw;
    allGrades = [];

    // Hero
    const init = ((me.first_name||'?')[0]+(me.last_name||'?')[0]).toUpperCase();
    document.getElementById('hero-avatar').textContent = init;
    document.getElementById('hero-name').textContent = `${me.first_name} ${me.last_name}`;
    document.getElementById('hero-detail').textContent = `${me.year_group || ''} · ${me.form_group || ''}`;

    const attPct = att.summary?.pct;
    document.getElementById('stat-att').textContent = attPct != null ? attPct+'%' : '–';
    document.getElementById('stat-pts').textContent = pts.total_points ?? 0;
    const hwDue = hw.filter(h => !h.submitted_at && new Date(h.due_date) >= new Date()).length;
    document.getElementById('stat-hw').textContent = hwDue;

    renderTodayTimetable(tt);
    renderHomeHW(hw);

    // Cache for tabs
    allGrades = [];
    loadedData.att = att;
    loadedData.beh = beh;
    loadedData.pts = pts;

    // Load grades
    const grades = await api('/api/secondary-student/student/assessments');
    allGrades = grades;
    if (loaded.grades) renderGrades();

  } catch(e) { if (e.message !== 'auth') console.error(e); }
})();

const loadedData = {};

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

function todayDow() {
  const d = new Date().getDay(); // 0=Sun
  return d >= 1 && d <= 5 ? d-1 : 0; // 0=Mon
}

function renderTodayTimetable(tt) {
  const dow = todayDow();
  const dayLabel = DAYS[dow];
  document.getElementById('today-label').textContent = `${dayLabel}'s Timetable`;
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();

  const slots = (tt.timetable||[]).filter(s=>s.day_of_week===dow).sort((a,b)=>a.period-b.period);
  const el = document.getElementById('today-periods');
  if (!slots.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>No timetabled lessons today</p></div>';
    return;
  }

  el.innerHTML = slots.map(s => {
    const start = s.start_time ? s.start_time.slice(0,5) : '';
    const end   = s.end_time   ? s.end_time.slice(0,5)   : '';
    const startMins = s.start_time ? toMins(s.start_time) : null;
    const endMins   = s.end_time   ? toMins(s.end_time)   : null;
    const isNow = startMins != null && nowMins >= startMins && nowMins < endMins;
    return `<div class="period-card${isNow?' period-now':''}">
      <div class="period-num">${s.period}</div>
      <div class="period-time">${start}${end?'–'+end:''}</div>
      <div class="period-info">
        <div class="period-subject">${s.subject||s.class_name||'Lesson'}</div>
        <div class="period-room">${s.room||''}</div>
        <div class="period-teacher">${s.teacher_name||''}</div>
      </div>
      ${isNow?'<div class="now-badge">NOW</div>':''}
    </div>`;
  }).join('');
}

function toMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function renderHomeHW(hw) {
  const el = document.getElementById('home-hw');
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()+7);
  const soon = hw.filter(h => !h.submitted_at && new Date(h.due_date) <= cutoff)
                  .sort((a,b)=>new Date(a.due_date)-new Date(b.due_date))
                  .slice(0,4);
  if (!soon.length) { el.innerHTML = '<div style="color:var(--dim);font-size:.85rem">No homework due in the next 7 days 🎉</div>'; return; }
  el.innerHTML = soon.map(h=>hwItemHTML(h)).join('');
}

function hwItemHTML(h) {
  const due = new Date(h.due_date);
  const today = new Date(); today.setHours(0,0,0,0); due.setHours(0,0,0,0);
  const diff = Math.round((due-today)/(86400000));
  let dueClass = '', dueText = '';
  if (h.submitted_at) { dueClass=''; dueText=''; }
  else if (diff < 0) { dueClass='overdue'; dueText=`Overdue (${Math.abs(diff)}d)`; }
  else if (diff === 0) { dueClass='today'; dueText='Due today'; }
  else if (diff <= 3) { dueClass='soon'; dueText=`Due in ${diff}d`; }
  else { dueText=`Due ${due.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`; }

  const badge = h.submitted_at ? '<span class="hw-badge submitted">Submitted</span>'
    : dueClass==='overdue' ? '<span class="hw-badge overdue">Overdue</span>'
    : '<span class="hw-badge pending">Pending</span>';

  return `<div class="hw-item">
    <div class="hw-subject">${h.class_name||'Subject'}</div>
    <div class="hw-title">${h.title}</div>
    <div class="hw-meta"><span class="hw-due ${dueClass}">${dueText}</span>${badge}</div>
  </div>`;
}

// ── Homework tab ──
let hwFilter = 'all';
function filterHW(f, btn) {
  hwFilter = f;
  document.querySelectorAll('[id^=hw-filter-]').forEach(b=>{ b.classList.remove('btn-blue'); b.classList.add('btn-ghost'); });
  btn.classList.add('btn-blue'); btn.classList.remove('btn-ghost');
  renderHWList();
}

const loaders = {
  homework: () => renderHWList(),
  timetable: () => renderFullTimetable(),
  grades: () => renderGrades(),
  points: () => renderPoints(),
};

function renderHWList() {
  const now = new Date(); now.setHours(0,0,0,0);
  let list = [...allHW];
  if (hwFilter==='pending') list = list.filter(h=>!h.submitted_at && new Date(h.due_date)>=now);
  else if (hwFilter==='submitted') list = list.filter(h=>h.submitted_at);
  else if (hwFilter==='overdue') list = list.filter(h=>!h.submitted_at && new Date(h.due_date)<now);
  list.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));

  const el = document.getElementById('hw-list');
  if (!list.length) { el.innerHTML='<div class="empty-state"><div class="icon">✅</div><p>Nothing here</p></div>'; return; }

  el.innerHTML = list.map(h => {
    const due = new Date(h.due_date); due.setHours(0,0,0,0);
    const diff = Math.round((due-now)/86400000);
    let dueClass='', dueText='';
    if (h.submitted_at) { dueText='Submitted '+new Date(h.submitted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
    else if (diff<0) { dueClass='overdue'; dueText=`Overdue (${Math.abs(diff)}d ago)`; }
    else if (diff===0) { dueClass='today'; dueText='Due today'; }
    else if (diff<=3) { dueClass='soon'; dueText=`Due in ${diff}d`; }
    else { dueText='Due '+due.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

    const badge = h.submitted_at ? '<span class="hw-badge submitted">Submitted</span>'
      : dueClass==='overdue' ? '<span class="hw-badge overdue">Overdue</span>'
      : '<span class="hw-badge pending">Pending</span>';

    const submitBlock = !h.submitted_at ? `
      <div class="hw-submit-area">
        <textarea id="hw-text-${h.id}" placeholder="Type your answer or notes here…" rows="3"></textarea>
        <button class="btn-sm btn-blue" style="margin-top:6px" onclick="submitHW(${h.id})">Submit</button>
      </div>` : h.grade ? `<div style="margin-top:6px;font-size:.8rem;color:var(--muted)">Grade: <strong>${h.grade}</strong>${h.teacher_feedback?` · ${h.teacher_feedback}`:''}</div>` : '';

    return `<div class="card" id="hw-card-${h.id}">
      <div class="hw-subject">${h.class_name||'Subject'}</div>
      <div class="hw-title">${h.title}</div>
      ${h.description?`<div style="font-size:.8rem;color:var(--muted);margin-top:4px">${h.description}</div>`:''}
      <div class="hw-meta" style="margin-top:6px">
        <span class="hw-due ${dueClass}">${dueText}</span>${badge}
        ${h.estimated_duration_minutes?`<span style="margin-left:8px;color:var(--dim)">~${h.estimated_duration_minutes}min</span>`:''}
      </div>
      ${submitBlock}
    </div>`;
  }).join('');
}

async function submitHW(id) {
  const content = document.getElementById('hw-text-'+id)?.value || '';
  try {
    const res = await fetch('/api/secondary-student/student/homework/'+id+'/submit', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},
      body: JSON.stringify({content})
    });
    if (!res.ok) throw new Error();
    toast('Homework submitted!');
    const hw = allHW.find(h=>h.id==id);
    if (hw) hw.submitted_at = new Date().toISOString();
    renderHWList();
  } catch { toast('Failed to submit — try again'); }
}

// ── Full timetable ──
function renderFullTimetable() {
  const el = document.getElementById('full-timetable');
  if (!allTimetable.length) { el.innerHTML='<div class="empty-state"><div class="icon">📅</div><p>No timetable data</p></div>'; return; }

  let html = '';
  for (let d=0; d<5; d++) {
    const slots = allTimetable.filter(s=>s.day_of_week===d).sort((a,b)=>a.period-b.period);
    if (!slots.length) continue;
    html += `<div class="day-header">${DAYS[d]}</div>`;
    html += slots.map(s=>`
      <div class="period-card" style="margin-bottom:6px">
        <div class="period-num">${s.period}</div>
        <div class="period-time">${s.start_time?s.start_time.slice(0,5):''}</div>
        <div class="period-info">
          <div class="period-subject">${s.subject||s.class_name||'Lesson'}</div>
          <div class="period-room">${s.room||''}</div>
          <div class="period-teacher">${s.teacher_name||''}</div>
        </div>
      </div>`).join('');
  }
  el.innerHTML = html || '<div class="empty-state"><div class="icon">📅</div><p>No timetable entries</p></div>';
}

function copyIcal() {
  toast('iCal subscription: copy the URL from your school office');
}

// ── Grades ──
function renderGrades() {
  const el = document.getElementById('grades-list');
  if (!allGrades.length) { el.innerHTML='<div class="empty-state"><div class="icon">📊</div><p>No grades yet</p></div>'; return; }

  const termSel = document.getElementById('grade-term-filter');
  const terms = [...new Set(allGrades.map(g=>g.term).filter(Boolean))].sort();
  if (termSel.options.length <= 1) {
    terms.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; termSel.appendChild(o); });
  }
  const filter = termSel.value;
  const list = filter ? allGrades.filter(g=>g.term===filter) : allGrades;
  list.sort((a,b)=>(a.subject||'').localeCompare(b.subject||''));

  el.innerHTML = list.map(g=>{
    const chip = gradeChip(g.grade);
    return `<div class="grade-card">
      <div class="grade-subject">${g.subject||'Subject'}</div>
      <div class="grade-row">
        <div class="grade-chip ${chip.cls}">${g.grade||'?'}</div>
        <div class="grade-detail">
          <div class="grade-term">${g.term||''} · ${g.teacher_name||''}</div>
          ${g.comment?`<div class="grade-comment">${g.comment}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function gradeChip(grade) {
  if (!grade) return {cls:'g4'};
  const n = parseInt(grade);
  if (!isNaN(n)) return {cls:'g'+Math.max(1,Math.min(9,n))};
  const map={'A*':'g9','A':'g8','B':'g7','C':'g6','D':'g5','E':'g4','F':'g3','G':'g2','U':'g1'};
  return {cls: map[grade.toUpperCase()] || 'g5'};
}

// ── Points / behaviour ──
function renderPoints() {
  const pts = loadedData.pts;
  const beh = loadedData.beh;
  if (!pts || !beh) return;

  document.getElementById('total-points').textContent = pts.total_points ?? 0;
  document.getElementById('pos-count').textContent = beh.positive_count ?? 0;
  document.getElementById('neg-count').textContent = beh.negative_count ?? 0;

  const awards = (pts.awards || []).slice(0, 15);
  const aEl = document.getElementById('awards-list');
  if (!awards.length) { aEl.innerHTML='<div style="color:var(--dim);font-size:.85rem">No points awarded yet</div>'; }
  else aEl.innerHTML = awards.map(a=>`
    <div class="award-item">
      <div class="award-icon">${a.icon||'⭐'}</div>
      <div class="award-info">
        <div class="award-cat">${a.category_name||'Award'}</div>
        <div class="award-reason">${a.reason_text||''}</div>
        <div class="award-meta">${a.awarded_by_name||''} · ${fmtDate(a.awarded_at)}</div>
      </div>
      <div class="award-pts">+${a.value||1}</div>
    </div>`).join('');

  const events = (beh.events || []).slice(0, 10);
  const bEl = document.getElementById('behaviour-list');
  if (!events.length) { bEl.innerHTML='<div style="color:var(--dim);font-size:.85rem">No behaviour events</div>'; }
  else bEl.innerHTML = events.map(b=>`
    <div class="behaviour-item">
      <div class="beh-dot ${b.behaviour_type==='positive'?'positive':'negative'}"></div>
      <div>
        <div class="beh-type">${b.behaviour_type||'event'}</div>
        <div class="beh-note">${b.notes||b.category||''}</div>
        <div class="beh-meta">${b.staff_name||''} · ${fmtDate(b.log_date)}</div>
      </div>
    </div>`).join('');
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
</script>
