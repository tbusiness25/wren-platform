<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Student Portal — Wren Secondary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100dvh;display:flex;align-items:center;justify-content:center;font-family:system-ui,Arial,sans-serif;color:#f1f5f9}
.box{background:#1e293b;border:1px solid #2d3748;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;margin:20px}
.logo{text-align:center;margin-bottom:28px}
.logo-name{font-size:1.4rem;font-weight:900;letter-spacing:-.5px}
.logo-name .w{color:#4a9abf}.logo-name .ren{color:#e07820}
.logo-ed{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.1em;border:1px solid #2d3748;border-radius:4px;padding:2px 8px;display:inline-block;margin-top:6px}
.logo-sub{font-size:.82rem;color:#94a3b8;margin-top:8px}
.form-label{display:block;font-size:.78rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid #2d3748;background:#0f172a;color:#f1f5f9;font-family:inherit;font-size:1rem;outline:none;transition:.2s;margin-bottom:14px}
.form-input:focus{border-color:#4a9abf}
.pin-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.pin-digit{aspect-ratio:1;border-radius:12px;border:2px solid #2d3748;background:#0f172a;color:#f1f5f9;font-size:1.6rem;font-weight:700;text-align:center;outline:none;transition:.2s;width:100%}
.pin-digit:focus{border-color:#4a9abf}
.pin-digit.filled{border-color:#4a9abf;color:#4a9abf}
.btn-big{width:100%;padding:15px;border-radius:14px;font-size:.95rem;font-weight:700;border:none;cursor:pointer;transition:.2s;font-family:inherit}
.btn-primary{background:#4a9abf;color:#fff;margin-top:4px}.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:default}
.err{color:#ef4444;font-size:.83rem;margin-bottom:12px;padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;display:none}
.demo-note{text-align:center;font-size:.76rem;color:#64748b;margin-top:18px}
.link{color:#4a9abf;cursor:pointer;text-decoration:underline}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.numpad-btn{padding:16px;border-radius:12px;border:1px solid #2d3748;background:#0f172a;color:#f1f5f9;font-size:1.1rem;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
.numpad-btn:hover{background:#1e293b;border-color:#4a9abf}
.numpad-btn.del{color:#ef4444}
.numpad-btn.empty{background:transparent;border-color:transparent;cursor:default}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-name"><span class="w">w</span><span class="ren">ren</span></div>
    <div class="logo-ed">Student Portal</div>
    <div class="logo-sub">Sign in with your school username and PIN</div>
  </div>

  <div id="err-msg" class="err"></div>

  <label class="form-label">Username</label>
  <input class="form-input" id="username" type="text" placeholder="firstname.lastname" autocomplete="username"
         autocapitalize="none" spellcheck="false"
         oninput="this.value=this.value.toLowerCase().replace(/[^a-z.]/g,'')"
         onkeydown="if(event.key==='Enter')document.getElementById('p0').focus()">

  <label class="form-label">PIN</label>
  <div class="pin-row">
    <input class="pin-digit" id="p0" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]">
    <input class="pin-digit" id="p1" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]">
    <input class="pin-digit" id="p2" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]">
    <input class="pin-digit" id="p3" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]">
  </div>

  <div class="numpad">
    <button class="numpad-btn" onclick="numTap('1')">1</button>
    <button class="numpad-btn" onclick="numTap('2')">2</button>
    <button class="numpad-btn" onclick="numTap('3')">3</button>
    <button class="numpad-btn" onclick="numTap('4')">4</button>
    <button class="numpad-btn" onclick="numTap('5')">5</button>
    <button class="numpad-btn" onclick="numTap('6')">6</button>
    <button class="numpad-btn" onclick="numTap('7')">7</button>
    <button class="numpad-btn" onclick="numTap('8')">8</button>
    <button class="numpad-btn" onclick="numTap('9')">9</button>
    <button class="numpad-btn empty"></button>
    <button class="numpad-btn" onclick="numTap('0')">0</button>
    <button class="numpad-btn del" onclick="numDel()">⌫</button>
  </div>

  <button class="btn-big btn-primary" id="login-btn" onclick="tryLogin()">Sign in</button>

  <div class="demo-note" id="demo-note" style="display:none">
    Demo: <span class="link" onclick="fillDemo()">ethan.morris</span> — PIN 1234
  </div>
</div>

<script>
const pins = [0,1,2,3].map(i=>document.getElementById('p'+i));

function numTap(d) {
  const empty = pins.findIndex(p=>!p.value);
  if (empty === -1) return;
  pins[empty].value = d;
  pins[empty].classList.add('filled');
  if (empty < 3) pins[empty+1].focus();
  else tryLoginAuto();
}

function numDel() {
  const last = [...pins].reverse().find(p=>p.value);
  if (!last) return;
  last.value = '';
  last.classList.remove('filled');
  last.focus();
}

// Keyboard input into PIN boxes
pins.forEach((p, i) => {
  p.addEventListener('keydown', e => {
    if (e.key === 'Backspace') { e.preventDefault(); numDel(); return; }
    if (e.key === 'Enter') { tryLogin(); return; }
    if (/^[0-9]$/.test(e.key)) { e.preventDefault(); numTap(e.key); }
    else e.preventDefault();
  });
  p.addEventListener('input', e => { e.preventDefault(); });
});

function getPIN() { return pins.map(p=>p.value).join(''); }

async function tryLoginAuto() {
  const pin = getPIN();
  if (pin.length === 4 && document.getElementById('username').value.trim()) {
    await new Promise(r => setTimeout(r, 100));
    tryLogin();
  }
}

async function tryLogin() {
  document.getElementById('err-msg').style.display = 'none';
  const username = document.getElementById('username').value.trim();
  const pin = getPIN();
  if (!username) return showErr('Enter your username');
  if (pin.length < 4) return showErr('Enter your 4-digit PIN');
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const res = await fetch('/api/secondary-student/student-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, pin })
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Invalid username or PIN'); resetBtn(); return; }
    sessionStorage.setItem('wrenStudentToken', data.token);
    sessionStorage.setItem('wrenStudentData', JSON.stringify(data.student));
    window.location.href = '/student/index.html';
  } catch { showErr('Network error — please try again'); resetBtn(); }
}

function showErr(m) { const el = document.getElementById('err-msg'); el.textContent = m; el.style.display = 'block'; }
function resetBtn() { const b = document.getElementById('login-btn'); b.textContent = 'Sign in'; b.disabled = false; }

function fillDemo() {
  document.getElementById('username').value = 'ethan.morris';
  pins.forEach((p,i) => { p.value = '1234'[i]; p.classList.add('filled'); });
}

if (sessionStorage.getItem('wrenStudentToken')) {
  window.location.replace('/student/index.html');
}

fetch('/api/edition').then(r=>r.json()).then(d => {
  if (d.demo) document.getElementById('demo-note').style.display = 'block';
}).catch(()=>{});
</script>
</body>
</html>
