name: ShellCheck

on:
  push:
    paths: ['scan.sh']
  pull_request:
    paths: ['scan.sh']

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
