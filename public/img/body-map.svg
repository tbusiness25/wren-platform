<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" fill="none" aria-label="Body map — front and back view">
  <!-- Labels -->
  <text x="80" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="600">FRONT</text>
  <text x="240" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="600">BACK</text>

  <!-- ── FRONT figure (centred on x=80) ── -->
  <!-- Head -->
  <ellipse cx="80" cy="52" rx="22" ry="26" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="head" data-side="front"/>
  <!-- Face features (non-interactive) -->
  <circle cx="73" cy="50" r="2.5" fill="#cbd5e1"/>
  <circle cx="87" cy="50" r="2.5" fill="#cbd5e1"/>
  <path d="M74 60 Q80 65 86 60" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Neck -->
  <rect x="74" y="76" width="12" height="12" rx="4" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="neck" data-side="front"/>
  <!-- Torso -->
  <rect x="53" y="86" width="54" height="74" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="torso" data-side="front"/>
  <!-- Left arm (anatomical right) -->
  <rect x="26" y="90" width="18" height="60" rx="9" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-arm" data-side="front"/>
  <!-- Right arm -->
  <rect x="116" y="90" width="18" height="60" rx="9" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-arm" data-side="front"/>
  <!-- Left hand -->
  <ellipse cx="35" cy="160" rx="10" ry="13" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-hand" data-side="front"/>
  <!-- Right hand -->
  <ellipse cx="125" cy="160" rx="10" ry="13" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-hand" data-side="front"/>
  <!-- Pelvis -->
  <rect x="53" y="158" width="54" height="30" rx="8" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="pelvis" data-side="front"/>
  <!-- Left leg -->
  <rect x="53" y="186" width="22" height="100" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-leg" data-side="front"/>
  <!-- Right leg -->
  <rect x="85" y="186" width="22" height="100" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-leg" data-side="front"/>
  <!-- Left foot -->
  <ellipse cx="64" cy="295" rx="16" ry="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-foot" data-side="front"/>
  <!-- Right foot -->
  <ellipse cx="96" cy="295" rx="16" ry="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-foot" data-side="front"/>

  <!-- ── BACK figure (centred on x=240) ── -->
  <!-- Head -->
  <ellipse cx="240" cy="52" rx="22" ry="26" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="head" data-side="back"/>
  <!-- Hair suggestion -->
  <path d="M220 44 Q240 30 260 44" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="234" y="76" width="12" height="12" rx="4" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="neck" data-side="back"/>
  <!-- Back torso -->
  <rect x="213" y="86" width="54" height="74" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="back-torso" data-side="back"/>
  <!-- Spine line (decorative) -->
  <line x1="240" y1="90" x2="240" y2="156" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Left arm back -->
  <rect x="186" y="90" width="18" height="60" rx="9" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-arm" data-side="back"/>
  <!-- Right arm back -->
  <rect x="276" y="90" width="18" height="60" rx="9" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-arm" data-side="back"/>
  <!-- Left hand back -->
  <ellipse cx="195" cy="160" rx="10" ry="13" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-hand" data-side="back"/>
  <!-- Right hand back -->
  <ellipse cx="285" cy="160" rx="10" ry="13" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-hand" data-side="back"/>
  <!-- Pelvis back -->
  <rect x="213" y="158" width="54" height="30" rx="8" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="buttocks" data-side="back"/>
  <!-- Left leg back -->
  <rect x="213" y="186" width="22" height="100" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-leg" data-side="back"/>
  <!-- Right leg back -->
  <rect x="245" y="186" width="22" height="100" rx="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-leg" data-side="back"/>
  <!-- Left foot back -->
  <ellipse cx="224" cy="295" rx="16" ry="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="left-foot" data-side="back"/>
  <!-- Right foot back -->
  <ellipse cx="256" cy="295" rx="16" ry="10" stroke="#94a3b8" stroke-width="1.5" fill="#f8fafc" class="bm-zone" data-zone="right-foot" data-side="back"/>

  <!-- divider -->
  <line x1="160" y1="20" x2="160" y2="310" stroke="#e2e8f0" stroke-width="1"/>
</svg>
