<div class="v2-section" data-section="assessment">

  <nav class="wren-tab-bar" role="tablist" aria-label="Assessment tabs">
    <div class="tab-bar-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="overview"     id="tab-ass-overview"  aria-controls="panel-ass-overview">Overview</button>
      <button class="wren-tab v2-edition-primary" role="tab" aria-selected="false" tabindex="-1" data-tab="phonics"      id="tab-ass-phonics"   aria-controls="panel-ass-phonics">Phonics</button>
      <button class="wren-tab v2-edition-primary" role="tab" aria-selected="false" tabindex="-1" data-tab="milestones"   id="tab-ass-miles"     aria-controls="panel-ass-miles">KS Milestones</button>
      <button class="wren-tab v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="progress8"  id="tab-ass-p8"        aria-controls="panel-ass-p8">Progress 8</button>
      <button class="wren-tab v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="gcse-targets" id="tab-ass-gcse"    aria-controls="panel-ass-gcse">GCSE Targets</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="reports"      id="tab-ass-reports" aria-controls="panel-ass-reports">Reports</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- OVERVIEW -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-overview" data-tab="overview" aria-labelledby="tab-ass-overview">
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Assessment Overview</h2>
        <select id="ass-year-filter" onchange="assOverviewLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="">All year groups</option>
        </select>
      </div>
      <div id="ass-overview-content">
        <div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>
      </div>
    </div>

    <!-- PHONICS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-phonics" data-tab="phonics" aria-labelledby="tab-ass-phonics" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Phonics Tracker</h2>
        <div style="display:flex;gap:8px">
          <select id="phonics-class" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="">All classes</option>
          </select>
        </div>
      </div>
      <div id="ass-phonics-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- KS MILESTONES -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-miles" data-tab="milestones" aria-labelledby="tab-ass-miles" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">KS Milestones</h2>
        <div style="display:flex;gap:8px">
          <select id="miles-ks" onchange="assMilestonesLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="KS1">KS1 (Y1–Y2)</option>
            <option value="KS2" selected>KS2 (Y3–Y6)</option>
          </select>
          <select id="miles-subject" onchange="assMilestonesLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="reading">Reading</option>
            <option value="writing">Writing</option>
            <option value="maths">Maths</option>
          </select>
        </div>
      </div>
      <div id="ass-milestones-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- PROGRESS 8 -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-p8" data-tab="progress8" aria-labelledby="tab-ass-p8" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Progress 8</h2>
        <select id="p8-year" onchange="assProgress8Load()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="Y11" selected>Year 11</option>
          <option value="Y10">Year 10</option>
        </select>
      </div>
      <div id="ass-p8-content">
        <div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>
      </div>
    </div>

    <!-- GCSE TARGETS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-gcse" data-tab="gcse-targets" aria-labelledby="tab-ass-gcse" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">GCSE Predicted vs Target</h2>
        <select id="gcse-subject" onchange="assGcseLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="">All subjects</option>
        </select>
      </div>
      <div id="ass-gcse-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- REPORTS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-ass-reports" data-tab="reports" aria-labelledby="tab-ass-reports" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Term Reports</h2>
        <div style="display:flex;gap:8px">
          <select id="ass-report-term" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="summer2026" selected>Summer 2026</option>
            <option value="spring2026">Spring 2026</option>
            <option value="autumn2025">Autumn 2025</option>
          </select>
          <button class="btn btn-sm btn-primary" onclick="assReportGenerate()">Generate reports</button>
        </div>
      </div>
      <div id="ass-reports-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  const ed = window.WREN_EDITION || 'primary';
  document.querySelectorAll('.v2-edition-primary').forEach(el => { if (ed !== 'primary') el.style.display = 'none'; });
  document.querySelectorAll('.v2-edition-secondary').forEach(el => { if (ed !== 'secondary') el.style.display = 'none'; });
})();

window.wrenLoadTab_assessment_overview = function() { assOverviewLoad(); };

async function assOverviewLoad() {
  const el = document.getElementById('ass-overview-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>';
  const ed = window.WREN_EDITION || 'primary';
  const yearFilter = document.getElementById('ass-year-filter')?.value || '';
  try {
    const data = await Wren.api(`/api/assessments${ed==='secondary'?'-secondary':'-primary'}/overview${yearFilter?'?year_group='+yearFilter:''}`).catch(() => null);
    if (!data) throw new Error('No data');
    const bands = data.attainment_bands || data.grade_bands || {};
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:20px">
        ${Object.entries(bands).map(([k,v]) => `<div class="stat-card blue"><div class="stat-label">${k}</div><div class="stat-value">${v}%</div></div>`).join('')}
      </div>
      ${(data.by_subject||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:12px">By subject</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${(data.by_subject||[]).map(s=>{
              const pct=s.expected_pct||s.on_track_pct||0;
              const col=pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
              return `<div style="display:flex;align-items:center;gap:10px">
                <div style="width:120px;font-size:.78rem;color:var(--c-muted);flex-shrink:0">${s.subject||s.name}</div>
                <div style="flex:1;background:#0f172a;border-radius:4px;height:8px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:4px"></div></div>
                <div style="width:40px;font-size:.78rem;font-weight:700;color:${col};text-align:right">${pct}%</div>
              </div>`;}).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📊</div><h3>Assessment</h3><p>Assessment overview for all year groups.</p></div>`;
  }
}

window.wrenLoadTab_assessment_phonics = function() { assPhonicsLoad(); };

async function assPhonicsLoad() {
  const el = document.getElementById('ass-phonics-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  try {
    const data = await Wren.api('/api/phonics/tracker').catch(() => null);
    if (!data) throw new Error('No data');
    const phases = ['Phase 1','Phase 2','Phase 3','Phase 4','Phase 5','Phase 6'];
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));margin-bottom:20px">
        ${phases.map(p=>{const n=(data.phase_counts||{})[p]||0;return`<div class="stat-card blue"><div class="stat-label">${p}</div><div class="stat-value">${n}</div><div class="stat-label">pupils</div></div>`;}).join('')}
      </div>
      ${(data.at_risk||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px">At risk — need intervention</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${(data.at_risk||[]).map(p=>`<div style="font-size:.82rem;color:var(--c-text);padding:4px 0;border-bottom:1px solid var(--c-border)">${p.name||p.child_name} — <span style="color:var(--c-muted)">${p.year_group||''} ${p.class_name||''}</span></div>`).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🔤</div><h3>Phonics</h3><p>Phonics phase tracker for all pupils.</p></div>`;
  }
}

window.wrenLoadTab_assessment_milestones = function() { assMilestonesLoad(); };

async function assMilestonesLoad() {
  const el = document.getElementById('ass-milestones-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const ks = document.getElementById('miles-ks')?.value || 'KS2';
  const subject = document.getElementById('miles-subject')?.value || 'reading';
  try {
    const data = await Wren.api(`/api/assessments-primary/milestones?ks=${ks}&subject=${subject}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:20px">
        <div class="stat-card green"><div class="stat-label">Working above</div><div class="stat-value">${data.above??'—'}%</div></div>
        <div class="stat-card blue"><div class="stat-label">Expected</div><div class="stat-value">${data.expected??'—'}%</div></div>
        <div class="stat-card orange"><div class="stat-label">Below expected</div><div class="stat-value">${data.below??'—'}%</div></div>
        <div class="stat-card red"><div class="stat-label">Significantly below</div><div class="stat-value">${data.sig_below??'—'}%</div></div>
      </div>
      ${(data.class_breakdown||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px">By class</div>
          <div style="overflow-x:auto">
            <table style="width:100%;font-size:.8rem;border-collapse:collapse">
              <thead><tr>${['Class','Above','Expected','Below','Sig.Below'].map(h=>`<th style="text-align:left;padding:6px 8px;color:var(--c-muted);font-weight:600;border-bottom:1px solid var(--c-border)">${h}</th>`).join('')}</tr></thead>
              <tbody>${(data.class_breakdown||[]).map(c=>`<tr>${[c.class_name,c.above+'%',c.expected+'%',c.below+'%',c.sig_below+'%'].map(v=>`<td style="padding:6px 8px;border-bottom:1px solid rgba(45,55,72,.5)">${v}</td>`).join('')}</tr>`).join('')}</tbody>
            </table>
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📐</div><h3>KS Milestones</h3><p>${ks} ${subject} milestones data.</p></div>`;
  }
}

window.wrenLoadTab_assessment_progress8 = function() { assProgress8Load(); };

async function assProgress8Load() {
  const el = document.getElementById('ass-p8-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>';
  const year = document.getElementById('p8-year')?.value || 'Y11';
  try {
    const data = await Wren.api(`/api/assessments-secondary/progress8?year_group=${year}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:20px">
        <div class="stat-card ${(data.school_p8_score||0)>=0?'green':'red'}"><div class="stat-label">School P8 score</div><div class="stat-value">${data.school_p8_score??'—'}</div></div>
        <div class="stat-card blue"><div class="stat-label">National avg</div><div class="stat-value">${data.national_avg??'0.00'}</div></div>
        <div class="stat-card green"><div class="stat-label">Positive P8</div><div class="stat-value">${data.positive_pct??'—'}%</div></div>
        <div class="stat-card orange"><div class="stat-label">Disadvantaged gap</div><div class="stat-value">${data.disadvantaged_gap??'—'}</div></div>
      </div>
      ${(data.by_subject||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px">P8 by subject</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${(data.by_subject||[]).map(s=>{
              const score=parseFloat(s.p8_score||0);
              const col=score>=0?'#22c55e':'#ef4444';
              const barW=Math.min(100,Math.abs(score)*20+50);
              return `<div style="display:flex;align-items:center;gap:10px">
                <div style="width:100px;font-size:.78rem;color:var(--c-muted);flex-shrink:0">${s.subject}</div>
                <div style="flex:1;background:#0f172a;border-radius:4px;height:8px;overflow:hidden"><div style="width:${barW}%;height:100%;background:${col};border-radius:4px"></div></div>
                <div style="width:50px;font-size:.78rem;font-weight:700;color:${col};text-align:right">${score>0?'+':''}${score.toFixed(2)}</div>
              </div>`;}).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📈</div><h3>Progress 8</h3><p>${year} Progress 8 data.</p></div>`;
  }
}

window.wrenLoadTab_assessment_gcsetargets = function() { assGcseLoad(); };

async function assGcseLoad() {
  const el = document.getElementById('ass-gcse-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const subject = document.getElementById('gcse-subject')?.value || '';
  try {
    const data = await Wren.api(`/api/assessments-secondary/gcse-targets${subject?'?subject='+encodeURIComponent(subject):''}`).catch(() => null);
    if (!data) throw new Error('No data');
    const grades = ['9','8','7','6','5','4','3','2','1','U'];
    el.innerHTML = `
      <div style="overflow-x:auto">
        <table style="width:100%;font-size:.8rem;border-collapse:collapse;min-width:600px">
          <thead><tr>
            <th style="text-align:left;padding:8px;color:var(--c-muted);font-weight:600;border-bottom:1px solid var(--c-border)">Subject</th>
            ${grades.map(g=>`<th style="text-align:center;padding:8px;color:var(--c-muted);font-weight:600;border-bottom:1px solid var(--c-border)">${g}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${(data.subjects||[]).map(s=>`<tr>
              <td style="padding:8px;border-bottom:1px solid rgba(45,55,72,.5);font-weight:500">${s.subject}</td>
              ${grades.map(g=>{const n=(s.grade_counts||{})[g]||0;const bg=g>='7'?'rgba(34,197,94,.12)':g>='4'?'rgba(74,154,191,.1)':'rgba(239,68,68,.08)';return`<td style="text-align:center;padding:8px;border-bottom:1px solid rgba(45,55,72,.5);background:${n?bg:'transparent'};color:${n?'#f1f5f9':'#475569'}">${n||''}</td>`;}).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    // Populate subject dropdown
    const sel = document.getElementById('gcse-subject');
    if (sel && sel.options.length <= 1 && (data.subjects||[]).length) {
      (data.subjects||[]).forEach(s => { const o=document.createElement('option'); o.value=s.subject; o.textContent=s.subject; sel.appendChild(o); });
    }
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🎓</div><h3>GCSE Targets</h3><p>Predicted vs target grades for current Y11 cohort.</p></div>`;
  }
}

window.wrenLoadTab_assessment_reports = function() { assReportsLoad(); };

async function assReportsLoad() {
  const el = document.getElementById('ass-reports-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  try {
    const data = await Wren.api('/api/reports?type=term&limit=20').catch(() => ({ reports: [] }));
    const reps = data.reports || data || [];
    if (!reps.length) {
      el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📄</div><h3>Reports</h3><p>Term reports will appear here once generated.</p></div>`;
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">
      ${reps.map(r=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--c-card);border:1px solid var(--c-border);border-radius:10px">
          <span style="font-size:1.2rem">📄</span>
          <div style="flex:1">
            <div style="font-size:.85rem;font-weight:600;color:var(--c-text)">${r.child_name||r.student_name||'Report'}</div>
            <div style="font-size:.75rem;color:var(--c-muted)">${r.term||''} ${r.year||''} · ${r.status||'draft'}</div>
          </div>
          <span style="font-size:.72rem;padding:2px 8px;border-radius:8px;background:${r.status==='published'?'rgba(34,197,94,.15)':'rgba(245,158,11,.12)'};color:${r.status==='published'?'#86efac':'#fcd34d'}">${r.status||'draft'}</span>
        </div>`).join('')}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📄</div><h3>Reports</h3><p>Term reports.</p></div>`;
  }
}

function assReportGenerate() {
  Wren.toast('Generating reports — this may take a moment…', 'info');
}
</script>
