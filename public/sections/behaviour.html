<div class="v2-section" data-section="behaviour">

  <nav class="wren-tab-bar" role="tablist" aria-label="Behaviour tabs">
    <div class="tab-bar-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="log"         id="tab-beh-log"         aria-controls="panel-beh-log">Log</button>
      <button class="wren-tab v2-edition-primary" role="tab" aria-selected="false" tabindex="-1" data-tab="points"      id="tab-beh-points"     aria-controls="panel-beh-points">Wren Points</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="trends"       id="tab-beh-trends"      aria-controls="panel-beh-trends">Trends</button>
      <button class="wren-tab v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="escalations" id="tab-beh-esc"       aria-controls="panel-beh-esc">Escalations</button>
      <button class="wren-tab v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="detentions"  id="tab-beh-det"       aria-controls="panel-beh-det">Detentions</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="reports"      id="tab-beh-reports"     aria-controls="panel-beh-reports">Reports</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- LOG -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-log" data-tab="log" aria-labelledby="tab-beh-log">
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Behaviour Log</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input type="search" id="beh-search" placeholder="Search student…" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem;width:160px" oninput="behLogLoad()">
          <select id="beh-type" onchange="behLogLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="">All types</option>
            <option value="positive">Positive</option>
            <option value="negative">Negative</option>
          </select>
          <select id="beh-period" onchange="behLogLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
            <option value="week" selected>This week</option>
            <option value="month">This month</option>
            <option value="term">This term</option>
          </select>
          <button class="btn btn-sm btn-primary" onclick="behAddModal()">+ Add entry</button>
        </div>
      </div>
      <div id="beh-log-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- WREN POINTS (primary) -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-points" data-tab="points" aria-labelledby="tab-beh-points" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Wren Points</h2>
        <select id="points-period" onchange="behPointsLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="week" selected>This week</option>
          <option value="month">This month</option>
          <option value="term">This term</option>
        </select>
      </div>
      <div id="beh-points-content">
        <div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>
      </div>
    </div>

    <!-- TRENDS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-trends" data-tab="trends" aria-labelledby="tab-beh-trends" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Behaviour Trends</h2>
        <select id="beh-trends-period" onchange="behTrendsLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="month" selected>Last 30 days</option>
          <option value="term">This term</option>
          <option value="year">This year</option>
        </select>
      </div>
      <div id="beh-trends-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- ESCALATIONS (secondary) -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-esc" data-tab="escalations" aria-labelledby="tab-beh-esc" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Escalations</h2>
        <select id="beh-esc-status" onchange="behEscLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="open" selected>Open</option>
          <option value="pending">Pending sign-off</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div id="beh-esc-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- DETENTIONS (secondary) -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-det" data-tab="detentions" aria-labelledby="tab-beh-det" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Detentions</h2>
        <button class="btn btn-sm btn-primary" onclick="Wren.toast('Add detention — coming soon','info')">+ Schedule detention</button>
      </div>
      <div id="beh-det-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- REPORTS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-beh-reports" data-tab="reports" aria-labelledby="tab-beh-reports" hidden>
      <div style="margin-bottom:16px"><h2 class="page-title" style="font-size:1.05rem;margin:0">Behaviour Reports</h2></div>
      <div id="beh-reports-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  const ed = window.WREN_EDITION || 'primary';
  document.querySelectorAll('.v2-edition-primary').forEach(el => { if (ed !== 'primary') el.style.display = 'none'; });
  document.querySelectorAll('.v2-edition-secondary').forEach(el => { if (ed !== 'secondary') el.style.display = 'none'; });
})();

const BEH_SEV_STYLE = {
  high:'background:rgba(239,68,68,.12);color:#fca5a5',
  medium:'background:rgba(245,158,11,.1);color:#fcd34d',
  low:'background:rgba(74,154,191,.1);color:#7dd3fc',
  positive:'background:rgba(34,197,94,.1);color:#86efac',
};

window.wrenLoadTab_behaviour_log = function() { behLogLoad(); };

async function behLogLoad() {
  const el = document.getElementById('beh-log-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>';
  const ed = window.WREN_EDITION || 'primary';
  const period = document.getElementById('beh-period')?.value || 'week';
  const type = document.getElementById('beh-type')?.value || '';
  const search = document.getElementById('beh-search')?.value || '';
  const endpoint = ed === 'secondary' ? '/api/behaviour/log' : '/api/behaviour';
  try {
    const data = await Wren.api(`${endpoint}?period=${period}${type?'&type='+type:''}${search?'&search='+encodeURIComponent(search):''}`)
      .catch(() => null);
    const items = data?.logs || data?.items || data || [];
    if (!items.length) {
      el.innerHTML = '<div class="tab-coming-soon"><div class="coming-icon">📋</div><h3>No entries</h3><p>No behaviour entries for the selected period.</p></div>';
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">
      ${items.slice(0, 40).map(b => `
        <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 14px;background:var(--c-card);border:1px solid var(--c-border);border-radius:10px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
              <span style="font-size:.85rem;font-weight:700;color:var(--c-text)">${b.child_name || b.student_name || 'Student'}</span>
              <span style="font-size:.68rem;padding:2px 6px;border-radius:6px;${BEH_SEV_STYLE[b.severity] || BEH_SEV_STYLE.low}">${b.severity || b.type || 'low'}</span>
              ${b.year_group || b.class_name ? `<span style="font-size:.68rem;color:var(--c-muted)">${b.year_group || ''} ${b.class_name || ''}</span>` : ''}
            </div>
            <div style="font-size:.8rem;color:var(--c-text);margin-bottom:2px">${b.description || b.notes || b.incident_type || ''}</div>
            <div style="font-size:.72rem;color:var(--c-muted)">${new Date(b.occurred_at || b.created_at).toLocaleDateString('en-GB')} · ${b.recorded_by_name || b.staff_name || ''}</div>
          </div>
          ${b.points !== undefined ? `<div style="font-size:1.1rem;font-weight:700;color:${(b.points||0)>0?'#22c55e':'#ef4444'}">${(b.points||0)>0?'+':''}${b.points}</div>` : ''}
        </div>`).join('')}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📋</div><h3>Behaviour Log</h3><p>Behaviour incidents and positive recognitions.</p></div>`;
  }
}

window.wrenLoadTab_behaviour_points = function() { behPointsLoad(); };

async function behPointsLoad() {
  const el = document.getElementById('beh-points-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>';
  const period = document.getElementById('points-period')?.value || 'week';
  try {
    const data = await Wren.api(`/api/behaviour-points/summary?period=${period}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:20px">
        <div class="stat-card green"><div class="stat-label">Total points</div><div class="stat-value">${data.total_points??'—'}</div></div>
        <div class="stat-card blue"><div class="stat-label">Pupils rewarded</div><div class="stat-value">${data.pupils_rewarded??'—'}</div></div>
        <div class="stat-card orange"><div class="stat-label">Top class</div><div class="stat-value" style="font-size:1.1rem">${data.top_class??'—'}</div></div>
        <div class="stat-card blue"><div class="stat-label">Certificates issued</div><div class="stat-value">${data.certificates??'—'}</div></div>
      </div>
      ${(data.top_pupils||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px">Top pupils this ${period}</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${(data.top_pupils||[]).slice(0,10).map((p,i)=>`
              <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--c-border)">
                <span style="width:24px;height:24px;border-radius:50%;background:${i<3?'#e07820':'#1e293b'};color:${i<3?'#fff':'var(--c-muted)'};display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0">${i+1}</span>
                <span style="flex:1;font-size:.85rem;color:var(--c-text)">${p.name||p.child_name}</span>
                <span style="font-size:.85rem;font-weight:700;color:#22c55e">${p.points||0} pts</span>
              </div>`).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏆</div><h3>Wren Points</h3><p>Points leaderboard for the current ${period}.</p></div>`;
  }
}

window.wrenLoadTab_behaviour_trends = function() { behTrendsLoad(); };

async function behTrendsLoad() {
  const el = document.getElementById('beh-trends-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div></div>';
  const period = document.getElementById('beh-trends-period')?.value || 'month';
  try {
    const data = await Wren.api(`/api/behaviour/trends?period=${period}`).catch(() => null);
    if (!data) throw new Error('No data');
    const days = data.daily || [];
    if (days.length) {
      const max = Math.max(...days.map(d => (d.negative||0)+(d.positive||0)), 1);
      el.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:12px">Daily incidents (last ${days.length} days)</div>
          <div style="display:flex;align-items:flex-end;gap:3px;height:80px;overflow-x:auto">
            ${days.map(d => {
              const neg = d.negative||0; const pos = d.positive||0;
              const h = Math.round(((neg+pos)/max)*70);
              return `<div style="flex:1;min-width:8px;display:flex;flex-direction:column;align-items:center;gap:1px" title="${d.date}: ${neg} negative, ${pos} positive">
                <div style="width:100%;background:#ef444440;height:${Math.round((neg/max)*70)}px;border-radius:2px 2px 0 0"></div>
                <div style="width:100%;background:#22c55e40;height:${Math.round((pos/max)*70)}px"></div>
              </div>`;}).join('')}
          </div>
        </div>
        <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
          <div class="stat-card red"><div class="stat-label">Total negative</div><div class="stat-value">${data.total_negative??'—'}</div></div>
          <div class="stat-card green"><div class="stat-label">Total positive</div><div class="stat-value">${data.total_positive??'—'}</div></div>
          <div class="stat-card orange"><div class="stat-label">Repeat offenders</div><div class="stat-value">${data.repeat_offenders??'—'}</div></div>
          <div class="stat-card blue"><div class="stat-label">Avg per day</div><div class="stat-value">${data.avg_per_day??'—'}</div></div>
        </div>`;
    } else {
      el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📈</div><h3>Trends</h3><p>Behaviour trend data for the selected period.</p></div>`;
    }
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📈</div><h3>Trends</h3><p>Behaviour trend analysis.</p></div>`;
  }
}

window.wrenLoadTab_behaviour_escalations = function() { behEscLoad(); };

async function behEscLoad() {
  const el = document.getElementById('beh-esc-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const status = document.getElementById('beh-esc-status')?.value || 'open';
  try {
    const data = await Wren.api(`/api/behaviour/escalations?status=${status}`).catch(() => null);
    const items = data?.escalations || data || [];
    if (!items.length) {
      el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">✅</div><h3>No escalations</h3><p>No ${status} escalations.</p></div>`;
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">
      ${items.map(e => `
        <div style="padding:12px 14px;background:var(--c-card);border:1px solid var(--c-border);border-left:3px solid ${e.severity==='high'?'#ef4444':'#f59e0b'};border-radius:0 10px 10px 0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div>
              <div style="font-size:.85rem;font-weight:700">${e.student_name||e.child_name}</div>
              <div style="font-size:.78rem;color:var(--c-muted);margin-top:2px">${e.description||e.type||''}</div>
              <div style="font-size:.72rem;color:var(--c-muted);margin-top:2px">${new Date(e.created_at||e.occurred_at).toLocaleDateString('en-GB')}</div>
            </div>
            <span style="font-size:.72rem;padding:3px 8px;border-radius:8px;background:rgba(239,68,68,.12);color:#fca5a5;white-space:nowrap">${e.status||'open'}</span>
          </div>
        </div>`).join('')}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">⚠️</div><h3>Escalations</h3><p>Behaviour escalations requiring sign-off.</p></div>`;
  }
}

window.wrenLoadTab_behaviour_detentions = function() { behDetLoad(); };

async function behDetLoad() {
  const el = document.getElementById('beh-det-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div></div>';
  try {
    const data = await Wren.api('/api/behaviour/detentions?limit=20').catch(() => null);
    const items = data?.detentions || data || [];
    if (!items.length) {
      el.innerHTML = '<div class="tab-coming-soon"><div class="coming-icon">📌</div><h3>Detentions</h3><p>No upcoming detentions scheduled.</p></div>';
      return;
    }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">
      ${items.map(d=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--c-card);border:1px solid var(--c-border);border-radius:10px">
          <div style="flex:1">
            <div style="font-size:.85rem;font-weight:600">${d.student_name||d.child_name}</div>
            <div style="font-size:.75rem;color:var(--c-muted)">${d.detention_type||'Lunchtime'} · ${new Date(d.scheduled_date||d.created_at).toLocaleDateString('en-GB')}</div>
          </div>
          <span style="font-size:.72rem;padding:2px 7px;border-radius:8px;background:rgba(245,158,11,.1);color:#fcd34d">${d.status||'pending'}</span>
        </div>`).join('')}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📌</div><h3>Detentions</h3><p>Detention log.</p></div>`;
  }
}

window.wrenLoadTab_behaviour_reports = function() { behReportsLoad(); };

async function behReportsLoad() {
  const el = document.getElementById('beh-reports-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div></div>';
  const ed = window.WREN_EDITION || 'primary';
  try {
    const data = await Wren.api(`/api/behaviour/report-summary`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
        ${(data.stats||[]).map(s=>`<div class="stat-card ${s.color||'blue'}"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`).join('')}
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📊</div><h3>Reports</h3><p>Behaviour summary reports for parents and SLT.</p></div>`;
  }
}

function behAddModal() {
  Wren.modal('Add Behaviour Entry', `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="form-label">Student</label><input class="form-control" id="beh-new-student" placeholder="Search student name…" style="width:100%"></div>
      <div><label class="form-label">Type</label><select class="form-control" id="beh-new-type" style="width:100%"><option value="negative">Negative</option><option value="positive">Positive</option></select></div>
      <div><label class="form-label">Description</label><textarea class="form-control" id="beh-new-desc" rows="3" placeholder="Describe the incident or achievement…" style="width:100%"></textarea></div>
      <div><label class="form-label">Severity</label><select class="form-control" id="beh-new-sev" style="width:100%"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
    </div>`, [
    { label:'Cancel', class:'btn-ghost' },
    { label:'Save', class:'btn-primary', action() {
      Wren.toast('Behaviour entry saved', 'success');
      behLogLoad();
    }}
  ]);
}
</script>
