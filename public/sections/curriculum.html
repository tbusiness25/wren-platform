<div class="v2-section" data-section="curriculum">

  <nav class="wren-tab-bar" role="tablist" aria-label="Curriculum tabs">
    <div class="tab-bar-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="planning"    id="tab-cur-plan"    aria-controls="panel-cur-plan">Planning</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="next-steps"  id="tab-cur-ns"      aria-controls="panel-cur-ns">Next Steps</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="events"      id="tab-cur-events"  aria-controls="panel-cur-events">Events</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="trips"       id="tab-cur-trips"   aria-controls="panel-cur-trips">Trips</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="calendar"    id="tab-cur-cal"     aria-controls="panel-cur-cal">Calendar</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- PLANNING -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-cur-plan" data-tab="planning" aria-labelledby="tab-cur-plan">
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Planning Workspace</h2>
        <div style="display:flex;gap:8px">
          <select class="v2-sort-select" id="plan-term-select" aria-label="Select term">
            <option value="">This term</option>
          </select>
          <a href="/admin/curriculum/planning" class="btn btn-sm btn-primary">Full planner →</a>
        </div>
      </div>
      <div id="cur-plan-stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:20px"></div>
      <div id="cur-plan-list">
        <div class="tab-skeleton"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div>
      </div>
    </div>

    <!-- NEXT STEPS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-cur-ns" data-tab="next-steps" aria-labelledby="tab-cur-ns" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Next Steps</h2>
        <div style="display:flex;gap:8px">
          <select class="v2-sort-select" id="ns-area-filter" aria-label="Filter by EYFS area">
            <option value="">All areas</option>
            <option value="Communication">Communication &amp; Language</option>
            <option value="Physical">Physical Development</option>
            <option value="PSED">PSED</option>
            <option value="Literacy">Literacy</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Understanding">Understanding the World</option>
            <option value="Expressive">Expressive Arts</option>
          </select>
          <a href="/children/next-steps.html" class="btn btn-sm btn-ghost">Full view →</a>
        </div>
      </div>
      <div id="cur-ns-list">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- EVENTS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-cur-events" data-tab="events" aria-labelledby="tab-cur-events" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Events &amp; Outings</h2>
        <a href="/admin/curriculum/events" class="btn btn-sm btn-primary">Manage events →</a>
      </div>
      <div id="cur-events-list">
        <div class="tab-skeleton"><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div>
      </div>
    </div>

    <!-- TRIPS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-cur-trips" data-tab="trips" aria-labelledby="tab-cur-trips" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Trips &amp; Outings</h2>
        <a href="/admin/curriculum/events" class="btn btn-sm btn-primary">Plan a trip →</a>
      </div>
      <div id="cur-trips-list">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-cur-cal" data-tab="calendar" aria-labelledby="tab-cur-cal" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.1rem;margin:0">Curriculum Calendar</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-ghost" id="cur-cal-prev">‹</button>
          <span id="cur-cal-label" style="line-height:32px;font-weight:600;min-width:130px;text-align:center"></span>
          <button class="btn btn-sm btn-ghost" id="cur-cal-next">›</button>
        </div>
      </div>
      <div id="cur-cal-body">
        <div class="tab-skeleton"><div class="tab-sk-row w100"></div><div class="tab-sk-row w100"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Planning tab ─────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_planning'] = function() {
    const statsEl = document.getElementById('cur-plan-stats');
    const listEl  = document.getElementById('cur-plan-list');

    Wren.api('/api/planning/activities').then(data => {
      const acts = Array.isArray(data) ? data : (data.activities || data.plans || []);

      if (statsEl) {
        const areas = {};
        acts.forEach(a => { (a.eyfs_areas || [a.eyfs_area]).filter(Boolean).forEach(ar => { areas[ar] = (areas[ar]||0) + 1; }); });
        statsEl.innerHTML = Object.entries(areas).map(([area, count]) => `
          <div class="v2-stat-card">
            <div class="stat-num">${count}</div>
            <div class="stat-label">${area}</div>
          </div>`).join('') || `<div class="v2-stat-card"><div class="stat-num">${acts.length}</div><div class="stat-label">Activities planned</div></div>`;
      }

      if (listEl) {
        if (!acts.length) {
          listEl.innerHTML = `<div class="tab-coming-soon">
            <div class="coming-icon">📋</div>
            <h3>No plans yet</h3>
            <p>Use the planner to create weekly and half-termly curriculum plans linked to EYFS areas.</p>
            <a href="/admin/curriculum/planning" class="btn btn-primary" style="margin-top:8px">Open planner →</a>
          </div>`;
          return;
        }
        listEl.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">` +
          acts.slice(0,12).map(a => `
            <div class="v2-card">
              <div style="font-weight:600;margin-bottom:4px">${a.title||a.name||'Activity'}</div>
              <div style="font-size:.85rem;color:var(--c-muted);margin-bottom:8px">${a.description||''}</div>
              ${Array.isArray(a.eyfs_areas) && a.eyfs_areas.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px">${a.eyfs_areas.map(ar=>`<span class="badge badge-blue" style="font-size:.7rem">${ar}</span>`).join('')}</div>` : ''}
            </div>`).join('') + `</div>`;
      }
    }).catch(() => {
      if (listEl) listEl.innerHTML = `<div class="tab-coming-soon">
        <div class="coming-icon">📋</div>
        <h3>Curriculum Planning</h3>
        <p>Weekly and half-termly plans linked to EYFS prime and specific areas.</p>
        <a href="/admin/curriculum/planning" class="btn btn-ghost" style="margin-top:8px">Open planner →</a>
      </div>`;
    });
  };

  // ── Next Steps tab ────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_next-steps'] = function() {
    const el = document.getElementById('cur-ns-list');
    if (!el) return;

    function _loadNS(area) {
      el.innerHTML = `<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>`;
      const url = `/api/observations/recent?limit=50` + (area ? `&area=${encodeURIComponent(area)}` : '');
      Wren.api(url).then(rows => {
        const withNS = rows.filter(o =>
          o.next_steps || (o.observation_text && o.observation_text.toLowerCase().includes('next step'))
        );
        if (!withNS.length) {
          el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
            <div class="coming-icon">🚀</div>
            <h3>No next steps yet</h3>
            <p>Next steps are drawn from observations. Add a next steps note to any observation to see it here.</p>
          </div>`;
          return;
        }
        el.innerHTML = `<div class="obs-timeline">` + withNS.map(o => `
          <div class="obs-item">
            <div class="obs-meta" style="display:flex;gap:8px;align-items:center">
              <span>${o.child_name}</span>
              <span style="color:var(--c-muted)">${new Date(o.created_at).toLocaleDateString('en-GB')}</span>
              ${o.room_name ? `<span class="badge badge-blue" style="font-size:.7rem">${o.room_name}</span>` : ''}
            </div>
            <div class="obs-text">${o.next_steps || (o.observation_text || '').split('\n').find(l => l.toLowerCase().includes('next step')) || ''}</div>
            ${Array.isArray(o.eyfs_areas) ? `<div class="obs-tags">${o.eyfs_areas.map(a=>`<span class="badge badge-green" style="font-size:.7rem">${a}</span>`).join(' ')}</div>` : ''}
          </div>`).join('') + `</div>`;
      }).catch(() => {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">🚀</div>
          <h3>Next Steps</h3>
          <p>AI-generated and manual next steps appear here, filtered by room and EYFS area.</p>
          <a href="/children/next-steps.html" class="btn btn-ghost" style="margin-top:8px">View in full →</a>
        </div>`;
      });
    }

    _loadNS('');
    document.getElementById('ns-area-filter')?.addEventListener('change', e => _loadNS(e.target.value));
  };

  // ── Events tab ────────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_events'] = function() {
    const el = document.getElementById('cur-events-list');
    if (!el) return;
    Wren.api('/api/outings').then(rows => {
      const upcoming = rows.filter(o => o.date && new Date(o.date) >= new Date()).slice(0, 10);
      const past     = rows.filter(o => !o.date || new Date(o.date) < new Date()).slice(0, 5);

      let html = '';
      if (upcoming.length) {
        html += `<h4 style="color:var(--c-muted);font-size:.8rem;text-transform:uppercase;margin-bottom:10px">Upcoming</h4>
          <div class="obs-timeline">` + upcoming.map(o => `
            <div class="obs-item">
              <div class="obs-meta" style="display:flex;justify-content:space-between">
                <span>${o.title||o.name||'Event'}</span>
                <span style="color:var(--c-muted)">${new Date(o.date).toLocaleDateString('en-GB')}</span>
              </div>
              ${o.destination||o.description ? `<div class="obs-text" style="font-size:.85rem">${o.destination||o.description}</div>` : ''}
              ${o.room_name ? `<span class="badge badge-blue" style="font-size:.7rem">${o.room_name}</span>` : ''}
            </div>`).join('') + `</div>`;
      }
      if (past.length) {
        html += `<h4 style="color:var(--c-muted);font-size:.8rem;text-transform:uppercase;margin:16px 0 10px">Recent</h4>
          <div class="obs-timeline">` + past.map(o => `
            <div class="obs-item" style="opacity:.6">
              <div class="obs-meta" style="display:flex;justify-content:space-between">
                <span>${o.title||o.name||'Event'}</span>
                <span style="color:var(--c-muted)">${o.date ? new Date(o.date).toLocaleDateString('en-GB') : '—'}</span>
              </div>
              ${o.room_name ? `<span class="badge badge-blue" style="font-size:.7rem">${o.room_name}</span>` : ''}
            </div>`).join('') + `</div>`;
      }

      el.innerHTML = html || `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">🎉</div><h3>No events yet</h3>
        <a href="/admin/curriculum/events" class="btn btn-ghost" style="margin-top:8px">Add first event →</a>
      </div>`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">🎉</div>
        <h3>Events</h3>
        <p>Seasonal events, celebrations, and community days. Linked to trip planning and consent collection.</p>
        <a href="/admin/curriculum/events" class="btn btn-ghost" style="margin-top:8px">Open events manager →</a>
      </div>`;
    });
  };

  // ── Trips tab ─────────────────────────────────────────────────────────────────

  window['wrenLoadTab_curriculum_trips'] = function() {
    const el = document.getElementById('cur-trips-list');
    if (!el) return;
    Wren.api('/api/outings').then(rows => {
      if (!rows.length) {
        el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
          <div class="coming-icon">🚌</div><h3>No trips planned</h3>
          <a href="/admin/curriculum/events" class="btn btn-primary" style="margin-top:8px">Plan a trip →</a>
        </div>`;
        return;
      }
      el.innerHTML = rows.map(t => {
        const isPast = t.date && new Date(t.date) < new Date();
        return `<div class="v2-card" style="margin-bottom:10px;${isPast?'opacity:.6':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1">
              <div style="font-weight:600;margin-bottom:4px">${t.title||t.name||'Trip'} ${isPast ? '<span class="badge badge-blue" style="font-size:.7rem">past</span>' : '<span class="badge badge-green" style="font-size:.7rem">upcoming</span>'}</div>
              ${t.date ? `<div style="font-size:.85rem;color:var(--c-muted);margin-bottom:4px">📅 ${new Date(t.date).toLocaleDateString('en-GB')}</div>` : ''}
              ${t.destination ? `<div style="font-size:.85rem;color:var(--c-muted)">📍 ${t.destination}</div>` : ''}
              ${t.room_name ? `<div style="font-size:.8rem;color:var(--c-muted);margin-top:4px">${t.room_name}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
              ${t.risk_assessment_status === 'completed' ? `<span class="badge badge-green" style="font-size:.7rem">RA ✓</span>` : `<span class="badge badge-yellow" style="font-size:.7rem">RA pending</span>`}
            </div>
          </div>
        </div>`;
      }).join('') + `<a href="/admin/curriculum/events" class="btn btn-sm btn-ghost" style="margin-top:4px">Manage all trips →</a>`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0">
        <div class="coming-icon">🚌</div>
        <h3>Trips &amp; Outings</h3>
        <p>Trip planning, risk assessments, and consent tracking.</p>
        <a href="/admin/curriculum/events" class="btn btn-ghost" style="margin-top:8px">Open outings manager →</a>
      </div>`;
    });
  };

  // ── Calendar tab ──────────────────────────────────────────────────────────────

  let _curCalYear = new Date().getFullYear();
  let _curCalMonth = new Date().getMonth();

  window['wrenLoadTab_curriculum_calendar'] = function() {
    _renderCurCal();
    document.getElementById('cur-cal-prev')?.addEventListener('click', () => { _curCalMonth--; if (_curCalMonth < 0) { _curCalMonth = 11; _curCalYear--; } _renderCurCal(); });
    document.getElementById('cur-cal-next')?.addEventListener('click', () => { _curCalMonth++; if (_curCalMonth > 11) { _curCalMonth = 0; _curCalYear++; } _renderCurCal(); });
  };

  function _renderCurCal() {
    const el = document.getElementById('cur-cal-body');
    const label = document.getElementById('cur-cal-label');
    if (!el) return;
    if (label) label.textContent = new Date(_curCalYear, _curCalMonth).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    el.innerHTML = `<div class="tab-skeleton"><div class="tab-sk-row w100"></div><div class="tab-sk-row w80"></div></div>`;

    const firstDay = new Date(_curCalYear, _curCalMonth, 1);
    const lastDay  = new Date(_curCalYear, _curCalMonth + 1, 0);

    Wren.api('/api/outings').then(outings => {
      const thisMonth = outings.filter(o => {
        if (!o.date) return false;
        const d = new Date(o.date);
        return d >= firstDay && d <= lastDay;
      });

      const DAYS = ['Mon','Tue','Wed','Thu','Fri'];
      const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
      const daysInMonth = lastDay.getDate();

      const weeks = [];
      let week = new Array(startDow).fill(null);
      for (let d = 1; d <= daysInMonth; d++) {
        week.push(d);
        const dow = (new Date(_curCalYear, _curCalMonth, d).getDay() + 6) % 7;
        if (dow === 6 || d === daysInMonth) {
          while (week.length < 7) week.push(null);
          weeks.push(week.slice(0, 5)); // Mon–Fri only
          week = [];
        }
      }

      const grid = weeks.map(wk => {
        const cells = wk.map(d => {
          if (!d) return `<td style="border:1px solid var(--c-border);height:70px;padding:4px"></td>`;
          const events = thisMonth.filter(o => new Date(o.date).getDate() === d);
          const isToday = new Date().getDate() === d && new Date().getMonth() === _curCalMonth && new Date().getFullYear() === _curCalYear;
          return `<td style="border:1px solid var(--c-border);height:70px;padding:4px;vertical-align:top">
            <div style="font-weight:${isToday?'700':'400'};font-size:.8rem;color:${isToday?'var(--c-blue)':'var(--c-muted)'};margin-bottom:2px">${d}</div>
            ${events.map(e => `<div style="background:#22c55e22;border-left:2px solid #22c55e;padding:1px 4px;border-radius:2px;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px" title="${e.title||e.name}">${e.title||e.name}</div>`).join('')}
          </td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
      }).join('');

      el.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:.8rem">
          <thead><tr>${DAYS.map(d=>`<th style="padding:6px;text-align:center;font-size:.75rem;color:var(--c-muted)">${d}</th>`).join('')}</tr></thead>
          <tbody>${grid || '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--c-muted)">No events this month</td></tr>'}</tbody>
        </table>`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon" style="padding:32px 0"><div class="coming-icon">📅</div><h3>Calendar unavailable</h3></div>`;
    });
  }

})();
</script>
