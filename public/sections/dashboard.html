<div class="v2-section" data-section="dashboard">

  <nav class="wren-tab-bar" role="tablist" aria-label="Dashboard tabs">
    <div class="tab-bar-track" id="dashboard-tab-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="today"      id="tab-dashboard-today"      aria-controls="panel-dashboard-today">Today</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="alerts"     id="tab-dashboard-alerts"     aria-controls="panel-dashboard-alerts">Alerts</button>
      <button class="wren-tab v2-edition-primary v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="attendance" id="tab-dashboard-attendance" aria-controls="panel-dashboard-attendance">Attendance</button>
      <button class="wren-tab v2-edition-secondary" role="tab" aria-selected="false" tabindex="-1" data-tab="behaviour"   id="tab-dashboard-behaviour"  aria-controls="panel-dashboard-behaviour">Behaviour</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="summary"    id="tab-dashboard-summary"    aria-controls="panel-dashboard-summary">Summary</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- TODAY -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-today" data-tab="today" aria-labelledby="tab-dashboard-today">
      <div id="dash-today-content">
        <div class="tab-skeleton">
          <div class="tab-skeleton-grid">
            <div class="tab-sk-card"></div><div class="tab-sk-card"></div>
            <div class="tab-sk-card"></div><div class="tab-sk-card"></div>
          </div>
          <div style="margin-top:20px"><div class="tab-sk-row w80"></div></div>
          <div class="tab-sk-row w60"></div>
        </div>
      </div>
    </div>

    <!-- ALERTS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-alerts" data-tab="alerts" aria-labelledby="tab-dashboard-alerts" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Alerts</h2>
        <button class="btn btn-sm btn-ghost" onclick="dashAlertsLoad()">↺ Refresh</button>
      </div>
      <div id="dash-alerts-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- ATTENDANCE (primary / secondary) -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-attendance" data-tab="attendance" aria-labelledby="tab-dashboard-attendance" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Attendance Overview</h2>
        <select id="dash-att-period" onchange="dashAttendanceLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="week">This week</option>
          <option value="fortnight">Last 2 weeks</option>
          <option value="month">This month</option>
          <option value="term" selected>This term</option>
        </select>
      </div>
      <div id="dash-attendance-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div><div class="tab-sk-row w75"></div></div>
      </div>
    </div>

    <!-- BEHAVIOUR (secondary) -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-behaviour" data-tab="behaviour" aria-labelledby="tab-dashboard-behaviour" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Behaviour Overview</h2>
        <select id="dash-beh-period" onchange="dashBehaviourLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="week" selected>This week</option>
          <option value="month">This month</option>
          <option value="term">This term</option>
        </select>
      </div>
      <div id="dash-behaviour-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-dashboard-summary" data-tab="summary" aria-labelledby="tab-dashboard-summary" hidden>
      <div class="v2-page-header">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Period Summary</h2>
        <select id="dash-summary-period" onchange="dashSummaryLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="today">Today</option>
          <option value="week" selected>This week</option>
          <option value="month">This month</option>
          <option value="term">This term</option>
        </select>
      </div>
      <div id="dash-summary-content">
        <div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>
      </div>
    </div>

  </div>
</div>

<script>
// Hide edition-specific tabs based on current edition
(function() {
  const ed = window.WREN_EDITION || (document.querySelector('meta[name="wren-edition"]')?.content) || 'eyfs';
  document.querySelectorAll('.v2-edition-primary').forEach(el => { if (ed !== 'primary' && ed !== 'secondary') el.style.display = 'none'; });
  document.querySelectorAll('.v2-edition-secondary').forEach(el => { if (ed !== 'secondary') el.style.display = 'none'; });
})();

// ── TODAY ────────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_today = function(panel) {
  const ed = window.WREN_EDITION || 'eyfs';
  const apiUrl = (ed === 'primary' || ed === 'secondary') ? '/api/admin/overview' : '/api/daily-briefing';
  const el = document.getElementById('dash-today-content');
  if (!el) return;

  if (ed === 'primary' || ed === 'secondary') {
    Wren.api('/api/admin/overview').then(data => {
      if (!data) return;
      const label = ed === 'secondary' ? 'Students' : 'Pupils';
      const kpis = [
        { label: label + ' today', val: data.children_present ?? data.total_children ?? '—', col: 'blue' },
        { label: 'Staff on duty', val: data.staff_on_duty ?? data.total_staff ?? '—', col: 'orange' },
        { label: 'Overall attendance', val: data.attendance_rate != null ? data.attendance_rate + '%' : '—', col: data.attendance_rate >= 95 ? 'green' : 'warning' },
        { label: 'Behaviour incidents', val: data.behaviour_count ?? '—', col: (data.behaviour_count || 0) > 5 ? 'red' : 'green' },
        { label: 'Safeguarding open', val: data.open_safeguarding ?? '—', col: (data.open_safeguarding || 0) > 0 ? 'red' : 'green' },
        { label: 'Overdue invoices', val: data.overdue_invoices ?? '—', col: (data.overdue_invoices || 0) > 0 ? 'red' : 'green' },
      ];
      el.innerHTML = `
        <div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:20px">
          ${kpis.map(k=>`<div class="stat-card ${k.col}"><div class="stat-label">${k.label}</div><div class="stat-value">${k.val}</div></div>`).join('')}
        </div>
        ${data.briefing ? `<div class="card"><div class="card-title" style="margin-bottom:8px">🤖 AI Briefing</div><p style="font-size:.875rem;line-height:1.6;color:var(--c-text)">${data.briefing}</p></div>` : ''}`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏠</div><h3>Dashboard</h3><p>Today's overview loads here.</p></div>`;
    });
  } else {
    // EYFS / admin edition: fetch overview metrics + AI briefing in parallel
    Promise.all([
      Wren.api('/api/admin/overview').catch(() => null),
      Wren.api('/api/daily-briefing').catch(() => null),
    ]).then(([overview, briefingData]) => {
      if (!overview && !briefingData) return;
      const stats    = overview?.stats || {};
      const roomRows = overview?.rooms || [];
      const roomsOpen = roomRows.filter(r => (parseInt(r.present) || 0) > 0).length;
      const rooms = roomRows.map(r => {
        const present  = parseInt(r.present)  || 0;
        const capacity = parseInt(r.capacity) || 0;
        const ok = capacity === 0 || present <= capacity;
        return `
          <div class="stat-card ${ok ? 'green' : 'red'}">
            <div class="stat-label">${r.name}</div>
            <div class="stat-value">${present}<span style="font-size:1rem;color:var(--c-muted)">/${capacity}</span></div>
            <div class="stat-label">children present</div>
          </div>`;
      }).join('');
      const briefingText = briefingData?.priority || (briefingData?.bullets?.length ? briefingData.bullets[0] : '');
      el.innerHTML = `
        <div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));margin-bottom:20px">
          <div class="stat-card blue"><div class="stat-label">Children today</div><div class="stat-value">${stats.present ?? '—'}</div></div>
          <div class="stat-card orange"><div class="stat-label">Staff on duty</div><div class="stat-value">${stats.staff_in ?? '—'}</div></div>
          <div class="stat-card green"><div class="stat-label">Rooms open</div><div class="stat-value">${roomsOpen || '—'}</div></div>
          ${rooms}
        </div>
        ${briefingText ? `<div class="card"><div class="card-title" style="margin-bottom:8px">🤖 Today's focus</div><p style="font-size:.875rem;line-height:1.6;color:var(--c-text)">${briefingText}</p></div>` : ''}`;
    }).catch(() => {
      el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏠</div><h3>Dashboard</h3><p>Live ratios, attendance, and today's briefing load here when the portal is running.</p></div>`;
    });
  }
};

// ── ALERTS ───────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_alerts = function() { dashAlertsLoad(); };

async function dashAlertsLoad() {
  const el = document.getElementById('dash-alerts-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const alerts = [];
  try {
    const comp = await Wren.api('/api/compliance-events/upcoming').catch(() => []);
    const today = new Date();
    (comp || []).forEach(c => {
      const days = Math.ceil((new Date(c.next_due) - today) / 86400000);
      if (days < 0) alerts.push({ sev:'error', icon:'🚨', title:c.title+' — OVERDUE', body:'Was due '+new Date(c.next_due).toLocaleDateString('en-GB') });
      else if (days <= 7) alerts.push({ sev:'warning', icon:'⚠️', title:c.title+' due in '+days+'d', body:'Due '+new Date(c.next_due).toLocaleDateString('en-GB') });
    });
    const notifs = await Wren.api('/api/notifications/unread').catch(() => ({ items: [] }));
    (notifs.items || []).slice(0, 5).forEach(n => alerts.push({ sev:'info', icon:{repair:'🔧',message:'💬',safeguarding:'🛡️',medicine:'💊',incident:'🚨'}[n.category]||'🔔', title:n.title, body:n.body }));
    const comms = await Wren.api('/api/comms/summary').catch(() => ({ unread_count: 0 }));
    if ((comms.unread_count || 0) > 0) alerts.push({ sev:'info', icon:'💬', title:comms.unread_count+' unread message'+(comms.unread_count!==1?'s':''), body:'' });
  } catch (e) {}
  if (!alerts.length) {
    el.innerHTML = '<div class="tab-coming-soon"><div class="coming-icon">✅</div><h3>All clear</h3><p>No active alerts right now.</p></div>';
    return;
  }
  const sevOrder = { error:0, warning:1, info:2 };
  alerts.sort((a, b) => (sevOrder[a.sev]||2) - (sevOrder[b.sev]||2));
  const sevStyle = {
    error:'background:rgba(239,68,68,.1);border-left:3px solid #ef4444',
    warning:'background:rgba(245,158,11,.08);border-left:3px solid #f59e0b',
    info:'background:rgba(74,154,191,.08);border-left:3px solid #4a9abf',
  };
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px">
    ${alerts.map(a => `
      <div style="${sevStyle[a.sev]||sevStyle.info};border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:1.1rem">${a.icon}</span>
        <div><div style="font-size:.85rem;font-weight:700;color:#f1f5f9">${a.title}</div>${a.body?`<div style="font-size:.75rem;color:#94a3b8;margin-top:2px">${a.body}</div>`:''}</div>
      </div>`).join('')}
  </div>`;
}

// ── ATTENDANCE (primary/secondary) ───────────────────────────────────────────
window.wrenLoadTab_dashboard_attendance = function() { dashAttendanceLoad(); };

async function dashAttendanceLoad() {
  const el = document.getElementById('dash-attendance-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const period = document.getElementById('dash-att-period')?.value || 'term';
  try {
    const data = await Wren.api(`/api/attendance/summary?period=${period}`).catch(() => null);
    if (!data) throw new Error('No data');
    const rows = (data.by_year || data.by_room || []);
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:20px">
        <div class="stat-card blue"><div class="stat-label">Overall</div><div class="stat-value">${data.overall ?? '—'}%</div></div>
        <div class="stat-card ${(data.persistent_absence||0)>0?'red':'green'}"><div class="stat-label">Persistent absence</div><div class="stat-value">${data.persistent_absence ?? 0}</div></div>
        <div class="stat-card orange"><div class="stat-label">Unauthorised</div><div class="stat-value">${data.unauthorised ?? 0}</div></div>
        <div class="stat-card blue"><div class="stat-label">Authorised</div><div class="stat-value">${data.authorised ?? 0}</div></div>
      </div>
      ${rows.length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:12px">Breakdown by ${data.by_year ? 'year group' : 'room'}</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${rows.map(r => {
              const pct = r.rate ?? r.attendance_rate ?? 0;
              const col = pct >= 96 ? '#22c55e' : pct >= 90 ? '#f59e0b' : '#ef4444';
              return `<div style="display:flex;align-items:center;gap:12px">
                <div style="width:80px;font-size:.78rem;color:var(--c-muted);flex-shrink:0">${r.name||r.year_group||r.room_name||''}</div>
                <div style="flex:1;background:#0f172a;border-radius:4px;height:8px;overflow:hidden">
                  <div style="width:${Math.min(100,pct)}%;height:100%;background:${col};border-radius:4px;transition:width .4s ease"></div>
                </div>
                <div style="width:44px;font-size:.78rem;font-weight:700;text-align:right;color:${col}">${pct}%</div>
              </div>`;
            }).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📊</div><h3>Attendance</h3><p>Attendance overview for the current period.</p></div>`;
  }
}

// ── BEHAVIOUR (secondary) ────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_behaviour = function() { dashBehaviourLoad(); };

async function dashBehaviourLoad() {
  const el = document.getElementById('dash-behaviour-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  const period = document.getElementById('dash-beh-period')?.value || 'week';
  try {
    const data = await Wren.api(`/api/behaviour/summary?period=${period}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:20px">
        <div class="stat-card red"><div class="stat-label">Total incidents</div><div class="stat-value">${data.total ?? '—'}</div></div>
        <div class="stat-card orange"><div class="stat-label">Escalations</div><div class="stat-value">${data.escalations ?? 0}</div></div>
        <div class="stat-card blue"><div class="stat-label">Detentions set</div><div class="stat-value">${data.detentions ?? 0}</div></div>
        <div class="stat-card green"><div class="stat-label">Positives issued</div><div class="stat-value">${data.positives ?? 0}</div></div>
      </div>
      ${(data.recent||[]).length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:10px">Recent incidents</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${(data.recent||[]).slice(0,8).map(i=>`
              <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--c-border)">
                <span style="font-size:.75rem;color:var(--c-muted);flex-shrink:0;padding-top:2px">${new Date(i.occurred_at||i.created_at).toLocaleDateString('en-GB')}</span>
                <div style="flex:1;font-size:.82rem;color:var(--c-text)">${i.student_name||i.child_name||''} — ${i.type||i.incident_type||'Incident'}</div>
                <span style="font-size:.7rem;padding:2px 7px;border-radius:8px;background:${i.severity==='high'?'rgba(239,68,68,.15)':i.severity==='medium'?'rgba(245,158,11,.12)':'rgba(74,154,191,.1)'};color:${i.severity==='high'?'#fca5a5':i.severity==='medium'?'#fcd34d':'#7dd3fc'}">${i.severity||'low'}</span>
              </div>`).join('')}
          </div>
        </div>` : ''}`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📋</div><h3>Behaviour</h3><p>Behaviour overview and escalation log.</p></div>`;
  }
}

// ── SUMMARY ──────────────────────────────────────────────────────────────────
window.wrenLoadTab_dashboard_summary = function() { dashSummaryLoad(); };

async function dashSummaryLoad() {
  const el = document.getElementById('dash-summary-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-skeleton-grid"><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div><div class="tab-sk-card"></div></div></div>';
  try {
    const overview = await Wren.api('/api/admin/overview').catch(() => null);
    const ed = window.WREN_EDITION || 'eyfs';
    const label = ed === 'secondary' ? 'students' : ed === 'primary' ? 'pupils' : 'children';
    const kpis = [
      { label: 'Total ' + label, value: overview?.total_children ?? '—', color:'blue' },
      { label: 'Enrolment capacity', value: overview?.capacity_pct != null ? overview.capacity_pct + '%' : '—', color:'orange' },
      { label: 'Staff (active)', value: overview?.total_staff ?? '—', color:'green' },
      { label: 'Avg attendance', value: overview?.attendance_rate != null ? overview.attendance_rate + '%' : '—', color:'blue' },
      { label: 'Open enquiries', value: overview?.open_enquiries ?? '—', color:'orange' },
      { label: 'DBS expiring soon', value: overview?.dbs_expiring_soon ?? '—', color: (overview?.dbs_expiring_soon || 0) > 0 ? 'red' : 'green' },
      { label: 'Overdue invoices', value: overview?.overdue_invoices ?? '—', color: (overview?.overdue_invoices || 0) > 0 ? 'red' : 'green' },
      { label: 'Safeguarding open', value: overview?.open_safeguarding ?? '—', color: (overview?.open_safeguarding || 0) > 0 ? 'red' : 'green' },
    ];
    el.innerHTML = `<div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
      ${kpis.map(k => `<div class="stat-card ${k.color}"><div class="stat-label">${k.label}</div><div class="stat-value">${k.value}</div></div>`).join('')}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">📊</div><h3>Summary</h3><p>${e.message}</p></div>`;
  }
}
</script>
