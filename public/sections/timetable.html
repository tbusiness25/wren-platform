<div class="v2-section" data-section="timetable">
<style>
.tt-grid{display:grid;border:1px solid var(--c-border);border-radius:10px;overflow:hidden}
.tt-header{display:grid;grid-template-columns:80px repeat(5,1fr);background:#1e293b;border-bottom:1px solid var(--c-border)}
.tt-header-cell{padding:8px;font-size:.72rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em;text-align:center}
.tt-header-cell:first-child{text-align:left}
.tt-row{display:grid;grid-template-columns:80px repeat(5,1fr);border-top:1px solid rgba(45,55,72,.4)}
.tt-period-label{padding:8px;font-size:.75rem;color:var(--c-muted);background:#0f172a;display:flex;align-items:center}
.tt-cell{padding:6px;border-left:1px solid rgba(45,55,72,.3);min-height:56px;display:flex;flex-direction:column;gap:2px;transition:background .15s}
.tt-cell:hover{background:rgba(74,154,191,.06)}
.tt-lesson{border-radius:6px;padding:4px 6px;font-size:.73rem;line-height:1.35;cursor:pointer}
.tt-lesson .sub{font-weight:700;color:#f1f5f9}
.tt-lesson .cls{color:#94a3b8}
.tt-lesson .rm{font-size:.65rem;color:#64748b}
.tt-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:.72rem;color:#334155}
</style>

  <nav class="wren-tab-bar" role="tablist" aria-label="Timetable tabs">
    <div class="tab-bar-track">
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="0"  data-tab="weekly"     id="tab-tt-weekly"  aria-controls="panel-tt-weekly">School Week</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="rooms"      id="tab-tt-rooms"   aria-controls="panel-tt-rooms">Rooms</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="staff-view" id="tab-tt-staff"   aria-controls="panel-tt-staff">Staff View</button>
      <button class="wren-tab" role="tab" aria-selected="false" tabindex="-1" data-tab="class-view" id="tab-tt-class"   aria-controls="panel-tt-class">Class View</button>
    </div>
    <button class="tab-scroll-arrow left"  aria-hidden="true" tabindex="-1">‹</button>
    <button class="tab-scroll-arrow right" aria-hidden="true" tabindex="-1">›</button>
  </nav>

  <div class="wren-tab-panels">

    <!-- SCHOOL WEEK -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-tt-weekly" data-tab="weekly" aria-labelledby="tab-tt-weekly">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">School Week Timetable</h2>
        <select id="tt-year-group" onchange="ttWeeklyLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="">All year groups</option>
          <option value="Y7">Year 7</option>
          <option value="Y8">Year 8</option>
          <option value="Y9">Year 9</option>
          <option value="Y10">Year 10</option>
          <option value="Y11">Year 11</option>
        </select>
        <select id="tt-week" onchange="ttWeeklyLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="current" selected>This week</option>
          <option value="next">Next week</option>
        </select>
      </div>
      <div id="tt-weekly-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w100"></div><div class="tab-sk-row w100"></div><div class="tab-sk-row w100"></div></div>
      </div>
    </div>

    <!-- ROOMS -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-tt-rooms" data-tab="rooms" aria-labelledby="tab-tt-rooms" hidden>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Room Utilisation</h2>
      </div>
      <div id="tt-rooms-content">
        <div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>
      </div>
    </div>

    <!-- STAFF VIEW -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-tt-staff" data-tab="staff-view" aria-labelledby="tab-tt-staff" hidden>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Staff Timetable</h2>
        <select id="tt-staff-select" onchange="ttStaffLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="">Select staff member…</option>
        </select>
      </div>
      <div id="tt-staff-content">
        <div class="tab-coming-soon"><div class="coming-icon">👨‍🏫</div><h3>Staff timetable</h3><p>Select a staff member to view their teaching timetable.</p></div>
      </div>
    </div>

    <!-- CLASS VIEW -->
    <div class="wren-tab-panel" role="tabpanel" id="panel-tt-class" data-tab="class-view" aria-labelledby="tab-tt-class" hidden>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <h2 class="page-title" style="font-size:1.05rem;margin:0">Class Timetable</h2>
        <select id="tt-class-select" onchange="ttClassLoad()" style="background:#1e293b;border:1px solid #2d3748;color:#f1f5f9;border-radius:8px;padding:6px 10px;font-size:.78rem">
          <option value="">Select class…</option>
        </select>
      </div>
      <div id="tt-class-content">
        <div class="tab-coming-soon"><div class="coming-icon">🏫</div><h3>Class timetable</h3><p>Select a class to view their teaching timetable.</p></div>
      </div>
    </div>

  </div>
</div>

<script>
const TT_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const TT_PERIODS = ['Period 1','Period 2','Period 3','Period 4','Period 5','Period 6'];
const TT_COLOURS = {
  'English':'#1e3a5f','Maths':'#1a3a2a','Science':'#3a1e1e','History':'#2d1e5f',
  'Geography':'#1e2d20','French':'#3a2800','Spanish':'#3a1400','PE':'#0f2a1e',
  'Art':'#2d0f2d','Music':'#1a1a3a','Drama':'#2a0f1a','ICT':'#0f1a2d',
  'RE':'#2a1a0f','PSHE':'#1a2a1a','default':'#1e293b'
};

function ttColour(subject) {
  if (!subject) return TT_COLOURS.default;
  for (const [k, v] of Object.entries(TT_COLOURS)) {
    if (subject.toLowerCase().startsWith(k.toLowerCase())) return v;
  }
  return TT_COLOURS.default;
}

function renderTimetableGrid(lessons) {
  const byDayPeriod = {};
  (lessons || []).forEach(l => {
    const key = `${l.day}_${l.period}`;
    if (!byDayPeriod[key]) byDayPeriod[key] = [];
    byDayPeriod[key].push(l);
  });
  const header = `<div class="tt-header"><div class="tt-header-cell">Period</div>${TT_DAYS.map(d=>`<div class="tt-header-cell">${d}</div>`).join('')}</div>`;
  const rows = TT_PERIODS.map((p, pi) => {
    const cells = TT_DAYS.map(d => {
      const lessons = byDayPeriod[`${d}_${p}`] || byDayPeriod[`${d}_${pi+1}`] || [];
      if (!lessons.length) return `<div class="tt-cell"><div class="tt-empty">—</div></div>`;
      return `<div class="tt-cell">${lessons.map(l=>`
        <div class="tt-lesson" style="background:${ttColour(l.subject)};border:1px solid rgba(255,255,255,.06)">
          <div class="sub">${l.subject||'—'}</div>
          <div class="cls">${l.class_name||l.group||''}</div>
          <div class="rm">${l.room||''}</div>
        </div>`).join('')}</div>`;
    }).join('');
    return `<div class="tt-row"><div class="tt-period-label">${p}</div>${cells}</div>`;
  }).join('');
  return `<div class="tt-grid" style="overflow-x:auto">${header}${rows}</div>`;
}

window.wrenLoadTab_timetable_weekly = function() { ttWeeklyLoad(); };

async function ttWeeklyLoad() {
  const el = document.getElementById('tt-weekly-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w100"></div><div class="tab-sk-row w100"></div><div class="tab-sk-row w100"></div></div>';
  const yearGroup = document.getElementById('tt-year-group')?.value || '';
  try {
    const data = await Wren.api(`/api/secondary-timetable/week${yearGroup?'?year_group='+yearGroup:''}`).catch(() => null);
    if (!data || !(data.lessons || data.timetable)) throw new Error('No data');
    el.innerHTML = renderTimetableGrid(data.lessons || data.timetable || []);
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🗓️</div><h3>Timetable</h3><p>The school timetable for the current week.</p></div>`;
  }
}

window.wrenLoadTab_timetable_rooms = function() { ttRoomsLoad(); };

async function ttRoomsLoad() {
  const el = document.getElementById('tt-rooms-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w80"></div><div class="tab-sk-row w60"></div></div>';
  try {
    const data = await Wren.api('/api/secondary-timetable/rooms').catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = `
      <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:20px">
        ${(data.rooms||[]).map(r=>{const pct=r.utilisation_pct||0;const col=pct>85?'#ef4444':pct>60?'#f59e0b':'#22c55e';return`<div class="stat-card" style="border-color:${col}20"><div class="stat-label">${r.name}</div><div class="stat-value" style="font-size:1.4rem;color:${col}">${pct}%</div><div class="stat-label">utilised</div></div>`;}).join('')}
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏫</div><h3>Rooms</h3><p>Room utilisation overview.</p></div>`;
  }
}

window.wrenLoadTab_timetable_staffview = function() {
  Wren.api('/api/staff?limit=50').then(d => {
    const sel = document.getElementById('tt-staff-select');
    if (sel && sel.options.length <= 1) {
      (d.staff||d||[]).filter(s=>s.role!=='parent').slice(0,40).forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name||s.full_name||'Staff';sel.appendChild(o);});
    }
  }).catch(()=>{});
};

async function ttStaffLoad() {
  const staffId = document.getElementById('tt-staff-select')?.value;
  if (!staffId) return;
  const el = document.getElementById('tt-staff-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w100"></div></div>';
  try {
    const data = await Wren.api(`/api/secondary-timetable/staff/${staffId}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = renderTimetableGrid(data.lessons || data.timetable || []);
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">👨‍🏫</div><h3>No timetable</h3><p>No timetable data for this staff member.</p></div>`;
  }
}

window.wrenLoadTab_timetable_classview = function() {
  Wren.api('/api/classes?limit=50').then(d => {
    const sel = document.getElementById('tt-class-select');
    if (sel && sel.options.length <= 1) {
      (d.classes||d||[]).slice(0,40).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name||c.class_name||'Class';sel.appendChild(o);});
    }
  }).catch(()=>{});
};

async function ttClassLoad() {
  const classId = document.getElementById('tt-class-select')?.value;
  if (!classId) return;
  const el = document.getElementById('tt-class-content');
  if (!el) return;
  el.innerHTML = '<div class="tab-skeleton"><div class="tab-sk-row w100"></div></div>';
  try {
    const data = await Wren.api(`/api/secondary-timetable/class/${classId}`).catch(() => null);
    if (!data) throw new Error('No data');
    el.innerHTML = renderTimetableGrid(data.lessons || data.timetable || []);
  } catch (e) {
    el.innerHTML = `<div class="tab-coming-soon"><div class="coming-icon">🏫</div><h3>No timetable</h3><p>No timetable data for this class.</p></div>`;
  }
}
</script>
