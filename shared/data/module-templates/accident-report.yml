slug: accident-report
name: Accident Report
icon: "🩹"
category: safeguarding
description: Record a child accident with severity, action taken, witness signature and parent notification.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: time_of_incident
    type: datetime
    label: Time of incident
    required: true
  - key: location
    type: dropdown
    label: Where did it happen?
    required: true
    options:
      - Baby Room
      - Pre-school
      - Garden
      - Kitchen
      - Corridor
      - Other
  - key: description
    type: long_text
    label: Description of accident
    required: true
    placeholder: Describe what happened, how it happened and any contributing factors
  - key: body_part
    type: dropdown
    label: Body part injured
    required: true
    options:
      - Head / face
      - Neck
      - Shoulder / arm
      - Hand / fingers
      - Chest / torso
      - Back
      - Hip / leg
      - Knee / ankle
      - Foot / toes
      - Other
  - key: severity
    type: radio
    label: Severity
    required: true
    options:
      - Minor (no first aid needed)
      - Low (first aid applied)
      - Moderate (parent collected / GP advised)
      - Serious (A&E / ambulance called)
  - key: action_taken
    type: long_text
    label: Action taken
    required: true
    placeholder: Describe first aid or other action taken
  - key: witness_name
    type: text
    label: Witness name (if applicable)
    required: false
  - key: parent_notified
    type: yes_no
    label: Parent / carer notified?
    required: true
  - key: parent_notification_time
    type: datetime
    label: Time parent was notified
    required: false
  - key: staff_signature
    type: signature
    label: Staff signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
