slug: allergy-update
name: Allergy / Intolerance Update
icon: "🥜"
category: health_safety
description: Record or update a child's allergy or intolerance with severity, treatment and GP confirmation.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: allergen
    type: text
    label: Allergen or intolerance
    required: true
    placeholder: e.g. Peanuts, Dairy, Gluten, Latex, Bee stings
  - key: allergy_type
    type: radio
    label: Type
    required: true
    options:
      - Allergy
      - Food intolerance
      - Sensitivity
      - Anaphylaxis risk
  - key: severity
    type: dropdown
    label: Severity
    required: true
    options:
      - Mild
      - Moderate
      - Severe
      - Anaphylactic (life-threatening)
  - key: symptoms
    type: long_text
    label: Known symptoms
    required: true
    placeholder: Describe the typical reaction e.g. hives, vomiting, throat swelling
  - key: treatment
    type: long_text
    label: Treatment / management
    required: true
    placeholder: What should staff do if the child is exposed?
  - key: auto_injector_needed
    type: yes_no
    label: Auto-injector (EpiPen) required?
    required: true
  - key: auto_injector_location
    type: text
    label: Auto-injector location (if required)
    required: false
    placeholder: e.g. Child's red bag in office cupboard
  - key: gp_confirmation_attached
    type: yes_no
    label: GP / allergy clinic confirmation on file?
    required: true
  - key: review_date
    type: date
    label: Next review date
    required: false
  - key: parent_signature
    type: signature
    label: Parent / carer signature
    required: true
  - key: manager_signature
    type: signature
    label: Manager signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
