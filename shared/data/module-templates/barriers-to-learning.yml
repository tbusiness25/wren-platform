slug: barriers-to-learning
name: Barriers to Learning (Reception Baseline)
icon: "🔍"
category: assessment
description: One-off baseline screen run in the first 2 weeks of Reception. Flags speech & language, attention, fine/gross motor, PSED, EAL, sensory and welfare concerns to inform early intervention and EHCP referrals.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
      - edit_all
      - delete
fields:
  - key: assessment_date
    type: date
    label: Date of assessment
    required: true
  - key: speech_language
    type: radio
    label: Speech & language — any concerns?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: speech_language_notes
    type: long_text
    label: Speech & language notes
    required: false
    placeholder: Describe what was observed (e.g. vocabulary level, clarity, sentence structure)
  - key: attention_focus
    type: radio
    label: Attention & focus — any concerns?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: attention_focus_notes
    type: long_text
    label: Attention & focus notes
    required: false
  - key: fine_motor
    type: radio
    label: Fine motor skills — any concerns?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: fine_motor_notes
    type: long_text
    label: Fine motor notes
    required: false
    placeholder: e.g. pencil control, scissors, self-care tasks
  - key: gross_motor
    type: radio
    label: Gross motor skills — any concerns?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: gross_motor_notes
    type: long_text
    label: Gross motor notes
    required: false
  - key: social_emotional
    type: radio
    label: Social & emotional development — any concerns?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: social_emotional_notes
    type: long_text
    label: Social & emotional notes
    required: false
  - key: eal_flag
    type: yes_no
    label: English as an Additional Language (EAL)?
    required: true
  - key: eal_home_language
    type: text
    label: If EAL — home language
    required: false
  - key: hearing_concern
    type: radio
    label: Hearing — any concern?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: vision_concern
    type: radio
    label: Vision — any concern?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — refer"
  - key: sleep_diet_concern
    type: radio
    label: Sleep or diet — any welfare concern?
    required: true
    options:
      - "No concern"
      - "Monitor"
      - "Concern — escalate"
  - key: prior_nursery
    type: yes_no
    label: Prior nursery / childcare experience?
    required: true
  - key: prior_nursery_notes
    type: text
    label: If yes — where and for how long?
    required: false
  - key: overall_notes
    type: long_text
    label: Overall observations / anything else to flag
    required: false
  - key: next_steps
    type: long_text
    label: Recommended next steps / referrals
    required: false
  - key: assessor_signature
    type: signature
    label: Assessor signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
