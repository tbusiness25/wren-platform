slug: fire-drill
name: Fire Drill Record
icon: "🔥"
category: health_safety
description: Log fire evacuation drills with timing, headcount, issues and outcome.
attaches_to: general
portals:
  - ey
  - admin
permissions:
  ey:
    room_leader:
      - submit
      - view_all
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: drill_datetime
    type: datetime
    label: Date and time of drill
    required: true
  - key: evacuation_time_seconds
    type: number
    label: Evacuation time (seconds)
    required: true
    min: 1
    max: 3600
    placeholder: Total time from alarm to full assembly
  - key: children_count
    type: number
    label: Number of children present
    required: true
    min: 0
    max: 50
  - key: staff_count
    type: number
    label: Number of staff present
    required: true
    min: 1
    max: 30
  - key: assembly_point
    type: dropdown
    label: Assembly point used
    required: true
    options:
      - Front car park
      - Garden gate area
      - Pavement on Example Lane
      - Other
  - key: alarm_type
    type: radio
    label: Type of drill
    required: true
    options:
      - Announced
      - Unannounced
  - key: issues_noted
    type: long_text
    label: Issues or observations noted
    required: false
    placeholder: Any problems with evacuation, missing register, slow response etc.
  - key: outcome
    type: radio
    label: Overall outcome
    required: true
    options:
      - Satisfactory
      - Requires improvement
      - Unsatisfactory
  - key: follow_up_actions
    type: long_text
    label: Follow-up actions required
    required: false
  - key: conducted_by_signature
    type: signature
    label: Conducted by (signature)
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
