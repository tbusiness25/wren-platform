slug: pencil-grip-assessment
name: Pencil Grip Assessment
icon: "✏️"
category: assessment
description: Observe and record pencil grip type, pressure and hand preference during writing or drawing. Re-assessable each term to track progression.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
fields:
  - key: observation_date
    type: date
    label: Date observed
    required: true
  - key: term
    type: dropdown
    label: Term
    required: true
    options:
      - Autumn 1
      - Autumn 2
      - Spring 1
      - Spring 2
      - Summer 1
      - Summer 2
  - key: activity
    type: text
    label: Activity during observation
    required: false
    placeholder: e.g. free drawing, name writing, colouring
  - key: grip_type
    type: radio
    label: Grip type observed
    required: true
    options:
      - Fist grip (palmar)
      - Digital pronate (fingers pointing down)
      - Quadrupod (4-finger)
      - Tripod (3-finger static)
      - Dynamic tripod (most mature)
      - Other / mixed
  - key: grip_type_notes
    type: text
    label: Grip notes (if Other / mixed)
    required: false
  - key: pressure
    type: radio
    label: Pencil pressure
    required: true
    options:
      - Light (marks barely visible)
      - Medium (consistent, appropriate)
      - Heavy (indents page, fatigue risk)
  - key: hand_preference
    type: radio
    label: Hand preference
    required: true
    options:
      - Left hand dominant
      - Right hand dominant
      - Mixed / no clear preference
  - key: posture_notes
    type: long_text
    label: Posture and positioning observations
    required: false
    placeholder: e.g. paper position, chair height, whether elbow is on table
  - key: concerns
    type: radio
    label: Any fine motor concerns?
    required: true
    options:
      - "No concern"
      - "Monitor — re-assess next term"
      - "Concern — refer to OT / SENCO"
  - key: intervention_suggested
    type: long_text
    label: Suggested intervention or activity
    required: false
    placeholder: e.g. playdough, threading beads, squeezy ball exercises
  - key: observer_signature
    type: signature
    label: Observer signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
