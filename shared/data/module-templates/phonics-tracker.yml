slug: phonics-tracker
name: Phonics Tracker (Little Wandle / RWI)
icon: "🔤"
category: assessment
description: Phase 1–6 phonics milestone tracking aligned to Little Wandle and Read Write Inc schemes. Per-child, per-phase attainment. Feeds Y1 phonics screening preparation.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
fields:
  - key: assessment_date
    type: date
    label: Date of assessment
    required: true
  - key: term
    type: dropdown
    label: Term
    required: true
    options:
      - Autumn 1
      - Autumn 2
      - Spring 1
      - Spring 2
      - Summer 1
      - Summer 2
  - key: scheme
    type: radio
    label: Phonics scheme
    required: true
    options:
      - Little Wandle
      - Read Write Inc
      - Jolly Phonics
      - Other

  - key: phase_1
    type: radio
    label: "Phase 1 — Environmental / instrumental / body percussion sounds & oral blending"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete
  - key: phase_2
    type: radio
    label: "Phase 2 — First 19 graphemes (s,a,t,p,i,n,m,d,g,o,c,k,ck,e,u,r,h,b,f,ff,l,ll,ss)"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete
  - key: phase_2_sounds_known
    type: text
    label: Phase 2 — sounds securely known (e.g. s,a,t,p,i)
    required: false
  - key: phase_3
    type: radio
    label: "Phase 3 — Further 25 graphemes incl. digraphs (sh,ch,th,ng,ai,ee,igh,oa,oo,ar,or,ur,ow,oi,ear,air,ure,er)"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete
  - key: phase_3_sounds_known
    type: text
    label: Phase 3 — graphemes securely known
    required: false
  - key: phase_4
    type: radio
    label: "Phase 4 — Adjacent consonants (CCVC/CVCC), no new graphemes"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete
  - key: phase_5
    type: radio
    label: "Phase 5 — Alternative grapheme-phoneme correspondences (ay, ou, ie, ea, oy…)"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete
  - key: phase_6
    type: radio
    label: "Phase 6 — Spelling rules, suffixes, prefixes, morphology"
    required: true
    options:
      - Not yet started
      - Working towards (WT)
      - On track (OT)
      - Greater depth (GD)
      - Secure / complete

  - key: blending_ability
    type: radio
    label: Blending for reading
    required: true
    options:
      - Cannot blend yet
      - Blends VC / CVC
      - Blends CCVC / CVCC
      - Fluent — blends multi-syllable words
  - key: segmenting_ability
    type: radio
    label: Segmenting for spelling
    required: true
    options:
      - Cannot segment yet
      - Segments VC / CVC
      - Segments CCVC / CVCC
      - Fluent segmenter
  - key: tricky_words
    type: radio
    label: High-frequency / tricky word recognition
    required: true
    options:
      - Phase 2 words (the, to, I, no, go, into)
      - Phase 3 words (he, she, we, me, be, was, my, you, they, her, all, are)
      - Phase 4 words (said, have, like, so, do, some, come, were, there, little, one, when, out, what)
      - Phase 5+ words (many / most Phase 5 HFW secure)
  - key: y1_screening_prediction
    type: radio
    label: Y1 Phonics Screening — predicted outcome
    required: false
    options:
      - Well below threshold
      - Below threshold — support needed
      - Likely to meet threshold
      - Exceeding threshold
  - key: notes
    type: long_text
    label: Notes and observations
    required: false
  - key: assessor_signature
    type: signature
    label: Assessor signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
