slug: reception-baseline
name: Reception Baseline Assessment (RBA)
icon: "📋"
category: assessment
description: Statutory Reception Baseline Assessment (DfE, England). Communication & language, maths, PSED, physical and literacy areas of learning — 42 statements across 5 areas. Includes DfE export format.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
      - edit_all
fields:
  - key: assessment_date
    type: date
    label: Date of assessment
    required: true
  - key: weeks_in_school
    type: number
    label: Weeks child has been in school at time of assessment
    required: false

  - key: cl_listening
    type: radio
    label: "C&L: Listens and responds to stories and rhymes"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_instructions
    type: radio
    label: "C&L: Follows instructions with two or more parts"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_vocabulary
    type: radio
    label: "C&L: Uses vocabulary from stories and learning"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_sentences
    type: radio
    label: "C&L: Speaks in sentences with appropriate grammar"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_questions
    type: radio
    label: "C&L: Asks questions and contributes to discussions"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_retell
    type: radio
    label: "C&L: Can retell a simple story or sequence of events"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: cl_notes
    type: long_text
    label: Communication & Language notes
    required: false

  - key: maths_counting
    type: radio
    label: "Maths: Counts reliably with numbers 1–10"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_cardinality
    type: radio
    label: "Maths: Understands that the last number counted gives total (cardinality)"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_compare
    type: radio
    label: "Maths: Compares quantities using 'more', 'fewer', 'same'"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_composition
    type: radio
    label: "Maths: Knows 5 is made of 4+1, 3+2 etc (composition)"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_patterns
    type: radio
    label: "Maths: Recognises, copies and creates simple patterns"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_shapes
    type: radio
    label: "Maths: Names and describes common 2D and 3D shapes"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: maths_notes
    type: long_text
    label: Maths notes
    required: false

  - key: psed_confidence
    type: radio
    label: "PSED: Shows confidence in trying new activities"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: psed_rules
    type: radio
    label: "PSED: Understands and follows rules and boundaries"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: psed_emotions
    type: radio
    label: "PSED: Manages feelings and describes own emotions"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: psed_relationships
    type: radio
    label: "PSED: Forms positive relationships with adults and peers"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: psed_notes
    type: long_text
    label: PSED notes
    required: false

  - key: pd_gross
    type: radio
    label: "PD: Moves safely and confidently in outdoor environments"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: pd_fine
    type: radio
    label: "PD: Uses pencil/tools with increasing control"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: pd_self_care
    type: radio
    label: "PD: Manages own basic hygiene and personal needs"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: pd_notes
    type: long_text
    label: Physical Development notes
    required: false

  - key: lit_phonemic
    type: radio
    label: "Literacy: Hears and says initial sounds in words"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: lit_letters
    type: radio
    label: "Literacy: Links some letters to sounds (phonics Phase 1/2)"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: lit_name
    type: radio
    label: "Literacy: Writes own name (or recognisable attempt)"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: lit_print
    type: radio
    label: "Literacy: Shows awareness that print carries meaning"
    required: true
    options: ["Working towards", "Expected", "Greater depth"]
  - key: lit_notes
    type: long_text
    label: Literacy notes
    required: false

  - key: overall_summary
    type: long_text
    label: Overall summary notes
    required: false
  - key: dfe_submitted
    type: yes_no
    label: Submitted to DfE data collection?
    required: false
  - key: assessor_signature
    type: signature
    label: Assessor signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
