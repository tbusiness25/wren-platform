slug: risk-assessment
name: Risk Assessment
icon: "⚠️"
category: health_safety
description: Assess activity or area hazards with likelihood/severity scoring and control measures.
attaches_to: general
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_all
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: activity_or_area
    type: text
    label: Activity or area being assessed
    required: true
    placeholder: e.g. Garden play, Cooking activity, Fire escape route
  - key: hazards_identified
    type: long_text
    label: Hazards identified
    required: true
    placeholder: List each hazard on a new line
  - key: who_is_at_risk
    type: dropdown
    label: Who is at risk?
    required: true
    options:
      - Children only
      - Staff only
      - Children and staff
      - Visitors
      - All
  - key: likelihood
    type: radio
    label: Likelihood (1 = very unlikely, 5 = very likely)
    required: true
    options:
      - "1 — Very unlikely"
      - "2 — Unlikely"
      - "3 — Possible"
      - "4 — Likely"
      - "5 — Very likely"
  - key: severity
    type: radio
    label: Severity (1 = trivial, 5 = catastrophic)
    required: true
    options:
      - "1 — Trivial"
      - "2 — Minor"
      - "3 — Moderate"
      - "4 — Major"
      - "5 — Catastrophic"
  - key: control_measures
    type: long_text
    label: Control measures in place
    required: true
    placeholder: Describe steps taken to reduce the risk
  - key: residual_risk
    type: radio
    label: Residual risk after controls
    required: true
    options:
      - Low
      - Medium
      - High
  - key: review_date
    type: date
    label: Review date
    required: true
  - key: reviewer_signature
    type: signature
    label: Reviewer signature
    required: true
  - key: assessed_at
    type: timestamp_auto
    label: Assessment date
