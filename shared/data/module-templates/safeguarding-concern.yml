slug: safeguarding-concern
name: Safeguarding Concern
icon: "🛡️"
category: safeguarding
description: Record a safeguarding concern with type, details, immediate action and escalation.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_scoped
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: concern_type
    type: dropdown
    label: Type of concern
    required: true
    options:
      - Physical abuse
      - Emotional abuse
      - Sexual abuse
      - Neglect
      - Domestic violence (household)
      - Exploitation
      - Radicalisation / extremism
      - FGM concern
      - Online safety
      - Unexplained injury
      - Other
  - key: date_of_concern
    type: date
    label: Date concern arose
    required: true
  - key: is_disclosure
    type: yes_no
    label: Was this a direct disclosure by the child?
    required: true
  - key: details
    type: long_text
    label: Details of concern
    required: true
    placeholder: Describe exactly what was observed or disclosed. Use the child's own words where relevant. Do not interpret or speculate.
    help_text: Record factual observations only. Do not ask leading questions.
  - key: immediate_action_taken
    type: long_text
    label: Immediate action taken
    required: true
    placeholder: What did you do immediately after becoming aware of this concern?
  - key: escalated_to
    type: dropdown
    label: Escalated to
    required: true
    options:
      - Designated Safeguarding Lead (DSL)
      - Deputy DSL
      - Local Authority Designated Officer (LADO)
      - Children's Social Care
      - Police
      - Not yet escalated
  - key: parent_informed
    type: yes_no
    label: Parent / carer informed?
    required: true
    help_text: Only inform parent if it would not place the child at greater risk.
  - key: reporting_staff_signature
    type: signature
    label: Reporting staff signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
