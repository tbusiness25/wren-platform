slug: supervision-record
name: Supervision Record
icon: "🤝"
category: staff
description: Record staff supervisions with topics, targets, CPD identified and wellbeing note.
attaches_to: staff
portals:
  - admin
permissions:
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: supervision_date
    type: date
    label: Date of supervision
    required: true
  - key: topics_discussed
    type: long_text
    label: Topics discussed
    required: true
    placeholder: Summarise the key topics covered in this supervision
  - key: targets_set
    type: long_text
    label: Targets set
    required: false
    placeholder: Any agreed targets or action points for the staff member
  - key: cpd_identified
    type: long_text
    label: CPD identified
    required: false
    placeholder: Any training or continuing professional development needs identified
  - key: wellbeing_note
    type: long_text
    label: Staff wellbeing note
    required: false
    placeholder: How is the staff member feeling? Any concerns?
  - key: next_supervision_date
    type: date
    label: Next supervision date
    required: false
  - key: manager_signature
    type: signature
    label: Manager signature
    required: true
  - key: staff_signature
    type: signature
    label: Staff member signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
