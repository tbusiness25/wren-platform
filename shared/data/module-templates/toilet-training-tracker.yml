slug: toilet-training-tracker
name: Toilet Training Tracker
icon: "🚽"
category: welfare
description: Daily record for children aged 2–3 years who are toilet training. Track dry periods, accidents, potty and toilet use. Trends over time shown in child profile. Parent-shareable summary available.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
fields:
  - key: record_date
    type: date
    label: Date
    required: true
  - key: session
    type: radio
    label: Session
    required: true
    options:
      - Morning (AM)
      - Afternoon (PM)
      - Full day
  - key: dry_periods
    type: number
    label: Number of dry periods (stayed dry between checks)
    required: true
  - key: potty_uses
    type: number
    label: Times successfully used potty
    required: true
  - key: toilet_uses
    type: number
    label: Times successfully used toilet
    required: true
  - key: accidents_wee
    type: number
    label: Wee accidents
    required: true
  - key: accidents_poo
    type: number
    label: Poo accidents
    required: true
  - key: requested_toilet
    type: yes_no
    label: Child requested toilet / potty themselves today?
    required: true
  - key: pulls_down_clothing
    type: radio
    label: Managing own clothing
    required: false
    options:
      - Needs full help
      - Needs some help
      - Mostly independent
      - Fully independent
  - key: hand_washing
    type: radio
    label: Hand washing after toilet
    required: false
    options:
      - Needs prompting each time
      - Sometimes needs prompt
      - Does it independently
  - key: mood_around_toileting
    type: radio
    label: Child's mood / attitude around toileting
    required: false
    options:
      - Anxious / distressed
      - Reluctant
      - Neutral
      - Positive / enthusiastic
  - key: nappy_still_worn
    type: radio
    label: Nappy / pull-up status
    required: false
    options:
      - Still in nappy (training just started)
      - Pull-ups only
      - Pull-ups for nap / sleep only
      - No nappy / pull-up during session
  - key: notes
    type: long_text
    label: Notes for parents
    required: false
    placeholder: Any helpful context — what worked well, any patterns noticed, suggestions for home
  - key: recorded_at
    type: timestamp_auto
    label: Record created
