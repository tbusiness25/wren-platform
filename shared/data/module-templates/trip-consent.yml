slug: trip-consent
name: Trip Consent Form
icon: "🚌"
category: outings
description: Document an outing with transport, ratios, emergency contacts and parent consent signature.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    room_leader:
      - submit
      - view_all
    manager:
      - submit
      - view_all
      - edit_all
      - delete
  admin:
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: destination
    type: text
    label: Destination
    required: true
    placeholder: e.g. Walpole Park, Ealing
  - key: trip_date
    type: date
    label: Date of trip
    required: true
  - key: departure_time
    type: text
    label: Departure time
    required: true
    placeholder: e.g. 09:30
  - key: return_time
    type: text
    label: Expected return time
    required: true
    placeholder: e.g. 12:00
  - key: transport_method
    type: dropdown
    label: Method of transport
    required: true
    options:
      - Walking
      - Nursery minibus
      - Public transport (bus)
      - Public transport (train)
      - Hired coach
      - Parent transport
      - Other
  - key: adult_child_ratio
    type: text
    label: Adult to child ratio
    required: true
    placeholder: e.g. 1:3
  - key: activities_planned
    type: long_text
    label: Activities planned
    required: false
    placeholder: Brief description of planned activities
  - key: emergency_contact_name
    type: text
    label: Emergency contact name (during trip)
    required: true
  - key: emergency_contact_number
    type: text
    label: Emergency contact number
    required: true
  - key: medical_notes
    type: long_text
    label: Medical or allergy notes for this child
    required: false
    placeholder: Any specific medical needs to note for this outing
  - key: parent_consent
    type: yes_no
    label: Parent / carer gives consent for this trip
    required: true
  - key: parent_signature
    type: signature
    label: Parent / carer signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Form completed
