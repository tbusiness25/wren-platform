slug: two-year-progress-check
name: EYFS 2-Year-Old Progress Check
icon: "👶"
category: assessment
description: Statutory progress check at age 2. Covers the three prime areas of learning — Communication & Language, Physical Development, PSED. Includes NHS Health Visitor export summary and parent-shareable report.
attaches_to: child
portals:
  - ey
  - admin
permissions:
  ey:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_all
      - edit_own
    manager:
      - submit
      - view_all
      - edit_all
      - delete
    deputy_manager:
      - submit
      - view_all
      - edit_all
  admin:
    manager:
      - view_all
      - edit_all
fields:
  - key: check_date
    type: date
    label: Date of progress check
    required: true
  - key: child_age_months
    type: number
    label: Child's age at time of check (months)
    required: true
  - key: key_person
    type: text
    label: Key person name
    required: true

  - key: cl_summary
    type: radio
    label: Communication & Language — overall summary
    required: true
    options:
      - Emerging (behind typical development)
      - Expected (within typical range)
      - Exceeding (ahead of typical range)
  - key: cl_detail
    type: long_text
    label: Communication & Language — what the child can do
    required: true
    placeholder: Describe vocabulary level, how the child communicates, comprehension, use of two-word phrases, early sentences, etc.
  - key: cl_concern
    type: yes_no
    label: Referral recommended for speech & language?
    required: true
  - key: cl_concern_notes
    type: long_text
    label: If referring — describe specific concerns
    required: false

  - key: pd_summary
    type: radio
    label: Physical Development — overall summary
    required: true
    options:
      - Emerging (behind typical development)
      - Expected (within typical range)
      - Exceeding (ahead of typical range)
  - key: pd_detail
    type: long_text
    label: Physical Development — what the child can do
    required: true
    placeholder: Describe gross motor (walking, climbing, throwing), fine motor (picking up objects, holding spoon/crayon), toilet training progress, etc.
  - key: pd_concern
    type: yes_no
    label: Referral recommended for physical / OT?
    required: true

  - key: psed_summary
    type: radio
    label: Personal, Social & Emotional Development — overall summary
    required: true
    options:
      - Emerging (behind typical development)
      - Expected (within typical range)
      - Exceeding (ahead of typical range)
  - key: psed_detail
    type: long_text
    label: PSED — what the child can do
    required: true
    placeholder: Describe how the child plays, social interaction, emotional regulation, separation from carer, play alongside / with others, etc.
  - key: psed_concern
    type: yes_no
    label: Referral recommended for PSED / CAMHS?
    required: true

  - key: overall_wellbeing
    type: radio
    label: Overall wellbeing and involvement levels (Leuven scale)
    required: false
    options:
      - Level 1 (very low)
      - Level 2 (low)
      - Level 3 (medium)
      - Level 4 (high)
      - Level 5 (very high)

  - key: parent_perspective
    type: long_text
    label: Parent / carer perspective (gathered at meeting)
    required: false
    placeholder: What the parent says they observe at home — strengths, concerns, questions

  - key: next_steps_setting
    type: long_text
    label: Next steps — what the setting will do
    required: true
    placeholder: Activities, interventions, observations planned over the next 3 months
  - key: next_steps_parents
    type: long_text
    label: Next steps — what parents can do at home
    required: false
    placeholder: Suggestions for extending learning at home

  - key: health_visitor_shared
    type: yes_no
    label: Copy shared with Health Visitor?
    required: true
  - key: health_visitor_date
    type: date
    label: Date shared with Health Visitor
    required: false
  - key: parent_signed
    type: yes_no
    label: Parent / carer has seen and acknowledged this check?
    required: true

  - key: key_person_signature
    type: signature
    label: Key person signature
    required: true
  - key: recorded_at
    type: timestamp_auto
    label: Record created
