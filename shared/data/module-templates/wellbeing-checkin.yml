slug: wellbeing-checkin
name: Staff Wellbeing Check-In
icon: "💚"
category: staff
description: Regular wellbeing pulse for staff covering mood, workload, support and any concern flags.
attaches_to: staff
portals:
  - admin
permissions:
  admin:
    practitioner:
      - submit
      - view_scoped
    room_leader:
      - submit
      - view_scoped
    manager:
      - submit
      - view_all
      - edit_all
      - delete
fields:
  - key: check_in_date
    type: date
    label: Date of check-in
    required: true
  - key: mood_score
    type: radio
    label: How are you feeling today? (1 = very low, 5 = great)
    required: true
    options:
      - "1 — Very low"
      - "2 — Low"
      - "3 — OK"
      - "4 — Good"
      - "5 — Great"
  - key: workload_score
    type: radio
    label: How is your workload feeling? (1 = overwhelmed, 5 = manageable)
    required: true
    options:
      - "1 — Overwhelmed"
      - "2 — Heavy"
      - "3 — Balanced"
      - "4 — Light"
      - "5 — Very manageable"
  - key: support_score
    type: radio
    label: How supported do you feel? (1 = unsupported, 5 = very supported)
    required: true
    options:
      - "1 — Unsupported"
      - "2 — Somewhat unsupported"
      - "3 — Neutral"
      - "4 — Supported"
      - "5 — Very supported"
  - key: optional_note
    type: long_text
    label: Anything you'd like to share? (optional)
    required: false
    placeholder: Any thoughts, concerns or positive feedback you'd like to add
  - key: is_concern
    type: yes_no
    label: Would you like a manager to follow up on this?
    required: true
    help_text: Selecting Yes will flag this check-in for your line manager's attention.
  - key: recorded_at
    type: timestamp_auto
    label: Submitted
